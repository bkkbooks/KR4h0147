body:
  text: 睂山蘇轍文三狀上書祭文論西事狀陳州為張安道論時事書自齊州回論時事書為兄軾下獄上書代三省祭司馬丞相文欽定四庫全書御選唐宋文醇巻五十三睂山蘇轍文三論西事狀右臣伏見西夏頃自秉常之禍人心離貳梁氏與日木多二族分據東西廂兵馬勢力相敵疑阻日深入寇之謀自此衰息朝廷略加招納隨即伏從使介相尋臣禮甚至只自今年春末夏初以來始有桀心出兵數萬掩襲涇原殺虜弓箭手數千人復歸巢穴朝廷方事安衆難於用武接以君臣之禮加以冊命之恩特遣使人厚賜金幣狡焉生心敢為侮慢輒以地界為詞不復入謝至於坤成賀使亦遂不遣中外臣子聞者無不憤怒思食其肉臣忝補侍從主憂臣辱義不辭勞臣擢自小官列於禁近議論幾事既其本職感激思報宜異常人是以冒昧獻言不避罪戾庶幾聖意由此感悟雖被譴逐臣不恨也臣竊惟當今之務以為必先知致寇之端由審行事之得失然後料虜情之所在定制敵之長算誠使四者畢陳於前羌戎小醜勢亦無能為也棟戬本與西夏世為仇讐元昊之亂仁宗賴其牽制梁氏之簒神宗藉其征討世効忠力非諸番之比乃者棟戬老病其相鄂特凌古擅其國事與其妻契丹公主殺其二妻森摩氏其大將果莊及温錫沁等皆心懐不服鄂特凌古欺罔朝廷自稱棟戬嗣子朝廷不察情偽不原逆順即以節鉞付之謀之不臧患自此起鄂特凌古既知失衆虐用威刑衆心日離而果莊自謂與鄂特凌古比肩一體顧居其下心常不悦夏人乗此間隙折節下之先與鄂特凌古解仇結懽令轉説果莊舉兵入寇復誘脇日木多保忠令於涇原竊發黨與既立羽翼既成是以敢肆狂言以動朝聽向若鄂特凌古以棟戬之死來告立嗣朝廷因其所請遍問果莊温錫沁等以誰實當立若衆以鄂特凌古為可立則既立之後衆必無詞若以為不可則分棟戬之舊科以三使額授此三人鄂特凌古無僥倖之命果莊無怨望之意則夏人無與為援安能動揺加以數年以來朝廷本厭兵事羌中測知此意亦以自安頃者忽命熙河㸃集人馬大城西關仍云來年當築龕谷聲實既暴虜心不寧舉兵自强釁亦由此此所謂致寇之端由也先帝昔因梁氏簒逆之禍舉兵誅討侵攘地界為怨至深羌虜之性重於復讐計其思報之心未嘗一日忘也徒以喪亂相繼兵力凋殘陛下臨御之初意切懐納是以連年入貢以休息其民雖有恭順之言盖亦非其本意矣假令犯順固猶有詞今朝廷因其承襲之後賜之冊命捐金錢二十餘萬緡以為之禮彼既與我有君臣之分然後可責以忠順之節朝廷此舉於義甚長而羌虜無謀遂肆桀傲内則其國中士民自知其不直必不為用外則中國兵將皆有鬬志易以立功曲直之幾於此始定雖棄捐金幣以封殖寇讐小人謂之失䇿而分别曲直以激勵將士智者謂之得計此所謂行事之得失也元昊本懐大志長於用兵亮祚天付凶狂輕用其衆頃為邊患皆歴嵗年然而國小力㣲終以困斃今梁氏専國素與曰木多不協内自多難而欲外侮中原料其奸謀盖非元昊亮祚之比矣意謂二聖在位恭黙守成仁澤之深逺近所悉既無用武之意可肆無厭之求蘭㑹諸城鄜延五寨好請不獲勢脅必從以為狂言一聞求無不得今朝廷既己漸為邊備益兵練將則羌虜之心己乖本計不過秋冬寒凉之後小小跳梁以嘗試朝廷而已若朝廷執意不揺守邊無失則欵塞請盟本無愧恥若朝廷用心不一惟務求和則求請百端漸不可忍此所謂虜情之所在也凡欲應敵必先正名夏人初起邪謀必有二説其一以為慢詞既達則地界可得無窮之請因以滋彰其二以為雖不得地實亦無損猖狂力屈稍復求和中國厭兵勢無不許方其不遜則張皇事勢夸示諸戎及其柔伏則畧為恭順使中國黽勉而聽今朝廷遣兵積粟地界之請固已不從然而號令未明逆順未著臣恐夏人未知朝廷不憚用兵之意無以折其奸心又恐將來奸窮力屈略修臣禮便與講和要約不堅必難持乆昔趙欲與秦為購其謀臣虞卿以為從秦為購不若從齊為購於是東結齊人而秦人自至區區之趙尚知出此而况堂堂中國畏避畜縮媮於無事不一分别曲直而反聽命於羌人哉臣願陛下明降詔書榜沿邊諸郡其大意略曰夏國頃自亮祚喪亡先帝舉兵弔伐既絶嵗賜復禁和市羌中窮困一絹之值至十餘千又命沿邊諸將吏迭行攻討横山一帶皆棄不敢耕窮守沙漠衣食併竭老少窮餓不能自存朕統御四海均覆無外閔此一方窮而無告遂勅諸道帥臣禁止侵掠自是近塞之田始復耕墾既通和市復許入貢使者一至賜予不貲販易而歸獲利無算傳聞羌中得此厚利父子兄弟始有生理朕猶念孤童㓜弱部族携貳若非本朝賜之䇿命假以寵靈則何以威伏酋豪保有疆土是時朝士大夫咸謂夷狄反覆心未可知使者將行言猶未已朕有存亡繼絶之志欲修祖宗爵命諸侯之典以為寧人負我斷而不疑故遣使出疆授以禮命金錢幣帛相屬於道邊人父老觀者太息以為仁義之厚古所未有而狼子野心飽而背徳不遣謝使不賀坤成朕以君道撫之而不以臣禮報朕天地所疾將相咸怒朕惟狂謀逆節止其一二姦臣國人何辜當被殺戮是以弭兵安衆未議攻討然而逆順之理不可不明其令沿邊諸將飭勵兵馬廣為儲峙敢有犯塞即殺無赦彼既背逆天理不有人禍必有鬼誅姑修吾疆以待其變臣料此命一出羌人愧畏雖未即欵伏而姦計沮屈無以號令其下諸路兵民知彼曲我直人思致死勇氣一發邊聲自倍此必然之勢也今朝廷日夕備邊常若寇至而但曲加隱忍不降此命使虜衆一旦犯境終亦不免交鋒若聽臣此言要之亦不出兵坐而待敵初無有異而使士氣感奮以思戰虜情知難而自屈求和之請其至必速此所謂制敵之長算也臣竊聞朝廷近以添屯兵將增廣邊儲議絶和市使熙河帥臣佋徠鄂特凌古果莊温錫沁日木多保忠等此兵法所謂上兵伐謀不戰而屈人者陛下若能饒之以金錢而寛其䋲墨使將帥得盡其心間諜得盡其力則事無不成而虜漸可制矣然有一事似非臣所得言者但以䝉國厚恩不敢不盡昔熙寧元豐之間所行政令雖未必便民然先帝操之以法濟之以威是以令無不從而事無不舉頃者朝廷削去苛法施行仁政可謂善矣然而刑政不明多行姑息中外觀望靡然有縱弛怠惰之風平居無事姑以媮安可耳今虜方不順勝負之變盖未可知緩急之際威令無素何以使衆臣謂宜因事正法以明示天下臣前所言去嵗大臣承用鄂特凌古欺罔之奏授以節制致令果莊懐憤入寇夏人乗釁違命此則當時宰相樞宻使副茍簡無謀之罪也近者涇原賊騎至者數萬殺掠數千斥堠不明備禦不及熙河賊退經今累月而殺傷焚蕩之奏至今未止此則將帥弛慢不畏朝廷之罪也陛下恬不為怪畧無責問政之不修孰大於此中外相視以為疑怪朝廷方將使人蹈白刃赴湯火臣有以知其不能矣昔公孫𢎞為相諸侯有逆謀請歸侯印以塞責諸葛亮為相任馬謖不當請自貶三等以右將軍領事葢大臣體國不惜身自降黜為衆行法今陛下何不取去嵗册命鄂特凌古與議大臣不論去位在位皆奪一官至於兩路將帥雖寄任不改而法不可廢皆使隨罪行罰以此號令四方庶幾知所畏憚政修於朝廷之上而敵人恐懼於千里之外勢之所至不足怪也今陛下未能正羣臣而望西羌之畏威不可得矣臣聞范仲淹守慶州因葛懐敏之敗請以任將非人因兩府遜謝損其勲爵而復其位以激勵諸將感慰邊兵時雖不用而范仲淹之言至今惜之臣雖不敏究觀徃事以為可施於今不敢黙也小臣狂僭鉞斧之誅無所逃避惟陛下裁察取進止審曲直者兵之本也審已之曲直則知已易所為維用伐邑也審彼之曲直則知彼司馬法所為上兵伐謀也閫以外將軍制之一切用正用竒君皆不與惟功賞而罪罰則君制之法立而必行毫髪不可爽山嶽不可移此又本中之本也此文所論可謂得其本矣下聲罪之詔以彰彼之曲罰誤謀之臣以直已之曲師直則壯是則所為廟算者若夫或攻或守或離或合之數茍從中制縱億之而皆中亦道逺而無及於事况未必中乎昔宋仁宗之於契丹度若小國之事大國者一時志士為之憤惋後有使契丹者契丹主言及仁宗聲淚俱下引使者令觀所奉仁宗御容與本國祖宗不殊葢契丹主少時曾㣲服從國信使至宋邊帥覘知之宻以聞至館仁宗宻召入大内令見皇后撫之如已子曰爾我一家也賞賚不貲歸國即位後未嘗一日忘宋也而仁宗在日舉國不知契丹世子之曾至中國也若仁宗者可為神武矣兵法豈必在龍蛇鳥虎間哉陳州為張安道論時事書伏以中外臣庶各有職事越職而言國有常憲臣守土陳州非有言責而輙言之計其狂愚兹實有罪然臣伏念頃以老疾不任吏事陛下未忍廢棄親擇便地以遂安養將辭之日面承徳音以為大臣之義皆當為國謀慮不宜以中外為嫌有所不盡古人有言雖乃身在外乃心㒺不在王室伏惟聖徳廣大無所不容而臣自到任以來於今一嵗心目昏眩有加無瘳故嘗乞丐餘生求還閭舍區區之誠乆而未獲陛下視臣志氣之衰至此豈復有意别白是非而與世俗爭議也哉是以得失之間乆而無所與今者竊有所懐上為陛下參之官吏下為陛下騐之百姓而安危之機實在於此自惟受恩累聖邦之休戚身實同之志力雖衰於義不可嘿已然臣之所欲言者非敢逺引前古逆探未然以惑陛下之聰明也凡皆陛下之所嘗試而臣愚之所與聞者耳臣伏見陛下即位之始計慮深逺凡有所建動合天心始議山陵深恤費用之廣推明先帝薄葬之命以詔有司四方聞之無不感泣其後一年之間誕布號令勸率宗族惇孝悌之行勉勵州郡先農桑之政復轉對以廣言路議徭役以寛民力盛徳之事不可具記是時天下雖大變之後而無不翹然想聞徳音以忘其憂兩宫歡欣九族親睦羣臣萬民蒙福而安紛紜之議不至於朝廷謗讟之聲不聞於閭里陛下優㳺無為而天下已治矣為國如此豈不樂哉陛下自今視之當日之政其為可悔恨者凡有幾以臣視之非獨陛下無所悔恨雖天下之人亦未有以為失當者也何者政令簡易而人情之所安耳易曰易則易知簡則易從易知則有親易從則有功有親則可乆有功則可大向使陛下推行此道終始不變則臣以為可乆可大之功可得而致矣其後求治太切用意過當姦臣縁隙得進邪説始議開邊以中上㫖於是延安有横山之謀保安有招誘之計陛下饒之以金帛假之以干戈小人貪功慮害不逺輕發深入結怨西戎攘奪尺寸無用之土空竭内府累世之積大者疲弊秦雍小者身死寇讐西鄙騷然不寧而陛下始一悔矣然而陛下天姿英果有漢武宏達之量雖復兵吏失律而立功之意未嘗少衰是以左右大臣測知此心復進財利之説陛下樂聞其利而未暇深究其害於是舉而從之置條例司而講求天下之遺利已酉之秋新政始出自是以來凡所變革不可悉數其最大者一出而為常平青苗再出而為揀兵併營三出而為出錢雇役四出而為保甲教閲四者並行於世官吏疑惑兵民憤怨諫諍者章交於朝誹謗者聲播於市陛下不勝其煩為之當宁太息日昃而不食矣然猶幸其成功力排衆人之議而固守之天下方共厭苦而不知其所止也而㨂兵併營之䇿其害先見武夫凶悍為怨最深為患最急陛下知其不可於是多支月糧復収退卒以順適其意而陛下既再悔矣然軍中之口猶復洶洶不靖陛下雖推恩撫之而終不以為惠反謂陛下畏之耳不幸邊臣失算再生戎心帷幄之臣謀之不臧不務安之而務撓之臨遣執政付以疆事多出金幣豫書誥勅以成其深入之計當此之時天下之心知其必敗矣而陛下與一二臣者方以為萬舉而萬全既而出兵無人之境築城不守之地困敝腹心以求無益之功使秦晉之民父子流離肝腦塗地戎人徼勌受屈已築之城隨即傾覆救援之兵相繼潰叛四方震動君臣宵旰而後下罪已之詔投竄元宰以謝二鄙而陛下既三悔矣夫此三者方其未悔也陛下亦以為是邪非邪陛下犯逆衆心力行而不顧其必以為是不以為非也然而其終卒至於此然則方今陛下之所是而未悔者無乃亦類此歟臣聞衆而不可欺者民也勇而不可犯者兵也險而不可侮者鄰國也今陛下既已欺民犯兵而侮鄰國矣夫犯兵侮鄰變速而禍小至於欺民則變遲而禍大變速而禍小者瓦解之憂也變遲而禍大者土朋之患也今瓦解之憂陛下既知悔矣土崩之患陛下未以為意此臣之所以寒心也易曰不逺復無祗悔元吉事之未敗也陛下不悟其非必俟其敗而後悔如向三者則陛下之復已逺而悔亦大矣且臣觀之方今陛下之所是而未悔者亦有三而已青苗助役保甲三者之弊臣不復言矣何者言事者論其不可非一人也百姓毁壊支體燻灼耳目嫁母分居賤賣田宅以自脱免非一家也陛下其亦知之矣徘徊而不改使民無所告訴加之以水旱繼之以饑饉積悍之民奮為羣盗侵淫蔓延滅而復起英雄乗間而作振臂一呼而千人之衆可得而聚也如此而勝廣之形成此所謂土崩之勢也臣恐陛下至此雖欲復悔而無所及矣故臣願陛下取即位之政與今日之事而試觀之天下擾擾不安孰與今日之甚羣臣交口爭辨孰與今日之衆陛下聽覽疲倦孰與今日之多悔恨自責孰與今日之切陛下誠以此較之則不待臣言之終而得失可以自决矣且夫即位之政陛下之本心也今日之事臣下之過計也陛下棄即位之本心而徇臣下之過計臣竊以為過也雖然臣竊聽之道路方今陛下則亦悔之矣悔之而不變非陛下之意也迫於建議之臣耳夫人臣進謀於其君茍事之不遂而變以從衆則人主有以測其深淺人主有以測其深淺則其用舍之命在於人主此人臣之所以不便也臣竊痛陛下為社稷之計欲改過以安天下而怙權固位之臣持之而不釋陛下聰明睿知廢置自我而獨為此鬱鬱也漢宣帝與趙充國擊匈奴魏相非之以為當與平昌侯樂昌侯平恩侯及有識者詳議乃可此三人者非賢於趙充國也然而與國同憂樂無僥倖功名之心與希望爵賞之意則過於充國逺甚充國猶不可聽而况不如充國者哉陛下將安民保國而與喜功伐好權利者謀之臣不知其可也臣不勝區區忘身憂國之誠是以勢踈而言切惟陛下察之茅坤曰通篇指神宗悔心處感憤開悟得易之納約自牖之意自齊州回論時事書畫一狀附臣自少讀書好言治亂方陛下求治之初上書言事陛下不廢狂狷召對便殿親聞徳音九品賤官自此始得登對論事當此之時陛下好問之聲震動海内愚賤之人篤信寡慮以為天下之事可得徐陳遍舉指顧而定矣既而誤䝉恩澤受職條例抗論得失與有司不合得請外補於今七年而天下之治安終未可見臣竊疑之伏惟陛下天生聖徳聰明睿智不學而具其於謀慮措置曾何足云自頃嵗以來每有更張民率不服葢青苗行而農無餘財保甲行而農無餘力免役行而公私並困市易行而商賈皆病上則官吏勞苦患其難行下則衆庶愁歎願其速改凡此四者豈陛下之聖明有所不知耶臣以為非也陛下之聖明無所不知何以言之二年以來陛下屢發英斷廢置大吏數其罪愆明示臣庶凡天下之所共疾惡者陛下無一不知由此觀之凡天下之所共怨苦者陛下何所不察今者皇天悔禍啓道聖意易置輔相中外踊躍思覩寛政而歴日彌月寂寞無聞衆心皇皇如乆飢而不得食臣雖愚陋竊獨為陛下恨也陛下自即位以來求治之心常若不及意將以堯舜之隆平易漢唐之淺陋不幸左右不明陵遲以至於此天下之人孰不知之今也既知其不可用而去之又循其舊而不改將遂代之任咎此臣之所以為陛下恨也且今天下之安危智者不再計矣水旱連年死者將半遺民飢困盗賊滿野疆埸未寧軍旅在外府庫空竭邊餉寡少事之可憂者何可勝數術之不效斷可見矣然陛下獨遲遲而不决意者已為之而已廢之恐天下有以窺其深淺耶臣聞人主之徳如天天之於物也熾然而旱赤地千里草木皆死可謂虐矣然至雷雨時作膏澤洋溢百穀奮起民復粒食鼓舞盛徳而忘旱之虐何者度量廣大改過無疑也如使宻雲不雨既雨而中止遲疑猶豫乆而不忍則天之生物盡矣傳曰君子之過也如日月之食焉過也人皆見之更也人皆仰之今陛下誠先治其心使虛一而靜湛乎彼我得失莫能嬰也去惡如棄塵垢遷善如救飢渴與民一新罷此四事青苗之既散者要之以三嵗而不収息保甲之既團者存其舊籍而不任事復差役以罷免役之條通商賈以廢市易之令行之期年而觀之茍民不安居水旱復作盗賊復起財用復竭誠有一事以憂陛下臣請伏罔上之誅以謝左右陛下誠不信臣數年之後親受其弊矣古人有言曰一慙之不忍而終身慙乎惟陛下為社稷籌之臣謹列四事之害畫一以獻不勝愚忠憤懣之誠干犯天威伏俟鈇鉞臣轍誠惶誠恐昧死上書附畫一狀謹按青苗免役保甲市易四事得失最為易見上自中外臣寮下至田父野老無有一不知者但以朝廷所行言其是則有功言其非則有罪是以畏避鉗黙不敢正言臣今謹采衆議人所共知灼然可見者畫一開坐如後一議者皆謂富民假貸貧民坐収倍稱之息是以富者日富貧者日貧今官散青苗取息二分収富人并兼之權而濟貧民緩急之求貸不異於民間而息不至於倍稱公私皆利莫便於此然公家之貸其實與私貸不同私家雖取利或多然人情相通别無條法今嵗不足而取償於來嵗米粟不給而繼之以芻藳雞豚狗彘皆可以還債也無嵗月之期無給納之費出入閭里不廢農作欲取即取願還即還非如公家動有違礙故雖或取息過倍而民恬不知今官貸青苗責以見錢催隨二税鄰里相保結狀請錢一家不至九家坐待奔赴城市糜費百端一有逋竄均及同保貧富相迨要以皆斃而後已朝廷雖多設法度以救其失而其實無益也一議者又謂平時差役破壊民家一夫為役舉家失業故使逐户出錢官為雇人謂之免役出錢雖多而民免於破家之患以此為説行之不疑然不知三代之民以力事上不專以錢近世因其有無各聽其便有力而無財者使効其力有財而無力者皆得雇人人各致其所有是以不勞而具今也棄其自有之力而一取於錢民雖有餘力不得効也於是賣田宅伐桑柘鬻牛馬以供免役而天下始大病矣且夫錢者官之所為米粟布帛者民之所生也古者上出錢以權天下之貨下出米粟布帛以補上之闕上下交易故無不利今青苗免役皆責民出錢是以百物皆賤而惟錢最貴欲民之無貧不可得也至於京師百司郡縣刑法之吏無禄而役為日乆矣周制庶人在官雖曰有禄而事簡吏少勢或易供非如今時員數猥多不可供億况三代兵出於民而今世之兵坐而仰給若又兼舉大費為力實難然議者以為給之以禄然後可責之以廉葢朝廷選吏之精必不如擇官之慎禄吏之厚必不如禄官之多今慎擇多禄之官猶不免於貪而况於吏人乎且昔之為法也計贓得罪無禄者減等今用倉法則吏之得罪反重於官顛倒失宜尤為未可若朝廷誠患吏貪但使官得其人則吏之受賕自有分限若猶未也則雖重禄深法不能禁矣一議者又謂三代之盛兵出於農故團結伍保以寓軍令朝廷喜其近古亦謂可行然而三代之民受田於官官之所以養之者厚故出身為兵而無怨今民買田以耕而後得食官之所以養之者薄而欲責其為兵其勢不可得矣葢自唐以來民以租庸調與官而免於為兵今租庸調變而為兩稅則兩稅之中兵費已具且又有甚者民之納錢免役也以為終身不復為役矣今也既已免役而於捕盗則用為耆長壯丁於催稅則用為户長里正於巡防則用為巡兵弓手一人而三役具焉民將何以堪之且其為巡兵弓手也一保甲之中丁壯既出老弱守舍盗賊乗間如入無人之境而其上畨之期又不過旬日坐作進退未能知也代者既至相率而反徃來道路勞敝何益至使盗賊縱横官吏䝉責嘯聚羣黨攻剽州縣未必不由此也古之循吏使民賣劍買牛今也使之棄其農具而置兵器小民無知縁以為惡良民之畏事者一入而終身不得脱姦民之好權者一補而終身不得免其為患害有不可勝言者矣一議者常患百貨輕重制在富民少則貴賣以取贏多則賤賣以取利利有所壅商賈難通於是置市易之官以平貴賤有司誠守此議不更别有所營則雖繁碎難行然亦未深害民今自置市易無物不買無利不籠命官遣人販賣南北放債取利公行不疑杜絶利源不與民共觀其指趣非復制其有無權其輕重而已也徒使小民失業商旅不行空取專利之名實失商稅之利國體卑辱海内離心巍巍盛朝何苦於此况復小民好利類無逺見爭取官債以救目前欺謾父兄妄引抵當期限既迫逃竄無所父子離散行路咨嗟奈何為此陷穽誘而納之也至於姦民巨賈窺伺間隙取利則多或輸滯積不售之貨以易見錢或指殘破無用之屋以賒實貨巧智百出難以具言有司䝉蔽指以為利泉幣一散汗漫難収官之所藏徒文具而已竊聞朝廷近日將議窮究然而既弊之法施行未已買賣百物猶且如故譬如含茹毒藥喉舌破敗胸腹脹滿知其非矣然且閉口不吐安坐切脈廣求方書其於速愈之術踈矣右臣所陳畫一事件皆是耳目所接衆庶共知朝廷清明豈有不察若誠有意改易非復難行但朝出一紙詔書四弊夕去非如前代積弊或在列國若在四夷欲議改更恐其動揺海内故且維持含養茍且便安今事在朝廷出命則已衆所係望勢難乆留而私自顧戀遲遲不决以失天下之心臣竊不取也愚憃之人志在憂國言詞激切干犯典刑區區寸誠甘俟誅戮謹具狀奏聞伏候勅㫖楊慎曰新法之行東坡力爭不勝擾擾垂二十年天下幾危温公革弊一新五年而吕大防劉摰調停之説起潁濱爭之又四年李清臣用而紹述之說起新法復行潁濱爭之不勝天下事去矣二公議論關係之大如此為兄軾下獄上書臣聞困急而呼天疾痛而呼父母者人之至情也臣雖草芥之㣲而有危迫之懇惟天地父母哀而憐之臣早失怙恃惟兄軾一人相須為命今者竊聞其得罪逮捕赴獄舉家驚號憂在不測臣竊思念軾居家在官無大過惡惟是賦性愚直好談古今得失前後上章論事其言不一陛下聖徳廣大不加譴責軾狂狷寡慮竊恃天地包含之恩不自抑畏頃年通判杭州及知宻州日每遇物託興作為歌詩語或輕發向者曾經臣寮繳進陛下置而不問軾感荷恩貸自此深自悔咎不敢復有所為但其舊詩已自傳播臣誠哀軾愚於自信不知文字輕易迹涉不遜雖改過自新而已陷於刑辟不可救止軾之將就逮也使謂臣曰軾早衰多病必死於牢獄死固分也然所恨者少抱有為之志而遇不世出之主雖齟齬於當年終欲効尺寸於晚節今遇此禍雖欲改過自新洗心以事明主其道無由况立朝最孤左右親近必無為言者惟兄弟之親試求哀於陛下而已臣竊哀其志不勝手足之情故為冒死一言昔漢淳于公得罪其女子緹縈請没為官婢以贖其父漢文因之遂罷肉刑今臣螻蟻之誠雖萬萬不及緹縈而陛下聰明仁聖過於漢文逺甚臣欲乞納在身官以贖兄軾非敢望末減其罪但得免下獄死為幸兄軾所犯若顯有文字必不敢拒抗不承以重得罪若䝉陛下哀憐赦其萬死使得出於牢獄則死而復生宜何以報臣願與兄軾洗心改過粉骨報効惟陛下所使死而後已臣不勝孤危迫切無所告訴歸誠陛下惟寛其狂妄特許所乞臣無任祈天請命激切隕越之至按何薳春渚紀聞述其父去非所聞於軾自言謂初逮繫御史獄獄具奏上是夕昏鼓既畢某方就寢忽有二人排闥而入投篋於地即枕卧之至四鼓睡中覺有撼體而連語云賀喜者某徐轉仄問之即曰安心熟寢乃挈篋而去葢初奏上舒亶之徒力詆上前必欲置之死地而裕陵初無深罪之意宻遣小黄門至獄中視某起居狀適某鼻息如雷即馳以聞裕陵顧謂左右曰朕知蘇軾胸中無事者於是即有黄州之命夫王安石怒軾直言極諫捃摭文字以殺其身以威天下使天下不敢復言神宗諒軾無他而安石之不直勿聽可矣罪安石可矣乃若有不得已者先如其意而予之逮軾論死徐薄其罪而責遣之此何為者也豈非倒持太阿以柄與人已轉於其中排難觧紛乎自古憸壬眩惑聰明如毒蠱焉能令人顛倒往往如此是以明君逺之若虺蝎良臣擊之若鷹鸇邵伯温曰朱夀昌者少不知母所在棄官走天下求之刺血書佛經志甚苦熙寧初見於同州迎以歸朝士多以詩美之蘇内翰子瞻詩云感君離合我酸心此事今無古或聞王荆公薦李定為臺官定嘗不持母服臺諫給舍俱論其不孝不可用内翰因夀昌作詩貶定故曰此事今無古或聞也後定為御史中丞言内翰多作詩貶上自知湖州赴詔獄代三省祭司馬丞相文嗚呼元豐末命震驚四方號令所從帷幄是望公來自西會哭於庭縉紳咨嗟復見老成太姙在位成王在左曰予惸惸誰恤予禍白髪蒼顔三世之臣不留相予孰左右民公出於道民聚而呼皆曰吾父歸歟歸歟公畏莫當遄返洛師授之宛丘實將用之公之來思岌然特立身如槁木心如金石時當宅憂恭黙不言一二卿士代天斡旋事棼如絲衆比如櫛治亂之幾間不容髮公身當之所恃惟誠吾民茍安吾君則寧以順得天以信得人鉏去太甚復其本原白叟黄童織婦耕夫庶幾休焉日月以須公乗安輿入見廷和裕民之言之死靡他將享合宫百辟咸事公病於家卧不時起明日當齋公訃暮聞天以雨泣都人酸辛禮成不賀人識君意龍袞蟬冠遂以徃襚公之初來民執弓矛逮公永歸既耕且耰公雖云亡其志則存國有成法朝有正人持而守之有一毋隕匪以報公維以報君天子聖明神母萬年民不告勤公志則然死者復生信我此言嗚呼哀哉光輔哲宗初政盡去熙寧痼弊與民休息出溝壑而登袵席宋幾中興光死而調停之說行始而調停者繼而盡去君子專用小人矣轍為三省合祭文約謹守光成法謂死者復生信我此言葢所以要三省歟豈知小人將國與君之不恤而何有於光方將戮及光之死魄而錮光之子孫何有於光之成法也御選唐宋文醇巻五十三
