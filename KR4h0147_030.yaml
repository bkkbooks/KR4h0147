body:
  text: 廬陵歐陽修文九祭文碑銘祭尹師魯文祭蘇子美文祭石曼卿文資政殿學士户部侍郎文正范公神道碑銘太尉文正王公神道碑銘欽定四庫全書御選唐宋文醇卷三十廬陵歐陽修文九祭尹師魯文嗟乎師魯辨足以窮萬物而不能當一獄吏志可以狹四海而無所措其一身窮山之崖野水之濵猿猱之窟麋鹿之羣猶不容於其間兮遂即萬鬼而為鄰嗟乎師魯世之惡子之多未必若愛子者之衆而其窮而至此兮得非命在乎天而不在乎人方其奔顛斥逐困死艱屯舉世皆寃而語言未嘗以自及以窮至死而妻子不見其悲欣用舍進退屈伸語默夫何能然乃學之力至其握手為訣隱几待終顔色不變笑言從容死生之間既已能通於性命憂患之至宜其不纍於心胸自子云逝善人宜哀子能自達豫又何悲惟其師友之益平生之舊情之難忘言不可究嗟乎師魯自古有死皆歸無物惟聖與賢雖埋不沒尤於文章焯若星日子之所為後世師法雖嗣子尚幼未足以付豫而世人藏之庶可無於墜失子於衆人最愛豫文寓辭千里侑此一樽冀以慰子聞乎不聞尚享尹師魯名洙少以儒學知名舉進士宋世古文洙與穆修實始振起其衰自元昊不庭洙未嘗不在兵間練習邊事深曉兵法以右司諫知渭州兼領涇原路經略公事會鄭戩為陜西四路都總管遣劉滬董士廉城水洛以通秦渭援兵洙以為城寨多則兵勢分是以前此屢困於賊今何可又益城奏罷之時戩已解四路而滬等督役如故洙召之不至代之不受乃使狄青械滬士廉下吏戩論奏不已卒城水洛士廉詣闕上書訟洙詔遣御史劉湜就鞫不得他罪湜文致之貶洙監均州酒稅感疾而卒修祭文所謂辨足以窮萬物而不能當一獄吏者也嘗謂明刑所以弼教而察獄所以平寃漢承秦弊古義蕩然雖相如蕭何將如周勃亦輒付繫延至末代獄吏成風惟希意指之所向不揆其情辭而麗以法轉以法就其情辭意見既立雖孔孟不得為完人而蘇張無所措其舌矜名節者恚極而不得辨逹生死者休焉而不與辨暗且弱者呐呐然辨而不能辨强且明者喋喋然辨而不聽其辨所以古人畫地為牢誓不入刻木為吏義不對也以此承君上之意指則一獄成而萬事必有受其害者矣以此承權臣之意指則萬事隳而宗社亦且受其害矣賢如宋仁宗尚使尹洙被文致於獄吏以稱於後世也可不懼哉祭蘇子美文哀哀子美命止斯邪小人之幸君子之嗟子之心胸蟠屈龍蛇風雲變化雨雹交加忽然揮斧霹靂轟車人有遭之心驚膽落震仆如麻須臾霽止而四顧百里山川草木開發萌芽子於文章雄豪放肆有如此者吁可怪邪嗟乎世人知此而已貪悅其外不窺其內欲知子心窮達之際金石雖堅尚可破壞子於窮達始終仁義惟人不知乃窮至此藴而不見遂以沒地獨留文章照耀後世嗟世之愚掩抑毁傷譬如磨鑑不滅愈光一世之短萬世之長其間得失不待較量哀哀子美來舉豫觴尚享仁宗逐蘇舜欽輩不使朝士以夸誕標榜相尚所以維風端習未為失也特宜正王直柔侮慢聖賢之罪而蘇舜欽輩醉飽之過則教而不怒斯才士不至沉淪而憸壬一網打盡之䇿亦自不墮其術中矣祭石曼卿文嗚呼曼卿生而為英死而為靈其同乎萬物生死而復歸於無物者暫聚之形不與萬物共盡而卓然其不朽者後世之名此自古聖賢莫不皆然而著在簡冊者昭如日星嗚呼曼卿吾不見子久矣猶能髣佛子之平生其軒昂磊落突兀崢嶸而埋藏於地下者意其不化為朽壤而為金玉之精不然生長松之千尺産靈芝而九莖奈何荒烟野蔓荆棘縱橫風凄露下走燐飛螢但見牧童樵叟歌吟而上下與夫驚禽駭獸悲鳴躑躅而咿嚶今固如此更千秋而萬嵗兮安知其不穴藏狐狢與鼯鼪此自古聖賢亦皆然兮獨不見夫纍纍乎曠野與荒城嗚呼曼卿盛衰之理吾固知其如此而感念疇昔悲凉悽愴不覺臨風而隕涕者有愧乎太上之忘情尚享陳善曰弔石曼卿文似韓祭田橫墓文其步驟馳騁亦無不似非但效其句語而已資政殿學士戶部侍郎文正范公神道碑銘皇祐四年五月甲子資政殿學士尚書戶部侍郎汝南文正公薨於徐州以其年十有二月壬申葬於河南尹樊里之萬安山下公諱仲淹字希文五代之際世家蘇州事吳越太宗皇帝時吳越獻其地公之皇考從錢俶朝京師後為武寧軍掌書記以卒公生二歲而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之南都入學舍掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦居五年大通六經之㫖為文章論說必本於仁義祥符八年舉進士禮部選第一遂中乙科為廣德軍司理參軍始歸迎其母以養及公既貴天子贈公曾祖蘇州糧料判官諱夢齡為太保祖祕書監諱贊時為太傅考諱墉為太師妣謝氏為吳國夫人公少有大節於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害為趨舍其所有為必盡其方曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈茍哉天聖中晏丞相薦公文學以大理寺丞為祕閣校理以言事忤章獻太后㫖通判河中府久之上記其忠召拜右司諫當太后臨朝聽政時以至日大會前殿上將率百官為壽有司已具公上疏言天子無北面且開後世弱人主以强母后之漸其事遂已又上書請還政天子不報及太后崩言事者希㫖多求太后時事欲深治之公獨以為太后受託先帝保佑聖躬始終十年未見過失宜掩其小故以全大德初太后有遺命立楊太妃代為太后公諫曰太后母號也自古無代立者由是罷其册命是歲大旱蝗奉使安撫東南使還會郭皇后廢率諌官御史伏閣爭不能得貶知睦州又徙蘇州歲餘即拜禮部員外郎天章閣待制召還益論時政闕失而大臣權幸多忌惡之居數月以公知開封府開封素號難治公治有聲事日益簡暇則益取古今治亂安危為上開說又為百官圖以獻曰任人各以其材而百職修堯舜之治不過是也因指其遷進遲速次序曰如此而可以為公可以為私亦不可以不察由是吕丞相怒至交論上前公求對辨語切坐落職知饒州明年吕公亦罷公徙潤州又徙越州而趙元昊反河西上復召相吕公乃以公為陜西經略安撫副使遷龍圖閣直學士是時新失大將延州危公請自守鄜延捍賊乃知延州元昊遣人遺書以求和公以為無事請和難信且書有僭號不可以聞乃自為書告以順逆成敗之說甚辨坐擅復書奪一官知耀州未逾月徙知慶州既而四路置帥以公為環慶路經略安撫招討使兵馬都部署纍遷諫議大夫樞密直學士公為將務持重不急近功小利於延州築青澗城墾營田復承平永平廢寨熟羌歸業者數萬户於慶州城大順以據要害奪賊地而耕之又城細腰胡蘆於是敏珠爾密藏等大族皆去賊為中國用自邊制久隳至兵與將常不相識公始分延州兵為六將訓練齊整諸路皆用以為法公之所在賊不敢犯人或疑公見敵應變為如何至其城大順也一旦引兵出諸將不知所向軍至柔逺始號令告其地處使往築城至於版築之用大小畢具而軍中初不知賊以騎二萬來爭公戒諸將戰而賊走追勿過河已而賊果走追者不渡而河外果有伏賊失計乃引去於是諸將皆服公為不可及公待將吏必使畏法而愛已所得賜賚皆以上意分賜諸將使自為謝諸蕃質子縱其出入無一人逃者蕃酋來見召之卧內屏人撤衛與語不疑公居三歲士勇邊實恩信大洽乃决䇿謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣初西人籍其鄉兵者十數萬既而黥以為軍惟公所部但刺其手公去兵罷獨得復為民其於兩路既得熟羌為用使以守邊因徙屯兵就食內地而紓西人饋挽之勞其所設施去而人德之與守其法不敢變者至今尤多自公坐吕公貶羣士大夫各持二公曲直吕公患之凡直公者皆指為黨或坐竄逐及吕公復相公亦再起被用於是二公歡然相約戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能止上既賢公可大用故卒置羣議而用之慶厯三年春召為樞密副使五讓不許乃就道既至數月以為參知政事每進見必以太平責之公歎曰上之用我者至矣然事有先後而革弊於久安非朝夕可也既而上再賜手詔趣使條天下事又開天章閣召見賜坐授以紙筆使疏於前公惶恐避席始退而條列時所宜先者十數事上之其詔天下興學取士先德行不專文辭革磨勘例遷以别能否減任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥幸之人皆不便因相與騰口而嫉公者亦幸外有言喜為之佐佑會邊奏有警公即請行乃以公為河東陜西宣撫使至則上書願復守邊即拜資政殿學士知邠州兼陜西四路安撫使其知政事才一歲而罷有司悉奏罷公前所施行而復其故言者遂以危事中之賴上察其忠不聽是時夏人已稱臣公因以疾請鄧州守鄧三歲求知杭州又徙青州公益病又求知潁州肩舁至徐遂不起享年六十有四方公之病上賜藥存問既薨輟朝一日以其遺表無所請使就問其家所欲贈以兵部尚書所以哀恤之甚厚公為人外和內剛樂善泛愛喪其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其為政所至民多立祠畫像其行已臨事自山林處士里閭田野之人外至夷狄莫不知其名字而樂道其事者甚衆及其世次官爵志於墓譜於家藏於有司者皆不論著著其繫天下國家之大者亦公之志也歟銘曰范於吳越世實陪臣俶納山川及其士民范始來北中間幾息公奮自躬與時偕逢事有罪功言有違從豈公必能天子用公其艱其勞一其初終夏童跳邊乘吏怠安帝命公往問彼驕頑有不聽順鋤其穴根公居三年怯勇隳完兒憐獸擾卒俾來臣夏人在廷其事方議帝趣公來以就豫治公拜稽首兹惟艱哉初非其難在其終之羣言營營卒壞於成匪惡其成惟公是傾不傾不危天子之明存有顯榮殁有贈諡藏其子孫寵及後世唯百有位可勸無怠司馬光曰景祐中吕許公執政范公知開封屢攻吕短坐落職知饒州康定元年復舊職知永興會許公復相言於神宗曰仲淹賢者朝廷將用之豈可但除舊職即除龍圖閣直學士陜西經略安撫副使上以許公為長者蘇轍曰范文正自饒州還朝出領西事恐申公不為之地無以成功乃為書自咎解仇而去故歐公作文正碑有二公晚年歡然相得之語後生不知皆咎歐陽公豫見張公安道言之乃信邵伯溫曰當時文正子堯夫不以為然從歐公辨不可得則自削去歡然戮力等語公不樂謂蘇明允曰范公碑為其子弟擅於石本改動文字令人恨之故羅氏本於知饒州下無明年吕公亦罷六字趙元昊反河西下無上復召相吕公六字又無自坐吕公貶已下至置羣議而用之一段以此觀之諸本乃當時定本羅本堯夫改本也朱子曰吕當用事時舉措不合衆心者多又惡忠賢之異已必力排之范歐二公以諷議諫諍為職則論之豈為過哉逮其晚節知公議不可終拂衆賢將起而復用是以寧損故怨以為收之桑榆之計蓋其慮患之意雖未必出於至公而補過之善天下實被其賜至范公之心其正大光明固無宿怨而惓惓之議實在國家故承其善意起而樂為之用其自訟之書所謂相公有汾陽之心之德仲淹無臨淮之才之力者可謂傾倒無餘矣此最為范公之盛德歐公識其意而特書之二者各記其實而美惡初不相掩又可見歐公之心亦非淺之乎為丈夫矣太尉文正王公神道碑銘至和二年七月乙未樞密直學士右諫議大夫王素奏事殿中已而泣且言曰臣之先臣旦相真宗皇帝十有八年今臣素又得待罪侍從之臣惟是先臣之訓其遺業餘烈臣實無似不能顯大而墓碑至今無辭以刻惟陛下哀憐不忘先帝之臣以假寵於王氏而朂其子孫天子曰嗚呼惟汝父旦事我文考真宗叶德一心克終厥位有始有卒其可謂全德元老矣汝素以是刻於碑素拜稽首泣而出明日有詔史館修撰歐陽修曰王旦墓碑未立汝可以銘臣修謹按故推誠保順同德守正翊戴功臣開府儀同三司守太尉充玉清昭應宫使上柱國太原郡開國公贈太師尚書令兼中書令追封魏國公諡曰文正王公諱旦字子明大名莘人也皇曾祖諱言滑州黎陽令追封許國公皇祖諱徹左拾遺追封魯國公皇考諱祐尚書兵部侍郎追封晉國公皆纍贈太師尚書令兼中書令曾祖妣姚氏魯國夫人祖妣田氏秦國夫人妣任氏徐國夫人邊氏秦國夫人公之皇考以文章自顯漢周之際逮事太祖太宗為名臣嘗諭杜重威使無反漢拒盧多遜害趙普之謀以百口明符彥卿無罪故世多稱王氏有隂德公之皇考亦自植三槐於庭曰吾之後世必有為三公者此其所以志也公少好學有文太平興國五年進士及第為大理評事知平江縣監潭州銀場再遷著作佐郎與編文苑英華遷殿中丞通判鄭濠二州王禹稱薦其材任轉運使驛召至京師辭不受獻其所為文章得試直史館遷右正言知制誥知渟化三年禮部貢舉遷虞部員外郎同判吏部流內銓知考課院右諫議大夫趙昌言參知政事公以壻避嫌求解職太宗嘉之改禮部郎中集賢殿修撰昌言罷復知制誥仍兼修撰判院事召賜金紫久之遷兵部郎中居職真宗即位拜中書舍人數日召為翰林學士知審官院通進銀臺封駁事公為人嚴重能任大事避逺權勢不可干以私由是真宗益知其賢錢若水名能知人常稱公曰真宰相器也若水為樞密副使罷召對苑中問誰可大用者若水言公可真宗曰吾固已知之矣咸平三年又知禮部貢舉居數日拜給事中知樞密院事明年以工部侍郎參知政事再遷刑部侍郎景德元年契丹犯邊真宗幸澶州雍王元份留守東京得暴疾命公馳自行在代元份留守二年遷尚書左丞三年拜工部尚書同中書門下平章事集賢殿大學士監修國史是時契丹初請盟趙德明亦納誓約願守河西故地二邊兵罷不用真宗遂欲以無事治天下公以為宋興三世祖宗之法具在故其為相務行故事慎所改作進退能否賞罰必當真宗久而益信之所言無不聽雖他宰相大臣有所請必曰王某以為何如事無大小非公所言不决公在相位十餘年外無夷狄之虞兵革不用海內富實羣工百司各得其職故天下至今稱為賢宰相公於用人不以名譽必求其實茍賢且材矣必久其官衆以為宜某職然後遷其所薦引人未嘗知寇凖為樞密使當罷使人私公求為使相公大驚曰將相之任豈可求邪且吾不受私請凖深恨之已而制出除凖武勝軍節度使同中書門下平章事凖入見涕泣曰非陛下知臣何以至此真宗具道公所以薦凖者凖始愧歎以為不可及故參知政事李穆子行簡有賢行以將作監丞居於家真宗召見慰勞之遷太子中允初遣使者召不知其所止真宗命至中書問王某然後人知行簡公所薦也公自知制誥至為相薦士尤多其後公薨史官修真宗實録得內出奏章乃知朝廷之士多公所薦者公與人寡言笑其語雖簡而能以理屈人默然終日莫能窺其際及奏事上前羣臣異同公徐一言以定今上為皇太子太子諭德見公稱太子學書有法公曰諭德之職止於是邪趙德明言民饑求糧百萬斛大臣皆曰德明新納誓而敢違請以詔書責之真宗以問公公請敕有司具粟百萬於京師詔德明來取真宗大喜德明得詔書慚且拜曰朝廷有人大中祥符中天下大蝗真宗使人於野得死蝗以示大臣明日他宰相有袖死蝗以進者曰蝗實死矣請示於朝率百官賀公獨以為不可後數日方奏事飛蝗蔽天真宗顧公曰使百官方賀而蝗如此豈不為天下笑邪宦官劉承規以忠謹得幸病且死求為節度使真宗以語公曰承規待此以瞑目公執以為不可曰他日將有求為樞密使者奈何至今內臣官不過留後公任事久人有謗公於上者公輒引咎未嘗自辨至人有過失雖人主盛怒可辨者辨之必得而後已榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人公獨請見曰始失火時陛下以罪已詔天下而臣等皆上章待罪今反歸咎於人何以示信且火雖有迹寧知非天譴邪由是當坐者皆免日者上書言宫禁事坐誅籍其家得朝士所與往還占問吉凶之說真宗怒欲付御史問狀公曰此人之常情且語不及朝廷不足罪真宗怒不解公因自取常所占問之書進曰臣少賤時不免為此必以為罪願并臣付獄真宗曰此事已發何可免公曰臣為宰相執國法豈可自為之幸於不發而以罪人真宗意解公至中書悉焚所得書既而真宗悔復馳取之公曰臣已焚之矣由是獲免者衆公纍官至太保以病求罷入見滋福殿真宗曰朕方以大事托卿而卿病如此因命皇太子拜公公言皇太子盛德必任陛下事因薦可為大臣者十餘人其後不至宰相者李及凌䇿二人而已然亦皆為名臣公屢以疾請真宗不得已拜公太尉兼侍中五日一朝視事遇軍國大事不以時入參决公益惶恐因卧不起以疾懇辭冊拜太尉玉清昭應宫使自公病使者存問日常三四真宗手自和藥賜之疾亟遽幸其第賜以白金五千兩辭不受以天禧元年九月癸酉薨於家享年六十有一真宗臨哭輟視朝三日發哀於苑中其子弟門人故吏皆被恩澤即以其年十一月庚申葬公於開封府開封縣新里鄉大邊村公娶趙氏封榮國夫人後公五年卒子男三人長曰司封郎中雍次曰贊善大夫冲次曰素女四人長適太子太傅韓億次適兵部員外郎直集賢院蘇耆次適右正言范令孫次適龍圖閣直學士兵部郎中吕公弼諸孫十四人公事寡嫂謹與其弟旭友悌尤篤任以家事一無所問而務以儉約率勵子弟使在富貴不知為驕侈兄子睦欲舉進士公曰吾常以盛大為懼其可與寒士爭進至其薨也子素猶未官遺表不求恩澤有文集二十卷乾興元年詔配享真宗廟庭臣修曰景德祥符之際盛矣觀公之所以相而先帝之所以用公者可謂至哉是以君明臣賢德顯名尊生而俱享其榮歿而長配於廟可謂有始有卒如明詔所褒昔者蒸民江漢推大臣下之事所以見任賢使能之功雖曰山甫穆公之詩實歌宣王之德也臣謹考國史實録至於搢紳故老之傳得公終始之節而録其可紀者輒為銘詩以彰先帝之明以稱聖恩褒顯王氏流澤子孫與宋無極之意銘曰烈烈魏公相我真宗真廟翼翼魏公配食公相真宗不言以躬時有大事事有大疑匪卜匪筮公為蓍龜公在相位終日如默問其夷狄包褁兵革問其卿士百工以職問其庶民耕織衣食相有賞罰功當罪明相有黜升惟否惟能執其權衡萬物之平孰不事君胡能必信孰不為相其誰有終公薨於位太尉之崇天子孝思來薦清廟侑我聖考惟時元老天子念公報公之隆春秋從享萬祀無窮作為歌詩以諗廟工王聞修曰本傳只載作相時事餘官原無事此碑於相事又止書大者魏公細事原不勝書也趙昌言傳云昌言喜推奬後進掌漕湖外時李沆通判潭州謂有台輔之量表聞於朝王旦宰嶽州平江昌言識其逺大以女妻之後俱為名相魏公本傳亦作平江碑作臨江疑誤也代雍王權留守請宣寇凖奏云十日之間未有捷報當何如上默然良久曰立皇太子此事關係甚大碑不書非當時臣子所宜正言也李穆傳子惟簡不樂仕進家居二十餘年真宗聞之召為太子中允魏公傳作行簡宋史别有李行簡傳亦以巍公薦為御史作行簡者誤也本傳又云公疾甚上問誰可付天下事者歷問張詠馬亮公不對而薦寇凖此文不書按張詠卒於大中祥符八年魏公卒於天禧元年相去三年史本用洓水紀聞此書或云非溫公筆當以碑為正御選唐宋文醇卷三十
