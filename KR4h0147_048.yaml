body:
  text: 眉山蘇軾文十一劄子述災沴論賞罰及修河事繳進歐陽修議狀劄子乞郡劄子論邊將隱匿敗亡憲司體量不實劄子乞免五穀力勝税錢劄子乞校正陸贄奏議上進劄子欽定四庫全書御選唐宋文醇巻四十八眉山蘇軾文十一述災沴論賞罰及修河事繳進歐陽修議狀劄子元祐三年九月五日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣今日邇英進讀寳訓及雍熙淳化間事太宗皇帝每見時和歲豐雨雪應時喜不自勝舉酒以屬羣臣又是日熒惑與日同度太史奏言當旱既而雨足歲豐臣讀至此因進言水旱雖天數然人君修德可以轉災為福故宋景公一言而熒惑退三舍元豐八年熒惑守心逆行犯房又逆而西垂欲犯氐氐四星后妃之象也方是時二聖在位發政施仁惟恐不及臣視熒惑退舍甚速如有所畏不敢復西以此知天人之應捷於影響太宗皇帝親致太平而每遇豐年若獲非常之福喜樂如此者豈非水旱不作自是朝廷難得之事乎書曰天聰明自我民聰明匹夫匹婦有不獲其所猶能致水旱而況政令之失小及一方大及四海其為災沴理在不疑自二聖嗣位於今四年恭儉慈孝至仁至公可謂盡矣而四年之中非水則旱日月薄蝕五星相凌淫雨大雪常寒久陰之類殆無虚月豈盛德之報也哉臣愚無知竊謂陛下身修而政未修故監司守令多不得人百姓失職無所告訴謠怨上達以傷陰陽之和所以致此者蓋由朝廷賞罰不明舉錯不當之咎也臣請畧而言之去年熙河諸將力戰以獲鬼章此奇功也故増秩賜金涇原諸將閉門自守使賊大掠而去若涉無人之境此罪人也亦増秩賜金賞罰如此何以使人廣東妖賊岑探反圍新州差將官童政救之政賊殺平民數千其害甚於岑探朝廷使江西提刑傅燮體量其事燮畏避權勢歸罪於新州官吏又言新州官吏却有守城之功乞以功過相除愚弄上下有同兒戲然卒不問岑探聚衆搆謀經年乃發而所部官吏茫不覺知使一方赤子肝腦塗地然亦止於薄罰童政凶狡貪殘非一日之積而監司乃令將兵討賊以致千人無辜就死亦止降一差遣近日温杲誘殺平民十九人寃酷之狀所不忍聞而杲止於降官監當蔡州捕盜吏卒亦殺平民一家五六人皆婦女無辜屠割形體以為丈夫首級欲以請賞而守倅不按監司不問以致臣僚上言及行下本路乃云殺時不可辨認白日殺人不辨男女豈有此理乃是預為凶人開茍免之路事如此者非一臣不敢盡言特舉其甚者耳如此不過恩庇得無狀小人十數人正使此等歌詠愛戴不知有何補益而紀綱頽弛媮惰成風則千萬人受其害此得為仁乎大抵為國要在分别是非以行賞罰然後善人有所恃賴平人有所告訴若不窮究曲直惟務兩平則君子無告小人得志天下之亂可坐而待此臣所謂賞罰不明之咎也黄河自天禧已來故道漸以淤塞每決而西以就下耳熙寧中決於曹村先帝盡力塞之不及數年遂決小呉先帝聖神知河之欲西北行也久矣今强塞之縱獲目前之安而旋踵復決必然之勢也故不復塞今都水使者王孝先乃欲於北京南開孫村河欲奪河身以復故道此豈獨一方之安危天下之休戚也古者舉大事謀及庶人上下僉同然猶有意外之患今内自工部侍郎都水屬官外至安撫轉運使及外監丞皆以為故道髙仰勢若登屋功必無成而患有不可測者以至河北吏民無賢愚貴賤皆以為然獨一孝先以為可作臣聞自孫村至海口舊管堤掃四十五所役兵萬五千勾當使臣五十員歲支物料五百餘萬自小呉之決故道諸埽皆廢不治堤上榆柳并根掘取殘零物料變賣無餘官吏役兵僅有存者使孫村之役不能奪過河身則官私財力舉為虚棄若幸而復行故道則四十五埽皆以廢壞横流之災必倍於今孝先建議之初畧不及此近因人言沸騰方牒北外郡丞司云四十五埽並屬北外監丞司地分令一面相度枝梧又云因檢計樁料便令計置今來欲興修四十五處已壞隄埽準備河水復行故道此莫大之役不貲之費也孝先當於建議之初首論其事待朝廷上下熟議而行今孝先便將此役作常程熟事行與北外監丞司令一面管認意望敗事之後歸罪他人其為欺罔實駭羣聽其餘患害未易悉數但臣採察衆論以為此役不可不罷若今歲罷役不過枉費九百萬物料虚設二萬兵工若更接續興修則來歲當役數十萬人仍費三千餘萬此外民勞之極變故横生嗟怨之聲足以復致水旱若將三千萬物料錢作數年因水所欲行之地稍立隄防増卑培薄數年之後必漸安流何苦徇一夫之私計逆萬人之公論以興必不可行之役乎此臣所謂措置不當之咎也臣竊見仁宗朝名臣歐陽修為學士日有修河議狀二篇雖當時事宜而其所畫利害措置方畧頗切今日之事臣以為可用故輒繕寫進呈自祖宗以來除委任執政外仍以侍從近臣為耳目請間論事殆無虚日今自垂簾以來除執政臺諌開封尹外更無人得對惟有邇英講讀猶獲親近清光若復瘖黙不言則是耳目殆廢臣受恩深重不敢觀望上下茍為身謀謹備錄今日進讀之言上陳聖鑒臣無任恐慄待罪之至取進止此軾邇英殿進讀祖宗寳訓因而陳所事退而書其所奏以進本傳具識之其懇欵肫誠可為千古侍從臣法乞郡劄子元祐三年十月十七日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣近以左臂不仁兩目昏暗有失儀曠職之憂堅乞一郡伏䝉聖慈降詔不允遣使存問賜告養疾恩禮之重萬死莫酬以臣子大義言之病未及死皆當勉强雖有失儀曠職之罪亦不當辭然臣終未敢起就職事者實亦有故言之則觸忤權要得罪不輕不言則欺罔君父誅罰尤大故卒言之臣聞之易曰君子安其身而後動又曰君不宻則失臣臣不宻則失身以此知事君之義雖以報國為先而報國之道當以安身為本若上下相忌身自不安則危亡是憂國何由報恭惟陛下踐祚之始收臣於九死之餘半年之間擢臣為兩制之首方將致命豈敢告勞特以臣拙於謀身鋭於報國致使臺諌例為怨仇臣與故相司馬光雖賢愚不同而交契最厚光既大用臣亦驟遷在於人情豈肯異論但以光所建差役一事臣實以為未便不免力争而臺諫諸人皆希合光意以求進用及光既殁則又妄意陛下以為主光之言結黨横身以排異議有言不便約共攻之曽不知光至誠為民本不求人希合而陛下虚心無我亦豈有所主哉其後又因刑部侍郎范百禄與門下侍郎韓維争議刑名欲守祖宗故事不敢以疑法殺人而諌官呂陶又論維專權用事臣本蜀人與此兩人實是知舊因此韓氏之黨一例疾臣指為川黨御史趙挺之在元豐末通判德州而著作黄庭堅方監本州德安鎮挺之希合提舉官楊景棻意欲於本鎮行市易法而庭堅以為鎮小民貧不堪誅求若行市易必致星散公文往來士人傳笑其後挺之以大臣薦召試館職臣實對衆言挺之聚斂小人學行無取豈堪此選又挺之妻父郭槩為西蜀提刑時本路提舉官韓玠違法虐民朝旨委槩體量而槩附㑹隠庇臣弟轍為諌官劾奏其事玠槩並行黜責以此挺之疾臣尤出死力臣二年之中四遭口語發策草麻皆謂之誹謗未出省榜先言其失士以至臣所薦士例加誣衊所言利害不許相見近日王覿言胡宗愈指臣為黨孫覺言丁隲云是臣親家臣與此兩人有何干涉而使陛下投杼於三至之言中外之人具曉此意謂臣若不早去必致傾危臣非不知聖主天縱聰明察其無罪但以臺諌氣焰震動朝廷上自執政大臣次及侍從百官外至監司守令皆畏避其鋒奉行其意意所欲去勢無復全天下知之獨陛下深居法宫之中無由知耳臣竊觀三代以下號稱明主莫如漢宣帝唐太宗然宣帝殺蓋寛饒太宗殺劉洎皆信用讒言死非其罪至今哀之宣帝初知蓋寛饒忠直不畏强禦自候司馬擢為太中大夫司隸校尉不可謂不知之深矣而蓋寛饒上書有云五帝官天下三王家天下而當時讒人乃謂寛饒欲求禪位宣帝不察致使寛饒自剄北闕下太宗信用劉洎言無不從嘗比之魏文貞公亦不可謂不知之深矣而太宗征遼患癰洎泣曰聖體不康甚可憂懼而當時讒人乃謂洎欲行伊霍之事太宗不察賜洎自盡二主非不明也二臣之受知非不深也恃明主之深知不避讒人積毁以至身首異處為天下笑今臣自度受知於陛下不過如蓋寛饒之於漢宣帝劉洎之於唐太宗也而讒臣者乃十倍於當時雖陛下明哲寛仁度越二主然臣亦豈敢恃此不去以卒蹈二臣之覆轍哉且二臣之死天下後世皆言二主信讒邪而害忠良以為聖德之累使此二臣者識幾畏漸先事求去豈不身名俱泰臣主兩全哉臣縱不自愛獨不念一旦得罪之後使天下後世有以議吾君乎昔先帝召臣上殿訪問古今敕臣今後遇事即言其後臣屢論事未䝉施行乃復作為詩文寓物托諷庶幾流傳上達感悟聖意而李定舒亶何正臣三人因此言臣誹謗遂得罪然猶有近似者以諷諌為誹謗也今臣草麻詞有云民亦勞止而趙挺之以為誹謗先帝則是以白為黒以西為東殊無近似者臣以此知挺之險毒甚於李定舒亶何正臣而臣之被讒甚於蓋寛饒劉洎也古人有言曰為君難為臣不易臣欲依違茍且雷同衆人則内愧本心上負明主若不改其操知無不言則怨仇交攻不死即廢伏望聖慈念為臣之不易哀臣處此之至難始終保全措之不争之地特賜指麾檢㑹前奏早賜施行臣無任感恩知罪祈天請命激切戰恐之至取進止劉克莊跋此乞郡奏稿曰蘇程二公在朝不獨為當時小人所忌蓋攻蘇公者朱公掞賈明叔也攻程公者劉莘老孔經父也按是時羣小比肩散地蓄忿伺隙元氣壯而後可以杜外邪衆賢和而後可以制羣小不易之論也而諸公不悟各尊其師各私其黨日有紛紛不待章蔡復用諸賢固已自攻擊而去矣想見蘇程爭時吕吉甫輩必相與拊掌竊笑後之君子謹無為吉甫輩所笑哉論邊將隠匿敗亡憲司體量不實劄子元祐三年閏十二月四日翰林學士知制誥兼侍讀蘇軾劄子奏臣近以目昏臂痛堅乞一郡蓋亦自知受性剛褊黒白太明難以處衆伏䝉聖慈降詔不許兩遣使者存問慰安天恩深厚淪入骨髓臣謂此恩當以死報不當更計身之安危故復起就職而職事清閒未知死所每因進讀之間事有切於今日者輙復盡言庶補萬一昨日所讀寳訓有云淳化二年上謂侍臣諸州牧監馬多瘦死蓋養飼失時枉致病斃近令取十數槽寘殿庭下視其芻秣教之養療庶革此弊臣因進言馬所以病蓋將吏不職致圉人盜減芻粟且不䘏其飢飽勞逸故也馬不能言無由申訴故太宗至仁深哀憐之寘之殿庭親加督視民之與馬輕重不同若官吏不得其人人雖能言上下隔絶不能自訴無異於馬馬之飢瘦勞苦則有斃踣奔逸之憂民之困窮無聊則有溝壑盗賊之患然而四海之衆非如養馬可以寘之殿庭惟當廣任忠賢以為耳目若忠賢踈逺諂佞在傍則民之疾苦無由上達秦二世時陳勝呉廣已屠三川殺李由而二世不知陳後主時隋兵已渡江而後主不知此皆昏主不足道如唐明皇親致太平可謂明主而張九齡死李林甫楊國忠用事鮮于仲通以二十萬人沒於雲南不奏一人反更告捷明皇不問以至上下相䝉禄山之亂兵已過河而明皇不知也今朝廷雖無此事然臣聞去歲夏賊犯鎮賊所殺掠不可勝數或云至萬餘人而邊將乃奏云野無所掠其後朝廷訪聞委提刑司體量而提刑孫路止奏十餘人乞朝廷先賜放罪然後體量實數至今遷延二年終未結絶聞奏凡死事之家官所當卹若隠而不奏則生死銜寃何以使人此豈小事而路為耳目之司既不隨事奏聞朝廷既行䝉蔽又乞放罪遷延侮玩一至於此臣謂此風漸不可長馴致其患何所不有此臣之所深憂也臣非不知陛下必已厭臣之多言左右必已厭臣之多事然受恩深重不敢自同衆人若以此獲罪亦無所憾取進止上下交則為泰是故隔絶欺蔽最為亂階上下所以隔絶者中有欺蔽之臣也事無巨細未有欺蔽而不為害者若夫盗賊殺掠戰陣勝負乃國命所繫其為害尤大而欺蔽尤易生其為欺蔽尤易行何也事干封疆大小官吏必交頂抵蹠以救其死不使上聞其謀之者衆也内外之間大臣必有輔車相依唇亡齒寒者其煬之者固也是以欺蔽易生戰陣之事必在倉卒之間白刃所接如電光石火過則無形唯憑口説耳身在陣中者猶且言人人殊豈有籍之可稽圖之可指哉是以欺蔽易行以易行之事遇力行之衆則以敗為功以功為敗以民為賊以賊為民五色倉黄莫可究詰矣甚者全軍覆沒連城失守而捷書日至然而當處被難之民無不知之者也於是千載而下傳之為笑志士仁人聞之而涕矣地處邊徼益難周知民雖能言上下隔絶不能自訴勢窮死迫化為盗賊馴而致之何所不有吁足畏也軾之惓惓憂國而不能自已歎息痛恨於邊將提刑之失其人而必欲聞於上也豈好異於衆哉乞免五穀力勝税錢劄子元祐七年十一月初七日龍圖閣學士左朝奉郎守兵部尚書兼侍讀蘇軾劄子奏臣聞穀太賤則傷農太貴則傷末是以法不税五穀使豐熟之鄉商賈争糴以起太賤之價災傷之地舟車輻輳以壓太貴之直自先王以來未之有改也而近歲法令始有五穀力勝税錢使商賈不行農末皆病廢百王不刋之令典而行自古所無之弊法使百世之下書之青史曰收五穀力勝錢自皇宋某年始也臣竊為聖世病之臣頃在黄州親見累歲穀熟農夫連車載米入市不了鹽酪之費而蓄積之家日夜禱祠願逢饑荒又在浙西累歲親見水災中民之家有錢無穀被服珠金餓死於市此皆官收五穀力勝税錢致商賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廩自元祐以來蓋所費數千萬貫石而餓殍流亡不為少衰只如去年浙西水災陛下使江西湖北雇船運米以救蘇湖之民蓋百餘萬石又計糴來水脚官費不貲而客船被差雇者皆失業破産無所告訴與其官私費耗為害如此何似削去近日所立五穀力勝税錢一條只行天聖附令免税指揮則豐凶相濟農末皆利縱有水旱無大饑荒雖目下稍失課利而災傷之地不必盡煩陛下出捐錢穀如近歲之多也今元祐編敕雖云災傷地分雖有例亦免而穀所從來必自豐熟地分所過不免收税則商賈亦自不行議者或欲立法如一路災傷則隣路免税一州災傷則隣州亦然雖比今之法小為通䟽而隔一路一州之外豐凶不能相救未為良法須是盡削近歲弊法專用天聖附令指揮乃為通濟免五穀闗津之税使商賈通而價自平不待救荒而荒自救其言可法也乞校正陸贄奏議上進劄子元祐八年五月七日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾同呂希哲呉安詩豐稷趙彦若范祖禹顧臨劄子奏臣等猥以空踈備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經效於世間不必皆從於已出伏見唐宰相陸贄才本王佐學為帝師論深切於事情言不離於道德智如子房而文則過辯如賈誼而術不踈上以格君心之非下以通天下之志三代以還一人而已但其不幸仕不遇時德宗以苛刻為能而贄諌之以忠厚德宗以猜疑為術而贄勸之以推誠德宗好用兵而贄以消兵為先德宗好聚財而贄以散財為急至於用人聽言之法治邊馭將之方罪已以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏盲使德宗盡用其言則貞觀可得而復臣等每退自西閣即私相告語以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽遠末學支離譬如山海之崇深難以一二而推擇如贄之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄面反覆熟讀如與贄言必能發聖性之髙明成治功於歲月臣等不勝區區之意取進止駢儷之體而與古為化者此文與韓愈代裴度讓官表為甲觀矣藥雖進於醫手方多傳於古人若已經效於世間不必皆從於已出但使聖賢之相契即如臣主之同時旨哉言乎為君者知此不憂無臣為臣者知此不憂無友矣御選唐宋文醇巻四十八
