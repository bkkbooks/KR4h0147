body:
  text: 南豐曽鞏文四疏議墓志銘熙寧轉對疏為人後議講官議救災議贈職方員外郎蘇君墓志銘欽定四庫全書御選唐宋文醇卷五十七南豐曾鞏文四熙寧轉對疏準御史臺告報臣寮朝辭日具轉對臣愚淺薄恐言不足采然臣竊觀唐太宗即位之初延羣臣與圖天下之事而能絀封倫用魏鄭公之説所以成貞觀之治周世宗初即位亦延羣臣使陳當世之務而能知王朴之可用故顯德之政亦獨能變五代之因循夫當衆説之馳騁而以獨見之言陳未形之得失此聽者之所難也然二君能辨之於羣衆之中而用之以收一時之效此後世之士所以常感知言之少而頌二君之明也今陛下始承天序亦詔羣臣使以次對然且將嵗餘未聞取一人得一言豈當世固乏人不足以當陛下之意與抑所以延問者特用纍世之故事而不必求其實與臣愚竊計殆進言者未有以當陛下之意也陛下明智大略固將比迹於唐虞三代之盛如太宗世宗之所至恐不足以望陛下故臣之所言亦不敢效二臣之卑近伏惟陛下超然獨觀於世俗之表詳思臣言而擇其中則二君之明豈足道於後世而士之懷抱忠義者豈復感知言之少乎臣所言如左臣伏以陛下恭儉慈仁有能承祖宗之德聰明睿知有能任天下之材即位以來早朝晏罷廣問兼聽有更制變俗比迹唐虞之志此非羣臣之所能及也然而所遇之時在天則有日食星變之異在地則有震動陷裂水泉湧溢之災在人則有飢饉流亡訛言相驚之患三者皆非常之變也及從而察今之天下則風俗日以薄惡紀綱日以弛壞百司庶務一切文具而已內外之任則不足於人材公私之計則不足於食貨近則不能不以盜賊為慮逺則不能不以夷狄為憂海內智謀之士常恐天下之勢不得以久安也以陛下之明而所遇之時如此陛下有更制變俗比迹唐虞之志則亦在正其本而已矣易曰正其本萬事理臣以為正其本者在陛下得之於心而已臣觀洪範所以和同天人之際使之無間而要其所以為始者思也大學所以誠意正心修身治其國家天下而要其所以為始者致其知也故臣以為正其本者在得之於心而已得之於心者其術非他學焉而已矣此致其知所以為大學之道也古之聖人舜禹成湯文武未有不由學而成而傅説周公之輔其君未嘗不勉之以學故孟子以為學焉而後有為則湯以王齊桓公以霸皆不勞而能也蓋學所以成人主之功德如此誠能磨礱長養至於有以自得則天下之事在於理者未有不能盡也能盡天下之理則天下之以事物接於我者無以纍其內天下之以言語接於我者無以蔽其外夫然則循理而已矣邪情之所不能入也從善而已矣邪説之所不能亂也如是而用之以持久資之以不息則積其小者必至於大積其微者必至於顯古之人自可欲之善而充之至於不可知之神自十五之學而積之至於從心之不踰矩豈他道哉由是而已矣故曰念終始典於學又曰學然後知不足孔子亦曰吾學不厭蓋如此者孔子之所不能已也人能使事物之接於我者不能纍其內所以治內也言語之接於我者不能蔽其外所以應外也有以治內此所以成德化也有以應外此所以成法度也德化法度既成所以發育萬物而和同天人之際也自周衰以來道術不明為人君者莫知學先王之道以明其心為人臣者莫知引其君以及先王之道也一切茍簡溺於流俗末世之卑淺以先王之道為迂逺而難遵人主雖有聰明敏達之質而無磨礱長養之具至於不能有以自得則天下之事在於理者有所不能盡也不能盡天下之理則天下之以事物接於我者足以纍其內天下之以言語接於我者足以蔽其外夫然故欲循理而邪情足以害之欲從善而邪説足以亂之如是而用之以持久則愈甚無補行之以不息則不能見效其弊則至於邪情勝而正理滅邪説長而正論消天下之所以不治而有至於亂者以是而已矣此周衰以來人主之所以可傳於後世者少也可傳於後世者若漢之文帝宣帝唐之太宗皆可謂有美質矣由其學不能逺而所知者陋故足以賢於近世之庸主矣若夫議唐虞三代之盛德則彼烏足以云乎由其如此故自周衰以來千有餘年天下之言理者亦皆卑近淺陋以趨世主之所便而言先王之道者皆絀而不省故以孔子之聖孟子之賢而猶不遇也今去孔孟之時又逺矣臣之所言乃周衰以來千有餘年所謂迂逺而難遵者也然臣敢獻之於陛下者臣觀先王之所已試其言最近而非逺其用最要而非迂故不敢不以告者此臣所以事陛下區區之志也伏惟陛下有自然之聖質而漸漬於道義之日又不為不久然臣以為陛下有更制變俗比迹唐虞之志則在得之於心得之於心則在學焉而已者臣愚以為陛下宜觀洪範大學之所陳知治道之所本不在於他觀傅説周公之所戒知學者非明主之所宜已也陛下有更制變俗比迹唐虞之志則當懇誠惻怛以講明舊學而推廣之務當於道德之體要不取乎口耳之小知不急乎朝夕之近效復之熟之使聖心之所存從容於自得之地則萬事之在於理者未有不能盡也能盡萬事之理則內不纍於天下之物外不纍於天下之言然後明先王之道而行之邪情之所不能入也合天下之正論而用之邪説之所不能亂也如是而用之以持久資之以不息則雖細必巨雖微必顯以陛下之聰明而充之以至於不可知之神以陛下之睿知而積之以至於從心所欲之不踰矩夫豈逺哉顧勉強如何耳夫然故內成德化外成法度以發育萬物而和同天人之際甚易也若夫移風俗之薄惡振綱紀之弛壞變百司庶務之文具厲天下之士使稱其位理天下之財使贍其用近者使之親附逺者使之服從海內之勢使之常安則惟陛下之所欲何求而不得何為而不成乎未有若是而福應不臻而變異不消者也如聖心之所存未及於此內未能無秋毫之纍外未能無纖芥之蔽則臣恐欲法先王之政而智慮有所未審欲用天下之智謀材諝之士而議論有所未一於國家天下愈甚無補而風俗綱紀愈以衰壞也非獨如此自古所以安危治亂之幾未嘗不出於此臣幸蒙降問言天下之細務而無益於得失之數者非臣所以事陛下區區之志也輒不自知其固陋而敢言國家之大體惟陛下審察而擇其宜天下幸甚朱子謂鞏由學文漸見道理故文字依傍道理不為空言此疏在神宗初政勸以稽古雖若老生常談然使神宗果納其言學于古訓則所謂天變不足畏祖宗不足法人心不足順等論議必不能入於耳而遜於心矣想當時只作一通文字閲過耳移滄州過闕上殿劄子繁文勝而實意微不如此疏逺甚為人後議禮大宗無子則族人以支子為之後為之後者為所後服斬衰三年而降其父母期禮之所以如此者何也以為人之所知者近則知親愛其父母而已所知者逺則知有嚴父之義知有嚴父之義則知尊祖知尊祖則知大宗者上以繼祖下以收族不可以絶故有以支子為之後者為之後者以受重於斯人故不得不以尊服服之以尊服服之而不為之降已親之服則尤恐末足以明所後者之重也以尊服服之又為之降已親之服然後以為可以明所後者之重而繼祖之道盡此聖人制禮之意也夫所謂收族者記稱與族人合食序以昭穆别以禮義之類是特諸侯别子之大宗而嚴之如此況如禮所稱天子及其始祖之所自出者此天子之大宗是為天地宗廟百神祭祀之主族人萬世之所依歸而可以不明其至尊至重哉故前世人主有以支子繼立而崇其本親加以號位立廟奉祀者皆見非於古今誠由所知者近不能割棄私愛節之以禮故失所以奉承正統尊無二上之意也若於所後者以尊服服之又為之降已親之服而退於已親號位不敢以非禮有加也廟祀不敢以非禮有奉也則為至恩大義固已備矣而或謂又當易其父母之名從所後者為屬是未知考於禮也禮為人後者為所後者之祖父母妻妻之父母昆弟昆弟之子若子者此其服為所後者而非其為已也為其父母期為其昆弟大功為其姊妹適人者小功皆降本服一等者此其服為已而非為所後者也使於其父母服則為己名為所後者是則名與實相違服與恩相戾矣聖人制禮不如是之舛也且自古為人後者不必皆親昆弟之子族人之同宗者皆可為之則有以大功小功昆弟之子而為之者矣有以緦麻袒免無服昆弟之子而為之者矣若當從所後者為屬則亦當從所後者為服從所後者為服則於其父母有宜為大功為小功為緦麻為袒免為無服者矣而聖人制禮皆為其父母期使足以明所後者重而已非遂以為當變其親也親非變則名固不得而易矣戴德王肅喪記曰為人後者為其父母降一等服齊衰期其服之節居倚廬言語飲食與父在為母同其異者不祥不禫雖除服心喪三年故至於今著於服令未之有改也豈有製服之重如此而其名遂可以絶乎又崔凱喪服駁曰本親有自然之恩降一等則足以明所後者為重無緣乃絶之矣夫未嘗以為可以絶其親而輒謂可以絶其名是亦惑矣且支子所以後大宗者為推其嚴父之心以尊祖也顧以尊祖之故而不父其父豈本其恩之所由生而先王教天下之意哉又禮適子不可為人後者以其傳重也支子可以為人後者以非傳重也使傳重者後已宗非傳重者後大宗其意可謂即乎人心而使之兩義俱安也今若使為人後者以降其父母之服一等而遂變革其名不以為父母則非使之兩義俱安而不即乎人心莫大乎如是也夫人道之於大宗至尊至重不可以絶尊尊也人子之於父母亦至尊至重不可以絶親親也尊尊親親其義一也未有可廢其一者故為人之後者為降其父母之服禮則有之矣為之絶其父母之名則禮未之有也或以為欲絶其名者蓋惡其為二而欲使之為一所以使為人後者之道盡也夫迹其實則有謂之所後有謂之所生制其服則有為已而非為所後者有為所後而非為已者皆知不可以惡其為二而強使之為一也至於名者蓋生於實也乃不知其不可以惡其為二而欲強使之為一是亦過矣藉使其名可以強使之為一而迹其實之非一制其服之非一者終不可以易則惡在乎欲絶其名也故古之聖人知不可以惡其為二而強使之為一而能使其屬之疏者相與為重親之厚者相與為輕則以禮義而已矣何則使為人後者於其所後非已親也而為之服斬衰三年為其祭主是以義引之也於其所生實已親也而降服齊衰期不得與其祭是以禮厭之也以義引之則屬之疏者相與為重以禮厭之則親之厚者相與為輕而為人後之道盡矣然則欲為人後之道盡者在以禮義明其內而不在于惡其為二而強易其名於外也故禮喪服齊衰不杖期章曰為人後者為其父母服此見於經為人後者於其本親稱父母之明文也漢祭義以為宣帝親諡宜曰悼魏相以為宜稱尊號曰皇考立廟後世議者皆以其稱皇立廟為非至於稱親稱考則未嘗有以為非者也其後魏明帝尤惡為人後者厚其本親故非漢宣加悼考以皇號又謂後嗣有由諸侯入繼正統者皆不得謂考為皇稱妣為后蓋亦但禁其猥加非正之號而未嘗廢其考妣之稱此見於前世議論為人後者于其本親稱考妣之明文也又晉王坦之喪服議曰罔極之重非制教之所裁昔日之名非一朝之所去此出後之身所以有服本親也又曰情不可奪名不可廢崇本敘恩所以為降則知為人後者未有去其所出父母之名此古人之常理故坦之引以為制服之證此又見於前世議論為人後者於其本親稱父母之明文也是則為人後者之親見於經見於前世議論謂之父母謂之考妣者其大義如此明文如此至見於他書及史官之記亦謂之父母謂之考妣謂之私考妣謂之本親謂之親者則不可一二數而以為世父叔父者則不特禮未之有載籍以來固未之有也今欲使從所後者為屬而革變其父母之名此非常異義也不從經文與前世數千載之議論亦非常異義也而無所考據以持其説將何以示天下乎且中國之所以為貴者以有父子之道又有六經與前世數千載之議論以治之故也今忽欲棄之而伸其無所考據之説豈非誤哉或謂為人後者于其本親稱父母則為兩統二父其可乎夫兩統二父者謂加考以皇號立廟奉祀是不一於正統懷二于所後所以著其非而非謂不變革其父母之名也然則加考以皇號與禮及古之稱皇考者有異乎曰皇考一名而為説有三禮曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟是則以皇考為曽祖之廟號也魏相謂漢宣帝父宜稱尊號曰皇考既非禮之曽祖之稱又有尊號之文故魏明帝非其加悼考以皇號至于光武亦于南頓君稱皇考廟義出于此是以加皇號為事考之尊稱也屈原稱朕皇考曰伯庸又晉司馬機為燕王告禰廟文稱敢昭告于皇考清惠亭侯是又達于羣下以皇考為父殁之通稱也以為曽祖之廟號者于古用之以為事考之尊稱者于漢用之以為父殁之通稱者至今用之然則稱之亦有可有不可者乎曰以加皇號為事考之尊稱者施于為人後之義是干正統此求之于禮而不可者也達于羣下以皇考為父殁之通稱者施于為人後之義非干正統此求之于禮而可者也然則以為父殁之通稱者其不可如何曰若漢哀帝之親稱尊號曰恭皇安帝之親稱尊號曰孝德皇是又求之于禮而不可者也且禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也前世失禮之君崇本親以位號者豈獨失為人後奉祀正統尊無二上之意哉是以子爵父以卑命尊亦非所以尊厚其親也前世崇飾非正之號者其失如此而後世又謂宜如期親故事增官廣國者亦可謂皆不合于禮矣夫考者父殁之稱然施於禮者有朝廷典册之文有宗廟祝祭之辭而已若不加位號則無典册之文不立廟奉祀則無祝祭之辭則雖正其名豈有施于事者顧言之不可不順而已此前世未嘗以為可疑者以禮甚明也今世議者紛紛至于曠日纍時不知所決者蓋由不考于禮而率其私見也故采于經列其旨意庶得以商𣙜焉與歐陽修議並讀可互相發明講官議孔子之語教人曰不憤悱不啓發舉一隅不以三隅反則不告也孟子之語教人曰有答問者荀子之語教人曰不問而告謂之傲問一而告二謂之贅傲非也贅非也君子如響故禮無往教而有待問則師之道有問而告之者爾世之挾書而講者終日言而非有問之者也乃不自知其強聒而欲以師自任何其妄也古之教世子之法太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之則示之以道者以審喻之為淺故不為也況於師者何為也哉正已而使觀之者化爾故得其行者或不得其所以行得其言者或不得其所以言也仰之而彌高鑽之而彌堅德如是然後師之道盡故天子不得而召也諸侯不得而友也又況得而臣之乎此伊尹太公子思孟子之徒所以忘人之勢而唐虞三代大有為之君所以忘其勢也世之挾書而講於禁中者官以侍為名則其任故可知矣乃自以為吾師道也宜坐而講以為請於上其為説曰必如是然後合於古之所謂坐而論道者也夫坐而論道謂之三公作而行之謂之卿大夫語其任之無為與有為非以是為尊師之道也且禮於朝王及羣臣皆立無獨坐者於燕皆坐無獨立者故坐未嘗以為尊師之禮也昔晉平公之於亥唐坐云則坐曽子之侍仲尼子曰參復坐則坐云者蓋師之所以命學者未果有師道也顧僕僕然以坐自請者也則世之為此者非妄歟故為此議以解其惑此文為王安石爭坐講而作也吕誨劾其妄自尊大安石猶可得而辨也師道固尊也鞏明其官以侍為名則非師矣而坐亦非所以為尊安石當爽然自失矣通達古今之士其議論足發矇如是厥後程伊川何以猶爭坐講也救災議河北地震水災墮城郭壞廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患于暴露非錢不可以立屋廬患于乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞于上使者旁午于下無以救其患塞其求也有司建言請發倉廩與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見于衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者亦必有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日侍二升之廩于上則其勢必不暇乎他為是農不復得修其畎畝商不復得治其貨賄工不復得利其器用間民不復得轉移執事一切棄百事而專意于待升合之食以偷為性命之計是直以餓殍之養養之而已非深思逺慮為百姓長計也以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來嵗麥熟賑之未可以罷自今至于來嵗麥熟凡十月一户當受粟五十石今被災者十餘州州以二十萬户計之中户以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬户食之不遍則為施不均而民猶有無告者也食之遍則當用粟五百萬石而足何以辦此又非深思逺慮為公家長計也至于給授之際有淹速有均否有真偽有會集之擾有辨察之煩厝置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其于屋廬構築之費將安取哉屋廬構築之費既無所取而就食于州縣必相率而去其故居雖有頽牆壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺牛馬而去者有之伐桑棗而去者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽蓋流亡者亦已衆矣如是不可止則將空近塞之地空近塞之地失戰鬭之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰鬬之民異時有警邊戍不可以不增爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出于無聊之計有窺倉庫盜一囊之粟一束之帛者彼知已負有司之禁則必鳥駭鼠竄竊弄鋤梃于草茅之中以扞遊徼之吏強者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼓之警國家胡能晏然而已乎況夫外有夷狄之可慮內有郊祀之將行安得不防之于未然銷之于未萌也然則為今之策下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則今被災之州為十萬户如一户得粟十石得錢五千下户常産之資平日未及有此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用間民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廪于上而勢不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之説則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石況貸之于今而收之于後足以振其艱乏而終無損于儲偫之實所實費者錢五巨萬貫而已此可謂深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居茍有頽牆壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失況于全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則勢不暇乎他為雖驅之不去誘之不為盜矣夫飢嵗聚餓殍之民而與之升合之食無益于救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安于畎畝之中負錢與粟而歸與其父母妻子脫于流亡轉死之禍則戴上之施而懷欲報之心豈有已哉天下之民聞國家厝置如此恩澤之厚其孰不震動感激悅主上之義于無窮乎如是而人和不可致天意不可悅者未之有也人和洽于下天意悅于上然後玉輅徐動就陽而郊荒夷殊陬奉幣來享疆內安輯里無囂聲豈不適變于可為之時消患于無形之內乎此所謂審計終始見于衆人之所未見也不早出此或至于一有枹鼓之警則雖欲為之將不及矣或謂方今錢粟恐不足以辦此夫王者之富藏之于民有餘則取不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足蓋百姓富實而國獨貧與百姓餓殍而國獨能保其富者自古及今未之有也故又曰不患貧而患不安此古今之至戒也是故古者二十七年耕有九年之蓄足以備水旱之災然後謂之王政之成唐水湯旱而民無捐瘠者以是故也今國家倉庫之積固不獨為公家之費而已凡以為民也雖倉無餘粟庫無餘財至于救災補敗尚不可以已況今倉庫之積尚可以用獨安可以過憂將來之不足而立視夫民之死乎古人有曰翦爪宜及膚割髮宜及體先王之于救災髮膚尚無所愛況外物乎且今河北州軍凡三十七災害所被十餘州軍而已他州之田秋稼足望今有司于糴粟常價斗增一二十錢非獨足以利農其餘增糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虛估不過捐茶荈香藥之類為錢數巨萬貫而其費已足茶荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五巨萬貫又捐茶荈香藥之類為錢數巨萬貫而足以救一時之患為天下之計利害輕重又非難明者也顧吾之有司能越拘攣之見破常行之法與否而已此時事之急也故述斯議焉欲舉兩月之賑一旦豫民耳而反覆申重至於如此其煩文士多訿議其非古矣抑知其勤惓之心惟恐其言之不足以傾聽而民不得被其澤語重辭復而不憚煩者正其意之所以為古乎丘濬曰曾鞏此議所謂賜之錢貸之粟比之有司日逐給粟之説其為利病相去甚逺所謂深思逺慮以為百姓長久計者真誠有之但飢民一户貸之米十石一旦責其如數償之難矣不若因時量力稍有力者償其半無力者并與之或立為次第之限可也贈職方員外郎蘇君墓志銘熙寧元年春余之同年友趙郡蘇軾自蜀以書至京師謂余曰軾之大父行甚高而不為世用故不能自見於天下然古之人亦不必皆能自見而卒有傳於後者以世有發明之者耳故軾之先人嘗疏其事蓋將屬銘於子而不幸不得就其志軾何敢廢焉子其為我銘之余為之記其説曰君諱序字仲先眉州眉山人其先蓋趙郡欒城人也曽大父欽大父祐父杲三世皆不仕而行義聞於鄉里祐生於唐季而卒於周顯德之間嘗以事至成都遇道士異之屏人謂曰吾術能變化百物將以授子祐辭不願道士笑曰是果有以過人矣而杲始以好施顯名君讀書務知大義為詩務達其志而已詩多至千餘篇為人疏達自信持之以謙輕財好施急人之病孜孜若不及嵗凶賣田以賑其鄰里鄉黨至熟人將償之君辭不受以是至數破其業厄於飢寒然未嘗以為悔而好施益甚遇人無疏密一與之傾蓋無疑礙或欺而侮之君亦不變人莫測其意也李順叛攻眉州君居圍中守禦會其父病殁君治喪執禮盡哀退慰安其母皆不失所宜慶厯初詔州縣立學取士爭欲執事學中君獨戒其子孫退避人皆服其行蜀自五代之亂學者衰少又安其鄉里皆不願出仕君獨教其子渙受學所以成就之者甚備至渙以進士起家蜀人榮之意始大變皆始受學及其後眉之學者至千餘人蓋自蘇氏始而君之季子洵壯猶不知書君亦不強之謂人曰是非憂其不學者也既而洵果奮發力學與其子軾轍皆以文學名天下為學者所宗蓋雖不用於世而見於家稱於鄉里者如此是不可以無傳也已君始以子恩為大理評事後纍贈尚書職方員外郎享年七十有五慶厯五年五月十一日終於家八年二月某日葬於眉山縣修文鄉安道里先塋之側夫人史氏蓬萊縣太君二子曰渙尚書都官郎中提點利州路刑獄公事有能名曰洵霸州文安縣主簿編纂太常禮書贈光祿寺丞孫七人位佾不欺不疑不危軾轍軾殿中丞直史館轍商州軍事推官銘曰蘇氏徂西值蜀崩分三世高逝以篤吾仁君始不羈勞躬以卑孝於父母施及窮嫠維見之卓教其子孫終化鄉邦學者詵詵維子若孫同時三人擅名文章震動四鄰乃本厥初考祖之自刻詩墓石以畀厥裔鞏金石文字簡貴得史法如是則其他語重詞復人所病為多者蓋亦必有義矣昔人謂學古文者有二弊一為減字法一為換字法切中貌古者之病鞏豈不能為減字邪御選唐宋文醇卷五十七
