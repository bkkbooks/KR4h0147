body:
  text: 臨川王安石文雜著書序記祭文墓志銘原過進説傷仲永讀孟嘗君傳讀孔子世家與趙卨書答段縫書上田正言書答韶州張殿丞書周禮義序詩義序書義序靈谷詩序芝閣記遊褒禪山記祭范潁州文祭曽博士易占文廣西轉運使蘇君墓志銘欽定四庫全書御選唐宋文醇卷五十八臨川王安石文原過天有過乎有之陵歷鬭蝕是也地有過乎有之崩弛竭塞是也天地舉有過卒不纍覆且載者何善復常也人介乎天地之間則固不能無過卒不害聖且賢者何亦善復常也故太甲思庸孔子曰勿憚改過揚雄貴遷善皆是術也豫之朋有過而能悔悔而能改人則曰是向之從事云爾今從事與向之從事弗類非其性也飾表以疑世也夫豈知言哉天播五行於萬靈人固備而有之有而不思則失思而不行則廢一日咎前之非沛然思而行之是失而復得廢而復舉也顧曰非其性是率天下而戕性也且如人有財見篡於盜已而得之曰非夫人之財向篡於盜矣可歟不可也財之在已固不若性之為已有也財失復得曰非其財且不可性失復得曰非其性可乎無咎者善補過也易莫大於無咎無咎則無悔無吝吉固自天祐之凶亦非自我作之也吉凶悔吝若循環然凶必悔悔則之乎吉矣吉易吝吝則之乎凶矣無咎則無所之也凝命之本也曷由無咎在善補過聖人不大無過大補過子張問善人之道子曰不踐迹亦不入於室不大無過也仲虺之誥曰惟王改過不吝大補過也子曰有德者必有言有言者不必有德王安石傲佷明德以亂天常蒼生之被其害者以百萬計不止無德矣然猶不礙其為有言言果足重乎哉自宋以來重其文字明茅坤不能刪也以之殿八家儲欣益李翺孫樵而為十而亦不能刪王安石而為九也則今者亦姑存之曽鞏不云乎以戒則明何必滅其籍哉使天下讀原過而歎有如是之言而怙過如是讀進説而歎有如是之言而巧進如是則為人君者知詐偽萬端而不敢輕信以其國委人為人臣者知詐偽萬端雖爵可至王名可至配享宗廟配享孔子文可列於學官誦於後世而卒無解於小人之號千古比之荆舒是懲則詐偽者其或可休乎然則其文誠安可不録也進説古之時士之在下者無求於上上之人日汲汲惟恐一士之失也古者士之進有以德有以才有以言有以曲藝今徒不然自茂才等而下之至於明法其進退之皆有法度古之所謂德者才者無以為也古之所謂言者又未必應今之法度也誠有豪傑不世出之士不自進乎此上之人弗舉也誠進乎此而不應今之法度有司弗取也夫自進乎此皆所謂枉已者也孟子曰未有枉已能正人者也然而今之人不自進乎此者未見也豈皆不如古之士自重以有恥乎古者并天下之地而授之氓士之未命也則授一㕓而為氓其父母妻子裕如也自家達有孰有序有庠有學觀遊止處師師友友絃歌堯舜之道自樂也磨礱鐫切沈浸灌養行完而才備則曰上之人其舍我哉上之人其亦莫之能舍也今也地不井國不學黨不庠遂不序家不孰士之未命也則或無以裕父母妻子無以處行完而才備上之人亦莫之舉也士安得而不自進嗚呼使今之士不若古非人則然勢也勢之異聖賢之所以不得同也孟子不見王公而孔子為季氏吏夫不以勢乎哉士之進退不惟其德與才而惟今之法度而有司之好惡未必今之法度也是士之進不惟今之法度而幾在有司之好惡耳今之有司非昔之有司也後之有司又非今之有司也有司之好惡豈常哉是士之進退果卒無所必而已矣噫以言取人未之失也取焉而又不得其所謂言是失之失也況又重以有司好惡之不可常哉古之道其卒不可以見乎士也有得已之勢其得不已乎得已而不已未見其為有道也楊叔明之兄弟以父任皆京官其勢非吾所謂無以處無以裕父母妻子而有不得已焉者也自枉而為進士而又枉於有司而又若不釋然二君固常自任以道而且朋友我矣懼其猶未寤也為進説與之吕誨劾安石辭小官不辭大官安石仕未顯衆君子翕然稱賢焉使以小官終千載而下知安石何如人哉安石之進也宋室之不幸亦安石之不幸也傷仲永金溪民方仲永世隸耕仲永生五年未嘗識書具忽啼求之父異焉借旁近與之即書詩四句并自為其名其詩以養父母收族為意傳一鄉秀才觀之自是指物作詩立就其文理皆有可觀者邑人竒之稍稍賓客其父或以錢幣乞之父利其然也日扳仲永環謁於邑人不使學余聞之也久明道中從先人還家於舅家見之十二三矣令作詩不能稱前時之聞又七年還自揚州復到舅家問焉曰泯然衆人矣王子曰仲永之通悟受之天也其受之天也賢於材人逺矣卒之為衆人則其受於人者不至也彼其受之天也如此其賢也不受之人且為衆人今夫不受之天固衆人又不受之人得為衆人而已耶勸學之意宛轉切至為子弟者所宜誦然學何學乎宜先辨志矣讀孟嘗君傳世皆稱孟嘗君能得士士以故歸之而卒賴其力以脫於虎豹之秦嗟乎孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之強得一士焉宜可以南面而制秦尚何取雞鳴狗盜之力哉夫雞鳴狗盜之出其門此士之所以不至也謝枋得曰筆力簡而健然一篇得意處只是擅齊之強得一士焉宜可以南靣而制秦尚何取雞鳴狗盜之力哉先得此數句作此一篇文字然亦是祖述前言韓文公祭田橫墓文云當嬴氏之失鹿得一士而可王何五百人之擾擾不能脫夫子于劍鋩豈所寶之非賢抑天命之有常讀孔子世家太史公敘帝王則曰本紀公侯傳國則曰世家公卿特起則曰列傳此其例也其列孔子為世家奚其進退無所據邪孔子旅人也棲棲衰季之世無尺土之柄此列之以傳宜矣曷為世家哉豈以仲尼躬將聖之資其教化之盛舄奕萬世故為之世家以抗之又非極摯之論也夫仲尼之才帝王可也何特公侯哉仲尼之道世天下可也何特世其家哉處之世家仲尼之道不從而大置之列傳仲尼之道不從而小而遷也自亂其例所謂多所抵捂者也茅坤曰荆公短文字有絶似太史公處與趙卨書某啓議者多言遽欲開納西人則示之以弱彼更倔強以事情料之殆不如此以我衆大當彼寡小我尚疲敝厭兵即彼偷欲得和可知我深閉固距使彼不得安息則彼上下忿懼并力一心致死於我此彼所以能倔強也我明示開納則彼孰敢違衆首議欲為倔強者就令有敢如此則彼舉國皆將德我而怨彼孰肯為之致死此所以怒我而怠冦也老子曰抗兵相加愛者勝矣此之謂也至於開納之後與之約和乃不可遽遽則彼將驕而易我蓋明示開納所以怠其衆而紓吾患徐與之議所以示之難而堅其約聖上恐龍圖未喻此指故令以書具道前降指揮如西人有文字詞理恭順即與收接聞奏宜即明示界上使我吏民與彼舉國皆知朝廷之意儲欣曰絶似漢人指揮機宜文字答段縫書段君足下某在京師時嘗為足下道曽鞏善屬文未嘗及其為人也還江南始熟而慕焉友之又作文粗道其行惠書以所聞詆鞏行無纖完其居家親友惴畏焉怪某無文字規鞏見謂有黨果哉足下之言也鞏固不然鞏文學論議在某交遊中不見可敵其心勇於適道殆不可以刑禍利祿動也父在困厄中左右就養無虧行家事銖髮以上皆親之父亦愛之甚嘗曰吾宗敝所賴者此兒耳此某之所見也若足下所聞非某之所見也鞏在京師避兄而舍此雖某亦罪之也宜足下深攻之也於罪之中有足矜者顧不可以書傳也事固有迹然而情不至是者如不循其情而誅焉則誰不可誅邪鞏之迹固然邪然鞏為人弟於此不得無過但在京師時未深接之還江南又既往不可咎未嘗以此規之也鞏果於從事少許可時時出於中道此則還江南時嘗規之矣鞏聞之輒瞿然鞏固有以教某也其作懷友書兩通一自藏一納某家皇皇焉求相切劘以免於悔者略見矣嘗謂友朋過差未可以絶固且規之規之從則已固且為文字自著見然後已邪則未嘗也凡鞏之行如前之云其既往之過亦如前之云而已豈不得為賢者哉天下愚者衆而賢者希愚者固忌賢者賢者又自守不與愚者合愚者加怨焉挾忌怨之心則無之焉而不謗君子之過於聽者又傳而廣之故賢者嘗多謗其困於下者尤甚勢不足以動俗名實未加於民愚者易以謗謗易以傳也凡道鞏之云云者固忌固怨固過於聽者也足下乃欲引忌者怨者過於聽者之言懸斷賢者之是非甚不然也孔子曰衆好之必察焉衆惡之必察焉孟子曰國人皆曰可殺未可也見可殺焉然後殺之匡章通國以為不孝孟子獨禮貌之孔孟所以為孔孟者為其善自守不惑於衆人也如惑於衆人亦衆人耳烏在其為孔孟也足下姑自重毋輕議鞏安石罷相後嘗歎曰平昔交遊皆以國事相絶曽鞏傳曰安石得志後遂與之異子言之有朋自逺方來不亦樂乎鸞鳳所棲百鳥並集君子之光其暉吉也若夫傷胎殺卵則鳳鳥不至矣寧有害及百姓而君子猶與為友者乎上田正言書正言執事某五月還家八月抵官每欲介西北之郵布一書道區區之懷輒以事廢揚東南之吭也舟輿至自汴者日十百數因得問汴事與執事息耗甚詳其間薦紳道執事介然立朝無所跛倚甚盛甚盛顧猶有疑執事者雖某亦然某之學也執事誨之進也執事奬之執事知某不為淺矣有疑焉不以聞何以償執事之知哉初執事坐殿廡下對方正策指斥天下利害奮不諱忌且曰願陛下行之無使天下謂制科為進取一塗耳方此時窺執事意豈若今所謂舉方正者獵取名位而已哉蓋曰行其志云爾今聨諫官朝夕耳目天子行事即一切是非無不可言者欲行其志宜莫若此時國之疵民之病亦多矣執事亦抵職之日久矣向之所謂疵者今或痤然若不可治矣向之所謂病者今或痼然若不可起矣曽未聞執事建一言寤主上也何向者指斥之切而今之疏也豈向之利於言而今之言不利耶豈不免若今之所謂舉方正者獵取名位而已邪人之疑執事者以此為執事解者或造辟而言詭辭而出疏賤之人奚遽知其微哉是不然矣傳所謂造辟而言者乃其言則不可得而聞也其言之效則天下斯見之矣今國之疵民之病有滋而無損焉烏所謂言之效邪復有為執事解者曰蓋造辟而言之矣如不用何是又不然臣之事君三諫不從而去之禮也執事對策時常用是著於篇今言之而不從亦當不翅三矣雖惓惓之義未能自去孟子不云乎有言責者不得其言則去盍亦辭其言責邪執事不能自免於疑也必矣雖堅強之辨不能為執事解也乃如某之愚則願執事不矜寵利不憚誅責一為天下昌言以寤主上起民之病治國之疵蹇蹇一心如對策時則人之疑不解自判矣惟執事念之如其不然願賜教答不宣唐順之曰歐公上范司諫書婉而切荆公與田正言書直而徑答韶州張殿丞書某啓伏蒙再賜書示及先君韶州之政為吏民稱誦至今不絶傷今之士大夫不盡知又恐史官不能記載以次前世良吏之後此皆不肖之孤言行不足信於天下不能推揚先人之功緒餘烈使人人得聞知之所以夙夜愁痛疚心疾首而不敢息者以此也先人之存某尚少不得備聞為政之迹然嘗侍左右尚能記誦教誨之餘蓋先君所存嘗欲大潤澤於天下一物枯稿以為身羞大者既不得試已試乃其小者耳小者又將泯沒而無傳則不肖之孤罪大釁厚矣尚何以自立於天地之間耶閣下勤勤惻惻以不傳為念非夫仁人君子樂道人之善安能以及此自三代之時國各有史而當時之史多世其家往往以身死職不負其意蓋其所傳皆可考據後既無諸侯之史而近世非尊爵盛位雖雄奇俊烈道德滿衍不幸不為朝廷所稱輒不得見於史而執筆者又雜出一時之貴人觀其在廷論議之時人人得講其然不尚或以忠為邪以異為同誅當前而不栗訕在後而不羞茍以饜其忿好之心而止耳而況隂挾翰墨以裁前人之善惡疑可以貸褒似可以附毁往者不能訟當否生者不得論曲直賞罰謗譽又不施其間以彼其私獨安能無欺於冥昧之間邪善既不盡傳而傳者又不可盡信如此唯能言之君子有大公至正之道名實足以信後世者耳目所遇一以言載之則遂以不朽於無窮耳伏惟閣下於先人非有一日之雅餘論所及無黨私之嫌茍以發潛德為已事務推所聞告世之能言而足信者使得論次以傳焉則先君之不得列於史官豈有恨哉李光地曰此古今升降一大節目此篇議論亦大關係韓子之不為史官意亦如此而有難顯言者故以鬼神禍福自説周禮義序士弊於俗學久矣聖上閔焉以經術造之乃集儒臣訓釋厥旨將播之學校而臣某實董周官惟道之在政事其貴賤有位其後先有序其多寡有數其遲數有時制而用之存乎法推而行之存乎人其人足以任官其官足以行法莫盛乎成周之時其法可施於後世其文有見於載籍莫具乎周官之書蓋其因習以崇之賡續以終之至於後世無以復加則豈特文武周公之力哉猶四時之運隂陽積而成寒暑非一日也自周之衰以至於今歷嵗千數百矣太平之遺迹掃蕩幾盡學者所見無復全經於是時也乃欲訓而發之臣誠不自揆然知其難也以訓而發之之為難則又以知夫立政造事追而復之之為難然竊觀聖上致法就功取成於心訓迪在位有馮有翼亹亹乎鄉六服承德之世矣以所觀乎今考所學乎古所謂見而知之者臣誠不自揆妄以為庶幾焉故遂昧冒自竭而忘其材之弗及也謹列其書為二十有二卷凡十餘萬言上之御府副在有司以待制詔頒焉謹序此安石誤宋之根也孟子曰以善養人然後能服天下茍可養人不必其法出自周公也九夷八蠻皆聖人所樂取茍為百姓所患苦雖扳周公以證之無濟於敗若夫文則洵美矣然亦有自然流露而不可掩者禹之於舜也見而知之也則其言曰無若丹朱傲安石之於神宗也則其言曰所謂見而知之者臣誠不自揆妄以為庶幾焉嗚呼可以鑒矣詩義序詩三百十一篇其義具存其辭亡者六篇而己上既使臣雱訓其辭又命臣某等訓其義書成以賜太學布之天下又使臣某為之序謹拜手稽首言曰詩上通乎道德下止乎禮義放其言之文君子以興焉循其道之序聖人以成焉然以孔子之門人賜也商也有得於一言則孔子悅而進之蓋其説之難明如此則自周衰以迄於今泯泯紛紛豈不宜哉伏惟皇帝陛下內德純茂則神罔時恫外行恂達則四方以無侮日就月將學有緝熙於光明則頌之所形容蓋有不足道也微言奧義既自得之又命承學之臣訓釋厥遺樂與天下共之顧臣等所聞如爝火焉豈足以賡日月之餘光姑承明制代匱而已傳曰美成在久故棫朴之作人以壽考為言蓋將有來者焉追琢其章纘聖志而成之也臣衰且老矣尚庶幾及見之謹序儲欣曰抑損處得體書義序熙寧二年臣某以尚書入侍遂與政而子雩實嗣講事有旨為之説以獻八年下其説太學班焉惟虞夏商周之遺文更秦而幾亡遭漢而僅存賴學士大夫誦説以故不泯而世主莫或知其可用天縱皇帝大智實始操之以驗物考之以決事又命訓其義兼明天下後世而臣父子以區區所聞承乏與榮焉然言之淵懿而釋以淺陋命之重大而承以輕眇茲榮也祇所以為愧也歟謹序茅坤曰序皆應詔為之者其辭簡而其法度自典則靈谷詩序吾州之東南有靈谷者江南之名山也龍蛇之神虎豹翬翟之文章楩柟豫章竹箭之材皆自山出而神林鬼冢魑魅之穴與夫仙人釋子恢譎之觀咸附託焉至其淑靈和清之氣盤礴委積於天地之間萬物之所不能得者乃屬之於人而處士君實生其址君姓吳氏家於山址豪傑之望臨吾一州者蓋五六世而後處士君出焉其行孝悌忠信其能以文學知名於時惜乎其老矣不得與夫虎豹翬翟之文章楩柟豫章竹箭之材俱出而為用於天下顧藏其神竒而與龍蛇雜此土以處也然君浩然有以自養遨遊於山川之間嘯歌謳吟以寓其所好終身樂之不厭而有詩數百篇傳誦於閭里他日出靈谷三十二篇以屬其甥曰為我讀而序之惟君之所得蓋有伏而不見者豈特盡於此詩而已雖然觀其鑱刻萬物而接之以藻繢非夫詩人之巧者亦孰能至於此茅坤曰覽之如逰峭壁邃谷芝閣記祥符時封泰山以文天下之平四方以芝來告者萬數其大吏則天子賜書以寵嘉之小吏若民輒賜金帛方是時希世有力之大臣窮搜而逺采山農野老攀緣狙杙以上至不測之高下至澗溪壑谷分崩裂絶幽窮隱伏人迹之所不通往往求焉而芝出於九州四海之間蓋幾於盡矣至今上即位謙讓不德自大臣不敢言封禪詔有司以祥瑞告者皆勿納於是神竒之産銷藏委翳於蒿藜榛莽之間而山農野老不復知其為瑞也則知因一時之好惡而能成天下之風俗況於行先王之治哉太丘陳君學文而好竒芝生於庭能識其為芝惜其可獻而莫售也故閣於其居之東偏掇取而藏之蓋其好竒如此噫芝一也或貴於天子或貴於士或辱於凡民夫豈不以時乎哉士之有道固不役志於貴賤而卒所以貴賤者何以異哉此豫之所以歎也李光地曰與墨池同一機軸蓋曽王文極有相似者遊褒禪山記褒禪山亦謂之華山唐浮圖慧褒始舍於其址而卒葬之以故其後名之曰褒禪今所謂慧空禪院者褒之廬冢也距其院東五里所謂華山洞者以其乃華山之陽名之也距洞百餘步有碑仆道其文漫滅獨其為文猶可識曰花山今言華如華實之華者蓋音謬也其下平曠有泉側出而記遊者甚衆所謂前洞也由山以上五六里有穴窈然入之甚寒問其深則其好遊者不能窮也謂之後洞余與四人擁火以入入之愈深其進愈難而其見愈竒有怠而欲出者曰不出火且盡遂與之俱出蓋余所至比好遊者尚不能十一然視其左右來而記之者已少蓋其又深則其至又加少矣方是時豫之力尚足以入火尚足以明也既其出則或咎其欲出者而豫亦悔其隨之而不得極夫遊之樂也於是豫有歎焉古人之觀於天地山川草木蟲魚鳥獸往往有得以其求思之深而無不在也夫夷以近則遊者衆險以逺則至者少而世之竒偉瑰怪非常之觀常在於險逺而人之所罕至焉故非有志者不能至也有志矣不隨以止也然力不足者亦不能至也有志與力而又不隨以怠至於幽暗昏惑而無物以相之亦不能至也然力足以至焉於人為可譏而在已為有悔盡吾志也而不能至者可以無悔矣其孰能譏之乎此豫之所得也豫於仆碑又以悲夫古書之不存後世之謬其傳而莫能名者何可勝道也哉此所以學者不可以不深思而慎取之也四人者廬陵蕭君圭君玉長樂王回深父豫弟安國平父安上純父至和元年七月某日臨川王某記李光地曰借題寫已深情髙致窮工極妙祭范潁州文嗚呼我公一世之師由初迄終名節無疵明肅之盛身危志殖瑤華失位又隨以斥治功亟聞尹帝之都閉姦興良稚子歌呼赫赫之家萬首俯趨獨繩其私以走江湖士爭留公蹈禍不栗有危其辭謁與俱出風俗之衰駭正怡邪蹇蹇我初人以疑嗟力行不回慕者興起儒先酋酋以節相侈公之在貶愈勇為忠稽前引古誼不營躬外更三州施有餘澤如釃河江以灌尋尺宿贓自解不以刑加滑盜涵仁終老無邪講藝絃歌慕來千里溝川障澤田桑有喜戎孽猘狂敢齮我疆鑄印刻符公屏一方取將於伍後常名顯收士至佐維邦之彥聲之所加虜不敢瀕以其餘威走敵完鄰昔也始至瘡痍滿道藥之養之內外完好既其無為飲酒笑歌百城晏眠吏士委蛇上嘉曰材以副樞密稽首辭讓至於六七遂參宰相釐我典常扶賢贊傑亂穴除荒官更於朝士變於鄉百治具修偷墮勉強彼閼不遂歸侍帝側卒屏於外身屯道塞謂宜耉老尚有以為神乎孰忍使至於斯蓋公之才猶不盡試肆其經綸功孰與計自公之貴廏庫逾空和其色辭傲訐以容化於婦妾不靡珠玉翼翼公子弊綈惡粟閔死憐窮惟是之奢孤女以嫁男成厥家孰堙於深孰鍥乎厚其傳其詳以法永久碩人今亡邦國之憂矧鄙不肖辱公知尤承凶萬里不往而留涕洟馳辭以贊醪羞茅坤曰范公為一代殊絶人物荆公祭文亦極力摹寫涕洟嗚咽祭曽博士易占文嗚呼公以罪廢實以不幸卒困以夭亦惟其命命與才違人實知之名之不幸知者為誰公之閭里宗親黨友知公之名於實無有嗚呼公初公志如何孰云不諧而厄孔多地大天穹有時而毁星日脫敗山傾谷圮人居其間萬物一偏固有窮通世數之然至其壽夭尚何憂喜要之百年一蛻以死方其生時窘若囚拘其死以歸混合空虛以生易死死者不祈惟其不見生者之悲公今有子能隆公後惟彼生者可無甚悼嗟理則然其情難忘哭泣馳辭往侑奠觴曽易占字不疑鞏之父也始末具王明清揮麈録中采載鞏與杜衍書篇後廣西轉運使蘇君墓志銘慶厯五年河北都轉運使龍圖閣直學士信都歐陽修以言事切直為權貴人所怒因其孤甥女子有獄誣以姦利事天子使三司户部判官太常博士武功蘇君與中貴人雜治當是時權貴人連內外諸怨惡修者為惡言欲傾修鋭甚天下洶洶必修不能自脫蘇君卒白上曰修無罪言者誣之耳於是權貴人大怒誣君以不直絀使為殿中丞泰州監稅然天子遂寤言者不得意而修等皆無恙蘇君以此名聞天下嗟乎以忠為不忠而誅不當於有罪人主之大戒然古之陷此者相隨屬以有左右之讒而無如蘇君之救是以卒至於敗亡而不寤然則蘇君一動其功於天下豈小也哉蘇君既出逐權貴人更用事凡五年之間再赦而君六徙東西南北水陸奔走輒萬里其心恬然無有怨悔遇事強果未嘗少屈蓋孔子所謂剛者殆蘇君矣蘇君之仁與智又有足稱者嘗通判陜府當葛懷敏之敗邊告急樞密使使取道路戍還之卒再戍儀渭於是延州還者千人至陜聞再戍大怨即歡聚謀為變吏白閉城城中無一人敢出君徐以一騎出卒間諭慰止之而以便宜還使者戍卒喜曰微蘇君吾不得生陜人亦曰微蘇君吾其掠死矣有令刺陜西之民以為兵敢亡者死既而亡者得有司治之以死君輒縱去而言上曰令民以死者為事不集也事集矣而亡者猶不赦恐其衆相聚而為盜惟朝廷幸哀憐愚民使得自反天子以君言為然而三十州之亡者皆不死其後知坊州州稅賦之無歸者里正代為之輸嵗敝大家數十君悉鉤治使歸其主坊人不憂為里正自蘇君始也蘇君諱安世字夢得其先武功人後徙蜀蜀亡歸家於京師今為開封人也曽大考諱進之率府副率大考諱繼殿直考諱咸熙贈都官郎中君以進士起家三十二年其卒年五十九為廣西轉運使而官止於屯田員外郎者以君十五年不求磨勘也君娶南陽郭氏又娶清河張氏為清河縣君子四人台文永州推官祥文太廟齋郎炳文試將作監主簿彥文未仕女子五人適進士會稽江嵩單州魚臺縣尉江山趙揚三人尚幼君既卒之三年嘉祐二年十月庚午其子葬君揚州之江都東興寧鄉馬坊村而太常博士知常州軍州事臨川王某為銘曰皇有四極周綏以福使維蘇君奠我南服元元蘇君不圓其方不晦其明君子之剛其枉在人我得吾直誰懟誰愠祗天之役日月有丘其下冥冥昭君無窮安石之銘茅坤曰以剛字敘蘇君意氣以仁智二字決其吏業感慨中有法度御選唐宋文醇卷五十八
