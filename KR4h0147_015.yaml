body:
  text: 河東栁宗元文五序論愚溪詩序同吳武陵贈李睦州詩序送南涪州量移澧州序送徐從事北遊序送婁圖南秀才遊淮南將入道序送崔子符罷舉詩序送從弟謀歸江陵序送澥序封建論欽定四庫全書御選唐宋文醇卷十五河東栁宗元文五愚溪詩序灌水之陽有溪焉東流入於瀟水或曰冉氏嘗居也故姓是溪曰冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今余家是溪而名莫能定土之居者猶齗齗然不可以不更也故更之為愚溪愚溪之上買小丘為愚丘自愚丘東北行六十步得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地蓋上出也合流屈曲而南為愚溝遂負土纍石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之竒者以余故咸以愚辱焉夫水知者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以灌溉又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於余然則雖辱而愚之可也寧武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今余遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪余得專而名焉溪雖莫利於世而善鑒萬類清瑩秀徹鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合於俗亦頗以文墨自慰潄滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻蒙混希夷寂寥而莫我知也於是作八愚詩紀於溪石上水黑曰盧不流曰奴水之不能澤物者古人被之以惡名宗元以溪水不可溉田負舟而名之曰愚亦有本焉其亦以慨已濟世之願不遂也無知之謂愚無知者萬有之知所從出超鴻蒙混希夷抑又太自譽矣若夫潄滌萬物牢籠百態實乃喜自狀其文可為實録雖然得無與布帛菽粟者猶有間乎同吳武陵贈李睦州詩序潤之盜錡竊貨財聚徒黨為反謀十年今天子即位三年大立制度於是盜恐且奮將遂其不善視部中良守不為已用者誣陷去之睦州由是得罪天子使御史按問館於睦自門及堂皆其私卒為衛天子之衛不得搖手辭卒致具有間盜遂作而廷臣猶用其文斥睦州南海上既上道盜以徒百人遮於楚越之郊戰且走乃得完為左官吏無幾盜就禽斬之於社垣之外論者謂宜還睦州以明其誣既更大赦始移永州去長安尚四千里睦州未嘗自言吳武陵剛健士也懷不能忍於是踴躍其誠鏗鏘其聲出而為之詩然後慊於內余固知睦州之道也熟銜匿而未發且久聞吳之先焉者激於心若鐘鼓之考不知聲之發也遂繫之而重以序李錡蓄反謀十年唐之君臣不能燭見幾先轉代盜驅除其不附已者睦州刺史李清臣錡既發兵反猶用反者所具獄辭罪李清臣由今觀之堪作笑具轉疑紀述之非真矣不知漸浸所成當其時有忽不及覺者錡於德宗時專事刻剝以為進奉憲宗平蜀錡不自安遂反其平日所以蠱惑欺罔朝廷者豈止李清臣一事按問清臣之御史身在錡境不得搖手出氣且從錡則朝廷以為然直清臣則禍在轉瞬泄泄沓沓不知不覺已為反賊所用賊既反憲宗詎肯自考平日詔書所行是否耶公卿大臣詎肯感激徒媕婀非與身家有益之事詎肯平反已具之獄辭有司奉行故事又不知不覺使朝廷猶為反者李錡貶不附賊之李清臣矣當其時問上上不知問下下不知而四方萬姓則無不知之而悼歎之盜賊姦宄則無不知之而欣幸之可不畏哉嗟乎人君一身耳而四海九州之欲得利與名者無不蠱惑欺罔之此古先哲王所以心之憂危若蹈虎尾涉於春冰也送南涪州量移澧州序越有納官之令以勝大敵漢有羽林之制以威四夷國家寵先中丞邁古人之烈故君自未成童品常第四人猶曰於古為薄漢北地都尉卬以不勝任啖丐奴而子單侯于瓶濟北相韓千秋以匹夫之諒奮觸南越而子延年侯于成安君之土田之錫猶挫於有司之手始由施州為涪州扞蜀道勍寇晝不釋刃夜不釋甲曰我忠烈允也期死待敵敵亦曰彼忠烈允也盡力致命是不可犯然而筆削之吏以簿書校計贏縮受譴兹郡凡二歲朝廷建大本貞萬邦慶澤之濡洗濯生植又况涪州家聲之大裕蠱之志宜尤被顯寵者也自漢而南州之美者十七八莫若澧澧之佐理莫踰於長吏以是進秩人猶曰且有後命永州多謫吏而君侯惠和溫良故其歡愈異於他部優詔既至而君適讎於文其往也獨故凡羡慕之辭無不加等噫以君承荷之重恭肅之美四方之求忠壯義烈者將於君是觀凡君子之志欲其優柔而益固憤悱而不忘以增太史世家之籍用是為貺則拱璧大鼎烏可以言重乎南涪州南霽雲之子也霽雲忠烈貫日月矣子又繼之蒙矢石蹈白刃而不悔而肉食之鄙夫刀筆之猾吏持其短長求瘢索垢朝廷即據之以行罰更大赦乃得量移與罪人同被新恩此宗元所為痛心也雖為文以賀之實則嗚咽不成聲末則朂其之死靡他以忠於君者孝於親豈非直諒多聞之益友哉送徐從事北遊序讀詩禮春秋莫能言説其容貌充充然而聲名不聞傳於世豈天下廣大多儒而使然歟將晦其説諱其讀不使世得聞傳其名歟抑處於逺仕於逺不與通都大邑豪傑角其伎而至於是歟不然無顯者為之倡以振動其聲歟今之世不能多儒可以蓋生者觀生亦非晦諱其説讀者然則餘二者為之決矣生北遊必至通都大邑通都大邑必有顯者由是其果聞傳於世歟茍聞傳必得位得位而以詩禮春秋之道施於事及於物思不負孔子之筆舌能如是然後可以為儒儒可以説讀為哉仲尼沒而微言絶七十子喪而大義乖老莊楊墨管商申韓田慎諸子百家之説縱橫淆亂而六經之道日以晦邪説橫流人心日趨於禽獸之途於是李斯悉舉而焚之以愚黔首漢興六經始復萌芽諸儒張皇補綴存什一於千百章明諸帝乃求遺書立學官博士天下始知崇聖經末季陵夷晉魏睯昧唐乃復修漢典輯箋注作正義確守漢儒之訓詁不敢決其籓籬韓愈栁宗元知其於義未盡而涉大水無津梁也故韓有師説栁有師針莫不致嘆於不得聖人為依歸耳宋濂洛關閩諸子出始解漢唐之韜而窺周孔之奧文成數萬其旨數千闡明旨趣昭示後學於今賴之矣雖然理則萬古而不變若天時地宜人官物曲考之簡册則殘缺失次考之訓詁則傳聞異辭者今人不得見古人而問之不可以臆決而師心也莽穢榛塞之不除末由之乎九達之道亦可慨矣夫帝王之治天下不以六經取士則何以而士之從事於功名之會者未有不買櫝而還其珠者且如辨髦而因以敝之沿而久之將使朝廷之上無一明經之有司有司既不明而欲明經之士之得進也難矣明而被黜則下必以明為諱又沿而久之將使庠序之間無一明經之士而有司徒以句法字法文氣文勢各從所好以為進退士子之衡以此䇿名禮部升於朝廷俾天子與之共理天下事定太平萬世丕丕基噫亦難矣六經之道果若是其易易乎宗元曰儒可以説讀為哉為之三嘆況乎併未嘗説讀而號曰儒者也送婁圖南秀才遊淮南將入道序僕未冠求進士聞婁君名甚熟其所為歌詩傳詠都中通數經及羣書當時為文章若崔比部于衛尉相與稱其文衆皆曰納言曽孫也而又有是咸推讓為先登後十餘年僕自尚書郎謫來零陵覯婁君猶為白衣居無室宇出無僮御僕深異而訊之乃曰今夫取科者交貴勢倚親戚合則插羽翮生風濤沛焉而有餘吾無有也不則饜飲食馳堅良以歡於朋徒相貿為資相易為名有不諾者以氣排之吾無有也不則多筋力善造請朝夕屈折於恆人之前走髙門邀大車矯笑而偽言卑陬而姁偷偷一且之容以售其伎吾無有也自度卒不能堪其勞故舍之而遊逾湖江出豫章至南海復由桂而下也少好道士言餌藥為夀未盡其術故行且求之僕聞而愈疑往時觀得進士者不必若婁君之言又不能類婁君之文學又無納言之大德以為之祖無比部衛尉以為之知而升名者百數十人今婁君非不足也顧不樂而遁耳因為余留三年他日又曰吾所以求於心者未克今其行也余既異其遁於名而又德其久留於我也故為之言夫君子之出以行道也其處以獨善其身也今天下理平主上亟下求士之詔婁君智可以任職用事文可以宣風歌德行於世必有合其道而進薦之者遽而為處士吾以為非時將曰老而就休耶則甚少且鋭羸而自養耶則甚碩且武問其所以處咸無名焉若茍焉以圖夀為道又非吾之所謂道也夫形軀之寓於土非吾能私之幸而好求堯舜孔子之志唯恐不得幸而遇行堯舜孔子之道唯恐不慊若是而夀可也求之而得行之而慊雖天其誰悲今將以呼噓為食咀嚼為神無事為間不死為生則深山之木石大澤之龜蛇皆老而久其於道何如也僕嘗學於儒持之不得以陷於是以出則窮以處則乖其不宜言道也審矣以吾子見私於僕而又重其去故竊言而書之而密授焉繪科舉秀才不肖之態狀如夏禹鑄鼎開欲求長生者之愚昧如扁鵲發矇送崔子符罷舉詩序世有病進士科者思易以孝悌經術兵農曰庶幾厚於俗而國得以為理乎栁子曰否以今世尚進士故凡天下家推其良公卿大夫之名子弟國之秀民舉歸之且而更其科以為得異人乎無也惟其所尚又舉移而從之尚之以孝悌孝悌猶是人也尚之以經術經術猶是人也雖兵與農皆然曰然則宜如之何曰即其辭觀其行考其智以為可化人及物者隆之文勝質行無觀智無考者下之俗其以厚國其以理科不俟易也今有博陵崔䇿子符者少讀經書為文辭本於孝悌理道多容以善别時剛以知柔進於有司六選而不獲家有寃連伏闕下者纍月不解仕將晚矣而戚其幼孤往復不憚萬里再歲不就選世皆曰仁悌人也如是且不見隆雖百易科其可厚而理乎今夫天下已理民風已厚欲繼之於無窮其在慎是而已朝廷未命有司既命而果得有道者則是術也宜用崔子之仕又何晚乎僕智不足而獨為文故始見進而卒以廢居草野八年麗澤之益鏃礪之事空於耳而荒於心崔子幸來而親余讀其書聽其言發余始志若寤而言夢醒而問醉未及悉而告余以行余懼其悼時之往而不得於內也獻之酒賦之詩而歌之坐者從而和之既和而敘之科不待易蘇軾貢舉議極陳之千秋確論宜取並讀送從弟謀歸江陵序吾與謀由髙祖王父而異謀少吾二歲往時在長安居相邇也與謀皆甚少獨見謀在衆少言好經書心異之其後吾為京兆從事謀來舉進士復相得益知謀盛為文辭通外家書一再不勝懼祿養之緩棄去為廣州從事復佐雍州連得薦舉至御史後以智免歸家江陵有宅一區環之以桑有僮指三百有田五百畝樹之榖藝之麻養有牲出有車無求於人日率諸弟具滑甘豐柔視寒燠之宜其隟則讀書講古人所為求其道之至者以相勵也過永州為吾留信次具道其所為者凡士人居家孝悌恭儉為吏祗肅出則信入則厚足其家不以非道進其身不以茍得時退則退尊老無井臼之勞安和而益夀兄弟衎衎以相友不謀食而食給不謀道而道顯則謀之去進士為從事於逺始也吾疑焉今也吾是焉别九歲而會於此視其貌益偉問其業益習叩其志益堅於呼吾宗不振久矣識者曰今之世稍有人焉若謀之出處庸非所謂人歟或問管仲孔子曰人也謀雖不試於管仲其為道無悖亦可以有是名也抑又聞聖人之道學焉而必至謀之業良矣而又增焉志專矣而又若不足焉孔子之門不道管晏則謀之為人也其可度哉吾不智觸罪擯越楚間六年築室茨草為圃乎湘之西穿池可以漁種黍可以酒甘終為永州民又恨徒費祿食而無所答下愧農夫上慙王官追計往時咎過日夜反覆無一食而安於口平於心若是者豈不以少好名譽嗜味得毒而至於是耶用是愈賢謀之去進士為從事以足其家終始孝悌今雖羡之豈復可得謀在南方有令名其所為日聞於人吾恐謀不幸又為吾之所悔者將已之而不能得可若何然謀以信厚少言蓄其志以周於事雖履吾迹將不至乎吾之禍則謀何悔之有茍能是雖至於大富貴又何栗耶振吾宗者其惟望乎爾君子之道或出或處或默或語唯審乎其義之可否耳既已出而仕矣則東西南北唯君所使奚擇焉宗元之所是從弟謀而悔已者皆無當也獨愛其所云恨徒費祿食而無所答下愧農夫上慚王官追計往時咎過日夜反覆無一食而安於口平於心數語有古君子之風夫宗元擯斥遐陬十四年能不鄙夷其民保惠教誨澤甚厚而其中欿然如是是難能也其文則推廣馬援述弟少遊語意為之氣味亦殊相似送澥序人咸言吾宗宜碩大有積德焉在髙宗時並居尚書省二十二人遭諸武以故衰耗武氏敗猶不能興為尚書吏者間十數歲乃一人永貞年吾與族兄登並為禮部屬吾黜而季父公綽更為刑部郎則加稠焉又觀宗中為文雅者炳炳然以十數仁義固其素也意者復興乎自吾為僇人居南鄉後之頴然出者吾不見之也其在道路幸而過余者獨得澥澥質厚不諂敦朴有裕若器焉必隆然大而後可以有受擇所以入之者而已矣其文蓄積甚富好慕甚正若墻焉必基之廣而後可以有蔽擇其所以出之者而已矣勤聖人之道輔以孝悌復嚮時之美吾於澥焉是望汝往哉見諸宗人為我謝而勉焉無若大山之麓止而不得升也其唯川之不己乎吾去子終老於夷矣若器必隆然大尚德哉若墻必基之廣修辭立其誠矣毋若山而若川逝者無所容心舍其舊而新是圖以善夫方來者則優入聖域不難矣山之止而不得升者自髙也自髙者孔子謂之如有周公之才之美使驕且吝其餘不足觀也已封建論天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也勢不可也勢之來其生人之初乎不初無以有封建封建非聖人意也彼其初與萬物皆生草木榛榛鹿豕狉狉人不能搏噬而且無毛羽莫克自奉自衛荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聽命焉其智而明者所伏必衆告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為羣羣之分其爭必大大而後有兵有德又有大者衆羣之長又就而聽命焉以安其屬於是有諸侯之列則其爭又有大者焉德又大者諸侯之列又就而聽命焉以安其封於是有方伯連帥之類則其爭又有大者焉德又大者方伯連帥之類又就而聽命以安其人然後天下會於一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子自天子至於里胥其德在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事逺矣及有周而甚詳周有天下裂土田而瓜分之設五等邦羣后布履星羅四周於天下輪運而輻集合為朝覲會同離為守臣扞城然而降於夷王害禮傷尊下堂而迎覲者歷於宣王挾中興復古之德雄南征北伐之威卒不能定魯侯之嗣陵夷迄於幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇𢎞者有之天下乖盩無君君之心余以為周之喪久矣徒建空名於公侯之上耳得非諸侯之盛強末大不掉之咎歟遂判為十二合為七國威分於陪臣之邦國殄於後封之秦則周之敗端其在乎此矣秦有天下裂都會而為之郡邑廢侯衛而為之守宰據天下之雄圖都六合之上遊攝制四海運於掌握之內此其所以為得也不數載而天下大壞其有由矣亟役萬人暴其威刑竭其貨賄負鋤梃謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨於下而吏畏於上天下相合殺守劫令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉徇周之制剖海內而立宗子封功臣數年之間奔命扶傷而不暇困平城病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡國居半時則有叛國而無叛郡秦制之得亦以明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域者失不在於州而在於兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者茍其心思遷其秩而已何能理乎余又非之周之事迹斷可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得變其政天子不得變其君私土子人者百不有一失在於制不在於政周事然也秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳大逆未彰姦利浚財怙勢作威大刻於民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒於田叔得魏尚於馮唐聞黃霸之明審覩汲黯之簡靖拜之可也復其位可也卧而委之以輯一方可也有罪得以黜有能得以賞朝拜而不道夕斥之矣夕受而不法朝斥之矣設使漢室盡城邑而侯王之縱令其亂人戚之而己孟舒魏尚之術莫得而施黃霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之締交合從之謀周於同列則相顧裂眥勃然而起幸而不起則削其半削其半民猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓陵替不聞延祚今矯而變之垂二百祀大業彌固何繫於諸侯哉或者又以為殷周聖王也而不革其制固不當復議也是大不然夫殷周之不革者是不得已也蓋以諸侯歸殷者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝殷武王不得而易徇之以為安仍之以為俗湯武之所不得已也夫不得已非公之大者也私其力於已也私其衛於子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣畜於我也然而公天下之端自秦始夫天下之道理安斯得人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聽則又有世大夫世食祿邑以盡其封略聖賢生於其時亦無以立於天下封建者為之也豈聖人之制使至於是乎吾固曰非聖人之意也勢也蘇軾曰秦初并天下丞相綰等言燕齊荆地逺不置王無以鎮之請立諸子始皇下其議羣臣皆以為便廷尉斯曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如仇讐諸侯更相誅伐天子弗能禁止今海內賴陛下神靈一統皆為郡縣諸子功臣供賦稅重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬭不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡郡置守尉監蘇子曰聖人不能為時亦不失時時非聖人之所能為也能不失時而已三代之興諸侯無罪不可奪削因而君之雖欲罷侯置守可得乎此所謂不能為時者也周衰諸侯相并齊晉秦楚皆千餘里其勢足以建侯樹屏至於七國皆稱王行天子之事然終不封諸侯不立強家世卿者以魯三桓晉六卿齊田氏為戒也久矣世之畏諸侯之禍也非獨李斯始皇知之始皇既并天下分郡邑置守宰理固當然如冬裘夏葛時之所宜非人之私智獨見也所謂不失時者而學士大夫多非之漢髙又欲立六國後張子房以為不可世未有非之者李斯之論與子房何異世特以成敗為是非耳髙帝聞子房之言吐哺罵酈生知諸侯之不可復明矣然卒王韓彭英盧豈獨髙帝子房亦與焉故栁宗元曰封建非聖人意也勢也昔之論封建者曹元首陸機劉頌及唐太宗時魏徴李百藥顔師古其後則劉秩杜祐栁宗元宗元之論出而諸子之論廢矣雖聖人復起不能易也故吾取其説而附益之曰凡有血氣必爭爭必以利利莫大於封建封建者爭之端而亂之始也自書契以來臣弒其君子弒其父父子兄弟相賊殺有不出於襲封而爭位者乎自三代聖人以禮樂教化天下至刑措不用然終不能已篡弒之禍至漢以來君臣父子相賊虐者皆諸侯王子孫其餘卿大夫不世襲者蓋未嘗有也近世無復封建則此禍幾絶仁人君子忍復開之歟故吾以李斯始皇之言栁宗元之論當為萬世法也御選唐宋文醇卷十五
