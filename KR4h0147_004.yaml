body:
  text: 昌黎韓愈文四書序與馮宿論文書答劉正夫書答陳生書答吕醫山人書與鄂州栁中丞書第二首上留守鄭相公啓送竇從事序送孟東野序上已日燕太學聽彈琴詩序送陳密序送李願歸盤谷序送董邵南序贈崔復州序贈張童子序欽定四庫全書御選唐宋文醇卷四昌黎韓愈文四與馮宿論文書辱示初筮賦實有意思但力為之古人不難到但不知直似古人亦何得於今人也僕為文久每自測意中以為好則人必以為惡矣小稱意人亦小怪之大稱意即人必大怪之也時時應事作俗下文字下筆令人慙及示人則人以為好矣小慙者亦蒙謂之小好大慙者即必以為大好矣不知古文直何用於今世也然以俟知者知耳昔揚子雲著太玄人皆笑之子雲之言曰世不我知無害也後世復有揚子雲必好之矣子雲死近千載竟未有揚子雲可歎也其時桓談亦以為雄書勝老子老子未足道也子雲豈止與老子爭強而已乎此未為知雄者其弟子侯芭頗知之以為其師之書勝周易然侯之他文不見於世不知其人果如何耳以此而言作者不祈人之知也明矣直百世以俟聖人而不惑質諸鬼神而不疑耳足下豈不謂然乎近李翺從僕學文頗有所得然其人家貧多事未能卒其業有張籍者年長於翺而亦學於僕其文與翺相上下一二年業之庶幾乎至也然閔其棄俗尚而從於寂寞之道以之爭名於時也久不談聊感足下能自進於此故復發憤一道愈再拜凡有血氣皆有爭心人心之不同如其靣焉故雖末藝鄙事欲造其至皆不祈人之知而惟求已之是謂夫已所獨知者本不得有人知之理也雖然逮其是也則必合乎離血氣而存之性離血氣而存之性貊與越一人也黃農虞夏與今一時也則又人必知之而不得有終於已獨知之之理也昌黎之於文於此實深喻之深喻之則藝也進乎道矣至其以揚雄為勝老子又述侯芭勝周易之語所為溺愛者不明逮其作送王塤序述孟荀而不及揚則晚年更進一籌矣答劉正夫書愈白進士劉君足下辱箋教以所不及既荷厚賜且愧其誠然幸甚幸甚凡舉進士者於先進之門何所不往先進之於後輩茍見其至寧可以不答其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也有來問者不敢不以誠答或問為文宜何師必謹對曰宜師古聖賢人曰古聖賢人所為書具存辭皆不同宜何師必謹對曰師其意不師其辭又問曰文宜易宜難必謹對曰無難易惟其是爾如是而已非固開其為此而禁其為彼也夫百物朝夕所見者人皆不注視也及覩其異者則共觀而言之夫文豈異於是乎漢朝人莫不能為文獨司馬相如太史公劉向揚雄為之最然則用功深者其收名也逺若皆與世沈浮不自樹立雖不為當時所怪亦必無後世之傳也足下家中百物皆賴而用也然其所珍愛者必非常物夫君子之於文豈異於是乎今後進之為文能深探而力取之以古聖賢人為法者雖未必皆是要若有司馬相如太史公劉向揚雄之徒出必自於此不自於尋常之徒也若聖人之道不用文則已用則必尚其能者能者非他能自樹立不因循者是也有文字來誰不為文然其存於今者必其能者也顧常以此為説耳愈於足下忝同道而先進者又常從遊於賢尊給事既辱厚賜又安得不進其所有以為答也足下以為何如愈白李光地曰宋人謂程伊川三代以下凡事必求其是者伊川一人而已伊川之門上蔡謝氏則以求是二字為窮理之要公此篇以求是論文噫此其所以獨出於諸家歟答陳生書愈白陳生足下今之負名譽享顯榮者在上位幾人足下求速化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤教之云云未有見其得者也愈之志在古道又甚好其言辭觀足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虛辱聊為足下誦其所聞蓋君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在已者仁義存乎內彼聖賢者能推而廣之而我蠢焉為衆人所謂順乎在天者貴賤窮通之來平吾心而隨順之不以纍於其初所謂待已以信者已果能之人曰不能勿信也已果不能人曰能之勿信也孰信哉信乎已而已矣所謂事親以誠者盡其心不夸於外先乎其質後乎其文者也盡其心不夸於外者不以已之得於外者為父母榮也名與位之謂也先乎其質者行也後乎其文者飲食旨甘以其外物供養之道也誠者不欺之名也待於外而後為養薄於質而厚於文斯其不類於欺歟果若是子之汲汲於科名以不得進為親之羞者惑也速化之術如是而己古之學者惟義之問誠將學於太學愈猶守是説而俟見焉愈白朱子曰陳生以書求速化之術於公公以待己以信事親以誠告與言寡尤行寡悔之説無異君子之言自衆人視之雖若迂濶而其理實如此答吕醫山人書愈白惠書責以不能如信陵執轡者夫信陵戰國公子欲以取士聲勢傾天下而然耳如僕者自度若世無孔子不當在弟子之列以吾子始自山出有朴茂之美意恐未礱磨以世事又自周後文弊百子為書各自名家亂聖人之宗後生習傳雜而不貫故設問以觀吾子其已成熟乎將以為友也其未成熟乎將以講去其非而趨是耳不如六國公子有市於道者也方今天下入仕惟以進士明經及卿大夫之世耳其人率皆習熟時俗工於語言識形勢善候人主意故天下靡靡日入於衰壞恐不復振起務欲進足下趨死不顧利害去就之人於朝以爭救之耳非謂當今公卿間無足下輩文學知識也不得以信陵比然足下衣破衣繫麻鞋率然叩吾門吾待足下雖未盡賔主之道不可謂無意者足下行天下得此於人蓋寡乃遂能責不足於我此真僕所汲汲求者議雖未中節其不肯阿曲以事人者灼灼明矣方將坐足下三浴而三熏之聽僕之所為少安無躁愈頓首唐承晉魏之後六經晦塞昌黎思掃其榛蕪務張而明之旁搜逺紹孤而無鄰故每以顔子得聖人為依歸則簞瓢自樂為易易深悲已之不得所依歸也其於經生如殷侑輩勤綣請問辭氣加敬遇山野之士必設問以觀其成熟與否蓋可見求其友生以為錯攻玉平生殆無往不然歟設與程朱生同時則其所造詣必更有進且其與張籍書所云請待五六十然後為書者究亦未及作也其胸中所藴流落人間者泰山一豪茫亦可慨矣若其裁山人之狂簡渴益友之直諒聲出金石胸羅羲娥又磊落而英多哉與鄂州柳中丞書第二首愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蚊蚋蟻蟲之聚感凶竪喣濡飲食之惠提童子之手坐之堂上奉以為帥出死力以抗逆明詔戰天下之兵乘機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒洛汝襄荆許潁淮江為之騷然丞相公卿士大夫勞於圗議握兵之將熊熊貙虎之士畏懦蹙蹜莫肯仗戈為士卒前行者獨閣下奮然率先揚兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒穎凛然有向敵之意用儒雅文字章句之業取先天下武夫關其口而奪之氣愚初聞時方食不覺棄匕箸起立豈以為閣下真能引孤軍單進與死寇角逐爭一旦僥幸之利哉就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輒述鄙誠眷惠手翰還答益增欣悚夫一衆人心力耳目使所至如時雨三代用師不出是道閣下果能充其言繼之以無倦得形便之地甲兵足用雖國家故所失地旬嵗可坐而得况此小冦安足置齒牙間勉而卒之以俟其至幸甚夫逺徴軍士行者有羈旅離别之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形勢銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人必得豪勇與賊相熟知其氣力所極無望風之驚愛護鄉里勇於自戰徴兵滿萬不如召募數千閣下以為何如儻可上聞行之否計已與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜唐書柳公綽傳為鄂嶽觀察使時方討吳元濟詔發鄂嶽卒五千𨽻安州刺史李聽公綽曰朝廷謂吾儒生不知兵耶即請自行許之引兵渡江每戰輒克上留守鄭相公啓愈啓愈為相公官屬五年辱知辱愛伏念曽無絲毫事為報答效日夜思慮謀畫以為事大君子當以道不宜茍且求容恱故於事未嘗敢疑惑宜行則行宜止則止受容受察不復進謝自以為如此真得事大君子之道今雖蒙沙汰為縣固猶在相公治下未同去離門牆為故吏為形迹嫌疑改前所為以自疏外於大君子固當不待煩説於左右而後察也人有告人辱罵其妹與妻為其長者得不追而問之乎追而不至為其長者得不怒而杖之乎坐軍營操兵守禦為留守出入前後驅從者此真為軍人矣坐坊市賣餅又稱軍人則誰非軍人也愚以為此必姦人以錢財賂將吏盜相公文牒竊注名姓於軍籍中以陵駕府縣此固相公所欲去奉法吏所當嫉雖捕繫杖之未過也昨聞相公追捕所告受辱罵者愚以為大君子為政當有權變始似小異要歸於正耳軍吏紛紛入見告屈為其長者安得不小致為之之意乎未敢以此仰疑大君子及見諸從事説則與小人所望信者少似乖戾雖然豈敢生疑於萬一必諸從事與諸將吏未能去朋黨心蓋覆黤黮不以真情狀白露左右小人受私恩良久安敢閉蓄以為私恨不一二陳道伏惟相公憐察幸甚幸甚愈無適時才用漸不喜為吏得一事為名可自罷去不啻如棄涕唾無一分顧藉心顧失大君子纎芥意如丘山重守官去官惟今日指揮愈惶懼再拜朱子曰元和五年冬改河南令以軍人事辨於留守鄭公其言剴切其退甚輕偉乎史所謂篤道君子也送竇從事序踰甌閩而南皆百越之地於天文其次星紀其星牽牛連山隔其隂巨海敵其陽是維島居卉服之民風氣之殊著自古昔唐之有天下號令之所加無異於逺近民俗既遷風氣亦隨雪霜時降癘疫不興瀕海之饒固加於初是以人之之南海者若東西州焉皇帝臨天下二十有二年詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辭進於其行也其族人殿中侍御史牟合東都交遊之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之逺也又樂貽周之愛其族叔父能合文辭以寵榮之作送竇從事少府平序唐室重內輕外匪特輕外也其遐方邊徼朝士得罪者乃之官焉地莫非王土民莫非赤子其逺於京師君相耳目之所難及則俾牧斯民撫斯土者宜較近地有加意必忠信慈惠才行卓犖世所共仰之人乃宜居之而以為罪臣責逐之所何其倒置也竇平為廣州從事蓋人情所不釋然者故昌黎文以開之送孟東野序大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推敓其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴其在唐虞咎陶禹其善鳴者也而假以鳴夔弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非眘到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也就其善者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章將天醜其德莫之顧邪何為乎不鳴其善鳴者也唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晉不懈而及於古其他浸淫乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸邪三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之朱子曰據本集貞元十九年與陳給事書云送孟郊序一首生紙寫不加裝飾此序吕汲公以為是年作序云東野之役於江南也有若不釋然者時東野為溧陽尉云上已日燕太學聽彈琴詩序與衆樂之之謂樂樂而不失其正又樂之尤也四方無鬭爭金革之聲京師之人既庶且豐天子念致理之艱難樂居安之間暇肇置三令節詔公卿羣有司至於其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也三月初吉實惟其時司業武公於是總太學儒官三十有六人列燕於祭酒之堂樽俎既陳肴羞帷時盞斚序行獻酬有容歌風雅之古辭斥夷狄之新聲裦衣危冠與與如也有儒一生魁然其形抱琴而來歷階以升坐於樽俎之南鼓有虞氏之南風賡之以文王宣父之操優遊夷愈廣厚髙明追三代之遺音想舞雩之詠歎及暮而退皆充然若有得也武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之子貢觀於蠟子曰賜也樂乎子貢曰一國之人皆若狂賜未知其樂也子曰賜非爾所知也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也唐貞元間詔正月晦日三月三日九月九日三節日宜任文武百僚選勝地追賞為樂亦古者通蠟之遺意雖然順成之方其蠟乃通若德宗時叛將強臣羅列天下及間暇以明政刑猶懼弗惎當張而弛其事不足書也而彈琴以詠先王之風如見舞雩沂水之意又可紀也文意固兩具之送陳密序太學生陳密請於余曰密承訓於先生今將歸覲其親不得朝夕見願先生賜之言密將以為戒密來太學舉明經纍年不獲選是弗利於是科也今將易其業而三禮是習願先生之張之也密將以為鄉榮余愧乎其言遺之言曰子之業信習矣其容信合於禮矣抑吾所見者外也夫外不足以信內子誦其文則思其義習其儀則行其道則將謂子君子也爵祿之來也不可辭矣科寧有利不利邪學於大學以明先王之經而唯資以發䇿決科其陋出老佛下也科有不利則易其業而他經是習以此請於博士又乞文以張之太學生之於經也如此賢博士所聞而慙者也故昌黎曰余愧乎其言送李願歸盤谷序太行之陽有盤谷盤谷之間泉甘而土肥草木叢茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李願居之願之言曰人之稱大丈夫者我知之矣利澤施於人名聲昭於時坐於廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞塗供給之人各執其物夾道而疾馳喜有賞怒有刑才畯滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妒寵而負情爭妍而取憐大丈夫之遇知於天子用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升髙而望逺坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅處穢汙而不羞觸刑辟而誅戮徼幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土可以稼盤之泉可濯可沿盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無殃虎豹逺迹兮蛟龍遁藏鬼神守護兮呵禁不祥飲則食兮夀而康無不足兮奚所望膏吾車兮秣吾馬從子於盤兮終吾生以徜徉東坡云歐陽公言晉無文章惟陶淵明歸去來辭而已余謂唐無文章惟韓退之送李願歸盤谷序而已平生欲效此作每執筆輒罷因自笑曰不若且放教退之獨步後世遂以東坡之言為信然矣東坡好滑稽觀不若且放教退之獨步一語可見蓋自嘆不能企及乃從而為之辭耳豈真唐之文章止此一序也六一所云晉無文章止歸去來辭一首亦屬難信或六一以晉宋間龍戰於野其人果賢者宜皆辟世若淵明者言而履之可謂真文章也是以為是説耶送董邵南序燕趙古稱多感慨悲歌之士董生舉進士連不得志於有司懷抱利器鬱鬱適兹土吾知其必有合也董生勉乎哉夫以子之不遇時茍慕義強仁者皆愛惜焉矧燕趙之士出乎其性者哉然吾嘗聞風俗與化移易吾惡知其今不異於古所云邪聊以吾子之行卜之也董生勉乎哉吾因子有所感矣為我弔望諸君之墓而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可以出而仕矣朱子云邵南夀州安豐人舉進士不得志去遊河北公作此送之公詩有嗟哉董生行亦為邵南作也此篇言燕趙之士仁義出於其性乃故反其詞以深譏其不臣而習亂之意其卒章又為道上威德以警動而招徠之其旨微矣讀者詳之贈崔復州序有地數百里趨走之吏自長史司馬已下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼丈夫官至刺史亦榮矣雖然幽逺之小民其足迹未嘗至城邑茍有不得其所能自直於鄉里之吏者鮮矣況能自辨於縣吏乎能自辨於縣吏者鮮矣況能自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無恆水旱癘疫之不期民之豐約懸於州縣令不以言連帥不以信民就窮而斂愈急吾見刺吏之難為也崔君為復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難為者將在於此乎愈嘗辱于公之知而舊遊於崔君慶復人之將蒙其休澤也於是乎言父天母地子萬民曰天子由血氣而分之則各子其子由理氣而分之天下莫不子也理氣者血氣之主則子萬民者較子其子為更切焉而非虛言其理而實無其事者也子有不能呼籲其父母則行道傷之民有不能呼籲其大君則莫之省憂者理之不明而道之不行也惟其形隔勢暌是以設官分職大以遞統小小以遞承大使萬里之逺億兆之衆皆得以情達於天子天子得以盡其父母之責焉爾然而龍蛇混雜蒼黃交眩大吏欲達而小吏蔽之小吏欲達而大吏壅之且大小朋比而專以罔其上唯身之名位是保民之性命非所問於是九重之上奚翅水旱癘疫之不聞賊民興良民肝腦塗地而方且以為無纖芥事者史册所載有不盡寧有虗哉成湯栗栗危懼若將隕於深淵良有以也欲為君盡君道欲為臣盡臣道當於此等文字反覆循環推類以盡其餘庶幾赤子得養於其父母乎贈張童子序天下之以明二經舉於禮部者嵗至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府總其屬之所升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司者總州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部嵗不及二百人謂之出身能在是選者厥惟艱或二經章句僅數十萬言其傳注在外皆誦之又約知其大説由是舉者或逺至十餘年然後與乎三千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣班白之老半焉昏塞不能及者皆不在是限有終身不得與者焉張童子生九年自州縣達禮部一舉而進立於二百之列又二年益通二經有司復上其事由是拜衛兵曹之命人皆謂童子耳目明達神氣以靈余亦偉童子之獨出於等夷也童子請於其官之長隨父而寧母嵗八月自京師道陜南至虢東及洛師北過大河之陽九月始來及鄭自朝之聞人以及五都之伯長羣吏皆厚其餼賂或作歌詩以嘉童子童子亦榮矣雖然愈將進童子於道使人謂童子求益者非欲速成者夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非盡於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子勇力材技智慧皆得乎天而不可強然而所性不存焉固無足為人之重輕也骨騰肉飛曵牛磔石臨死生而狐疑噤瘁則不如迎風則僵順風則伏者矣目覽辭訟手答箋書耳行聽受口並酬應不相參涉皆悉贍舉以此行其私而濟其不仁則不如木僵拙訥無能為役者矣人之智慧何獨不然下筆便成過目成誦又特智慧中之一端耳佛氏之説曰神通本宿因亦謂與性無涉也人之有勇力材技智慧當思天之生材之難纍千纍萬而無一人務成其美以為國家之用已之有勇力材技智慧當知與能飲健啖無二無别無足矜者務力於學以成其人毋使斯世目為尤物焉可也如張童子者後乃無聞徒以十一嵗通二經名於後世兹榮也兹所以為愧也夫御選唐宋文醇卷四
