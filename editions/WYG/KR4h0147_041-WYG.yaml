body:
  text: 眉山蘇軾文四論禮以養人為本論既醉備五福論詩論禮論論閏月不告朔猶朝於廟宋襄公論伊尹論周公論欽定四庫全書御選唐宋文醇巻四十一眉山蘇軾文四禮以養人為本論二代之衰至於今且數千嵗豪傑有意之主博學多識之臣不可以勝數矣然而禮廢樂墜則相與咨嗟發憤而卒於無成者何也是非其才之不逮學之不至過於論之太詳畏之太甚也夫禮之初始諸人情因其所安者而為之節文凡人情之所安而有節者舉皆禮也則是禮未始有定論也然而不可以出於人情之所不安則亦未始無定論也執其無定以為定論則塗之人皆可以為禮今儒者之論則不然以為禮者聖人之所獨尊而天下之事最難成者也牽於繁文而拘於小說有毫毛之差則終身以為不可論明堂者惑於考工吕令之說議郊廟者泥於鄭氏王肅之學紛紛交錯者屢嵗而不決或因而遂罷未嘗冇一人果斷而決行之此皆論之太詳而畏之太甚之過也夫禮之大意存乎明天下之分嚴君臣篤父子形孝弟而顯仁義也今不幸去聖人逺有如毫毛不合於三代之法固未害其為明天下之分也所以嚴君臣篤父子形孝弟而顯仁義者猶在也今使禮廢而不修則君臣不嚴父子不篤孝弟不形仁義不顯反不足重乎昔者西漢之書始於仲舒而至於劉向悼禮樂之不興故其言曰禮以養人為本如有過差是過而養人也刑罰之過或至殺傷今吏議法筆則筆削則削而至禮樂則不敢是敢於殺人而不敢於養人也而范􅋫以為樂非夔襄而新音代作律謝皋蘇而法令亟易而至於禮獨何難歟夫法者末也又加以慘毒繁難而天下常以為急禮者本也又加以和平簡易而天下常以為緩如此而不治則又從而尤之曰是法未至也則因而急之甚矣人之惑也平居治氣養生宣故而納新其行之甚易其過也無大患然皆難之而不為悍藥毒石以搏去其疾則皆為之此天下之公患也嗚呼王者得斯說而通之禮樂之興庶乎有日矣推明董仲舒劉向之意以立言雖未嘗於漢書禮樂志外别有發明然固古今要論亦足見其所述之知所擇也雖然論則要矣而自董劉以後迄於蘇軾千餘年而三代之禮不可作自蘇軾迄於今又將千年而要亦無異於董劉時者豈其間遂無豪傑有意之主博學多識之臣讀董仲舒劉向蘇軾之論而慨然興起者乎而何以寂爾也葢禮者動於五性之中而貫徹於五倫之内即是率性盡倫之實事而非别有繁文曲節之可言也是故五性盡而五倫明五倫明而天下治而禮在其中矣基諸深宫之中達諸海隅之逺非一手一足之烈一時一事之間所可得志故曰禮樂百年而後興必也元首明而股肱良立綱陳紀始正其大而漸及其細子孫相承守其巳善而補其未善使人人自得其性自叙其倫則舉其所己行之成迹而載之典冊曰禮也云爾記曰王者治定制禮豈治定之後别聚文學之士纂輯一書謂之制禮哉凡其治定之迹皆可以為禮而世守之也若於率性盡倫之大未知如何而專取周旋揖讓升降俯仰之文命之為禮欲四海之大莫不遵而行之宜其議之如聚訟而頒之海内詔書來但挂壁也劉向曰禮以養人刑以殺人制刑則不忌制禮則不敢是敢於殺人而不敢於養人也信巳然此養人之禮制之朝廷而行之四海四海不行則將任之乎抑刑之也必曰刑以弼教矣然則民之多辟業巳不勝其法網之宻忍又為是周旅揖讓升降俯仰之繁文末節而階之為禍乎如曰任之則所為制禮者不過宇内多此數巻文字而亦不足以養人矣然則禮固不可為為之其必無日乎曰事在勉强而巳率性盡倫不可一刻廢則何嘗一刻不為禮也若其可以成之為一代之禮而足當為國以禮之目則非可以蘄其名而飾其貌者也且記固曰禮不下庶人刑不上大夫矣乃漢唐以來雖三公可朝爵邑而夕罪隸至於儀節之末則襏襫之夫皆欲其奉行則巳非禮也己無怪其不能行而為具文也誠使君公士大夫相與納身軌物朝夕講貫而修習之且勿責之庶民及其至也上行下效萬民自有馴致之勢焉此其所當勉强者也既醉備五福論君子之所以大過人者非以其智能知之彊能行之也以其功興而民勞與之同勞功成而民樂與之同樂如是而巳矣富貴安逸者天下之所同好也然而君子獨享焉享之而安天下以為當然者何也天下知其所以富貴安逸者凡以庇覆我也貧賤勞苦者天下之所同惡也而小人獨居焉居之而安天下以為當然者何也天下知其所以貧賤勞苦者凡以生全我也夫然故獨享天下之大利而不憂使天下為巳勞苦而不怍耳聴天下之備聲目視天下之備色而民猶以為未也相與禱祠而祈祝曰使吾君長有吾國也又相與詠􅁔而稱頌之被於金石溢於竹帛使其萬世而不忘也嗚呼彼君子者獨何修而得此於民哉豈非始之以至誠中之以不欲速而終之以不懈歟視民如視其身待其至愚者如其至賢者是謂至誠至誠無近效要在於自信而不惑是謂不欲速不欲速則能久久則功成功成則易懈君子濟之以恭是謂不懈行此三者所以得之於民也三代之盛不能加毫末於此矣既醉者成王之詩也其序曰既醉太平也醉酒飽德人有士君子之行焉而說者以為是詩也實具五福其詩曰君子萬年壽也介爾景福富也室家之壺康寧也昭明有融攸好德也髙朗令終考終命也凡言此者非美其有是五福也美其全享是福兼有是樂而天下安之以為當然也夫詩者不可以言語求而得必將深觀其意焉故其譏刺是人也不言其所為之惡而言其爵位之尊車服之美而民疾之以見其不堪也君子偕老副笄六珈赫赫師尹民具爾曕是也其頌美是人也不言其所為之善而言其冠佩之華容貌之盛而民安之以見其無媿也緇衣之宜兮敝予又改為兮服其命服朱芾斯皇是也故既醉者非徒享是五福而巳必將有以致之不然民將盻盻焉疾視而不能平又安能獨樂乎是以孟子言王道不言其他而獨言民之聞其作樂見其田獵而欣欣者此可謂知本矣至誠不欲速不懈三語聖學聖治之本矣然而本之中又有本焉使無以實見乎天理民彞之極致萬事萬物之當然則雖愛民發於至誠而愛之轉以害之加以自信而不惑厯久而不懈豈不滋病乎神宗之青苗等法實欲利國利民非有私也特以不明物理不達人情愈至誠愈不欲速愈不懈愈謬以千里故大學曰欲誠其意者先致其知致知在格物既醉備五福而以昭明有融為攸好德非此之謂歟詩論自仲尼之亡六經之道遂散而不可解葢其患在於責其義之太深而求其法之太切夫六經之道惟其近於人情是以久傳而不廢而世之迂學乃欲曲為之說雖其義之不至於此者必彊牽合以為如此故其論委曲而莫通也夫聖人之為經惟其禮與春秋合然後無一言之虚而莫不可考然猶未嘗不近於人情至於書出於一時言語之間而易之文為卜筮而作故時亦有所不可前定之說此其於法度已不如春秋之嚴矣而況詩者天下之人匹夫匹婦羈臣賤隸悲憂愉佚之所為作也夫天下之人自傷其貧賤困苦之憂而自述其豐美盛大之樂上及於君臣父子天下興亡治亂之迹而下及於飲食牀第昆蟲草木之類葢其中無所不具而尚何以繩墨法度區區而求諸其間哉此亦足以見其志之無不通矣夫聖人之於詩以為其終要入於仁義而不責其一言之無當是以其意可觀而其言可通也今之詩傳曰殷其雷在南山之陽出自北門憂心殷殷揚之水白石鑿鑿終朝采綠不盈一掬瞻彼洛矣維水泱泱若此者皆興也而至於闗闗雎鳩在河之洲南有樛木葛藟纍之南有喬木不可休息維鵲有巢維鳩居之喓喓草蟲趯趯阜螽若此者又皆興也其意以為興者有所象乎天下之物以自見其事故凡詩之為此事而作其言有及於是物者則必彊為是物之說以求合其事葢其為學亦己勞矣且彼不知夫詩之體固有比矣而皆合之以為興夫興之為言猶曰其意云爾意有所觸乎當時時巳去而下可知故其類可以意推而不可以言解也殷其雷在南山之陽此非有所取乎雷也葢必其當時之所見而有以動乎其意故後之人不可以求得其說此其所以為興也嗟夫天下之人欲觀於詩其必先知比興若夫闗闗雎鳩在河之洲是誠有取於其摰而有别是以謂之比而非興也嗟夫天下之人欲觀於詩其先知夫興之不可與比同而無强為之說以求合其當時之事則夫詩之意庶乎可以意曉而無勞矣分别比興千古定論若夫雎鳩摰而有别謂是比而非興猶是沿習詁訓而未思也闗雎只是興聞其闗闗和鳴見其在河之洲因以起興云爾其謂摰而有别正軾所謂刻求之過昔人不云乎雎鳩既是鶚類不應以凶殘猛鷙之鳥比淑女君子矣若其所稱書出於一時之語言易不若春秋之謹嚴語頗率爾讀者節取焉可也儲欣曰如漢唐注疏云云是古序所謂詩有六義者蚤缺其一矣前後相沿不悟得明眼人拈出然後六義具而詩教明其有功經籍如此徒竊蘇張之緒餘者能乎哉亦好詆之過也禮論昔者商周之際何其為禮之易也其在宗廟朝廷之中籩豆簠簋牛羊酒醴之薦交於堂上而天子諸侯大夫卿士周旋揖讓獻酬百拜樂作於下禮行於上雍容和穆終日而不亂夫古之人何其知禮而行之不勞也當此之時天下之人惟其習慣而無疑衣服器皿冠冕佩玉皆其所常用也是以其人入於其間耳目聰明而手足無所忤其身安於禮之曲折而其心不亂以能深思禮樂之意故其㢘恥退讓之節睟然見於面而盎然發於其躬夫是以能使天下觀其行事而忘其暴戾鄙野之氣至於後世風俗變易更數千年以至於今天下之事已大異矣然天下之人尚皆記録三代禮樂之名詳其節目而習其俯仰冠古之冠服古之服而御古之器皿傴僂拳曲勞苦於宗廟朝廷之中區區而莫得其紀交錯紛亂而不中節此無足怪也其所用者非其素所習也而彊使焉甚矣夫後世之好古也昔者上古之世葢嘗有巢居穴處汙樽抔飲燔黍捭豚蕢桴土鼓而以為是足以養生送死而無以加之者矣及其後世聖人以為不足以大利於天下是故易之以宫室新之以籩豆鼎俎之器以濟天下之所不足而盡太古之法惟其祭祀以交於鬼神乃始薦其血毛豚解而腥之體解而爛之以為是不忘本而非以為後世之禮不足用也是以退而體其犬豕牛羊實其簠簋籩豆鉶羮以極今世之美未聞其牽於上古之說選愞而不決也且方今之人佩玊服黻冕而垂旒拱手而不知所為而天下之人亦且見而笑之是何所復望於其有以感發天下之心哉且又有所大不安者宗廟之祭聖人所以追求先祖之神靈庶幾得而享之以安卹孝子之志者也是以思其平生起居飲食之際而設其器用薦其酒食皆從其生以冀其來而安之而後世宗廟之祭皆用三代之器則是先祖終莫得而安也葢三代之時席地而食是以其器用各因其所便而為之髙下大小之制今世之禮坐於牀而食於牀上是以其器不得不有所變雖正使三代之聖人生於今而用之亦將以為便安故夫三代之視上古猶今之視三代也三代之器不可復用矣而其制禮之意尚可依倣以為法也宗廟之祭薦之以血毛重之以體薦有以存古之遺風矣而其餘者可以易三代之器而用今世之所便以從鬼神之所安惟其春秋社稷釋奠釋菜凡所以享古之鬼神者則皆從其器葢周人之祭蜡與田祖也吹葦籥擊土鼓此亦各從其所安耳嗟夫天下之禮宏闊而難言自非聖人而何以處此故夫推之而不明講之而不詳則愚實有罪焉惟其近於正而易行庶幾天下之安而徙之是則有取焉耳軾與二程同在元祐朝伊川好用古禮軾意不然兩家弟子遂至互相抗侮竟成洛黨蜀黨之目元豐羣小方睽睽伺隙而諸賢不悟自相謗毁至紹聖初乃盡竄嶺海可哀也夫禮者何仁之見諸行事者也禮有古今仁亦有古今耶茍可以達吾之仁於君臣父子兄弟夫婦朋友之間是則為禮禮云禮云玉帛云乎哉軾之論實有得乎禮之意雖聖人復起不易者也雖然仁之難成久矣必協於無過不及之中而後禮具而仁以昭然則雖有聖人亦不能不監於往古之成憲以求其無過不及之中也明矣縱或信古太篤泥古太深要亦不失為古訓是式威儀是力之君子而軾虐謔之樂聞軾說者遂於好用古禮之人如見怪物焉則又豈禮也哉洛黨不能堪於是朱光庭賈易輩遂以謗訕朝廷誣軾等則更為至無禮而大不仁也己讀軾禮論軾之本意自明洛蜀兩家得失之故亦具可考軾不云乎推之而不明講之而不詳則愚實有罪焉然則軾又何嘗謂古禮可盡廢哉論閏月不告朔猶朝於廟春秋之文同其所以為義異者君子觀其意之所在而已矣先儒之論閏月不告朔者牽乎猶朝於廟之說而莫能以自解也春秋之所以書猶者二曰如此而猶如此者甚之之詞也辛巳有事於太廟仲遂卒於垂壬午猶繹是也曰不如此而猶如此者幸之之詞也不郊猶三望閏月不告朔猶朝於廟是也夫子傷周道之殘缺而禮樂文章之壊也故區區焉掇拾其遺亡以為其全不可得而見矣得見一二斯可矣故書曰猶朝於廟者傷其不告朔而幸其猶朝於廟也夫子之時告朔之禮亡矣而有餼羊者存焉夫子猶不忍去以志周公之典則其朝於廟者乃不如餼羊之足存歟公羊傳曰曷為不言告朔天無是月也穀梁傳曰閏月者附月之餘日也天子不以告朔而喪事不數也而皆曰猶者可以己也是以其幸之之詞而為甚之之詞宜其為此異端之說也且夫天子諸侯之所為告朔聴政者以為天歟為民歟天無是月而民無是月歟彼其孝子之心不欲因閏月以廢喪紀而人君乃欲假此以廢政事歟夫周禮樂之衰豈一日之故有人焉開其端而莫之禁故其漸遂至於掃地而不可救文十六年夏六月公四不視朔公羊傳曰公有疾也何言乎公有疾不視朔自是公無疾不視朔也故夫有疾而不視朔者無疾而不視朔之原也閏月而不告朔者常月而不告朔之端也聖人憂焉故謹而書之所以記禮之所由廢也左氏傳曰閏以正時時以作事事以厚生生民之道於是乎在不告閏朔棄時政也何以為民而杜預以為雖朝於廟則如勿朝以釋經之所書猶之意是亦曲而不通矣據論語以駁公穀其解甚確宋襄公論魯僖公二十二年冬十月一日已巳朔宋公及楚人戰於泓宋師敗績春秋書戰未有若此之嚴而盡也曰宋公天子之上公宋先代之後於周為客天子有事膰焉有喪拜焉非列國諸侯之所敢敵也而曰及楚人戰於泓楚夷狄之國人微者之稱以天子之上公而當夷狄之微者至於敗績宋公之罪葢可見矣而穀梁之傳以為文王之師不過是學者疑焉故不可以不辨宋襄公非獨行仁義而不終者也以不仁之資盜仁者之名爾齊宣有牽牛而過堂下者曰牛何之曰將以釁鐘王曰舍之吾不忍其觳􅑌若無罪而就死地夫舍一牛於德未有所損益者而孟子與之以王所謂以不忍人之心行不忍人之政三代之所共也而宋襄公執鄫子用於次雎之社君子殺一牛猶不忍而宋公戕一國君若犬豕然而忍為之天下孰有不忍者耶泓之役身敗國衂乃欲以不重傷不禽二毛欺諸侯人能紾其兄之臂以取食而能忍飢於壺餐者天下知其不情也襄公能忍於鄫子而不能忍於重傷二毛此豈可謂其情也哉桓文之師存亡繼絶猶不齒於仲尼之門況用人於夷鬼以求霸而謂王者之師可乎使鄫子有罪而討之雖聲於諸侯而戮於社天下不以為過若以喜怒興師則秦穆公獲晉侯且猶釋之而況敢用諸淫昏之鬼乎以愚觀之宋襄公王莽之流襄公以諸侯為可以名得王莽以天下為可以文取也其得喪小大不同其不能欺天下則同也其不鼓不成列不能損襄公之虐其抱孺子而泣不能葢王莽之簒使莽無成則宋襄宋襄得志亦一莽也古人有言圖王不成其弊猶足以霸襄公行王者之事猶足以當桓公之師一戰之餘救死扶傷不暇此獨妄庸耳齊桓晉文得管仲子犯而興襄公有一子魚不能用豈可同日而語哉自古失道之君如是者多矣死而論定未有如宋襄公之欺於後世者也儲欣云宋襄舉動煩擾雖得天下不能一朝居也的與王莽一轍然吾謂五霸列宋襄此相傳之謬說其實非也五霸若并前世言之周止有二焉齊桓晉文而巳若據孟子書專指春秋亦二百四十年間自有五霸與襄無與也葢自同盟幽而齊霸戰城濮而晉霸封殽尸而秦霸殺陳夏徵舒而楚霸三駕楚九合諸侯而晉復霸然則所謂五霸者齊桓晉文也秦穆楚莊也晉悼也宋襄何有哉坡公謂其盜仁者之名吾謂其并盜霸者之名而不可以不辨矣欣意謂軾只辨宋襄不足為霸而不知五霸中實無宋襄也今按杜預注左傳謂夏霸昆吾商霸大彭豕韋周霸齊桓晉文或曰齊桓晉文宋襄秦穆楚莊趙歧注孟子用杜預後說荀子稱五霸謂齊桓晉文楚莊吳闔閭越勾踐顔師古注漢書則謂齊桓宋襄晉文秦穆吳夫差歴代諸說本自不同欣意去宋襄用晉悼者則以左傳有晉復霸之辭也晉悼之霸何休謂霸不過五不許其霸孔穎達謂霸者强國為之其數何有定限斥休為鄉曲之學孔意霸不妨於有六晉悼自在五霸之外則欣斥宋襄登晉悼以就五數此其立論之本也間嘗論之仲尼之徒無道桓文之事者夫桓文一世之所矜尚而仲尼之徒至不以挂齒豈矯異若是夫亦曰君臣之義自是漓焉爾溥天之下莫非王土率土之濵莫非王臣國天子之國也民天子之民也天子使有其國牧其民以守其世祀而乃摟諸侯以伐諸侯陽以尊王室為名而隂以行自雄自長之計逢王室之不造天子僅亦守府乃如其意而與之以長諸侯是不臣之漸也非君臣之義也夫君臣之義窮天地亘萬古而不變者豈曰將以天下奉一人哉葢必如是而後乾坤清夷自横目之民下逮於肖翹之屬始各有所安其食息耳有或為之亂階聖人齗齗乎絶之其為斯世斯民計至深逺也自天下為郡縣以後使有籓鎮之屬為桓文之事者出焉則不待逺識之士而知議其非矣三代公侯伯子男奉天子之命以牧其土與民者其與今之督撫守令有異制耳豈有異義焉乃挾天子以令諸侯自稱為霸則腐儒猶津津稱道之柯異朝四而暮三衆狙皆喜乎然則霸之為名即非懿稱宋襄之不足為霸固矣而欣謂其并盜霸者之名猶以此為美名而有所吝惜則亦猶有蓬之心也鄭康成曰天子衰諸侯興故曰霸霸把也言把持天子之政教也夫把持天子之政教豈仲尼之徒所忍言者乎軾述古語謂圖王不成其弊猶足以霸此語雖出自古尤不可以訓王霸殊途猶東西南北之異轍安得圖王不成而能霸夫有天下為天子者果其圖王則孟子謂保民而王莫之能禦矣豈有不成僅霸之理非天子也非有天下也則又何得圖王圖王者非即所為亂臣乎足以霸則然矣王其可成哉夫王霸之辨不明則君臣之義不著其為世道人心害非細故也伊尹論辦天下之大事者有天下之大節者也立天下之大節者狹天下者也夫以天下之大而不足以動其心則天下之大節有不足立而大事有不足辦者矣今夫匹夫匹婦皆知潔㢘忠信之為美也使其果潔㢘而忠信則其知慮未始不如王公大人之能也惟其所爭者止於簞食豆羮而簞食豆羮足以動其心則宜其智慮之不出乎此也簞食豆羮非其道不取則一鄉之人莫敢以不正犯之矣一鄉之人莫敢以不正犯之而不能辦一鄉之事者未之有也推此而上其不取者愈大則其所辦者愈逺矣讓天下與讓簞食豆羮無以異也治天下與治一鄉亦無以異也然而不能者有所蔽也天下之富是簞食豆羮之積也天下之大是一鄉之推也非千金之子不能運千金之資販夫販婦得一金而不知其所措非智不若所居之卑也孟子曰伊尹耕於有莘之野非其道也非其義也雖祿之天下弗受也夫天下不能動其心是故其才全以其全才而制天下是故臨大事而不亂古之君子必有髙世之行非茍求為異而己卿相之位千金之富有所不屑將以自廣其心使窮達利害不能為之芥蔕以全其才而欲有所為耳後之君子葢亦嘗有其志矣得失亂其中而榮辱奪其外是以役役至於老死而不暇亦足悲矣孔子叙書至於舜禹皋陶相讓之際葢未嘗不太息也夫以朝廷之尊而行匹夫之讓孔子安取哉取其不汲汲於富貴有以大服天下之心焉耳夫太甲之廢天下未嘗有是而伊尹始行之天下不以為驚以臣放君天下不以為僭既放而復立太甲不以為專何則其素所不屑者足以取信於天下也彼其視天下眇然不足以動其心而豈忍以廢放其君求利也哉後之君子蹈常而習故惴惴焉懼不免於天下一為希濶之行則天下羣起而誚之不知求其素而以為古今之變時有所不可者亦巳過矣夫王世貞曰伊尹事功莫大於相湯又莫難於相太甲放之復之而人不疑其耕莘之心即素取信於人故也論伊尹者無踰此篇王志堅曰周公之流言豈其素不如伊尹哉古今之變時有所不可是亦不易之論也周公論論周公者多異說何也周公居禮之變而處聖人之不幸宜乎說者之異也凡周公之所為亦不得已而巳矣若得巳而不巳則周公安得而為之成王幼不能為政周公執其權以王命賞罰天下是周公不得已者如此而已今儒者曰周公踐天子之位稱王而朝諸侯則是豈不可以已耶書曰周公位冢宰正百工羣叔流言又曰召公為保周公為師相成王為左右召公不說又曰周公曰王若曰則是周公未嘗踐天子之位而稱王也周公稱王則成王宜何稱將亦稱王也將不稱耶不稱則是廢也稱王則是二王也而周公何以安之孔子曰必也正名乎儒者之患患在於名實之不正故亦有以文王為稱王者是以聖人為後世之僭君急於為王者耶天下雖亂有王者在而己自王雖聖人不能以服天下昔髙帝擊滅項籍統一四海諸侯大臣相率而帝之然且辭以不德惟陳勝吳廣乃囂囂乎急於自王而謂文王亦為之耶武王代商師渡孟津會於牧野其所以稱先君之命命於諸侯者葢猶曰文考而巳至於武成既以柴望告天百工奔走受命於周而後其稱曰我文考文王克成厥勲由此觀之則是武王不敢一日妄尊其先君而況於文王之自王乎詩曰虞芮質厥成文王蹶厥生是亦追稱而已矣史記曰嫗乎采芑歸乎田成子夫田常之時安知其為成子而稱之故凡以文王周公為稱王者皆過也是資後世之簒君而為之藉也陳賈問於孟子曰周公使管叔監殷管叔以殷叛知而使之是不仁不知是不知孟子曰周公弟也管叔兄也周公之過不亦宜乎從孟子之說則是周公未免於有過也夫管叔之叛非逆也是其知不足以深知周公而巳矣周公之誅非疾之也其勢不得不誅也故管蔡非所謂大惡也兄弟之親而非有大惡則其道不得不封管蔡之封在武王之世也武王之世未知有周公成王之事茍無周公成王之事則管蔡何從而叛周公何從而誅之故曰周公居禮之變而處聖人之不幸也此與歐陽修泰誓論明文武周公之心並為扶翼君臣大義之至文抉浮雲掃䝉景昭昭然揭日月以行者也御選唐宋文醇巻四十一
