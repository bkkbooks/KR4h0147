body:
  text: 廬陵歐陽修文七上書通進司上皇帝書凖詔言事上書論包拯除三司使上書欽定四庫全書御選唐宋文醇巻二十八廬陵歐陽修文七通進司上皇帝書月日宣徳郎守太子中允充館閣校勘臣歐陽修謹昧死載拜上書於皇帝闕下臣伏見國家自元昊叛逆關西用兵以來為國言事者衆矣臣初竊為三䇿以料賊情然臣迂儒不識兵之大計始猶遲疑未敢自信今兵興既久賊形己露如臣素料頗不甚逺故竊自謂有可以助萬一而塵聽覽者謹條以聞惟陛下仁聖寛其狂妄之誅幸甚夫關西弛備而民不見兵者二三十年矣使賊萌亂之初藏形隱計卒然而來當是時吾之邊屯寡弱城堡未完民習久安而易驚將非素選而敗怯使其羊驅豕突可以奮然而深入然國威未挫民力未疲彼得城而居不能久守虜掠而去可邀擊其歸此下䇿也故賊知而不為之戎狄侵邊自古為患其攻城掠野敗則走而勝則來蓋其常事此中䇿也故賊兼而用之若夫假僭名號以威其衆先擊吾之易取者一二以恱其心然後訓養精銳為長久之謀故其來也雖勝而不前不敗而自退所以誘吾兵而勞之也或擊吾東或擊吾西乍出乍入所以使吾兵分備多而不得減息也吾欲速攻賊方新銳坐而待戰彼則不來如此相持不三四嵗吾兵已老民力己疲不幸又遇水旱之災調斂不勝而盗賊羣起彼方奮其全銳擊吾困弊可也使吾不堪其困忿而出攻決於一戰彼以逸而待吾勞亦可也幸吾苦兵計未知出遂求通聘以邀嵗時之賂度吾困急不得不從亦可也是吾力一困則賊謀無施而不可此兵法所謂不戰而疲人兵者上䇿也而賊今方用之今三十萬之兵食於西者二嵗矣又有十四五萬之郷兵不耕而自食其民自古未有四五十萬之兵連年仰食而國力不困者也臣聞元昊之為賊威能畏其下恩能死其人自初僭叛嫚書巳上逾年而不出一出則鋒不可當執劫蕃官獲吾將帥多禮而不殺此其兇謀所蓄皆非倉卒者也奈何彼能以上䇿而疲吾吾不自知其己困彼為久計以撓我我無長䇿而制之哉夫訓兵養士伺隙乗便用間出竒此將帥之職也所謂閫外之事而君不御者可也至於外料賊謀之心内察國家之勢知彼知此因謀制敵此朝廷之大計也所謂廟筭而勝者也不可以不思今賊謀可知以久而疲我耳吾勢可察西人己困也誠能豐財積粟以紓西人而完國壯兵則賊謀沮而廟筭得矣夫兵攻守而己然皆以財用為強弱也守非財用而不久此不待言請試言攻昔秦席六世之強資以事胡卒困天下而不得志漢因文景之富力三舉而纔得河南隋唐突厥吐蕃常與中國相勝敗擊而勝之有矣未有舉而滅者秦漢尤强者其所攻今元昊之地是也況自劉平陷沒賊鋒熾銳未嘗挫衂攻守之計非臣所知天威所加雖終期於掃盡然臨邊之將尚未聞得賊釁隙挫其兇鋒是攻守皆未有休息之期而財用不為長久之計臣未見其可也四五十萬之人坐而仰食然闗西之地物不加多闗東所有莫能運致掊克細碎既以無益而罷之矣至於鬻官入粟下無應者改法𣙜貨而商旅不行是四五十萬之人惟取足於西人而已西人何為而不困困而不起為盗者須水旱爾外為賊謀之所疲内遭水旱而多故天下之患可勝道哉夫闗西之物不能加多則必通其漕運而致之漕運已通而闗東之物不充則無得而西矣故臣以為通漕運盡地利權商賈三術並施則財用足而西人紓國力完而兵可久以守以攻惟上所使夫小瑣目前之利既不足為長久之謀非旦夕而可效故為長久而計者初若迂愚而可笑在必而行之則其利博矣故臣區區不敢避迂愚之責請上便宜三事惟陛下裁擇其一曰通漕運臣聞今為西計者皆患漕運之不通臣以為但未求之耳今京師在汴漕運不西而人之習見者遂以為不能西不知秦漢隋唐其都在雍則天下之物皆可致之西也山川地形非有變易於古其路皆在昔人可行今人胡為而不可漢初嵗漕山東粟數十萬石是時運路未修其漕尚少其後武帝益修渭渠至漕百餘萬石隋文帝時沿水為倉轉相運置而闗東汾晉之粟皆至渭南運物最多其遺倉之迹徃徃皆在然皆尚有三門之險自唐裴耀卿又尋隋迹於三門東西置倉開山十八里為陸運以避其險卒泝河而入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米以實闗西後世言能經財利而善漕運者耀卿與晏為首今江淮之米嵗入於汴者六百萬石誠能分給闗西得一二百萬石足矣今兵之食汴漕者出戍甚衆有司不惜百萬之粟分而及之其患者三門阻其中爾今宜浚治汴渠使嵗運不阻然後按求耀卿之迹不憚十許里陸運之勞則河漕通而物可致且紓闗西之困使古無法今有可為尚當為之況昔人行之而未逺今人行之而豈難哉耀卿與晏初理漕時其得尚少至其末年所入十倍是可久行之法明矣此水運之利也臣聞漢髙祖之入秦不由東闗而道南陽過酈析而入武闗曹操等起兵誅董卓亦欲自南陽道丹析而入長安是時張濟又自長安出武闗奔南陽則自古用兵徃來之徑也臣嘗至南陽問其遺老云自鄧西北至永興六七百里今小商賈徃徃行之初漢髙入闗其兵十萬夫能容十萬兵之路宜不甚狹而險也但自雒陽為都行者皆趨東闗其路久而遂廢今能按求而通之則武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽自南陽為輕車人輦而逓之募置逓兵為十五六鋪則十餘州之物日日入闗而不絶沿漢之地山多美木近漢之民仰足而有餘以造舟車甚不難也前日陛下深卹有司之勤内賜禁錢數十萬以供西用而道路艱逺輦運踰年不能畢至至於軍裝輸送多苦秋霖邊州己寒冬服尚滯於路其艱如此夫使州縣綱吏逺輸京師轉冒艱滯然後得西豈若較南陽之旁郡度其道里入於武闗與至京師逺近等者與其尤近者皆使直輸於闗西京師之用有不足則以禁帑出賜有司者代而充用其迂曲簡直利害較然矣此陸運之利也其二曰盡地利臣聞昔之畫財利者易為工今之言財利者難為術昔者之民賦稅而己故其不足則鑄山煮海𣙜酒與茶征闗市而筭舟車尚有可為之法以茍一時之用自漢魏迄今其法日増其取益細今取民之法盡矣昔者賦外之征以備有事之用今盡取民之法用於無事之時悉以冗費而糜之矣至卒然有事則無法可増然獨猶有可為者民作而輸官者已勞而逰手之人方逸地之産物者耕不得代而不墾之土尚多是民有遺力地有遺利此可為也況歴視前世用兵者未嘗不先營田漢武帝時兵興用乏趙過為畎田人犁之法以足用趙充國攻西羌議者爭欲出擊而充國深思全勝之策能忍而待其弊至違詔罷兵而治屯田田於極邊以逰兵而防鈔寇則其理田不為易也猶勉為之後漢之時曹操屯兵許下強敵四靣以今視之疑其旦夕戰爭而不暇然用棗祗韓浩之計建置田官募民而田近許之地嵗得榖百萬石其後郡國皆田積榖無數隋唐田制尤廣不可勝舉其勢艱而難田莫若充國迫急而不暇田莫若曹操然皆勉焉不以迂緩而不田者知地利之博而可以紓民勞也今天下之土不耕者多矣臣未能悉言謹舉其近者自京以西土之不闢者不知其數非土之瘠而棄也蓋人不勤農與夫役重而逃爾久廢之地其利數倍於營田今若督之使勤與免其役則願耕者衆矣臣聞鄉兵之不便於民議者方論之矣充兵之人遂棄農業託云教習聚而飲博取資其家不顧無有官吏不加禁父兄不敢詰家家自以為患也河東河北闗西之鄉兵此猶有用若京東西者平居不足以備盗而水旱適足以為盗其尤可患者京西素貧之地非有山澤之饒民惟力農是仰而今二夫之家一人五夫之家二人為游手凡十八九州以少言之尚可四五萬人不耕而食是自相糜耗而重困也今誠能盡驅之使耕於棄地官貸其種嵗田之入與中分之如民之法募吏之習田者為田官優其課最而誘之則民願田者衆矣太宗皇帝時嘗貸陳蔡民錢使市牛而耕真宗皇帝時亦用耿望之言買牛湖南而治屯田今湖南之牛嵗賈於北者皆出京西若官為買之不難得也又宜重為法以困所謂私牛之客者使不容於民而樂為官耕凡民之己有牛者使自耕則牛不足而官市者不多且鄉兵本農也籍而為兵遂棄其業今幸其去農未久尚可復驅還之田畆使不得羣㳺而飲博以為父兄之患此民所願也一夫之力以逸而言任耕縵田一頃使四五萬人皆耕而久廢之田利又數倍則嵗榖不可勝數矣京西之分北有大河南至漢而西接闗若又通其水陸之運所在積榖惟陛下詔有司而移用之耳其三曰權商賈臣聞秦廢王法啓兼并其上侵公利下刻細民為國之患久矣自漢以來嘗欲為法而抑奪之然不能也蓋為國者興利日繁兼并者趨利日巧至其甚也商賈坐而權國利其故非他由興利廣也夫興利廣則上難專必與下而共之然後通流而不滯然為今議者方欲奪商之利一歸於公上而專之故奪商之謀益深則為國之利益損前日有司屢變其法法每一變則一嵗之間所損數百萬議者不知利不可專欲專而反損但云變法之未當變而不巳其損愈多夫欲十分之利皆歸於公至其虧少十不得三不若與商共之常得其五也今為國之利多者茶與鹽耳茶自變法巳來商賈不復一嵗之失數年莫補所在積朽棄而焚之前日議者屢言三說之法為便有司既以詳之也今誠能復之使商賈有利而通行則上下濟矣解池之鹽積若山阜今宜暫下其價誘羣商而散之先為令曰三年將復舊價則貪利之商爭先而輳矣夫茶者生於山而無窮鹽者出於水而不竭賤而散之三年十未減其一二夫二物之所以貴者以能為國資錢幣爾今不散而積之是惜朽壤也夫何用哉夫大啇之能蕃其貨者豈其錙銖躬自鬻於市哉必有販夫小賈就而分之販夫小賈無利則不為故大商不妒販夫之分其利者恃其貨博雖取利少貨行流速則積少而為多也今為大國者有無窮不竭之貨反妒大商之分其利寧使無用而積為朽壤何哉故大商之善為術者不惜其利而誘販夫大國之善為術者不惜其利而誘大商此與商賈共利取少而致多之術也又今商賈之難以術制者以其積貨多而不急故也利厚則來利薄則止不可以號令召也故每有司變法下利既薄小商以無利而不能行則大商方幸小商之不行適得獨賣其貨尚安肯勉趨薄利而來哉故變法而刻利者適足使小商不來而為大商賈積貨也今必以術制商宜盡括其居積之物官為賣而還之使其貨盡而後變法夫大商以利為生一嵗不營利則有惶惶之憂彼必不能守積錢而閒居得利雖薄猶將勉而來此變法制商之術也夫欲誘商而通貨莫若與之共利此術之上也欲制商使其不得不從則莫若痛裁之使無積貨此術之下也然此可制茶商耳若鹽者禁益宻則冒法愈多而刑繁若乃縣官自為鬻市之事此大商之不為臣謂行之難久者也誠能不較錙銖而思逺大則積朽之物散而錢幣通可不勞而用足矣臣愚不足以知時事若夫堅守以捍賊利則出而擾之凡小便宜願且委之邊將至於積榖與錢通其漕運不二三嵗而國力漸豐邊兵漸習賊鋒漸挫而有隙可乗然後一舉而滅之此萬全之策也願陛下以其小者責將帥謀其大計而行之則天下幸甚臣修昧死再拜洪範一曰食而八曰師食尚未預儲何言師也通漕屯田自是當時要務通篇不下萬言總欲豐財積粟以紓西人耳至論課程之法謂必與商賈共利方能取少而致多其辭亦若言利而與言利之臣霄壤者蓋導利而布之上下本君人者之責也為國家司課程者不可不知若其所云不惜其利以誘大商則立言不可為訓又欲盡括大商居積之物官為賣而還之則更迂濶紛擾而不可行也凖詔言事上書月日臣修謹昧死再拜上書於皇帝陛下臣近凖詔書許臣上書言事臣學識愚淺不能廣引深逺以明治亂之原謹採當今急務條為三弊五事以應詔書所求伏惟陛下裁擇臣聞自古王者之治天下雖有憂勤之心而不知致治之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聽愈惑故為人君者以細務而責人專大事而獨斷此致治之要術也納一言而可用雖衆說不得以沮之此力行之果斷也知此二者天下無難治矣伏見國家自大兵一動中外騷然陛下思社稷之安危念兵民之疲弊四五年來聖心憂勞可謂至矣然而兵日益老賊日益彊併九州之力討一西戎小者尚無一人敢前今又北戎大者違盟而動其將何以禦之從來所患者夷狄今夷狄叛矣所惡者盗賊今盗賊起矣所憂者水旱今水旱作矣所賴者民力今民力困矣所須者財用今財用乏矣陛下之心日憂於一日天下之勢嵗急於一嵗此臣所謂用心雖勞不知求致治之要者也近年朝廷開發言路獻計之士不下數千然而事緒轉多枝梧不暇從前所採衆議紛紜至於臨事誰策可用此臣所謂聽言雖多不如力行之果斷者也伏思聖心所甚憂而當今所尚闕者不過曰無兵也無將也無財用也無禦戎之策也無可任之臣也此五者陛下憂其未有而臣謂今皆有之然陛下未得而用者未思其術也國家創業之初四方割據中國地狹兵民不多然尚能南取荆楚收偽唐定閩嶺西平兩蜀東下并潞北窺幽燕當時所用兵財將吏其數㡬何惟善用之故不覺其少何況今日承百年祖宗之業盡有天下之富彊人衆物盛十倍國初故臣敢言有兵有將有財用有禦戎之策有可任之臣然陛下皆不得而用者其故何哉由朝廷有三大弊故也何謂三弊一曰不愼號令二曰不明賞罰三曰不責功實此三弊因循於上則萬事弛慢廢壊於下臣聞號令者天子之威也賞罰者天子之權也若號令不信賞罰不當則天下不服故又須責臣下以功實然後號令不虛出而賞罰不濫行是以慎號令明賞罰責功實此三者帝王之竒術也自古人君英雄如漢武帝聰明如唐太宗皆知用此三術而自執威權之柄故所求無不得所欲皆如意漢武好用兵則誅滅四夷立功萬里以快其心欲求將則有衛霍之材以供其指使欲得賢士則有公孫董汲之徒以稱其意唐太宗好用兵則誅突厥服遼東威振夷狄以逞其志欲求將則有李靖李勣之徒入其駕馭欲得賢士則有房杜之徒在其左右此二帝者可謂所求無不得所欲皆如意無他術也惟能自執威權之柄耳伏惟陛下以聖明之姿超出二帝又盡有漢唐之天下然而欲禦邊則常患無兵欲破賊則常患無將欲贍軍則常患無財用欲威服四夷則常患無策欲任使賢材則常患無人是所求皆不得所欲皆不如意其故無他由不用威權之術也自古帝王或為強臣所制或為小人所惑則威權不得出於己今朝無強臣之患旁無小人偏任之溺内外臣庶尊陛下如天愛陛下如父傾耳延首願陛下之所為然何所憚而不為乎若一日赫然執威權以臨之則萬事皆辦何患五者之無奈何為三弊之因循一事之不集臣請言三弊夫言多變則不信令頻改則難從今出令之初不加詳審行之未久尋又更張以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之命則官吏或相謂曰且未要行不久必須更改或曰備禮行下畧與應破指揮旦夕之間果然又變至於將吏更易道路疲於迎送符牒縱横上下莫能遵守中外臣庶或聞而歎息或聞而竊笑歎息者有憂天下之心竊笑者有輕朝廷之意號令如此欲威天下其可得乎此不愼號令之弊也用人之術不過賞罰然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用矣太祖時王全斌破蜀而歸功不細矣犯法一貶十年不問是時方討江南故黜全斌與諸將立法太祖神武英斷所以能平定天下者其賞罰之法皆如此也昨闗西用兵四五年矣大將以無功罷者依舊居官軍中見無功者不妨得好官則諸將誰肯立功矣禆將畏儒逗留者皆當斬罪或暫貶而尋遷或不貶而依舊軍中見有罪者不誅則諸將誰肯用命矣所謂賞不足勸威無所懼賞罰如此而欲用人其可得乎此不明賞罰之弊也自兵動以來處置之事不少然多有名而無實臣請畧言其一二則其他可知數年以來㸃兵不絶諸路之民半為兵矣其間老弱病患短小怯儒者不可勝數是有㸃兵之虛名而無得兵之實數也新集之兵所在教習追呼上下民不安居主教者非將領之材所教者無旗鼔之節徃來州縣愁歎嗷嗷既多是老病小怯之人又無訓齊精練之法此有教兵之虛名而無訓兵之實藝也諸路州軍分造器械工作之際巳勞民力輦運般送又苦道塗然而鐵刄不剛筋膠不固長短大小多不中度造作之所但務充數而速了不計所用之不堪經歴官司又無檢責此有器械之虚名而無器械之實用也以草草之法教老怯之兵執鈍折不堪之器械百戰百敗理在不疑臨事而悟何可及乎故事無大小悉皆鹵莽則不責功實之弊也臣故曰三弊因循於上則萬事弛慢廢壊於下萬事不可盡言臣請言大者五事其一曰兵臣聞攻人以謀不以力用兵鬭智不鬭多前代用兵之人多者常敗少者常勝漢王尋等以百萬之兵遇光武九千人而敗是多者敗而少者勝也苻堅以百萬之兵遇東晉二三萬人而敗是多者敗而少者勝也曹操以三十萬青州兵大敗於吕布退而歸許復以二萬人破袁紹十四五萬是用兵多則敗少則勝之明驗也況於夷狄尤難以力爭只可以計取李靖破突厥於定襄只用三千人其後破頡利於隂山亦不過一萬蓋兵不在多能以計取爾故善用兵者以少為多不善用者雖多而愈少也為今計者添兵則耗國減兵則破賊今沿邊之兵不下七八十萬可謂多矣然訓練不精又有老弱虛數則十人不當一人是七八十萬之兵不當七八萬人之用加之軍無統制分散支離分多為寡兵法所忌此所謂不善用兵者雖多而愈少故常戰而常敗也臣願陛下赫然奮威敕勵諸將精加訓練去其老弱七八十萬中可得五十萬數古人用兵以一當百今既未能但得以一當十則五十萬精兵可當五百萬兵之用此所謂善用兵者以少而為多古人所以少而常勝者以此也今不思實效但務添多耗國耗民積以年嵗賊雖不至天下巳困矣此一事也其二曰將臣又聞古語曰將相無種故或出於奴僕或出於軍卒或出於盗賊惟能不次而用之乃為名將耳國家求將之意雖勞選將之路太狹今詔近臣舉將而限以資品則英豪之士在下位者不可得矣試將材者限以弓馬一夫之勇則智畧萬人之敵皆遺之矣山林竒傑之士召而至者以其貧賤而薄之不過與一主簿借職使其怏怏而去則古之屠釣飯牛之傑皆激怒而失之矣至於無人可用則寧用龍鍾跛躄庸懦暗劣之徒皆授之兵柄天下三尺童子皆為朝廷危之前日澶淵之卒㡬為國家生事此可見也議者不知取將之無術但云當今之無將臣願陛下革去舊弊奮然精求有賢豪之士不須限以下位有智畧之人不必試以弓馬有山林之傑不可薄其貧賤惟陛下能以非常之禮待人人臣亦將以非常之效報國此二事也其三曰財用臣又聞善治病者必醫其受病之處善救弊者必尋其起弊之源今天下財用困乏其弊安在起於用兵而費大故也漢武好窮兵用盡累世之財當時勒兵單于臺不過十八萬尚能困其國力況未若今日七八十萬連四五年而不罷所以罄天地之所生竭萬民之膏血而用不足也今雖有智者物不能増而計無所出矣惟有減冗卒之虛費練精兵而速戰功成兵罷自然足矣今兵有可減之理無人敢當其事賊有速擊之便無將敢奮其勇後時敗事徒耗國而耗民此三事也其四曰禦戎之䇿臣又聞兵法曰上兵伐謀其次伐交北敵與朝廷通好僅四十年不敢妄動今一旦發其狂謀者其意何在蓋見中國頻為元昊所敗故敢啓其貪心伺隙而動爾今使敕勵諸將選兵秣馬疾入西界但能痛敗昊賊一陣則吾軍威大振而敵計沮矣此所謂上兵伐謀者也今詗事者皆知北敵與西賊通謀欲併二國之力窺我河北陜西今若我能先擊敗其一國則敵勢減半不能獨舉此兵法所謂伐交者也元昊地狹賊兵不多向來攻我傳聞北敵常有助兵今若虜中自有㸃集之謀而元昊驟然被擊必求助於北敵北敵分兵助昊則可牽其南冦之力若不助昊則兩國有隙自相疑貳此亦伐交之䇿也假令二國尅期分路來寇我能先期大舉則元昊倉皇自救不暇豈能與北敵相為表裏是破其素定之約乖其尅日之期此兵法所謂親而離之者亦伐交之策也元昊叛逆以來幸而屢勝常有輕視諸將之心今又見朝廷北憂契丹方經營於河朔必謂我師不能西出今乗其驕怠正是疾驅急擊之時此兵法所謂出其不意者此取勝之上䇿也前年西將有請出攻者當時賊氣力方盛我兵未練朝廷尚許其出師況今元昊有可攻之勢此不可失之時彼方幸吾憂河北而不虞我能西征出其不意此可攻之勢也自四路分帥今巳半年訓練恩信兵巳可用故近日屢奏小捷是我師漸振賊氣漸衂此可攻之勢也茍失此時而使二敵先來則吾無策矣臣願陛下詔執事之臣熟議而行之此四事也其五曰可任之臣臣又聞仲尼曰十室之邑必有忠信況今文武列職徧於天下其間豈無材智之臣而陛下總治萬㡬之大既不暇盡識其人故不能躬自進賢而退不肖執政大臣動拘舊例又不敢進賢而退不肖審官吏部三班之職但掌文簿差除而巳又不敢越次進賢而退不肖是上自天子下至有司無一人得進賢而退不肖者所以賢愚混雜僥倖相容三載一遷更無旌别平居無事惟患太多而差遣不行一旦臨事要人常患乏人使用自古任官之法無如今日之繆也今議者或謂舉主轉官為進賢犯罪黜責為退不肖此不知其弊之深也大凢善惡之人各以類聚故守廉慎者各舉清幹之人有贓汚者各舉貪濁之人好徇私者各舉請求之人性庸暗者各舉不材之人朝廷不問是非但見舉主數足便與改官則清幹者進矣貪濁者亦進矣請求者亦進矣不材者亦進矣混淆如此便可為進賢之法乎方今黜責官吏豈有澄清紏舉之術哉惟犯贓之人因民論訴者乃能黜之耳夫能舞弄文法而求財賂者亦強黠之吏政事必由己出故雖誅剥豪民尚或不及貧弱至於不材之人不能主事衆胥羣吏共為姦欺則民無貧富一時受弊以此而言則贓吏與不材之人為害等耳今贓吏因自敗者乃加黜責十不去其一二至於不材之人上下共知而不問寛緩容姦其弊如此便可為退不肖之法乎賢不肖既無别則宜乎設官雖多而無人可用也臣願陛下明賞罰責功實則材皆列於陛下之前矣臣故曰五者皆有然陛下不得而用者為有弊也三弊五事臣既已詳言之矣惟陛下擇之天下之務不過此也方今天文變於上地理逆於下人心怨於内四夷攻於外事勢如此矣非是陛下遲疑寛緩之時惟願為社稷生民留意臣修昧死再拜唐順之曰仁宗之為治天下事一付之公論而巳若無所與焉自是千古一聖哉而其迹有似於不振者故歐公以自執威權之說進蓋應病之藥也夫有權不操而付之天下之公且不可況未必公乎論包拯除三司使上書臣聞治天下者在知用人之先後而巳用人之法各有所宜軍旅之士先材能朝廷之士先名節軍旅主成功惟恐其不趨賞而爭利其先材能而後名節者亦勢使之然也朝廷主敎化風俗之薄厚治道之汙隆在乎用人而教化之於下也不能家至而諄諄諭之故常務尊名節之士以風動天下而聳勵其偷薄夫所謂名節之士者知廉恥修禮讓不利於茍得不牽於茍隨而惟義之所處白刄之威有所不避折枝之易有所不為而惟義之所守其立於朝廷進退舉止皆可以為天下法也其人至難得也至可重也故其為士者常貴名節以自重其身而君人者亦常全名節以養成善士伏見陛下近除前御史中丞包拯為三司使命下之日中外喧然以為朝廷貪拯之材而不為拯惜名節然猶冀拯能執節守義堅讓以避嫌疑而為朝廷惜事體數日之間遽聞拯己受命是可惜也亦可嗟也拯性好剛天姿峭直然素少學問朝廷事體或有不思至如逐其人而代其位雖初無是心然見得不能思義此皆不足怪若乃嫌疑之迹常人皆知可避而拯豈獨不思哉昨聞拯在臺日常自至中書詬責宰相指陳前三司使張方平過失怒宰相不早罷之既而臺中僚屬相繼論列方平由此罷去而以宋祁代之又聞拯亦曽弹奏宋祁過失自其命出臺中僚屬又交章力言而祁亦因此而罷而拯遂代其任此所謂蹊田奪牛豈得無過而整冠納履當避可疑者也如拯材能資望雖别加進用人豈為嫌其不可為者惟三司使爾非惟自渉嫌疑其於朝廷所損不細臣請原其本末而言之國家自數十年來士君子務以恭謹静愼為賢及其弊也循黙茍且頺惰寛弛習成風俗不以為非至於百職不修紀綱廢壊時方無事固未覺其害也一旦黠虜犯邊兵出無功而財用空虚公私困弊盗賊並起天下騷然陛下奮然感悟思革其弊進用三數大臣銳意於更張矣於此之時始増置諫官之貟以寵用言事之臣使之舉職由是修紀綱而繩廢壊遂欲分别賢不肖進退材不材而久弊之俗驟見而駭因共指言事者而非之或以為好訐隂私或以為公相傾陷或謂沽激名譽或謂自圖進取羣言百端㡬惑上聽上賴陛下至聖至明察見諸臣本以忘身徇國非為巳利讒間不入遂荷保全而中外之人久而亦漸為信自是以來二十年間臺諫之選屢得讜言之士中間斥去姦邪屏絶權倖拾遺救失不可勝數是則納諫之善從古所難自陛下臨御以來實為盛徳於朝廷補助之效不為無功今中外習安上下巳信纎邪之人凡所舉動毎畏言事之臣時政無巨細亦惟言事官是聽原其自始開發言路至於今日之成效豈易致哉可不惜哉夫言人之過似於徼訐逐人之位似於傾陷而言事之臣得以自明者惟無所利於其間爾而天下之人所以為信者亦以其無所利焉今拯屏逐二臣自居其位使將來姦佞者得以為說而惑亂主聽今後言事者不為人信而無以自明是則聖明用諫之功一旦由拯而壊夫有所不取之謂廉有所不為之謂恥近臣舉動人所儀法使拯於此時有所不取而不為可以風天下以廉恥之節而拯取其所不宜取為其所不宜為豈惟自薄其身亦所以開誘他時言事之臣傾人以覬得相習而成風此之為患豈謂小哉然拯所恃者惟以本無心耳夫心者藏於中而人所不見迹者示於外而天下所瞻今拯欲自信其不見之心而外掩天下之迹是猶手探其物口云不欲雖欲自信人誰信之此臣所謂嫌疑之不可不避也況如拯者少有孝行聞於鄉里晚有直節著在朝廷但其學問不深思慮不熟而處之乖當其人亦可惜也伏望陛下别選材臣為三司使而處拯他職置之京師使拯得避嫌疑之迹以解天下之惑而全拯之名節不勝幸甚臣叨塵侍從職號論思昔嘗親見朝廷致諫之初甚難今又復見陛下用諫之效巳著實不欲因拯而壊之者為朝廷惜也臣言狂計愚伏俟誅戮世有謂修之賢而上章論拯蓋與拯不相能者夏蟲不可語冰也夫修此疏固為朝廷杜徼訐傾陷之風又使嗣後言事者得白其無他而易以拾遺救失乃其意中所最保䕶愛惜者拯耳曽子寢疾革一聞童子之言謂華而皖大夫之簀歟則瞿然命易其簀曽元不肯易人子之常情也而曽子斥之為細人至謂其愛父不如此童子曽子之賢幾於聖矣豈其將死猶好竒釣名至此哉舉扶而易之反席未安而歿假使不易安知不少緩須臾無死然而曽子不願者蓋雖一簀之非正猶舍生取義如此也今三司使之位非一簀之細矣逐人而居之非士用大夫器物之小過矣修知愛人以徳而巳遑問後世以修與拯為相能不相能哉善夫蔡襄之疏也曰朝廷増用諫臣歐陽修余靖王素一日拜命三人忠誠剛正必能盡言臣恐邪人不利必造為禦之之説其說不過有三臣請辨之一曰好名夫忠臣引君當道論事惟恐不至若避好名之嫌無所陳列則土木之人皆可為矣二曰好進前世諫者之難激於忠憤遭世昏亂死猶不辭何好進之有近世奬㧞太速但久而弗遷雖死是官猶無悔也三曰彰君過諫爭之臣蓋以司過舉耳人主聽而行之足以致從諫之譽何過之能彰至於巧者亦然事難言則喑擇其無忤者時一發焉猶或不行則退而曰吾嘗論某事矣此之謂好名黙黙容容無所愧恥躡資累級以挹顯仕此之謂好進君有過失不救之於未然傳之天下後世其事乃不可揜此之謂彰君過願陛下察之襄於修輩始作諫官之時諷上久而勿遷使之死於是官豈亦與修輩不相能哉君子之所欲忠者國耳主耳其他又何所惜襄之知修必不以不遷官為恨猶修之知拯必不以不得三司使為恨也正人君子之心胸類非俗士之所為歟御選唐宋文醇巻二十八
