body:
  text: 昌黎韓愈文一雜著原毁對禹問雜説一雜説二雜説三雜説四讀荀讀鶡冠子讀儀禮讀墨子獲麟解進學解師説守戒欽定四庫全書御選唐宋文醇巻一昌黎韓愈文一原毁古之君子其責己也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責於己曰彼人也予人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者聞古之人有周公者其為人也多才與藝人也求其所以為周公者責於己曰彼人也予人也彼能是而我乃不能是早夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於身者重以周乎其於人也曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣不亦待於人者輕以約乎今之君子則不然其責人也詳其待巳也㢘詳故人難於為善㢘故自取也少巳未有善曰我善是是亦足矣巳未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣不亦待其身者已㢘乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是之謂不以衆人待其身而以聖人望於人吾未見其尊已也雖然為是者有本有原怠與忌之謂也怠者不能修而忌者畏人修吾嘗試之矣嘗試語於衆曰某良士某良士其應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必怒於言懦者必怒於色矣又嘗語於衆曰某非良士某非良士其不應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必說於言懦者必說於色矣是故事修而謗興德髙而毁來嗚呼士之處此世而望名譽之光道徳之行難己將有作於上者得吾說而存之其國家可幾而理歟語曰躬自厚而薄責於人記曰君子不以其所能者病人不以人之所不能者愧人是故聖人之制行也不制以已使民有所勸勉愧恥以行其言昌黎作原毁其言古之君子者盖本諸此也宋范忠宣謂以責人之心責巳以恕巳之心恕人張横渠又謂以愛巳之心愛人則盡仁以責人之心責巳則盡道則又出於昌黎而鼻祖於禮記孔子之語反是則昌黎所謂今之君子者矣既窮其情狀又抉其本原如大禹鑄鼎使民知神奸其於天下後世所以詔告而警戒者深矣顧於古之君子之所以為是者未暇究論其本原也夫為是者又復有本有原聖人無己靡所不巳是故制行不制以己古君子之以舜周公自責者豈蘄巳之名與舜周公埒哉其於人則曰能有是是亦足者豈絶人以舜周公而蘄巳之高出一世哉凡以謂為天下國家而不至於舜周公則理不可得而至也天下國家不可以獨理而必期於舜周公其人然後與共理則將曠世無一人而不可得而待故也且也寸涔尺澤與渤澥之水無差部婁蟻封與泰華之土奚别積水成海積土成嶽一人之小仁小義小材小藝足以治一事理一邑迨其衆也萬事治天下理則舜周公之仁義材藝固無以加斯正舜周公之所以為舜周公也於戲由乎無己者天下萬世靡所不巳而又奚毁焉由乎私巳者天下萬世皆與巳為敵為對莫不可毁而天下萬世之毁乃並集於巳矣人欲尊巳者其何所從也對禹問或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世争之之亂也堯舜之利民也大禹之利民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮也則深矣傳之子而當不淑則奈何曰時益以難理傳之人則爭未前定也傳之子則不爭前定也前定雖不當賢猶可以守法不前定而不遇賢則爭且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢爭傳諸子得大惡然後人受其亂禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而爭且亂孰若傳諸子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不茍私於其子以害天下求其說而不得從而為之辭堯舜創也禹因也删書斷自唐虞帝王世紀等書雖不足信然使堯以前皆傳賢則堯授舜舜授禹乃大經通義又何為創見而夸美足知堯以前猶傳子而禹亦猶行古之道也禹亦猶行古之道則萬章􅂚問曰周衰處士横議如伊尹割烹孔子主癰疽寺人瘠環齊東之語亦多矣此亦其類也且堯典放齊有子朱啓明之請益稷謨大禹有丹朱殄世之戒若非堯以前亦傳子斯曷以稱焉然使孟子舉是説以折之則人必謂傳天下必堯舜乃為至是禹變其道以從古為非無乃仍無解於徳衰之惑歟且順天從民之義亦不著也觀昌黎之説實能補孟子之所未言雖然民者天之心也慮民之深而得民之心即為得天之心原其本而推其極致則亦仍無越乎孟子天與賢則與賢天與子則與子之義歟雜說一龍噓氣成雲雲固弗靈於龍也然龍乗是氣茫洋窮乎𤣥間薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣李光地曰此條寄託至深取類至廣精而言之則如道義之生氣徳行之發為事業文章皆是也大而言之則如君臣之遇合朋友之應求聖人之風興起於百世之下皆是也雜說二善醫者不視人之瘠肥察其脉之病否而己矣善計天下者不視天下之安危察其紀綱之理亂而己矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死矣通於此說者其知所以為天下乎夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳秦之王天下也無分勢於諸侯聚兵而焚之傳二世而天下傾者紀綱亡焉耳是故四支雖無故不足恃也脉而己矣四海雖無事不足矜也紀綱而己矣憂其所可恃懼其所可矜善醫善計者謂之天扶與之易曰視履考祥善醫善計者為之憂其所可恃懼其所可矜善醫善計者謂之天扶與之四句或以上二句讀斷而以善醫善計者謂之天扶與之二句連讀或以善醫善計者謂之為句而以天扶與之别為一句承上起下兩者俱若未合當以善醫善計者作足上二句之辭盖善醫善計者必憂其所可恃懼其所可矜也特倒文耳其曰謂之天扶與之者何記曰人者天地之心也操則存心存則人存舍則亡心亡則人亡天人之際呼則同呼吸則同吸謂之呼吸相通者猶逺也使恃其所可恃矜其所可矜則方寸之中驕泰之氣積焉維清於穆之所不居是語所謂以惡實心而棄其精傳所謂天奪之鑒而益其疾也惟能憂能懼者天之明命不離於顧諟之間自必自天祐之吉無不利故曰謂之天扶與之言知憂知懼若此者即是天扶與之也猶恐未明故又申之曰視履考祥善醫善計者為之夫憂其所可恃懼其所可矜固視履考祥之實際矣韓子可謂明於易而達於治天下之要者歟雜說三談生之為崔山君傳稱鶴言者豈不怪哉然吾觀於人其能盡其性而不類於禽獸異物者希矣將憤世嫉邪長往而不來者之所為乎昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貎有若䝉倛者彼皆貎似而心不同焉可謂之非人耶即有平脅曼膚顔如渥丹美而狠者貎則人其心則禽獸又惡可謂之人邪然則觀貎之是非不若論其心與其行事之可否為不失也怪神之事孔子之徒不言余將特取其憤世嫉邪而作之故題之云爾述孟子幾希之㫖開濂洛關閩之先雜說四世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴𨽻人之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬也雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也䇿之不以其道食之不能盡其材鳴之而不能通其意執策而臨之曰天下無馬嗚呼其真無馬邪其真不知馬也臯陶舉治天下二大端曰在知人在安民知人居其先焉一部論語以知人終先聖先師之明訓如此誠能知人將治天下如運之掌矣雖然人固不易知知人固不易易三復斯文慄然氷淵惄如調飢讀荀始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王覇易覇也以為孔子之徒没尊聖人者孟氏而已晚得揚雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟聖人之道不傳於世周之衰好事者各以其說干時君紛紛籍藉相亂六經與百家之說錯雜然老師大儒猶在火於秦黄老於漢其存而醇者孟軻氏而止耳揚雄氏而止耳及得荀氏書於是又知有荀氏者也考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎孔子刪詩書筆削春秋合於道者著之離於道者黜去之故詩書春秋無疵余欲削荀氏之不合者附於聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與揚大醇而小疵伊川程子云荀卿才髙而其言多過子雲才短而其言多失然皆未免夫駁者也退之以大醇歸之蓋韓子待人以恕樊汝霖云荀子二十三篇其非十二子篇以子弓並仲尼謂子思孟軻略法先王而不知其統其性惡篇謂人之性惡禮義生於聖人之偽此其牴牾不合於道而公所欲削者歟又云韓子說荀揚大醇是泛說與田駢慎到申不害韓非之徒觀之則荀揚為大醇讀鶡冠子鶡冠子十有九篇其辭雜黄老刑名其博選篇四稽五至之說當矣使其人遇時援其道而施於國家功德豈少哉學問篇稱賤生於無所用中流失船一壺千金者余三讀其辭而悲之文字脫謬為之正三十有五字乙者三滅者二十有二注十有二字云樊汝霖曰西漢藝文志有鶡冠子一篇箋云楚人居深山以鶡鳥羽為冠而唐志云鶡冠子三巻豈漢時遺缺至唐而全耶漢唐皆以為道家者流公謂其使施於國家功徳豈少而栁子厚作辨鶡冠子則曰得其書而讀之盡鄙淺言也二公所見不同如此讀儀禮余嘗苦儀禮難讀又其行於今者葢寡沿襲不同復之無由考於今誠無所用之然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪於是掇其大要竒辭奥㫖著於篇學者可觀焉惜乎吾不及其時進退揖讓於其間嗚呼盛哉夏以忠殷以質周以文説者謂忠敝而救以質質敝而救以文是未達而强為解者也忠者衷也衷實有之必形於外忠不能不為質也質者幹也幹既茂盛必灼其華質不能不為文也譬如幼而長長而壯其可曰幼敝而救以長長敝而救以壯哉文王曰盥而不薦有孚顒若洵乎文之必尚乎忠也周公曰白賁無咎孔子曰致飾然後亨則盡矣故受之以剥洵乎文之必本乎質也周衰詐偽萌生忠質盡䘮徒存其文夫徒存其文則文非其文也況乎世逺言湮時移世變傳經者訛易於煨燼之餘傳容者沿襲於時師之謬始則皮之不存而毛無所附繼則虎豹之毛化為犬羊之毛而所為文非其文者亦紊而不可考哉此韓愈所以讀儀禮而謂今無所用顧猶有愛於聖人之制度者也欲本三代之遺意以為天下國家必衷之於忠以求天理民彛之自然期忠得而漸具其質或庻幾焉不此之務而徒從事於文不知文固非其文也此新室荆舒之用周禮所以亡漢而亂宋也讀墨子儒譏墨以上同兼愛上賢明鬼而孔子畏大人居是邦不非其大夫春秋譏專臣不上同哉孔子泛愛親仁以博施濟衆為聖不兼愛哉孔子賢賢以四科進襃弟子疾殁世而名不稱不上賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相悅如是哉余以為辯生於末學各務售其師之說非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨朱子謂學者必知孟子歸斯受之之意然後識公讀墨之㫖伊川程子則謂孔墨相用之説為甚不可蓋韓愈之意憫後世經生家各務售其師之説而不求諸心不衷於理距楊墨於門墻之外而為楊墨於門墻之中外猶恃其中之存中則無復外之迹其為害也更有甚焉是以著説以矯之豈果賢墨而與孟子相剌謬哉况夫墨為孔用則其墨亦孔孔為墨用則是孔非墨孔子為魯司冦魯諸臣自三家以下安得盡易其位而後為治耶魯之諸臣尚猶可用而有不用墨子者哉上同兼愛上賢明鬼皆本漢書藝文志所著墨家者流之所長獲麟解麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也然麟之為物不畜於家不恒有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以德不以形若麟之出不待聖人則謂之不祥也亦宜李翺書此文贈陸傪云韓愈非兹世之文古之文也其詞㫖意適則孟軻既没亦未見有過於此者進學解國子先生晨入太學招諸生立館下誨之曰業精於勤荒於嬉行成於思毁於隨方今聖賢相逢治具畢張㧞去兇邪登崇畯良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光葢有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑於列者曰先生欺余哉弟子事先生於兹有年矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其𤣥貪多務得細大不捐焚膏油以繼晷恒兀兀以窮年先生之業可謂勤矣觝排異端攘斥佛老補苴罅漏張皇幽眇尋墜緒之茫茫獨旁搜而逺紹障百川而東之廻狂瀾於既倒先生之於儒可謂有勞矣沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣然而公不見信於人私不見助於友䟦前躓後動輙得咎暫為御史遂竄南夷三年博士冗不見治命與仇謀取敗幾時冬煖而兒號寒年豐而妻啼飢頭童齒豁竟死何裨不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也昔者孟軻好辯孔道以明轍環天下卒老於行荀卿守正大論是𢎞逃讒於楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也今先生學雖勤而不繇其統言雖多而不要其中文雖竒而不濟於用行雖修而不顯於衆猶且月費俸錢歲靡廪粟子不知耕婦不知織乗馬從徒安坐而食踵常途之促促窺陳編以盜竊然而聖主不加誅宰臣不見斥兹非其幸歟動而得謗名亦隨之投閒置散乃分之宜若夫商財賄之有亡計班資之崇庳忘己量之所稱指前人之瑕疵是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也孫樵曰玉川子月蝕詩韓吏部進學解莫不㧞地倚天句句欲活如赤手捕修蛇不施鞚勒騎生馬急不得暇莫可捉搦李光地曰此體文此篇與揚子解嘲千載稱絶矣解嘲中云炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱髙明之家鬼瞰其室此段是全釋豐卦義炎炎者火也隆隆者雷也當其隆隆炎炎以為盈且實矣然豐卦雷居上則是天收其聲火居下則是地藏其熱此其盛不可乆而滅且絶之徴也豐之義如此故卦爻俱發日中之戒至窮極則曰豐其屋蔀其家闚其户閴其無人即揚子所謂髙明之家鬼瞰其室也揚子是變易辭象以成文然自輔嗣以来未有知之者故此卦之義至今不白也此篇謹嚴浮夸竒法正葩等字並極羣經要𦕈故未有不精於經術而能行文者師說古之學者必有師帥者所以傳道授業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟聖人無常師孔子師郯子萇𢎞師襄老耼郯子之徒其賢不及孔子孔子曰三人行則必有我師是故弟子不必不如師師不必賢於弟子聞道有先後術業有專攻如是而己李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師說以貽之洪邁曰栁子厚答韋中立書云今之世不聞有師獨韓愈不頋流俗犯笑侮收召後學作師說因抗顔而為師愈以是得狂名又報嚴厚輿書云僕才能勇敢不如韓退之故不為人師人之所見有同異無以韓責我余觀退之師說云弟子不必不如師師不必賢於弟子其言非好為人師者也守戒詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而己固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴楥而外施窞穽以待之宅於都者知穿窬之為盗則必峻其垣墻而内固扃鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈强之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟葢以為不足為而不為耳天下之禍莫大於不足為材力不足者次之不足為者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈强者帶甲荷戈不知其多少其緜地則千里而與我壤地相錯無有丘陵江河洞庭孟門之闗其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乗吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人朱子曰唐自安史亂後河南河北地裂為七八蔡在當時最為近地成徳淄青連結為援所謂今之通都大邑介於屈强之間而不知為之備者此公守戒之所以作終之曰如之何而備之曰在得人及裴度平蔡而公之言騐御選唐宋文醇巻一
