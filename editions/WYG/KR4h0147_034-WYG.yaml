body:
  text: 眉山蘇洵文一雜著權書心術篇權書法制篇權書孫武篇權書六國篇衡論重逺篇衡論廣士篇欽定四庫全書御選唐宋文醇巻三十四眉山蘇洵文一權書心術篇為将之道當先治心泰山崩扵前而色不變麋鹿興扵左而目不瞬然後可以制利害可以待敵凡兵上義不義雖利勿動非一動之為害而他日将有所不可措手足也夫惟義可以怒士士以義怒可以百戰凡戰之道未戰養其財将戰養其力既戰飬其氣既勝養其心謹烽燧嚴斥堠使耕者無所頋忌所以養其財豐犒而優㳺之所以養其力小勝益急小挫益厲所以養其氣用人不盡其所欲為所以養其心故士常蓄其怒懐其欲而不盡怒不盡則有餘勇欲不盡則有餘貪故雖并天下而士不厭兵此黄帝之所以七十戰而兵不殆也不養其心一戰而勝不可用矣凡将欲智而嚴凡士欲愚智則不可測嚴則不可犯故士皆委已而聴命夫安得不愚夫惟士愚而後可與之皆死凡兵之動知敵之主知敵之将而後可以動扵險鄧艾縋兵於穴中非劉禪之庸則百萬之師可以坐縛彼固有所侮而動也故古之賢将能以兵甞敵而又以敵自甞故去就可以决凡主将之道知理而後可以舉兵知勢而後可以加兵知莭而後可以用兵知理則不屈知勢則不沮知莭則不窮見小利不動見小患不避小利小患不足以辱吾技也夫然後可以支大利大患夫惟養技而自愛者無敵於天下故一忍可以支百勇一静可以制百動兵有長短敵我一也敢問吾之所長吾出而用之彼将不與吾校吾之所短吾蔽而置之彼将強與吾角奈何曰吾之所短吾抗而暴之使之疑而却吾之所長吾隂而養之使之狎而墮其中此用長短之術也善用兵者使之無所顧有所恃無所顧則知死之不足惜有所恃則知不至扵必敗尺箠當猛虎奮呼而操擊徒手遇蜥蜴變色而却歩人之情也知此者可以将矣袒裼而按劍則烏獲不敢逼冠胄衣甲據兵而寝則童子彎弓殺之矣故善用兵者以形固夫能以形固則力有餘矣易師上六曰大君有命開國承家小人勿用朱子作本義謂小人雖有功亦不可使之得有爵土但優以金帛可也異日又曰小人既一例有功爵土何能不及只是勿更用與謀議經畫耳林希元謂小人立功不得不一例賞以爵邑若一例賞以爵邑又恐播惡扵衆不若扵行師之初不用之為愈也我聖祖仁皇帝謂林氏之說深合卦意焉甞謂君子雖簞食豆羮之細猶必勵舎生取義之莭况乎軍旅之事國之大事也而顧唯利所在不以義為衡尚詭道詐力曰兵事然也若然則行師者當専用小人矣周公何以曰小人勿用孔子何以曰必亂邦㢤今觀蘓洵云凡兵上義不義雖利勿動非一動之為害而他日将有所不可措手足固扵師卦之㫖有合也夫義者利之和也易曰利有攸往利渉大川惟其義之至乃真利之大失義即失利此非特虚言其理也迨至扵不可措手足之日而後知其果然失利而悔已晚也為此者必自小人矣未有師中之丈人而肯為國家動不義之兵者也且兵者刑也國語所謂大刑用甲兵是也必也矢石所加其人皆罪應死而後可以用兵是故王者之師有赦弗誅之人無濫誅之人弗誅者脅從罔治也其誅者皆不可並生者也兵交鋒接曷由區分之使銖両不差乎要其為我所殺者無無罪之人則可斷也我之士卒豈能無一傷且死然傷且死即已納之扵忠義之域而死已榮扵生傷已榮扵全矣非殺之也夫然兵乃可以動且夫王者之扵死獄也猶将求其生而不得然後死者與我皆無憾夫獄之死者一二人耳而乃如是若夫行師則所殺者必非止一二人也轉使千百無罪之人履腸塗腦而不顧豈聖人好生之徳亦有時而息而民之無辜聖人亦有時而殺㢤惟其天戈所指必不至殺一不辜故謂之曰王者之師若見利忘義雖以此得天下正伯夷伊尹與孔子之所必不為也况其茍一時之勝自以為利而未見他日之害者㢤蘇洵曰凡兵上義未已也凡兵上仁權書法制篇将戰必審知其将之賢愚與賢将戰則持之與愚将戰則乗之持之則容有所伺而為之謀乗之則一舉而奪其氣雖然非愚将勿乗乗之不動其禍在我分兵而迭進所以持之也并力而一戰所以乗之也古之善軍者以刑使人以賞使人以怒使人而其中必有以義附者焉不以戰不以掠而以備急難故越有君子六千人韓之戰秦之鬬士倍於晉而出穆公扵淖者赦食馬者也兵或寡而易危或衆而易叛莫難扵用衆莫危於用寡治衆者法欲繁繁則士難以動治寡者法欲簡簡則士易以察不然則士不任戰矣惟衆而繁雖勞不害為強以衆入險阻必分軍而踈行夫險阻必有伏伏必有約軍分則伏不知所撃而其約擕矣險阻懼蹙踈行以紓士氣兵莫危扵攻莫難於守客主之勢然也故地有二不可守兵少不足以實城城小不足以容兵夫惟賢将能以寡為衆以小為大當敵之衝人莫不守我以疑兵彼愕不進雖告之曰此無人彼不信也度彼所襲潜兵以備彼不我測謂我有餘夫何患兵少偃旗仆鼓寂若無氣嚴戢兵士敢譁者斬時令老弱登陴示怯乗懈突撃其衆可走夫何患城小背城而戰陣欲方欲踞欲密欲緩夫方而踞密而緩則士心固固則不懾背城而戰欲其不懾面城而戰陣欲直欲銳欲疎欲速夫直而銳踈而速則士心危危則致死面城而戰欲其致死夫能静而自觀者可以用人矣吾何為則怒吾何為則喜吾何為則勇吾何為則怯夫人豈異扵我天下之人孰不能自觀其一身是以知此理者塗之人皆可以将平居與人言一語不循故猶且􅌓而忌敵以形形我恬而不怪亦已固矣是故智者視敵有無故之形必謹察之勿動疑形二可疑於心則疑而為之謀心固得其實也可疑於目勿疑彼敵疑我也是故心疑以謀應目疑以静應彼誠欲有所為邪不使吾得之目矣觀九五曰觀我生君子无咎象曰觀我生觀民也說者謂觀我生而皆君子也則无咎觀我生觀民也者言觀我生即所以觀民也洵謂能静而自觀者可以用人知此理者塗之人可以将其有見扵是乎夫無事時所以治吏民者即有事時所以治軍旅静而自觀吾何喜何怒何勇何怯而知人之無異於我扵是所欲與聚所惡勿施則所以厚生者在是矣所欲所惡惟其理不惟其欲而以行其與聚勿施之政則所以正徳者亦在是矣此無事時所以治吏民者也及其有事而以治軍旅觀吾之何以喜知人之不異吾所喜而不喜者不以加諸人則必與士卒同甘苦矣觀吾之何以怒知人之不異吾所怒而有以善用其怒則一乃心而百其勇矣觀吾之何以勇知人之不異吾所勇而以道義配血氣則人皆樂其死而恥獨生矣觀吾之何以怯知人之不異吾所怯而先為其不可敗則戰必勝而攻必取矣孔子曰爼豆之事則甞聞之矣軍旅之事未甞學也聖人豈以軍旅為不當學㢤未有學養子而后嫁者也殺人之事於何可學孔子不又曰我戰則克祭則受福乎軍旅之學誠不出乎爼豆之間也如曰吾善為陳吾善為戰無論殺人盈野正王者之大罪人且必如戰國如五代然後人人習扵軍旅而有善為陳善為戰之人必若人而後可為将則承平數百年不見兵革必無良将也而豈其然㢤權書孫武篇求之而不窮者天下竒才也天下之士與之言兵而曰我不能者㡬人求之於言而不窮者㡬人言不窮矣求之於用而不窮者幾人嗚呼至扵用而不窮者吾未之見也孫武十三篇兵家舉以為師然以吾評之其言兵之雄乎今其書論竒權宻機出入神鬼自古以兵著書者罕所及以是而揣其為人必謂有應敵無窮之才不知武用兵乃不能必克與書所言逺甚呉王闔廬之入郢也武為将軍及秦椘交敗其兵越王入踐其國外禍内患一旦迭發呉王奔走自救不暇武殊無一謀以弭斯亂若按武之書以責武之失凡有三焉九地曰威加扵敵則交不得合而武使秦得聴包胥之言出兵救椘無忌呉之心斯不威之甚其失一也作戰曰久暴師則鈍兵挫銳屈力殫貨則諸侯乗其弊而起且武以九年冬伐椘至十年秋始還可謂久暴矣越人能無乗間入國乎其失二也又曰殺敵者怒也今武縦子胥伯嚭鞭平王屍復一夫之私忿以激怒敵此司馬戍子西子期所以必死讐呉也勾踐不頽舊塜而吴服田單譎燕掘墓而齊奮知謀與武逺矣武不逹此其失三也然始呉能以入郢乃因胥嚭唐蔡之怒及乗椘瓦之不仁武之功盖亦鮮耳夫以武自為書尚不能自用以取敗北况區區祖其故智餘論者而能将乎且呉起與武一體之人也皆著書言兵世稱之曰孫呉然而呉起之言兵也輕法制草略無所統紀不若武之書詞約而意盡天下之兵說皆歸其中然呉起始用扵魯破齊及入魏又能制秦兵入椘楚復霸而武之所為反如是書之不足信也固矣今夫外御一𨽻内治一妾是賤丈夫亦能夫豈必有一人而教之及夫御三軍之衆闔營而自固或且有亂然則是三軍之衆惑之也故善将者視三軍之衆與視一𨽻一妾無加焉故其心常若有餘夫以一人之心當三軍之衆而其中恢恢然猶有餘地此韓信之所以多多而益辦也故夫用兵豈有異術哉能勿視其衆而已矣言兵者祖太公六韜使太公果有書未有不見稱扵仲尼之徒者然則六韜固後人所託而太公本無書也隂符握竒不知誰氏所作或亦曰太公盖亦出孫呉之流歟古稱曺操用兵仿彿孫呉孫呉自古所重唐宋以来試武舉必以孫呉世俗遂謂用兵之道在聖人六經之外又疑孫呉之書人所共見必若子房所受扵圯上老人者乃發天地之秘作偽之徒又造為黄石素書以行扵世皆大謬妄可笑左傳曰天生五材民並用之廢一不可誰能去兵論語曰足食足兵兵大事也聖人寧有不著之於經者六經之言兵者多已莫備于易易扵同人於夬於萃於既未濟之屬皆言兵而専言之者師也至其微言之者莫若謙與豫謙之六五曰利用侵伐无不利上六曰利用行師征邑國豫曰利建侯行師盖必其在已也如山之䖏扵地中無絲毫侈大之念然後可以為天地裒多益寡舉兵以征不服其在天下也如雷之奮出於地雖震驚百里而百果草木仰受時雨之甘螟螣蟊賦倐焉掃迹而後其行師也不特殺人之中有禮焉且殺人之中有樂焉是以文王於豫曰利行師孔子於豫曰先王以作樂也若夫坤之六二坤之師也周公繋其爻曰直方大不習无不利夫直方而大則為将之道備矣師直為壯曲為老不使一毫之曲在已而後可以用三軍之命内志既直矣外體又必方不使一毫之邪僻在身而後有以服三軍之心夫然三軍之心為一心三軍之身為一身所至如時雨又若水之行地然入江併江入河併河可使天下無二水夫是之謂大誠其修之身者如此則雖倉卒之間有敵國外患俾之将百萬兵而曰閫以外将軍制之固不至扵改其常度而喪其匕鬯也而又何習焉故曰不習无不利也洵謂善将者視三軍之衆與視一𨽻一妾無加故其心常若有餘洵誠善状古良将之心者耶雖然不能直方大固不得強視百萬兵為一𨽻一妾也程子曰韓信多多益辦只為分數明夫所謂分數明亦不出乎直方大之義盖理必該數圓者理也方者数也竒而圎将帥所握以應無窮耦而方士卒所倚以明部位體必八而後方而其用則以六方之所由成由直而矩之者也是故古者陳必以八而唐太宗改為六非八非六則分數不能以明分數既明則衆不殊乎寡而小可極其大矣或曰管子之論兵也曰兵幸於權老子之論兵也曰以正治國以竒用兵孫子之論兵也曰兵者詭道司馬遷作齊世家謂周西伯與吕尚隂謀修徳以傾商政其事多兵權與竒計故後世之言兵及周之隂權皆宗太公為本謀今之所論無乃與古刺謬歟曰羣言淆亂衷諸聖諸說之不可與文王周公孔子較明矣况夫權者由經出者也竒者由正出者也無經何權無正何竒且凡所為權與竒者唯其萬變而不可推測卒至而不可預知故能權能竒者貴焉若可筆之扵書歴千百年而無改則非所謂權且竒者也将無趙括之父書乎此正蘇洵所以斥孫武之書為不可用者也若夫詭道隂權則戰國時非聖無法之語讀書多更事深則自知其無謂不足累筆費墨而與為辨矣權書六國篇六國破滅非兵不利戰不善弊在賂秦賂秦而力虧破滅之道也或曰六國互喪率賂秦耶曰不賂者以賂者喪盖失強援不能獨完故曰弊在賂秦也秦以攻取之外小則獲邑大則得城較秦之所得與戰勝而得者其實百倍諸侯之所亡與戰敗而亡者其實亦百倍則秦之所大欲諸侯之所大患固不在戰矣思厥先祖父暴霜露斬荆棘以有尺寸之地子孫視之不甚惜舉以予人如棄草芥今日割五城明日割十城然後得一夕安寝起視四境而秦兵又至矣然則諸侯之地有限暴秦之欲無厭奉之彌繁侵之愈急故不戰而強弱勝負已判矣至扵顛覆理固宜然古人云以地事秦猶抱薪救火薪不盡火不滅此言得之齊人未甞賂秦終繼五國遷滅何㢤與嬴而不助五國也五國既喪齊亦不免矣燕趙之君始有逺略能守其土義不賂秦是故燕雖小國而後亡斯用兵之效也至丹以荆卿為計始速禍焉趙甞五戰扵秦二敗而三勝後秦撃趙者再李牧連却之洎牧以讒誅邯鄲為郡惜其用武而不終也且燕趙處秦革滅殆盡之際可謂智力孤危戰敗而亡誠不得已向使三國各愛其地齊人勿附扵秦刺客不行良将猶在則勝負之數存亡之理當與秦相較或未易量嗚呼以賂秦之地封天下之謀臣以事秦之心禮天下之竒才并力西嚮則吾怨秦人食之不得下咽也悲夫有如此之勢而為秦人積威之所劫日削月割以趨於亡為國者無使為積威之所劫哉夫六國與秦皆諸侯其勢弱扵秦而猶有可以不賂而勝之之勢茍以天下之大下而従六國破亡之故事是又在六國下矣宋仁宗增嵗幣於契丹當時皆謂契丹無厭之求奚其可従竭中國膏血不足以為賂矣扵是志士扼腕恥之洵作㡬策審敵篇極言當絶其使勿與嵗幣而權書内又作六國論以先發其端焉夫仁宗之所以為仁而非小賢之所能測者正在和契丹一事伯宗曰川澤納汙山藪蔵疾瑾瑜匿瑕國君含垢天之道也仁宗之不忍鬬其民有太王之遺風矣彼安知南渡偏安百數十年中原之民無一日之㤀宋者乃仁宗深仁厚澤之所留遺哉審敵篇不足録此論六國事則確切不移故存之衡論重逺篇武王不泄邇不㤀逺仁矣乎非仁也勢也天下之勢猶一身一身之中手足病扵外則腹心為之深思静慮扵内而求其所以療之之術腹心病於内則手足為之奔捍扵外而求其所以療之之物腹心手足之相救非待仁而後然吾故曰武王之不泄邇不㤀逺非仁也勢也勢如此其急而古之君獨武王然者何也人皆知一身之勢而武王知天下之勢也夫不知一身之勢者一身危而不知天下之勢者天下不危乎㢤秦之保闗中自以為子孫萬世帝王之業而陳勝呉廣乃椘人也由此觀之天下之勢逺近如一然以吾言之近之可憂未若逺之可憂之深也近之官吏賢邪民譽之歌之不賢邪譏之謗之譽歌譏謗者衆則必傳傳則必逹扵朝廷是官吏之賢否易知也一夫不獲其所訴之刺史刺史不問裹糧走京師緩不過旬月撾鼔叫號而有司不得不省矣是民有寃易訴也吏之賢否易知而民之寃易訴亂何従始邪逺方之民雖使盗跖為之郡守檮杌饕餮為之縣令郡縣之民羣嘲而聚罵者雖千百為軰朝廷不知也白日執人扵市誣以殺人雖其兄弟妻子聞之亦不過訴之刺史不幸而刺史又抑之則死且無告矣彼見郡守縣令據案執筆吏卒旁列箠械滿前駭然而喪膽矣則其謂京師天子所居者當復如何而又行數千里費且百萬富者尚或難之而貧者又何能乎故其民常多怨而易動吾故曰近之可憂未若逺之可憂之深也國家分十七路河朔陕右南廣川峡實為要區河朔陕右二敵之防而中國之所恃以安南廣川峡貨財之源而河朔陕右之所恃以全其勢之輕重如何㢤曩者北敵驕恣西寇誖叛河朔陕右尤所加䘏一郡守一縣令未甞不擇至扵南廣川峽則例以為逺官審官差除取具臨時竄謫量移往往而至凡朝廷稍所優異者不復官之南廣川峡而其人亦以南廣川峡之官為失職庸人無所歸故常聚扵此嗚呼知河朔陕右之可重而不知河朔陕右之所恃以全之地之不可輕是欲富其倉而蕪其田倉不可得而富也矧其地控制南夷氐蠻最為要害土之所産又極富夥明珠大貝紈錦布帛皆極精好陸負水載出境而其利百倍然而闗譏門征僦雇之費非百姓私力所能辦故貪官專其利而齊民受其病不招權不鬻獄者世俗遂指以為亷吏矣而招權鬻獄者又豈盡無嗚呼吏不能皆亷而廉者又止如此是斯民不得一日安也方今賦取日重科歛日煩罷弊之民不任官吏復有所規求扵其間矣淳化中李順竊發扵蜀州郡數十望風奔潰近者智髙亂廣南乗勝取九城如反掌國家設城池養士卒蓄器械儲米粟以為戰守備而凶豎一起若渉無人之地者吏不肖也今夫以一身任一方之責者莫若漕刑南廣川峡既為天下要區而其中之郡縣又有為南廣川峡之要區者其牧宰之賢否實一方所以安危幸而賢則已其戕民黷貨的然有罪可誅者漕刑固亦得以舉劾若夫庸陋選耎不才而無過者漕刑雖賢明其勢不得易置此猶弊車躄馬而求僕夫之善御也郡縣有敗事不以責漕刑則不可責之則彼必曰敗事者某所治某所者某人也吾将何所歸罪故莫若使漕刑自舉其人而任之他日有敗事則謂之曰爾謂此人堪此職也今不堪此職是爾欺我也責有所任罪無所逃然而擇之不得其人者盖寡矣其餘郡縣雖非一方之所以安危者亦當詔審官俾勿輕授贓吏冗流勿措其間則民雖在千里外無異於處畿甸中矣宋承唐弊以邉徼為遷謫之所朝士有罪者乃之官焉溥天之下莫非王土率土之濵莫非王臣而以其逺而莫之省憂逺方之百姓何辜同是赤子而獨無父母之愛也洵所論誠切中其弊矣然謂近之可憂不若逺之可憂之深則固不然歴代有興有亡秦則未甞興也其亡即兆扵其兼并天下之日而非不祀忽諸者也是故秦事不可以例後世椘雖三戸亡秦必椘天道也豈椘人剽悍之故㢤况此之所謂楚者乃江淮間非蠻粤之逺也自三代以来亡國者亂必自近始奚甞自山陬海澨蠶叢鬼區始哉未有政朙扵上民戴扵下而蠻夷能入而圗中原者也洵之語無乃欲明重逺之義而不頋其論之偏轉開後世務逺忽近之弊歟至謂武王視天下之勢如一身真善言聖人者然曰此勢也非仁也則固未識仁矣視天下之勢如一身正乃所以為仁而曰是非仁其将以煦煦為仁耶衡論廣士篇古之取士取扵盗賊取於夷狄古之人非以盗賊夷狄之事可為也以賢之所在而已矣夫賢之所在貴而貴取焉賤而賤取焉是以盗賊下人夷狄異類雖奴𨽻之所恥而往往登之朝廷坐之郡國而不以為怍而繩趨尺歩華言華服者往往反擯棄不用何則天下之能繩趨而尺歩華言而華服者衆也朝廷之政郡國之事非特如此而可治也彼雖不能繩趨而尺歩華言而華服然而其才果可用扵此則居此位可也古者天下之國大而多士大夫者不過曰齊與秦也而管夷吾相齊賢也而舉二盗焉穆公霸秦賢也而舉由余焉是其能果於是非而不牽扵衆人之議也未聞有以用盗賊夷狄而鄙之者也今有人非盗賊非夷狄而猶不獲用吾不知其何故也夫古之用人無擇扵勢布衣寒士而賢則用之公卿之子弟而賢則用之武夫健卒而賢則用之巫醫方技而賢則用之胥史賤吏而賢則用之今也布衣寒士持方尺之紙書聲病剽竊之文而至享萬鍾之禄卿大夫之子弟飽食扵家一出而驅髙車駕大馬以為民上武夫健卒有灑掃之力奔走之舊久乃領藩郡執兵柄巫醫方技一言之中大臣且舉以為吏若此者皆非賢也皆非功也是今之所以進之之塗多扵古也而胥史賤吏忽之而不録使老死於敲榜趨走而賢與功者不獲一施吾甚惑也不知胥吏之賢優而養之則儒生武士或所不若昔者漢有天下平津侯樂安侯軰皆號為儒宗而卒不能為漢立不世大功而其卓絶雋偉震耀四海者乃其賢人之出扵吏胥中者耳夫趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞太守之卒史也王尊涿郡之書佐也是皆雄雋明博出之可以為将而内之可以為相者也而皆出扵吏胥中者有以也夫吏胥之人少而習法律長而習獄訟老奸大豪畏憚懾伏吏之情状變化出入無不諳究因而官之則豪民猾吏之弊表裏毫末畢見扵外無所逃遁而又上之人擇之以才遇之以禮而其志復自知得自奮扵公卿故終不肯自棄扵惡以賈罪戾而敗其終身之利故當此時士君子皆優為之而其間自縦於大惡者大約亦不過㡬人而其尤賢者乃至成功如是今之吏胥則不然始而入之不擇也終而遇之以犬彘也長吏一怒不問罪否袒而笞之喜而接之乃反與交手為市其人常曰長吏待我以犬彘我何望而不為犬彘㢤是以平民不能自棄為犬彘之行不肯為吏矣况士君子而肯俛首為之乎然欲使之謹飭可用如兩漢亦不過擇之以才待之以禮恕其小過而棄絶其大惡之不可貰忍者而後察其賢有功而爵之禄之貴之勿棄之扵冗流之間則彼有冀扵功名自尊其身不敢匄奪而竒才絶智出矣夫人固有才智竒絶而不能為章句名數聲律之學者又有不幸而不為者茍一之以進士制䇿是使竒才純智有時而窮也使吏胥之人得出為長吏是使一介之才無所逃也進士制策網之於上此又網之扵下而曰天下有遺才者吾不信也漢去周未逺其士之秀良州牧辟命以為掾史他時三公六卿九牧胥扵是乎選吏既習扵民事故循績易奏吏與士同途故人不恥為吏唐宋以来以制舉取士求士扵文采聲華而士乃不習民事吏習民事而不得美仕吏日下士日尊判然两途而士之子恒為士降而為吏即為隳其家聲扵是吏益以無頼雖無賴然而在一邑則一邑之政由其手在一郡則一郡之政由其手在一部則一部之政由其手以無賴之人而政出其手則無所往而不為弊矣朝廷欲興一利吏即随所興者以滋百弊欲革此弊吏即随所革者以滋他弊自知罪大則縦火以去其籍使茫然莫知其顚末且也官有除降而吏則長子養孫官避本籍而吏則土著世守即年滿有制重役有禁而子弟親戚迭出不窮更名而不更人更人而不更其所守夫以他州外郡之人為来往無常之官官一而吏百又皆文采聲華不習民事之官以之駕馭百十為羣熟悉風土諳練事故作奸犯科無頼之吏扵此而能奏循績焉固較漢世難什伯也沿習既久如久病之人轉以病為命一旦悉去此軰則百司茫然一歩不可行勢不能以終日嗟乎欲天下之治不改弦更張使吏有士君子之行而欲民生䝉福教化淳美者猶欲其入而閉之門也洵為廣士論欲使吏與士同升扵朝固是切要之言雖然未易易也必先去其大惡之不可貰忍者而為之功名之途使得與士齒優柔漸漬潛移黙奪之漸使士之秀良者不恥為吏而士之習於吏者得自奮扵公卿然後可與道古盖非百年不能矣若舉洵之言一旦驟施之令無頼吏得居士夫間正所為吏道雜而多端害政之尤甚者也洵為權書十篇衡論十篇㡬策二篇歐陽修上之仁宗皇帝乃召試洵洵不就權書言兵也衡論者言有權必有衡所以用此權者也㡬策則欲上之審㡬而更化㡬審而後可用此權與衡也其意大概如此權書十篇類兵家常言或逆料古人横斷其是非而非其實衡論十篇大要欲人主用機智明刑法其言流扵申商兵制田制尤紛擾㡬䇿二篇一曰審勢勸人主以用威一曰審敵欲絶契丹而修戰備今擇其大醇者餘並不録甞考宋仁宗之為君恭儉慈恵出扵天性其仁民容物之心實漢唐宋諸帝中之首出者既與遼為與國唯欲睦鄰以息兵甞服通天犀帶左右譝之謂此帶無雙即觧不服左右請其故曰留以遺北主盖其心茍可以弭兵者無不為未甞頃刻不在念也當時百姓受其休養生息之恩如天廣大而不識不知一時才俊之士不逹其深心莫測其分量轉以漢景之綜核名實漢武之耀兵黷武期其奮發慕效茍欲以張國威而不知君天下之道固在此不在彼也言者亦不止蘇洵而仁宗並勿聴亦終不以自明迨後神宗相王安石君臣一心薄仁宗之所為為不足為行新法開邉釁扵是百姓流離干戈不息而當日之議仁宗者至此未有不追思仁宗者矣事勢既已潰敗國歩因之日促而元祐諸賢首被其禍延至崇宣之間淪胥以鋪無一免矣嗟夫策國是良非易易毋為坐井以觀天而曰天小也御選唐宋文醇巻三十四
