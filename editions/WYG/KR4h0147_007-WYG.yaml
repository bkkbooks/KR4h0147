body:
  text: 昌黎韓愈文七順宗實録祭文哀辭順宗實録紀張萬福陸贄陽城祭田横墓文祭郴州李使君文祭河南張員外文祭柳子厚文祭侯主簿文祭馬僕射文祭鄭夫人文祭十二郎文獨狐申叔哀辭欽定四庫全書御選唐宋文醇巻七昌黎韓愈文七順宗實録紀張萬福陸贄陽城左散騎常侍致仕張萬福卒萬福魏州元城人也自曽祖至父皆明經官止縣令州佐萬福以祖父業儒皆不達不喜書學騎射年十七八從軍遼東有功為將而還累遷至夀州刺史州送租賦詣京師至潁川界為盗所奪萬福使輕兵馳入潁川界討之賊不意萬福至忙廹不得戰萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬萬計悉還其家為淮南節度崔圓所忌失刺史改鴻臚卿以節度副使將兵千人鎮夀州萬福不以為恨許杲以平盧行軍司馬將卒三千人駐濠州不去有窺淮南意圓令萬福攝濠州刺史杲聞即提卒去止當塗陳莊賊陷舒州圓又以萬福為舒州刺史督淮南岸盗賊連破其黨大厯三年召赴京師代宗謂曰聞卿名乆欲一識卿且將累卿以許杲萬福拜謝因前曰陛下以許杲召臣如河北賊諸將叛以屬何人代宗笑曰且欲議許杲事方當大用卿即以為和州刺史行營防禦使督淮南岸盗賊至州杲懼移軍上元杲至楚州太掠節度使韋元甫命萬福討之未至淮隂杲為其將康自勤所逐自勤擁兵繼掠循淮而東萬福倍道追而殺之免者十二三盡得其所虜掠金銀婦女等皆䕶致其家代宗詔以本州兵千五百人防秋京西遂帶和州刺史鎮咸陽因留宿衞李正己反將斷江淮路令兵守埇橋渦口江淮進奉船千餘隻泊渦口不敢進徳宗以萬福為濠州刺史萬福馳至渦口立馬岸上發進奉船淄青將士停岸睥睨不敢動諸道繼進改泗州刺史為杜亞所忌徵拜左金吾衞將軍召見徳宗驚曰杜亞言卿昏耄卿乃如是健耶圖形凌烟閣數賜酒饌衣服并勅度支籍口畜給其費至賀陽城等於延英門外天下益重其名二十一年以左散騎常侍致仕元和元年卒年九十萬福自始從軍至卒禄食七十年未嘗病一日典九郡皆有恵愛贈故忠州别駕陸贄兵部尚書故道州刺史陽城左常侍贄字敬輿呉郡人也年十八進士及第又以博學宏詞授鄭縣尉書判拔萃授渭南尉遷監察御史未幾選為翰林學士遷祠部員外郎徳宗幸奉天贄隨行在天下騷擾逺近徴發書詔一日數十下皆出於贄贄操筆持紙成於須臾不復起草同職皆拱手嗟嘆不能有所助常啟徳宗言方今書詔宜痛自引過罪己以感人心昔成湯以罪己致興後代推以為聖人楚王失國亡走一言善而復其國至今稱為賢者陛下誠能不恡改過以言謝天下臣雖愚陋為詔詞無所忌諱庶能令天下叛逆者迴心喻㫖徳宗從之故行在制詔始下聞者雖武人捍卒無不揮淚感激議者咸以為徳宗剋平寇難旋復天位不惟神武成功爪牙宣力葢以文徳廣被腹心有助焉累遷考功郎中諫議大夫中書舎人兼翰林學士丁母憂免喪權知兵部侍郎復入翰林中外屬意旦夕竢其為相竇參深忌之贄亦短參之所為且言其黷貨於是與參不能平尋真拜兵部侍郎知禮部貢舉於進士中得人為多八年春遷中書侍郎平章事始令吏部每年集選人舊事吏部每年集人其後遂三年一置選選人猥至文書多不了尋勘真偽紛雜吏因得大為姦巧選士一蹉跌或至十年不得官而官之闕者或累嵗無人贄令吏部分内外官員為三分計闕集人以為常其弊十去七八天下稱之初竇參出李巽為常州刺史且廹其行巽常銜之至參貶為郴州别駕巽適遷湖南觀蔡徳宗常與參言故相姜公輔罪參漏其語參敗公輔因上䟽自陳其事非臣之過徳宗詰之知參洩其語怒未有所發㑹巽奏汴州節度劉士寜遺參金帛若干士寜得汴州參處其議士寜常徳之故致厚貺徳宗以參得罪而以武將交結發怒竟致參於死而議者多言參死由贄焉裴延齡判度支天下皆嫉忌而獨幸於天子朝廷無敢言其短者贄獨身當之日陳其不可用延齡因欲去贄而代之又知贄之不與己多阻其奏請也謗毁百端翰林學士吳通元故與贄同職姦巧佻薄與贄不相能知贄與延齡相持有間因盛言贄短宰相趙璟本贄所引同對嫉贄之權宻以贄所戢彈延齡事告延齡延齡益得以為計由是天子益信延齡而不直贄竟罷贄相以為太子賔客而黜張滂李充等權言事者皆言其屈贄固畏懼至為賔客拒門不納交親士友春旱徳宗數獵苑中延齡䟽言贄等失權怨望言於衆曰天下旱百姓且流亡度支愛惜不肯給諸軍軍中人無所食其事奈何以揺動羣心其意非止欲中傷臣而巳後數日又獵苑中㑹神䇿軍人跪馬前云度支不給馬草徳宗意延齡前言即迴馬而歸由是貶贄為忠州别駕滂充皆斥逐徳宗怒未解贄不可測頼陽城等救乃止贄之為相常以少年入翰林得幸於天子長養成就之不敢自愛事之不可者皆争之徳宗在位乆益自攬持機柄親治細事失君人大體宰相益不得行其事職而議者乃云由贄而然贄居忠州十餘年常閉門不出入人無識靣者避謗不著書習醫方集古今名方為陸氏集驗方五十巻卒於忠州年五十二上初即位與鄭餘慶陽城同徵詔始下而城贄皆卒城字亢宗北平人代為官族好學貧不能得書乃求入集賢為書冩吏竊官書讀之晝夜不出經六年遂無所不通乃去滄州中條山下逺近慕其徳行來學者相繼於道閭里有争者不詣官府詣城以決之李泌為相舉為諫議大夫拜官不辭未至京師人皆想望風采云城山人能自苦刻不樂名利必諫諍死職下咸畏憚之既至諸諫官紛紛言事細碎無不聞逹天子益厭苦之而城方與其二弟牟容連夜痛飲人莫能窺其意有懷刺譏之者將造城而問者城揣知其意輙彊與酒客或時先醉仆席上或時先醉卧客懷中不能聴客語約其二弟云吾所得月俸汝可度吾家有幾口月食米當幾何買薪菜鹽米凡用幾錢先具之其餘悉以送酒媪無留也未嘗有所貯積雖其所服用切急不可闕者客稱其物可愛城輙喜舉而授之陳萇者候其始請月俸常往稱其錢帛之美月有獲焉至裴延齡讒毁陸贄等坐貶黜徳宗怒不解在朝無救者城聞而起曰吾諫官也不可令天子殺無罪之人而信用姦臣即率拾遺王仲舒數人守延英門上䟽論延齡姦佞贄等無罪狀徳宗大怒召宰相入語將加城等罪良乆乃解令宰相諭遣之於是金吾將軍張萬福聞諫官伏閤諫趨往至延英門大言賀曰朝廷有直臣天下必太平矣遂徧拜城與仲舒等曰諸諫議能如此言事天下安得不太平也巳而連呼太平萬嵗太平萬嵗萬福武人時年八十餘自此名重天下時朝夕相延齡城曰脫以延齡為相當取白麻壊之慟哭於庭竟坐延齡事改國子司業至引諸生告之曰凡學者所以學為忠與孝也諸生寜有乆不省其親乎明日謁城歸養者二十餘人有薛約者嘗學於城狂躁以言事得罪將徙連州客寄有根蔕吏縱求得城家坐吏於門與約飲決别涕泣送之郊外徳宗聞之以城為黨罪人出為道州刺史太學生魯卿李儻等二百七十人詣闕乞留住數日吏遮止之䟽不得上在州以家人禮待吏人宜罰者罰之宜賞者賞之一不以簿書介意賦稅不登觀察使數誚讓上考功第城自署第曰撫字心勞徴科政拙考下下觀察使嘗使判官督其賦至州怪城不出迎以問州吏吏曰刺史聞判官來以為巳有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一兩日未去城固不復歸館門外有故門扇横地城晝夜坐卧其上判官不自安辭去其後又遣他判官崔某往按之崔承命不辭載妻子以行中道而逃城孝友不忍與其弟異處皆不娶給侍終身有寡妹依城以居有生年四十餘癡不能如人常與弟負之以遊初城之妹夫亡在他處家貧不能𦵏城親與其弟舁尸以歸𦵏於其居之側往返千餘里卒時年六十餘天生昌黎而所為欲作唐之一經者有志而未逮也即順宗實錄一書亦有後人竄易處良可惜也今録書中三傳以存韓氏之史云祭田横墓文貞元十一年九月愈如東京道出田横墓下感横義高能得士因取酒以祭為文而弔之其辭曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁余既博觀乎天下曷有庶幾乎夫子之所為死者不復生嗟予去此其從誰當秦氏之敗亂得一士而可王何五百人之擾擾而不能脱夫子於劔鋩抑所寶之非賢亦天命之有常昔闕里之多士孔聖亦云其遑遑茍余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光跽陳辭而薦酒魂髣髴而來享晁无咎云唐宰相如董晉亦未足言而晉為汴州纔奏愈從事愈始終感遇語稱隴西公而不姓後從裴度亦自謂度知已然度亦終不引愈共天下事故愈躊躇發憤太息於區區之横以為夫茍如横之好士天下將有賢於五百人者至焉君子一言以為不知其斯言之謂歟古今學人論世之謬莫大於不計年嵗而隨舉一生之迹以就吾所論之一事今按文曰貞元十一年九月愈如東京道出田横墓下則其年愈方二十八嵗舉宏詞不第去明年董晉始表為汴州觀察推官也其時裴度為監察御史以論權要梗切出為河南功曹參軍而乃謂愈作田横祭文為感董晉而怨裴度何其不深考也如董晉者能屈回紇强虜降懷光賊臣以片言其為人豈又易易而曰未足言如田横者能感五百人皆自剄以殉而曰區區之横何其放言高論乃爾也稍進便當曰區區之周公孔子矣裴度為相伐蔡引愈為行軍司馬愈時右庶子耳歸擢刑部侍郎嚮用矣己而為迎佛骨事直言極諫貶潮州刺史愈自為之而自當之求仁而得仁又何怨使怨裴度不己薦真灌夫所謂不值一錢者哉若夫稱董晉為隴西公而不姓乃一時行文偶爾聞有諱君父之名者矣未聞有諱舉主之名者也聞有諱君父之名者矣未聞有諱君父之姓者也以此推崇昌黎昌黎不受也祭郴州李使君文維年月日將仕郎守江陵府法曹參軍韓愈謹以清酌庶羞之奠敬祭於故郴州李使君之靈古語有之白頭如新傾葢若舊顧意氣之何如何日時之足究當貞元之癸未惕皇威而左授伏荒炎之下邑嗟名頽而位仆歴貴部而西邁邇清光於暫覩言莫交而情無由既不賈而奚售哀窮遐之無徒拏百憂以自副辱問訊之綢繆恒飽飢而愈疚接雄詞於章句窺逸跡於篆籀苞黄甘而致貽獲紙筆之雙貿投义魚之短韻媿韜瑕而舉秀竢新命於衡陽費薪芻於館候空大亭以見處憇水木之幽茂逞英心於縱博沃煩腸以清酎航北湖之空明覷鱗介之驚透宴州樓之豁達衆管啾而並奏得恩恵於新知脱窮愁於往陋輟行謀於俄頃見秋月之三彀逮天書之下降猶低迴以宿留念暌離之在期謂此㑹之難又授縞紵以託心示兹誠之不謬儻後日之北遷約窮歡於一晝雖掾俸之酸寒要拔貧而為富何人生之難信捐斯言而莫就始訝信於暫踈遂承凶於不救見明旌之低昻尚遲疑於别袖憶交酬而迭舞奠單盃而哭柩美夫君之為政不撓志於讒構遭脣舌之紛羅獨陵晨而孤雊彼憸人之浮言雖百車其何詬洞古往而高觀固邪正之相寇幸竊覩其始終敢不明白而蔽覆神乎來哉辭以為侑尚饗朱子曰公貞元十九年冬出為陽山令過郴州識李使君有李員外寄紙筆及义魚詩即所謂獲紙筆之雙貿投义魚之短韻也其生平契分皆具此文筆墨間録云祭李郴州文尤雄竒祭河南張員外文維年月日彰義軍行軍司馬守太子右庶子兼御史中丞韓愈謹遣某乙以庶羞清酌之奠祭於亡友故河南縣令張十二員外之靈貞元十九君為御史余以無能同詔並跱君徳渾剛標高掲巳有不吾如唾猶泥滓余戇而狂年未三紀乗氣加人無挾自恃彼婉孌者實憚吾曹側肩帖耳有舌如刀我落陽山以尹鼯猱君飄臨武山林之牢嵗弊寒兇雪虐風饕顛於馬下我泗君咷夜息南山同卧一席守隸防夫觝頂交跖洞庭漫汗粘天無壁風濤相豗中作霹靂追程盲進颿船箭激南上湘水屈氏所沈二妃行迷淚蹤染林山哀浦思鳥獸叫音余唱君和百篇在吟君止於縣我又南踰把􅊦相飲後期有無期宿界上一又相語自别幾時遽變寒暑枕臂欹眠加余以股僕來告言虎入廐處無敢驚逐以我􅐒去君云是物不駿於乗虎取而往來寅其徵我預在此與君俱膺猛獸果信惡禱而憑余出嶺中君竢州下偕掾江陵非余望者郴山竒變其水清冩泊砂倚石有遌無捨衡陽放酒熊咆虎嘷不存令章罰籌蝟毛委舟湘流往觀南嶽雲壁潭潭穹林攸擢避風太湖七日鹿角鉤登大鮎怒頰豕豞臠盤炙酒羣奴餘啄走官階下首下凥高下馬伏塗從事是遭予徵博士君以使巳相見京師過願之始分教東生君掾雍首兩都相望於别何有解手背靣遂十一年君出我入如相避然生濶死休呑不復宣刑官屬郎引章訐奪權臣不愛南昌是斡明條謹獄氓獠户歌用遷澧浦為人受瘥還家東都起令河南屈拜後生憤所不堪屢以正免身伸事蹇竟死不昇孰勸為善丞相南討余辱司馬議兵大梁走出洛下哭不憑棺奠不親斝不撫其子𦵏不送野望君傷懷有隕如㵼銘君之蹟納石壤中爰及祖考紀徳事功外著後世鬼神與通君其奚憾不余鑒衷鳴呼哀哉尚饗朱子曰貞元十九年冬公與張署自御史俱出南方為令明年順宗即位俱徙江陵故凡道塗經涉唱和契濶皆具此文公方從晉公討蔡祭其在元和十二年八月歟張之行治則詳於公誌祭栁子厚文維年月日韓愈謹以清酌庶羞之奠祭於亡友栁子厚之靈嗟嗟子厚而至然邪自古莫不然我又何嗟人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟凡物之生不願為材犧尊青黄乃木之葘子之中棄天脱􅎗羈玉佩瓊琚大放厥辭富貴無能磨滅誰紀子之自著表表愈偉不善為斲血指汗顔巧匠旁觀縮手袖間子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復羣飛刺天嗟嗟子厚今也則亡臨絶之音一何琅琅徧告諸友以寄厥子不鄙謂余亦託以死凡今之交觀勢厚薄余豈可保能承子託非我知子子實命我猶有鬼神寜敢遺墮念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉尚饗姚令威曰子厚以元和十四年十月五日卒於栁州公其月自潮即袁明年自袁召為國子祭酒此文袁州作也故劉夢得祭子厚文有云退之承命改牧宜陽亦馳一函候於便道其後序栁集又云凡子厚行巳之大方有退之之誌若祭文在祭文蓋謂此也祭侯主簿文維年月日吏部侍郎韓愈謹遣男殿中省進馬佶致祭於亡友故國子主簿侯君之靈嗚呼惟子文學今誰過之子於道義困不拾遺我狎我愛人莫與夷自始及今二紀於兹我或為文筆俾子持唱我和我問我以疑我釣我遊莫不我隨我寢我休莫爾之私朋友昆弟情敬異施惟我於子無適不宜棄我而死嗟我之衰相好滿目少年之時日月云亡今其有誰誰不富貴而子為羈我無利權雖怨曷為子之方𦵏我方齋祠哭送不可誰知我悲嗚呼哀哉尚饗朱子曰詳觀公此文當知其為侯喜作公貞元十七年與喜同漁於温洛嘗有詩云吾黨侯生字叔􅙝呼我持竿釣温水故此又有我釣我遊莫不我隨之語嘗薦喜於汝州刺史盧郎中又嘗薦之於陸員外傪觀其薦詞亦與此文惟子文學今誰過之之意相表裏又公集中端有贈侯主簿喜詩用是知其非侯繼也其曰吏部侍郎韓愈即長慶二年自兵部轉吏部時作祭馬僕射文維年月日吏部侍郎韓愈謹以清酌庶羞之奠敬祭於故僕射馬公十二兄之靈惟公𢎞大温恭全然徳備天故生之其必有意將明將昌實艱初試佐戎滑䑓斥由尹寺適彼甌閩􅙠􅘕䟦躓顛而不踒乃得其地于泉于䖍始執郡符遂殿交州杭節番禺去其螟蠧蠻越大蘇擢亞秋官朝得碩士人謂其崇我勢始起東征淮蔡相臣是使公兼邦憲以副經紀殱彼大魁厥勲孰似丞相歸治留長蔡師茫茫黍稷昔實棘茨鳩鳴雀乳不見梟鴟惟蔡及許舊為血仇命公并侯耕借之牛束其弓矢禮讓優優始誅鄆戎厥墟腥臊公往滌之兹惟樂郊惟東有猘惟西有虺顛覆朋鄰我餘有幾嵂崒中居斬其脊尾岱定河安惟公之韙帝念厥功還公於朝陟於地官且長百僚度彼西方孰樂可據顧瞻衡鈞將舉以付惟公積勤以疾以憂及其歸時當謝之秋賀門未歸弔廬以萃未燕于堂巳哭于次昔我及公實同危事且死且生誓莫捐棄歸来握手曽不三四曽不濡翰酬酢文字曽不醉飽以勸酒胾奠以叙哀其何能致嗚呼哀哉尚饗嚴有翼曰馬十二名摠字會元扶風人退之長慶三年冬自京兆尹復為兵部侍郎又遷吏部侍郎其為京兆也有舉馬摠自代狀今祭文稱吏部侍郎則摠以是年冬死也祭鄭夫人文維年月日愈謹於逆旅備時羞之奠再拜頓首敢昭祭於六嫂榮陽鄭氏夫人之靈嗚呼天禍我家降集百殃我生不辰三嵗而孤䝉㓜未知鞠我者兄在死而生實維嫂恩未齓一年兄宦王官提攜負任去洛居秦念寒而衣念飢而飱疾疹水火無葘及身劬勞閔閔保此愚庸年方及紀薦及凶屯兄罹讒口承命逺遷窮荒海隅天閼百年萬里故鄉幼孤在前相顧不歸泣血號天微嫂之力化為夷蠻水浮陸走丹旐翩然至諴感神返𦵏中原既克反𦵏遭時艱難百口偕行避地江濆春秋霜露薦敬蘋蘩以享韓氏之祖考曰比韓氏之門視余猶子誨化諄諄爰來京師年在成人屢貢於王名廼有聞念兹頓頑非訓曷因感傷懷歸隕涕熏心茍容躁進不顧其躬禄仕而還以為家榮奔走乞假東西北南孰云此來廼睹靈車有志弗及長負殷勤嗚呼哀哉昔在韶州之行受命於元兄曰爾㓜養於嫂喪服必以朞今其敢忘天實臨之嗚呼哀哉日月有時歸合塋封終天永辭絶而復蘇伏惟尚饗洪興祖曰夫人韓會之妻而公之嫂也公少孤而育於其嫂文言其拊育之恩至矣公既為之服朞而祭之以文此貞元十一年往河陽時作貞觀中魏徴令狐徳棻等議嫂叔服云或有長年之嫂遇孩提之叔劬勞鞠養情若所生分饑共寒契濶偕老其在生也愛之同於骨月及其死則推而逺之求之本原深所未諭且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顔洪都則竭誠致感馬援則見之必冠孔伋則哭之為位察其所尚豈非先覺嫂叔舊無服今請服小功五月制可公幼養於嫂服朞以報可為士大夫之法矣李漢序公文集及李習之狀亦云祭十二郎文年月日季父愈聞汝喪之七日乃能銜哀致誠使建中逺具時羞之奠告汝十二郎之靈嗚呼吾少孤及長不省所怙惟兄嫂是依中年兄殁南方吾與汝俱幼從嫂歸𦵏河陽既又與汝就食江南零丁孤苦未嘗一日相離也吾上有三兄皆不幸早世承先人後者在孫惟汝在子惟吾兩世一身形单影隻嫂常撫汝指吾而言曰韓氏兩世惟此而已汝時尤小當不復記憶吾時雖能記憶亦未知其言之悲也吾年十九始來京城其後四年而歸視汝又四年吾往河陽省墳墓遇汝從嫂喪來𦵏又二年吾佐董丞相於汴州汝來省吾止一嵗請歸取其孥明年丞相薨吾去汴州汝不果來是年吾佐戎徐州使取汝者始行吾又罷去汝又不果來吾念汝從於東東亦客也不可以乆圖乆逺者莫如西歸將成家而致汝嗚呼孰謂汝遽去吾而歿乎吾與汝俱少年以為雖暫相别終當乆相與處故捨汝而旅食京師以求斗斛之禄誠知其如此雖萬乗之公相吾不以一日輟汝而就也去年孟東野往吾書與汝曰吾年未四十而視茫茫而髪蒼蒼而齒牙動揺念諸父與諸兄皆康彊而早世如吾之衰者其能乆存乎吾不可去汝不肯來恐旦暮死而汝抱無涯之戚也孰謂少者殁而長者存彊者天而病者全乎嗚呼其信然邪其夢邪其傳之非其真邪信也吾兄之盛徳而天其嗣乎汝之純明而不克䝉其澤乎少者彊者而天歿長者衰者而存全乎未可以為信也夢也傳之非其真也東野之書耿蘭之報何為而在吾側也嗚呼其信然矣吾兄之盛徳而夭其嗣矣汝之純明宜業其家者不克蒙其澤矣所謂天者誠難測而神者誠難明矣所謂理者不可推而夀者不可知矣雖然吾自今年來蒼蒼者或化而為白矣動揺者或脱而落矣毛血日益衰志氣日益微幾何不從汝而死也死而有知其幾何離其無知悲不幾時而不悲者無窮期矣汝之子始十嵗吾之子始五嵗少而彊者不可保如此孩提者又可冀其成立邪嗚呼哀哉嗚呼哀哉汝去年書云比得軟脚病往往而劇吾曰是疾也江南之人常常有之未始以為憂也嗚呼其竟以此而殞其生乎抑别有疾而至斯乎汝之書六月十七日也東野云汝殁以六月二日耿蘭之報無月日葢東野之使者不知問家人以月日如耿蘭之報不知當言月日東野與吾書乃問使者使者妄稱以應之耳其然乎其不然乎今吾使建中祭汝弔汝之孤與汝之乳母彼有食可守以待終喪則待終喪而取以來如不能守以終喪則遂取以來其餘奴婢並令守汝喪吾力能改𦵏終𦵏汝於先人之兆然後惟其所願嗚呼汝病吾不知時汝殁吾不知日生不能相養以共居殁不得撫汝以盡哀斂不憑其棺窆不臨其穴吾行負神明而使汝夭不孝不慈而不得與汝相養以生相守以死一在天之涯一在地之角生而影不與吾形相依死而魂不與吾夢相接吾實為之其又何尤彼蒼者天曷其有極自今己往吾其無意於人世矣當求數頃之田於伊潁之上以待餘年教吾子與汝子幸其成長吾女與汝女待其嫁如此而巳嗚呼言有窮而情不可終汝其知也邪其不知也邪嗚呼哀哉尚饗樊汝霖曰老成率府叅軍韓介之子也介二子曰百川曰老成起居舎人會無子以老成為後老成生湘滂百川死公乃命滂歸後其祖介公及會介皆仲卿子至是㑹介百川皆死矣故文曰吾上有三兄皆不幸早世承先人後者在孫惟汝在子惟吾又云去年東野往吾書與汝葢貞元十八年有送東野序即是年為十九年此文必其秋冬作十二月則公謫陽山矣斯文葢公所謂喜往復善自道者在當時無對後二百七十年歐陽文忠公為其父作瀧岡阡表始足以追配公此作覽者當自知之獨孤申叔哀辭衆萬之生誰非天邪明昭昏蒙誰使然邪行何為而怒居何故而憐邪胡喜厚其所可薄而恒不足於賢邪將下民之好惡與彼蒼懸邪抑蒼茫無端而蹔寓其間邪死者無知吾為子慟而巳矣如有知也子其自知之矣濯濯其英曄曄其光如聞其聲如見其容烏虖逺矣何日而忘朱子考異載申叔字子重年二十一舉進士又二年用博學宏詞為校書郎又三年居父喪未練而殁葢貞元十八年也栁子厚有獨孤君墓碣皇甫持正有傷獨孤賦而公作辭哀之公嘗與崔羣書天人好惡之說與此語意一同葢出太史公之伯夷論也今按與崔羣書意與此不同彼所重在人固有薄卿相之位以下數語見貧富貴賤夀夭皆非天之好惡所存聖賢固好善而惡惡矣天亦唯有好善而惡惡茍善矣貧賤夭死不足為重輕猶既得照乗之珠則瓦礫雖百車匪我思存矣故下文云崔君崔君無怠無怠朋友相礪之辭也此則哀申叔之死而呼天以問之猶楚辭天問之類體裁各異則語雖同而義自不得而同也御選唐宋文醇巻七
