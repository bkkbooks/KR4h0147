body:
  text: 昌黎韓愈文八碑平淮西碑南海神廟碑栁州羅池廟碑衢州徐偃王廟碑袁氏先廟碑曹成王碑欽定四庫全書御選唐宋文醇卷八昌黎韓愈文八平淮西碑天以唐克肖其徳聖子神孫繼繼承承於千萬年敬戒不怠全付所覆四海九州罔有内外悉主悉臣髙祖太宗既除既治髙宗中睿休養生息至於𤣥宗受報收功極熾而豐物衆地大孽芽其間肅宗代宗徳祖順考以勤以容大慝適去稂莠不薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝乃考圖數貢曰鳴呼天既全付予有家今傳次在予予不能事事其何以見於郊廟羣臣震懾奔走率職眀年平夏又眀年平蜀又眀年平江東又眀年平澤潞遂定易定致魏博貝衛澶相無不從志皇帝曰不可究武予其少息九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四劫皇帝歴問於朝一二臣外皆曰蔡帥之不廷授於今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆決唱聲萬口和附并為一談牢不可破皇帝曰惟天惟祖宗所以付任予者庶其在此予何敢不力況一二臣同不為無助曰光顔汝為陳許帥維是河東魏博郃陽三軍之在行者汝皆將之曰重𦙍汝故有河陽懐今益以汝維是朔方義成陜益鳯翔延慶七軍之在行者汝皆將之曰𢎞汝以卒萬二千屬而子公武往討之曰文通汝守夀維是宣武淮南宣歙浙西四軍之行於夀者汝皆將之曰道古汝其觀察鄂岳曰愬汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝予同汝遂相予以賞罰用命不用命曰𢎞汝其以節都統諸軍曰守謙汝出入左右汝惟近臣其往撫師曰度汝其往衣服飲食予士無寒無飢以既厥事遂生蔡人賜汝節斧通天御帶衛卒三百凡兹廷臣汝擇自從惟其賢能無憚大吏庚申予其臨門送汝曰御史予閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂顔𦙍武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降萬三千再入申破其外城文通戰其東十餘遇降萬二千愬入其西得賊將輒釋不殺用其策戰比有功十二年八月丞相度至師都統𢎞責戰益急顔𦙍武合戰益用命元濟盡并其衆洄曲以備十月壬申愬用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛已丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縦之斬元濟京師册功𢎞加侍中愬為左僕射帥山南東道顔𦙍皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師道封晉國公進階金紫光祿大夫以舊官相而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈臣愈再拜稽首而獻文曰唐承天命遂臣萬邦孰居近土襲盜以狂往在𤣥宗崇極而圯河北悍驕河南附起四聖不宥屢興師征有不能剋益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百隸怠官事亡其舊帝時繼位顧瞻咨嗟惟汝文武孰恤予家既斬吳蜀旋取山東魏將首義六州降從淮蔡不順自以為强提兵叫讙欲事故常始命討之遂連姦鄰隂遣刺客来賊相臣方戰未利内驚京師羣公上言莫若恵来帝為不聞與神為謀乃相同徳以訖天誅乃敕顔𦙍愬武古通咸統於𢎞各奏汝功三方分攻五萬其師大軍北乗厥數倍之常兵時曲軍士蠢蠢既剪陵雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者頟頟蔡城其疆千里既入而有莫不順俟帝有恩言相度来宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告飢船粟往哺蔡人告寒賜以繒布始時蔡人禁不往来今相從戲里門夜開始時蔡人進戰退戮今旰而起左飱右粥為之擇人以收餘憊選吏賜牛教而不税蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子眀聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾强不支汝弱奚恃其告而長而父而兄奔走偕来同我太平淮蔡為亂天子伐之既伐而飢天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢来遂開眀堂坐以治之李商隱讀韓碑詩元和天子神武姿彼何人哉軒與羲誓將上雪列聖恥坐法宫中朝四夷淮西有賊五十載封狼生貙貙生羆不據山河據平地長戈利矛日可麾帝得聖相相曰度賊斫不死神扶持腰懸相印作都統隂風慘淡天王旗愬武古通作爪牙儀曹外郎載筆隨行軍司馬智且勇十四萬衆猶虎貔入蔡縳賊獻太廟功無與比恩不訾帝曰汝度功第一汝從事愈宜為辭愈拜稽首蹈且舞金石刻畫臣能為古者世稱大手筆此事不繫於職司當仁自古有不讓言訖屢頷天子頤公退齋戒坐小閣濡染大筆何淋漓㸃竄堯典舜典字塗改清廟生民詩文成破體書在紙清晨再拜鋪丹墀表曰臣愈昧死上詠神聖功書之碑碑髙三丈字如手負以靈龜蟠以螭句竒語重喻者少讒之天子言其私長繩百尺拽碑倒麤砂大石相磨治公之斯文若元氣先時巳入人肝脾湯盤孔鼎有述作今無其器存其辭嗚呼聖皇及聖相相與烜赫流淳熙公之斯文不示後曷與三五相攀追願書萬本頌萬過口角流沫右手胝傳之七十有二代以為封禪玉檢明堂基朱子曰據舊史元和十二年八月宰臣裴度為淮西宣慰處置使兼彰義軍節度使請公為行軍司馬淮蔡平十二月隨度還朝以功授刑部侍郎仍詔撰平淮西碑其詞多叙裴度事時先入蔡州擒呉元濟李愬功第一愬不平之愬妻唐安公主女也出入禁中因訴碑辭不實詔令磨公文命叚文昌重撰史所載如此原公之意大抵以度能固帝意故諸將不敢首鼠遂能平蔡意多歸功於指縦者也帝亦重失武臣心故詔文昌然史臣之贊裴度必取公之銘曰凡此蔡功惟斷乃成則世固自有公論也文昌文見姚鉉文粹李商隱有惜韓碑詩長篇甚美有公之斯文不示後曷與三五相攀追之句東坡有臨江驛小詩云淮西功業冠吾唐吏部文章日月光千載斷碑人膾炙不知世有段文昌則二公之文不待較而明矣陳無巳曰龍圖孫學士覺喜論文謂退之淮西碑叙如書銘如詩又云少遊謂元和聖徳詩於韓文為下與淮西碑如出兩手葢其少作也王志堅曰新舊唐書載淮西碑仆於李愬倚唐安公主女入訴方愬入蔡具櫜鞬迎晉公示人以上下之分其人知禮如此不應爭功名於文字間觀羅隠記石烈士事知仆碑實出於石蓋將帥宣力之迹著廟堂主持之權微軍中健兒安知所謂惟斷乃成而是時政在姑息遂因而從之耳觀段文昌改作於愬部將姓名臚列殆盡則當時所以改作之故可知矣南海神廟碑海於天地間為物最鉅自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上號為祝融天寳中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虚王儀而不用非致崇極之意也由是册尊南海神為廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黄木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無所不統地大以逺故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來己乆故眀宫齋廬上雨旁風無所葢障牲酒瘠酸取具臨時水陸之品狼藉籩豆薦祼興俯不中儀式吏滋不供神不顧享盲風怪雨發作無節人䝉其害元和十二年始詔用前尚書右丞國子祭酒魯國孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祗慎所職治人以眀事神以誠内外單盡不為表襮至州之眀年將夏祝册自京師至吏以時告公乃齋祓視册誓羣有司曰册有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其恭且嚴如是敢有不承眀日吾將宿廟下以供晨事明日吏以風雨白不聴於是州府文武吏士凡百數交謁更諌皆揖而退公遂陞舟風雨少弛櫂夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載暘載隂將事之夜天地開除月星眀穊五鼓既作牽牛正中公乃盛服執笏以入即事文武賓屬俯首聴位各執其職牲肥酒香罇爵靜潔降登有數神具醉飽海之百靈祕怪慌惚畢出蜿蜿虵虵来享飲食闔廟旋艫祥飈送颿旗纛旄麾飛揚晻藹鐃鼔嘲轟髙管噭譟武夫奮櫂工師唱和穹龜長魚踴躍後先乾端坤倪軒豁呈露祀之之嵗風災熄滅人厭魚蟹五穀胥熟眀年祀歸又廣廟宫而大之治其庭壇改作東西兩序齋庖之房百用具備眀年其時公又固往不懈益䖍嵗仍大和耋艾歌詠始公之至盡除他名之税罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私畜上下與足於是免屬州負逋之緡錢廿有四萬米三萬二千斛賦金之州耗金一嵗八百困不能償皆以丐之加西南守長之俸誅其尤無良不聴令者由是皆自重慎法人士之落南不能歸者與流徙之胄百廿八族用其才良而廩其無告者其女子可嫁與之錢財令無失時刑徳並流方地數千里不識盜賊山行海宿不擇處所事神治人其可謂備至耳矣咸願刻廟石以著厥美而繫以詩乃作詩曰南海隂墟祝融之宅即祀於旁帝命南伯吏惰不躬正自今公眀用享錫右我家邦惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既濡胡不均𢎞俾執事樞公行勿遲公無遽歸匪我私公神人具依張英曰結撰閎鉅波瀾壯濶詞藻瑰麗雅足與題相配栁州羅池廟碑羅池廟者故刺史栁侯廟也栁侯為州不鄙夷其民動以禮法三年民各自矜奮兹土雖逺京師吾等亦天氓今天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事宅有新屋歩有新船池園潔修豬牛鴨鷄肥大蕃息子嚴父詔婦順夫指嫁娶葬送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為隸我侯之至按國之故以傭除本悉奪歸之大修孔子廟城郭巷道皆治使端正樹以名木栁民既皆恱喜嘗與其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而居於此與若等好也眀年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛夘侯降於州之後堂歐陽翼等見而拜之其夕夢翼而告曰館我於羅池其月景辰廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死眀年春魏忠歐陽翼使謝寧來京師請書其事於石余謂栁侯生能澤其民死能驚動福禍之以食其土可謂靈也己作迎享送神詩遺栁民俾歌以祀焉而并刻之栁侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣己而擯不用其辭曰茘子丹兮焦黄雜肴蔬兮進侯堂侯之船兮兩旗度中流兮風泊之待侯不来兮不知我悲侯乗駒兮入廟慰我民兮不嚬以笑鵝之山兮栁之水桂樹團團兮白石齒齒侯朝出游兮暮来歸春與猨吟兮秋鶴與飛北方之人兮為侯是非千秋萬嵗兮侯無我違福我兮夀我驅厲鬼兮山之左下無苦溼兮髙無乾秔稌充羨兮蛇蛟結蟠我民報事兮無怠其始自今兮欽於世世朱子曰羅池神子厚也其碑石本首云尚書吏部侍郎賜紫金魚袋韓愈撰中書舍人史館修撰賜紫金魚袋沈傳師書其後云朝議郎桂管觀察使試太常寺協律郎上柱國陳曾篆額長慶元年正月十一日桂管都防禦先鋒兵馬使朝散大夫試左衛長史孫季雄建立歐陽集古録羅池碑後題云長慶元年正月建按穆宗實録長慶二年二月傳師為中書舍人史館修撰九月愈遷吏部時愈未為吏部沈亦未為舍人當是長慶二年則二君官正與此碑同其書元年正月葢傳模者誤樊汝霖曰按舊史公傳云南人妄以栁宗元為羅池神而愈撰碑以實之葢以是罪公而新史書其事於子厚傳無所褒貶元祐七年六月詔賜唐栁州刺史羅池廟神為靈文之廟以郡人言其雨暘應祈故也田表聖書其碑隂云子厚終於栁州以積多魄强為羅池之神昌黎叙其事而銘之大意謂子厚宏深之量昭明之職當為星辰為岳瀆胡為在栁州之陋為神其所以推尊甚大然則世以公此文為語怪非也士有抱負不克施遭流落以死明神烈鬼巍峩廟食理也李衛公竄海上死矣其精魄凜然尚能使犬䑕餘黨破膽於夢中不然退之豈矯誣栁州以来異議乎晁氏曰此非銘羅池神之文弔宗元之文也衢州徐偃王廟碑徐與秦俱出柏翳為嬴姓國於夏殷周世咸有大功秦處西偏専用武勝遭世衰無眀天子遂虎吞諸國為雄諸國既皆入秦為臣屬秦無所取利上下相賊害卒僨其國而沈其宗徐處得地中文徳為治及偃王誕當國益除去刑爭末事凡所以君國子民待四方一出於仁義當此之時周天子穆王無道意不在天下好道士説得八龍騎之西遊同王母宴於瑤池之上歌謳忘歸四方諸侯之爭辯者無所質正咸賓祭於徐贄玉帛死生之物於徐之庭者三十六國得朱弓赤矢之瑞穆王聞之恐遂稱受命命造父御長驅而歸與楚連謀伐徐徐不忍鬭其民北走彭城武原山下百姓隨而從之萬有餘家偃王死民號其山為徐山鑿石為室以祠偃王偃王雖走死失國民戴其嗣為君如初駒王章禹祖孫相望自秦至今名公巨人繼跡史書徐氏十望其九皆本於偃王而秦後迄兹無聞家天於柏翳之緒非偏有厚薄施仁與暴之報自然異也衢州故㑹稽太末也民多姓徐氏支縣龍丘有偃王遺廟或曰偃王之逃戰不之彭城之越城之隅棄玉几研於㑹稽之水或曰徐子章禹既執於吳徐之公族子弟散之徐揚二州間即其居立先王廟云開元初徐姓二人相屬為刺史帥其部之同姓改作廟屋載事於碑後九十年當元和九年而徐氏放復為刺史放字達夫前碑所謂今户部侍郎其大父也春行視農至於龍丘有事於廟思惟本原曰故制觕樸下窄不足以揭䖍妥靈而又梁桷赤白陊剝不治圖像之威䵝昧就滅藩拔級夷庭木秃􅆙祈甿日慢祥慶弗下州之羣支不獲䕃庥余惟遺紹而尸其土不即不圖以有資聚罰其可辭乃命因故為新衆工齊事惟月若日工告訖功大祠於廟宗鄉咸序應是嵗州無怪風劇雨民不天厲榖果完實民皆曰耿耿哉其不可誣乃相與請辭京師歸而鑱之於石辭曰秦傑以顛徐由遜緜秦鬼乆飢徐有廟存婉婉偃王惟道之耽以國易仁為笑於頑自初擅命其實㡬姓厯短詈長有不償亡課其利害孰與王當姡蔑之墟太末之里誰思王恩立廟以祀王之聞孫世世多有唯臨兹邦廟土實守堅嶠之後達夫廓之王歿萬年如始祔時王孫多孝世奉王廟達夫之来先慎詔教盡恵廟民不主於神維是達夫知孝之元太末之里姑蔑之城廟事時修仁孝振聲宜寵其人以及後生嗟嗟維王雖古誰亢王死於仁彼以暴喪文追作誄刻示茫茫徐秦皆出於伯益而仁暴施報之異總數千年而論之始毫髮不爽天道固如是也昌黎述此葢以唐徳既衰澤不下逮藩鎮不臣往往嘔咻兵民規竊土地死則子弟自代而請命於朝託以兵民安己之政有若天與人歸者然故昌黎舉偃王之不忍鬭其民棄國走死以全臣節以國易仁為笑於頑而其後世子孫碩大蕃衍經越數千年而廟祀如始祔之時若夫虎吞諸國强暴至秦極矣而斬焉無後其鬼久饑紀短詈長有不償亡若云今之自謂兵民安己者能若偃王乎擁强兵睢盱當世者能若秦主乎徐存若此而秦亡若彼為子孫計者可以思矣所以警動怵讋之者㫖深哉袁氏先廟碑袁公滋既成廟明歲二月自荆南以旂節朝京師留六日得壬子春分率宗親子屬用少牢於三室既事退言曰嗚呼逺哉維世傳徳襲訓集余乃今有濟今祭既不薦金石音聲使工歌詩載烈象容其奚以飭稚昧於長乆唯敬繫羊豕幸有石如具著先人名跡因為詩繫之語下於義其可雖然余不敢必屬篤古而達於詞者遂以命愈愈謝非其人不獲命則謹條袁氏本所以出與其世系里居起周歴漢魏晉拓拔魏周隋入國家以来髙曾祖考所以劬躬燾後委祉於公公之所以逢將承應者有槩有詳而綴以詩其語曰周樹舜後陳陳公子有為大夫食國之地袁鄉者其子孫世守不失因自别為袁氏春秋世陳常壓於楚與中國相加尤疏袁氏猶班班見可譜常居陽夏陽夏至晉屬陳郡故號陳郡袁氏博士固申儒遏黄唱業於前至司徒安懐徳於身袁氏遂大顯連世有人終漢連魏晉分仕南北始居華隂為拓拔魏鴻臚鴻臚諱恭生周梁州刺史新縣孝侯諱穎孝侯生隋左衛大將軍諱温去官居華隂武徳九年以大耋薨始𦵏華州左衛生南州刺史諱士政南州生當陽令諱倫於公為曾祖當陽生朝散大夫石州司馬諱知元司馬生贈工部尚書咸寧令諱􅋫是為皇考袁氏舊族而當陽以通經為儒位止縣令石州用春秋持身治事為州司馬以終咸寧備學而貫以一文武隨用謀行功從出入有立不爵於朝比三世宜達而窒歸成後人數當於公公惟曽大父大父皇考比三世存不大夫食歿祭在子孫唯將相能致備物世彌逺禮則益不及在慎徳行業治圖功載名以待上可無細大無敢不敬畏無早夜無敢不思成於家進於外以立於朝自侍御史歴工部員外郎祠部郎中諌議大夫尚書左丞華州刺史金吾大將軍由卑而鉅莫不官稱遂為宰相以贊辨章仍持節將蜀滑襄荆畧苞河山秩登祿富以有廟祀具如其志又垂顯刻以教無忘可謂大孝詩曰袁自陳分初尚蹇連越秦造漢博士發論司徒任徳忍不錮人收功厥後五公重尊晉氏於南来處華下鴻臚孝侯用適操捨南州勤治取最不懈當陽耽經唯義之畏石州烈烈學専春秋懿哉咸寧不名一休趨難避成與時泛浮是生孝子天子之宰出把將符羣州承楷數以立廟祿以備器由曾及考同堂異置柏版松楹其筵肆肆維袁之廟孝孫之為順勢即宜以諏以龜以平其巇屋牆持持孝孫来享来拜廟庭陟堂進室親登籩鉶肩臑胉骼其樽𤣥清降登受胙於慶爾成維曾維祖維考之施於汝孝嗣以報以祗凡我有今非本曷思刻詩牲繋維以告之袁滋字徳深蔡州朗山人少依道州刺史元結讀書建中初起處士授試校書郎韋貞伯表為侍御史遷工部員外郎韋臯招西南夷南詔異牟尋内屬徳宗選郎吏可撫循者皆憚行滋不辭帝嘉之擢祠部郎中兼御史中丞賜金紫持節往踰年還稱㫖求外遷為華州刺史政清簡慈惠未嘗設條教民愛向之有犯令時時法外縱舍得盜賊或哀其窮出財為償所亡召為左金吾衛大將軍以楊於陵代之滋行耆老遮道不得去於陵使諭吾不敢易袁公政人皆羅拜乃得去憲宗監國進拜中書侍郎同中書門下平章事劉闢反詔滋為劔南東西川節度使是時賊方熾又滋兄峯在蜀為闢所劫滋畏不得全久不進貶吉州刺史未㡬徙義成節度使改檢校兵部尚書拜山南東道節度使徙荆南滋先世墳墓在蔡呉少陽時為修墓禁芻牧諸袁多署右職禀給之滋至治去斥候與元濟通好賊圍新興滋卑辭講解賊因是易滋不為備時帝責戰急而滋至六月以無功貶撫州刺史本傳所載如是滋葢謹愿之士不能達大道忘身為國故韓碑著其孝不言其忠孝經曰始於事親中於事君終於立身然則滋於事君立身猶有間焉其無以完孝徳也夫曹成王碑王姓李氏諱臯字子蘭諡曰成其先王眀以太宗子國曹絶復封傳五王至成王成王嗣封在𤣥宗世葢於時年十七八紹爵三年而河南北兵作天下震擾王奉母太妃逃禍民伍得間走蜀從天子天子念之自都水使者拜左領軍衛將軍轉貳國子秘書王生十年而失先王哭泣哀悲弔客不忍聞喪除痛刮磨豪習委己於學稍長重知人情急世之要恥一不通侍太妃從天子於蜀既孝既忠持官持身内外斬斬由是朝廷滋欲試之於民上元元年除温州長史行刺史事江東新刳於兵郡旱饑民交走死無弔王及州不解衣下令掊鎖擴門悉棄倉實與民活數十萬人奏報升秩少府與平袁賊仍徙祕書兼州别駕部告無事遷真於衡法成令修治出張弛聲生勢長觀察使噎媢不能出氣誣以過犯御史助之貶潮州刺史楊炎起道州相徳宗還王於衡以直前謾王之遭誣在理念太妃老將驚而戚出則囚服就辨入則擁笏垂魚坦坦施施即貶於潮以遷入賀及是然後跪謝告實初觀察使虐使將國良往戍界良以武岡叛戍衆萬人斂兵荆黔洪桂伐之二年尤張於是以王帥湖南將五萬士以討良為事王至則屏兵投良以書中其忌諱良羞畏乞降狐䑕進退王即假為使者從一騎踔五百里抵良壁鞭其門大呼我曹王来受良降良今安在良不得己錯愕迎拜盡降其軍太妃薨王棄部隨喪之河南𦵏及荆被詔責還㑹梁崇義反王遂不敢辭以還升秩散騎常侍眀年李希烈反遷御史大夫授節帥江西以討希烈命至王出止外舍禁無以家事闗我裒兵大選江州羣能著職王親教之摶力勾卒嬴越之法曹誅五畀艦歩二萬人以與賊遌嘬鋒蔡山踣之剜蘄之黄梅大鞣長平鏺廣濟掀蘄春撇蘄水掇黄岡筴漢陽行􅝌汊州還大􅈩蘄水界中披安三縣拔其州斬偽刺史標光之北山􅞌隨光化捁其州十抽一推救兵州東北屬鄉還開軍受降大小之戰三十有二取五州十九縣民老幼婦女不驚市買不變田之果穀下無一跡加銀青光祿大夫工部尚書改户部再換節臨荆及襄真食三百王之在兵天子西廵於梁希烈北取汴鄭東畧宋圍陳西取汝薄東都王坐南方北向落其角距賊死咋不能入寸尺亡將卒十萬盡輸其南州王始政於温終政於襄恒平物估賤斂貴出民用有經一吏軌民使令家聴户視姦宄無所宿府中不聞急歩疾呼治民用兵各有條次世傳為法任馬彜將慎將鍔將潛偕盡其力能薨贈右僕射元和初以子道古在朝更贈太子太師道古進士司門郎刺利隨唐睦徴為少宗正兼御史中丞以節督黔中朝京師改命觀察鄂岳蘄沔安黄提其師以伐蔡且行泣曰先王討蔡實取沔蘄安黄寄惠未亡今余亦受命有事於蔡而四州適在吾封庶其有集先王薨於今二十五年吾昆弟在而墓碑不刻無文其實有待子無用辭乃序而詩之辭曰太支十三曹於弟季或亡或微曹始就事曹之祖王畏塞絶遷零王黎公不聞僅存子父易封三王守名延延百載以有成王成王之作一自其躬文被眀章武薦畯功蘇枯弱彊齦其姦猖以報於宗以昭於王王亦有子處王之所惟舊之視蹶蹶陛陛實取實似刻詩其碑為示無止洪慶善曰曹成王碑造語法子雲也退之性不喜書然嘗云凡為文詞宜畧識字如此碑中用剜鞣鏺掀撇掇筴􅝌等字是也御選唐宋文醇巻八
