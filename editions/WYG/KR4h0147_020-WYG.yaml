body:
  text: 隴西李翺文二書奏狀行狀答獨孤舍人書答王載言書薦所知於徐州張僕射書百官行狀奏故正議大夫行尚書吏部侍郎上柱國賜紫金魚袋贈禮部尚書韓公行狀欽定四庫全書御選唐宋文醇巻二十隴西李翶文二答獨孤舍人書足下書中有無見怨懟以至疎索之説蓋是戲言然亦似未相悉也薦賢進能自是足下公事如不為之亦自是足下所闕在僕何苦乃至怨懟僕嘗怪董生大賢而著仕不遇賦惜其自待不厚凡人之蓄道徳才智於身以待時用蓋將以代天理物非為衣服飲食之鮮肥而為也董生道徳備具武帝不用為相故漢徳不如三代而生人受其顦顇於董生何苦而為仕不遇之詞乎僕意緒間自待甚厚此身窮達豈關僕之貴賤耶雖終身如此固無恨也況年猶未甚老哉去年足下有相引薦意當時恐有所累猶奉止不為何遽不相悉所以不數附書者一二年來往還多得官在京師既不能周徧又且無事性頗慵懶便一切畫斷祗作報書又以為茍相知固不在書之疎數如不相知尚何求而數書或惟往還中有貧賤更不如僕者即數數附書耳近頻得人書皆責疎簡故具之於此見相怪者當為辭焉此文固勝韓愈上宰相等書逺矣今學塾中無不讀韓書而此則莫或及也後生小子不以求進為恥未必非昌黎階之厲矣古之詩人騷客於君臣之㑹出處之間每以夫婦托喻語云擬人必於其倫夫豈非其倫而言之蓋臣也妻也皆坤道也其無成有終利用永貞之義無一之不相合者今女有爽徳則閭里羞稱之士而自媒則莫之或恥者道徳風俗之所繋非小焉者也答王載言書某頓首足下不以某卑賤無所可乃陳詞屈慮先我以書且曰余之藝及心不能棄於時將求知者問誰可則皆曰其李君乎告足下者過也足下因而信之又過也果若來陳雖道備徳具且猶不足辱厚命況如某者多病少學其能以此堪足下所望博大而深宏者耶雖然盛意不可以不答故敢畧陳其所聞蓋行已莫如恭自責莫如厚接衆莫如𢎞用心莫如直進道莫如勇受益莫如擇友好學莫如改過此聞之於師者也相人之術有三迫之以利而審其邪正設之以事而察其厚薄問之以謀而觀其智與不才賢不肖分矣此聞之於友者也列天地立君臣親父子别夫婦明長幼浹朋友六經之㫖也浩乎若江海髙乎若丘山赫乎若日火包乎若天地掇章稱詠津潤怪麗六經之詞也創意造言皆不相師故其讀春秋也如未嘗有詩也其讀詩也如未嘗有易其讀易也如未嘗有書也其讀屈原荘周也如未嘗有六經也故義深則意逺意逺則理辯理辯則氣直氣直則辭盛辭盛則文工如山有恒華嵩衡焉其同者髙也其草木之榮不必均也如瀆有淮濟河江焉其同者出源到海也其曲直淺深色黄白不必均也如百品之雜焉其同者飽於腸也其味鹹酸苦辛不必均也此因學而知者也此創意之大歸天下之語文章有六説焉其尚異者則曰文章辭句竒險而已其好理者則曰文章叙意茍通而已其溺於時者則曰文章必當對其病於時者則曰文章不當對其愛難者則曰文章宜深不當易其愛易者則曰文章宜通不當難此皆情有所偏滯而不流未識文章之所主也義不深不至於理言不信不在於教勸而詞句怪麗者有之矣劇秦美新王褒僮約是也其理往往有是者而詞章不能工者有之矣劉氏人物表王氏中說俗傳太公家教是也古之人能極於工而已不知其詞之對與否易與難也詩曰憂心悄悄愠於羣小此非對也又曰遘閔既多受侮不少此非不對也書曰朕堲讒説殄行震驚朕師詩曰菀彼桑柔其下侯旬捋採其劉瘼此下民此非易也書曰允恭克讓光被四表格於上下詩曰十畝之間兮桑者閑閑兮行與子旋兮此非難也學者不知其方而稱説云云如前所陳者非吾之敢聞也六經之後百家之言興老耼列禦冦荘周鶡冠田穰苴孫武屈原宋玉孟軻吳起商鞅墨翟鬼谷子荀況韓非李斯賈誼枚乗司馬遷相如劉向揚雄皆足以自成一家之文學者之所師歸也故義雖深理雖當詞不工者不成文宜不能傳也文理義三者兼并乃能獨立於一時而不冺滅於後代能必傳也仲尼曰言之無文行之不逺子貢曰文猶質也質猶文也虎豹之鞟猶犬羊之鞟此之謂也陸機曰怵他人之我先韓退之曰唯陳言之務去假令述笑哂之狀曰莞爾則論語言之矣曰啞啞則易言之矣曰粲然則榖梁子言之矣曰攸爾則班固言之矣曰囅然則左思言之矣吾復言之與前文何以異也此造言之大歸吾所以不協於時而學古文者悦古人之行也悦古人之行者愛古人之道也故學其言不可以不行其行行其行不可以不重其道重其道不可以不循其禮古之人相接有等輕重有儀列於經傳皆可詳引如師之於門人則名之於朋友則字而不名稱之於師則雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之名門人驗也夫子於鄭兄事子産於齊兄事晏嬰平仲傳曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏曰言游過矣子張曰子夏云何曾子曰堂堂乎張也是朋友字而不名驗也子貢曰賜也何敢望回又曰師與商也孰賢子游曰有澹臺滅明者行不由徑是稱於師雖朋友亦名騐也孟子曰天下之達尊三曰徳爵年惡得有其一以慢其二哉足下之書曰韋君詞楊君潛足下之徳與二君未知先後也而足下齒幼而位卑而皆名之傳曰吾見其與先生並行非求益者欲速成竊懼足下不思乃陷於此韋踐之與翺書亟敘足下之善故敢盡辭以復足下之厚意計必不以為犯李某頓首張英曰言文章以六經為淵源以諸子為支𣲖設辨立論不拘一轍可謂博而該矣薦所知於徐州張僕射書翺再拜齊桓公不疑於其臣管夷吾信而霸天下攘夷狄匡周室亡國存荆楚服諸侯無不至焉豎刁易牙信而國亂身死不葬五公子爭立兄弟相及者數世桓公之信於其臣一道也所信者賢則徳格於天地功及於後代不得其人則不免其身知人不易也豈惟霸者為然雖聖人亦不能免焉帝堯之時賢不肖皆立於朝堯能知舜於是乎驩兜放共工流殛鯀竄三苗舉禹稷咎繇二十有二人加諸上位故堯崩三載四海遏密八音後代之人皆謂之帝堯焉向使堯不能知舜而遂尊驩兜共工之黨於朝禹稷咎繇之下二十有二人不能用則堯將不得為齊桓公矣豈復得曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉者哉春秋曰夏滅項孰滅之蓋齊滅之曷為不言齊滅之為桓公諱也春秋為賢者諱此滅人之國何賢爾君子之惡惡也嫉始善善也樂終桓公嘗有繼絶存亡之功故君子為之諱也繼絶存亡賢者之事也管夷吾用所以能繼絶世存亡國焉耳豎刁易牙則不能也向使桓公始不用管夷吾末有豎刁易牙爭權不葬而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子之樂用賢也如此始不用賢以及其終而幸後世之掩其過也則微矣然則居上位流徳澤於百姓者何所勞乎勞於擇賢得其人措諸上使天下皆化之焉而已矣兹天子之大臣有土千里者孰有如執事之好賢不倦者焉蓋得其人亦多矣其所可求而不取者則有人焉隴西李觀竒士也伏聞執事知其賢将用之未及而觀病死昌黎韓愈得古文遺風明於理亂根本之所由伏聞執事又知其賢將用之未及而愈為宣武軍節度使之所用觀愈皆豪傑之士也如此人不時出觀自古天下亦有數百年無如其人者焉執事皆得而知之皆不得而用之翺實為執事惜焉豈惟翺一人而已後之讀前載者亦必多為執事惜之矣兹有平昌孟郊貞士也伏聞執事舊知之郊為五言詩自前漢李都尉蘇屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊於梁肅補闕書曰郊之五言其有髙處在古無上其有平處下顧二謝韓愈送郊詩曰作詩三百首杳黙咸池音彼二子皆知言者豈欺天下之人哉郊窮餓不得安養其親周天下無所遇作詩曰食薺腸亦苦强歌聲無歡出門即有閡誰謂天地寛其窮也甚矣又有張籍李景儉者皆竒才也未聞閣下知之凡賢人竒士皆自有所負不茍合於世是以雖見之難得而知也見而不能知其賢如勿見而已矣知其賢而不能用如勿知其賢而已矣用而不能盡其才如勿用而已矣能盡其才而容讒人之所間者如勿盡其才而已矣故見賢而能知知而能用用而能盡其才而不容讒人之所間者天下一人而已矣兹有二人焉皆來其一賢士也其一常常人也待之禮貌不加隆焉則賢者行而常常人日來矣況其待常常人加厚則善人何求而來哉孔子曰吾未見好徳如好色者聖人不好色而好徳者也雖好色而不如好徳者次也徳與色鈞好之又其次也雖好徳而不如好色者下也最甚不好徳而好色者窮矣有人告曰某所有女國色也天下之人必將極其力而求之而無所愛矣有人告曰某所有人國士也天下之人則不能一往而見焉是豈非不好徳而好色者乎賢者則宜有以别於天下之人矣孔子述易定禮樂刪詩序書作春秋聖人也奮乎百世之上其所化之者非其道則夷狄之人也而孔子之廟存焉雖賢者亦不能日往拜之以其益於人者寡矣故無益於人雖孔子之廟尚不能朝夕而事焉况天下之人乎有待於人而不能得善人良士則不如無待也嗚呼人之降年不可與期郊將為他人之所得而大有立於世與其短命而死皆不可知也二者卒然有一於郊之身他日為執事惜之不可既矣執事終不得而用之矣雖恨之亦無可奈何矣翺窮賤人也直辭無讓非所宜至於此者也為道之存焉耳不直則不足以伸道也非好多言者也翺再拜孟郊工詩一為溧陽尉史稱但坐水石間長吟尉事並廢上官遣人代攝其事然則郊固無濟世用翺薦郊於張建封固亦無所裨於世也獨其所論居上位宜勞於擇賢賢賢易色而用賢不可不亟亟有古人好賢如緇衣之風可為後世法百官行狀奏右臣等無能謬得秉筆史館以記注為職夫勸善懲惡正言直筆紀聖朝功徳述忠臣賢士事業載奸臣佞人醜行以傳無窮者史官之任也伏以陛下即位十五年矣乃元年平夏州二年平蜀斬闢三年平江東斬錡張茂昭遂得易定五年擒史憲誠得澤潞邢口七年田𢎞正以魏博六州來受常貢十二年平淮西斬元濟十三年王承宗獻徳棣入租税滄景除吏部十四年平淄青斬師道得十二州神斷武功自古中興之君莫有及者而自元和以來未著實錄盛徳大功史氏未紀忠臣賢士名徳甚有可為法者逆臣賊人醜行亦有可為誡者史氏皆闕而未書臣實懼焉故不自量輒欲勉强而修之凡人之事迹非大善大惡則衆人無由知之故舊例皆訪問於人又取行狀諡議以為一據今之作行狀者非其門生即其故吏莫不虚加仁義禮智妄言忠肅惠和或言盛徳大業逺而愈光或云直道正言殁而不朽曽不直敘其事故善惡混然不可明至如許敬宗李義府李林甫國朝之奸臣也其使門生故吏作行状既不指其事實虚稱道忠信以加之則可以移之於房𤣥齡魏徴裴炎徐有功矣此不惟其處心不實茍欲虚美於所受恩之地而已蓋亦為文者又非游夏遷雄之列務於華而忘其實溺於辭而棄其理故為文則失六經之古風記事則非史遷之實錄不如此則辭句鄙陋不能自成其文矣由是事失其本文害於理而行狀不足以取信若使指事書實不飾虚言則必有人知其真偽不然者縦使門生故吏為之亦不可以謬作徳善之事而加之矣臣今請作行狀者不要虚説仁義禮智忠肅惠和盛徳大業正言直道蕪穢簡冊不可取信但指事説實直載其詞則善惡功跡皆據事足以自見矣假令傳魏徴但記其諫爭之詞足以為正直矣如傳段秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣今之為行狀者都不指其事率以虚詞稱之故無魏徴之諫爭而加之以正直無秀實之義勇而加之以忠烈者皆是也其何足以為據若考功視行狀之不依此者不得受依此者乃下太常并牒史館太常定諡牒送史館則行状之言縦未可一一皆信其與虚加妄言都無事實者猶山澤髙下之不同也史氏記録須得本末茍憑往例皆是空言則使史館何所為據伏乞下臣此奏使考功守行善惡之詞雖故吏門生亦不能虚作而加之矣臣等要知事實輒敢陳論輕黷天威無任戰越謹奏孔子作春秋以書法為二百四十年之刑賞人倫以定善以勸而惡以懲後之史氏雖文質不同而其義則春秋之義也史職顧不重哉史之患固患無孔子之心然孔子之心不難有也人之性固與孔子同也性既同心何不同孔子之心天地之心也人於人非其親暱及其怨仇憑虚而論之則其公好公惡無一不與天地之心同者然則所難者非無孔子天地之心而無孔子日月之明耳易通有言邪暗塞也孔子而後雖代有博學之士正學之儒然以之上下百餘年間人物事理則猶爝火然所照不及尺寸是以不能得其可褒可貶之實而遂無以伸其或褒或貶之公以扶綱常而植名教此韓愈所以不敢為史而托為人禍天刑之説以自解免者也李翺所論取行狀必直叙實事不得虚加浮詞實史館之良法然即如翺所奏而行状備具於史館矣顧其所謂必有人知其真偽不然者則其人固不世出也噫難言矣哉故正議大夫行尚書吏部侍郎上柱國賜紫金魚袋贈禮部尚書韓公行狀曽祖泰皇任曹州司馬祖濬素皇任桂州長史父仲卿皇任祕書郎贈尚書左僕射公諱愈字退之昌黎人生三嵗父殁養於兄㑹舍及長讀書能記他生之所習年二十五上進士第汴州亂詔以舊相東都留守董晉為平章事宣武軍節度使以平汴州晉辟公以行遂入汴州得試祕書省校書郎為觀察推官晉卒公従晉喪以出四日而汴州亂凡従事之居者皆殺死武寜軍節度使張建封奏為節度推官得試太常寺協律郎選授四門博士遷監察御史為幸臣所惡出守連州陽山令政有惠於下及公去百姓多以公之姓以命其子改江陵府法曹參軍入為權知國子博士宰相有愛公文者将以文學職處公有爭先者搆公語以非之公恐及難遂求分司東都權知三年改真博士入省為分司都官員外郎改河南縣令日以職分辨於留守及尹故軍士莫敢犯禁入為職方員外郎華州刺史奏華隂縣令栁澗有罪遂将貶之公上疏請發御史辨曲直方可處以罪則下不受屈既栁澗有犯公由是復為國子博士改比部郎中史館修撰轉考功郎中修撰如故數月以考功知制誥上將平蔡州先命御史中丞裴公度使諸軍以視兵及還奏兵可用賊勢可以滅頗與宰相意忤既數月盜殺宰相又害中丞不克中丞微傷馬逸以免遂為宰相以主東兵自安祿山起范陽陷兩京河南北七鎮節度使身死則立其子作軍士表以請朝廷因而與之及貞元季年雖順地節將死多即軍中取行軍副使将校以授之節習以成故矣朝廷之賢恬於所安以茍不用兵為貴議多與裴丞相異唯公以為盜殺宰相而遂息兵其為懦甚大兵不可以息以天下力取三州尚何不可與裴丞相議合故兵遂用而宰相有不便之者月滿遷中書舍人賜緋魚袋後竟以他事改太子右庶子元和十二年秋以兵老久屯賊未滅上命裴丞相為淮西節度使以招討之丞相請公以行於是以公兼御史中丞賜三品衣魚為行軍司馬従丞相居於郾城公知蔡州精卒悉聚界上以拒官軍守城者率老弱且不過千人亟白丞相請以兵三千人間道以入必擒吳元濟丞相未及行而李愬自唐州文城壘提其卒以夜入蔡州果得元濟蔡州既平布衣柏耆以計謁公公與語竒之遂白丞相曰淮西滅王承宗膽破可不勞用衆宜使辯士奉相公書明禍福以招之彼必服丞相然之公令柏耆口占為丞相書明禍福使柏耆袖之以至鎮州承宗果大恐上表請割徳棣二州以獻丞相歸京師公遷刑部侍郎嵗餘佛骨自鳯翔至傳京師諸寺時百姓有燒指與頂以祈福者公奏疏言自伏羲至周文武時皆未有佛而年多至百嵗有過之者自佛法入中國帝王事之夀不能長梁武帝事之最謹而國大亂請燒棄佛骨疏入貶潮州刺史移袁州刺史百姓以男女為人隸者公皆計傭以償其直而出歸之入遷國子祭酒有直講能説禮而陋容學官多豪族子擯之不得共食公命吏曰召直講來與祭酒共食學官由此不敢賤直講奏儒生為學官日使㑹講生徒多奔走聴聞皆喜曰韓公來為祭酒國子監不寂寞矣改兵部侍郎鎮州亂殺其帥田𢎞正征之不克遂以王廷湊為節度使詔公往宣撫既行衆皆危之元稹奏曰韓愈可惜穆宗亦悔有詔令至境觀事勢無必於入公曰安有受君命而滯留自顧遂疾驅入廷湊嚴兵拔刄弦弓矢以逆及館甲士羅於庭公與廷湊監軍使三人就位既坐廷湊言曰所以紛紛者乃此士卒所為本非廷湊心公大聲曰天子以為尚書有將帥才故賜之以節實不知公共健兒語未嘗及大錯甲士前奮言曰先太史為國打朱滔滔遂敗走血衣皆在此軍何負朝廷乃以為賊乎公告曰兒郎等且勿語聴愈言愈将謂兒郎已不記先太史之功與忠矣若猶記得乃大好且為逆與順利害不能逺引古事但以天寳來禍福為兒郎等明之安祿山史思明李希烈梁崇義朱滔朱泚吳元濟李師道復有若子若孫在乎亦有居官者乎衆皆曰無又曰令公以魏博六州歸朝廷為節度使後至中書令父子皆授旌節子與孫雖在幼童者亦為好官窮富極貴寵榮耀天下劉悟李佑皆居大鎮王承元年始十七亦仗節此皆三軍耳所聞也衆乃曰田𢎞正刻此軍故軍不安公曰然汝三軍亦害田令公身又殘其家矣復何道衆乃讙曰侍郎語是廷湊恐衆心動遽麾衆散出因泣謂公曰侍郎來欲令廷湊何所為公曰神策六軍之將如牛元翼比者不少但朝廷顧大體不可以棄之耳而尚書久圍之何也廷湊曰即出之公曰若真耳則無事矣因與之宴而歸而牛元翼果出乃還於上前盡奏與廷湊言及三軍語上大悦曰卿直向伊如此道由是有意欲大用之王武俊贈太師呼太史者燕趙人語也轉吏部侍郎凡令史皆不鎖聴出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故令史勢重聴其出入則勢輕改京兆尹兼御史大夫特詔不就御史臺謁後不得引為例六軍將士皆不敢犯私相告曰是尚欲燒佛骨者安可忤故盜賊止遇旱米價不敢上李紳為御史中丞械囚送府使以尹杖杖之公曰安有此使歸其囚是時紳方幸宰相欲去之故以臺與府不協為請出紳為江西觀察使以公為兵部侍郎紳既復留公入謝上曰卿與李紳爭何事公因自辨數日復為吏部侍郎長慶四年得病滿百日假既罷以十二月二日卒於靖安里第公氣厚性通論議多大體與人交始終不易凡嫁内外及交友之女無主者十人幼養於嫂鄭氏及嫂殁為之期服以報之深於文章每以為自揚雄之後作者不出其所為文未嘗效前人之言而固與之並自貞元末以至於兹後進之士其有志於古文者莫不視公以為法有集四十巻小集十巻及病遂請告以罷每與交友言既終以處妻子之語且曰某伯兄徳行髙曉方藥食必視本草年止於四十二某疎愚食不擇禁忌位為侍郎年出伯兄十五嵗矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂榮矣享年五十七贈禮部尚書謹具任官事迹如前請牒考功下太常定諡并牒史館謹狀吕大防云衛中立字退之餌竒藥求不死而卒死故白樂天詩謂退之服硫黄一病訖不瘥乃中立也孔毅夫陳無已之徒皆指以為公晚年惑金石藥獨近世李季可謂公長慶三年作李干墓誌力詆六七公皆以藥敗明年則公卒豈咫尺之間身試其禍哉或前人文字之同或傳寫之誤使賢者蒙汚然實無可考證也按公屬纊之言謂愈疎愚食不擇禁忌位為侍郎年出伯兄十五嵗且獲終牖下如又不足於何而足是公豈服藥以求長年者適以中立字之偶同遂歸過於公千載之誣庶自兹一洗今按衛宴三子長曰之元字造微次曰中立字退之末曰中行字大受中行中立皆見於昌黎文集而中立墓誌謂南方多水銀丹砂雜他竒藥熝為黄金可餌以不死藥終不能成而竟死銘所為嗟惟君篤所信要無有弊精神者也吕汲公所考有據附記以正世訛朱子曰退之却喜皇甫湜不甚喜李翺後來湜為退之作墓誌却説得無𦂳要不如李翺行狀較著實葢李翺為人朴實御選唐宋文醇巻二十
