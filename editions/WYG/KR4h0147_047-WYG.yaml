body:
  text: 眉山蘇軾文十狀論河北京東盜賊狀論浙西災傷第一狀論積欠狀論綱梢欠折利害狀朝辭赴定州論事狀欽定四庫全書御選唐宋文醇巻四十七眉山蘇軾文十論河北京東盜賊狀熈寧七年月蘇軾奏臣伏見河北京東比年以來蝗旱相仍盜賊漸熾今又不雨自秋至冬方數千里麥不入土竊料明年春夏之際寇攘為患甚於今日是以輒陳狂瞽庶補萬一謹按山東自上世以來為腹心根本之地其與中原離合常係社稷安危昔秦并天下首收三晉則其餘强敵相繼滅亡漢髙祖殺陳餘走田横則項氏不支光武亦自漁陽上谷發突騎席巻以并天下魏武帝破殺袁氏父子收冀州然後四方莫敢敵宋武帝以英雄絶人之資用武歴年而不能并中原者以不得河北也隋文帝以庸夫穿窬之智竊位數年而一海内者以得河北也故杜牧之論以為山東之地王者得之以為王霸者得之以為霸猾賦得之以為亂天下自唐天寳以後姦臣僭峙於山東更十一世竭天下之力終不能取以至於亡近世賀徳倫挈魏博降後唐而梁亡周髙祖自鄴都入京師而漢亡由此觀之天下存亡之權在河北無疑也陛下即位以來北方之民流移相屬天災譴告亦甚於四方五六年間未有以塞大異者至於京東雖號無事亦當常使其民安逸富强緩急足以灌輸河北缾竭則罍恥脣亡則齒寒而近年以來公私匱乏民不堪命今流離饑饉議者不過欲散賣常平之粟勸誘蓄積之家盜賊縱横議者不過欲増開告賞之門申嚴緝捕之法皆未見其益也常平之粟累經賑發所存無幾矣而飢寒之民所在皆是人得升合官費丘山蓄積之家例皆困乏貧者未䝉其利富者先被其災昔季康子患盜問於孔子對曰茍子之不欲雖賞之不竊乃知上不盡利則民有以為生茍有以為生亦何苦而為盜其間凶殘之黨樂禍不悛則須敇法以峻刑誅一以警百今中民以下舉皆闕食冒法而為盜則死畏法而不盜則飢飢寒之與棄市均是死亡而賒死之與忍飢禍有遲速相率為盜正理之常雖日殺百人勢必不止茍非陛下至明至聖至仁至慈較得喪之孰多權禍福之孰重特於財利少有所捐衣食之門一開骨髓之恩皆徧然後信賞必罰以威克恩不以僥倖廢刑不以災傷撓法如此而人心不革盜賊不衰者未之有也强刦民財者法如何曰亂之漸也殺無赦緩之致亂被殺者必多折其萌芽是殺以止殺也仁也因饑而成盜所盜不過㪷米斛麥而聚衆每百十人則盡殺之乎曰是所為沒其文於法而經生得以引經斷之者也不盜則飢死盜則法死法不加於待死之飢民也明矣且有任其咎者天災流行何國蔑有吏蚤上聞而為之備不飢飢而有備救之得其法仍不飢至於飢而吏之罪大矣尚不焦頭爛額以出之於水火致使羣聚以刦乎羣聚以刦猶不亟翦其渠魁以散其勢而使之延刦乎是故救死之盜可貸致盜之吏可誅奏浙西災傷第一狀元祐五年七月十五日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣聞事豫則立不豫則廢此古今不刊之語也至於救災恤患尤當在早若災傷之民救之於未飢則用物約而所及廣不過寛減上供糶賣常平官無大失而人人受賜今嵗之事是也若救之於已飢則用物博而所及微至於耗散省倉虧損課利官為一困而已飢之民終於死亡熈寧之事是也熈寧之災傷本縁天旱米貴而沈起張靚之流不先事奏聞但務立賞閉糶富民皆爭藏穀小民無所得食流殍既作然後朝廷知之始敕運江西及截本路上供米一百二十三萬石濟之巡門俵米攔街散粥終不能救饑饉既成繼之以疾疫本路死者五十餘萬人城郭蕭條田野丘墟兩税課利皆失其舊勘㑹熈寧八年本路放税米一百三十萬石酒課虧減六十七萬餘貫略計所失共計三百二十餘萬貫石其餘耗散不可悉數至今轉運司貧乏不能舉手此無它不先事處置之過也去年浙西數郡先水後旱災傷不減熈寧然二聖仁智聰明於去年十一月中首發徳音截撥本路上供斛㪷二十萬石販濟又於十二月中寛減轉運司元祐四年上供額斛三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼官既住糴米價自落又自正月開倉糶常平米仍免數路税務所收五穀力勝錢且賜度牒三百道以助賑濟本路帖然遂無一人餓殍者此無它先事處置之力也由此觀之事豫則立不豫則廢其禍福相絶如此恭惟二聖天地父母之心見民疾苦匍匐救之本不計較費用多少而臣愚魯無識但知權利害之輕重計得喪之大小以為譬如民庶之家置莊田招佃客本望租課非行仁義然猶至水旱之嵗必須放免欠負借貸種糧者其心誠恐客散而田荒後日之失必倍於今日也而况有天下子萬姓而不計其後乎臣自去嵗以來區區獻言屢凟天聽者實恐陛下客散而田荒也去嵗杭州米價每㪷至八九十自今嵗正月以來日漸減落至五六月間浙西數郡大雨不止太湖泛溢所在害稼六月初間米價復長至七月初㪷及百錢足陌見今新米已出而常平官米不敢住糶災傷之勢恐甚於去年何者去年之災如人初病今嵗之災如病再發病狀雖同氣力衰耗恐難支特又縁春夏之交雨水調勻浙人喜於豐嵗家家典賣舉債出息以事田作車水築圩髙下殆遍計本已重指日待熟而淫雨風濤一舉害之民之窮苦實倍去嵗近者將官劉季孫往蘇州按教臣宻令季孫沿路體訪季孫還為臣言此數州不獨淫雨為害又多大風駕起潮浪堤堰圩垾率皆破損湖州水入城中民家皆尺餘此去嵗所無有也而轉運判官張璹自常潤還所言略同云親見吳江平望八尺間有舉家田苗没在深水底父子聚哭以船筏撈摝云半米猶堪炒喫青穟且以喂牛正使自今雨止已非豐嵗而况止不止又未可知則來嵗之憂非復今年之比矣何以言之去年杭州管常平米二十三萬石今年已糶過十五萬石雖餘八萬石而糶賣未已又縁去年災傷放税及和糴不行省倉闕數所有上件常平米八萬石只了兑撥充軍糧更無見在惟有糶常平米錢近八萬貫而錢非救飢之物若來年米益貴錢益輕雖積錢如山終無所用熈寧中兩浙市易出錢百萬緡民無貧富皆得取用而米不可得故曳羅紈帶金玉横尸道上者不可勝計今來浙東西大抵皆糶過常平米見在絶數少熈寧之憂凛凛在人眼中矣臣材力短淺加之衰病而一路生齒憂責在臣受恩既深不敢别乞閒郡日夜思慮求來年救飢之術别無長策惟有秋冬之間不惜髙價多糴常平米以備來年出糶今來浙西數州米既不熟而轉運司又管上供年額斛斗一百五十餘萬石若兩司爭糴米必大貴饑饉愈迫和糴不行來年青黄不交之際常平有錢無米官吏拱手坐視人死而山海之間接連甌閩盜賊結集或生意外之患則誅殛臣等何補於敗以此須至具實聞奏伏望陛下備録臣奏行下户部及本路轉運提刑兩路鈐轄司疾早相度來年合與不合准備常平斛㪷出糶救飢如合准備即具逐州合用數目臣已約度杭州合用二十萬石仍委逐司擘畫合如何措置令米價不至大段翔湧收糴得足如逐司以為不須准備出糶救濟即令各具保明來年委得不至飢殍流亡結罪聞奏縁今來已是入秋去和糴月日無幾比及相度往復取㫖深慮不及於事伏乞詳察速賜指揮臣屢犯天威無任戰慄待罪之至謹録奏聞伏候勅㫖朱子嘗曰救荒之術在備之末荒之前若至已荒更有何策至哉言也後世司牧斯民者哀鴻遍野尚欲壅於上聞能如軾之未雨綢繆憯怛忠愛為民請命乎此則文之醇乎醇而可為世法者佳文豈在聲調格律之工哉論積欠狀元祐七年五月十六日龍圖閣學士左朝奉郎知揚州蘇軾狀奏臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年於兹仁孝慈儉可謂至矣而帑廩日益困農民日益貧商賈不行水旱相繼以上聖之資而無善人之效臣竊痛之所至訪問耆老有識之士隂求其所以皆曰方今民荷寛政無它疾苦但為積欠所壓如負千鈞而行免於僵仆則幸矣何暇舉首奮臂以營求於一飽之外哉今大姓富家昔日號為無比户者皆為市易所破十無一二矣其餘自小民以上大率皆有積欠監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為篳門圭竇矣自祖宗以來每有敕令必曰凡欠官物無侵欺盜用及雖有侵盜而本家及伍保人無家業者並與除放祖宗非不知官物失陷姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盜賊之所憑藉故舉而放之則天下悦服雖有水旱盜賊民不思亂此為捐虚名而收實利也自二聖臨御以來每以施捨已責為先務登極赦令每次郊赦或隨事指揮皆從寛厚凡今所催欠負十有六七皆聖恩所貸矣而官吏刻薄與聖恩異舞文巧詆使不該放監司以催欠為職業守令上為監司之所迫下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然日有所得若一旦除放則此等皆寂寥無獲矣自非有力之家納賂請賕誰肯舉行恩貸而積欠之人皆鄰於寒餓何賂之有其間貧困掃地無可蠶食者則縣胥教令通指平人或云衷私擅買抵當物業或雖非衷私而云買不當價似此之類蔓延追擾自甲及乙自乙及丙無有窮已每限皆空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取葢無虚日俗謂此等為縣胥食邑户嗟乎聖人在上使民不得為陛下赤子而皆為奸吏食邑户此何道也商賈販賣例無現錢若用現錢則無利息須今年索去年所賣明年索今年所賒然後計算得行彼此通濟今富户先已殘破中民又有積欠誰敢賒賣物貨則商賈自然不行此酒税課利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘於財用例不肯放税縱放亦不盡實雖無明文指揮而以喜怒風曉官吏孰敢違者所以逐縣例皆拖欠兩税較其所欠與依實檢放無異於官了無所益而民有追擾鞭撻之苦近日詔㫖凡積欠皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以為有㫖倚閣者方得依十料指揮餘皆併催縱使盡依十料吏卒乞覔必不肯分料少取人户既未納足則追擾常在縱分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積欠所壓日就窮蹙死亡過半而欠籍不除以至虧欠兩税走陷課利農末皆病公私並困以此推之天下大率皆然矣臣自潁移揚州過濠壽楚泗等州所至麻麥如雲臣每屏去吏卒親入村落訪問父老皆有憂色云豐年不如凶年天災流行民雖乏食縮衣節口猶可以生若豐年舉催積欠胥徒在門枷棒在身則人户求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積欠故流民不敢歸鄉臣聞之孔子曰苛政猛於虎昔常不信其言以今觀之殆有甚者水旱殺人百倍於虎而人畏催欠乃甚於水旱臣竊度之每州催欠吏卒不下五百人以天下言之是常有二十餘萬虎狼散在民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以檢察本州積欠為事内已有條貫除放而官吏不肯舉行者臣即指揮本州一面除放去訖其於理合放而於條未有明文者即且令本州權住催理聽候指揮其於理合放而於條有礙者臣亦不敢住催各具利害奏取聖㫖宋自青苗市易等法行民無不欠官物者一二十年間溥天之下莫不入於湯火矣觀軾此狀歴歴可觀可為流涕王安石之罪信上通於天也古者農自農而商自商非惟正之供官府勿與交財賄焉子產之語載在春秋匪特立政之體宜爾也葢市道必不可行於官與民夫細民之競利在錐刀之末賴積微以成鉅弗躬弗親往往乾沒今官一而民萬其必不可以躬親也明矣非胥徒是任其奚任出納既由胥徒則民之所靡十已七八而官之所入尚無二三此必然之理也久之則皆成積欠既成積欠則官物唐捐而民為子孫之累唯胥徒不耕而穫之利永逺不荒耳是故官莊田地官本貿易在官無異舉貨棄之於地而民已不勝其擾均非善政又況放債舉息乎王安石推而行之徧天下宜乎舉太真仁英百餘年休養生息之業一旦風巻烟湯沃雪也論綱梢欠折利害狀元祐七年七月二十七日龍圖閣學士左朝奉郎知揚州蘇軾狀奏臣聞唐代宗時劉晏為江淮轉運使始於揚州造轉運船每船載一千石十船為一綱揚州差軍將押赴河隂每造一船破錢一千貫而實費不及五百貫或譏其枉費晏曰大國不可以小道理凡所創置須謀經久船場既興執事者非一須有餘剩衣食養活衆人私用不窘則官物牢固乃於揚子縣置十船場差專知官十人不數年間皆致富贍凡五十餘年船場既無破敗餽運亦不闕絶至咸通末有杜御史者始以一千石船分造五百石船二隻船始敗壊而吳堯卿者為揚子院官始勘㑹每船合用物料實數估給其錢無復寛剩專知官十家即時凍餒而船場遂破餽運不繼不久遂有黄巢之亂劉晏以千貫造船破五百貫為干繫人欺隠之資以今之君子寡見淺聞者論之可謂疏繆之極矣然晏運四十萬石當用船四百隻五年而一更造是嵗造八十隻也每隻剩破五百貫是嵗失四萬貫也而吳堯卿不過為朝廷嵗寛四萬貫耳得失至微而餽運不繼以胎天下之大禍臣以此知天下之大計未嘗不成於大度之士而敗於寒陋之小人也國家財用大事安危所出願常不與寒陋小人謀之則可以經久不敗矣臣竊見嘉祐中張方平為三司使上論京師軍儲云今之京師古所謂陳留四通八達之地非如雍洛有山河之險足恃也特恃重兵以立國耳兵恃食食恃漕運漕運一虧朝廷無所措手足因畫十四策内一項云糧綱到京每嵗少欠不下六七萬石皆以折㑹償填發運司不復抱認非祖宗之舊也臣以此知嘉祐以前嵗運六百萬石而以欠折六七萬石為多訪聞去嵗止運四百五十餘萬石而欠折之多約至三十餘萬石運法之壊一至於此又臣到任未幾而所斷糧綱欠折干繫人徒流不可勝數衣糧罄於折㑹船車盡於拆賣質妻鬻子飢瘦伶俜聚為乞丐散為盜賊竊計京師及縁河諸郡例皆如此朝廷之大計生民之大病如臣等輩豈可坐觀而不救耶輒問之於吏乃金部便敢私意創立此條不取聖㫖公然行下不惟非理刻剥敗壊祖宗法度而人臣私意乃能廢格制敕監司州郡靡然奉行莫敢誰何此豈小事哉謹按一綱三十隻船而税務監官不過一員未委如何隨船㸃檢得三十隻船一時皆遍而不勒留住岸一船㸃檢即二十九隻船皆須住岸伺候顯是違條舞法析文破敕茍以隨船為名公然勒留㸃檢與兒戲無異訪聞得諸州多是元祐三年以來始行㸃檢收税行之數年其弊乃出綱稍既皆赤露妻子流離性命不保雖加刀鋸亦不能禁其攘竊此弊不革臣恐今後欠折不止三十餘萬石京師軍儲不繼其患豈可勝言揚州税務自元祐三年十月始行㸃檢收税至六年終凡三年間共收糧綱税錢四千七百餘貫絶長補短每嵗不過收錢一千六百貫耳以淮南一路言之真揚髙郵楚泗宿六州軍所得不過萬緡而所在税務專攔因金部轉運司許令㸃檢縁此為姦邀難乞取十倍於官遂至綱梢皆窮困骨立亦無復富商大賈肯以物貨委令搭載以此專仰攘取官米無復限量拆賣船板動使淨盡事敗入獄以命償官顯是金部與轉運司違例刻剥得糧綱税錢一千貫而令朝廷失陷綱運米三十餘萬石利害皎然今來倉部並不體訪綱運致欠之因却言縁倉司㪷子乞覔綱梢錢物以致欠折遂立法令真揚楚泗轉般倉並行倉法其逐處㪷子仍只存留一半命下之日揚州轉般倉㪷子四十人皆詣臣陳狀盡乞歸農臣雖且多方抑按曉喻退還其狀然相度得此法必行則見今㪷子必致星散雖别行召募未必無人然皆是浮浪輕生不畏重法之人所支錢米決不能贍養其家不免乞取既冒深法必須重賂輕齎宻行交付其押綱綱梢等知專㪷若不受賂必無寛剩㪷面決難了納即須多方宻行重賂不待求乞而後行用此必然之理也臣細觀近日倉部所立條約皆是枝葉小節非利害之大本何者自熈寧以前中外並無倉法亦無今來倉部所立條約而嵗運六百萬石欠折不過六七萬石葢是朝廷捐商税之小利以養活綱梢而縁路官司遵守編敕法度不敢違條㸃檢收税以致綱梢飽暖愛惜身命保全官物事理灼然臣已取責得本州税務狀稱隨船㸃檢不過檢得一船其餘二十九船不免住岸伺候顯有違碍臣尋已備坐元祐編敕曉示今後更不得以隨船為名違條勒令住岸㸃檢去訖其税務官吏為准本州及倉部發運轉運司指揮非是自擅為條未敢便行取勘其諸州軍税務非臣所管無由一例行下欲乞朝廷申明元祐編敕不得勒令住岸條貫嚴賜約束行下并乞廢罷近日倉部起請倉法仍取問金部官吏不取聖㫖擅立隨船一法刻剥兵梢敗壊綱運以誤國計及發運轉運司官吏依隨情罪施行庶使今後刻薄之吏不敢擅行胸臆取小而害大得一而喪百臣聞東南餽運所係國計至大故祖宗以來特置發運司專任其責選用既重威令自行如昔時許元輩皆能約束諸路主張綱運其監司州郡及諸場務豈敢非理刻剥邀難但發運使得人稍假事權東南大計自然辦集豈假朝廷更行倉法此事最為簡要獨在朝廷留意而已謹具元祐編敕及金部擅行隨船㸃檢指揮如左一准元祐編敕諸綱運船栰到岸檢納税錢如有違限如限内無故稽留及非理搜檢并約喝無名税錢者各徒二年諸新錢綱及糧綱縁路不得勒令住岸㸃檢雖有透漏違禁之物其經歴處更不問罪至京下鏁通津門准此一准元祐五年十一月十九日尚書金部符省部看詳監糧綱運雖不得勒留住岸若是隨船㸃檢得委有税物名件自合依例饒潤收納税錢即無不許納税錢事理若或别無税物自不得依例喝貌税錢事理甚明右謹件如前者若朝廷盡行臣言必有五利綱梢飽暖惜身畏法運餽不大陷失一利也省徒配之刑消流亡賊盜之患二利也梢工衣食既足人人自重以船為家既免拆賣又常修完省逐處船場之費三利也押綱綱梢附載物貨官不㸃檢專攔無由乞取然梢工自領赴務量納税錢以防告訐積少成多所獲未必減於今日四利也自元豐之末罷市易務導洛司堆垜場議者以為商賈必漸通行而今八年略無絲毫之效京師酒税課利皆虧房廊邸店皆空何也葢祖宗以來通許綱運攬載物貨既免征税而脚錢又輕故物貨通流縁路雖失商税而京師坐獲富庶自導洛司廢而淮南轉運司隂收其利數年以來官用窘逼轉運司督迫諸處税務日急一日故商賈全然不行京師坐至枯涸今若行臣此策東南商賈久閉乍通其來必倍則京師公私數年之後必復舊觀此五利也臣竊見近日官私例皆輕玩國法習以成風若朝廷以臣言為非臣不敢避妄言之罪乞賜重行責罰若以臣言為是即乞盡理施行少有違戾必罰無赦則所陳五利可以朝行而夕見也謹録奏聞伏候敕㫖國家財用大事安危所出司財用者不可不讀此文又嘗論之士庶之家侈費過度必子孫貧困然貧困之後往往仍有賢子孫復興唯慳吝積財者平生無甚過惡而每多斬焉無祀或為子孫所破敗灰飛烟滅天之報施何必如是深思其由葢財者人之所以養生也而其相流轉於天地之間者止有此數豐於此即嗇於彼故侈費過度者在其人則為奢縱而其散之天地間者必有不知誰何之人獲被其養者矣唯納而不出則身雖未嘗享其用而使養生之具積而不流則亦必有不知誰何之人不得被其養者其造旤在於無形也士庶所及者至隘而猶如是況人君以天下為一家林林總總皆所宜養而可輜銖較量浚剥徵求使天地所以養人之生者不能養人或轉因之而害人之生豈非師曠所謂棄天地之性者哉朝辭赴定州論事狀元祐八年九月二十六日端明殿學士兼翰林侍讀學士左朝奉郎新知定州蘇軾狀奏臣聞天下治亂出於下情之通塞至治之極至於小民皆能自通大亂之極至於近臣不能自達易曰天地交泰其詞曰上下交而其志同又曰天地不交否其詞曰上下不交而天下無邦夫無邦者亡國之謂也上下不交則雖有朝廷君臣而亡國之形已具矣可不畏哉臣不敢復引衰世昏主之事只如唐明皇中興刑措之君也而天寳之末小人在位下情不通則鮮于仲通以二十萬人全軍陷沒於瀘南明皇不知馴致其事至安禄山反兵已過河而明皇猶以為忠臣此無他下情不通耳目壅蔽則其漸至於此也臣在經筵數論此事陛下為政九年除執政臺諫外未嘗與羣臣接然天下不以為非者以為垂簾之際不得不爾也今者祥除之後聽政之初當以通下情除壅蔽為急務臣雖不肖䝉陛下擢為河北西路安撫使沿邊重地此為首冠臣嘗悉心論奏陛下亦當垂意聽納祖宗之法邊帥當上殿面辭而陛下獨以本任闕官迎接人衆為辭降㫖拒臣不令上殿此何義也臣若伺候上殿不過更留十日本任闕官自有轉運使權攝無所闕事迎接人衆不過更支十日糧有何不可而使聽政之初將帥不得一面天顏而去有識之士皆謂陛下厭聞人言意輕邊事其兆見於此矣臣備位講讀日侍帷幄前後五年可謂親近方當戍邊不得一見而行況疎逺小臣欲求自通亦難矣易曰天行健君子以自强不息又曰帝出乎震相見乎離夫聖人作而萬物覩今陛下聽政之初不行乘乾出震見離之道廢祖宗臨遣將帥故事而襲行垂簾不得已之政此朝廷有識所以驚疑而憂慮也臣不得上殿於臣之私别無利害而於聽政之始天下屬目之際所損聖徳不小臣已於今月二十七日出門非敢求登對然臣始者本俟上殿欲少效愚忠今來不敢以不得對之故便廢此言惟陛下察臣誠心少加採納古之聖人將有為也必先處晦而觀光處靜而觀動則萬物之情畢陳於前不過數年自然知利害之真識邪正之實然後應物以作故作無不成臣敢以小事譬之夫操舟者常患不見水道之曲折而水濵之立觀者常見之何則操舟者身寄於動而立觀者常靜故也奕碁者勝負之形雖國工有所不盡而袖手旁觀者常盡之何則奕者有意於爭而旁觀者無心故也若人主常靜而無心天下其孰能欺之漢景帝即位之初首用鼂錯更易法令黜削諸侯遂成七國之變景帝往來兩宫間寒心者數月終身不敢復言兵武帝即位未幾遂欲用兵鞭撻四夷兵連禍結三十餘年然後下哀痛詔封宰相為富民侯臣以此知古者英睿之君勇於立事未有不悔者也景帝之悔速故變而復安武帝之悔遲故幾至於亂雖遲速安危小異然比之常靜無心終始不悔如孝文帝者不可同年而語矣今陛下聖智絶人春秋鼎盛臣願虚心循理一切未有所施黙觀庶事之利害與羣臣之邪正以三年為期俟得利害之真邪正之實然後應物而作使既作之後天下無恨陛下亦無恨上下同享太平之利則雖盡南山之竹不足以紀聖功兼三宗之壽不足以報聖徳由此觀之陛下之有為惟憂太早不患稍遲亦已明矣臣又聞為政如用藥方今天下雖未大治實無大病古人云有病不治常得中醫雖未能盡除小疾然賢於誤服惡藥覬萬一之利而得不救之禍者逺矣臣恐急進好利之臣輙勸陛下輕有改變故輒進此説敢望陛下深信古語且守中醫安穏萬全之策勿為惡藥所誤實社稷宗廟之利天下幸甚臣不勝忘身憂國之心冒死進言謹録奏聞伏候敕㫖按本傳云哲宗八年宣仁皇后崩哲宗親政軾乞補外以端明殿侍讀兩學士出知定州時國是將變軾不得入辭既行上書云云嘗觀宣仁䂖臨朝盡革神宗時弊政千古稱女中堯舜而當時憸壬小人挾子不當改父之政之説以煽動哲宗其時諸賢亦止以宣仁所定為母改子非哲宗子改父為辭而未能究極其理也如子不可改父則宣仁臨朝雖曰母改子而哲宗嗣服究是子改父無異掩耳盜鈴矣子曰三年無改於父之道可謂孝矣曽子曰孟莊子不改父之臣與父之政是難能也熈寧大臣動稱紹述用孔曽斯語以為據依而不知以文害辭以辭害志所為侮聖人之言也夫道也者猶路也九達之衢自西自東自南自北皆可之焉然而父自東者子三年不敢自西不忘親也孟獻子之臣當無壬人矣孟獻子之政當無粃政矣孟莊子當日豈無為之臣者孟莊子為政豈無别出之見可措諸施行者然孟莊子唯父之舊臣是用唯父之舊政是循不忘親也故曰是難能也凡若此者皆父之所為合於道道在兩可必從其父之所可於天下無所損益也而有餘孝焉聖賢所深許也若其獲罪於天與民害于而家凶于而國人人皆知其非道而曰父之道也改必待三年曰父之臣也將卒用之以行父之政則易不當云幹父之蠱有子考无咎矣父在猶有幾諫之文諍子之義父沒則其哀痛迫切以速葢其愆者當何如而曰吾將紹述焉是揚父之惡而世濟其凶也乃曰孔曽有明訓豈非侮孔曽之言哉孔子繫易曰幹父之蠱意承考也夫人之所以為人以有父子之親也而所以有父子之親者亦以其為人人也者性為之非欲為之也雖桀紂之惡桀紂之欲也非其性也桀紂既死則其欲堙滅而無存矣其性則死而不亡使武庚禄父能幹其蠱反其政而安天下之民亦不得不謂之意承考葢謂桀紂之性惡不得也則謂桀紂之無此意亦不得也况乎宋神宗者實有振厲奮發追踪前古之意特以知之不明處之不當為羣小之所愚以致於敗晚乃悔之而氣拘物蔽吝於改過不能自克原其本意豈欲民生之流離軍旅之敗沒哉夫孝者善繼人之志善述人之事者也人之志立人達人之志也人之事立人達人之事也是以不曰父之志與事謂其嫌於從欲也使以從欲為繼述則非所謂人之志與事矣且守而不變誰其不能而又何謂善哉天有四時春秋冬夏其代謝者猶父子之義也春謝而夏代夏猶春之子也而易温為暑夏謝而秋代秋猶夏之子也而易暑為涼使四時執而不變則生物盡矣況乎五緯愆而六氣易而欲執其愆且易者以為常曰吾以紹述也豈孔曾之教然哉語曰前事之不忘後事之師也然則前事之有疑即後事之惑也學必講而後明故孔子曰學之不講是吾憂也人皆知哲宗紹述之為非而不能無疑於孔曽之語則母改子非子改父之説淆之不可不講也誠知哲宗紹述之為不孝則孔曽教孝之義大明矣御選唐宋文醇巻四十七
