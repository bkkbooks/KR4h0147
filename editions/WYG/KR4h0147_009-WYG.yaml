body:
  text: 昌黎韓愈文九碑銘墓誌銘魏博節度觀察使沂國公先廟碑銘江南西道觀察使贈左散騎常侍太原王公神道碑銘唐故相權公墓碑殿中少監馬君墓誌考功員外盧君墓誌李元賓墓銘施先生墓銘唐故江西觀察使韋公墓誌銘欽定四庫全書御選唐宋文醇卷九昌黎韓愈文九魏博節度觀察使沂國公先廟碑銘元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田𢎞正始有廟京師朕惟𢎞正先祖父厥心靡不嚮帝室訖不得施乃以教付厥子維𢎞正銜訓嗣事朝夕不怠以能迎天之休顯有丕功維父子繼忠孝予維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閤門拜疏辭謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉駜泮閟之詩使聲於其廟以假魯靈今天子嘉田侯服父訓不違用康靖我國家蓋寵銘之所以休寧田氏之祖考而臣適執筆隸太史奉明命其可以辭謹案魏博節度使銀青光禄大夫檢校工部尚書兼魏州大都督府長史御史大夫沂國公田𢎞正北平盧龍人故為魏博諸將忠孝畏慎田季安卒其子幼弱用故事代父人吏不附迎𢎞正於其家使領軍事𢎞正籍其軍之衆與六州之人還之朝廷悉除河北故事比諸州故得用為帥巳而復贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曽祖都水使者府君祭初室祖安東司馬贈襄州刺史府君祭二室兵部府君祭東室其銘曰唐繼古帝海外受制狎於大寧燕盜以驚羣黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪魏土嬰兒戱兵吏戎愁毒莫保腰頸人曰田侯其德可倚叫譟奔趨乘門請起田侯攝事奉我天明束縛弓戈考校度程提壃籍户來復邦經帝欽良臣曰維錫予嗟我六州始復故初告慶於宗以降命書旌節有韜豹尾神旗櫜兠㦸纛以長魏師田侯稽首臣愚不肖迨兹有成祖考之教帝曰俞哉惟汝忠孝予思乃父追秩夏卿嫓德娠賢梁國是榮田侯作廟相方視阯見於蓍龜祖考咸喜暨暨田侯兩有文武訖其外庸可作承輔咨汝田侯勿亟勿遲覲饗式時爾祖爾思按𢎞正父廷玠大厯中為滄州刺史恒州李寶臣幽州朱滔聯兵攻擊欲兼其土宇廷玠固守卒能保全朝廷嘉之遷洛州改湘州建中初田恱領魏博節度使志圖凶逆召廷玠為副蓋恱父承嗣與廷玠為從昆弟也及恱姦謀敗露廷玠曰爾藉伯父遺業可守朝廷法度坐享富貴何苦與恒鄆同為叛臣若狂志不悛可先殺我乃謝病不出三年憤鬱而卒𢎞正既籍魏博六州歸朝其後奉詔令其子布帥師三千助討吳元濟元濟平復討李師道比有功師道為其將劉悟所殺𢎞正常欲變山東承襲舊風悉遣子姓仕朝廷而布同時為河陽節度使穆宗時詔以𢎞正為成德軍節度使𢎞正以新與鎮人戰有父兄怨請魏卒二千自衛度支崔棱吝其廩沮却之㑹𢎞正卒軍遂亂家屬將吏三百餘人皆遇害時魏博節度使李愬病不能軍公卿議以魏人素德𢎞正而𢎞正子布賢可世其官遽詔布解縗拜魏博節度使乘傳以行布號泣固辭不聽與妻子訣曰吾不還矣㑹詔分布軍合李光顏討深州衆不肯東遂潰歸其牙將史憲誠唯中軍不動明日㑹諸將議事衆譁曰公能行河朔故事則生死從公不然不可以戰布度衆且亂即為書謝帝授從事李石引刀刺心曰上以謝君父下以示三軍言訖而絶於戲唐自安史之亂河南北諸軍陽服實叛王室僅為守府而𢎞正父子祖孫三世皭然泥而不滓竭其股肱之力加之以忠貞不濟則以死繼之以垂光於青史良不愧昌黎世忠孝一語也唐故江南西道觀察使中大夫洪州刺史兼御史中丞上柱國賜紫金魚袋贈左散騎常侍太原王公神道碑銘王氏皆王者之後在太原為姬姓春秋時王子成父敗狄有功因賜氏厥後世居太原至東漢隱士烈博士徵不就居祁縣因號所居鄉為君子公其君子鄉人也魏晉涉隋世有名人國朝大王父元暕歴御史屬三院止尚書郎生景肅守三郡終傅凉王生政襄鄧等州防禦使鄂州採訪使贈吏部尚書公尚書之第某子公諱仲舒字𢎞中少孤奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交貞元初射策拜左拾遺與陽城合遏裴延齡不得為相德宗初怏怏無奈久而嘉之其後入閤德宗顧列為宰相曰第幾人必王某也果然月餘特改右補闕遷禮部考功吏部三員外郎在禮部奏議詳雅省中伏其能在考功吏部提約明故吏無以欺同列有恃恩自得者衆皆媚承公嫉其為人不直視由此貶連州司户移䕫州司馬又移荆南因佐其節度事為參謀得五品服放迹在外積四年元和初收拾俊賢徵拜吏部員外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其寃繇是出為峽州刺史轉廬州未至丁母夫人憂服除又為婺州時疫旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制使出巡人填道迎顯公德事具聞就加金紫轉蘇州變其屋居以絶火延隄松江路害絶阻滯秋夏賦調自為書與人以期吏無及門而集政成為天下守之最天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人既至京師儕流無在者視同列皆邈然少年益自悲而謂人曰豈可復治筆硯於其間哉上若未棄臣宜用所長在外久周知俗之利病俾治之當不自愧宰相以聞遂得觀察江南西道奏罷𣙜酤錢九十萬軍息之無已掌吏壞産猶不釋囚之公至脱械不問人遭水旱賦窘公曰我且減燕樂絶他用錢可足乎遂以代之罷軍之息錢禁浮屠誑誘壊其舍以葺公宇二年法大成錢餘于庫粟餘于廩人享於田廬謳謠於道途天子復思且徵以代虛吏部左丞位以待之長慶三年十一月十七日薨於洪州年六十二上哀慟輟朝贈左散騎常侍某日歸葬於某處某既以公之德刻而藏之墓矣子初又請詩以揭之詞曰生人之治本乎斯文有事其末而亡其源切近昩陋道由是堙有志其本而泥古陳當用而迂乖戾不伸較是二者其過也均有美王公志儒之本達士之經秩秩而積涵涵而停韡為華英不矜不盈孰播其馨孰發其明介然而居士友以傾敷文帝階擢列侍從以忠逺名有直有諷辨遏堅懇巨邪不用秀出班行乃動帝目帝省竭心恩顧日渥翔於郎署騫於禁密發帝之令簡古而蔚不比於權以直友寃敲撼挫揠竟遭斥奔久淹於外歴守大藩所至極思必悉利病萎枯以膏燠暍以醒坦之敞之必絶其徑浚之澄之使安其泳帝思其文復命掌誥公潛謂人此職宜少豈無凋郡庸以自效上藉其實俾統於洪逋滯攸除姦訛革風祛蔽於目釋負於躬方乎所部禁絶浮屠風雨順易秔稻盈疇人得其所乃恬乃謳化成有代思以息勞虛位而竢奄忽滔滔維德維績志於斯石日逺彌髙生民之治本乎斯文有事其末而忘其源切近昩陋道由是堙有志其本而泥古陳當用而迂乖戾不伸總是二者其過也均數語曲盡歴來人文凋敝六經榛塞之故矣八代風雲月露唐宋詩賦帖括所為切近昩陋道由是湮者也語經濟者執陳册而不識時無以行今談性命者抗髙言而無實際難與道古所為當用而迂乖戾不伸者也易不云乎觀乎人文以化成天下人文如此人君孰與決大疑襄大業而化成天下哉昌黎掲之以激勵後學所為吏部文章日月光歟唐故相權公墓碑上之元和六年其相曰權公諱德輿字載之其本出自殷帝武丁武丁之子降封於權權江漢間國也周衰入楚為權氏楚滅徙秦而居天水略陽苻秦之王中國其臣有安丘公翼者有大臣之言後六世至平凉公文誕為唐上庸太守荆州大都督長史焯有聲烈平凉曾孫諱倕贈尚書禮部郎中以藝學與蘇源明相善卒官羽林軍錄事參軍於公為王父郎中生贈太子太保諱臯以忠孝致大名去官累以官徵不起追諡貞孝是實生公公在相位三年其後以吏部尚書授節鎮山南年六十以薨贈尚書左僕射諡文公公生三嵗知變四聲四嵗能為詩七嵗而貞孝公卒來弔哭者見其顏色聲容皆相謂權氏世有其人及長好學孝敬祥順貞元八年以前江西府監察御史徵拜博士朝士以得人相慶改左補闕章奏不絶譏排姦倖與陽城為助轉起居舍人遂知制誥凡撰命詞九年以類集為五十卷天下稱其能十八年以中書舍人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意奏廣嵗所舉進士明經在得人不以員拘轉户兵吏三曹侍郎太子賓客復為兵部遷太常卿天下愈推為鉅人長徳時天子以為宰相宜參用道徳人因拜禮部尚書同中書門下平章事公既謝辭不許其所設張舉措必本於寛大以幾教化多所助與維匡調娛不失其正中於和節不為聲章因善與賢不矜主已以吏部尚書留守東都東方諸帥有利病不能自請者公常與疏陳不以露布復拜太常轉刑部尚書考定新舊令式為三十編舉可長用其在山南河南勤於選付治以和簡人以寧便以疾求還十三年某月甲子道薨於洋之白草奏至天子痌傷為之不御朝郎官致贈錫官居野處上下弔哭皆曰善人死矣某年某月日葬河南北山在貞孝東五里公由陪屬升列年除嵗遷以至公宰人皆喜聞若已與有無忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省顧朝莫敢言者公將留守東都為上言曰頔之罪既貰不竟宜因賜寛詔上曰然公為吾行諭之頔以不憂死前後考第進士及廷所䇿試士踵相躡為宰相達官與公相先後其餘布處臺閣外府凡百餘人自始學至疾未病未嘗一日去書不觀公既以能為文辭擅聲於朝多銘卿大夫功德然其為家不視簿書未嘗問有亡費不偫餘公娶清河崔氏女其父造嘗相德宗號為名臣既葬其子監察御史璩纍然服喪來有請乃作銘文曰權在商周世無不存滅楚徙秦嬴劉之間甘泉始侯以及安丘詆訶浮屠皇極之扶貞孝之生鳳鳥不至爵位豈多半塗以税壽考豈多四十而逝惟其不有以惠厥後是生相君為朝徳首行世祖之文世師之流連六官出入屏毗無黨無讐舉世莫疵人所憚為公勇為之其所競馳公絶不窺孰克知之德將在斯刻詩墓碑以永厥垂徳輿既忠臣子少以文章稱諸儒間貞元元和中為縉紳羽儀蕃祉老壽出入將相遍歴六卿當世所羨昌黎為推其父臯貞孝之貽一篇之中三致意焉其勸善之意媺哉殿中少監馬君墓誌君諱繼祖司徒贈太師北平莊武王之孫少府監贈太子少傅諱暢之子生四嵗以門功拜太子舍人積三十四年五轉而至殿中少監年三十七以卒有男八人女二人始余初冠應進士貢在京師窮不自存以故人稚弟拜北平王於馬前王問而憐之因得見於安邑里第王軫其寒饑賜食與衣召二子使為之主其季遇我特厚少府監贈太子少傅者也姆抱幼子立側眉眼如畫髮漆黑肌肉玉雪可念殿中君也當是時見王於北亭猶髙山深林鉅谷龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好静秀瑤環瑜珥蘭茁其芽稱其家兒也後四五年吾成進士去而東遊哭北平王於客舍後十五六年吾為尚書都官郎分司東都而分府少傅卒哭之又十餘年至今哭少監焉嗚呼吾未耄老自始至今未四十年而哭其祖子孫三世於人世何如也人欲久不死而觀居此世者何也馬燧沈雄忠力名盖一時功績既顯貲亦甲天下子暢又善殖財家最豐厚晚為豪右侵牟中官逼取遂至困窮諸子無室廬自託所為殿中君者暢子繼祖也始生德宗命之名退而笑曰此有二義意謂以索繫祖也暢嘗以第中大杏饋竇文塲文塲以進德宗德宗未嘗見頗怪之令就第封杏樹暢懼進宅廢為奉誠園屋木盡拆入内白居易詩云不見馬家宅今作奉誠園者也新唐書云當世視暢以厚蓄為戒吳融於敷水遇丐者乃燧諸孫為詩曰天地塵昬九鼎危大貂曾出武侯師一心忠赤山河見百戰功名日月知舊宅已聞栽禁樹諸孫仍見丐征岐而今不要教人識正藉將軍死鬬時夫馬氏子孫不能幅制於平時自致摧敗零落固巳然唐室之不復昌豈盡天命哉括民膏血以恱驕兵叛將而於忠臣子孫少恩如此夫安得而不亡史言暢晚年已困窮則繼祖死時槩可知矣昌黎為誌言人欲久不死而觀居此世者何也不樂其生而發詩人尚寐無訛之歎夫豈專為馬氏言哉考功員外盧君墓銘愈之宗兄故起居舍人君以道德文學伏一世其友四人其一范陽盧君東美少未出仕皆在江淮間天下大夫士謂之四䕫其義以為道可與古之䕫臯者侔故云爾或曰䕫嘗為相世謂相䕫四人者雖處而未仕天下許以為相故云大厯初御史大夫李栖筠由工部侍郎為浙西觀察使當是時中國新去亂士多避處江淮間嘗為顯官得名聲以老故自任者以千百數大夫莫之取獨晨衣朝服從騎吏入下里舍請盧君君時始任戴冠通詩書與其羣日講説周公孔子以相磨礱浸灌婆娑嬉游未有捨所為為人意既起從大夫天下未知君者惟竒大夫之取人也不常必得人其知君者謂君之從人也非其常守必得其從其後為太常博士監察御史河南府司録考功員外郎年若干而終在官舉其職夫人李姓隴西人君在配君子無違德君歿訓子女得母道甚後君二十年年六十六而終將合葬其子暢命其孫立曰乃祖徳烈靡不聞然其詳而信者宜莫若吾先人之友先人之友無在者起居丈有季曰愈能為古文業其家是必能道吾父事業汝其往請銘焉立於是奉其父命奔走來告愈謂立曰子來宜也行不可一二舉且吾之生也後不與而祖接不得詳也其大者莫若衆所與觀所與衆寡兹可以審其德矣乃祖未出而處也天下大夫士以為與古之䕫臯者侔且可以為相其德不既大矣乎講説周公孔子樂其道不樂從事於俗得所從不擇外内奮而起其進退不既合於義乎銘如是可以示於今與後也歟立拜手曰唯唯君祖子輿濮州濮陽令父同舒州望江令夫人之祖延宗鄆州司馬父進成鄜州洛交令男三人暢申易女三人皆嫁為士人妻墓在河南緱氏縣梁國之原其年月日元和二年二月十日云永泰中㑹與盧東美張正則崔造為友好談經濟之畧嘗以王佐自許時人號為四䕫舊史載於崔造傳新史亦具載之摭言則以何長師李華盧東美韓衢為四䕫李肇國史補曰韓㑹與名輩號曰四䕫㑹為䕫頭而善歌妙絶劉賓客嘉話曰崔丞相造布衣時江左士人號曰白衣䕫時有四人一是盧東美其二遺忘觀唐人所載四䕫多互異而盧東美三人既皆未柄用無勲業可紀唯崔造為相亦殊庸庸然則四䕫者名士標榜陋習非其實也昌黎此文隱而顯矣李元賓墓銘李觀字元賓其先隴西人也始來自江之東年二十四舉進士三年登上第又舉博學宏辭得太子校書一年年二十九客死於京師既斂之三日友人博陵崔𢎞禮葬之於國東門之外七里鄉曰慶義原曰嵩原友人韓愈書石以誌之辭曰已乎元賓夀也者吾不知其所慕天也者吾不知其所惡生而不淑孰謂之壽死而不朽孰謂之天已乎元賓才髙乎當世而行出乎古人已乎元賓竟何為哉竟何為哉唐書本傳觀屬文不傍沿前人時謂與韓愈相上下及觀少天而愈後文益工議者以觀文未極愈老不休故卒擅名陸希聲以為觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老終不能加觀之辭觀後愈死亦不能逮愈之質云施先生墓銘貞元十八年十月十一日太學博士施先生士丐卒其寮太原郭伉買石誌其墓昌黎韓愈為之辭曰先生明毛鄭詩通春秋左氏傳善講説朝之賢士大夫從而執經考疑者繼於門太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟時先生之説二經來太學帖帖坐諸生下恐不卒得聞先生死二經生喪其師仕於學者亡其朋故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學者十九年由四門助教為太學助教由助教為博士太學秩滿當去諸生輙拜疏乞留或留或遷凡十九年不離太學祖曰旭袁州宜春尉父曰婼豪州定逺丞妻曰太原王氏先先生卒子曰友直明州鄮縣主簿曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讐為博士延為太尉太尉之孫始為吳人曰然曰續亦載其跡先生之興公車是召纂序前聞於光有曜古聖人言其㫖密微箋注紛羅顛倒是非聞先生講論如客得歸卑讓肫肫出言孔揚今其死矣誰嗣為宗縣曰萬年原曰神禾髙四尺者先生墓邪朱子考異曰劉公嘉話云予嘗與栁八韓十八詣施士丐聽毛詩說維鵜在梁梁人取魚梁也言鵜自合求魚不合於人梁上取其魚譬之人自無善事攘人之美者如鵜在人梁上焉則毛注失之矣又說山無草木曰岵所以言陟彼岵兮無可岵也以其無草木故以譬之又説甘棠勿翦勿拜召伯所憇拜言人心之拜小低屈也上言勿翦終言勿拜明召伯漸逺人思不忘也毛注拜猶伐非也又説維北有斗不可把酒漿言不得其人也毛都不注此新史云士丐撰春秋傳未甚傳後文宗喜經術宰相李石因言士丐春秋可讀文宗曰朕見之矣穿鑿之學徒為異同但學者如浚井得羙水而巳何必勞苦旁求然後為得耶唐故江西觀察使韋公墓誌銘公諱丹字某姓韋氏六世祖孝寛仕周有功以公開號於鄖鄖公之子孫世為大官唯公之父政卒雒縣丞贈虢州刺史公既孤以甥孫從太師魯公真卿學太師愛之舉明經第選授峽州逺安令以讓其庶兄入紫閣山事從父熊通五經登科歴校書郎咸陽尉佐邠寧軍自監察御史為殿中侍御史徵拜太子舍人益有名遷起居郎吳少誠襲許州拜河陽行軍司馬未行少誠死改駕部員外郎新羅國君死公以司封郎中兼御史中丞紫衣金魚往弔立其嗣故事使外國者常賜州縣官十員使以名上以便其私號私覿官公將行曰吾天子吏使海外國不足於資宜上請安有賣官以受錢邪即具疏所以上以為賢命有司與其費至鄆州㑹新羅告所當立君死還拜容州刺史容管經畧招討使始城容州周十三里置屯田二十四所化大行詔加太中大夫順宗嗣位拜河南少尹行未至拜鄭滑行軍司馬始至襄陽詔拜諫議大夫既至日言事不阿權臣謇然有直名遂號為才臣劉闢反圍梓州詔以公為東川節度使御史大夫公行至漢中上疏言梓州在圍間守方盡力不可易將徵還入議蜀事劉闢去梓州因以梓州讓髙崇文拜晉慈隰等州觀察防禦使自扶風縣男進封武陽郡開國公食邑二千戸將行上言臣所治三州非要害地不足張職為國家費不如屬之河東便上以為忠一歳拜洪州刺史江南西道觀蔡使以晉慈隰屬河東公既至則計口受俸錢委其餘於官罷八州無事之食者以聚其財始教人為瓦屋取財於山召陶工教人陶聚材瓦於場度其費以為估不取贏利凡取材瓦於官業定而受其償從令者免其賦之半逃未復者官與為之貧不能者畀之財載食與漿親往勸之為瓦屋萬三千七百為重屋四千七百民無火憂暑濕則乘其髙别命置南北市營諸軍嵗旱種不入土募人就工厚與之直而給其食業成人不病饑為長衢南北夾兩營東西七里人去渫汚氣益蘇復作南昌縣徙廐於髙地因其廢倉大屋馬以不連死明年築堤扞江長十二里䟽為斗門以走潦水公去位之明年江水平堤老幼泣而思曰無此堤吾屍其流入海矣灌陂塘五百九十八得田萬二千頃凡為民去害興利若嗜慾居三年於江西八州無遺便其大如是其細可畧也卒有違令當死者公不果於誅杖而遣之去上書告公所為不法若干條朝廷方勇於治且以為公名才能臣治功聞天下不辨則受垢詔罷官留江西待辨使未至月餘公以疾薨使至辨凡卒所告事若干條皆無絲毫實詔笞卒百流嶺南公能益明春秋五十八薨於元和五年八月六日公好施與家無剩財自校書郎至為觀察使擁吏卒前走七州刺史與賓客處如布衣時自持卑一不易娶清河崔氏故支江令諷之女某官某之孫有子曰寘年十五明經及第嗣其家業後夫人蘭陵蕭氏中書令華之孫殿中侍御史恒之女皆先公終有女一人凡公男若干人女若干人明年七月壬寅從葬萬年縣少陵原將葬其從事東平呂宗禮與其子寘謀曰我公宜得直而不華者銘傳於後固不朽矣寘來請銘銘曰武陽受業始於太師以官讓兄自待不疑勤於紫閣取益以卑可謂有源卒用無疵慊慊為人矯矯為官爰及江西功德具完名聲之下獨處為難辯而益明仇者所歎碑於墓前維昭美故納銘墓中以識公墓朱子曰韋丹新史列之循吏傳皆取墓誌及杜牧所作遺愛碑為之唐書本傳太和中裴誼觀察江西上言為丹立祠堂刻石紀功不報宣宗讀元和實錄見丹政事卓然它日與宰相語元和時治民孰第一周墀對曰臣嘗守江西韋丹有大功德被八州歿四十年老幼思之不忘乃詔觀察使紇干泉上丹功狀命刻功於碑御選唐宋文醇卷九
