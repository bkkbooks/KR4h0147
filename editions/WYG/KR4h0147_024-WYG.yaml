body:
  text: 廬陵歐陽修文三序帝王世次圖序後序外制集序詩譜補亡後序集古録目序韻總序蘇氏文集序梅聖俞詩集序送徐無黨南歸序欽定四庫全書御選唐宋文醇卷二十四廬陵歐陽修文三帝王世次圖序堯舜禹湯文武此六君子者可謂顯人矣而後世猶失其傳者豈非以其遠也哉是故君子之學不窮遠以為能而闕其不知慎所傳以惑世也方孔子時周衰學廢先王之道不明而異端之説並起孔子患之乃修正詩書史記以止紛亂之說而欲其傳之信也故畧其遠而詳其近於書斷自唐虞以來著其大事可以為世法者而已至於三皇五帝君臣世次皆未嘗道者以其世遠而慎所不知也孔子旣沒異端之說復興周室亦益衰亂接乎戰國秦遂焚書先王之道中絶漢興久之詩書稍出而不完當王道中絶之際竒書異說方充斥而盛行其言往往反自托於孔子之徒以取信於時學者旣不備見詩書之詳而習傳盛行之異說世無聖人以為質而不自知其取捨真偽至有博學好竒之士務多聞以為勝者於是盡集諸說而論次初無所擇而惟恐遺之也如司馬遷之史記是矣以孔子之學上述前世止於堯舜著其大畧而不道其前遷遠出孔子之後而乃上述黄帝以來又詳悉其世次其不量力而務勝宜其失之多也遷所作本紀出於大戴禮世本諸書今依其説圗而考之堯舜夏商周皆同出於黄帝堯之崩也下傳其四世孫舜舜之崩也復上傳其四世祖禹而舜禹皆壽百歲稷契於髙辛為子乃同父異母之兄弟今以其世次而下之湯與王季同世湯下傳十六世而為紂王季下傳一世而為文王二世而為武王是文王以十五世祖臣事十五世孫紂而武王以十四世祖伐十四世孫而代之王何其謬哉嗚呼堯舜禹湯文武之道百王之取法也其盛徳大業見於行事而後世所欲知者孔子皆已論著之矣其久遠難明之事後世不必知不知不害為君子者孔子皆不道也夫孔子所以為聖人者其智知所取捨皆如此王志堅曰困學紀聞攷古編謂歐陽公論二帝三王世次差舛發端於杜佑通典按釋例世族譜已有此疑則發端乃杜預也後序予旣畧論帝王世次而見本紀之失猶謂文武與紂相去十五六世其繆較然不疑而堯舜禹之世相去不遠尚冀其理有可通乃復以尚書孟子孔安國皇甫謐諸書參考其壽數長短而尤乖戾不能合也據書及諸説云堯壽一百一十六歳舜壽一百一十二歲禹壽百歲堯年十六即位在位七十年年八十六始得舜而試之二年乃始攝政時舜年三十居試攝通三十年而堯崩舜服堯䘮三年畢乃即位在位五十年而崩方舜在位三十三年命禹攝政凡十七年而舜崩禹服舜䘮三年畢乃即位在位十年而崩由是言之當堯得舜之時堯年八十六舜年三十以此推而上之是堯年五十七已見四世之𤣥孫生一歲矣舜居試攝及在位通八十二年而禹壽百年以禹百年之間推而上之禹即位及居舜䘮通十三年又在舜朝八十二年通九十五年則當舜攝試之初年禹纔六歲是舜為𤣥孫年三十時見四世之髙祖方生六歲矣至於舜娶堯二女據圖為曾祖姑雖古遠世異與今容有不同然人倫之理乃萬世之常道必不錯亂顛倒之如此然則諸家世次壽數長短之説聖經之所不著者皆不足信也决矣修平生於古人書不輕訾議至其灼見刺謬則反覆申明以詔後世又不憚覼縷間嘗論之馬遷上下千百年以成史記而班固譏其是非頗謬於聖人迄今考其書其所褒貶盖多微辭所以譏切當世語南意北使讀者自得之未嘗是其所是而非其所非又何以據其文而譏其謬也特所編次多據戰國秦漢間處士游談不經之説雜入孔子論定之六經使金鍮莫辨涇渭不分則其所蔽耳公羊傳曰所聞異辭所傳聞又異辭事隔數世不能以無訛謬雖左氏傳猶或未免况其他乎如史記所載衛公子伋壽爭死乃據左傳詩傳之文謂衛宣公納伋之妻生壽及朔朔與宣姜愬伋於公公令伋之齊使賊先待於隘而殺之壽竊其節以先伋至爭死賊并殺之先儒信之無疑者乃考其年代則宣公十八年納伋之妻而十九年宣公死然則所為壽者朔者雖孿生亦俱未周晬安得有愬伋爭死之事乎不特左氏傳可疑即二子乗舟之詩亦不知何為作也如是者不可枚舉聊附記其一端使後世知孟子云盡信書不如無書之為至論也外制集序慶厯三年春丞相吕夷簡病不能朝上旣更用大臣銳意天下事始用諫官御史疏追還夏竦制書旣而召韓琦范仲淹於陜西又除富弼樞宻副使弼仲淹琦皆惶恐頓首辭讓至五六不已手詔趣琦等就道甚急而弼方且入求對以辭不得見遣中貴人趣送閣門使即受命嗚呼觀琦等之所以讓上之所以用琦等者可謂聖賢相遭萬世一遇而君臣之際何其盛也於是時天下之士孰不願為材邪顧予何人亦與其選夏四月召自滑臺入諫院冬十二月拜右正言知制誥是時夏人雖數請命而西師尚未解嚴京東累歲盗賊最後王倫暴起沂州轉劫江淮之間而張海郭貎山等亦起商鄧以驚京西州縣之吏多不稱職而民弊矣天子方慨然勸農桑興學校破去前例以不次用人哀民之困而欲除其蠧吏知磨勘法久之弊而思别材不肖以進賢能患百職之不修而申行賞罰之信盖欲修法度矣予時雖掌誥命猶在諫職常得奏事殿中從容盡聞天子所以更張庶事憂閔元元而勞心求治之意退得載於制書以諷曉訓勅在位者然予方與修祖宗故事又修起居注又修編勅日與同舍論議治文書所省不一而除目所下率不一二時已廹丞相出故不得專一思慮工文字以盡導天子難諭之意而復誥命於三代之文嗟夫學者文章見用於世鮮矣况得施於朝廷而又遭人主致治之盛若修之鄙使竭其材猶恐不稱而况不能專一其職此予所以常遺恨於斯文也明年秋予出為河北轉運使又明年春權知成徳軍事事少間發嚮所作制草而閱之雖不能盡載明天子之意於其所述而得一二足以彰示後世盖王者之訓在焉豈以予文之鄙而廢也於是録之為三巻予自直閣下儤直八十始滿不數日奉使河東還即已來河北故其所作纔一百五十餘篇云徐度曰按歐陽文忠公慶厯制草序曰除目所下率不一二時已廹丞相出故不得專一思慮工文字以盡道天子難喻之意而還誥命於三代之文又劉原甫侍讀墓誌稱其文章尤敏贍嘗直紫微閣一日追封皇子公主九人方將下直為之立馬却坐一揮九制凡數千言文辭典雅各得其體由是言之則是除目旣下必用是日草詞且不得從容下直而為之也迨元祐初命詞之限已不得如前者之廹翟公巽資政居政和間詞命獨為一時之冠然文思遲澁尤惡人趣之有趣之者輙黙誌其旁故一趣則故遲一日有遷延至旬餘者詩譜補亡後序歐陽子曰昔者聖人已沒六經之道幾熄於戰國而焚棄於秦自漢已來收拾亡逸發明遺義而正其訛繆得以麤備傳於今者豈一人之力哉後之學者因迹前世之所傳而較其得失或有之矣若使徒抱焚餘殘脫之經倀倀於去聖千百年後不見先儒中間之說而欲特立一家之學者果有能哉吾未之信也然則先儒之論茍非詳其終始而牴牾質於聖人而悖理害經之甚有不得已而後改易者何必徒為異論以相訾也毛鄭於詩其學亦已博矣予嘗依其箋傳考之於經而證以序譜惜其不合者頗多盖詩述商周自生民𤣥鳥上陳稷契下迄陳靈公千五六百歲之間旁及列國君臣世次國地山川封域圖牒鳥獸草木魚蟲之名與其風俗善惡方言訓詁盛衰治亂美刺之由無所不載然則孰能無失於其間哉予疑毛鄭之失旣多然不敢輕為改易者意其為說不止於箋傳而已恨不得盡見二家之書未能徧通其㫖夫不盡見其書而欲折其是非猶不盡人之辭而欲斷其訟之曲直其能果於自决乎其能使之必服乎世言鄭氏詩譜最詳求之久矣不可得雖崇文總目秘書所藏亦無之慶厯四年奉使河東至於絳州偶得焉其文有注而不見名氏然首尾殘缺自周公致太平以上皆亡之其國譜旁行尤易為訛舛悉皆顛倒錯亂不可復考凡詩雅頌兼列商魯其正變之風十有四國而其次皆莫詳其義惟封國變風之先後不可以不知周召王豳同出於周邶鄘出於衛檜魏無世家其可考者陳齊衛晉曹鄭秦此封國之先後也豳齊衛檜陳唐秦鄭魏曹此變風之先後也周南召南邶鄘衛王鄭齊豳秦魏唐陳曹此孔子未刪詩之前周太師樂歌之次第也周召邶鄘衛王檜鄭齊魏唐秦陳曹豳此鄭氏詩譜次第也黜檜後陳此今詩次第也初予未見鄭譜嘗畧考春秋史記本紀世家年表而合以毛鄭之說為詩圗十四篇今因取以補鄭譜之亡者足以見二家所說世次先後甚備因據而求其得失較然矣而仍存其圖庶幾以見予於鄭氏之學盡心焉耳夫盡其說而有所不通然後得以論正予豈好為異論者哉凡補其譜十有五補其文字二百七增損塗乙改正者三百八十三而鄭氏之譜復完矣修與宋咸書謂經非一世之書其傳之謬非一日之失其刋正補緝亦非一人之所能使學者各極其所見而明者擇焉十取其一百取其十雖未能復六經於無失然聚衆善以補緝之庶幾不至於大謬可以俟聖人之復生又與徐無黨書謂凡今治經者莫不患聖人之意不明而為諸儒以自出之說汨之也今於經外又自為說則是患沙渾水而投土益之也不若沙土盡去則水清而明矣合之此序三者雖若語相牴牾而如五味之相和可見修於六經潛心自得之趣而亦可為後世學人治經之法也集古録目序物常聚於所好而常得於有力之彊有力而不好好之而無力雖近且易有不能致之象犀虎豹蠻夷山海殺人之獸然其齒角皮革可聚而有也玉出崑崙流沙萬里之外經十餘譯乃至乎中國珠出南海常生深淵採者腰絙而入水形色非人往往不出則下飽蛟魚金礦于山鑿深而穴遠篝火餱糧而後進其崖崩窟塞則遂葬於其中者率常數十百人其遠且難而又多死禍常如此然而金玉珠璣世常兼聚而有也凡物好之而有力則無不至也湯盤孔鼎岐陽之鼓岱山鄒嶧㑹稽之刻石與夫漢魏以來聖君賢士桓碑彞器銘詩序記下至古文籕篆分𨽻諸家之字書皆三代以來至寶怪竒偉麗工妙可喜之物其去人不遠其取之無禍然而風霜兵火湮沒磨滅散棄於山崖墟莽之間未嘗收拾者由世之好者少也幸而有好之者又其力或不足故僅得其一二而不能使其聚也夫力莫如好好莫如一予性顓而嗜古凡世人之所貪者皆無欲於其間故得一其所好於斯好之已篤則力雖未足猶能致之故上自周穆王以來下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破塜神仙鬼物詭怪所傳莫不皆有以為集古録以為轉寫失真故因其石本軸而藏之有巻帙次第而無時世之先後盖其取多而未已故隨其所得而録之又以為聚多而終必散乃撮其大要别為録目因并載夫可與史傳正其闕謬者以傳後學庶益於多聞或譏予曰物多則其勢難聚聚久而無不散何必區區於是哉予對曰足吾所好玩而老焉可也象犀金玉之聚其能果不散乎予固未能以此而易彼也歐陽修自記昔在洛陽與余逰者皆一時豪雋之士也而陳郡謝希深善評文章河南尹師魯辨論精博余毎有所作二人者必伸紙疾讀便得余深意以示他人亦或時有所稱皆非余所自得者也宛陵梅聖俞善人君子也與余共處窮約每見余小有可喜事懽然若在諸已自三君之亡余亦老且病矣此叙之作旣無謝尹之知音而集録成書恨聖俞之不見也悲夫韻總序倕工於為弓而不能射羿與逄䝉天下之善射者也奚仲工於為車而不能御王良造父天下之善御者也此旬卿子所謂藝之至者不兩能信哉儒者學乎聖人聖人之道直以簡然至其曲而暢之以通天下之理以究陰陽天地人鬼事物之變化君臣父子吉㓙生死凡人之大倫則六經不能盡其說而七十子與孟軻荀揚之徒各極其辯而莫能殫焉夫以孔子之好學而其所道者自堯舜而後則詳之其前盖畧而弗道其亦有所不暇者歟儒之學者信哉遠且大而用功多則其有所不暇者宜也文字之為學儒者之所用也其為精也有聲形曲直毫釐之别音響清濁相生之類五方言語風俗之殊故儒者莫暇精之其有精者則往往不能乎其他是以學者莫肯捨其所事而盡心乎此所謂不兩能者也必待乎用心專者而或能之然後儒者有以取焉洛僧鑒聿為韻總五篇推子母輕重之法以定四聲考求前儒之失辯正五方之訛顧其用心之精可謂入於忽微若櫛之於髪績之於絲雖細且多而條理不亂儒之學者莫能難也鑒聿通於易能知大衍之數又學乎陰陽地理黄帝岐伯之書其尤盡心者韻總也世本儒家子少為浮圗入武當山往來江漢之旁十餘年不妄與人交有不可其意雖王公大人亦莫肯顧聞士有一藝雖千里必求之介然有古獨行之節所謂用心專者也宜其學必至焉耳浮圖之書行乎世者數百萬言其文字雜以夷夏讀者罕得其真往往就而正焉鑒聿之書非獨有取於吾儒亦欲傳於其徒也字學所係甚小然韓愈云凡為文宜略識字固亦不得而略也旣有聲形曲直毫釐之别則必有音響清濁相生之類五方言語風俗各殊莫可究詰然必有統宗㑹元之處焉先儒謂聲較色味臭止得其半盖三者俱兼陰陽獨聲止陽數記曰凡聲陽也故至於陰則不能行理固然矣然其不能行處即是無聲而無聲之所從來必有有聲者以為對其對為何聲則反而求之於此雖無聲而不異有聲也梵書有華嚴字母能統萬類之聲而一一區别之僧鑒聿其精於是者歟蘇氏文集序予友蘇子美之亡後四年始得其平生文章遺稿於太子太傅杜公之家而集録之以為十巻子美杜氏壻也遂以其集歸之而告於公曰斯文金玉也棄擲埋沒糞土不能銷蝕其見遺於一時必有收而寶之於後世者雖其埋沒而未出其精氣光怪已能常自發見而物亦不能揜也故方其擯斥摧挫流離窮厄之時文章已自行於天下雖其怨家仇人及嘗能出力而擠之死者至其文章則不能少毁而揜蔽之也凡人之情忽近而貴遠子美屈於今世猶若此其伸於後世宜如何也公其可無恨予嘗考前世文章政理之盛衰而怪唐太宗致治幾乎三王之盛而文章不能革五代之餘習後百有餘年韓李之徒出然後元和之文始復於古唐衰兵亂又百餘年而聖宋興天下一定晏然無事又幾百年而古文始盛於今自古治時少而亂時多幸時治矣文章或不能純粹或遲久而不相及何其難之若是歟豈非難得其人歟茍一有其人又幸而及出於治世世其可不為之貴重而愛惜之歟嗟吾子美以一酒食之過至廢為民而流落以死此其可以歎息流涕而為當世仁人君子之職位宜與國家樂育賢材者惜也子美之齒少於予而予學古文反在其後天聖之間予舉進士於有司見時學者務以言語聲偶摘裂號為時文以相誇尚而子美獨與其兄才翁及穆㕘軍伯長作為古謌詩雜文時人頗共非笑之而子美不顧也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趨於古焉獨子美為於舉世不為之時其始終自守不牽世俗趨舍可謂特立之士也子美官至大理評事集賢校理而廢後為湖州長史以卒享年四十有一其狀貎竒偉望之昂然而即之温温久而愈可愛慕其材雖髙而人亦不甚嫉忌其擊而去之者意不在子美也賴天子聰明仁聖凡當時所指名而排斥二三大臣而下欲以子美為根而累之者皆䝉保全今並列於榮寵雖與子美同時飲酒得罪之人多一時之豪俊亦被收采進顯於朝廷而子美獨不幸死矣豈非其命也悲夫朱子曰范文正招引一時才俊之士聚在館閣如蘇子美梅聖俞之徒此輩雖有才望然輕儇戲謔又多分流品一時許公為相張安道為御史中丞王拱辰之徒皆深惡之求去之未有䇿而蘇子美又杜祁公壻杜是時為相蘇為館職兼進奏院每歲院中賽神例賣故紙錢為飲燕之費蘇承例賣故紙因出已錢添助為㑹請館閣中諸名勝而分别流品非其侣者皆不得與㑹李定願與而蘇不肯於是盡招兩軍女妓作樂爛飲作為傲歌王勝之直柔句云欹倒太極遣帝扶周公孔子驅為奴拱辰輩專探伺伊敗闕才聞此句即以白上仁宗大怒即令中官捕捉諸公皆已散走逃匿而上怒甚捕捉甚峻城中喧然於是韓魏公言於上曰陛下即位以來未嘗為此等事一旦遽如此驚駭天下觀聽仁宗怒少解而館閣之士罷逐一空故時有一網打盡之語杜公亦罷相子美除名為民永不叙復子美居湖州有詩曰不及雞竿下坐人言不得比罪人引赦免放也雖是拱辰安道輩攻之甚急然亦只伊輩輕薄做得不是縱有時名所為如此終亦何補於天下國家邪仁宗於是懲才士輕薄之弊這幾箇承意㫖盡援引純朴持重之人以愚仁宗凡解經不過如釋訓詁而已如楊安國彭乗之徒是也梅聖俞詩集序予聞世謂詩人少達而多窮夫豈然哉盖世所傳詩者多出於古窮人之辭也凡士之藴其所有而不得施於世者多喜自放於山巔水涯之外見蟲魚草木風雲鳥獸之狀類往往探其竒怪内有憂思感憤之鬱積其興於怨刺以道羇臣寡婦之所歎而寫人情之難言盖愈窮則愈工然則非詩之能窮人殆窮者而後工也予友梅聖俞少以䕃補為吏累舉進士輙抑於有司困於州縣凡十餘年年今五十猶從辟書為人之佐鬱其所蓄不得奮見於事業其家宛陵幼習於詩自為童子出語已驚其長老旣長學乎六經仁義之說其為文章簡古純粹不求茍說於世世之人徒知其詩而已然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂於詩而發之故其平生所作於詩尤多世旣知之矣而未有薦於上者昔王文康公嘗見而歎曰二百年無此作矣雖知之深亦不果薦也若使其幸得用於朝廷作為雅頌以歌詠大宋之功徳薦之清廟而追商周魯頌之作者豈不偉歟奈何使其老不得志而為窮者之詩乃徒發於蟲魚物類羇愁感歎之言世徒喜其工不知其窮之久而將老也可不惜哉聖俞詩旣多不自收拾其妻之兄子謝景初懼其多而易失也取其自洛陽至於吳興以來所作次為十巻予嘗嗜聖俞詩而患不能盡得之遽喜謝氏之能類次也輒序而藏之其後十五年聖俞以疾卒於京師余旣哭而銘之因索於其家得其遺槀千餘篇并書所藏掇其尤者六百七十七篇為一十五巻嗚呼吾於聖俞詩論之詳矣故不復云王志堅曰歐陽公與梅聖俞由河南幕府締交最久至嘉祐元年始薦為直講距聖俞之死僅五年耳故王荆公挽詩云貴人憐公青兩眸吹嘘可使髙岑樓坐令隠納不見收空能乞錢助饙餾此為歐公發也然公為作誌又為作序於故人之誼不薄其不早汲引豈無意乎世傳聖俞不得志作一書名碧雲騢以詆諸公葉夢得嘗辨為魏泰作然於石林燕語載范公初貶饒州聖俞作靈鳥賦以寄及公秉政意其援已而漠然無意所薦乃孫明復李泰伯聖俞乃作後靈鳥賦云我昔閔汝之忠作賦弔汝今主人誤豐爾食安爾巢而爾不復啄叛臣之目伺賊壘之去反憎鴻鵠之不親愛燕雀之來附清波雜志引聖俞聞范公訃詩云一出屢更郡人皆望酒壺俗情那可學奏記向來無貧賤常甘分崇髙不解腴雖然門館隔泣與衆人殊疑碧雲騢一書真出聖俞合而觀之聖俞之為人可知歐公待之最為得體送徐無黨南歸序草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸於腐壞澌盡冺滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽逾遠而彌存也其所以為聖賢者修之於身施之於事見之於言是三者所以能不朽而存也修於身者無所不獲施於事者有得有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也孔子弟子有能政事者矣有能言語者矣若顔囘者在陋巷曲肱饑臥而已其羣居則黙然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千歲亦未有能及之者其不朽而存者固不待施於事况於言乎予讀班固藝文志唐四庫書目見其所列自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉予竊悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃也盖如此今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字間者皆可悲也東陽徐生少從予學為文章稍稍見稱於人既去而與羣士試於禮部得髙第由是知名其文辭日進如水涌而山出予欲摧其盛氣而勉其思也故於其歸告以是言然予固亦喜為文辭者亦因以自警焉王志堅曰張芸叟與石司理書云頃遊京師每聼歐陽文忠公王荆公司馬温公之論於行義文史為多惟歐公多談吏事久之不免有請云學者之見先生莫不以道徳文章為欲聞者今先生多教人以吏事所未喻也公曰不然吾子異日臨事當自知之大抵文章止於潤身政事可以及物吾昔貶官夷陵欲求史漢一觀公私無有因取陳年公牘反覆觀之見其枉直乖錯不可勝數且以夷陵荒遠褊小尚如此天下固可知也當時仰天誓心曰自爾遇事不敢忽也迨今二十餘年出入中外忝塵三事今日以人望我必謂翰墨致身以我自觀竟是當時一言之報也此序諄諄以徒言為誡即此一段公於文學曾不自足而必求政事以及人非聖賢心事何以有此御選唐宋文醇巻二十四
