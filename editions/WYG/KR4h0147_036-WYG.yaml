body:
  text: 眉山蘇洵文三論記洪範論序洪範上洪範中洪範下洪範後序嚳妃論明論辨姦蘇氏族譜亭記張益州畫像記木假山記欽定四庫全書御選唐宋文醇巻三十六眉山蘇洵文三洪範論洪範論敘洪範其不可行歟何說者之多而行者之寡也曰諸儒使然也譬諸律令其始作者非不欲人之難犯而易避矣及吏胥舞之則千機百穽吁可畏也夫洪範亦猶是耳吾病其然因作三論大抵斥末而歸本褒經而擊傳剗磨瑕垢以見聖秘復列二圖一以指其謬一以形吾意噫人吾知乎不吾知其謂吾求異夫先儒而以為新竒也洪範上洪範之原出於天而畀之禹禹傳之箕子箕子死後世有孔安國為之注劉向父子為之傳孔穎達為之疏是一聖五賢之心未始不欲人君審其法從其道矣禹與箕子之言經也幽微宏深不可以俄而曉者經之常也然而所審當得其統所從當得其端是故宜責孔劉輩今求之於其所謂注與傳與疏者而不獲故明其統舉其端而欲人君審從之易也夫致至治總乎大法樹大法本乎五行理五行資乎五事正五事賴乎皇極五行含羅九疇者也五事檢御五行者也皇極裁節五事者也儻綜於身驗於氣則終始常道之次靡有不順焉然則含羅者其統也裁節者其端也執其端而御其統古之聖人正如是耳今夫皇極之建也貌必恭恭作肅言必從從作乂視必明明作哲聽必聰聰作謀思必睿睿作聖如此則五行得其性雨暘燠寒風皆時而五福應矣若夫皇極之不建也貌不恭厥咎狂言不從厥咎僭視不明厥咎豫聽不聰厥咎急思不睿厥咎䝉如此則五行失其性雨暘燠寒風皆常而六極應矣噫曰得曰時曰福人君孰不欲趨之曰失曰常曰極人君孰不欲逃之然而罕能者諸儒之過也夫禹之疇分之則幾五十矣諸儒不求所謂統與端者顧為之傳則嚮之五十又將百焉人之心一固不能兼百難之而不行也欲行之莫若歸之易百歸之五十五十歸之九九歸之三三五行也五事也皇極也而又以皇極裁節五事五事得而五行從是三卒歸之一也然則所守不亦約而易乎所守約而易則人君孰欲棄得取失棄時取常棄福取極哉以一治三以三治九以九治五十以五十治百天意也禹意也箕子意也洪範中或曰古人言洪範莫深於歆向之傳吾嘗學而得之矣今觀子之論子其未之學耶何遽反之也子之論曰皇極裁節五事其建不建為五事之得失傳則擬五事而言之其咎其罰其極與五事比非所以裁節五事也子又曰皇極建則五福應皇極不建則六極應傳則條福極而配之貌與言與視與聽與思與皇極又非皇極兼獲福極也然則劉之傳子之論孰得乎曰爾以箕子之知洪範與歆向之知孰愈必曰箕子之知愈也則吾從之彼歆向拂箕子意矣吾復何取哉雖然彼豈不知求從箕子乎求之過深而惑之愈甚矣歆向之惑始於福極分應五事遂强為之說故其失寖廣而有五焉今其傳以極之惡福之攸好徳歸諸貌極之憂福之康寧歸諸言極之疾福之壽歸諸視極之貧福之富歸諸聽極之凶短折福之考終命歸諸思所謂福止此而已所謂極則未盡其弱焉遂曲引皇極以足之皇極非五事匹其不建之咎止一極之弱哉其失一也且逆而極順而福傳之例也至皇之不極則其極既弱矣吾不識皇之極則天將以何福應之哉若曰五福皆應則皇之不極惡憂疾貧凶短折曷不偕應哉此乃自廢其例其失二也箕子謂咎曰狂僭豫急蒙而已罰曰雨暘燠寒風而已今傳又增咎以眊增罰以隂此其揠聖人之言以就固謬况眊與蒙無異而雨可兼陰而別名之得乎其失三也經之首五行而次五事者徒以五行天而五事人人不可以先天耳然五行之逆順必視五事之得失使吾為傳必以五事先五行借如傳貌之不恭是謂不肅厥咎狂則木不曲直厥罰常雨其餘亦如之察劉之心非不欲爾葢五行盡於思無以周皇極茍如庶驗增之則雖惷亦怪駭矣故離五行五事而為解以蔽其釁其失四也傳之於木其說以為貌矣及火土金水則思言視聽殊不及焉自相駁亂其失五也夫九疇之於五行可以條而入者惟二箕子陳之葢有深㫖矣五事一也庶驗二也驗之肅乂哲謀聖一出於五事事之貌言視聽思一出於五行此理之自然可不條而入之乎其他八政五紀三徳稽疑福極其大歸雖無越於五行五事非可條而入之者也條而入之非理之自然故其傳必鉤牽扳援文致而強附之然後可以僅知此福此極之所以應此事者立言如此其亦勞矣且傳於福極既爾則於八政五紀三徳稽疑亦當爾而今又不爾何也經曰五皇極皇建其有極斂時五福用敷錫厥庶民此言皇極建而五福備使經云皇極之不建則必以六極易五福矣焉在其條而入之乎且皇極九疇之尤貴者故聖人位之於中以貫上下譬若庶驗然曰雨曰暘曰燠曰寒曰風曰時時於雨暘燠寒風各冠其上耳又可列之以為一驗乎若是則劉之傳惑且強明矣噫傳之法二劉倡之班固志之後之史志五行者孰不師而效之世之讀者又孰不從而然之是以膠為一論莫有考正吾得無言哉洪範下吾既剔去傳疵以粹經猶有秘處而先儒不白其意或解失其㫖者非一今辨正以申之經曰鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇夫五行一疇耳一汨而九不畀葢五行綱九疇綱壞而目廢也然則五行之汨非五事之失乎五事之失非皇極之不建乎葢箕子微見其統與端矣經之次第五行也以生數至於五事也求之五行則相尅何也從五常斯與相尅合矣先民之論五行也水性智而事聽火性禮而事視木性仁而事貌金性義而事言土性信而事思及其論五常也以為徳莫大於仁仁或失於弱故以義斷之義或失於剛故以禮節之禮或失於拘故以智通之智或失於詐故以信正之此五常次第所以然也五事從之所以亦然也三八政曰食曰貨曰祀曰賔曰師五者不以官名之鄭康成以食為稷以貨為司貨賄以賔為大行人是三百六十官箕子於九疇中區區焉錯舉其八耳孔穎達則曰司貨賄大行人皆事主非復民政夫事雖非民亦未害為政孔之失滋甚焉吾以為不然箕子言國家之政無越是八者周公制禮酌而用之故建六官以主八政食與貨則天官祀與賔則春官師則夏官司空則冬官司徙則地官司寇則秋官此得其正矣七稽疑擇建立卜筮人孔安國謂知卜筮人而立之夫知卜筮人天下不為鮮矣孜孜然以擇此為事則委𤨏不亦甚乎吾意卜筮至神人所諒而從者導之善人必諒而從之蜀莊是矣導之惡人亦諒而從之丘子明是也聖人懼後人輕其職使有如丘子明輩故曰擇建立卜筮人謂擇賢也不然司空司徙司寇其擇之又當甚於此云者彼天子之卿不若卜筮之官為後世所輕雖婦人孺子知其不可不擇故也嗚呼聖人之言枝分𣲖別不得其源紛莫可曉譬之日月五星十二次二十八宿使昧者觀之固憒憒如也不知晷度躔次的不可紊差之渺忽寒暑乖逆吾故於洪範明其統舉其端削劉之惑繩孔之失使經意炳然如從璣衡中窺天文矣洪範後序吾論洪範以五福六極系皇極之建與不建而且不與二劉之增眊與陰或者猶以劉向夏侯勝之說為惑劉向之言皇極之建總為五福皇極之不建不能主五事下與五事齒而均獲一極猶平王之詩降而為國風夏侯勝之言曰天久陰不雨臣下將有謀上者己而果然以劉向之說則皇極之不建不可系以六極以夏侯勝之說則眊與隂不可廢是皆不然夫福極之於五事非若庶驗也陰陽而推之律厯而求之人事而揆之庶驗之通於五事可指而言也且聖人之所可知也今指人而謂之曰爾為某事明日必有某福爾為某事明日必有某極是巫覡卜相之事也而聖人何由知之故吾以為皇極之建五事皆得而五福皆應不曰應某事者必某福也皇極不建五事皆失而六極皆應不曰應某事者必某極也五事之間得與失參焉則亦不曰必某福必某極應也亦曰福與極參焉耳今劉以為皇極建而為五事主故加之五福及其不建也不加之以六極而以平王之詩為說其意以為不建則不能為五事主故不加之六極以為貶也今有人有九命之爵及有罪而曰削其爵使至一命以貶之曰貶可也此猶平王之詩降而為國風曰降可也若夫有罪人當具五刑而曰是人也罪大不當加之以五刑姑以墨辟論以重其責是得為重其責耶今欲重不建之罪不曰六極皆應而曰獨弱之極應乃引平王之詩以為說平王之詩固不然也且彼聖人者豈以天下之福與極止於五與六而已哉葢亦舉其大槩耳夫天地之間非人力所為而可以為驗者多矣聖人取其尤大而可以有所兼者五而使其餘者可以遂見焉今也力分其一端以為二而必曰隂為隂雨為雨且經之庶驗有曰暘矣而豈獨遺隂哉葢隂之極盛於雨而聖人舉其極者言也吾觀二劉之傳金不從革與傳常雨也乃言雷電雨雪皆在而獨於此別雨與隂何也然則夏侯勝之言何以必應曰事固有幸而中者公孫臣以漢為土徳而黄龍當現黄龍則見矣而漢乃火徳也可以一黄龍而必謂漢為土徳耶必不可也其所謂眊者蒙矣胡復多言哉洵於洪範破漢儒牽强傅㑹之失開千古之㝠䝉信有功矣然按漢書五行志曰董仲舒治公羊春秋始推隂陽為儒者宗宣元之後劉向治穀梁春秋數其旤福傅以洪範與仲舒錯至向子歆治左氏傳其春秋意亦己乖矣言五行傳又頗不同是以㩜仲舒別向歆傅載眭孟夏侯勝京房谷永李尋之徒所陳行事訖於王莽舉十二世以傅春秋然則向歆之學雖多謬舛非其所創也微言絶大義乖漢儒收亡拾燼補苴罅漏其失雖多要其存什一於千百使後學有所措其心思者未可數罪而忘勲也且其意所以明天人之際影應響答如此其可畏以儆戒萬世之君臣又何過哉特其鉤牽扳援文致强傅後生怪其迂輙心輕之甚至疑經此其所短耳洵雖辭而闢之又為圖以明之然猶未暢厥㫖真徳秀因之有悟而為之訓而後條理分明㫖趣昭著千古讀洪範者宜所取宗也本朝李光地述其說義加粹焉蓋嘗考之九疇自一至九者數之定序也而分九而三之則上中下各得三焉上焉者天之象也中焉者身之象也下焉者民之象也一四七上也二五八中也三六九下也一五行天之體也故其文不曰用四五紀所以推天之度以敬授人時者也七稽疑所以求天之心以奉若天道者也疇之云者類也一四七所以為類也二五事修身之要也五皇極身之五事修之止於至善也八庶徵天以雨暘燠寒風為身而人身之貌言視聽思與相應焉極之建不建於是乎徵故念之也此二五八所以為類也三八政食為民天六官皆以明農所以厚民生也六三徳既富必教因其風土而損益之以協於大中所以正民徳也九五福觀民之被福歟被極歟所以考其治道之成否也此三六九之所以為類也漢儒紊其序而以福極為災祥强六極以配五行故其說支離蔓衍而難信洵闢之當矣又嘗考之天數五地數五天地之數皆五也則人數必五矣三五十五洛書之數自上而下分而為三皆十五也自左而右分而為三亦皆十五也若自其類而言之天事簡而民事煩一四七則十五不足於三三六九則十五有餘者三若二五八則適如十五之數此又以徵二五八之言人身也若夫皇極居中而數正五豈非天與民之事皆本於皇躬歟其天地民物之心歟孔子不云乎民以君為心君以民為體又曰人者天地之心也為人君者讀洪範能不慄慄危懼哉嚳妃論史記載帝嚳元妃曰姜原次妃曰簡狄簡狄行浴見燕墮其卵取吞之因生契為商始祖姜原出野見巨人跡忻然踐之因生稷為周始祖其祖商周信矣其妃之所以生者神竒妖濫不亦甚乎商周有天下七八百年是其享天之祿以能久有社稷而其祖宗何如此之不祥也使聖人而有異於衆庶也吾以為天地必將搆陰陽之和積元氣之英以生之又焉用此二不祥之物哉燕墮卵於前取而吞之簡狄其喪心乎巨人之跡隠然在地走而避之且不暇忻然踐之何姜原之不自愛也又謂行浴出野而遇之是以簡狄姜原為淫泆無法度之甚者帝嚳之妃稷契之母不如是也雖然史遷之意必以詩有天命𤣥鳥降而生商厥初生民時維姜原生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷而言之吁此又遷求詩之過也毛公之傳詩也以􅜈鳥降為祀郊禖之候履帝武為從高辛之行及鄭之箋而後有吞踐之事當毛之時未始有遷史也遷之說出於疑詩而鄭之說又出於信遷矣故天下皆曰聖人非人人不可及也甚矣遷之以不祥誣聖人也夏之衰二龍戲於庭藏其漦至周而發之化為黿以生褒姒以滅周使簡狄而吞卵姜原而踐跡則其生子當如褒姒以妖惑天下奈何其有稷契也或曰然則稷何以棄曰稷之生也無菑無害或者姜原疑而棄之乎鄭莊公寤生驚姜氏姜氏惡之事固有然者也吾非惡夫異也惡夫遷之以不祥誣聖人也棄之而牛羊避遷之而飛鳥覆吾豈惡之哉楚子文之生也虎乳之吾固不惡夫異也日中有烏故烏最難射羿十可中九後世遂訛為十日並出而羿射其九伊尹負鼎以干湯言伊尹在商則夏鼎已遷於商也後世遂訛為伊尹以割烹要湯俗人不經之談往往如是而以其傳於古也遂篤信之亦惑矣吞卵履迹亦同此類洵此論實為有功詩傳明論天下有大知有小知人之智慮有所及有所不及聖人以其大知而兼其小知之功賢人以其所及而濟其所不及愚者不知大知而以其所不及喪其所及故聖人之治天下也以常而賢人之治天下也以時既不能常又不能時悲夫殆哉夫惟大知而後可以常以其所及濟其所不及而後可以時常也者無治而不治者也時也者無亂而不治者也日月經乎中天大可以被四海而小或不能入一室之下彼固無用此區區小明也故天下視日月之光儼然其若君父之威故自有天地而有日月以至於今而未嘗可以一日無焉天下嘗有言曰叛父母䙝神明則雷霆下擊之雷霆固不能為天下盡擊此等輩也而天下之所以兢兢然不敢犯者有時而不測也使雷霆日轟轟焉遶天下以求夫叛父母䙝神明之人而擊之則其人未必能盡而雷霆之威無乃䙝乎故夫知日月雷霆之分者可以用其明矣聖人之明吾不得而知也吾獨愛夫賢者之用其心約而成功博也吾獨怪夫愚者之用其心勞而功不成也是無他也專於其所及而及之則其及必精兼於其所不及而及之則其及必粗及之而精人將曰是惟無及及則精矣不然吾恐姦雄之竊笑也齊威王即位大亂三載威王一奮而諸侯震懼二十年是何脩何營邪夫齊國之賢者非獨一即墨大夫明矣亂齊國者非獨一阿大夫與左右譽阿而毁即墨者幾人亦明矣一即墨大夫易知也一阿大夫易知也左右譽阿而毁即墨者幾人易知也從其易知而精之故用心甚約而成功博也天下之事譬如有物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而况乎不至於九也茅坤曰此是老泉本色學問宋迂齊謂其意脈自戰國䇿來良是辨姦事有必至理有固然惟天下之靜者乃能見微而知著月暈而風礎潤而雨人人知之人事之推移理勢之相因其疎闊而難知變化而不可測者敦與天地陰陽之事而賢者有不知其故何也好惡亂其中而利害奪其外也昔者山巨源見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今而言之其理固有可見者以吾觀之王衍之為人容貌言語固有以欺世而盜名者然不忮不求與物浮沈使晉無惠帝僅得中主雖衍百千何從而亂天下乎盧杞之姦固足以敗國然而不學無文容貌不足以動人言語不足以眩世非徳宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人口誦孔老之言身履夷齊之行收召好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而陰賊險狠與人異趣是王衍盧杞合而為一人也其禍豈可勝言哉夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦慝豎刁易牙開方是也以蓋世之名而濟其未形之患雖有願治之主好賢之相猶將舉而用之則其為天下患必然而無疑者非特二子之比也孫子曰善用兵者無赫赫之功使斯人而不用也則吾言為過而斯人有不遇之歎孰知禍之至於此哉不然天下將被其禍而吾獲知言之名悲夫邵伯溫曰眉山蘇明允先生嘉祐初逰京師時王荆公名始盛黨與傾一時歐陽文忠公亦善之先生文忠客也文忠勸先生見荆公荆公亦願交於先生先生曰吾知其人矣是不近人情者鮮不為天下患作辨姦一篇為荆公發也斯文出論者多以為不然雖其二子亦有嘻其甚矣之嘆后十餘年荆公始得位為姦無一不如先生言者吕獻可中丞於熈寧初荊公拜參知政事日力言其姦每指荆公曰亂天下者必此人也又曰天下本無事但庸人擾之耳司馬温公初亦以為不然至荆公虐民亂政溫公乃深言於上不從不拜樞宻副使以去又貽荆公三書甚苦冀荆公之或從也荆公不從乃絶之温公悵然曰吕獻可之先見余不及也若明允先生其知荆公又在獻可之前十餘年矣豈溫公不見辨姦也耶獨張文定公表先生墓具載之蘇氏族譜亭記匹夫而化鄉人者吾聞其語矣國有君邑有大夫而爭訟者訴於其門鄉有庠里有學而學道者赴於其家鄉人有為不善於室者父兄輙相與恐曰吾夫子無乃聞之嗚呼彼獨何脩而得此哉意者其積之有本末而施之有次第邪今吾族人猶有服者不過百人而嵗時蜡社不能相與盡其歡欣愛洽稍遠者至不相往來是無以示吾鄉黨鄰里也乃作蘇氏族譜立亭於高祖墓塋之西南而刻石焉既而告之曰凡在此者死必赴冠娶妻必告少而孤則老者字之貧而無歸則富者收之而不然者族人之所共誚讓也嵗正月相與拜奠於墓下既奠列坐於亭其老者顧少者而歎曰是不及見吾鄉鄰風俗之美矣自吾少時見有為不義者則衆相與疾之如見怪物焉慄焉而不寧其後少衰也猶相與笑之今也則相與安之耳是起於某人也夫某人者是鄉之望人也而大亂吾俗焉是故其誘人也速其為害也深自斯人之逐其兄之遺孤子而不恤也而骨肉之恩薄自斯人之多取其先人之貲田而欺其諸孤子也而孝弟之行缺自斯人之為其諸孤子之所訟也而禮義之節廢自斯人之以妾加其妻也而嫡庶之别混自斯人之篤於聲色而父子雜處讙譁不嚴也而閨門之政亂自斯人之瀆財無厭惟富者之為賢也而廉恥之路塞此六行者吾往時所謂大慙而不容者也今無知之人皆曰某人何人也猶且為之其輿馬赫奕婢妾靚麗足以蕩惑里巷之小人其官爵貨力足以揺動府縣其矯詐脩飾言語足以欺㒺君子是州里之大盜也吾不敢以告鄉人而私以戒族人焉髣髴於斯人之一節者願無過吾門也予聞之懼而請書焉老人曰書其事而闕其姓名使他人觀之則不知其為誰而夫人之觀之則面熱内慙汗出而食不下也且無彰之庶其有悔乎予曰然乃記之記曰飲食男女人之大欲存焉有飲食男女而人之類不絶亦有飲食男女而人之性日湮以滅故樹之后王君公承以大夫師長上下相承遠近相維凡以章志貞教使民不入於禽獸之路也貴於一鄉則一鄉化焉貴於一國則一國化焉貴於天下則天下化焉導之以聖賢而斯民日趨於聖賢矣導之以禽獸而斯民日趨於禽獸矣奈之何膺天位食天禄而不以聖賢導斯民而以禽獸導斯民也士大夫讀此文當蹙然其不寧也奈之何天位天祿出於其口而不使能以聖賢導斯民者居之而使能以禽獸導斯民者居之也為君上者讀斯文當蹙然其不寧也張益州畫像記至和元年秋蜀人傳言有寇至邊軍夜呼野無居人妖言流聞京師震驚方命擇帥天子曰母養亂毋助變衆言朋興朕志自定外亂不作變且中起不可以文令又不可以武競惟朕一二大吏孰為能處兹文武之間其命往撫朕師乃惟曰張公方平其人天子曰然公以親辭不可遂行冬十一月至蜀至之日歸屯軍撤守備使謂郡縣寇來在吾無爾勞苦明年正月朔旦蜀人相慶如他日遂以無事又明年正月相告留公像於淨衆寺公不能禁眉陽蘇洵言於衆曰未亂易治也既亂易治也有亂之萌無亂之形是謂將亂將亂難治不可以有亂急亦不可以無亂弛是惟元年之秋如器之欹未墜於地惟爾張公安坐於其旁顔色不變徐起而正之既正油然而退無矜容為天子牧小民不倦惟爾張公爾繄以生惟爾父母且公嘗為我言民無常性惟上所待人皆曰蜀人多變於是待之以待盜賊之意而繩之以繩盜賊之法重足屏息之民而以碪斧令於是民始忍以其父母妻子之所仰賴之身而棄之於盜賊故每每大亂夫約之以禮驅之以法惟蜀人為易至於急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身若夫肆意於法律之外以威劫其民吾不忍為也嗚呼愛蜀人之深待蜀人之厚自公而前吾未始見也皆再拜稽首曰然蘇洵又曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲如何皆曰公則何事於斯雖然於我心有不釋焉今夫平居聞一善必問其人之姓名與鄉里之所在以至於其長短大小美惡之狀甚者或詰其平生所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目故其思之於心也固由此觀之像亦不為無助蘇洵無以詰遂為之記公南京人慷慨有節以度量容天下天下有大事公可屬系之以詩曰天子在祚嵗在甲午西人傳言有寇在垣庭有武臣謀夫如雲天子曰嘻命我張公公來自東旗纛舒舒西人聚觀于巷于塗謂公暨暨公來于于公謂西人安爾室家無敢或訛訛言不祥往即爾常春爾條桑秋爾滌場西人稽首公我父兄公在西囿草木駢駢公宴其僚伐鼔淵淵西人來觀祝公萬年有女娟娟閨闥閑閑有童哇哇亦既能言昔公未來期汝棄捐禾麻芃芃倉庾崇崇嗟我婦子樂此嵗豐公在朝廷天子股肱天子曰歸公敢不承作堂嚴嚴有廡有庭公像在中朝服冠纓西人相告無敢逸荒公歸京師公像在堂横目之民其性一也任邊遠封疆大吏者當書此文於座右木假山記木之生或蘖而殤或拱而夭幸而至於任為棟梁則伐不幸而為風之所拔水之所漂或破折或腐幸而得不破折不腐則為人之所材而有斧斤之患其最幸者漂沈汨没於湍沙之間不知其幾百年而其激射齧食之餘或髣髴於山者則為好事者取去強之以為山然後可以脫泥沙而遠斧斤而荒江之濆如此者幾何不為好事者所見而為樵夫野人所薪者何可勝數則其最幸者之中又有不幸者焉予家有三峯予每思之則疑其有數存乎其間且其蘖而不殤拱而不夭任為棟梁而不伐風拔水漂而不破折不腐不破折不腐而不為人所材以及於斧斤出於湍沙之間而不為樵夫野人之所薪而後得至乎此則其理似不偶然也然予之愛之則非徒愛其似山而又有所感焉非徒愛之而又有所敬焉予見中峯魁岸踞肆意氣端重若有以服其旁之二峯二峯者莊栗刻峭凛乎不可犯雖其勢服於中峯而岌然無阿附意吁其可敬也夫其可以有所感也夫大凡物皆偶然是以大不偶然或貴或賤或壽或夭或遇或不遇皆偶然也然而既貴既賤既壽既天既遇既不遇是亦大不偶然也君子曰是偶然者也所性不存焉故處嗇而不以一毫挫於人處豐而不以一毫加於人也亦曰是大不偶然者也盡性之道在是焉故窮則獨善其身風雨如晦雞鳴不已也達則兼善天下一夫不獲時予之辜也御選唐宋文醇巻三十六
