body:
  text: 廬陵歐陽修文二書與高司諫書與尹師魯第一書答陜西安撫使范龍圖辭辟命書與石推官第一書與石推官第二書答宋咸書與刁景純學士書與樂秀才第一書與張秀才第二書欽定四庫全書御選唐宋文醇巻二十三廬陵歐陽修文二與髙司諫書修頓首再拜白司諫足下某年十七時家隨州見天聖二年進士及第牓始識足下姓名是時予年少未與人接又居逺方但聞今宋舍人兄弟與葉道卿鄭天休數人者以文學大有名號稱得人而足下厠其間獨無卓卓可道説者予固疑足下不知何如人也其後更十一年予再至京師足下已為御史裏行然猶未暇一識足下之面但時時於予友尹師魯問足下之賢否而師魯說足下正直有學問君子人也予猶疑之夫正直者不可屈曲有學問者必能辨是非以不可屈之節有能辨是非之明又為言事之官而俯仰黙黙無異衆人是果賢者耶此不得使予之不疑也自足下為諫官來始得相識侃然正色論前世事歴歴可聴褒貶是非無一謬説噫持此辯以示人孰不愛之雖予亦疑足下真君子也是予自聞足下之名及相識凡十有四年而三疑之今者推其實迹而較之然後決知足下非君子也前日范希文貶官後與足下相見於安道家足下詆誚希文為人予始聞之疑是戲言及見師魯亦説足下深非希文所為然後其疑遂决希文平生剛正好學通古今其立朝有本末天下所共知今又以言事觸宰相得罪足下既不能為辨其非辜又畏有識者之責己遂隨而詆之以為當黜是可怪也夫人之性剛果懦軟稟之於天不可勉强雖聖人亦不以不能責人之必能今足下家有老母身惜官位懼飢寒而顧利禄不敢一忤宰相以近刑禍此庸人之常情不過作一不才諫官爾雖朝廷君子亦將閔足下之不能而不責以必能也今乃不然反昻然自得了無愧畏便毁其賢以為當黜庶乎飾己不言之過夫力所不敢為乃愚者之不逮以智文其過此君子之賊也且希文果不賢耶自三四年來從大理寺丞至前行員外郎作待制日日備顧問今班行中無與比者是天子驟用不賢之人夫使天子待不賢以為賢是聰明有所未盡足下身為司諫乃耳目之官當其驟用時何不一為天子辨其不賢反默默無一語待其自敗然後隨而非之若果賢邪則今日天子與宰相以忤意逐賢人足下不得不言是則足下以希文為賢亦不免責以為不賢亦不免責大抵罪在默默爾昔漢殺蕭望之與王章計其當時之議必不肯明言殺賢者也必以石顯王鳳為忠臣望之與章為不賢而被罪也今足下視石顯王鳳果忠耶望之與章果不賢邪當時亦有諫臣必不肯自言畏禍而不諫亦必曰當誅而不足諫也今足下視之果當誅邪是直可欺當時之人而不可欺後世也今足下又欲欺今人而不懼後世之不可欺邪况今之人未可欺也伏以今皇帝即位以來進用諫臣容納言論如曹修古劉越雖歿猶被褒稱今希文與孔道輔皆自諫諍擢用足下幸生此時遇納諫之聖主如此猶不敢一言何也前日又聞御史臺牓朝堂戒百官不得越職言事是可言者惟諫臣爾若足下又遂不言是天下無得言者也足下在其位而不言便當去之無妨他人之堪其任者也昨日安道貶官師魯待罪足下猶能以面目見士大夫出入朝中稱諫官是足下不復知人間有羞恥事爾所可惜者聖朝有事諫官不言而使他人言之書在史册他日為朝廷羞者足下也春秋之法責賢者備今某區區猶望足下之能一言者不忍便絶足下而不以賢者責也若猶以為希文不賢而當逐則予今所言如此乃是朋邪之人爾願足下直攜此書於朝使正予罪而誅之使天下皆釋然知希文之當逐亦諫臣之一效也前日足下在安道家召予往論希文之事時坐有他客不能盡所懷故輒布區區伏惟幸察不宣是嵗修甫三十嵗年少激昻慷慨其事之中節與否雖未知孔顔處此當何如然而凜凜正氣可薄日月也時修筮仕纔五年為京職纔一年餘未熟中朝大官老於事之情態語言大抵如此千古一轍於是少所見多所怪而有是書至今傳高若訥不復知人間羞恥事也人固有幸不幸歟與尹師魯第一書某頓首師魯十二兄書記前在京師相别時約使人如河上既受命便遣白頭奴出城而還言不見舟矣其夕又得師魯手簡乃知留船以待怪不如約方悟此奴嬾去而見紿臨行臺吏催苛百端不比催師魯人長者有禮使人惶迫不知所為是以又不留下書在京師但深託君貺因書道修意以西始謀陸赴夷陵以大暑又無馬乃作此行沿汴絶淮泛大江凡五千里用一百一十程纔至荆南在路無附書處不知君貺曾作書道修意否及來此問荆人云去郢止兩程方喜得作書以奉問又見家兄言有人見師魯過襄州計今在郢久矣師魯歡戚不問可知所渴欲問者别後安否及家人處之如何莫苦相尤否六郎舊疾平否修行雖久然江湖皆昔所遊往往有親舊留連又不遇惡風水老母用術者言果以此行為幸又聞夷陵有米麪魚如京洛又有梨栗橘柚大筍茶荈皆可飲食益相喜賀昨日因參轉運作庭趨始覺身是縣令矣其餘皆如昔時師魯簡中言疑修有自疑之意者非他蓋懼責人太深以取直爾今而思之自決不復疑也然師魯又云闇於朋友此似未知修心當與髙書時蓋以知其非君子發於極憤而切責之非以朋友待之也其所為何足驚駭路中來頗有人以罪出不測見弔者此皆不知修心也師魯又云非忘親此又非也得罪雖死不為忘親此事須相見可盡其説也五六十年來天生此輩沈黙畏慎布在世間相師成風忽見吾輩作此事下至竈門老婢亦相驚怪交口議之不知此事古人日日有也但問所言當否而已又有深相歎賞者此亦是不慣見事人也可嗟世人不見如往時事久矣往時砧斧鼎鑊皆是烹斬人之物然士有死不失義則趨而就之與几席枕藉之無異有義君子在傍見有就死知其當然亦不甚歎賞也史册所以書之者蓋特欲警後世愚懦者使知事有當然而不得避爾非以為奇事而詫人也幸今世用刑至仁慈無此物使有而一人就之不知作何等怪駭也然吾輩亦自當絶口不可及前事也居閒僻處日知進道而已此事不須言然師魯以修有自疑之言要知修處之如何故畧道也安道與予在楚州談禍福事甚詳安道亦以為然俟到夷陵寫去然後得知修所以處之之心也又常與安道言每見前世有名人當論事時感激不避誅死真若知義者及到貶所則慼慼怨嗟有不堪之窮愁形於文字其心歡戚無異庸人雖韓文公不免此累用此戒安道慎勿作慼慼之文師魯察修此語則處之之心又可知矣近世人因言事亦有被貶者然或傲逸狂醉自言我為大不為小故師魯相别自言益慎職無飲酒此事修今亦遵此語咽喉自出京愈矣至今不曾飲酒到縣後勤官以懲洛中時嬾慢矣夷陵有一路祗數日可至郢白頭奴足以往來秋寒矣千萬保重此修遺書責諫官髙若訥若訥以書聞遂落館職責授夷陵令尹洙同時貶逐有書問修而修答之也較韓愈潮州謝表栁宗元與蕭俛等書可謂不覺前賢畏後生矣王聞修曰余讀當時諸公事嘗竊怪之仁宗非昏主申公非奸相以嫉妬廢后非失德事謫而旋復范公不可謂不用既用而汲汲言申公之短不可謂不修怨不可謂不躁進范公再出有論救者有請與同貶者有遺書高若訥責其不救者不可謂不立黨其不至受禍者仁宗之明也特幸爾及讀此書想見歐公心事又云自當絶口不及前事益慎職無飲酒不覺心服若無此則其去假氣節幾何答陜西安撫使范龍圖辭辟命書修頓首再拜啟急步至得七月十九日華州所發書伏審即日尊體動止萬福戎狄侵邊自古常事邊吏無狀至煩大賢伏惟執事忠義之節信於天下天下之士得一識面者退誇於人以為榮耀至於游談布衣之賤往往竊託門下之名矧今以大謀小以順取逆濟以明哲之才有必成功之勢則士之好功名者於此為時孰不願出所長少助萬一得託附以成其名哉况聞狂虜猖獗屢有斥指之詞加之輕侮購募之辱至於執戮將吏殺害邊民凡此數事在於修輩尤為憤恥每一思之中夜三起不幸修無所能徒以少喜文字過為世俗見許此豈足以當大君子之舉哉若夫參決軍謀經畫財利料敵制勝在於幕府茍不乏人則軍書奏記一末事耳有不待修而堪者矣由此始敢以親為辭况今世人所謂四六者非修所好少為進士時不免作之自及第遂棄不復作在西京佐三相幕府於職當作亦不為作此師魯所見今廢已久懼無好辭以辱嘉命此一端也伏見自至關西辟士甚衆古人所與成事者必有國士共之非惟在上者以知人為難士雖貧賤以身許人固亦未易欲其盡死必深相知知之不盡士不為用今奇怪豪儁之士往往䝉見收擇顧用之如何爾然尚慮山林草莽有挺特知義慷慨自重之士未得出於門下也宜少思焉若修者恨無他才以當長者之用非敢效庸人茍且樂安佚也幸察按史修為館閣校勘范仲淹以言事貶在廷多論救司諫高若訥獨以為當黜修貽書責之若訥上其書坐貶夷陵令稍移乾德令武成節度判官范仲淹使陜西辟掌書記修笑而辭曰昔者之舉豈以為利哉同其退不同其進可也此即其辭辟命書修之自潔其身不茍進取如此與石推官第一書修頓首再拜白公操足下前嵗於洛陽得在鄆州時所寄書卒然不能即報遂以及今然其勤心未必若書之怠而獨不知公操察不察也修來京師已一嵗也宋州臨汴水公操之譽日與南方之舟至京師修少與時人相接尤寡而譽者無日不聞若幸使盡識舟上人則公操之美可勝道哉凡人之相親者居則握手共席道歡欣既别則問疾病起居以相為憂者常人之情爾若聞如足下之譽者何必問其他乎聞之欣然亦不減握手之樂也夫不以相見為歡樂不以疾苦為憂問是豈無情者乎得非相期者在於道爾其或有過而不至於道者乃可為憂也近於京師頻得足下所為文讀之甚善其好古閔世之意皆公操自得於古人不待修之贊也然有自許太髙詆時太過其論若未深究其源者此事有本末不可卒然語須相見乃能盡然有一事今詳而説此計公操可朝聞而暮改者試先陳之君貺家有足下手作書一通及有二像記石本始見之駭然不可識徐而視定辨其點畫乃可漸通吁何怪之甚也既而持以問人曰是不能乎書者邪曰非不能也書之法當爾邪曰非也古有之乎曰無今有之乎亦曰無也然則何為而若是曰特欲與世異而已修聞君子之於學是而已不聞為異也好學莫如揚雄亦曰如此然古之人或有稱獨行而髙世者考其行亦不過乎君子但與世之庸人不合爾行非異世蓋人不及而反棄之舉世斥以為異者歟及其過聖人猶欲就之於中庸况今書前不師乎古後不足以為來者法雖天下皆好之猶不可為况天下皆非之乃獨為之何也是果好異以取髙歟然嚮謂公操能使人譽者豈其履中道秉常德而然歟抑亦昻然自異以驚世人而得之歟古之教童子者立必正聽不傾常視之毋誑勤謹乎其始惟恐其見異而惑也今足下端然居乎學舍以教人為師而反率然以自異顧學者何所法哉不幸學者皆從而效之足下又果為獨異乎今不急止則懼他日有責後生之好怪者推其事罪以奉歸此修所以為憂而敢告也惟幸察之不宣按公操即石守道為國子直講為文指切當時無所諱忌杜衍韓琦薦擢太子中允直集賢院會呂夷簡罷相夏竦奪樞宻使章得象晏殊賈昌朝范仲淹富弼及琦同時執政歐陽修余靖王素蔡襄並為諫官介喜曰此盛事也歌頌吾職其可已乎作慶厯聖德詩有曰衆賢之進如茅斯㧞大姦之去如距斯脱其言大姦蓋指竦也竦銜介甚并欲陷富弼令婢學介書偽作介為弼撰廢立詔草會介死竦言介詐死北走契丹請發棺以騐賴杜衍得免斵棺介蓋狂士修借八法一端極盡忠告之誼以消其好異自喜之心可謂良友矣竦令婢子學得介書豈非以介書絶怪異轉易以仿彿其迹耶可為好異之戒矣與石推官第二書前同年徐君行因得寓書論足下書之怪時僕有妹居襄城喪其夫匍匐將往視之故不能盡其所以云者而畧陳焉足下雖不以僕為狂愚而絶之復之以書然果未能喻僕之意非足下之不喻由僕聽之不審而論之之畧之過也僕見足下書久矣不即有云而今乃云者何邪始見之疑乎不能書又疑乎忽而不學夫書一藝爾人或不能與忽不學時不必論是以默默然及來京師見二像石本及聞説者云足下不欲同俗而力為之如前所陳者是誠可諍矣然後一進其説及得足下書自謂不能與前所聞者異然後知所聴之不審也然足下於僕之言亦似未審者足下謂世之善書者能鍾王虞栁不過一藝已之所學乃堯舜周孔之道不必善書又云因僕之言欲勉學之此皆非也夫所謂鍾王虞栁之書者非獨足下薄之僕固亦薄之矣世之有好學其書而恱之者與嗜飲茗閱畫圖無異但其性之一僻耳豈君子之所務乎然至於書則不可無法古之始有文字也務乎記事而因物取類為其象故周禮六藝有六書之學其點畫曲直皆有其説揚子曰斷木為棋梡革為鞠亦皆有法焉而况書乎今雖𨽻字已變於古而變古為𨽻者非聖人不足師法然其㸃畫曲直猶有凖則如毋母彳亻之相近易之則亂而不可讀矣今足下以其直者為斜以其方者為圓而曰我第行堯舜周孔之道此甚不可也譬如設饌於案加帽於首正襟而坐然後食者此世人常爾若其納足於帽反衣而衣坐乎案上以飯實酒巵而食曰我行堯舜周孔之道者以此之於世可乎不可也則書雖末事而當從常法不可以為怪亦猶是矣然足下了不省僕之意凡僕之所陳者非論書之善否但患乎近怪自異以惑後生也若果不能又何必學僕豈區區勸足下以學書者乎足下又云我實有獨異於世者以疾釋老斥文章之雕刻者此又大不可也夫釋老惑者之所為雕刻文章薄者之所為足下安知世無明誠質厚君子之不為乎足下自以為異是待天下無君子之與已同也仲尼曰後生可畏安知來者之不如今也是則仲尼一言不敢遺天下之後生足下一言待天下以無君子此故所謂大不可也夫士之不為釋老與不雕刻文章者譬如為吏而不受貨財蓋道當爾不足恃以為賢也屬久苦小疾無意思不宣朱弁曰今石守道徂徠集中猶見其答書大畧讕詞自解文忠答書誠中其病守道字畫世不復見既嘗被之金石必非率爾而為者即其答書觀之其强項不服義設為高論以文過拒人之態猶可想見稱推官者蓋在南京時計其齒甚少不知後來少悛否然公誌其墓與讀徂徠集二詩盛道其所長亦足以見公與人不求備也答宋咸書修頓首白州人至䝉惠書及補注周易甚善世無孔子久矣六經之㫖失其傳其有不可得而正者自非孔子復出無以得其真也傳者之為學博矣而又苦心勞神於殘篇朽簡之中以求千嵗失傳之謬茫乎前望已逺之聖人而不可見杳乎後顧無窮之來者欲為未悟決難解之惑是真所謂勞而少功者哉然而經非一世之書也其傳之謬非一日之失也其所以刋正補緝亦非一人之能也使學者各極其所見而明者擇焉十取其一百取其十雖未能復六經於無失而卓如日月之明然聚衆人之善以補緝之庶幾不至於大謬可以俟聖人之復生也然則學者之於經其可已乎足下於經勤矣凡其所失無所不欲正之其刋正補緝者衆則其所得亦已多矣修學不敏明而又無彊力以自濟恐終不能少出所見以補六經之萬一得足下所為故尤區區而不能忘也六經如日日或午蔽於雲夜入於地而不得謂天壤間有一刻無日也經雖遭焚被禁解謬語訛而不得謂人心中有一時無經也以意逆志是為得之堯舜與人同耳雖聖逺言湮而果有得於同天地合萬物之人心自然有合於數千載以上不傳之遺㫖是故學士大夫果能身體力行講明而切究之有所述説皆足以俟百世以下之聖人而折衷也若夫黨同妬異僻守一家之言自用師心樂著井蛙之見則雖使六經具在而聖人之微言奥義日誦於口而不能入於其心矣况出區區漢儒之補苴罅漏宋儒之張皇幽渺絶非周公孔子之全文而又奚校焉與刁景純學士書修頓首啟近自罷乾德遂居南陽始見謝舍人知丈丈内翰凶訃聞問驚怛不能已已丈丈位望並隆然平生亦嘗坎軻數年以來方履亨塗任要劇其去大用尺寸間耳豈富與貴不可力為而天之賦予多少有限邪凡天之賦予人者又量何事而為之節也前既不可詰但痛惜感悼而已某自束髪為學初未有一人知者及首登門便被憐奬開端誘道勤勤不已至其粗若有成而後止雖其後游於諸公而獲齒多士雖有知者皆莫之先也然亦自念不欲効世俗子一遭人之顧已不以至公相期反趨走門下脅肩諂笑甚者獻讒諛而備使令以卑昵自親名曰報德非惟自私直亦待所知以不厚是故懼此惟欲少勵名節庶不冺然無聞用以不負所知爾某之愚誠所守如此然雖胥公亦未必諒某此心也自前嵗得罪夷陵奔走萬里身日益窮迹日益疎不及再聞語言之音而遂為幽明之隔嗟夫世俗之態既不欲為愚誠所守又未克果惟有望門長號臨柩一奠亦又不及此之為恨何可道也徒能惜不永年與未大用遂與道路之人同歎耳知歸葬廣陵遂謀京居議者多云不便而聞理命若斯必有以也若須春水下汴某嵗盡春初當過京師尚可一拜見以盡區區身賤力微於此之時當有可致而無毫髪之助慚愧慚愧不宣修年二十二謁學士胥偃於漢陽偃大竒之留置門下許以女妻之攜以如京師閱二年而登甲科其明年乃親迎逾二年而胥氏卒景祐三年修年三十落職為峽州夷陵縣令明年移乾德縣令逾一年為寳元二年復舊官權成德軍節度判官㕔公事乃自乾德奉母待次於南陽而聞胥偃之卒作此書與所知刁景純也與樂秀才第一書某白秀才樂君足下昨者舟行往來皆辱見過又䝉以所業一册先之啓事宛然如後進之見先達之儀某年始三十矣其不從鄉進士之後者於今纔七年而官僅得一縣令又為有罪之人其德爵齒三者皆不足以稱足下之所待此其所以為慙自冬涉春隂洩不止夷陵水土之氣比頻作疾又苦多事是以闕然聞古人之於學也講之深而信之篤其充於中者足而後發乎外者大以光譬夫金玉之有英華非由磨飾染濯之所為而由其質性堅實而光輝之發自然也易之大畜曰剛健篤實輝光日新謂夫畜於其内者實而後發為光輝者日益新而不竭也故其文曰君子多識前言往行以畜其德此之謂也古人之學者非一家其為道雖同言語文章未嘗相似孔子之繫易周公之作書奚斯之作頌其辭皆不同而各自以為經子游子夏子張與顔囘同一師其為人皆不同各由其性而就於道耳今之學者或不然不務深講而篤信之徒巧其詞以為華張其言以為大夫强為則用力艱用力艱則有限有限則易竭又其為辭不規模於前人則必屈曲變態以隨時俗之所好鮮克自立此其充於中者不足而莫自知其所守也竊讀足下之所為髙健志甚壯而力有餘譬夫良駿之馬有其質矣使駕大輅而王良馭之節以和鑾而行大道不難也夫欲充其中由講之深至其深然後知自守能如是矣言出其口而皆文修見惡於時棄身此邑不敢自齒於人人所共棄而足下過禮之以賢明方正見待雖不敢當是以盡所懷為報以塞其慙某頓首天在山中大畜孔穎達正義謂實無此象假設此義然孔子曰象也者像也空言無實之名何象之有夫仰而觀天蒼蒼焉而已矣御飛龍而至蒼蒼之所其上之蒼蒼仍若是也則蒼蒼者不可以語天之實也惟風雨雲雷之屬為天所降者從以究其所降之方則曰天在焉可也而山之為物能出雲為風雨則天之在山中必矣豈曰實無此象哉莫大於天而山能畜之上下千萬年縱横數萬里而心能識之昔人有問芥子納須彌之義或答以心如椰子大能讀萬巻書者是即天在山中之象也文王曰不家食吉蓋君子之於仕也行其義也欲行義必先集義萬事萬物莫不有義誠備集之而後能行義能行義則可與治天下國家矣故不家食吉使於此未大畜焉而食君之祿是詩人所刺碩鼠之食苗也行固如是言胡不然行以治一時言以教萬世一也孔子曰君子以多識前言往行以畜其德畜其德則或出或處或默或語無所不可於此未大畜焉而彊為文辭是曲禮所謂鸚鵡能言不離飛鳥也與張秀才第二書前日去後復取前所貺古今雜文十數篇反覆讀之若大節賦樂古太古曲等篇言尤髙而志極大尋足下之意豈非閔世病俗究古明道欲援今以復之古而翦剔齊整凡今之分殽駮冗者歟然後益知足下之好學甚有志者也然而述三皇太古之道捨近取逺務髙言而鮮事實此少過也君子之於學也務為道為道必求知古知古明道而後履之以身施之於事而又見於文章而發之以信後世其道周公孔子孟軻之徒常履而行之者是也其文章則六經所載至今而取信者是也其道易知而可法其言易明而可行及誕者言之乃以混䝉虚無為道洪荒廣畧為古其道難法其言難行孔子之言道曰道不逺人言中庸者曰率性之謂道又曰可離非道也春秋之為書也以成隱讓而不正之傳者曰春秋信道不信邪謂隱未能蹈道齊侯遷衛書城楚丘與其仁不與其專封傳者曰仁不勝道凡此所謂道者乃聖人之道也此履之於身施之於事而可得者也豈如誕者之言者邪堯舜禹之書皆曰若稽古傅説曰事不師古匪説攸聞仲尼曰吾好古敏以求之者凡此所謂古者其事乃君臣上下禮樂刑法之事又豈如誕者之言者邪此君子之所學也夫所謂捨近而取逺云者孔子昔生周之世去堯舜逺孰與今去堯舜逺也孔子刪書斷自堯典而弗道其前其所謂學則曰祖述堯舜如孔子之聖且勤而弗道其前者豈不能邪蓋以其漸逺而難彰不可以信後世也今生於孔子之絶後而反欲求堯舜之已前世所謂務髙言而鮮事實者也唐虞之道為百王首仲尼之歎曰蕩蕩乎謂髙深閎大而不可名也及夫二典述之炳然使後世尊崇仰望不可及其嚴若天然則書之言豈不高邪然其事不過於親九族平百姓憂水患問臣下誰可任以女妻舜及祀山川見諸侯齊律度謹權衡使臣下誅放四罪而已孔子之後惟孟軻最知道然其言不過於教人樹桑麻畜雞豚以為養生送死為王道之本夫二典之文豈不為文孟軻之言道豈不為道而其事乃世人之甚易知而近者蓋切於事實而已今學者不深本之乃樂誕者之言思混沌於古初以無形為至道者無有高下逺近使賢者能之愚者可勉而至無過不及而一本乎大中故能亘萬世可行而不變也今以為不足為而務高逺之為勝以廣誕者無用之説是非學者之所盡心也宜少下其高而近其逺以及乎中則庶乎至矣凡僕之所論者皆陳言淺語如足下之多聞博學不宜為足下道之也然某之所以云者本欲損足下高逺而俯就之則安敢務為奇言以自高邪幸足下少思焉唐虞三代間事不見於六經四子之論説者具不可信信之則其心如鏡之有滓焉以之照萬事當滓之處必不能以明孟子所謂生於其心害於其政發於其政害於其事修此書不特為文字者所宜熟讀深思也與帝王世次圖序參觀益明御選唐宋文醇巻二十三
