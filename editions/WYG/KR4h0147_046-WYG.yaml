body:
  text: 眉山蘇軾文九上書再上皇帝書擬進士對御試策代張方平諫用兵書代勝甫論西夏書欽定四庫全書御選唐宋文醇卷四十六眉山蘇軾文九再上皇帝書熈寧四年三月某日殿中丞直史館判官告院權開封府推官臣蘇軾謹昧萬死再拜上書皇帝陛下臣聞之益戒于禹曰任賢勿貳去邪勿疑仲虺言湯之徳曰用人惟已改過不吝秦穆喪師于崤悔痛自誓孔子録之自古聰明豪傑之主如漢髙帝唐太宗皆以受諫如流改過不憚號為秦漢以來百王之冠也孔子曰君子之過如日月食焉過也人皆見之更也人皆仰之聖賢舉動明白正直不當如是耶所用之人有邪有正所作之事有是有非是非邪正兩言而足正則用之邪則去之是則行之非則破之此理甚明猶飢之必食渴之必飲豈有别生義理曲加粉飾而能欺天下哉書曰與治同道罔不興與亂同事罔不亡陛下自去嵗以來所行新政皆不與治同道立條例司遣青苗使斂助役錢行均輸法四海騷動行路怨咨自宰相以下皆知其非而不敢爭臣愚惷不識忌諱迺者上疏論之詳矣而學術淺陋不足以感動聖明近者故相舊臣藩鎮侍從雜然爭言不便以至臺諫二三人本其所與締交唱和表裏之人也然猶不免一言其非者豈非物議沸騰事勢迫切而不可止歟自非見利忘義居之不疑者孰肯終始膠固不自湔洗如吳師孟乞免提舉胡宗愈不願檢詳如逃垢穢惟恐不脱人情畏惡一至於此近者中外讙言陛下已有悔悟意道路相慶如䝉大賚實望陛下於旬日之間渙發徳音洗蕩乖僻追還使者而罷條例司今者側聽所為葢不過使監司體量抑配而已比之未悟所較幾何此孟子所謂知兄臂之不可紾而姑勸以徐知鄰雞之不可攘而月取其一帝王改過豈如是哉臣又聞陛下以為此法且可試之三路臣以為此法譬之醫者之用毒藥以人之死生試其未效之方三路之民豈非陛下赤子而可試以毒乎今日之政小用則小敗大用則大敗若力行而不已則亂亡隨之臣非敢過為危論以聳動陛下也自古存亡之所寄者四人而已一曰民二曰軍三曰吏四曰士此四人者一失其心足以生變今陛下一舉而兼犯之青苗助役之法成則農不安均輸之令出則商賈不行而民始憂矣併省諸軍迫逐老病至使戍兵之妻與士卒雜處其間貶殺軍分有同降配遷徙淮甸僅若流放年近五十人人懐憂而軍始怨矣内則不取謀於元臣侍從而專用新進小生外則不責成於守令監司而專用青苗使者多置閒局以擯老成而吏始解體矣陛下臨軒選士天下謂之龍飛牓而進士一人首削舊恩示不復用所削者一人而已然士莫不悵恨者以陛下有厭薄其徒之意也今用事者又欲漸消進士純取明經雖未有成法而小人招權自以為功更相扇搖以為必行而士始失望矣今進士半天下自二十以上便不能誦記注義為明經之學若法令一行則士各懐廢棄之憂而人材短長終不在此昔秦禁挾書而諸生皆抱其業以歸勝廣相與出力而亡秦者豈有他哉亦以失業而亡所歸也故臣願陛下勿復言此民憂而軍怨吏解體而士失望禍亂之源有大於此者乎今未見也一旦有急則致命之士必寡矣方是之時不知希合茍容之徒能為陛下收板蕩止土崩乎去嵗諸軍之始併也左右之人皆以士心樂併告陛下近者放停軍人李興告虎翼吏率錢行賂以求不併則士卒不樂可知矣夫諂諛之人茍務合意不憚欺罔者類皆如此故凡言百姓樂請青苗錢樂出助役錢者皆不可信陛下以為青苗抑配果可禁乎不惟不可禁迺不當禁也何以言之若此錢放而不收則州縣官吏不免責罰若此錢果不抑配則願請之户後必難收前有抑配之禁後有失陷之罰為陛下官吏不亦難乎故臣以為既行青苗錢則不當禁抑配其勢然也人皆謂陛下聖明神武必能徙義修慝以致太平而近日之事乃有文過遂非之風此臣所以憤懣太息而不能已也昔賈充用事天下憂恐而庾純任愷戮力排之及充出鎮秦涼忠臣義士莫不相慶屈指數日以望維新之化而馮統之徒更相告語曰賈公逺放吾等失勢矣於是相與獻謀而充復留則晉氏之亂成於此矣自古惟小人為難去何則去一人而其黨破壊是以為之計謀遊説者衆也今天下賢者亦將以此觀陛下為進退之決或再失望則知幾之士相率而逝矣豈皆如臣等輩偷安懐禄而不忍去哉猖狂不遜忤陛下多矣不敢復望寛恩俯伏引領以待誅殛臣軾誠惶誠恐頓首頓首謹言孟獻子曰與其有聚斂之臣寧有盜臣葢盜臣所損者府庫如疴癢之在皮膚聚斂之臣實傷國命則膏肓之疾也王安石以堅愎敢為之性有博聞强記周給敏捷之才用其前無千古後無萬年之意行忍鷙躁擾違天拂人之事收召巧言令色便辟側媚之徒相與蚤作夜思力行不倦以成有宋一代聚斂之臣宋神宗一見竒之遂同魚水君臣戮力勵精圖治而卒至於大亂自古亂亡之國大都般樂怠敖意不在國與民而致土崩瓦解未有自朝至於日中昃不遑暇食蘄躋世於三代之隆不得小治乃得大亂且基禍以亡如神宗安石之竒者也大學曰國不以利為利以義為利不綦要歟於此不明則源之不清流千里而皆濁神宗天姿英鋭過人而未嘗學問人有言富國在節儉不在掊克者則曰豈有天子著得破皮鞵便能富國之理不知兩漢盛時百姓殷阜至於適千里不持糧豈非弋綈大練之所致歟夫六宫弋綈大練其所留餘幾何然百姓不從上之令而從其意四海之内競以儉相髙以奢相誚則弋綈大練之所留餘被四海矣使神宗果著得破皮鞵豈能不富國奚若天子收農夫之債息宰相奪販䜿之竒贏至今為笑哉新法既行司馬光力爭不得辭樞宻副使不拜乞外乃出知永興軍到官上章曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇決不如范鎮誨於安石始參政事之時已言安石為奸邪謂其必敗亂天下臣以為安石止於不曉事與狠愎爾不至如誨所言今觀安石汲引親黨盤據要津擠排異己占固權寵嘗自以已意隂贊陛下内出手詔以決外庭之事使天下之威福在己而謗議悉歸於陛下臣乃自知先見不如誨逺矣純仁與顥皆安石素厚安石拔於庶僚之中超處清要純仁顥覩安石所為不敢顧私恩廢公議極言其短臣與安石南北異鄉取舍異道臣接安石素疏安石待臣素薄徒以屢嘗同僚之故私心眷眷不忍輕絶而顯言之因循以至今日是臣不負安石而負陛下甚多此其不如純仁顥逺矣臣承乏兩制逮事三朝於國家義則君臣恩猶骨月覩安石專逞其狂愚使天下生民被荼毒之苦宗廟社稷有纍卵之危臣畏懦惜身不蚤為陛下别白言之軾與文仲皆疎逺小臣乃敢不避陛下雷霆之威安石虎狼之怒上書對策指陳其失隳官獲譴無所顧慮此臣不如軾與文仲逺矣人情誰不貪富貴戀俸禄鎮覩安石熒惑陛下以佞為忠以忠為佞以是為非以非為是不勝憤懣抗章極言自乞致仕甘受醜詆杜門家居臣顧惜禄位為妻子計包羞忍恥尚居方鎮此臣不如鎮逺矣臣聞居其位者必憂其事食其禄者必任其患茍或不然是為竊盜臣雖無似不忍身為竊盜今陛下唯安石是信安石以為賢則賢愚則愚是則是非則非諂附安石者謂之忠良詰難安石者謂之讒慝臣之才識固安石之所愚臣之議論固安石之所非今日所言陛下之所謂讒慝也伏望聖恩裁處其罪若罪同范鎮則乞依例致仕若罪浮於鎮或竄或誅所不敢逃光極諫如此而神宗卒不悟信用安石愈深以致海内蕭然生靈塗炭光所言軾上書指陳其失者即此二書也其後安石捃摭軾罪不得乃以詩句為謗訕繫御史臺獄幾死矣擬進士對御試策右臣准宣命差赴集英殿編排舉人試巻竊見陛下始革舊制以策試多士厭聞詩賦無益之語將求山林朴直之論聖聽廣大中外歡喜而所試舉人不能推原上意皆以得失為慮不敢指陳闕政而阿諛順㫖者又卒據上第陛下之所以求於人至深切矣而下之報上者如此臣竊深悲之夫科場之文風俗所繫所收者天下莫不以為法所棄者天下莫不以為戒昔祖宗之朝崇尚辭律則詩賦之工曲盡其巧自嘉祐以來以古文為貴則策論盛行於世而詩賦幾至於熄何者利之所在人無不化今始以策取士而士之在甲科者多以諂諛得之天下觀望誰敢不然臣恐自今以往相師成風雖直言之科亦無敢以直言進者風俗一變不可復返正人衰微則國隨之非復詩賦策論迭興迭廢之比也是以不勝憤懣退而擬進士對御試策一道學術淺陋不能盡知當世之切務直載所聞上將以推廣聖言庶有補於萬一下將以開示四方使知陛下本不諱惡切直之言風俗雖壊猶可以少救其所撰策謹繕寫投進干冒天威臣無任戰恐待罪之至問朕徳不類託於士民之上所與待天下之治者惟萬方黎獻之求詳延於廷諏以世務豈特考子大夫之所學且以博朕之所聞葢聖王之御天下也百官得其職萬事得其序有所不為為之而無不成有所不革革之而無不服田疇闢溝洫治草木暢茂鳥獸魚鼈無不得其性其富足以備禮其和足以廣樂其治足以致刑子大夫以為何施而可以臻此方今之弊可謂衆矣救之之術必有本末所施之宜必有先後子大夫之所宜知也生民以來所謂至治必曰唐虞成周之時詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以營一代之業雖未盡善要其所以成就亦必有可言者其詳著之朕將親覽焉對臣伏見陛下發徳音下明詔以天下安危之至計謀及於布衣之士其求之不可謂不切其好之不可謂不篤矣然臣私有所憂者不知陛下有以受之歟禮曰甘受和白受采故臣願陛下先治其心使虚一而靜然後忠言至計可得而入也今臣竊恐陛下先入之言已實其中邪正之黨已貳其聽功利之説已動其欲則雖有臯陶益稷之謀亦無自入矣而况於疎逺愚陋者乎此臣之所以大懼也若乃盡言以招過觸諱以忘軀則非臣之所恤也聖策曰聖王之御天下也百官得其職萬事得其序臣以為陛下未知此也是以顛倒失序如此茍誠知之曷不尊其所聞而行其所知歟百官之所以得其職者豈聖王人人而督責之萬事之所以得其序者豈聖王事事而整齊之哉亦因能以任職因職以任事而已官有常守謂之職施有先後謂之序今陛下使兩府大臣侵三司財利之權常平使者亂職司守令之治刑獄舊法不以付有司而取決於執政之意邊鄙大慮不以責帥臣而聽計於小吏之口百官可謂失其職矣王者之所宜先者徳也所宜後者刑也所宜先者義也所宜後者利也而陛下易之萬事可謂失其序矣然此猶其小者其大者則中書失其政也宰相之職古者所以論道經邦今陛下但使奉行條例司文書而已昔邴吉為丞相蕭望之為御史大夫望之言隂陽不和咎在臣等而宣帝以為意輕丞相終身薄之今政事堂忿爭相詬流傳都邑以為口實使天下何觀焉故臣願陛下首還中書之政則百官之職萬事之序以次而得矣聖策曰有所不為為之而無不成有所不革革之而無不服陛下之及此言是天下之福也今日之患正在於未成而為之未服而革之耳夫成事在理不在勢服人以誠不以言理之所在以為則成以禁則止以賞則勸以言則信古之人所以鼓舞天下綏之斯來動之斯和者葢循理而已今為政不務循理而欲以人主之勢賞罰之威刼而成之夫以斧析薪可謂必克矣然不循其理則斧可缺薪不可破是以不論尊卑不計强弱理之所在則成理所不在則不成可必也今陛下使農民舉息與商賈爭利豈理也哉而何怪其不成乎禮曰微之顯誠之不可揜也如是夫陛下茍誠心乎為民則雖或謗之而人不信茍誠心乎為利則雖自解釋而人不服且事有決不可欺者吏受賄枉法人必謂之贓非其有而取之人必謂之盜茍有其實不敢辭其名今青苗有二分之息而不謂之放債取利可乎凡人為善不自譽而人譽之為惡不自毁而人毁之如使為善者必須自言而後信則堯舜周孔亦勞矣今天下以為利陛下以為義天下以為害陛下以為仁天下以為貪陛下以為廉不勝其紛紜也則使二三臣者極其巧辯以解答千萬人之口附㑹經典造為文書以曉告四方之人四方之人豈如嬰兒鳥獸而可以美言小數眩之哉且夫未成而為之則其弊必至於不敢為未服而革之則其弊必至於不敢革葢世有好走馬者一為墜傷則終身徒行何者慎重則必成輕發則多敗此理之必然也陛下若出於慎重則屢作屢成不惟人信之陛下亦自信而日以勇矣若出於輕發則每舉每敗不惟人不信陛下亦自不信而日以怯矣文宗始用訓注其志豈淺也哉而一經大變則憂沮喪氣不能復振文宗亦非有失徳徒以好作而寡謀也慎重者始若怯終必勇輕發者始若勇終必怯迺者横山之人未嘗一日而忘漢雖五尺之童子知其可取然自慶厯以來莫之敢發者誠未有以善其後也近者邊臣不計其後而遽發之一發不中則内帑之費以數百萬計而關輔之民困於飛輓者三年而未已雖天下之勇者敢復為之歟為之固不可敢復言之歟由此觀之則横山之功是欲速而壊之也近者青苗之政助役之法均輸之策併軍蒐卒之令卒然輕發又甚於前日矣雖陛下不䘏人言持之益堅而勢窮事礙終亦必變他日雖有良法美政陛下能復自信乎人君之患在於樂因循而重改作今陛下春秋鼎盛天錫勇智此萬世一時也而羣臣不能濟之以慎重養之以敦朴譬如乘輕車馭駿馬冒險夜行而僕夫又從後鞭之豈不殆哉臣願陛下解轡秣馬以須東方之明而徐行於九軌之道甚未晚也聖策曰田疇闢溝洫治草木暢茂鳥獸魚鼈莫不各得其性者此百工有司之事也曽何足以累陛下陛下操其要治其本恭已無為而物莫不盡其理以生以死若夫百工有司之事自宰相不屑為之而況於陛下乎聖策曰其富足以備禮其和足以廣樂其治足以致刑何施而可以臻此孔子曰百姓足君孰與不足兔首瓠葉可以行禮掃地而祭可以事天禮之不備非貧之罪也管子曰倉廩實而知禮節臣不知陛下所謂富者富民歟抑富國歟陸賈曰將相和調則士豫附劉向曰衆賢和於朝則萬物和於野今朝廷可謂不和矣其咎安在陛下不返求其本而欲以力勝之力之不能勝衆也久矣古者刀鋸在前鼎鑊在後而士猶犯之今陛下躬蹈堯舜未嘗誅一無罪欲弭衆言不過斥逐異議之臣而更用人必不忍行亡秦偶語之禁起東漢黨錮之獄多士何畏而不言哉臣恐逐者不已而爭者益多煩言交攻愈甚於今日矣欲望致和而廣樂豈不疎哉古之求治者將以措刑也今陛下求治則欲致刑此又羣臣誤陛下也臣知其説矣是出於荀卿荀卿喜為異論至以人性為惡則其言治世刑重亦宜矣而説者又以為書稱唐虞之隆刑故無小而周之盛時羣飲者殺臣請有以詰之夏禹之時大辟二百周公之時大辟五百豈可謂周治而禹亂耶秦為法及三族漢除肉刑豈可謂秦治而漢亂耶致之言極也天下幸而未治使一日治安陛下將變今之刑而用其極歟天下幾何其不叛也徒聞其語而懼者已衆矣臣不意異端邪説惑誤陛下至於如此且夫宥過無大刑故無小此用刑之常理也至於今守之豈獨唐虞之隆而周之盛時哉所以誅羣飲者意其非獨羣飲而已如今之法所謂夜聚曉散者使後世不知其詳而徒聞其語則凡夜相過者皆執而殺之可乎夫人相與飲酒而輒殺之雖桀紂之暴不至於此而謂周公行之歟聖策曰方今之弊可謂衆矣捄之之術必有本末所施之宜必有先後臣請論其本與其所宜先者而陛下擇焉方今捄弊之道必先立事立事之本在於知人則所施之宜當先觀大臣之知人與否耳古之欲立非常之功者必有知人之明茍無知人之明則循規矩蹈繩墨以求寡過二者皆審於自知而安於才分者也道可以講習而知徳可以勉强而能惟知人之明不可學必出於天資如蕭何之識韓信此豈有法而可傳者哉以諸葛孔明之賢而知人之明則其所短是以失之於馬謖而孔明亦審於自知是以終身不敢用魏延我仁祖之在位也事無大小一付之於法人無賢不肖一付之於公議事已效而後行人已試而後用終不求非常之功者誠以當時大臣不足以與於知人之明也古之為醫者聆音察色洞視五臟則其治疾也有剖胸決脾洗濯胃腎之變茍無其術不敢行其事今無知人之明而欲立非常之功解縱繩墨以慕古人則是未能察脉而欲試華陀之方其異於操刀而殺人者幾希矣房琯之稱劉秩關播之用李元平是也至今以為笑矣陛下觀今之大臣為知人歟為不知人歟乃者擢用衆才皆其造室握手之人要結審固而後敢用葢以為其人可與戮力同心共致太平曽未安席而交口攻之者如蝟毛而起陛下以此驗之其不知人也亦審矣幸今天下無事異同之論不過凟亂聖聽而已若邊隅有警盜賊竊發俯仰成敗呼吸變動而所用之人皆如今日乍合乍散臨事解體不可復知則無乃誤社稷歟華陀不世出天下未嘗廢醫蕭何不世出天下未嘗廢治陛下必欲立非常之功請待知人之佐若猶未也則亦詔左右之臣安分守法而已聖策曰生民以來稱至治者必曰唐虞成周之世詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以營一代之業雖未盡善然要其所成就亦必有可言者其詳著之臣以為此不可勝言也其施設之方各隨其時而不可知其所可知者必畏天必從衆必法祖宗故其言曰戒之戒之天惟顯思命不易哉又曰稽於衆舍已從人又曰丕顯哉文王謨丕承哉武王烈詩書所稱大略如此未嘗言天命不足畏衆言不足從祖宗之法不足用也苻堅用王猛而樊世仇滕席寶不悦魏鄭公勸太宗以仁義而封倫不信凡今之人欲陛下違衆而自用者必以此藉口而陛下所謂賢明忠智者豈非意在於此等歟臣願考二人之所行而求之於今王猛豈嘗設官而牟利魏鄭公豈嘗貸錢而取息歟且其不悦者不過數人固不害天下之信且服也今天下有心者怨有口者謗古之君臣相與憂勤以營一代之業者似不如此古語曰百人之聚未有不公而況天下乎今天下非之而陛下不回臣不知所税駕矣詩曰譬彼舟流不知所屆心之憂矣不遑假寐區區之忠惟陛下察之臣謹昧死上對軾兩上書言新法不便不見省復擬進士對策上之以冀神宗之一悟考其時軾官權開封府推官耳疎逺下僚非若兩制大臣與國同休戚而勤拳懇欵無異陸贄為内相時非其忠孝天性鬱於中而發作於外視民之疾苦若已身之痌瘝者而能然哉至若必敬天必從衆必法祖宗三言豈特為宋神宗之良藥實萬古帝王之法語矣代張方平諫用兵書臣聞好兵猶好色也傷生之事非一而好色者必死賊民之事非一而好兵者必亡此理之必然者也夫惟聖人之兵皆出於不得已故其勝也享安全之福其不勝也必無意外之患後世用兵皆得已而不己故其勝也則變遲而禍大其不勝也則變速而禍小是以聖人不計勝負之功而深戒用兵之禍何者興師十萬日費千金内外騷動殆於道路者七十萬家内則府庫空虚外則百姓窮匱飢寒逼迫其後必有盜賦之憂死傷愁怨其終必致水旱之報上則將相擁衆有跋扈之心下則士衆久役有潰叛之志變故百出皆由用兵至於興事首議之人㝠謫尤重葢以平民無故縁兵而死怨氣充積必有任其咎者是以聖人畏之重之非不得已不敢用也自古人主好動干戈由敗而亡者不可勝數臣今不敢復言請為陛下言其勝者秦始皇既平六國復事吳越戍役之患被於四海雖拓地千里逺過三代而墳土未乾天下怨叛二世被害子嬰被擒滅亡之酷自古所未嘗有也漢武帝承文景富溢之餘首挑匈奴兵連不解遂使侵尋及於諸國嵗嵗調發所向成功建元之間兵禍始作是時蚩尤旗出長與天等其春戾太子生自是師行三十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗班固以為太子生長於兵與之終始帝雖悔悟自克而歿身之恨已無及矣隋文帝既下江南繼事夷狄煬帝嗣位此心不衰皆能誅滅强國威震萬里然而民怨盜起亡不旋踵唐太宗神武無敵尤善用兵既已破滅突厥髙昌吐谷渾等猶且未厭親駕遼東皆志在立功非不得已而用其後武氏之難唐室凌遲不絶如綫葢用兵之禍物理難逃不然太宗仁聖寛厚克已裕人幾至刑措而一傳之後子孫塗炭此豈為善之報也哉由此觀之漢唐用兵於寛仁之後故其勝而僅存秦隋用兵於殘暴之餘故其勝而遂滅臣每讀書至此未嘗不掩巻流涕傷其計之過也若使此四君者方其用兵之初隨即敗衂惕然戒懼知用兵之難則禍敗之興當不至此不幸每舉輒勝故使狃於功利慮患不深臣故曰勝則變遲而禍大不勝則變速而禍小不可不察也昔仁宗皇帝覆育天下無意於兵將士惰媮兵革朽鈍元昊乘間竊發西鄙延安涇原麟府之間敗者三四所喪動以萬計而海内晏然兵休事已而民無怨言國無遺患何者天下臣庶知其無好兵之心天地鬼神諒其有不得已之實故也今陛下天錫勇智意在富强即位以來繕甲治兵伺候鄰國羣臣百寮窺見此指多言用兵其始也弼臣執國命者無憂深思逺之心樞臣當國論者無慮害持難之識在臺諫之職者無獻替納忠之議從微至著遂成厲階既而薛向為横山之謀韓絳效深入之計陳升之吕公弼等隂與之協力師徒喪敗財用耗屈較之寳元慶厯之敗不及十一然而天怒人怨邊兵背叛京師騷然陛下為之旰食者累月何者用兵之端陛下作之是以吏士無怨敵之意而不直陛下也尚賴祖宗積累之厚皇天保佑之深故使兵出無功感悟聖意然淺見之士方且以敗為恥力欲求勝以稱上心於是王韶搆禍於熈河章惇造釁於横山熊本發難於渝瀘然此等皆戕賊已降俘纍老弱困弊腹心而取空虛無用之地以為武功使陛下受此虚名而忽於實禍勉强砥礪奮於功名故沈起劉彞復發於安南使十餘萬人暴露瘴毒死者十而五六道路之人斃於輸送貲糧器械不見敵而盡以為用兵之意必且少衰而李憲之師復出於洮州矣今師徒克捷鋭氣方盛陛下喜於一勝必有輕視四夷凌侮敵國之意天意難測臣實畏之且夫戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀耳至於逺方之民肝腦塗於白刃筋骨絶於餽餉流離破產鬻賣男女薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鼈以為饍饈食者甚美見食者甚苦使陛下見其號呼於梃刃之下宛轉於刀几之間雖八珍之美必將投箸而不忍食而况用人之命以為耳目之觀乎且使陛下將卒精强府庫充實如秦漢隋唐之君既勝之後禍亂方興尚不可救而况所任將吏罷軟凡庸較之古人萬萬不逮而數年以來公私窘乏内府累世之積掃地無餘州郡征税之儲上供殆盡百官廩俸僅而能繼南郊賞給久而未辦以此舉動雖有智者無以善其後矣且饑役之後所在盜賊蠭起京東河北尤不可言若軍事一興横斂隨作民窮而無告其勢不為大盜無以自全邊事方深内患復起則勝廣之形將在於此此老臣所以終夜不寐臨食而歎至於慟哭而不能自止也且臣聞之凡舉大事必順天心天之所向以之舉事必成天之所背以之舉事必敗葢天心向背之迹見於災祥豐歉之間今自近嵗日蝕星變地震山崩水旱癘疫連年不解民死將半天心之向背可以見矣而陛下方且斷然不顧興事不已譬如人子得過於父母惟有恭順靜思引咎自責庶幾可解今乃紛然詰責奴婢恣行箠楚以此事親未有見赦於父母者故臣願陛下逺覽前世興亡之迹深察天心向背之理絶意兵革之事保疆睦鄰安靜無為固社稷長久之計上以安二宫朝夕之養下以濟四方億兆之命則臣雖老死溝壑瞑目於地下矣昔漢祖破滅羣雄遂有天下光武百戰百勝祀漢配天然至白登被圍則講和親之議西域請吏則出謝絶之言此二帝者非不知兵也葢經變既多則慮患深逺今陛下深居九重而輕議討伐老臣庸懦私竊以為過矣然人臣納説於君因其既厭而止之則易為力迎其方鋭而折之則難為功凡有血氣之倫皆有好勝之意方其氣之盛也雖布衣賤士有不可奪自非智識特達度量過人未有能勇於奮發之中舍己從人惟義是聽者也今陛下盛氣於用武勢不可回臣非不知而獻言不已者誠見陛下聖徳寛大聽納不疑故不敢以衆人好勝之常心望於陛下且意陛下他日親見用兵之害必將哀痛悔恨而追咎左右大臣未嘗一言臣亦將老且死見先帝於地下亦有以藉口矣惟陛下哀而察之有宋三百年第一篇文字其云戰勝之後陛下可得而知者凱旋奏捷拜表稱賀赫然耳目之觀耳至於逺方之民肝腦塗於白刃筋骨絶於饋餉流離破產鬻賣男女薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鼈以為膳羞食者甚美見食者甚苦使陛下見其號呼於梃刃之下宛轉於刀几之間雖八珍之美必將投箸而不忍食而況用人之命以為耳目之觀乎此百餘言直可上配六經特再録之於文後以為警心怵目之觀黄震曰歴序神廟朝用兵次第其言哀痛切至真可為萬世人主好用兵人臣好生事者之戒楊慎曰古之諫用兵只説不勝之害務以避害而趨利此書説雖勝其害猶不可言況以當今時事天時觀之動必不勝如此立意便髙人一等張英曰伉爽淋漓命意圓湛而體格端重詞氣豐裕公文之似陸宣公者勵杜訥曰歴述當日情事淋漓痛切利害較然一往波折纒綿尤見老成謀國惓惓無已之心代滕甫論西夏書臣素無學術老不讀書每欲披竭愚忠上補聖明萬一而肝肺枯涸卒無可言近者因病求醫偶悟一事推之有政似可施行惟陛下財幸臣近患積聚醫云據病當下一月而愈若不下半年而愈然中年以後一下一衰積衰之患終身之憂也臣私計之終不以一月之快而易終身之憂遂用其言以善藥磨治半年而愈初不傷氣體力益完因悟近日臣僚獻言欲用兵西方皆是醫人欲下一月而愈者也其勢亦未必不成然終非臣子深愛君父欲出萬全之道也以陛下聖明將賢士勇何往不克而臣尚以為非萬全者俗言彭祖觀井自係大木之上以車輪覆井而後敢觀此言雖鄙而切於事陛下愛民憂國非特如彭祖之愛身而兵者凶器動有存亡其陷人可畏有甚於井故臣願陛下之用兵如彭祖之觀井然後為得也臣竊觀自古用兵者莫如曹操其破滅袁氏最有巧思請試為陛下論之袁紹以十倍之衆大敗於官渡僅以身免而操斂兵不追者何也所以緩紹而亂其國也紹歸國益驕忠賢就戮嫡庶並爭不及八年而袁氏無遺種矣向使操急之紹既未可以一舉蕩滅若懼而修政用田豐而立袁譚則成敗未可知也其後北征烏丸討袁尚袁熈尚熈走遼東或勸操遂平之操曰彼素畏尚等吾今急之則合緩之則自相圖其勢然也遂引兵還曰吾方使公孫康斬送其首已而果然若操者可謂巧於滅國矣滅國大事也不可以速譬如小兒之毁齒以漸搖撼之則齒脱而小兒不知若不以漸一拔而得齒則毁齒可以殺兒故臣願陛下之取西夏如曹操之取袁氏也方元昊强時謀臣猛將盡其智力十年而不敢近今者主弱臣强其國内亂陛下使偏師一出斬名王虜偽公主築蘭㑹等州此真千載一時天以此賊授陛下之秋也兵法有之同舟而遇風則吳越相救如左右手今秉常雖為母族所簒以意度之其世家大族亦未肯俯首連臂為此族用也今乃合而為一堅壁清野以抗王師如左右手此正同舟遇風之勢也法當緩之今天威已震臣願陛下選用大臣宿將素為賊所畏服者使兼帥五路聚重兵境上號稱百萬蒐乘補卒牛酒日至金鼓之聲聞於數百里間外為必討之勢而實不出境多出金幣遣間使辯士離壊其黨與且下令曰尺土吾不愛一民吾不有也其有能以地與衆降者即以封之有敢攘其地掠其人者皆斬不出一年必有權均力敵内自相疑者人情不逺各欲求全及王師之未出爭為先降以邀重賞陛下因而分裂之即用其酋豪命以爵秩棊布錯峙務使相仇如漢封呼韓邪通西域故事不過於要害處築一城屯數千人置一將以䕶諸部可使數百年面内保境不煩城守餽運豈非萬全之至計哉臣願陛下斷之於中深慮而逺計之夫為人臣計與為人主計不同人臣非攘地效首虜無以為功為陛下計惟天下安社稷固否耳陛下神聖冠古動容舉意皆是功徳但能措泰山之安與天地等壽則竹帛不可勝紀而堯舜禹湯不足過也議者不知出此爭欲急於功名履危犯難以勞聖慮臣竊不取古人有言省躬不如省事省事不如清心劉洎諫唐太宗曰皇天以不言為貴聖人以不言為徳老子稱大辯若訥莊子言至道無文且多記則損心多言則耗氣心氣内損形神外勞初雖不覺後必為累須為社稷自愛人臣愛君未有如洎之深至者也臣竊慕之雖謫守在外不當妄言然自念舊臣譬之老馬雖筋力已衰不堪致逺而經涉險阻粗識道路惟陛下哀愍其愚而憐其意不勝幸甚切中機宜雖老於行陣者不能道故知將相必讀書也御選唐宋文醇巻四十六
