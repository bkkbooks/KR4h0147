body:
  text: 河東栁宗元文六論記守道論四維論辯侵伐論永州新堂記嶺南節度使饗軍堂記諸使兼御史中丞壁記四門助教㕔壁記永州萬石亭記始得西山宴遊記鈷鉧潭記鈷鉧潭西小丘記至小丘西小石潭記袁家渇記石渠記石澗記小石城山記欽定四庫全書御選唐宋文醇巻十六河東栁宗元文六守道論或問曰守道不如守官何如對曰是非聖人之言傳之者誤也官也者道之器也離之非也未有守官而失道守道而失官之事者是固非聖人言乃傳之者誤也夫皮冠者是虞人之物也物者道之凖也守其物由其凖而後其道存焉茍舍之是失道也凡聖人之所以為經紀為名物無非道者命之曰官官是以行吾道云爾是故立之君臣官府衣裳輿馬章綬之數㑹朝表著周旋行列之等是道之所存也則又示之典命書制符璽奏復之文參伍殷輔陪臺之役是道之所由也則又勸之以爵祿慶賞之美懲之以黜逺鞭朴梏拲斬殺之慘是道之所行也故自天子至於庶民咸守其經分而無有失道者和之至也失其物去其凖道從而䘮矣易其小者而大者亦從而䘮矣古者居其位思死其官可易而失之哉禮記曰道合則服從不可則去孟子曰有官守者不得其職則去然則失其道而居其官者古之人不與也是故在上不為抗在下不為損矢人者不為不仁函人者不為仁率其職司其局交相致以全其工也易位而處各安其分而道逹於天下也且夫官所以行道也而曰守道不如守官葢亦䘮其本矣未有守官而失道守道而失官之事者也是非聖人之言傳之者誤也果矣韓愈曰道與徳為虚位夫事有萬矣而一事各載一理得乎理之至善即協乎事之時宜成為行之中正符於性之自然而名之曰道故曰率性之謂道舍是而别有所謂道則道其所道也岐官與道而二之將官非其官而道非其道即有一得亦必有見於官即無見於道有見於道即無見於官者也宗元之論當矣四維論管子以禮義㢘耻為四維吾疑非管子之言也彼所謂亷者曰不蔽惡也世人之命㢘者曰不茍得也所謂耻者曰不從枉也世人之命耻者曰羞為非也然則二者果義歟非歟吾見其有二維未見其所以為四也夫不蔽惡者豈不以蔽惡為不義而去之乎夫不茍得者豈不以茍得為不義而不為乎雖不從枉與羞為非皆然然則㢘與耻義之小節也不得與義抗而為維聖人之所以立天下曰仁義仁主恩義主斷恩者親之斷者宜之而理道畢矣蹈之斯為道得之斯為徳履之斯為禮誠之斯為信皆由其所之而異名今管氏所以為維者殆非聖人之所立乎又曰一維絶則傾二維絶則危三維絶則覆四維絶則滅若義之絶則㢘與耻其果存乎㢘與耻存則義果絶乎人既蔽惡矣茍得矣從枉矣為非而無羞矣則義果存乎使管子庸人也則為此言管子而少知理道則四維者非管子之言也左史記言右史記事事為春秋言為尚書尚書國語類也春秋左傳類也列國皆有之獨魯史以孔子得傳至今耳孔子以前無家自為書者名卿大夫之嘉言皆載之右史左傳所稱古志有之古語有之又曰著之話言楚語所稱教之語使明其徳而知先王之務用明徳於民皆是也即論語亦非孔子所自作乃曽子有子之門人記其所聞於師者而纂之其曰語者猶用古史之體例也春秋降為戰國處士始撡各國之柄而人自為説以行於天下莊周荀卿之所評論具在可考皆無及於管子者也孟子曰聖王不作諸侯放恣處士横議楊朱墨翟之言盈天下此周室陵遲至孟子時而始然者也管仲生於孔子之前管仲無書明甚如其有之未有七十手之徒無一言評隲之者也管仲之書其為戰國時言富國强兵之流自以為所學出於管仲而假托之無疑也其不概於理者不勝舉若宗元四維論亦一斑也辯侵伐論春秋之説曰凡師有鐘鼓曰伐無曰侵周禮大司馬九伐之法曰賊賢害人則伐之負固不服則侵之然則所謂伐之者聲其惡於天下也聲其惡於天下必有以厭於天下之心夫然後得行焉古之守臣有朘人之財危人之生而又害賢人者内必棄於其人外必棄於諸侯從而後加伐焉動必克矣然猶校徳而後舉量力而後㑹備三有餘而以用其人一曰義有餘二曰人力有餘三曰貨食有餘是三者大備則又立其禮正其名修其辭其害物也小則誥誓徴令不過其鄰雖大不出所暴非有逆天地横四海者不以動天下之師故師不踰時而功成焉斯為人之舉也故公之公之而鐘鼓作焉夫所謂侵之者獨以其負固不服而壅王命也内以保其人外不犯於諸侯其過惡不足暴於天下致文告修文徳而又不變然後以師問焉是為制命之舉非為人之舉也故私之私之故鐘鼓不作斯聖人之所志也周道既壞兵車之軌交於天下而罕知侵伐之端焉是故以無道而正無道者有之以無道而正有道者有之不増徳而以遂威者又有之故世日亂一變而至於戰國而生人耗矣是以有其力無其財君子不以動衆有其力有其財無其義君子不以帥師合是三者而明其公私之說而後可焉嗚呼後之用師者有能觀其侵伐之論則善矣用兵固不得泥於古然聖人之意不可悖也師之彖傳曰以此毒天下而民從之吉又何咎茍非以生道殺人雖死無怨殺者其何可以言兵未能以生道殺人而言兵皆違天而戕人也違天而戕人敗固禍而勝亦禍古可鍳矣宗元此文可作左傳義䟽永州新堂記將為穹谷嵁巖淵池於郊邑之中則必輦山石溝澗壑凌絶嶮阻疲極人力乃可以有為也然而求天作地生之狀咸無得焉逸其人因其地全其天昔之所難今於是乎在永州實惟九疑之麓其始度土者環山為城有石焉翳於奥草有泉焉伏於土塗虵虺之所蟠狸䑕之所遊茂樹惡木嘉葩毒卉亂雜而爭植號為穢墟韋公之來既逾月理甚無事望其地且異之始命芟其蕪行其塗積之丘如蠲之瀏如既㷊既釃竒勢迭出清濁辨質美惡異位視其植則清秀敷舒視其蓄則溶漾紆餘怪石森然周於四隅或列或跪或立或仆竅穴逶邃堆阜突怒乃作棟宇以為觀遊凡其物類無不合形輔勢效伎於堂廡之下外之連山髙原林麓之崖間厠隱顯邇延野綠逺混天碧咸㑹於譙門之内已乃延客入觀繼以宴娯或贊且賀曰見公之作知公之志公之因土而得勝豈不欲因俗以成化公之釋惡而取美豈不欲除殘而佑仁公之蠲濁而流清豈不欲廢貪而立㢘公之居髙以望逺豈不欲家撫而尸曉夫然則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟將使繼公之理者視其細知其大也宗元請志諸石措諸壁編以為二千石楷法人或良才美質自天畀之而不學不問好惡無節於内知誘於外以至滅天理而窮人欲於是有悖逆詐偽之心有滛佚慝亂之事以之終身而不變人曰天之生是使然也奚知其質美才良克念即可作聖耶其與佳景瑰觀清泉美石之汨於荒區蠻域惡木毒莽之中與為終古者奚異宗元為上官作記故以治人之道言之善讀之知修身焉嶺南節度使饗軍堂記唐制嶺南為五府府部州以十數其大小之戎號令之用則聽於節度使焉其外大海多蠻夷由流求訶陵西抵大夏康居環水而國以百數則統於押蕃舶使焉内之幅員萬里以執秩拱稽時聽敎命外之羈屬數萬里以譯言贄寶歲帥貢職合二使之重以治於廣州故賔軍之事宜無與校大且賔有牲牢饔餼嘉樂好禮以同逺合疏軍有犒饋宴饗勞旅勤歸以羣力一心於是治也閈閎階序不可與他邦類必厚棟大梁夷庭髙門然後可以上充於揖讓下周於步武今御史大夫扶風公㢘廣州且專二使増徳以來逺人申威以修戎政大饗宴合樂從其豐盈先是為堂於治城西北陬其位公北向賔衆南向奏部伎於其西視泉池於其東隅奥庳側庭廡下陋日未及晡則赫炎當目汗眩更起而禮莫克終故凡大宴饗大賔旅則寓於外壘儀形不稱公於是始斥其制為堂南面横八楹縱十楹嚮之宴位化為東序西又如之其外更衣之次膳食之宇列觀以遊目偶亭以展聲彌望極顧莫究其往泉池之舊増濬益植以暇以息如在林壑問工焉取則師輿是供問役焉取則蠻𨽻是徴問材焉取則隙宇是遷或益其闕伐山浮海農賈拱手張目視具乃十月甲子克成公命饗於新堂幢牙茸纛金節析羽旂旗旟旞咸飾於下鼓以鼖晉金以鐸鐃公與監軍使肅上賔延羣僚將校士吏咸次於位卉裳􅄢衣胡夷蜑蠻睢盱就列者千人以上鉶鼎體節燔炰胾炙羽鱗貍互之物沉泛醍盎之齊均飫於卒士興王之舞服夷之伎揳擊吹鼓之音飛騰幻怪之容寰觀於逺邇禮成樂遍以叙而賀且曰是邦臨䕶之大五人合之非是堂之制不可以備物非公之徳不可以容衆曠於往初肇自今兹大和有人以觀逺方古之戎政其曷用加此華元名大夫也殺羊而御者不及霍去病良將軍也餘肉而士有饑色猶克稱能以垂到今矧兹具美其道不廢願倣於金石以永示後祀遂相與來告且乞辭某讓不獲乃刻於兹石陳子龍曰文如畫棟雕甍髙牙大纛翼翼巖巖觀者竦視諸使兼御史中丞壁記古者交政於四方謂之使今之制受命臨戎職無所統屬者亦謂之使凡使之號葢專焉而行其道者也開元以來其制愈重故取御史之名而加焉至於今若干年其兼中丞者若干人其使絶域統兵戎按州部專貨食而柔逺人固王畧齊風俗和闗石大者戡復於内拓定於外皆得以壯其威張其聲其用逺矣假是名以莅厥職而尊嚴若是况乎總憲度於朝端樹風聲於天下其所以翼於君正於人者尤可以知也武公以厚徳在位甚宜其官視其署有記諸使中丞者而多闕漏於是求其故於詔制而又質於史氏増益備具遂命其屬書之且曰由其號而觀其實後之居於斯者有以敬於事食焉而不事其事則雖三槐九棘綰四十九使印而自覺恢然有餘茍思夫受於天命於君者為何等事則雖卑官薄祿簿尉曹佐之儔當必前望往古後望來今覩一身之衾影對萬民之耳目恧然自覺其事之難為分之難稱矣宗元曰由其號以觀其實後之居於斯者有以敬其事斯言可三復也故錄之四門助敎㕔壁記周人置虞庠於西郊以養國老教胄子祭統曰天子設四學葢其制也易傳太初篇曰天子旦入東學晝入南學夕入西學暮入北學蔡邕引之以定明堂之位焉大戴禮保傳篇曰帝入東學以貴仁入南學以貴徳入西學以貴義入北學以尊爵賈生述之以明太子之教焉故曰為大教之宫而四學具焉參明堂之政原大教之極其建置之道𢎞也後魏太和中立學於四門置助教二十人隋氏始􅈻於國子而降置五人皇朝始合於太學又省至三人員位彌簡其官尤難非儒之通者不列也四門學之制掌國之上士中士下士凡三等侯伯子男凡四等其子孫之為胄子者及庶士庶人之子為俊士者使執其業而居其次就師儒之官而考正焉助教之職佐博士以掌鼓篋榎楚之政令分其人而教育之其有通經力學者必於歲之杪升於禮部聽簡試焉課生徒之進退必酌於中道非博雅莊敬之流固不得臨於是故有去而升於朝者賀秘書由是為博士歸散騎由是為左拾遺舊制以拾遺為八品清官故必以名實者居於其位貞元中王化既成經籍少間有司命太學之官頗以為易專名譽好文章者咸耻為學官至是河東栁立始以前進士求署兹職天水武儒衡閩中歐陽詹又繼之是歲為四門助教凡三人皆文士京師以為異余與立同祖與武公同升於禮部與歐陽生同志於文四門助教署未嘗紀前人名氏余故為之記而由夫三子者始宋人非四學之説謂學有四豈道亦有四耶然道固一而行則百易地而施之異宜俾得並舉而觀所尚以章志興化亦非無謂相傳古有四學非妄也唐之四學徒循其文耳然猶有告朔之餼羊焉夫士而徒以文稱愧學校矣乃四學助教相繼得三文士則夸美以為異其下此者又可知矣學校之衰也人文之不振也道徳風俗淪胥以鋪千載古今彌望慨然永州萬石亭記御史中丞清河男崔公來莅永州閒日登城北墉臨於荒野藂翳之隙見怪石特出度其下必有殊勝步自西門以求其墟伐竹披奥欹仄以入綿谷跨谿皆大石林立渙若奔雲錯若置碁怒者虎鬬企者鳥厲抉其穴則鼻口相呀搜其根則蹄股交峙環行卒愕疑若搏噬於是刳闢朽壤翦㷊榛薉决澮溝導伏流散為踈林洄為清池寥廓泓渟若造物者始判清濁効竒於兹地非人力也乃立遊亭以宅厥中直亭之西石若掖分可以眺望其上青壁斗絶沉於淵源莫究其極自下而望則合乎攢巒與山無窮明日州邑耋老雜然而至曰吾儕生是州蓺是野眉尨齒鯢未嘗知此豈天墜地出設兹神物以彰我公之徳歟既賀而請名公曰是石之數不可知也以其多而命之曰萬石亭耋老又言曰懿夫公之名亭也豈專狀物而已哉公嘗六為二千石既盈其數然而有道之士咸恨公之嘉績未洽於人敢頌休聲祝公於明神漢之三公秩號萬石我公之徳宜受兹錫漢有禮臣惟萬石君我公之化始於閨門道合於古祐之自天野夫獻辭公夀萬年宗元嘗以牋奏𨽻尚書敢專筆削以附零陵故事時元和十年正月五日記體物之妙宇宙在乎手萬化生於心矣始得西山宴遊記自余為僇人居是州恒惴慄其隟也則施施而行漫漫而遊日與其徒上髙山入深林窮迴溪幽泉怪石無逺不到到則披草而坐傾壺而醉醉則更相枕以卧意有所極夢亦同趣覺而起起而歸以為凡是州之山有異態者皆我有也而未始知西山之怪特今年九月二十八日因坐法華西亭望西山始指異之遂命僕過湘江緣染溪斫榛莽焚茅茷窮山之髙而止攀援而登箕踞而遨則凡數州之土壤皆在袵席之下其髙下之勢岈然窪然若垤若穴尺寸千里攢蹙累積莫得遯隱縈青繚白外與天際四望如一然後知是山之特出不與培塿為類悠悠乎與灝氣俱而莫得其涯洋洋乎與造物者遊而不知其所窮引觴滿酌頽然就醉不知日之入蒼然暮色自逺而至至無所見而猶不欲歸心凝形釋與萬化冥合然後知吾嚮之未始遊遊於是乎始故為之文以志是歲元和四年也鈷鉧潭記鈷鉧潭在西山西其始葢冉水自南奔注抵山石屈折東流其顛委勢峻盪擊益暴齧其涯故旁廣而中深畢至石乃止流沫成輪然後徐行其清而平者且十畆有樹環焉有泉懸焉其上有居者以予之亟遊也一且欵門來告曰不勝官租私劵之委積既芟山而更居願以潭上田貿財以緩禍予樂而如其言則崇其臺延其檻行其泉於髙者墜之潭有聲潨然尤與中秋觀月為宜於以見天之髙氣之迥孰使予樂居夷而忘故土者非兹潭也歟鈷鉧潭西小丘記得西山後八日尋山口西北道二百步又得鈷鉧潭西二十五步當湍而浚者為魚梁梁之上有丘焉生竹樹其石之突怒偃蹇負土而出爭為竒狀者殆不可數其􅋂然相累而下者若牛馬之飲於溪其衝然角列而上者若熊羆之登於山丘之小不能一畆可以籠而有之問其主曰唐氏之棄地貨而不售問其價曰止四百余憐而售之李深源元克已時同遊皆大喜出自意外即更取器用剷刈穢草伐去惡木烈火而焚之嘉木立美竹露竒石顯由其中以望則山之髙雲之浮溪之流鳥獸魚之遨遊舉熈熈然迴巧獻技以効兹丘之下枕席而卧則清冷之狀與目謀瀯瀯之聲與耳謀悠然而虚者與神謀淵然而靜者與心謀不帀旬而得異地者二雖古好事之士或未能至焉噫以兹丘之勝致之灃鎬鄠杜則貴遊之士爭買者日増千金而愈不可得今棄是州也農夫漁夫過而陋之賈四百連歲不能售而我與深源克已獨喜得之是其果有遭乎書於石所以賀兹丘之遭也至小丘西小石潭記從小丘西行百二十步隔篁竹聞水聲如鳴佩環心樂之伐竹取道下見小潭水尤清冽泉石以為底近岸巻石底以出為坻為嶼為堪為巖青樹翠蔓蒙絡揺綴參差披拂潭中魚可百許頭皆若空遊無所依日光下澈影布石上怡然不動俶爾逺逝往來翕忽似與遊者相樂潭西南而望斗折蛇行明滅可見其岸勢犬牙差互不可知其源坐潭上四面竹樹環合寂寥無人凄神寒骨悄愴幽邃以其境過清不可久居乃記之而去同遊者吳武陵龔古余弟宗直𨽻而從者崔氏二小生曰怒已曰奉壹袁家渇記由冉溪西南水行十里山水之可取者五莫若鈷鉧潭由溪口而西陸行可取者八九莫若西山由朝陽巖東南水行至蕪江可取者三莫若袁家渇皆永中幽麗竒處也楚越之間方言謂水之反流者為渇音若衣褐之褐渇上與南館髙嶂合下與百家瀬合其中重洲小溪澄潭淺渚間厠曲折平者深黒峻者沸白舟行若窮忽又無際有小山出水中山皆美石上生青叢冬夏常蔚然其旁多巖洞其下多白礫其樹多楓柟石楠楩櫧樟柚草則蘭芷又有異卉類合歡而蔓生轇轕水石每風自四山而下振動大木掩苒衆草紛紅駭綠蓊勃香氣衝濤旋瀨退貯谿谷揺颺葳蕤與時推移其大都如此余無以窮其狀永之人未嘗遊焉余得之不敢專也出而傳於世其地世主袁氏故以名焉石渠記自渇西南行不能百步得石渠民橋其上有泉幽幽然其鳴乍大乍細渠之廣或咫尺或倍尺其長可十許步其流抵大石伏出其下踰石而往有石泓昌蒲被之青鮮環周又折西行旁陷巖石下北墮小潭潭幅員减百尺清深多鯈魚又北曲行紆餘睨若無窮然卒入於渇其側皆詭石怪木竒卉美箭可列坐而休焉風揺其顛韵動崖谷視之既靜其聽始逺予從州牧得之攬去翳朽决踈土石既崇而焚既釃而盈惜其未始有傳焉者故累記其所屬遺之其人書之其陽俾後好事者求之得以易元和七年正月八日蠲渠至大石十月十九日踰石得石泓小潭渠之美於是始窮也石澗記石渠之事既窮上由橋西北下土山之陰民又橋焉其水之大倍石渠三之亘石為底達於兩涯若床若堂若陳筵席若限閫奥水平布其上流若織文響若操琴掲跣而往折竹掃陳葉排腐木可羅胡床十八九居之交絡之流觸激之音皆在床下翠羽之木龍鱗之石均蔭其上古之人其有樂乎此耶後之來者有能追余之踐履耶得意之日與石渠同由渇而來者先石渠後石澗由百家瀨上而來者先石澗後石渠澗之可窮者皆出石城村東南其間可樂者數焉其上深山幽林逾峭險道狹不可窮也小石城山記自西山道口徑北踰黄茅嶺而下有二道其一西出㝷之無所得其一少北而東不過四十丈土斷而川分有積石横當其垠其上為睥睨梁欐之形其旁出堡塢有若門焉窺之正黒投以小石洞然有水聲其響之激越良久乃已環之可上望甚逺無土壤而生嘉樹美箭益竒而堅其䟽數偃仰類智者所施設也噫吾疑造物者之有無久矣及是愈以為誠有又怪其不為之於中州而列是夷狄更千百年不得一售其伎是固勞而無用神者儻不宜如是則其果無乎或曰以慰夫賢而辱於此者或曰其氣之靈不為偉人而獨為是物故楚之南少人而多石是二者余未信之酈道元水經注史家地理志之流也宗元永州八記雖非一時所成而若斷若續令讀者如陸務觀詩所云山重水複疑無路栁暗花明又一村也絶似水經注文字讀者宜合而觀之虞集曰公之好竒若貪夫之籠百貨而文亦變幻百出御選唐宋文醇巻十六
