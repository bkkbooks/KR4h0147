body:
  text: 眉山蘇軾文二書上文侍中論𣙜鹽書上韓樞密書與謝民師推官書與李方叔書與王庠書謝張太保撰先人墓碣書答張文潛縣丞書欽定四庫全書御選唐宋文醇巻三十九眉山蘇軾文二上文侍中論𣙜鹽書留守侍中執事當今天下勲徳俱髙為主上所倚信華實兼隆為士民所責望受恩三世宜與社稷同憂皆無如明公者今雖在外事有闗於安危而非職之所憂者猶當盡力爭之而况其事闗本職而憂及生民者乎竊意明公必已言之而人不知若猶未也則願效其愚頃者三司使章惇建言乞𣙜河北京東鹽朝廷遣使案視召周革入覲已有成議矣惇之言曰河北與陜西皆為邉防而河北獨不𣙜鹽此祖宗一時之誤恩也軾以為陜西之鹽與京東河北不同解池廣袤不過數十里既不可捐以予民而官亦易以籠取青鹽至自虜中有可禁止之道然猶法存而實不行城門之外公食青鹽今東北循海皆鹽也其欲籠而取之正與淮南兩浙無異軾在餘杭時見兩浙之民以犯鹽得罪者一嵗至萬七千人而莫能止姦民以兵仗䕶送吏士不敢近者常以數百人為輩特不為他盗故上下通知而不以聞耳東北之人悍於淮浙逺甚平居椎剽之姦常甲於他路一旦𣙜鹽則其禍未易以一二數也由此觀之祖宗以來獨不𣙜河北鹽者正事之適宜耳何名為誤哉且𣙜鹽雖有故事然要以為非王政也陜西淮浙既未能罷又欲使京東河北随之此猶患風痺人曰吾左臂既病矣右臂何為獨完則以酒色伐之可乎今議者曰吾之法與淮浙不同淮浙之民所以不免於私販而竈户所以不免於私賣者以官之買價賤而賣價貴耳今吾賤買而賤賣借如每斤官以三錢得之則以四錢出之鹽商私買於竈户利其賤耳賤不能減三錢竈户均為得三錢也寧以予官乎將以予私商而犯法乎此必不犯之道此無異於兒童之見東海皆鹽也茍民力之所及未有捨而不煎煎而不賣者也而近嵗官錢常苦窘迫遇其急時百用横生以有限之錢買無窮之鹽竈户有朝夕薪米之憂而官錢在期月之後則其利必歸於私販無疑也食之於鹽非若飢之於五榖也五榖之乏至於節口并日而况鹽乎故私販法重而官鹽貴則民之貧而懦者或不食鹽往在浙中見山谷之人有數月食無鹽者今將𣙜之東北之俗必不如往日之嗜鹹也而望官課之不虧疎矣且淮浙官鹽本輕而利重雖有積滯官未病也今以三錢為本一錢為利自禄吏購賞修築厫庾之外所獲無幾矣一有積滯不行官之所喪可勝計哉失民而得財明者不為况民財兩失者乎且禍莫大於作始作俑之漸至於用人今兩路未有鹽禁也故變之難遣使㑹議經年而未果自古作事欲速而不取衆議未有如今日者也然猶遲久如此以明作始之難也今既已𣙜之矣則他日國用不足添價貴賣有司以為熟事行半紙文書而決矣且明公能必其不添乎非獨明公不能也今之執政能自必乎茍不可必則兩路之禍自今日始夫東北之蠶衣被天下蠶不可無鹽而議者輕欲奪之是病天下也明公可不深哀而速救之歟或者以為朝廷既有成議矣雖爭之必不從竊以為不然乃者手實造簿方赫然行法之際軾嘗論其不可以告今太原韓公公時在政府莫之行也而手實卒罷民賴以少安凡今執政所欲必行青苗助役市易保甲而己其他猶可以庶㡬萬一或者又以為明公將老矣若猶有所爭則其請老也難此又軾之所不識也使明公之言幸而聽屈己少留以全兩路之民何所不可不幸而不聽是議不中意其於退也尤易矣願少留意軾一郡守也猶以為職之所當憂而冒聞於左右明公其得己乎千瀆威重俯伏待罪而已𣙜鹽洵非三代盛王之所有然自封建變為郡縣則煮海之利無復限制末所競趨不有官吏統紀之易以為亂却不得謂非王政也特與小民爭利則失政之甚者矣篇中所論鹽政真燎如觀火而為民請命忠愛惻怛之意横溢毫楮可為仁人之言矣讀至凡今執政所欲必行者青苗助役市易保甲而已其他猶可以庶㡬萬一語真如寗俞貨醫使薄其酖令人流涕上韓樞宻書軾頓首上樞宻侍郎閣下軾受知門下似稍異於尋常人盖嘗深言不諱矣明公不以為過其在錢塘時亦䝉以書見及語意親甚自爾不復通問者七年於兹矣頃聞明公入西府門前書生為作賀啓數百言軾輙裂去曰明公豈少此哉要當有輔於左右者昔侯霸為司徒其故人嚴子陵以書遺之曰君房足下位至台鼎甚善懷仁輔義天下悦阿諛順㫖要領絶世以子陵為狂以軾觀之非狂也方是時光武以布衣取天下功成志滿有輕人臣之心躬親吏事所以待三公者甚薄霸為司徒奉法循職而已故子陵有以感發之今陛下之聖不止光武而明公之賢亦逺過侯霸軾雖不用然有位於朝未若子陵之獨善也其得盡言於左右良不為過今者貪功僥倖之臣勸上用兵於西北使斯言無有則天下之幸孰大於此不幸有之大臣所宜必爭也古今兵不可用明者計之詳矣明公亦必然之軾不敢復言獨有一事以為臣子之忠孝莫大於愛君愛君之深者飲食必祝之曰使吾君子孫多長有天下此豈非臣子之願歟古之人君好用兵者多矣出而無功與有功而君不賢者皆不足道也其賢而有功者莫若漢武帝唐太宗武帝建元元年蚩尤旗見其長亘天後遂命將出師畧取河南地建置朔方其春戾太子生自是之後師行盖十餘年兵所誅夷屠滅死者不可勝數巫蠱事起京師流血僵尸數萬太子父子皆敗故班固以為太子生長於兵與之終始唐太宗既平海内破滅突厥髙昌吐谷渾等且猶未厭親駕征遼東當時大臣房魏輩皆力爭不從使無辜之民身膏草野於萬里之外其後太子承乾齊王祐呉王恪皆相繼誅死其餘遭武氏之禍殘殺殆盡武帝好古崇儒求賢如不及號稱世宗太宗克己求治㡬至刑措而其子孫遭罹如此豈為善之報也哉由此言之好兵始禍者既足以為後嗣之累則凡忍恥含垢以全人命其為子孫之福審矣軾既無狀竊謂人主宜聞此言而明公宜言此此言一聞豈惟朝廷無疆之福將明公子孫實世享其報軾懷此欲陳乆矣恐未信而諫則以為謗不勝區區之忠故移致之明公雖以此獲罪不愧不悔皇天后土宜聞此言金人入汴徽欽為虜妃主子孫殺戮夷辱之慘載於史氏刋於稗官讀之酸鼻傷肝不忍言者抑知其無端用兵於遼死者百萬王安石始其謀童蔡成其事卒滅遼之社稷而中原亦肝腦塗地天特假手於金耳孟子曰出乎爾者反乎爾夫民今而後得反之也而又奚惜焉詩言之靡言不讐靡徳不報與謝民師推官書軾啓近奉違亟辱問訊具審起居佳勝感慰深矣軾受性剛簡學迂材下坐廢累年不敢復齒搢紳自還海北見平生親舊惘然如隔世人况與左右無一日之雅而敢求交乎數賜見臨傾盖如故幸甚過望不可言也所示書教及詩賦雜文觀之熟矣大畧如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿態横生孔子曰言之不文行之不逺又曰辭達而己矣夫言止於達意疑若不文是大不然求物之妙如繫風捕影能使是物了然於心者盖千萬人而不一遇也而况能使了然於口與手者乎是之謂辭達辭至於能達則文不可勝用矣揚雄好為艱深之詞以文淺易之説若正言之則人人知之矣此正所謂雕蟲篆刻者其太𤣥法言皆是類也而獨悔於賦何哉終身雕蟲而獨變其音節便謂之經可乎屈原作離騷經盖風雅之再變者雖與日月爭光可也可以其似賦而謂之雕蟲乎使賈誼見孔子升堂有餘矣而乃以賦鄙之至與司馬相如同科雄之陋如此比者甚衆可與知者道難與俗人言也因論文偶及之耳歐陽文忠公言文章如精金美玊市有定價非人所能以口舌定貴賤也紛紛多言豈能有益於左右愧悚不已所須惠力法雨堂字軾本不善作大字强作終不佳又舟中局迫難寫未能如教然軾方過臨江當往游焉或僧有所欲記録當作數句留院中慰左右念親之意今日已至峽山寺少留即去愈逺惟萬萬以時自愛不宣儲欣謂東坡論文所謂見其一耳此事當以韓李書為主而以坡公説參之詆揚子雲尤過不足據依嘗考韓李之書其期於言之有物者則此文固未嘗論及至其言詞章者雖昌黎無以踰矣况所謂了然於口與手者必其有物之言若其言之無物固不足論也韓愈云文無難易唯其是李翺推明之凡數百言轉不若此文三數語了徹其義而有餘韻至論揚雄尤為至當雄之言真雕蟲篆刻耳孔子曰先行其言而後從之自非然者雖日道仲尼之語亦是雕蟲篆刻雕蟲篆刻云者必妃青嫓白也哉李光地曰同時王荆公曾子固司馬温公皆尊揚子品題至在孟荀之上坡公遂顯攻之朱文公論文亦曰子雲太𤣥法言蓋亦長楊校獵之流而粗變其音節直用坡公此語也與李方叔書軾頓首方叔先輩足下屢獲來教因循不一裁答悚息不已比日履兹秋暑起居佳勝録示子駿行狀及數詩辭意整暇有加於前得之極喜慰累書見責以不相薦引讀之甚愧然其説不可不盡君子之知人務相勉於道不務相引於利也足下之文過人處不少如李氏墓表及子駿行狀之類筆勢翩翩有可以追古作者之道至若前所示兵鑑則讀之終篇莫知所謂意者足下未甚有得於中而張其外者不然則老病昏惑不識其趣也以此私意猶冀足下積學不倦落其葉而成其實深願足下為禮義君子不願足下豐於才而㢘於徳也若進退之際不甚慎靜則於定命不能有毫髪増益而於道徳有丘山之損矣古之君子貴賤相因先後相援固多矣軾非敢廢此道平生相知心所謂賢者則於稠人中譽之或因其言以考其實實至則名随之名不可掩其自為世用理勢固然非力致也陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得中丞傅欽之侍郎孫莘老薦之軾亦掛名其間㑹朝廷多知履常者故得一官軾孤立言輕未嘗獨薦人也爵禄砥世人主所專宰相猶不敢必而欲責於軾可乎東漢處士私相諡非古也殆似丘明為素臣當得罪於孔門矣孟生貞曜盖亦蹈襲流弊不足法而况近相名字乎甚不願足下此等也軾於足下非愛之深期之逺定不及此猶能察其意否近秦少游有書來亦論足下近文益竒明主求人如不及豈有終汨没之理足下但信道自守當不求自至若不深自重恐䘮失所有言切而盡臨紙悚息未即㑹見千萬保愛近夜眼昏不一不一軾頓首同人先號咷而後笑孔子繋之辭曰君子之道或出或處或黙或語蓋九五君位福極之所自出其孰不希爵禄以來附徒得苟富貴之人國與民奚賴焉若湯之於伊尹可為先號咷而後笑矣子路不云乎君臣之義如之何其廢之伊尹豈欲潔其身而亂大倫者哉其必三聘而後出者所謂其尊徳樂道不如是不足以有為故其始也先號咷而後笑其終也利斷金而如蘭孔子謂富貴得以非道則不處貧賤得以非道則不去苟其處之而去之則謂之去仁非特出處之大也即一語一黙之細而猶然子曰可與言而不與言失人不可與言而與言失言蓋必自炫自鬻之念動於中然後䀨而與之語孟子充類至義之盡至斥之為穿窬之類聖賢律己之嚴一語黙之細至猶如此而肯於進退之際不自慎靜也哉易六十四卦直繫以征凶旡攸利無他辭者唯歸妹一卦為其説以動女求男也三百篇男女贈答離騷佳人公子類皆以女之從男况士之出處蓋非閨闥間語也夫女之耽兮不可説也豈真以士之耽為尚可説乎與王庠書軾啓逺䝉差人致書問安否輔以藥物眷意甚厚自二月二十五日至七月十三日凡一百三十餘日乃至水陸盖萬餘里矣罪戾逺黜既為親友憂又使此兩人者䟦涉萬里比其還家㡬盡此嵗此君愛我之過而重其罪也但喜比來侍奉多暇起居佳勝軾罪大責薄居此固宜無足言者瘴厲之邦僵仆者相屬於前然亦有以取之非寒暖失宜則飢飽過度苟不犯此者亦未遽病也若大期至固不可逃又非南北之故矣以此居之泰然不煩深念前後所示著述文字皆有古作者風力大略能道意所欲言者孔子曰辭達而己矣辭至於達止矣不可以有加矣經説一篇誠哉是言也西漢以來以文設科而文始衰自賈誼司馬遷其文已不逮先秦古書况其下者文章猶爾况所謂道徳者乎若所論周勃則恐不然平勃未嘗一日忘漢陸賈為之謀至矣彼視禄産猶几上肉但將相和調則大計自定若如君言先事經營則呂后覺悟誅兩人而漢亡矣軾少時好議論古人既老涉世更變往往悔其言之過故樂以此告君也儒者之病多空文而少實用賈誼陸贄之學殆不傳於世老病且死獨欲以此教子弟豈意婣親中乃有王郎乎三復來貺喜抃不已應舉者志於得而已今程試文字千人一律考官亦厭之未必得也如君自信不回必不為時所棄也又况得失有命決不可移乎勉守所學以卒逺業相見無期萬萬自重而己人還謹奉手啟少謝萬一軾年少時才俊文雄好論議天下事為宵小所忌羣起擠之繋獄貶竄空乏飢寒出於萬死之中而所學益以光明既老絶非少年時見地故能困而不失其所亨蠻烟蜑雨中一逐臣不啻鳴金樅玉於天禄石渠彈琴詠詩於青山緑澗間也坎坷萬狀而一遇可以尊主澤民之事奮然為之一無顧忌不知身之在叢棘也非有道者而能然耶洛蜀牴牾兩家弟子材智下不能各知其師之心遂詆軾為異端或以為縱横家言嘻其甚矣夫君子和而不同唯其不同是以為君子天之雲霞地之卉木水色山光之紫翠蔚藍無一同者然而莫非造化秀靈之氣也及其生物不測則若相為左右手然君子之不同類是矣其不同者要皆所以從王事庇民生轉惟醎酸甘辛之不齊而鼎實斯美不同者正所謂和也鯫生不察欲比而同之豈欲天下皆為朋黨乃快耶三復斯文天君泰然談笑於死生之際豈非風流人豪者如彼其人而謂與伯淳正叔不相能豈理也哉以軾海外諸文與栁宗元諸書較宗元真不足當一吷矣至謂儒者之病多空文而少實用自悔從前好議論古人之過尤學者所當服膺勿失者也謝張太保撰先人墓碣書軾頓首再拜㐲䝉再示先人墓表特載辨姦一篇恭覽涕泗不知所云竊惟先人早嵗汨没晚乃有聞雖當時學者知師尊之然於其言語文章猶不能盡而况其中之不可形者乎所謂知之盡而信其然者舉世惟公一人雖若不幸然知我者希正老氏之所貴辨姦之始作也自軾與舍弟皆有嘻其甚矣之諫不論他人獨明公一見以為與我意合公固已論之先朝載之史册今雖容有不知後世決不可没而先人之言非公表而出之則人未必信信不信何足深計然使斯人用區區小數以欺天下天下莫覺莫知恐後世必有秦無人之嘆此墓表之所以作而軾之所以流涕再拜而謝也黄叔度澹然無作郭林宗一言至今以為顔子林宗於人材小大畢取所賢非一人而叔度之賢無一見於外者而後世猶信徒以林宗之重也今公之重不減林宗所賢惟先人而其心迹粗若可見其信於後世必矣多言何足為謝聊發一二王安石未柄用時韓琦富弼歐陽修皆以王佐才目之唯張安道蘇洵灼知其姦迨後毒痡四海而韓富輩束手無策奉身而退一日富弼見張安道語次安道曰當日安道知貢舉辟安石同事既至則一院之事皆欲紛更因即時斥逐之弼聞之惘然也安道可為善相人矣蘇洵辨姦論誠千古隻眼而宋儒每謂蘇氏父子與安石不協是以有此未為公論夫司馬韓富諸賢其後孰與安石協者乃以論出於洵洛黨即齗齗焉豈篤論歟答張文潛縣丞書軾頓首文潛張君足下久别思仰到京公私紛然未暇奉書忽辱手教且審起居佳勝至慰至慰惠示文編三復感歎甚矣君之似子由也子由之文實勝僕而世俗不知乃以為不如其為人深不願人知之其文如其為人故汪洋澹泊有一唱三歎之聲而其秀傑之氣終不可没作黄樓賦乃稍自振厲若欲以警發憒憒者而或者便謂僕代作此尤可笑是殆見吾善者機也文字之衰未有如今日者也其源實出於王氏王氏之文未必不善也而患在於好使人同已自孔子不能使人同顔淵之仁子路之勇不能以相移而王氏欲以其學同天下地之美者同於生物不同於所生惟荒瘠斥鹵之地彌望皆黄茅白葦此則王氏之同也近見章子厚言先帝晚年甚患文字之陋欲稍變取士法特未暇耳議者欲稍復詩賦立春秋學官甚美僕老矣使後生猶得見古人之大全者正賴黄魯直秦少游晁無咎陳履常與君等數人耳如聞君作太學博士願益勉之徳輶如毛民鮮克舉之我儀圖之愛莫助之此外千萬善愛偶飲卯酒醉來人求書不能覼縷論王氏之學好人同已此正君子小人分岐處好人同已必為小人矣何也反是即舍己從人之所以為大舜也篇中雖止論文字而政事即在其中惟其好人同已而人之强與己同者至矣彼其不惜强與己同豈真與己同哉亦欲各得其所欲耳既己各得其所欲彼亦將欲人之同已夫然後終亦不與已同矣呂惠卿既執政萬方以蘄致安石於死奚能終同耶孟子曰訑訑之聲音顔色拒人於千里之外士止於千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得乎千載以前蚤為王安石寫照軾所云荒瘠斥鹵之地彌望皆黄茅白葦者豈特安石之文哉安石所為朝廷遴得之人才寧不若是耶御選唐宋文醇巻三十九
