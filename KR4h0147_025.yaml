body:
  text: 廬陵歐陽修文四序䇿問論送王聖紀赴扶風主簿序送田畫秀才寧親萬州序送楊置序送王陶序問進士䇿一問進士䇿四首之四泰誓論本論欽定四庫全書御選唐宋文醇卷二十五廬陵歐陽修文四送王聖紀赴扶風主簿序前年五月大霖雨殺麥河溢東畿浸下田已而不雨至於八月菽粟死髙田三司有言前時溢博州民冒河為言得免租者蓋萬計今嵗秋當租懼民幸水旱因緣得妄免以虧兵食慎敕有司謹之朝廷因舉田令約束州縣吏吏無逺近皆望風惡民言水旱一以農田敕限甚者笞而絶之畿之民訴其縣不聽則訴於開封又不聽則相與聚立宣德門外訴於宰相於是遣吏四出視諸縣視者還而或言災或言否然言否者十七八最後視者還言民實災而吏徒畏約束以茍自免爾天子聞之惻然盡蠲畿民之租余嘗竊歎曰民生幸而為畿民有緩急近而易知也雨降於天河溢於地與赤日之出是三者物之易見也前二三嵗旱蝗相連朝廷嵗嵗隨其災之厚薄蠲其賦之多少至兵食不足則嵗糴或入粟以爵而充之是在上者之愛人而仁人之心易惻也以易知之近言易見之事告易惻之仁然吏一壅之幾不得達况四海之大幾萬里而逺事之難知不若霖潦赤日之易見者何數使上有惻之之心不得達於下下有思告之苦不得通於上者吏居其間而壅之爾可勝歎哉扶風為縣限關之西距京師在千里外民之不幸而事有隱畏者何限其能生死曲直之者令與主簿尉三人而民之志得不壅而聞於州州不壅而聞於上縣不壅而民志通者令與主簿尉達之而已王君聖紀主簿於其縣聖紀好學有文佐是縣也始試其為政焉故以夫素所歎者告之景祐三年二月二十四日廬陵歐陽修序秦二世時山東郡縣少年苦秦吏皆殺其守尉令丞反以應陳涉相立為侯王合從西鄉名為伐秦不可勝數也謁者使東方來以反者聞二世二世怒下吏後使者至上問對曰羣盜郡守尉方逐捕今盡得不足憂上悅及閻樂至望夷宫射及幄幃二世怒召左右左右惶擾不鬬旁有一宦者侍不敢去二世謂曰公何不蚤告我乃至於此宦者曰臣不敢言故得全使臣蚤言皆已誅安得至今嗟夫古先哲王使公卿至於列士獻詩瞽獻典史獻書師針瞍賦曚誦工諫庶人傳語近臣盡規親戚補察夫人情莫不好譽而惡毁古先哲王亦人耳必欲盡小人怨汝詈汝之聲交至於耳且皇自敬德厥愆曰朕之愆不啻不敢含怒豈非布衣之所不能堪者哉凡以位愈髙則蔽愈衆且逺或望風而戰栗或望風而希㫖以其一喜則萬利集一怒則萬苦聚人安得不唯喜之冀而唯怒之懼於是有可以得喜者無不為也有可以得怒者無不避也是故下愈巧而上愈暗下愈黨而上愈孤上孤且暗則百姓無可告訴而小人在位愈益得志社稷危於纍卵若秦二世矣易曰豐其屋蔀其家窺其戶閴其無人三嵗不覿凶此之謂也夫秦二世者與桀紂比蹤者也後世人主言及二世事則曰是安得復見於今也今觀修所言乃宋仁宗時事仁宗之與二世相去天淵不可以道里計而一有懼民幸水旱因緣得免租之見則畿內之近民有災而不得聞遣吏四出而歸言無災者十七八矣仁宗雖終不為二世而秦時謁者何難復生於景祐間哉人主奈何不懼懼之若何曰謹好惡而已矣送田畫秀才寧親萬州序五代之初天下分為十三四及建隆之際或滅或微其在者猶七國而蜀與江南地最大以周世宗之雄三至淮上不能舉李氏而蜀亦恃險為阻秦隴山南皆被侵奪而荆人縮手歸峽不敢西窺以爭故地及太祖受天命用兵不過萬人舉兩國如一郡縣吏何其偉歟當此時文初之祖從諸將西平成都及南攻金陵功最多於時語名將者稱田氏田氏功書史官祿世於家至今而不絶及天下已定將率無所用其武士君子爭以文儒進故文初將家子反衣白衣從鄉進士舉於有司彼此一時亦各遭其勢而然也文初辭業通敏為人敦潔可喜嵗之仲春自荆南西拜其親於萬州維舟夷陵豫與之登髙以逺望遂遊東山窺緑蘿溪坐盤石文初愛之留數日乃去夷陵者其地志云北有夷山以為名或曰巴峽之險至此地始平夷蓋今文初所見尚未為山川之勝者由此而上泝江湍入三峽險怪奇絶乃可愛也當王師伐蜀時兵出兩道一自鳯州以入一自歸州以取忠萬以西今之所經皆王師嚮所用武處覽其山川可以慨然而賦矣此篇與豐樂亭記同義俯仰百年間想創業之艱難識治平之有由撫安樂之適時懼危亡之不戒期全孝於抒忠畏失義而離道種種具流露於意言之表送楊置序豫嘗有幽憂之疾退而閒居不能治也既而學琴於友人孫道滋受宫聲數引久而樂之不知疾之在其體也夫琴之為技小矣及其至也大者為宫細者為羽操絃驟作忽然變之急者悽然以促緩者舒然以和如崩崖裂石髙山出泉而風雨夜至也如怨夫寡婦之歎息雌雄雍雍之相鳴也其憂深思逺則舜與文王孔子之遺音也悲愁感憤則伯奇孤子屈原忠臣之所歎也喜怒哀樂動人必深而純古淡泊與夫堯舜三代之言語孔子之文章易之憂患詩之怨刺無以異其能聽之以耳應之以手取其和者道其湮鬱寫其幽思則感人之際亦有至者焉豫友楊君好學有文纍以進士舉不得志及從廕調為尉於劔浦區區在東南數千里外是其心固有不平者且少又多疾而南方少醫藥風俗飲食異宜以多疾之體有不平之心居異宜之俗其能鬱鬱以久乎然欲平其心以養其疾於琴亦將有得焉故豫作琴說以贈其行且邀道滋酌酒進琴以為别古之善言琴者惟韓退之聽穎師彈琴詩然未免三分琵琶七分筝之誚若此文與枚乘七發中龍門之桐髙百尺而無枝一篇便真有琴聲出於紙上送王陶序六經皆載聖人之道而易著聖人之用吉凶得失動靜進退易之事也其所以為之用者剛與柔也乾健坤順剛柔之大用也至於八卦之變六爻之錯剛與柔迭居其位而吉亨利無咎凶厲悔吝之象生焉蓋剛為陽為德為君子柔為隂為險為小人自乾之初九為姤而上至於剝其卦五皆隂剝陽之卦也小人之道長君子靜以退之時也自坤之初六為復而上至於夬其卦五皆剛決柔之卦也小人之道消君子動以進而用事之時也夫剛之為德君子之常用也庇民利物功莫大焉其為卦過泰之三而四為大壯五為夬壯者壯也夬者決也四陽雖盛而猶有二隂然陽衆而隂寡則可用壯以攻之故其卦為壯五陽而一隂隂不足為直可決之而已故其卦為夬然則君子之用其剛也審其力視其時知隂險小人之必可去然後以壯而決之夫勇者可犯也彊者可詘也聖人於壯決之用必有戒焉故大壯之彖辭曰大壯利貞其象辭曰君子非禮勿履夬之彖辭曰健而說決而和其象辭曰居德則忌以明夫剛之不可獨任也故復始而亨臨浸而長泰交而大壯以衆攻其寡夬乘其衰而決之夫君子之用其剛也有漸而不失其時又不獨任必以正以禮以說以和而濟之則功可成此君子動以進而用事之方也太原王陶字樂道好剛之士也常嫉世隂險而小人多居京師不妄與人遊力學好古以自信自守今其初仕於易得君子動以進之象故豫為剛說以贈之大壯之初九曰壯於趾征凶夬之初九亦曰壯於趾往不勝為咎以此見聖人之戒用剛也不獨於其彖象而又常深戒於其初嗚呼世之君子少而小人多君子力學好剛以蓄其志未始施之於事也今其往尤宜慎乎其初王陶為御史力攻富弼其人正子貢所惡以不孫為勇以訐為直者歟修於其筮仕時為述大易剛德之善以戒之蓋蚤有以識其心也其言君子之用剛也有漸而不失其時又不獨任必以正以禮以說以和而濟之誠有得夫天德不為首之㫖先聖之微言大義具於此矣雖然若王陶者何足以語此黨小人害君子正是隂柔非剛也所為惡積而不可掩者也若夫壯趾壯頄猶君子也公私善惡之不同由其發心之始已如秦越焉若王陶者擬之於易其為羸豕孚蹢躅乎問進士䇿一問六經者先王之治具而後世之取法也書載上古春秋紀事詩以微言感刺易道隱而深矣其切於世者禮與樂也自秦之焚書六經盡矣至漢而出者皆其殘脫顛倒或傳之老師昏耄之說或取之冡墓屋壁之間是以學者不明異說紛起況乎周禮其出最後然其為書備矣其天地萬物之統制禮作樂建國君民養生事死禁非道善所以為治之法皆有條理三代之政美矣而周之治迹所以比二代而尤詳見於後世者周禮著之故也然漢武以為瀆亂不驗之書何休亦云六國隂謀之說何也然今考之實有可疑者夫內設公卿大夫士下至府史胥徒以相副二外分九服建五等差尊卑以相統理此周禮之大略也而六官之屬略見於經者五萬餘人而里閭縣鄙之長軍師卒伍之徒不與焉王畿千里之地為田幾井容民幾家王官王族之國邑幾數民之貢賦幾何而又容五萬人者於其間其人耕而賦乎如其不耕而賦則何以給之夫為治者故若是之煩乎此其一可疑者也秦既誹古盡去古制自漢以後帝王稱號宫府制度皆襲秦故以至於今雖有因有革然大抵皆秦制也未嘗有意於周禮者豈其體大而難行乎其果不可行乎夫立法垂制將以遺後也使難行而萬世莫能行與不可行等爾然則反秦制之不若也脫有行者亦莫能興或因以取亂王莽後周是也則其不可用決矣此又可疑也然其祭祀衣服車旗似有可采者豈所謂郁郁之文乎三代之治其要如何周禮之經其失安在宜於今者其理安從其悉陳無隱修言用周禮以致亂者王莽後周而王安石之亂宋即在同時修為䇿問已見其端而為是說邪抑偶合邪修知貢舉時安石之禍未熾也周禮一書宋儒終不敢直以為非周公所作或言王莽時劉歆僞撰篇章篡入之以媚新室俾其虐政若出周公之舊典者而禮家齗齗以為不可今觀修文核計六官之屬五萬餘人而無員額者尚不在內乃欲以千里之地供其祿糈則實勢所必無矣顧修所疑猶為舉其小而遺其大也夫聖王之治天下養人為大書曰厚生易曰損上益下詩刺萇楚春秋譏稅畝孔子曰富之孟子曰薄稅斂大學曰財聚則民散凡六經四子之書所以教萬世之帝王公卿大夫至於師長百執事者莫此為先焉蓋天生貴者所以養賤者也天生富者所以養貧者也此天地之性也聖賢之所以為聖賢由欲利民也經書之所以為經書由欲垂利民之典則於萬世也今觀周禮司市質人㕓人肆長泉府司門司關山虞林衡川衡澤虞迹人丱人角人羽人掌葛掌染掌茶掌蜃之屬舉市㕓門關山林川澤所有鳥獸魚鱉草木玉石一切貨賄之屬莫不設之厲禁而盡征之入市有稅入門有稅入關有稅避而不入即沒入之地所從産又官守而以時入之甚至民有稱貸又官取其息不如禁者執而誅罰之如是則天之所生地之所長人之所養俱入朝廷不留一絲毫之遺利以與民矣雖王莽之虐恐其力亦不能悉如書中之所載以盡行其厲民之事也而謂周公為之乎若夫有天地而後有萬物有萬物而後有男女有男女而後有夫婦中庸曰造端乎夫婦夫婦誠人道之始也今周禮媒氏曰中春之月㑹男女於是時也奔者不禁若無故而不用令者罰之又曰司男女之無夫家者而㑹之如是則是設之官立之禁驅天下女子之未有夫者必奔而夫死者必嫁也誠何心哉其他瑣細不具論即此二大端在上者雖有關雎麟趾之意又如之何其可行邪由此觀之即便周公果有是書亦已不傳於後世孟子不云乎諸侯惡其害已也而皆去其籍豈孟子時已無其籍而今日猶有全書邪縱使尚有斷簡殘編之沒於莽穢榛雜中者非聖人復起其孰能辨之然則或謂劉歆媚莽所作者似亦十得六七也問進士䇿問古之取士者上下交相待以成其美今之取士者上下交相害欲濟於事可乎古之士教養有素而進取有漸上之禮其下者厚故下之自守者重上非厚禮不能以得士士非自重不能以見禮於上故有國者設爵祿車服禮樂於朝以待其下為士者修仁義忠信孝悌於家以待其上設於朝者知下之能副其待則愈厚居下者知上之不薄於已故愈重此豈不交相成其美歟後世之士則反是上之待其下也以為干利而進爾雖有爵祿之設而日為之防以革進之濫者下之視其上也以為雖自重上孰我知不自進則不能以達由是上之待其下也益薄下之自守者益不重而輕嗚呼居上者欲得其人在下者欲行其道其可得邪原夫三代取士之制如何漢魏逮今其變制又如何宜歷道其詳也制失其本致其反古當自何始今之士皆學古通經稍知自重矣而上之所以禮之者未加厚也噫由上之厚然後致下之自重歟必下之自重然後上禮之厚歟二者兩不為之先其勢亦奚由而合也宜具陳其本末與其可施於今者以對學校之教不逮於古而取士無長䇿矣其上下交相失之故具見於篇蓋千古賢君志士之所同慨也泰誓論書稱商始咎周以乘黎乘黎者西伯也西伯以征伐諸侯為職事其伐黎而勝也商人已疑其難制而惡之使西伯赫然見其不臣之狀與商並立而稱王如此十年商人反晏然不以為怪其父師老臣如祖伊微子之徒亦默然相與熟視而無一言此豈近於人情邪由是言之謂西伯受命稱王十年者妄說也以紂之雄猜暴虐嘗醢九侯而脯鄂侯矣西伯聞之竊歎遂執而囚之幾不免死至其叛已不臣而自王乃反優容而不問者十年此豈近於人情邪由是言之謂西伯受命稱王十年者妄說也孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事於商乎且謂西伯稱王者起於何說而孔子之言萬世之信也由是言之謂西伯受命稱王十年者妄說也伯夷叔齊古之知義之士也方其讓國而去顧天下皆莫可歸聞西伯之賢共往歸之當是時紂雖無道天子也天子在上諸侯不稱臣而稱王是僭叛之國也然二子不以為非依之久而不去至武王伐紂始以為非而棄去彼二子者始顧天下莫可歸卒依僭叛之國而不去不非其父而非其子此豈近於人情邪由是言之謂西伯受命稱王十年者妄說也書之泰誓稱十有一年說者因以謂自文王受命九年及武王居喪二年并數之爾是以西伯聽虞芮之訟謂之受命以為元年此又妄說也古者人君即位必稱元年常事爾不以為重也後世曲學之士說春秋始以改元為重事然則果常事歟固不足道也果重事歟西伯即位已改元矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣又不改元由是言之謂西伯以受命之年為元年者妄說也後之學者知西伯生不稱王而中間不再改元則詩書所載文武之事粲然明白而不誣矣或曰然則武王畢喪伐紂而秦誓曷為稱十有一年對曰畢喪伐紂出於諸家之小說而泰誓六經之明文也昔者孔子當衰周之際患衆說紛紜以惑亂當世於是退而修六經以為後世法及孔子既歿去聖稍逺而衆說復興與六經相亂自漢以來莫能辨正今有卓然之士一取信乎六經則泰誓者武王之事也十有一年者武王即位之十有一年爾復何疑哉司馬遷作周本紀雖曰武王即位九年祭於文王之墓然後治兵於孟津至作伯夷列傳則又載父死不葬之說皆不可為信是以吾無取焉取信於書可矣乍讀斯論一則曰妄說再則曰妄說更三四稱而不止若言之無文者繹思之而後知其用意也無逸曰文王受命惟中身蓋由武王已得天下之後而推本言之耳周公若曰當文王之中年已可朝諸侯有天下而不改臣節文王所以為至德也文王非不能得天下而必待武王也孔子亦曰三分天下有其二以服事殷周之德其可謂至德也已笑後世不察轉因受命惟中身一語而謂文王有滅商之心且顯有叛商之迹推其年嵗當在戡黎之時遂謂其時西伯稱王改元武王本文王之志以伐商即位不改元而於泰誓之十有三年謬解紛紜曹操司馬懿遂有吾其為周文王之語經之不明人倫之大患修既確見其妄辭而闢之應不遺餘力故不惜言重辭復為斬斬齗齗之辭凡以明人倫云爾本論天下之事有本末其為治者有先後堯舜之書略矣後世之治天下未嘗不取法於三代者以其推本末而知所先後也三王之為治也以理數均天下以爵地等邦國以井田域民以職事任官天下有定數邦國有定制民有定業官有定職使下之共上勤而不困上之治下簡而不勞財足於用而可以備天災也兵足以禦患而不至於為患也凡此具矣然後飾禮樂興仁義以教道之是以其政易行其民易使風俗淳厚而王道成矣雖有荒子孱孫繼之猶七八百嵗而後已夫三王之為治豈有異於人哉財必取於民官必養於祿禁暴必以兵防民必以刑與後世之治者大抵同也然後世常多亂敗而三王獨能安全者何也三王善推本末知所光後而為之有條理後之有天下者孰不欲安且治乎用心益勞而政益不就諰諰然常恐亂敗及之而輒以至焉者何也以其不推本末不知先後而已今之務衆矣所當先者五也其二者有司之所知其三者則未之思也足天下之用莫先乎財繫天下之安危莫先乎兵此有司之所知也然財豐矣取之無限而用之無度則下益屈而上益勞兵强矣而不知所以用之則兵驕而生禍所以節財用兵者莫先乎立制制已具備兵已可使財已足用所以共守之者莫先乎任人是故均財而節兵立法以制財任賢以守法尊名以厲賢此五者相為用有天下者之常務當今之世所先而執事者之所忽也今四海之內非有亂也上之政令非有暴也天時水旱非有大故也君臣上下非不和也以晏然至廣之天下無一間隙之端而南夷敢殺天子之命吏西夷敢有崛强之王北夷敢有抗禮之帝者何也生齒之數日益衆土地之産日益廣公家之用日益急四夷不服中國不尊天下不實者何也以五者之不備故也請試言其一二方今農之趣耕可謂勞矣工商取利乎山澤可謂勤矣上之徴賦𣙜易商利之臣可謂纎悉而無遺矣然一遇水旱如明道景祐之間則天下公私乏絶是無事之世民無一嵗之備而國無數嵗之儲也以此知財之不足也古之善用兵者可使之赴水火今廂禁之軍有司不敢役必不得已而暫用之則謂之借倩彼兵相謂曰官倩我而官之文符亦曰倩夫賞者所以酬勞也今以大禮之故不勞之賞三年而一遍所費八九百萬有司不敢緩月日之期兵之得賞不以無功知愧乃稱多量少比好嫌惡小不如意則羣聚而呼持梃欲擊天子之大吏無事之時其猶若此以此知兵驕也夫財用悉出而猶不足者以無定數也兵之敢驕者以用之未得其術以此知制之不立也夫財匱兵驕法制未一而莫有奮然忘身許國者以此知不任人也不任人者非無人也彼或挾材藴知特以時方惡人之好名各藏畜收斂不敢奮露惟恐近於名以犯時人所惡是以人人變賢為愚愚者無所責賢者被譏疾遂使天下之事將弛廢而莫敢出力以為之此不尚名之弊者天下之最大患也故曰五者之皆廢也前日五代之亂可謂極矣五十三年之間易五姓十三君而亡國被弒者八長者不過十餘嵗甚者三四嵗而亡夫五代之主豈皆愚者邪其心豈樂禍亂而不欲為久安之計乎顧其力有不能為者時也當是時也東有汾晉西有岐蜀北有强胡南有江淮閩廣吳越荆潭天下分為十三四四面環之以至狹之中國又有叛將强臣割而據之其君天下者類皆為國日淺威德未洽强君武主力而為之僅以自守不幸孱子懦孫不過一再傳而復亂敗是以養兵如兒子之啖虎狼猶恐不為用尚何敢制以殘弊之民人贍無資之征賦頭㑹箕斂猶恐不足尚何曰節財以富民天下之勢方若敝廬補其奧則隅壞整其桷則棟傾枝撐扶持茍存而已尚何暇法象規圜矩方而為制度乎是以兵無制用無節國家無法度一切茍且而已今宋之為宋八十年矣外平僭亂無抗敵之國內削方鎮無强叛之臣天下為一四海晏然為國不為不久天下不為不廣也語曰長袖善舞多錢善賈言有資者其為易也方今承三聖之基業据萬乘之尊名以有四海一家之天下盡大禹貢賦之地莫不內輸惟上之所取不可謂乏財六尺之卒荷戈勝甲力彀五石之弩彎二石之弓者數百萬惟上制而令之不可謂乏兵中外之官居職者數千員官三班吏部常積者又數百三嵗一詔布衣而應詔者萬餘人試禮部者七八千惟上之擇不可謂乏賢民不見兵革於今幾四十年矣外振兵武攘夷狄內修法度興德化惟上之所為不可謂無暇以天子之慈聖仁儉得一二明智之臣相與而謀之天下積聚可如文景之富制禮作樂可如成周之盛奮發威烈以耀名譽可如漢武帝唐太宗之顯赫論道德可興堯舜之治然而財不足用於上而下已弊兵不足威於外而敢驕於內制度不可為萬世法而日益叢雜一切茍且不異五代之時此甚可歎也是所謂居得致之位當可致之時又有能致之資然誰憚而久不為乎此文切中宋仁宗時政事之失漢之不復於三代人每為文景歎宋之遽衰於神哲人亦每為仁英惜蓋國無人焉孰與為理此雅詩所以頌美人君必以賢才衆多為辭蓋國家之福天地之祥誠莫大乎此也御選唐宋文醇卷二十五
