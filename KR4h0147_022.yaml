body:
  text: 廬陵歐陽修文一賦雜著書紅鸚鵡賦藏珠於淵賦明用書梅聖俞藳後桑懌傳上范司諫書上杜中丞書答吳充秀才書欽定四庫全書御選唐宋文醇卷二十二廬陵歐陽修文一紅鸚鵡賦并序聖俞作紅鸚鵡賦以為禽鳥之性宜適於山林今兹鸚徒事言語文章以招纍見囚樊中曾烏鳶雞雛之不若也謝公學士復多鸚之才故能去昆夷之賤有金閨玉堂之安飲泉啄實自足為樂作賦以反之夫適物理窮天真則聖俞之說勝負才賢以取貴於世而能自將所適皆安不知籠檻之與山林則謝公之說勝某始得二賦讀之釋然知世之賢愚出處各有理也然猶疑夫兹禽之腹中或有未盡者因拾二賦之餘棄也以代鸚畢其說后皇之載兮殊方異類肖翹蠢息兮厥生咸遂鎔埏賦豫兮有物司之泊然後化兮默運其機陶形播氣兮小大取足紛不可狀兮千名萬族異物珍怪兮託産遐陬來海裔兮貴中州邈丹山於荒極越鳳凰之所宅稟南方之正氣孕赤精於火德蓋以氣而召類兮故感生而同域播為我形特殊其質不緣以文而丹其色物既賤多而貴少兮世亦安常而駭異豈負美以有求兮適遭時之我貴客方黜我以文采弔我於籠樊謂夫飛鳴而飲啄不若雞鶩與烏鳶噫不知物有貴賤殊乎所得工初造我甚難而嗇千毛億羽曾無其一忽然成形可異而珍慧言美質俾貴於人籠軒寶玩翔集安馴彼衆禽之擾擾兮蓋迹殊而趣乖既心昏而質陋兮乃自穢而安卑樂以鐘鼓宜其眩悲蓋貴我之異稟何概我於羣飛若夫生以才戾養以性違客之所悼我亦悼之我視乎世猶有甚兮郊犧牢豕龜文象齒蚌蛤之胎犛牛之尾既殘厥形又奪其生是猶天為非以自營人又不然謂為最靈淳和質靜本湛而寧不守爾初自為巧智鑿竅泄和漓淳雜僞衣羔染夏强華其體鞭朴走趨自相械繫天不汝文而自文之天不汝勞而自勞之役聰與明反為物使用精既多速老招纍侵生盩性豈毛之罪又聞古初人禽雜處機萌乃心物則遁去深兮則網高兮則弋為之職誰而反豫是責修之意謂物必見用於人斯為盡其物之性觪角不舍正是貴於凡牛處莊子犧牛之喻未盡物理但物之為物非有求於人之用也轉有似乎君子之實至而名自歸焉者若夫漓淳雜僞自炫自媒以希世用則曽物之不如其何以為萬物之靈乎藏珠於淵賦稽治古之敦化仰聖人之作君務藏珠而弗寶俾在淵而可分效乎至珍雖希世而弗産棄於無用嫓還浦以攸聞得外篇之寓言述臨民之致理將革紛華於偷俗復芚愚於赤子謂非欲以自化則爭心之不起蓋賤貨者為貴德之義敦本者由抑末而始示不復用雖至寶而奚為捨之則藏祕諸淵而有以誠由窒民情者在杜其漸防世欲者必藏其機使嗜欲不得以外誘則淳朴於焉而可歸將抵璧以同議諒彈雀而誠非照乘無庸盡遺崎岸之側連城奚取皆沈媚水之輝用能崇儉德以外昭復淳風而有謂民心朴以歸本物産全而靡費珍雖無脛俾臨淵而盡除事異暗投永沈川而不貴然而道既散則民薄風一澆而朴殘玩好既紛乎外役質素無由而內安故我斥乃珍奇之用絶乎侈靡之端將令物遂乎生老蚌蔑剖胎之患民知非尚驪龍無探頷之難是則恢至治之風揚淳古之式不寶於逺則知用物之足不見其欲則無亂心之惑上茍賤於所好下豈求於難得是雖寶也將去泰而去奢從而屏之使不知而不識彼捐金者由是類矣摘玉者可同言之諒率歸於至理實大化於無為致爾漢臯之濱各全其本雖有淮蠙之産無得而窺自然道著不貪時無異物民用遵乎至儉地寶蕃而不屈所以虞舜垂衣亦由斯而弗咈此修殿試作也其云上茍賤於所好下豈求於難得已有謇諤氣象明用乾之六爻曰初九潛龍勿用九二見龍在田九三君子終日乾乾夕惕若厲無咎九四或躍在淵九五飛龍在天上九亢龍有悔又曰用九見羣龍無首吉者何謂也謂以九而名爻也乾爻七九九變而七無為易道占其變故以其所占者名爻不謂六爻皆常九也曰用九者釋所以不用七也及其筮也七常多而九常少有無九者焉此不可以不釋也曰羣龍無首吉者首先也主也陽極則變而之他故曰無首也凡物極而不變則弊變則通故曰吉也物無不變變無不通此天理之自然也故曰天德不可為首又曰乃見天則也坤之六爻曰初六履霜堅冰至六二直方大不習無不利六三含章可貞或從王事無成有終六四括囊無咎無譽六五黃裳元吉上六龍戰於野其血𤣥黃又曰用六利永貞者何謂也謂以六而名爻也坤爻八六六變而八無為亦以其占者名爻不謂六爻皆常六也曰用六者釋所以不用八也及其筮也八常多而六常少有無六者焉此不可以不釋也隂柔之動或失於邪故曰利永貞也隂陽反復天地之常理也聖人於陽盡變通之道於隂則有所戒焉六十四卦陽爻皆七九隂爻皆六八於乾坤而見之則其餘可知也朱子謂用九用六歐公之說得之此文云不謂六爻皆常九則本陸績九已在二初即非九之義文體絶似明初制義蓋制義本是宋人經義之變說經之文理當如是逮其濫觴則摛華掞藻而於理都無所發明告朔之餼羊亡矣録之使讀者知制義之源書梅聖俞藳後凡樂達天地之和而與人之氣相接故其疾徐奮動可以感於心歡欣惻愴可以察於聲五聲單出於金石不能自和也而工者和之然抱其器知其聲節其廉肉而調其律呂如此者工之善也今指其器以問於工曰彼簨者簴者堵而編執而列者何也彼必曰鼗鼓鐘磬絲管干戚也又語其聲以問之曰彼清者濁者剛而奮柔而曼衍者或在郊或在廟堂之下而羅者何也彼必曰八音五聲六代之曲上者歌而下者舞也其聲器名物皆可以數而對也然至於動蕩血脉流通精神使人可以喜可以悲或歌或泣不知手足鼓舞之所然問其何以感之者則雖有善工猶不知其所以然焉蓋不可得而言也樂之道深矣故工之善者必得於心應於手而不可述之言也聽之善亦必得於心而㑹以意不可得而言也堯舜之時䕫得之以和人神舞百獸三代春秋之際師襄師曠州鳩之徒得之為樂官理國家知興亡周衰官失樂器淪亡散之河海逾千百嵗間未聞有得之者其天地人之和氣相接者既不得泄於金石疑其遂獨鍾於人故其人之得者雖不可和於樂尚能歌之為詩古者登歌清廟太師掌之而諸侯之國亦各有詩以道其風土性情至於投壺饗射必使工歌以達其意而為賓樂蓋詩者樂之苗裔與漢之蘇李魏之曹劉得其正始宋齊而下得其浮淫流泆唐之時子昻李杜沈宋王維之徒或得其淳古淡泊之聲或得其舒和高暢之節而孟郊賈島之徒又得其悲愁鬱湮之氣由是而下得者時有而不純焉今聖俞亦得之然其體長於本人情狀風俗英華雅正變態百出哆兮其似春凄兮其似秋使人讀之可以喜可以悲陶暢酣適不知手足之將鼓舞也斯固得深者耶其感人之至所謂與樂同其苗裔者耶余嘗問詩於聖俞其聲律之高下文語之疵病可以指而告余也至其心之得者不可以言而告也余亦將以心得意會而未能至之者也聖俞久在洛中其詩亦往往人皆有之今將告歸余因求其藳而寫之然夫前所謂心之所得者如伯牙鼓琴子期聽之不相語而意相知也余今得聖俞之稿猶伯牙之琴絃乎書云詩言志歌永言聲依永律和聲則知從律不奸成文不亂詩與樂之感通也微矣作詩鏤心劌目而不得自然之趣則所謂動蕩四氣之和者孑然無存安能反正始之音乎徒月煆季煉於詞章特秋蟲之鳴朝菌之媚爾此修所以推聖俞詩為獨有心得也東坡題梅詩後云驛使前村走馬回北人初識越人梅清香莫把酴醿比祇缺溪頭月下杯又云吾雖後輩猶及與之周旋覽其親書詩如見其抵掌談笑也今觀歐蘇二人書跋如遇聖俞於高山流水之間矣桑懌傳桑懌開封雍丘人其兄慥舉進士有名懌亦舉進士再不中去遊汝潁間得龍城廢田數頃退而力耕嵗凶汝旁諸縣多盜懌白令願為耆長往來里中察姦民因召里中少年戒曰盜不可為也吾在此不汝容也少年皆諾里老父子死未斂盜夜脫其衣里老父怯無他子不敢告縣裸其尸不能葬懌聞而悲之然疑少年王生者夜入其家探其篋不使之知覺明日遇之問曰爾諾我不為盜矣今又盜里父子尸者非爾耶少年色動即推仆地縳之詰共盜者王生指某少年懌呼壯丁守王生又自馳取少年者送縣皆伏法又嘗之郟城遇尉方出捕盜招懌飲酒遂與俱行至賊所藏尉怯陽為不知以過懌曰賊在此何之乎下馬獨格殺數人因盡縛之又聞襄城有盜十許人獨提一劍以往殺數人縛其餘汝旁縣為之無盜京西轉運使奏其事授郟城尉天聖中河南諸縣多盜轉運奏移澠池尉崤古險地多深山而青灰山尤阻險為盜所恃惡盜王伯者藏此山時出為近縣害當此時王伯名聞朝廷為巡檢者皆授名以捕之既懌至巡檢者僞為宣頭以示懌將謀招出之懌信之不疑其僞也因諜知伯所在挺身入賊中招之與伯同卧起十餘日信之乃出巡檢者反以兵邀於山口懌幾不自免懌曰巡檢授名懼無功爾即以伯與巡檢使自為功不復自言巡檢俘獻京師朝廷知其實罪黜巡檢懌為尉嵗餘改授右班殿直永安縣巡檢明道景祐之交天下旱蝗盜賊稍稍起其間有惡賊二十三人不能捕樞密院以傳召懌至京授二十三人名使往捕懌謀曰盜畏吾名必已潰潰則難得矣宜先示之以怯至則閉柵戒軍吏無一人得輒出居數日軍吏不知所為數請出自效輒不許既而夜與數卒變為盜服以出迹盜所常行處入民家民皆走獨有一媪留為作飲食饋之如盜乃歸復閉柵三日又往則攜其具就媪饌而以其餘遺媪媪待以為真盜矣乃稍就媪與語及羣盜輩媪曰彼聞桑懌來始畏之皆遁矣又聞懌閉營不出知其不足畏今皆還也某在某處某在某所矣懌盡鉤得之復三日又往厚遺之遂以實告曰我桑懌也煩媪為察其實而慎勿泄後三日我復來矣後又三日往媪察其實審矣明旦部分軍士用甲若干人於某所取某盜卒若干人於某處取某盜其尤彊者在某所則自馳馬以往士卒不及從惟四騎追之遂與賊遇手殺三人凡二十三人者一日皆獲二十八日復命京師樞密吏謂曰與我銀為君致閣職懌曰用賄得官非我欲况貧無銀有固不可也吏怒匿其閥以免短使送三班三班用例與兵馬監押未行會交趾獠叛殺海上巡檢昭化諸州皆警往者數輩不能定因命懌往盡手殺之還乃授閣門祗候懌曰是行也非獨吾功位有居吾上者吾乃其佐也今彼留而吾還我賞厚而彼輕得不疑我蓋其功而自伐乎受之徒慚吾心將讓其賞歸已上者以奏稿示豫豫謂曰讓之必不聽徒以好名與詐取譏也懌歎曰亦思之然士顧其心何如爾當自信其心以行譏何纍也若欲避名則善皆不可為也已余慚其言卒讓之不聽懌雖舉進士而不甚知書然其所為皆合道理多此類始居雍丘遭大水有粟二廩將以舟載之見民走避溺者遂棄其粟以舟載之見民荒嵗聚其里人飼之粟盡乃止懌善用劍及鐵簡力過數人而有謀略遇人常畏若不自足其為人不甚長大亦自修為威儀言語如不出其口卒然遇之不知其健且勇也修為五代史又為唐書紀書表修之史列在學官矣顧皆大卷積帙讀者須纍月經年録此稗傳以見其史筆之大略所謂嘗鼎一臠歐陽修自記勇力人所有而能知用其勇者少矣若懌可謂義勇之士其學問不深而能者蓋天性也余固喜傳人事尤愛司馬遷善傳而其所書皆偉烈竒節士喜讀之欲學其作而怪今人如遷所書者何少也乃疑遷特雄文善壯其說而古人未必然也及得桑懌事乃知古之人有然而遷書不誣也知今人固有而但不盡知也懌所為壯矣而不知余文能如遷書使人讀而喜不姑次第之上范司諫書前月中得進奏吏報云自陳州召至闕拜司諫即欲為一書以賀多事卒卒未能也司諫七品官爾於執事得之不為喜而獨區區欲一賀者誠以諫官者天下之得失一時之公議繫焉今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也然縣越其封郡逾其境雖賢守長不得行以其有守也吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也若天下之得失生民之利害社稷之大計惟所見聞而不繫職司者獨宰相可行之諫官可言之爾故士學古懷道者仕於時不得為宰相必為諫官諫官雖卑與宰相等天子曰不可宰相曰可天子曰然宰相曰不然坐乎廟堂之上與天子相可否者宰相也天子曰是諫官曰非天子曰必行諫官曰必不可行立於殿階之前與天子爭是非者諫官也宰相尊行其道諫官卑行其言言行道亦行也九卿百司郡縣之吏守一職者任一職之責宰相諫官繫天下之事亦任天下之責然宰相九卿而下失職者受責於有司諫官之失職也取譏於君子有司之法行乎一時君子之譏著之簡冊而昭明垂之百世而不泯甚可懼也夫七品之官任天下之責懼百世之譏豈不重耶非材且賢者不能為也近執事始被召於陳州洛之士大夫相與語曰我識范君知其材也其來不為御史必為諫官及命下果然則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色面爭廷論者非他人必范君也拜命以來翹首企足竚乎有聞而卒未也竊惑之豈洛之士大夫能料於前而不能料於後也將執事有待而為也昔韓退之作爭臣論以譏陽城不能極諫卒以諫顯人皆謂城之不諌蓋有待而然退之不識其意而妄譏修獨以為不然當退之作論時陽城為諫議大夫已五年後又二年始廷論陸贄及沮裴延齡作相欲裂其麻才兩事耳當德宗時可謂多事矣授受失宜叛將强臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當時之事豈無急於沮延齡論陸贄兩事也謂宜朝拜官而夕奏疏也幸而城為諫官七年適遇延齡陸贄事一諫而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉今之居官者率三嵗而一遷或一二嵗甚者半嵗而遷也此又非一可以待乎七年也今天子躬親庶政化理清明雖為無事然自千里詔執事而拜是官者豈不欲聞正義而樂讜言乎然今未聞有所言說使天下知朝廷有正士而彰吾君有納諫之明也夫布衣韋帶之士窮居草茅坐誦書史常恨不見用及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重責且解洛士大夫之惑則幸甚幸甚中論陽城處未為允已於爭臣論書後明之要之修意欲勸范仲淹直言耳非正論陽城也朱子曰歐陽公上司諫書其中却是美麗有好處有不可及處却不是闒冗無意思蘇老泉上歐陽公書云執事之文紆徐委備往復曲折而條達疏暢無所間斷氣盡語完急言竭論而容與閒易無艱難勞苦之態此三者皆卓然自為一家之文也丘濬曰今世諫官雖無定職然國家設立六科以言責付之凡內而百司外而藩郡應有封章無有不經由者矧列署內廷侍班殿陛日近清光咫尺天顔上無所於屬下有所分理歐陽修所謂爭是非於殿陛之間者也必也不愛富貴次則重惜名節次則曉知治體如是則上而君德必有所助下而朝政必無所缺矣王志堅曰明道二年范文正公自陳州召還拜右司諫文正先以言事忤太后出判河中徙陳州為司諫即論罷楊太后册命又言不宜深治太后時事然歐公猶汲汲勸其有言何不能少待也是年冬即以諫廢后出知睦州豈感公此書邪此書作具官某拜書司諫學士執事明年文正移蘇州公與書作某再拜知郡學士希文足下蓋自此書而相知漸深也古人交誼親疏之等於此亦可考上杜中丞書修前伏見舉南京留守推官石介為主簿近者聞介以上書論赦被罷而臺中因舉他吏代介者主簿於臺職最卑介一賤士也用不用當否未足害政然可惜者中丞之舉動也介為人剛果有氣節力學喜辨是非真好義之士也始執事舉其材議者咸曰知人之明今聞其罷皆謂赦乃天子已行之令非疏賤當有說以此罪介曰當罷修獨以為不然然不知介果指何事而言也傳者皆云介之所論謂朱梁劉漢不當求其後裔爾若止此一事則介不為過也然又不知執事以介為是為非也若隨以為非是大不可也且主簿於臺中非言事之官然大抵居臺中者必以正直剛明不畏避為稱職今介足未履臺門之閾而已因言事見罷真可謂正直剛明不畏避矣度介之才不止為主簿直可任御史也是執事有知人之明而介不負執事之知矣修嘗聞長老說趙中令相太祖皇帝也嘗為某事擇官中令列二臣姓名以進太祖不肯用他日又問復以進又不用他日又問復以進太祖大怒裂其奏擲殿階上中令色不動插笏帶間徐拾碎紙袖歸中書他日又問則補綴之復以進太祖大悟終用二臣彼之敢爾者蓋先審知其人之可用然後果而不可易也今執事之舉介也亦先審知其可舉耶是偶舉之耶若知而舉則不可遽止若偶舉之猶宜一請介之所言辨其是非而後已若介雖忤上而言是也當助以辨若其言非也猶宜曰所舉者為主簿爾非言事也待為主簿不任職則可罷請以此辭焉可也且中丞為天子司直之臣上雖好之其人不肖則當彈而去之上雖惡之其人賢則當舉而申之非謂隨時好惡而高下者也今備位之臣百千邪者正者其糾舉一信於臺臣而執事始舉介曰能朝廷信而將用之及以為不能則亦曰不能是執事自信猶不果若遂言他事何敢望天子之取信於執事哉故曰主簿雖卑介雖賤士其可惜者中丞之舉動也况今斥介而他舉亦必擇賢而舉也夫賢者固好辨若舉而入臺又有言則又斥而他舉乎如此則必得愚暗懦默者而後止也伏惟執事如欲舉愚者則豈敢復云若將舉賢也願無易介而他取也今世之官兼御史者例不與臺事故敢布狂言竊獻門下伏惟幸察焉主簿非臺諫也越職言事孟子所謂位卑而言高罪也然猶須視其言之當否耳若朱梁劉漢當時欲求其後裔而介慷慨陳奏謂不當求則修所云識見直可任御史無愧允矣又何論其為主簿非臺諫也神宗非咈諫之主而中丞不能昌言匡救為國家儲有用之才為士人振敢言之氣則以淆於禍福之念而奪其好惡之正也此修所以惓惓乎杜衍歟答吳充秀才書修頓首白先輩吳君足下前辱示書及文三篇發而讀之浩乎若千萬言之多及少定而視焉才數百言爾非夫辭豐意雄霈然有不可禦之勢何以至此然猶自患倀倀莫有開之使前者此好學之謙言也修材不足用於時仕不足榮於世其毁譽不足輕重氣力不足動人世之欲假譽以為重借力而後進者奚取於修焉先輩學精文雄其施於時又非待假譽而為重借力而後進者也然而惠然見臨若有所責得非急於謀道不擇其人而問焉者歟夫學者未始不為道而至者鮮焉非道之於人逺也學者有所溺焉爾蓋文之為言難工而可喜易恱而自足世之學者往往溺之一有工焉則曰吾學足矣甚者至棄百事不關於心曰吾文士也職於文而已此其所以至之鮮也昔孔子老而歸魯六經之作數年之頃爾然讀易者如無春秋讀書者如無詩何其用工少而至於至也聖人之文雖不可及然大抵道勝者文不難而自至也故孟子皇皇不暇著書荀卿蓋亦晚而有作若子雲仲淹方勉焉以模言語此道未足而彊言者也後之惑者徒見前世之文傳以為學者文而已故愈勤而愈不至此足下所謂終日不出於軒序不能縱橫高下皆如意者道未足也若道之充焉雖行乎天地入於淵泉無不之也足下之文浩乎霈然可謂善矣而又志於為道猶自以為未廣若不止焉孟荀可至而不難也修學道而不至者然幸不甘於所恱而溺於所止因吾子之能不自止又以勵修之少進焉幸甚韓栁而後人推歐陽在李孫之上今三人論文之語具在若出一口韓之言曰根之茂者其實遂膏之沃者其光曄仁義之人其言藹如栁之言曰大都文以行為本在先誠其中與此文所云大抵道勝者文不難而自至真如一堂兩琴鼓此而彼應者矣學文者不以三人者為歸則奚歸如以此三人為凖的則所以用其心者當不在文辭之末矣吳充字仲卿浦城人未冠舉進士與兄育京方皆高第修之長子婦充女也充神宗時為宰相修性直不避衆怨為參知政事與二三大臣主國論妻弟薛宗孺坐舉官被劾內冀因修幸免修乃言不可以臣故僥幸以故宗孺免官怨修切齒因構為帷簿無根之談辭連充女吳氏茍欲以汙辱修小人乘間抗章劾之值神宗初即位幾致大戮久乃解修初以孤甥女張氏事被案及是又被讒衊遂力請致仕以終於汝隂噫小人之仇君子雖忠正如修者猶忍以鳥獸行誣之使才識之士噤不敢為國家任一事而後得志其可畏如此御選唐宋文醇卷二十二
