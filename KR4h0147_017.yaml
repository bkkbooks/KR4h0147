body:
  text: 河東栁宗元文七記議碑遊黃溪記興州江運記零陵三亭記零陵郡復乳穴記雍州馬退山茅亭記栁州山水近治可遊者記永州龍興寺東丘記駁復讐議箕子碑栁州文宣王新修廟碑欽定四庫全書御選唐宋文醇卷十七河東栁宗元文七遊黃溪記北之晉西適豳東極吳南至楚越之交其間名山水而州者以百數永最善環永之治百里北至於浯溪西至於湘之源南至於瀧泉東至於黃溪東屯其間名山水而村者以百數黃溪最善黃溪距州治七十里由東屯南行六百步至黃神祠祠之上兩山牆立如丹碧之華葉駢植與山升降其缺者為崖峭巖窟水之中皆小石平布黃神之上揭水八十步至初潭最奇麗殆不可狀其略若剖大甕側立千尺溪水即焉黛蓄膏渟來若白虹沉沉無聲有魚數百尾方來會石下南去又行百步至第二潭石皆巍然臨峻流若頦頷齗齶其下大石離列可坐飲食有鳥赤首烏翼大如鵠方東嚮立自是又南數里地皆一狀樹益壯石益瘦水鳴皆鏘然又南一里至大𡨕之川山舒水緩有土田始黃神為人時居其地傳者曰黃神王姓莽之世也莽既死神更號黃氏逃來擇其深峭者潛焉始莽嘗曰余黃虞之後也故號其女曰黃皇室主黃與王聲相邇而又有本其所以傳焉者益驗神既居是民咸安焉以為有道死乃俎豆之為立祠後稍徙近乎民今祠在山陰溪水上元和八年五月十六日既歸為記以啓後之好遊者儲欣曰所志不過數里幽麗奇絶政如萬壑千巖應接不暇興州江運記御史大夫嚴公牧於梁五年嗣天子用周漢進律增秩之典以親諸侯謂公有功德理行就加禮部尚書是年四月使中謁者來錫公命賔僚吏屬將校卒士黧老童孺填溢公門舞躍歡呼願建碑紀德垂億萬祀公固不許而相與怨咨遑遑如不飲食於是西鄙之人密以刋山𨗳江之事願刻巖石曰維梁之西其蔽曰某山其守曰興州興州之西為戎居嵗備亭障實以精卒以道之險隘兵困於食守用不固公患之曰吾嘗為興州凡其土人之故吾能知之自長舉北至於青泥山又西控於成州過栗亭川踰寶井堡崖谷峻隘十里百折負重而上若蹈利刃盛秋水潦窮冬雨雪深泥積水相輔為害顛踣騰藉血流棧道糗糧芻藁填谷委山牛馬羣畜相藉物故餫夫畢力守卒延頸嗷嗷之聲其可哀也若是者綿三百里而餘自長舉而西可以導江而下二百里而至昔之人莫得知也吾受命於君而育斯人其可已乎乃出軍府之幣以備器用即山僦功由是轉巨石仆大木焚以炎火沃以食醯摧其堅剛化為灰燼畚鍤之下易甚朽壤乃闢乃墾乃宣乃理隨山之曲直以休人力順地之高下以殺湍悍厥功既成咸如其素於是決去壅土疏𨗳江濤萬夫呼抃莫不如志雷騰雲奔百里一瞬既會既逺淡為安流蒸徒謳歌枕卧而至戍人無虞專力待冦唯我公之功疇可侔也而無以酬德致其大願又不可得命矧公之始來屬當惡嵗府庾甚虛器備甚殫飢饉昏札死徙充路賴公節用愛人克安而生老窮有養幼乳以遂不問不使咸得其志公命鼓鑄庫有利兵公命屯田師有餘糧選徒練旅有衆孔武平刑議嶽有衆不黷增石為防膏我稻粱嵗無凶災家有積倉傳館是飾旅忘其歸杠梁已成人不履危若是者皆以戎隙帥士而為之不出四民之力而百役已就且我西鄙之職官故不能具舉惟公和恆直方廉毅信讓敦尚儒學揖損貴位率忠與仁以厚其誠有可以安利於人者行之堅勇不俟終日其興功濟物宜如此其大也昔之為國者惟水事為重故有障大澤勤其官而受封國者矣西門遺利史起興歎白圭壑鄰孟子不與公能夷險休勞以惠萬代其功烈尤章章焉不可蓋也是用假辭謁工勒而存之用永憲於後祀徐孚逺曰能知地理逺近讀其文可考其績不徒以頌德為工零陵三亭記邑之有觀遊或者以為非政是大不然夫氣煩則慮亂視壅則志滯君子必有遊息之物高明之具使之清寧平夷恆若有餘然後理達而事成零陵縣東有山麓泉出石中沮洳汚塗羣畜食焉牆藩以蔽之為縣者積數十人莫知發視河東薛存義以吏能聞荆楚間潭部舉之假湘源令會零陵政尨賦擾民訟於牧推能濟弊來蒞兹邑遁逃復還愁痛笑歌逋租匿役期月辨理宿蠧藏姦披露首服民既卒稅相與歡歸道塗迎賀里閭門不施胥吏之席耳不聞鼛鼓之召雞豚糗醑得及宗族州牧尚焉旁邑倣焉然而未嘗以劇自撓山水鳥魚之樂淡然自若也乃發牆藩驅羣畜決疏沮洳搜剔山麓萬石如林積坳為池爰有嘉木美卉垂水藂峰瓏􅌑蕭條清風自生翠煙自留不植而遂魚樂廣間鳥慕靜深别孕巢穴沉浮嘯萃不畜而富伐木墜江流於邑門陶土以埴亦在署側人無勞力士得以利乃作三亭陟降晦明高者冠山顛下者俯清池更衣膳饔列置備具賔以燕好旅以館舍高明遊息之道具於是邑由薛為首在昔禆諶謀野而獲宓子彈琴而理亂慮滯志無所容入則夫觀遊者果為政之具歟薛之志其果出於是歟及其弊也則以玩替政以荒去理使繼是者咸有薛之志則邑民之福其可既乎余愛其始而欲久其道乃撰其事以書於石薛拜手曰吾志也遂刻之自天子至於庶人自朝至於日中昃而夕而夜莫不有職分之當為屢省乃成明而動晦而休無日以怠然而學記有之藏焉修焉息焉遊焉孔子亦曰遊於藝何哉蓋心之神明匪瑩弗靈匪虛弗瑩此靈臺所以歌於詩也古之人既不廢臺囿禽魚之觀以養其目復有琴瑟鐘鼓之考以養其耳凡皆以宣其堙鬱導其和平以淨徹其神明俾通達於政事耳豈從夫嗜欲而弛厥敬執哉古樂淪亡姦聲以慢古之所以養耳者皆所以敗耳故三代而下玩好之具惟聲伎最不可近子産所為煩手淫聲慆湮心耳乃忘平和君子弗用者也宗元立論謂髙明遊息之道有禆於政而卒乃戒其玩荒甚得古人之旨矣雖然非所語於至人也至人因物付物任其本分而無毫銖之加則雖日應萬幾泯然不覺事之在已方且無時無處而不得瑩且靈而又奚藉於觀遊焉零陵郡復乳穴記石鍾乳餌之最良者也楚越之山多産焉於連於韶者獨名於世連之人告盡焉者五載矣以貢則買諸他部今刺史崔公至逾月穴人來以乳復告邦人悅是祥也雜然謡曰氓之熙熙崔公之來公化所徹土石蒙烈以為不信起視乳穴穴人笑之曰是惡知所謂祥耶嚮吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔先賴而後力欺誣屏息信順休洽吾以是誠告焉且夫乳穴必在深山窮林氷雪之所儲豺虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今而乃誠吾告故也何祥之為士聞之曰謠者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有斯其為政也而獨非祥也歟珠還合浦虎渡九江大率類此耳郡國言祥瑞莫多於漢宣史載張敞論奏黃霸語亦可謂隱而顯矣即曰有之君子必以此非祥為祥而不以彼祥為祥也如五星凌犯可以坐算而得日當食不食司天者失其算也熒惑自退豈係一言然而君子於災則不曰非災者何哉人曰災也則皇自敬德皇自敬德奚慮其太過者易曰未順命君子處豐以之曰志不舍命君子處嗇以之命之豐也不以為命在則然而侈然大故曰未順命命之嗇也不以為命在則然而棄其志故曰不舍命是以豐則益小心以昭事嗇則以震動而光明夫如是安得不遇災而懼遇祥而不言也哉雍州馬退山茅亭記冬十月作新亭於馬退山之陽因高丘之阻以面勢無欂櫨節棁之華不斫椽不翦茨不列牆以白雲為藩籬碧山為屏風昭其儉也是山崒然起於莽蒼之中馳奔雲矗亘數十百里尾蟠荒陬首注大溪諸山來朝勢若星拱蒼翠詭狀綺綰繡錯蓋天鍾秀於是不限於遐裔也然以壤接荒服俗參夷徼周王之馬迹不至謝公之屐齒不及巖徑蕭條登探者以為嘆嵗在辛卯我仲兄以方牧之命試於是邦夫其德及故信孚信孚故人和人和故政多暇由是嘗徘徊北山以寄勝概乃塈乃塗作我攸宇於是不崇朝而木工告成每風止雨收煙霞澄鮮輒角巾鹿裘率昆弟友生冠者五六人步山極而登焉於是手揮絲桐目送還雲西山爽氣在我襟袖以極萬類攬不盈掌夫美不自美因人而彰蘭亭也不遭右軍則清湍修竹蕪沒於空山矣是亭也僻介閩嶺佳境罕到不書所作使盛迹鬱堙是貽林澗之愧故志之宗元零陵三亭記謂氣煩則慮亂視壅則志滯君子有遊息之物髙明之具使之清寧平夷恆若有餘然後理達而事成夫山水之奇觀非可周行天下將皆必有車轍馬迹而得之者也則古人之能述以文者不越几研之問而人自得於湖山千里之外夫亦藏修息遊之最善地矣宗元善記故録之多以其可為養心之助云爾夫文之無與於理道而工且妍者猶夫山水花木也若其以玩替政以荒去理則毋曰文也而為君子之所許焉凡集中所録此類文具倣此栁州山水近治可遊者記古之州治在薄水南山石間今徙在水北直平四十里南北東西皆水滙北有雙山夾道嶄然曰背石山有支川東流入於潯水潯水因是北而東盡大壁下其壁曰龍壁其下多秀石可硯南絶水有山無麓廣百尋高五丈下上若一曰甑山山之南皆大山多奇又南且西曰駕鶴山壯聳環立古州治負焉有泉在坎下常盈而不流南有山正方而崇類屏者曰屏山其西曰四姥山皆獨立不倚兆流潯水瀨下又西曰仙奕之山山之西可上其上有穴穴有屏有室有宇其宇下有流石成形如肺肝如茄房或積於下如人如禽如器物甚衆東西九十尺南北少半東登入小穴常有四尺則廓然甚大無竅正黑燭之高僅見其宇皆流石怪狀由屏南室中入小穴倍常而上始黑已而大明為上室由上室而上有穴北出之乃臨大野飛鳥皆視其背其始登者得石枰於上黑肌而赤脈十有九道可奕故以云其山多柳多櫧多篔簹之竹多橐吾其鳥多秭歸石魚之山全石無大草木山小而髙其形如立魚在多秭歸西有穴類仙奕入其穴東出其西北靈泉在東趾下有麓環之泉大類轂雷鳴西奔二十尺有洄在石澗因伏無所見多緑青之魚及石鯽多鯈雷山兩崖皆東西雷水出焉蓄崖中曰雷塘能出雲氣作雷雨變見有光禱用俎魚豆彘修形糈􅀈酒隂虔則應在立魚南其間多美山無名而深峩山在野中無麓峩水出焉東流入於潯水儲欣曰頗似史記天官書然彼猶有架法此只平直序去零零星星有條有理後人杖屨而遊不復問塗樵牧斯益奇矣永州龍興寺東丘記遊之適大率有二曠如也奧如也如斯而已其地之凌阻峭出幽鬱寥廓悠長則於曠宜抵丘垤伏灌莽迫遽回合則於奧宜因其曠雖增以崇臺延閣回環日星臨瞰風雨不可病其敞也因其奧雖增以茂樹藂石穹若洞谷蓊若林麓不可病其邃也今所謂東丘者奧之宜者也其始龕之外棄地余得而合焉以屬於堂之北垂凡坳窪坻岸之狀無廢其故屏以密竹聫以曲梁桂檜松杉楩柟之植幾三百本嘉卉美石又經緯之俯入緑縟幽蔭薈蔚步武錯忤不知所出溫風不爍清氣自至水亭狹室曲有奧趣然而至焉者往往以邃為病噫龍興永之佳寺也登高殿可以望南極闢大門可以瞰湘流若是其曠也而於是小丘又將披而攘之則吾所謂遊有二者無乃闕焉而喪其地之宜乎丘之幽幽可以處休丘之窅窅可以觀妙溽暑遁去兹丘之下太和不遷兹丘之巔奧乎兹丘孰從我遊余無召公之德懼翦伐之及也故書以祈後君子儲欣曰曠如奧如至今猶奉為品題名勝之祖駮復讐議臣伏見天后時有同州下邽人徐元慶者父爽為縣尉趙師韞所殺卒能手刃父讐束身歸罪當時諫臣陳子昂建議誅之而旌其閭且請編之於令永為國典臣竊獨過之臣聞禮之大本以防亂也若曰無為賊虐凡為子者殺無赦刑之大本亦以防亂也若曰無為賊虐凡為治者殺無赦其本則合其用則異旌與誅莫得而並焉誅其可旌兹謂濫黷刑甚矣旌其可誅兹謂僭壞禮甚矣果以是示於天下傳於後代趨義者不知所向違害者不知所立以是為典可乎蓋聖人之制窮理以定賞罰本情以正褒貶統於一而已矣嚮使刺讞其誠偽考正其曲直原始而求其端則刑禮之用判然離矣何者若元慶之父不陷於公罪師韞之誅獨以其私怨奮其吏氣虐於非辜州牧不知罪刑官不知問上下蒙冒籲號不聞而元慶能以戴天為大恥枕戈為得禮處心積慮以衝讐人之胸介然自克即死無憾是守禮而行義也執事者宜有慚色將謝之不暇而又何誅焉其或元慶之父不免於罪師韞之誅不愆於法是非死於吏也是死於法也法其可讎乎讎天子之法而戕奉法之吏是悖驁而凌上也執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讐其亂誰救是惑於禮也甚矣禮之所謂讐者蓋其寃抑沉痛而號無告也非謂抵罪觸法陷於大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已其非經背聖不亦甚哉周禮調人掌司萬人之讐凡殺人而義者令勿讐讐之則死有反殺者邦國交讐之又安得親親相讐也春秋公羊傳曰父不受誅子復讐可也父受誅子復讐此推刃之道復讐不除害今若取此以斷兩下相殺則合於禮矣且夫不忘讐孝也不愛死義也元慶能不越於禮服孝死義是必達禮而聞道者也夫達禮聞道之人豈其以王法為敵讐者哉議者反以為戮黷刑壞禮其不可以為典明矣請下臣議附於令有斷斯獄者不宜以前議從事謹議韓愈復讐議曰凡有復父讐者事發具其事申尚書省尚書省集議奏聞酌其宜而處之蓋謂不為定律而使朝士引經以斷也宗元之議則謂當讐不當讐自有一定更為明白自明代至今凡父祖被人殺子孫救護登時殺其人者勿論非登時並豫杖其報讐殺官吏如此篇所云者律無明文非無明文也其不當讐歟自以殺本管官律論不待言也其當讐歟則即用此律科斷亦不待言也然則宗元之議今實用之矣箕子碑凡大人之道有三一曰正蒙難二曰法授聖三曰化及民殷有仁人曰箕子實具兹道以立於世故孔子述六經之旨尤殷勤焉當紂之時大道悖亂天威之動不能戒聖人之言無所用進死以併命誠仁矣無益吾祀故不為委身以存祀誠仁矣與亡吾國故不忍具是二道有行之者矣是用保其明哲與之俯仰晦是謨範辱於囚奴昏而無邪隤而不息故在易曰箕子之明夷正蒙難也及天命既改生人以正乃出大法用為聖師周人得以序彝倫而立大典故在書曰以箕子歸作洪範法授聖也及封朝鮮推道訓俗惟德無陋惟人無逺用廣殷祀俾夷為華化及民也率是大道藂於厥躬天地變化我得其正其大人歟於呼當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為此其有志於斯乎唐某年作廟汲郡歲時致祀嘉先生獨列於易象作是頌云蒙難以正授聖以謨宗祀用繁夷民其蘇憲憲大人顯晦不渝聖人之仁道合隆汙明哲在躬不陋為奴沖讓居禮不盈稱孤高而無危卑不可踰非死非去有懷故都時詘而伸卒為世模易象是列文王為徒大明宣昭崇祀式孚古闕頌辭繼在後儒儲欣謂末段乃書生事後揣測之談當日不顧行遁何暇計及今按易明夷六五曰箕子之明夷利貞孔子曰箕子之貞明不可息也當紂之時孟子謂故家遺俗流風善政猶有存者猶有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也然則比干死微子微仲膠鬲歸周若無箕子明不既息矣乎宗元末段之意實本諸孔子也碩果不食松柏後凋守先王之道以待後之學者誠聖賢與天地同心之處觀夫東漢之末賢士大夫淪胥以亡於是郭泰有殄瘁之傷卓操無顧忌之意宗元之論夫又曷可議哉栁州文宣王新修廟碑仲尼之道與王化逺邇惟栁州古為南夷椎髻卉裳攻劫鬭暴雖唐虞之仁不能柔秦漢之勇不能威至於有國始循法度置吏奉貢咸若采衛冠帶憲令進用文事學者道堯舜孔子如取諸左右執經書引仁義旋辟唯諾中州之士時或病焉然後知唐之德大以遐孔子之道尊而明元和十年八月州之廟屋壞幾毁神位刺史栁宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎於贏財取土木金石徵工僦功完舊益新十月乙丑王宫正室成乃安神棲乃正法庭祗會羣吏卜日之吉虔告於王靈曰昔者夫子嘗欲居九夷其時門人猶有惑聖言今夫子代千有餘載其教始行至於是邦人去其陋而本於儒孝父忠君言及禮義又况巍然炳然臨而炙之乎惟夫子以神道設教我今罔敢知欽若兹教以寧其神追思告誨如在於前茍神之在曷敢不虔居而無陋罔二昔言申陳嚴祀永永是尊麗牲有碑刻在廟門從孔子之化行及於夷蠻處立議體裁最善韓愈處州碑雖極鋪張盛美然如繪乾坤之容而摹日月之光安得崑崙為筆大海為墨御選唐宋文醇卷十七
