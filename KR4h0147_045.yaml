body:
  text: 眉山蘇軾文八上書狀上皇帝書議學校貢舉狀諫買浙燈狀上神宗皇帝書欽定四庫全書御選唐宋文醇卷四十五睂山蘇軾文八上皇帝書臣軾謹昧死再拜皇帝陛下臣伏以今月初五日南至文武百僚入賀所以賀一陽來復也謹按易復卦雷在地中復先王以至日閉關商旅不行后不省方説易者曰乾六陽之氣也為十一月為十二月為正月為二月為三月為四月而乾之陽復矣陽極則陰生隂生則夏至矣坤六隂之氣也為五月為六月為七月為八月為九月為十月而坤之隂極矣隂極則陽生陽生則冬至矣自太極分為二儀二儀分為四象四象分為十二月十二月分為三百六十五日五日為一候分為七十二候三候為一氣分為二十四氣上為日月星辰下為山川草木鳥獸蟲魚不出此隂陽之氣升降而已惟人也全天地十干之氣十月而成形故能天能地能人一消一息一呼一吸晝夜與天地相通差舛毫忽則邪沴之氣干之矣故於冬至一陽之生也五隂在上五陽在伏而一陽初生於伏之下其氣至微其兆絪緼可以靜而不動可以嗇養而不可以發宣故乾之初九爻曰潛龍勿用孔子曰陽在下也言陽氣方潛於下未可以用也先王於是日閉關商旅不行后不省方關者門户所由以關闢也商旅者動以利心也后者凡居人上者謂之羣后所以治事者也方者事也門户不開則微陽閉而不出也利心不動則外物感而不應也方事不省則視聽收而不發也先王奉若天道如此之密用之於國則安靜而不勞用之於身則沖和而不竭昔者伏羲神農黃帝堯舜皆得此道臣敢因至日以獻伏乞聖慈留神省覽實社稷無疆之福上書年月無可考以意逆之當是熙寧三年冬至軾時直史館判官告院新法初行牟利者並進軾因冬至奉賀而上書舉易義以諷諫言利心之不可動宜安靜以養和平之福明年正月諫買浙燈而見納議學校貢舉而召見軾以為上信我矣乃兩上書極論新法並不見用又假進士策問擬為對策語再上安石滋怒出之於外合數篇觀之可見其進諫之次第議學校貢舉狀熙寧四年正月日殿中丞直史館判官蘇軾具議狀聞奏者右臣伏以得人之道在於知人知人之法在於責實使君相有知人之才朝廷有責實之政則胥史皂𨽻未嘗無人而况於學校貢舉乎雖因今之法臣以為有餘使君相無知人之才朝廷無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足矣夫時有可否物有廢興方其所安雖暴君不能廢及其既厭雖聖人不能復故風俗之變法制隨之譬如江河之徙移順其所欲行而治之則易為功強其所不欲而復之則難為力使三代聖人復生於今其選舉養才亦必有道矣何必由學且天下固嘗立學矣慶厯之間以為太平可待至於今日惟有空名僅存今陛下必欲求德行道藝之士責九年大成之業則將變今之禮易今之俗又當發民力以治宫室斂民財以食遊士百里之內置官立師獄訟聽於是軍旅謀於是又當以時簡不率教者屏之逺方終身不齒則無乃徒為紛亂以患苦天下耶若乃無大變改而望有益於時則與慶厯之際何異故臣以為今之學校特可因循舊制使先王之舊物不廢於吾世足矣至於貢舉之法行之百年治亂盛衰初不由此陛下視祖宗之世貢舉之法與今為孰精言語文章與今為孰優所得文武長才與今為孰多天下之事與今為孰辦較此四者而長短之議決矣今議者所欲變改不過數端或曰鄉舉德行而略文章或曰專取策論而罷詩賦或啓舉唐室故事兼採譽望而罷彌封或欲罷經生朴學不用貼墨而考大義此數者皆知其一不知其二者也臣請歷言之夫欲興德行在於君人者修身以格物審好惡以表俗孟子所謂君仁莫不仁君義莫不義君之所向天下趨焉若欲設科立名以取之則是教天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以廉取人則敝車羸馬惡衣菲食凡可以中上意無所不至矣德行之弊一至於此且自文章而言之則策論為有用詩賦為無益自政事言之則詩賦策論均為無用矣雖知其無用然自祖宗以來莫之廢者以為設法取士不過如此也豈獨吾祖宗自古堯舜亦然書曰敷秦以言明試以功自古堯舜以來進人何嘗不以言試人何嘗不以功乎議者必欲以策論定賢愚能否臣請有以質之近世士大夫文章華靡者莫如楊億使楊億尚在則忠清鯁亮之士也豈得以華靡少之通經學古者莫如孫復石介使孫復石介尚在則迂闊矯誕之士也又可施之於政事之間乎自唐至今以詩賦為名臣者不可勝數何負於天下而必欲廢之近世士人纂類經史綴緝時務謂之策括待問條目搜抉略盡臨時剽竊竄易首尾以眩有司有司莫能辨也且其為文也無規矩凖繩故學之易成無聲病對偶故考之難精以易學之士付難考之吏其弊有甚於詩賦者矣唐之通榜故是弊法雖有以名取人厭伏衆論之美亦有賄賂公行權要請託之害至使恩去王室權歸私門降及中葉結為朋黨之論通榜取人又豈足尚哉諸科舉取人多出三路能文者既已變而為進士曉義者又皆去以為明經其餘皆朴魯不化者也至於人才則有定分施之有政能否自彰今進士日夜治經傳子史貫穿馳騖可謂博矣至於臨政曷嘗用其一二顧視舊學已為虛器而欲使此等分别注疏粗識大義而望其才能增長亦已踈矣臣故曰此數者皆知其一而不知其二也特願陛下留意其逺者大者必欲登俊良黜庸回總覽衆才經略世務則在陛下與二三大臣下至諸路職司與良二千石耳區區之法何預焉然臣竊有私憂過計者敢不以告昔王衍好老莊天下皆師之風俗凌夷以至南渡王縉好佛捨人事而修異教大厯之政至今為笑故孔子罕言命以為知者少也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫性命之説自子貢不得聞而今之學者恥不言性命此可信也哉今士大夫至以佛老為聖人粥書於市者非莊老之書不售也讀其文浩然無當而不可窮觀其貌超然無著而不可挹豈此真能然哉蓋中人之性安於放而樂於誕耳使天下之士能如莊周齊死生一毁譽輕富貴安貧賤則人主之名器爵祿所以礪世磨鈍者廢矣陛下亦安用之而况其實不能而竊取其言以欺世者哉臣願陛下明敕有司試之以法言取之以實學博通經術者雖朴不廢稍涉浮誕者雖工必黜則風俗稍厚學術近正庶幾得忠實之士不至蹈衰季之風則天下幸甚謹録奏聞伏候敕旨按本傳熙寧四年王安石欲變科舉興學校詔兩制三館議之軾上議神宗悟曰吾固疑此得軾議意釋然矣即日召見問政事得失軾曰陛下求治太急聽言太廣進人太鋭願鎮以安靜待物之來然後應之神宗悚然其後安石卒更定其制迄今六百年無復以詩賦取士矣朱子云詩賦却無害理經義大不便分明是侮聖人之言蓋學者説經志在獵取功名而非求通於謨訓以漫讕不可方物之語而托之經義故曰侮聖人之言也宋時其弊已是如此夫欲山陬海澨皆知絃誦六經不以取士其道無由經義未始非善制然人之通經與否觀其詩賦豈不能知果是真金則盤盂叉釧何者非金奚必專求之礦沙礦沙亦有銅鐵不知者獲則取之矣軾議非謂經義不如詩賦蓋謂詩賦行之已久不必改用經義以得人之道全不在此耳古之取士自較後世精密然亦必廣收而器使以漸陶鑄而成其材若謂所取萬不失一則雖堯舜之世亦未必能之敷奏明試撻記侯明書言之矣然共工歡兜之屬又何自來獨非堯舜所取之士耶聖人亦只設為庠序學校以教之而已教之不厭其詳而取之不嫌其廣誠學校明而風俗厚則成人有德小子有造人才自必輩出不在貢舉之改法也軾議實為至允諫買浙燈狀熙寧四年正月某日殿中丞直史館判官告院權開封府推官蘇軾狀奏右臣嚮蒙召對便殿親奉德音以為凡在館閣皆當為朕深思治亂指陳得失無有所隱者自是以來臣每見同列未嘗不為道陛下此語非獨以稱頌盛德亦欲朝廷之間如臣等輩皆知陛下不以疏賤間廢其言共獻所聞以輔成太平之功業然竊謂空言率人不如有實而人自勸欲知陛下能受其言之實莫如以臣試之故臣願以身先天下試其小者上以補助聖明之萬一下以為賢者卜其可否雖以此獲罪萬死無悔臣伏見中使傳宣下府市司買浙燈四千餘盞有司具實直以聞陛下又令減價收買見已盡數拘收禁止私買以須上令臣始聞之驚愕不信咨嗟纍日何者竊為陛下惜此舉動也臣雖至愚亦知陛下遊心經術動法堯舜窮天下之嗜欲不足以易其樂盡天下之玩好不足以解其憂而豈以燈為悅者哉此不過以奉二宫之歡而極天下之養耳然大孝在乎養志百姓不可户曉皆謂陛下以耳目不急之玩而奪其口體必用之資賣燈之民例非豪户舉債出息畜之彌年衣食之計望此旬日陛下為民父母唯可添價貴買豈可減價賤酬此事至小體則甚大凡陛下所以減價者非欲以與此小民爭此毫末豈以其無用而厚費也如知其無用何必更索惡其厚費則如勿買且內庭故事每遇放燈不過令內東門雜物務臨時收買數目既少又無拘收督迫之嚴費用不多民亦無憾故臣願追還前命凡悉如舊京城百姓不慣侵擾恩德已厚怨讟易生可不慎歟可不畏歟近日小人妄造非語士人有展年科場之説商賈有京城𣙜酒之議吏憂減俸兵憂減廩雖此數事朝廷所決無而此紛紛亦有以見陛下勤恤之德未信於下而有司聚斂之意或形於民方當責己自求以消讒慝之口而臺官又勸陛下以嚴刑悍吏捕而戮之虧損聖德莫大於此而又重以買燈之事使得因緣以為口實臣實惜之方今百冗未除物力凋弊陛下縱出內帑財物不用大司農錢而內帑所儲孰非民力與其平時耗於不急之用曷若留貯以待乏絶之供故臣願陛下將來放燈與凡遊觀苑囿宴好賜豫之類皆飭有司務從儉約頃者詔旨裁減皇族恩例此實陛下至明至斷所以深計逺慮割愛為民然竊揆其間不能無少望於陛下惟當痛自刻損以身先之使知人主且猶若此而况於吾徒哉非惟省費亦且弭怨昔唐太宗遣使往涼州諷李大亮獻其名鷹大亮不可太宗深嘉之詔曰有臣若此朕復何憂明皇遣使江南採鵁鶄江州刺史倪若水論之為反其使又令益州織半臂背子琵琶捍撥鏤牙合子等蘇許公不奉詔李德裕在浙西詔造銀盝子妝具二十事織綾二千匹德裕上疏極論亦為罷之使陛下內之臺諫有如此數人者則買燈之事必須力言外之有司有如此數人者則買燈之事必不奉詔陛下聰明睿聖追迹堯舜而羣臣不以唐太宗明皇事陛下竊嘗深咎之臣忝備府寮親見其事若又不言臣罪大矣陛下若赦之不誅則臣又有非職之言大於此者忍不為陛下盡之若不赦亦臣之分也謹録奏聞伏候敕下軾既以議學校貢舉事稱旨遂諫買燈以嘗上意復見納乃言新法不便狀今考此篇可謂剴直無忌橫批逆鱗矣而神宗聽之如轉圜及論新法不便指斥安石則御史即托其推官職事按問既不得纎芥過則使之危不自安求知外郡到官嵗餘李定舒亶輩即希風承旨誣以謗訕朝廷下獄論死歐陽修謂言人主過失易言權臣過失難豈不信哉上神宗皇帝書熙寧四年二月某日殿中丞直史館判官告院權開封府推官蘇軾謹昧萬死再拜上書皇帝陛下臣近者不度愚賤輒上封章言買燈事自知瀆犯天威罪在不赦席藁私室以待斧鉞之誅而側聽逾旬威命不至問之府司則買燈之事尋己停罷乃知陛下不惟赦之又能聽之驚喜過望以至感泣何者改過不吝從善如流此堯舜禹湯之所勉強而力行秦漢以來之所絶無而僅有顧此買燈毫髮之失豈能上纍日月之明而陛下翻然改命曽不移刻則所謂智出天下而聽於至愚威加四海而屈於匹夫臣今知陛下可與為堯舜可與為湯武可與富民而措刑可與強兵而伏戎虜矣有君如此其忍負之惟當披露腹心捐棄肝腦盡力所至不知其它乃者臣知天下之事有大於買燈者矣而獨區區以此為先者蓋未信而諫聖人不與交淺言深君子所戒是以試論其小者而其大者固將有待而後言今陛下果赦而不誅則是既已許之矣許而不言臣則有罪是以願終言之臣之所欲言者三願陛下結人心厚風俗存紀綱而已人莫不有所恃人臣恃陛下之命故能役使小民恃陛下之法故能勝服強暴至於人主所恃者誰與書曰豫臨兆民凛乎若朽索之馭六馬言天下莫危於人主也聚則為君民散則為仇讐聚散之間不容毫釐故天下歸往謂之王人各有心謂之獨夫由此觀之人主之所恃者人心而已人心之於人主也如木之有根如燈之有膏如魚之有水如農夫之有田如商賈之有財木無根則稿燈無膏則滅魚無水則死農無田則飢商賈無財則貧人主失人心則亡此理之必然不可逭之災也其為可畏從古以然苟非樂禍好亡狂易喪志則孰敢肆其胸臆輕犯人心昔子産焚載書以弭衆言賂伯石以安巨室以為衆怒難犯專欲難成而孔子亦曰信而後勞其民未信則以為厲已也唯商鞅變法不顧人言雖能驟至富強亦以召怨天下使其民知利而不知義見刑而不見德雖得天下旋踵而失也至於其身亦卒不免負罪出走而諸侯不納車裂以徇而秦人莫哀君臣之間豈願如此宋襄公雖行仁義失衆而亡田常雖不義得衆而強是以君子未論行事之是非先觀衆心之向背謝安之用諸桓未必是而衆之所樂則國以乂安庾亮之召蘇峻未必非而勢有不可則反為危辱自古及今未有和易同衆而不安剛果自用而不危者也今陛下亦知人心之不悅矣中外之人無賢不肖皆言祖宗以來治財用者不過三司使副判官經今百年未嘗闕事今者無故又創一司號曰制置三司條例使六七少年日夜講求於內使者四十餘輩分行營幹於外造端宏大民實驚疑創法新竒吏皆惶惑賢者則求其説而不可得未免於憂小人則以其意而度朝廷遂以為謗謂陛下以萬乘之主而言利謂執政以天子之宰而治財商賈不行物價騰踊近自淮甸逺及川蜀喧傳萬口論説百端或言京師正店議置監官夔路深山當行酒禁拘收僧尼常住減刻兵吏廩祿如此等類不可勝言而甚者至以為欲復肉刑斯言一出民且狼顧陛下與二三大臣亦聞其語矣然而莫之顧者徒曰我無其事又無其意何恤於人言夫人言雖未必皆然而疑似則有以致謗人必貪財也而後人疑其盜人必好色也而後人疑其淫何者未置此司則無其謗豈去嵗之人皆忠厚而今嵗之人皆虛浮孔子曰工欲善其事必先利其器又曰必也正名乎今陛下操其器而諱其事有其名而辭其意雖家置一喙以自解市列千金以購人人必不信謗亦不止夫制置三司條例司求利之名也六七少年與使者四十餘輩求利之器也驅鷹犬而赴林藪語人曰我非獵也不如放鷹犬而獸自馴操網罟而入江湖語人曰我非漁也不如捐網罟而人自信故臣以為消讒慝以召和氣復人心而安國本則莫若罷制置三司條例司夫陛下之所以創此司者不過以興利除害也使罷之而利不興害不除則勿罷罷之而天下悅人心安興利除害無所不可則何苦而不罷陛下欲去積弊而立法必使宰相熟議而後行事若不由中書則是亂世之法聖君賢相夫豈其然必若立法不免由中書熟議不免使宰相此司之設無乃冗長而無名智者所圖貴於無迹漢之文景紀無可書之事唐之房杜傳無可載之功而天下之言治者與文景言賢者與房杜蓋事已立而迹不見功已成而人不知故曰善用兵者無赫赫之功豈惟用兵事莫不然今所圖者萬分未獲其一也而迹之布於天下已若泥中之鬭獸亦可謂拙謀矣陛下誠欲富國擇三司官屬與漕運使副而陛下與二三大臣孜孜講求磨以嵗月則積弊自去而人不知但恐立志不堅中道而廢孟軻有言其進鋭者其退速若有始有卒自可徐徐十年之後何事不立孔子曰欲速則不達見小利則大事不成使孔子而非聖人則此言亦不可用書曰謀及卿士至於庶人翕然大同乃底元吉若違多而從少則靜吉而作凶今上自宰相大臣既以辭免不為則外之議論斷亦可知宰相人臣也且不欲以此自汚而陛下獨安受其名而不辭非臣愚之所識也君臣宵旰幾一年矣而富國之效茫如捕風徒聞內帑出數百萬緡祠部度五千餘人耳以此為術其誰不能且遣使縱橫本非令典漢武遣繡衣直指桓帝遣八使皆以守宰狼籍盜賊公行出於無術行此下策宋文帝元嘉之政比於文景當時責成郡縣未嘗遣使至孝武以為郡縣遲緩始命臺使督之以至蕭齊此弊不革故景陵王子良上疏極言其事以為此等朝辭禁門情態即異暮宿村縣威福便行驅迫郵傳折辱守宰公私勞擾民不聊生唐開元中宇文融奏置勸農判官使裴寬等二十九人並攝御史分行天下招攜户口檢責漏田時張説楊瑒皇甫璟楊相如皆以為不便而相繼罷黜雖得户八十餘萬皆州縣希旨以主為客以少為多及使百官集議都省而公卿以下懼融威勢不敢異辭陛下讀之觀其所行為是為否近者均稅寬恤冠蓋相望朝廷亦旋覺其非而天下至今以為謗曽未數嵗是非較然臣恐後之視今亦猶今之視昔且其所遣尤不適宜事少而員多人輕而權重夫人輕而權重則人多不服或致侮慢以興爭事少而員多則無以為功必須生事以塞責陛下雖嚴賜約束不許邀功然人臣事君之常情不從其令而從其意今朝廷之意好動而惡靜好同而惡異指趣所在誰敢不從臣恐陛下赤子自此無寧嵗矣至於所行之事行路皆知其難何者汴水濁流自生民以來不以種稻秦人之歌曰涇水一石其泥數斗且溉且糞長我禾黍何嘗言長我粳稻耶今欲陂而清之萬頃之稻必用千頃之陂一嵗一淤三嵗而滿矣陛下遂信其説即使相視地形萬一官吏茍且順從真謂陛下有意興作上縻帑廩下奪農時隄防一開水失故道雖食議者之肉何補於民天下久平民物滋息四方遺利蓋略盡矣今欲鑿空訪尋水利所謂即鹿無虞豈惟徒勞必大煩擾凡有擘畫不問何人小則隨事酬勞大則量才録用若官私格沮並行黜降不以赦原若才力不辦興修便許申奏替換賞可謂重罰可謂輕然並終不言諸色人妄有申陳或官私誤興功役當得何罪如此則妄庸輕剽浮浪姦人自此爭言水利矣成功則有賞敗事則無誅官司雖知其疏豈可便行抑退所在追集老少相視可否吏卒所過雞犬一空若非灼然難行必須且為興役何則格沮之罪重而誤興之過輕人多愛身勢必如此且古陂廢堰多為側近冒耕嵗月既深已同永業茍欲興復必盡追收人心或搖甚非善政又有好訟之黨多怨之人妄言某處可作陂渠規壞所怨田産或指人舊業以為官陂冒田之訟必倍今日臣不知朝廷本無一事何苦而行此哉自古役人必用鄉户猶食之必用五穀衣之必用絲麻濟川之必用舟楫行地之必用牛馬雖其間或有以他物充代然終非天下所可常行今者徙聞江浙之間數郡雇役而欲措之天下是猶見燕晉之棗栗岷蜀之蹲鴟而欲以廢五穀豈不難哉又欲官賣所在坊場以充衙前雇直雖有長役更無酬勞長役所得既微自此必漸衰散則州郡事體憔悴可知士大夫捐親戚棄墳墓以從宦於四方者用力之餘亦欲取樂此人之至情也若凋弊太甚厨傳蕭然則似危邦之陋風恐非太平之盛觀陛下誠慮及此必不肻為且今法令莫嚴於御軍軍法莫嚴於逃竄禁軍三犯廂軍五犯大率處死然逃軍常半天下不知雇人為役與廂軍何異若有逃者何以罪之其勢必輕於逃軍則其逃必甚於今日為其官長不亦難乎近者雖使鄉户頗得雇人然至於所雇逃亡鄉户猶任其責今遂欲於兩稅之外别立一科謂之庸錢以備官雇則雇人之責官所自任矣自唐楊炎廢租庸調以為兩稅取大厯十四年應豫賦斂之數以定兩稅之額則是租調與庸兩稅既兼之矣今兩稅如故奈何復欲取庸聖人立法必慮後世豈可於兩稅之外别出科名哉萬一後世不幸有多欲之君輔之以聚斂之臣庸錢不除差役仍舊使天下怨毒推所從來則必有任其咎者矣又欲使坊郭等第之民與鄉户均役品官形勢之家與齊民並事其説曰周禮田不耕者出屋粟宅不毛者有里布而漢世宰相之子不免戍邊此其所以藉口也古者官養民今者民養官給之以田而不耕勸之以農而不力於是有里布屋粟夫家之征而民無所為生去為商賈事勢當耳何名役之且一嵗之戍不過三日三日之雇其直三百今世三大户之役自公卿以降毋得免者其費豈特三百而已大抵事若可行不必皆有故事若民所不悅俗所不安縱有經典明文無補於怨若行此二者必怨無疑女户單丁蓋天民之窮者也古之王者首務恤此而今陛下首欲役之此等茍非户將絶而未亡則是家有丁而尚幼若假之數嵗則必成丁而就役老死而沒官富有四海忍不加恤孟子曰始作俑者其無後乎春秋書作丘甲用田賦皆重其始為民患也青苗放錢自昔有禁今陛下始立成法每嵗常行雖云不許抑配而數世之後暴君汙吏陛下能保之歟異日天下恨之國史記之曰青苗錢自陛下始豈不惜哉且東南買絹本用現錢陜西糧草不許折兑朝廷既有著令職司又每舉行然而買絹未嘗不折鹽糧草未嘗不折鈔乃知青苗不許抑配之説亦是空文只如治平之初揀刺義勇當時詔旨慰諭明言永不戍邊著在簡書有如盟約於今幾日議論已搖或以代還東軍或欲抵換弓手約束難恃豈不明哉縱使此令決行果不抑配計其間願請之户必皆孤貧不濟之人家若自有贏餘何至與官交易此等鞭撻已急則繼之逃亡逃亡之餘則均之鄰保勢有必至理有固然且夫常平之為法也可謂至矣所守者約而所及者廣借使萬家之邑止有千斛而穀貴之際千斛在市物價自平一市之價既平一邦之民自足無操瓢乞丐之弊無里正催驅之勞今若變為青苗家貸一斛則千户之外孰救其飢且常平官錢常患其少若盡數收糴則無借貸若留充借貸則所糴幾何乃知常平青苗其勢不能兩立壞彼成法所喪愈多虧官害民雖悔何逮臣竊計陛下欲考其實必然問人人知陛下方欲力行必謂此法有利無害以臣愚見恐未可憑何以明之臣頃在陜西見刺義勇提舉諸縣臣常親行愁怨之民哭聲振野當時奉使還者皆言民盡樂為希合取容自古如此不然則山東之盜二世何緣不覺南詔之敗明皇何緣不知今雖未至於此亦望陛下審聽而已昔漢武之世財力匱竭用賈人桑𢎞羊之説買賤賣貴謂之均輸於時商賈不行盜賊滋熾幾至於亂孝昭既立學者爭排其説霍光順民所欲從而豫之天下歸心遂以無事不意今者此論復興立法之初其説尚淺徒言徙貴就賤用近易逺然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣然既以許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廩祿為費已厚非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以豫之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多今有人為其主牧牛羊不告其主而以一牛易五羊一牛之失則隱而不言五羊之獲則指為勞績陛下以為壞常平而言青苗之功虧商稅而取均輸之利何以異此陛下天機洞照聖略如神此事至明豈有不曉必謂已行之事不欲中變恐天下以為執德不一用人不終是以遲留嵗月庶幾萬一臣竊以為過矣古之英主無出漢髙酈生謀撓楚權欲復六國髙祖曰善趣刻印及聞留侯之言吐哺而罵曰趣銷印稱善未幾繼之以罵刻印銷印有同兒戲何嘗纍髙祖之知人適足明聖人之無我陛下以為可而行之知其不可而罷之至聖至明無以加此議者必謂民可與樂成難與慮始故陛下堅執不顧期於必行此乃戰國貪功之人行險僥幸之説陛下若信而用之則是徇髙論而逆至情持空名而邀實禍未及樂成而怨已起矣臣之所願結人心者此之謂也士之進言者為不少矣亦嘗有以國家之所以存亡厯數之所以長短告陛下者乎國家之所以存亡者在道德之淺深不在乎強與弱厯數之所以長短者在風俗之厚薄不在乎富與貧道德誠深風俗誠厚雖貧且弱不害於存而長道德誠淺風俗誠薄雖強且富不救於短而亡人主知此則知所輕重矣是以古之賢君不以弱而亡道德不以貧而傷風俗而智者觀人之國亦以此而察之齊至強也周公知其後有篡弒之臣衛至弱也季札知其後亡吳破楚入郢而陳大夫逢滑知楚之必復晉武既平吳何曽知其將亂隋文既平陳房喬知其不久元帝斬郅支朝呼韓功多於武宣矣偷安而王氏之釁生宣宗收燕趙復河湟力強於憲武矣消兵而龎勛之亂起故臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富強使陛下富如隋強如秦西取靈武北取燕薊謂之有功可也而國之長短則不在此夫國之長短如人之壽夭人之壽夭在元氣國之長短在風俗世有尫羸而壽考亦有盛壯而暴亡若元氣猶存則尫羸而無害及其已耗則盛壯而愈危是以善養生者慎起居節飲食道引關節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害則五臟和平而壽命長不善養生者薄節慎之功遲吐納之效厭上藥而用下品伐真氣而助強陽根本以空僵仆無日天下之勢與此無殊故臣願陛下愛惜風俗如護元氣古之聖人非不知深刻之法可以齊衆勇悍之夫可以集事忠厚近於迂闊老成初若遲鈍然終不肯以彼易此者知其所得小而所喪大也曹參賢相也曰慎無擾獄市黃霸循吏也曰治道去泰甚或譏謝安以清談廢事安笑曰秦用法吏二世而亡劉晏為度支專用果鋭少年務在急速集事好利之黨相師成風德宗初即位擢崔祐甫為相祐甫以道德寬大推廣上意故建中之政其聲翕然天下想望庶幾貞觀及盧杞為相諷上以刑名整齊天下馴致澆薄以及播遷我仁祖之馭天下也持法至寬用人有敘專務掩覆過失未嘗輕改舊章然考其成功則曰未至以言乎用兵則十出而九敗以言乎府庫則僅足而無餘徒以德澤在人風俗知義是以升遐之日天下如喪考妣社稷長逺終必賴之則仁祖可謂知本矣今議者不察徒見其末年吏多因循事不振舉乃欲矯之以苛察齊之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風已成且天時不齊人誰無過國君含垢至察無徒若陛下多方包容則人材取次可用必欲廣置耳目務求瑕疵則人不自安各圖茍免恐非朝廷之福亦豈陛下所願哉漢文欲拜虎圈嗇夫釋之以為利口傷俗今若以口舌捷給而取士以應對遲鈍而退人以虛誕無實為能文以矯激不仕為有德則先王之澤遂將散微自古用人必須歷試雖有卓異之器必有已試之功一則使其更變而知難事不輕作一則待其功髙而望重人自無辭昔先主以黃忠為後將軍而諸葛亮憂其不可以為忠之名望素非關張之倫若班爵遽同則必不悅其後關羽果以為言以黃忠豪勇之資以先主君臣之契尚須慮此况其他乎世嘗謂漢文不用賈生以為深恨臣嘗推究其旨竊謂不然賈生固天下之竒才所言亦一時之良策然請為屬國欲以係單于則是處士之大言少年之鋭氣昔髙祖以三十萬衆困於平城當時將相羣臣豈無賈生之比三表五餌人知其疏而欲以困中行説尤不可信矣兵凶器也而易言之正如趙括之輕秦李斯之易楚若文帝亟用其説則天下殆將不安使賈生嘗歷艱難亦必自悔其説用之晚嵗其術必精不幸喪亡非意所及不然文帝豈棄才之主絳灌豈蔽賢之士至於朝錯尤號刻薄文帝之世止於太子家令而景帝既立以為御史大夫申屠賢相發憤而死紛更政令天下騷然及至七國發難而錯之術亦窮矣文景優劣於斯可見大抵名器爵祿人所奔趨必使積勞而後遷以明持久而難得則人各安其分不敢躁求今若多開驟進之門使有意外之得公卿侍從跬步可圖其得者既不肯以僥幸自名則其不得者必皆以沉淪為歎使天下常調舉生妄心恥不若人何所不至欲望風俗之厚豈可得哉選人之改京官常須十年以上薦更險阻計析毫釐其間一事聲牙常至終身淪棄今乃以一人之薦舉而與之猶恐未稱章服隨至使積勞久次而得者何以厭服哉夫常調之人非守則令員多闕少久己患之不可復開多門以待巧者若巧者侵奪已甚則拙者迫怵無聊利害相形不得不察故近嵗朴拙之人愈少巧進之士益多惟陛下重之惜之哀之救之如近日三司獻言使天下郡選一人催驅三司文字許之先次指射以酬其勞則數年之後審官吏部又有三百餘人得先占闕常調待次不其愈難此外勾當發運均輸按行農田水利已振監司之體各懷進用之心轉對者望以稱旨而驟遷奏課者求為優等而速化相勝以力相髙以言而名實亂矣惟陛下以簡易為法以清淨為心使姦無所緣而民德歸厚臣之所願厚風俗者此之謂也古者建國使內外相制輕重相權如周如唐則外重而內輕如秦如魏則外輕而內重內重之弊必有姦臣指鹿之患外重之弊必有大國問鼎之憂聖人方盛而慮衰常先立法以救弊我國家租賦籍於計省重兵聚於京師以古揆今則似內重恭惟祖宗所以深計而預慮固非小臣所能臆度而周知然觀其委任臺諫之一端則是聖人過防之至計歷觀秦漢以及五代諫爭而死蓋數百人而自建隆以來未嘗罪一言者縱有薄責旋即超升許以風聞而無官長風采所繫不問尊卑言及乘輿則天子改容事關廊廟則宰相待罪故仁宗之世議者譏宰相但奉行臺諫風旨而已聖人深意流俗豈知臺諫固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折姦臣之萌而救內重之弊也夫姦臣之始以臺諫折之而有餘及其既成以干戈取之而不足今法令嚴密朝廷清明所謂姦臣萬無此理然而養貓以去鼠不可以無鼠而養不捕之貓畜狗以防姦不可以無姦而畜不吠之狗陛下得不上念祖宗設此官之意下為子孫立萬一之防朝廷紀綱孰大於此臣自幼小所記及聞長老之談皆謂臺諫所言常隨天下公議公議所與臺諫亦與之公議所擊臺諫亦擊之及至英廟之初始建稱親之議本非人主大過亦無禮典明文徒以衆心未安公議不允當時諫議以死爭之今者物論沸騰怨讟交至公議所在亦可知矣而相顧不發中外失望夫彈劾積威之後雖庸人亦可奮揚風采消委之餘雖豪傑有所不能振起臣恐自兹以往習慣成風盡為執政私人以致人主孤立紀綱一廢何事不生孔子曰鄙夫可與事君也歟其未得之也患不得之既得之患失之茍患失之無所不至矣臣始讀此書疑其太過以為鄙夫之患失不過備位而茍容及觀李斯憂蒙恬之奪其權則立二世以亡秦盧杞憂懷光之數其惡則誤德宗以再亂其心本生於患失而其禍乃至於喪邦孔子之言良不為過是以知為國者平居必有亡軀犯顏之士則臨難庶幾有徇義守死之臣若平居尚不能一言則臨難何以責其死節人臣茍皆如此天下亦曰殆哉君子和而不同小人同而不和和如和羮同如濟水孫寶有言周公大聖召公大賢猶不相悅著於經典晉之王導可謂元臣每與客言舉坐稱善而王述不悅以為人非堯舜安得每事盡善導亦斂袵謝之若使言無不同意無不合更唱迭和何者非賢萬一有小人居其間則人主何緣知覺臣之所願存紀綱者此之謂也臣非敢歷詆新政茍為異論如近日裁減皇族恩例刊定任子條式修完器械閲習鼓旗皆陛下神算之至明乾剛之必斷物譏既允臣敢有詞至於所獻之三言則非臣之私見中外所病其誰不知昔禹戒舜曰無若丹朱傲惟慢遊是好舜豈有是哉周公戒成王曰毋若商王受之迷亂酗於酒德成王豈有是哉周昌以漢髙為桀紂劉毅以晉武為桓靈當時人君曽莫之罪書之史册以為美談使臣所獻三言皆朝廷未嘗有此則天下之幸臣與有焉若有萬一似之則陛下安可不察然而臣之為計可謂愚矣以螻蟻之命試雷霆之威積其狂愚豈可數赦大則身首異處破壞家門小則削籍投荒流離道路雖然陛下必不為此何也臣天賦至愚篤於自信向者與議學校貢舉首違大臣本意已期竄逐敢意自全而陛下獨然其言曲賜召對從容久之至謂臣曰方今政令得失安在雖朕過失指陳可也臣即對曰陛下生知之性天縱文武不患不明不患不勤不患不斷但患求治太速進人太鋭聽言太廣又俾具述所以然之狀陛下頷之曰卿所獻三言朕當熟思之臣之狂愚非獨今日陛下容之久矣豈其容之於始而不赦之於終恃此而言所以不懼臣之所懼者譏刺既衆怨仇實多必將詆臣以深文中臣以危法使陛下雖欲赦臣而不得豈不殆哉死亡不辭但恐天下以臣為戒無復言者是以思之經月夜以繼晝表成復毁至於再三感陛下聽其一言懷不能已卒進其説惟陛下憐其愚忠而卒赦之不勝俯伏待罪憂恐之至黃震曰東坡之文如長江大河一瀉千里至其混浩流轉曲折變化之妙則無復可以名狀蓋能文之士莫之能尚也而尤長於指陳世事述敘民生疾苦方其年少氣鋭尚欲迅掃宿弊更張百度有賈太傅流涕太息之風及既懲創王氏一意忠厚思與天下休息其言切中民隱發越懇到使巖廊崇髙之地如親見閭閻哀痛之情有不能不惻然感動者真可垂訓萬世矣茅坤曰按蘇氏父子兄弟所上皇帝書不同老泉當仁廟時朝廷方尚安靜鬯德澤故其書大較勸主上務攬威權責名實長公次公當神廟時朝廷方變法令急富強故其書大較勸主上務省紛更持寬大然次公之言猶紆徐曲巽而長公之言似覺骨鯁痛切矣然三人中長公更勝其指陳利害似賈誼明切事情如陸贄讀古人文章須於此細細權衡方得他下手處御選唐宋文醇卷四十五
