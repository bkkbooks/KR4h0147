body:
  text: 南豐曽鞏文一雜著書序書魏鄭公傳與孫司封書謝杜相公書寄歐陽舍人書福州上執政書新序目録序列女傳目録序禮閣新儀目録序欽定四庫全書御選唐宋文醇卷五十四南豐曽鞏文一書魏鄭公傳豫觀太宗嘗屈已以從羣臣之議而魏鄭公之徒喜遭其時感知己之遇事之大小無不諫諍雖其忠誠自至亦得君以然也則思唐之所以治太宗之所以稱賢主而前世之君不及者其淵源皆出於此也能知其有此者以其書存也及觀鄭公以諫諍事付史官太宗怒之薄其恩禮失始終之義則未嘗不反覆嗟惜恨其不思而益知鄭公之賢焉夫君之使臣與臣之事君者何大公至正之道而已矣大公至正之道非滅人言以掩已過取小亮以私其君此其不可者也又有甚不可者夫以諫諍為當掩是以諫諍為非美也則後世誰復當諫諍乎況前代之君有納諫之美而後世不見則非惟失一時之公將使後世之君謂前代無諫諍之事是啓其怠且忌矣太宗末年羣下既知此意而不言漸不知天下之得失至于遼東之敗而始恨鄭公不在世未嘗知其悔之萌芽出于此也夫伊尹周公何如人也伊尹周公之諫切其君者其言至深而其事至迫存之於書未嘗掩焉至今稱太甲成王為賢君而伊尹周公為良相者以其書可見也令當時削而棄之成區區之小讓則後世何所據依而諫又何以知其賢且良與桀紂幽厲始皇之亡則其臣之諫詞無見焉非其史之遺乃天下不敢言而然也則諫諍之無傳乃此數君之所以益暴其惡於後世而已矣或曰春秋之法為尊親賢者諱與此戾矣夫春秋之所以諱者惡也納諫諍豈惡乎然則焚稿者非歟曰焚稿者誰歟非伊尹周公為之也近世取區區之小亮者為之耳其事又未是也何則以焚其稿為掩君之過而使後世傳之則是使後世不見稿之是非而必其過常在于君美常在于已也豈愛其君之謂歟孔光之去其稿之所言其在正邪未可知也而焚之而惑後世庸詎知非謀已之奸計乎或曰造辟而言詭辭而出異乎此曰此非聖人之所曽言也今萬一有是理亦謂君臣之間議論之際不欲漏其言於一時之人耳豈杜其告萬世也噫以誠信待已而事其君而不欺乎萬世者鄭公也益知其賢云豈非然哉豈非然哉鞏文以此篇為第一所為既沒其言立者歟按易曰含章可貞或從王事無成有終子曰善則稱君過則稱己則民作忠書君陳曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉周公孔子成王之言胥不若是而謂鞏之說可比於古之立言者何歟曰周公之言則孔子文言明之矣曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也隂不得自有美自有美斯惡矣雖有公旦之勳勞而使天下不知其出於王則亦惡矣雖百官總已以聽於周公而凡文告之辭必曰周公曰王若曰若今傳宣詔㫖者然可知明保沖子而終未嘗有一言一事之專成者公之美皆王之美也至於納誨則不然曰豫旦受人之徽言咸告孺子王矣公未嘗有所諱而讓也蓋無成之義在事立績成之時而納誨之辭在出謀發慮之始安得引易之語為議哉若孔子之言為人臣言也夫言豈一端而已夫各有所當也與父言依於慈與子言依於孝子與子相語而言父之不慈固為悖德父與父相語而唯言子之不孝則亦里巷小人之為矣孔子人臣為人臣言安得不云爾乎若鞏之言所以開後世人君之惑也况乎察言者如觀山焉移步換形逺近高低便不同在善領會者夫善則稱君善已成也過則稱己過已成也善之已成而身任之是悖易無成含章之義也過之已成而身任之是為尊者諱也孔子曰丘也幸茍有過人必知之之類是也若夫諫諍之事則善固未成而過亦未著其納諫而成善歟其善之大小未可知而先彰其納諫之美若決江河則尊吾君以舜也縱使過已成而改而之善歟過既改則過之大小不必問而唯見其改過之美改過不吝是尊吾君以湯也然則鞏之言正孔子所謂善則稱君之大者矣而奚有二焉惟諫不納而過已彰乃號於人曰吾嘗言之矣則為失人臣之義耳而豈鞏文之㫖哉若君陳之書則先儒辨之久矣葛真曰成王殆失言欲其臣善則稱君人臣之細行也君既有是心至於有過將使誰執哉禹聞善言則拜湯改過不吝端不為此言矣真德秀曰人臣自處者所當知若君以語其臣則不可也漢高祖稱李斯善則稱君王衛尉深非之衛尉之名不著然其言足為萬世法兩家之言當矣抑又有說焉孟子曰讀其書不知其人可乎是以論其世也成王之命君陳也周公既沒而使代其職以監殷頑民於下都也管蔡之亂未久成王親政亦未久安反側銷奸慝用恩用威與常事異其時勢必有當如是措置者而成王有此言也蓋自恐其德之未洽於天下也而豈謂易地皆然哉是又不得據君陳以非鞏矣與孫司封書運使司封閣下竊聞儂智高未反時已奪雍邑地而有之為吏者不能禦因不以告皇祐三年雍有白氣起廷中江水橫溢司户孔宗旦以為兵象策智高必反以書告其將陳拱拱不聽宗旦言不已拱怒詆之曰司户狂耶四年智高出橫山略其寨人因其倉庫而大賑之宗旦又告曰事急矣不可以不戒拱又不從凡宗旦之于拱以書告者七以口告者多至不可數度拱終不可得意即載其家走桂州曰吾有官守不得去吾親毋為與死此既行之二日智高果反城中皆應之宗旦猶力守南門為書召鄰兵欲拒之城亡智高得宗旦喜用之宗旦怒曰賊汝今立死吾豈可汙耶罵不絶口智高度終不可下乃殺之當其初使宗旦言不廢則雍之禍必不發發而吾有以待之則必無事使獨有此一善固不可不旌況其死節堂堂如是而其事未白於天下比見朝廷所寵贈南兵以來仗節死難之臣宗旦乃獨不與此非所謂曲突徙薪無恩澤焦頭爛額為上客邪使宗旦初無一言但賊至而能死不去固不可以無賞蓋先事以為備全城而保民者宜責之陳拱非宗旦事也今猥令與陳拱同戮既遺其言又負其節為天下者賞善而罰惡為君子者樂道人之善樂成人之美豈當如是邪凡南方之事卒至於破十餘州覆軍殺將喪元元之命竭山海之材者非其變發于隱伏而起于倉卒也內外上下有職事者初莫不知或隱而不言或忽而不備茍且偷託以至于不可禦耳有一人先能言者又為世所侵蔽令與罪人同罰則天下之事其誰復言邪聞宗旦非獨以書告陳拱當時為使者于廣東西者宗旦皆歷告之今彼既不能用懼重為已纍必不肯復言宗旦嘗告我也為天下者使萬事已理天下已安猶須力開言者之路以防未至之患況天下之事其可憂者甚衆而當世之患莫大于人不能言與不肯言而甚者或不敢言也則宗旦之事豈可不汲汲載之天下視聽發揚褒大其人以驚動當世邪宗旦喜學易所為注有可采者家不能有書而人或質問以易則貫穿馳騁至數十家皆能言其意事祖母盡心貧幾不能自存好議論喜功名鞏嘗與之接故頗知之則其所立亦非一時偶然發也世多非其在京東時不能自重至為世所指目此固一眚今其所立亦可贖矣鞏初聞其死之事未敢決然信也前後得言者甚衆又得其弟自言而聞祖袁州在廣東亦為之言然後知其事使雖有小差要其大槩不誣也況陳拱以下皆覆其家而宗旦獨先以其親遁則其有先知之效可知也以其性之喜事則其有先言之效亦可知也以閣下好古力學志樂天下之善又方使南方以賞罰善惡為職故敢以告其亦何惜須臾之聽尺紙之議博問而極陳之使其事白固有補于天下不獨一時為宗旦發也伏惟少留意焉如有未合願賜還答不宣鞏頓首國所以立者紀綱也綱以統紀紀以承綱紀亂而補苴罅漏雖不可少然國不至於無與立也曰綱在也綱廢則紀雖存亦弛而不能舉矣誤封疆者不可逋誅死封疆者不可遺恤是立國之綱也鞏所以勤勤於孔宗旦之事而必欲其白於天下歟謝杜相公書伏念昔者方鞏之得禍罰於河濱去其家四千里之逺南嚮而望迅河大淮埭堰湖江天下之險為其阻厄而以孤獨之身抱不測之疾煢煢路隅無攀緣之親一見之舊以為之託又無至行上之可以感人利勢下之可以動俗惟先人之醫藥與凡喪之所急不知所以為賴而旅櫬之重大懼無以歸者明公獨於此時閔閔勤勤營救護視親屈車騎臨於河上使其方先人之病得一意於左右而醫藥之有與謀至於既孤無外事之奪其哀而毫髮之私無有不如其欲莫大之喪得以卒致而南其為存全之恩過越之義如此竊惟明公相天下之道吟誦推說者窮萬世非如曲士汲汲一節之善而位之極年之高天子不敢煩以政豈鄉閭新學危苦之情藂細之事宜以徹於視聽而䝉省察然明公存先人之故而所以盡於鞏之德如此蓋明公雖不可起而寄天下之政而愛育天下之人材不忍一夫失其所之道出於自然推而行之不以進退而鞏獨幸遭明公於此時也在喪之日不敢以世俗淺意越禮進謝喪除又惟大恩之不可名空言之不足陳徘徊迄今一書之未進顧其慚生於心無須臾廢也伏惟明公終賜亮察夫明公存天下之義而無有所私則鞏之所以報於明公者亦惟天下之義而已誓心則然未敢謂能也大學始教宵雅肄三官其始也說者以為無私恩非孝子也無公義非忠臣也若是乎私恩公義之難並立而忠孝之致相妨乎奚其然也道在明孝則守先待後不事王侯正為朝廷端本明化忠之大也非公義歟道在明忠則能致其身使天下咸曰幸哉有子如此正為父母繼志述事孝之至也非私恩歟然則道一而已在人審其輕重而時措之耳世衰道微彛倫攸斁於是觀起與殺其父而世以為忠伍員教吳滅楚而世以為孝其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也此有若之所以歎也至於君臣朋友之間公義益以不明桀黠之徒以訐為直專於恩地加朘刻焉以求親媚於主上號於人曰不黨而不顧神人之所共怒其同流合汙者利相引害相扶前者唱于後者唱喁即至國步蔑資淪胥以敗而世猶諒之曰某與某有恩也豈不謬哉夫以私恩報私恩無異紵衣縞帶耳以公義報私恩則木桃瓊瑤也若廢公義以報私恩猶樹穀而得稗矣豈所以為報哉韓厥之舉愈彰趙孟之忠況所為公義者又非必盡若韓厥之事也哉夫人生平恩怨所不能無公義之不明吾不知其何以報恩矣鞏受杜衍匍匐救喪之厚德而矢以公義為報恩豈非真知輕重大丈夫哉王明清曰曽密公諱易占字不疑歐陽文忠識其碑曰少有大志知名江南為文忠所稱如此則其人固可想矣既以豪俠自任信州玉山令有過客楊南仲文采可喜氣概頗相投公厚贈其行會與郡將錢仙芝不叶捃托公以客所受為賄公引伏受垢不復自辨竟除名徙英州以赦自便將訴其事於朝行次南都而卒時公子南豐先生子固已名重於世適留京師而杜祁公以故相自來逆旅為辦後事寄歐陽舍人書鞏頓首載拜舍人先生去秋人還䝉賜書及所撰先大父墓碑銘反覆觀誦感與慚并夫銘志之著於世義近於史而亦有與史異者蓋史之於善惡無所不書而銘者蓋古之人有功德材行志義之美者懼後世之不知則必銘而見之或納於廟或存於墓一也茍其人之惡則於銘乎何有此其所以與史異也其辭之作所以使死者無有所憾生者得致其嚴而善人喜於見傳則勇於自立惡人無有所紀則以愧而懼至於通材達識義烈節士嘉言善狀皆見於篇則足為後法警勸之道非近乎史其將安近及世之衰人之子孫者一欲褒揚其親而不本乎理故雖惡人皆務勒銘以誇後世立言者既莫之拒而不為又以其子孫之所請也書其惡焉則人情之所不得於是乎銘始不實後之作銘者當觀其人茍託之非人則書之非公與是則不足以行世而傳後故千百年來公卿大夫至於里巷之士莫不有銘而傳者蓋少其故非他託之非人書之非公與是故也然則孰為其人而能盡公與是歟非畜道德而能文章者無以為也蓋有道德者之於惡人則不受而銘之於衆人則能辨焉而人之行有情善而迹非有意奸而外淑有善惡相懸而不可以實指有實大於名有名侈於實猶之用人非畜道德者惡能辨之不惑議之不徇不惑不徇則公且是矣而其辭之不工則世猶不傳於是又在其文章兼勝焉故曰非畜道德而能文章者無以為也豈非然哉然畜道德而能文章者雖或並世而有亦或數十年或一二百年而有之其傳之難如此其遇之難又如此若先生之道德文章固所謂數百年而有者也先祖之言行卓卓幸遇而得銘其公與是其傳世行後無疑也而世之學者每觀傳記所書古人之事至其所可感則往往䀌然不知涕之流落也況其子孫也哉況鞏也哉其追睎祖德而思所以傳之之繇則知先生推一賜於鞏而及其三世其感與報宜若何而圖之抑又思若鞏之淺薄滯拙而先生進之先祖之屯蹶否塞以死而先生顯之則世之魁閎豪傑不世出之士其誰不願進於門潛遁幽抑之士其誰不有望於世善誰不為而惡誰不愧以懼為人之父祖者孰不欲教其子孫為人之子孫者孰不欲寵榮其父祖此數美者一歸於先生既拜賜之辱且敢進其所以然所諭世族之次敢不承教而加詳焉愧甚不宣鞏再拜茅坤曰此書紆徑百折而感慨嗚咽之氣博大幽深之識溢於言外較之蘇長公謝張太保撰先人墓碣書特勝張英曰以畜道德而能文章歸美歐陽足見作銘之不易以此一義回旋轉折灑灑洋洋極唱歎游泳之致想見行文樂事福州上執政書鞏頓首再拜上書某官竊以先王之迹去今逺矣其可概見者尚存於詩詩存先王養士之法所以撫循待遇之者恩意可謂備矣故其長育天下之材使之成就則如蘿蒿之在大陵無有不遂其賓而接之出於懇誠則如鹿鳴之相呼召其聲音非自外至也其燕之則有飲食之具樂之則有琴瑟之音將其厚意則有幣帛筐篚之贈要其大㫖則未嘗不在於得其歡心其人材既衆列於庶位則如棫朴之盛得而薪之其以為使臣則寵其往也必以禮樂使其光華皇皇於逺近勞其來也則既知其功又本其情而叙其勤其以為將率則於其行也既送遣之又識薇蕨之始生而恐其歸時之晚及其還也既休息之又追念其悄悄之憂而及於僕夫之瘁當此之時后妃之於內助又知臣下之勤勞其憂思之深至於山脊石砠僕馬之間而志意之一至於雖采卷耳而心不在焉蓋先王之世待天下士其勤且詳如此故稱周之士也貴又稱周之士也肆而天保亦稱君能下下以成其政臣能歸美以報其上其君臣上下相與之際如此可謂至矣所謂必本其情而叙其勤者在四牡之三章曰王事靡盬不遑將父四章曰王事靡盬不遑將母而其卒章則曰豈不懷歸是用作歌將母來諗釋者以為諗告也君勞使臣叙述其情曰豈不誠思歸乎故作此詩之歌以養父母之志來告其君也既休息之而又追叙其情如此繇是觀之上之所以接下未嘗不恐失其養父母之心下之所以事上有養父母之心未嘗不以告也其勞使臣之辭則然而推至於戍役之人亦勞之以王事靡盬憂我父母則先王之政即人之心莫大於此也及其後世或任使不均或苦於征役而不得養其父母則有北山之感鴇羽之嗟或行役不已而父母兄弟離散則有陟岵之思詩人皆推其意見於國風所謂發乎情止乎禮義者也伏惟吾君有出乎數千載之大志方興先王之治以上繼三代吾相於時皆同德合謀則所以待天下之士者豈異於古士之出於是時者豈有不得盡其志邪鞏獨何人幸遇兹日鞏少之時尚不敢飾其固陋之質以干當世之用今髮齒日衰聰明日耗令其至愚固不敢有徼進之心況其少有知邪轉走五郡蓋十年矣未嘗敢有半言片辭求去邦域之任而冀倍朝廷之義此鞏之所以自處竊計己在聽察之日久矣今輒以其區區之腹心敢布於下執事者誠以鞏年六十老母年八十有八老母寓食京師而鞏守閩越仲弟守南越二越者天下之逺處也於著令有一人仕於此二邦者同居之親當逺仕者皆得不行鞏固不敢為不肖之身求自比於是也顧以道里之阻既不可御老母而南則非獨省晨昏承顔色不得效其犬馬之愚至於書問往還蓋以萬里非纍月踰時不通此白首之母子所以義不可以茍安恩不可以茍止者也方去嵗之春有此邦之命鞏敢以情告於朝而詔報不許屬閩有盜賊之事因不敢繼請及去秋到職閩之餘盜或數十百為曹伍者往往蟻聚於山谷桀黠能動衆為魁首者又以十數相望於州縣閩之室閭莫能寧而逺近聞者亦莫不疑且駭也州屬邑又有出於饑旱之後鞏於此時又不敢以私計自陳其於冦孽屬前日之屢敗士氣既奪而吏亦無可屬者其於經營既不敢以輕動迫之又不敢以少縱玩之一則諭以招納一則戒以剪除既而其悔悟者自相拘執以歸其不變者亦為士吏之所係獲其魁首則或縻而致之或殲而去之自冬至春逺近皆定亭無枹鼓之警里有家室之樂士氣始奮而人和始洽至於風雨時若田出自倍今野行海涉不待朋儔市粟麵米價減什七此皆吾君吾相至仁元澤覆冒所及故冦旱之餘曽未期嵗既安且富至於如此鞏與斯民與䝉其幸方地數千里既無一事繫官於此又已彌年則可以將母之心告於吾君吾相未有易於此時也伏惟推古之所以待士之詳思勞歸之詩本士大夫之情而及於其親逮之以即乎人心之安或還之闕下或處以閒曹或引之近畿屬之一郡使得諧其就養之心慰其高年之母則仁治之行豈獨昏愚得䝉賜於今日其流風餘法傳之永久後世之士且將賴此其無北山之怨鴇羽之譏陟岵之歎蓋行之甚易為德於士類者甚廣惟留意而圖之不宣鞏頓首茅坤曰子固以宦游閩徼不得養母本風雅以為陳情之案而其反復咏歎藹然盛世之音此子固之文所以上擬劉向而非近代所及也新序目録序劉向所集次新序三十篇録一篇隋唐之世尚為全書今可見者十篇而已臣既考正其文字因為其序論曰古之治天下者一道德同風俗蓋九州之廣萬民之衆千嵗之逺其教已明其習已成之後所守者一道所傳者一說而已故詩書之文歷世數十作者非一而其言未嘗不相為終始化之如此其至也當是之時異行者有誅異言者有禁防之又如此其備也故二帝三王之際及其中間嘗更衰亂而餘澤未熄之時百家衆說未有能出於其間者也及周之末世先王之教化法度既廢餘澤既熄世之治方術者各得其一偏故人奮其私智家尚其私學者蜂起於中國皆明其所長而昧其短矜其所得而諱其失天下之士各自為方而不能相通世之人不復知夫學之有統道之有歸也先王之遺文雖在皆絀而不講況至於秦為世之所大禁哉漢興六藝皆得於斷絶殘脫之餘世無復明先王之道以一之者諸儒茍見傳記百家之言皆悅而嚮之故先王之道為衆說之所蔽暗而不明鬱而不發而怪竒可喜之論各師異見皆自名家者誕漫於中國一切不異於周之末世其弊至於今尚在也自斯以來天下學者知折衷於聖人而能純於道德之美者揚雄氏或可耳如向之徒皆不免乎為衆說之所蔽而不知有所折衷者也孟子曰待文王而後興者凡民也豪傑之士雖無文王猶興漢之士豈無明先王之道以一之者哉亦其出於是時者豪傑之士少故不能特起於流俗之中絶學之後也蓋向之序此書於今為最近古雖不能無失然逺至舜禹而次及於周秦以來古人之嘉言善行亦往往而在也要在慎取之而已故臣既惜其不可見者而校其可見者特詳焉亦足以知臣之攻其失豈好辨哉臣之所不得已也編校書籍臣曽鞏上鞏序謂新序三十篇而今之新序僅十篇耳雖其事不盡實録要其所以為法戒不悖於道勝韓詩外傳之屬矣鞏謂向之徙皆不免乎為衆說之所蔽而不知有所折衷而教人以慎擇就十篇觀之無有也顧未知餘二十篇何如豈後人去其疵纍而存其精英邪列女傳目録序劉向所叙列女傳凡八篇事具漢書向列傳而隋書及崇文總目皆稱向列女傳十五篇曹大家注以頌義考之蓋大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰母及東漢以來凡十六事非向書本然也蓋向舊書之亡久矣嘉祐中集賢校理蘇頌始以頌義為篇次復定其書為八篇與十五篇者並藏於館閣而隋書以頌義為劉歆作與向列傳不合今驗頌義之文盡向之自叙又藝文志有向列女傳頌圖明非歆作也自唐之亂古書之在者少矣而唐志録列女傳凡十六家至大家注十五篇者亦無録然其書今在則古書之或有録而亡或無録而在者亦衆矣非可惜哉今校讐其八篇及其十五篇者已定可繕寫初漢承秦之敝風俗已大壞矣而成帝後宫趙衛之屬尤自放向以為王政必自內始故列古女善惡所以致興亡者以戒天子此向述作之大意也其言太任之娠文王也目不視惡色耳不聽淫聲口不出敖言又以為古之人胎教者皆如此夫能正其視聽言動者皆大人之事而有道者之所畏也顧令天下之女子能之何其盛也以臣所聞蓋為之師傅保姆之助詩書圖史之戒珩璜琚瑀之節威儀動作之度其教之者雖有此具然古之君子未嘗不以身化也故家人之義歸於反身二南之業本於文王夫豈自外至哉世皆知文王之所以興能得內助而不知所以然者蓋本於文王之躬化故內則后妃有關雎之行外則羣臣有二南之美與之相成其推而及逺則商辛之昏俗江漢之小國兔罝之野人莫不好善而不自知此所謂身修故家國天下治者也後世自學問之士多徇於外物而不安其守其家室既不見可法故競於邪侈豈獨無相成之道哉士之茍於自恕顧利冒恥而不知反已者往往以家自纍故也故曰身不行道不行於妻子信哉如此人者非素處顯也然去二南之風亦已逺矣況於南鄉天下之主哉向之所述勸戒之意可謂篤矣然向號博極羣書而此傳稱詩芣苡柏舟大車之類與今序詩者之說尤乖異蓋不可考至於式微之一篇又以為二人之作豈其所取者博故不能無失歟其言象計謀殺舜及舜所以自脫者頗合於孟子然此傳或有之而孟子所不道者蓋亦不足道也凡後世諸儒之言經傳者固多如此覽者采其有補而擇其是非可也故為之叙論以發其端云編校館閣書籍臣曽鞏序朱子曰關雎雖若專美太姒而實以深見文王之德序者徒見其詞而不察其意遂一以后妃為主而不復知有文王是固已失之矣至於化行國中三分天下亦皆以為后妃之所致則是禮樂征伐皆出於婦人之手而文王者徒擁虛器以為寄生之君也其失甚矣惟南豐曽氏之言竊謂庶幾得之黃震曰南豐疑此傳稱芣苡柏舟大車之類與今詩序不合蓋不思今序衛宏所作出向之後也儲欣曰深探經術懸為日月不刋之書禮閣新儀目録序禮閣新儀三十篇韋公肅撰記開元以後至元和之變禮史館祕閣及臣書皆三十篇集賢院書二十篇以參相校讐史館祕閣及臣書多復重其篇少者八集賢院書獨具然臣書有目録一篇以考其次序蓋此書本三十篇則集賢院書雖具然其篇次亦亂既正其脫謬因定著從目録而禮閣新儀三十篇復完夫禮者其本在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法逺矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎視聽言動之間者也然而古今之變不同而俗之便習亦異則法制度數其久而不能無弊者勢固然也故為禮者其始莫不宜於當世而其後多失而難遵亦其理然也失則必改制以求其當故羲農以來至於三代禮未嘗同也後世去三代蓋千有餘嵗其所遭之變所習之便不同固已逺矣而議者不原聖人制作之方乃為設其器制其物為其數立其文以待其有事而為其起居出入吉凶哀樂之具者當一一以追先王之迹然後禮可得而興也至其說之不可求其制之不可考或不宜於人不合於用則寧至於漠然而不敢為使人之言動視聽之間蕩然莫之為節至患夫為罪者之不止則繁於為法以禦之故法至於不勝其繁而犯者亦至於不勝其衆豈不惑哉蓋上世聖人有為耒耜者或不為宫室為舟車者或不為棺椁豈其智不足為哉以為人之所未病者不必改也至於後聖有為宫室者不以土處為不可變也為棺椁者不以葛溝為不可易也豈好為相反哉以為人之所既病者不可因也又至於後聖則有設兩觀而更采椽之質攻文梓而易瓦棺之素豈不能從儉哉以為人情之所好能為之節而不能變也由是觀之古今之變不同而俗之便習亦異則亦屢變其法以宜之何必一一以追先王之迹哉其要在於養民之性防民之欲者本末先後能合乎先王之意而已此制作之方也故瓦樽之尚而薄酒之用太羮之先而庶羞之飽一以為貴本一以為親用則知有聖人作而為後世之禮者必貴俎豆而今之器用不廢也先辨冕而今之衣服不禁也其推之皆然然後其所改易更革不至於拂天下之勢駭天下之情而固已合乎先王之意矣是以羲農以來至於三代禮未嘗同而制作之如此者未嘗異也後世不惟其如此而或至於不敢為或為之者特出於其勢之不可得已故茍簡而不能備希濶而不常行又不過用之於上而未有加之於民者也故其禮本在於養人之性而其用在於言動視聽之間者歷千餘嵗民未嘗得接於耳目況於服習而安之者乎至其陷於罪戾則繁於為法以禦之其亦不仁也哉此書所紀雖其事已淺然凡世之記禮者亦皆有所本而一時之得失具焉昔孔子於告朔愛其禮之存況於一代之典籍哉故其書不得不貴故為之定著以俟夫論禮者考而擇焉鞏論禮與蘇軾之語如出一人軾之文雄快至於縝密純粹固遜於鞏也若鞏所言禮行而財用可充則固軾之所未及而經世之要㫖在焉惜鞏亦未嘗究極言之也古之人飲食衣服宫室兆域莫不立之等威使無僭差曰以辨上下定民志匪曰以此富民也然而富民莫要於是蓋古之聖王自公卿士大夫以至於庶民蚤已計耕者之所穫與祿足代耕之數為之品節限制而行之於等威之中天下之民習見習聞無其位自必恥用其物非特畏而不敢用也故奢侈之俗不待禁而自無既無越分之侈用則其所宜用者財自足以供而不至於匱此聖王使民仰足事父母俯足畜妻子仁恩誠莫大焉者也秦漢以來古制蕩然競以奢侈相尚用之無藝賈誼云庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也相沿以至於今若河決下流而東注其孰為之砥柱乎然民情不相逺有其舉之亦莫敢壞也如今日者親王郡王得以蟒繡為坐具等威在焉則雖有放僻邪侈之人不敢以蟒繡為坐具公然入朝市者也若卧具則有力者雖庶人並得為之而莫或禁一卧具可作數坐具然坐具則公卿不敢卧具則庶人得用之而無非者以為等威不在是則無所畏與恥故也由一坐具而推之固無往不然矣天之所生地之所養人力之所用其為財止有此數不過相流轉於天地之中賴君上留餘之以惠斯民然亦不能當人人用之無藝也況乎其朘民之膏以附上也為人上者人人解衣衣之推食食之亦甚勞而難遍矣況乎既遍之後又豈容絶而不更續也然則以法活人法立而利無窮其安可不講於禮乎王志堅曰困學紀聞云禮閣新儀則指新法襄州長渠則指水利兵間詩則指徐德占論交詩則指李吉甫按南豐嘗作懷友以遺荆公公答以同學荆公答段縫書為南豐辨謗南豐亦薦荆公於蔡學士其相知如此後荆公得志而不為茍同又如此子固真君子人也張英曰禮因人情能為之節而不能變此實確論出入經史其言典醇濃縟閎博淵雅南豐之所擅長也御選唐宋文醇卷五十四
