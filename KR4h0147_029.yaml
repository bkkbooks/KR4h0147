body:
  text: 廬陵歐陽修文八劄子論乞令百官議事劄子論美人張氏恩寵宜加裁損劄子論澧州瑞木乞不宣示外廷劄子請駕不幸溫成廟劄子論臺諫官唐介等宜早牽復劄子論逐路取人劄子論刪去九經正義中讖緯劄子論議濮安懿王典禮劄子欽定四庫全書御選唐宋文醇卷二十九廬陵歐陽修文八論乞令百官議事劄子臣伏見祖宗時猶用漢唐之法凡有軍國大事及大刑獄皆集百官參議蓋聖人愼於臨事不敢專任獨見欲採天下公論擇其所長以助不逮之意也方今朝廷議事之體與祖宗之意相背每有大事祕不使人知之惟小事可以自決者却送兩制定議兩制知非急務故忽略拖延動經年嵗其中時有一兩事體大者亦與小事一例忽之至於大事祕而不宣此尤不便當處事之始雖侍從之列皆不與聞己行之後事須彰布縱有乖誤却欲論列則追之不及況外廷百官疏逺者雖欲有言陛下豈得而用哉所以兵興數年西北二方纍有事宜處置多繆者皆由大臣自無謀慮而杜塞衆見也臣今欲乞凡有軍國大事度外廷須知而不可祕密者如北敵去年有請合從與不合從西戎今嵗求和當許與不當許凡如此事之類皆下百官廷議隨其所見同異各令署狀而陛下擇其長者而行之不惟愼重大事廣採衆見兼又於庶官寒賤踈逺人中時因議論可見其髙材敏識者國家得以用之若百官都無所長則自用廟堂之議至於小事並乞只令兩府自定其錢榖合要見本末則召三司官吏至兩府討尋供析而使大臣自擇至於禮法亦可召禮官法官詢問如此則事之大小各得其體如允臣所請且乞將西戎請和一事先集百官廷議取進止汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮顧又曰君不密則失臣臣不密則失身幾事不密則害成何哉曰軍國大事人人共知而不可祕密者古先哲王固不特謀及卿士而且謀及庶人矣若夫事之未成而定命於幾先則不特無謀及庶人之理即在廷卿士自不得人人與聞以害其成也嗟乎偏聽生姦獨任成弊如修所云大臣自無謀慮而杜塞衆見者固以不能集思廣益而處置多差然如修所云下百官廷議隨其所見同異各令署狀者亦歸於有治人無治法耳詩不云乎謀夫孔多是用不集發言盈廷誰敢執其咎為人君者博採其論則人各欲售其私説以圖其意中所欲得而不顧其它棄之不採則人各緘默取容以聽大官之臆決而萬口附和是非卿尹旅牧各得其人則修之此議亦徒然耳甚哉期事之集必期謀之臧而期謀之臧必期才之衆國無賢才則國空虗濟濟多士文王以寧蒿目斯世不能不讀修此議而三歎也論美人張氏恩寵宜加裁損劄子臣近風聞禁中因皇女降生於左藏庫取綾羅八千匹染院工匠當此大雪苦寒之際敲冰取水染練供應頗甚艱辛臣伏見陛下恭儉勤勞愛民憂國似此勞人枉費之事必不肯為然外議相傳皆云見今染練未絶臣又見近日內降美人張氏親戚恩澤太頻臣忝為諫官每聞小有虧損聖德之事須合力言難避天譴臣竊見自古帝王所寵嬪御若能謙儉柔善不求恩澤則可長保君恩或恣意驕奢多求恩澤則皆速致禍敗臣不敢逺引古事只以今宫禁近事言之陛下近年所寵尚氏楊氏余氏苗氏之類當其被寵之時驕奢自恣不早裁損及至滿盈今皆何在況聞張氏本良家子昨自修媛退為美人中外皆聞以為與楊尚等不同故能保寵最久今一旦宫中取索頓多恩澤日廣漸為奢侈之事以招外人之言臣不知陛下欲愛惜保全張氏或欲縱恣而敗之若欲保全則須常令謙儉不至驕盈臣料八千匹綾羅必非張氏一人獨用不過支散與衆人而巳乃是枉費財物盡為衆人至於中外譏議則陛下自受以此而言廣散何益昨正月二日曹氏封縣君至初五日又封郡君四五日間兩度封拜又聞别有內降應是疏逺親戚盡求恩澤父母因子而貴可矣然名分亦不可太過其他疏逺皆可減罷臣謂張氏未入宫之前疏逺親戚各皆何在今日富貴何必廣為間人自招謗議以纍聖德若陛下只為張氏計亦宜如此況此事不獨為張氏大凡後宫恩澤太多宫中用度奢侈皆是虧損聖德之事繫於國體臣合力言伏望聖慈防微杜漸早為裁損取進止張氏仁宗美人卒諡溫成皇后初仁宗寵張氏欲以為后太后難之乃立郭崇之孫為后繼而見廢世儒謂仁宗夫婦間未免大圭之玷也然郭后廢而曹后立史載曹后事迹亦不減女中堯舜然則其所為張美人當亦必有取焉而非僅以色升歟歐陽修此疏讀者必曰仁宗亦蠱於女色否則必曰歐陽修彰君之過而使此文傳至於今也為此解者不特不識歐陽修亦不識仁宗夫牀第之愛而當時文學侍從之臣得直言無忌如此非聖賢而能致然乎論澧州瑞木乞不宣示外廷劄子臣近聞澧州進柿木成文有太平之道四字其知州馮載本是武人不識事體便為祥瑞以媚朝廷臣謂前世號稱太平者須是四海晏然萬物得所方今西羌叛逆未平之患在前北方驕悖藏伏之禍在後一患未滅一患己萌加以西則瀘戎南則湖嶺凡與四夷連接無一處無事而又內則百姓困弊盜賊縱橫昨京西陜西出兵八九千人捕數百之盜不能一時剪滅只是僅能潰散然却於别處結集今張海雖死而逹州軍賊巳近百人又殺使臣其勢不小興州又奏八九千人州縣皇皇何以存濟以臣觀之乃是四海騷然萬物失所實未見太平之象臣聞天道貴信示人不欺臣不敢逺引他事只以今年內事驗之昨夏秋之間太白經天纍月不滅金木相掩近在端門考於星占皆是天下大兵將起之象豈有才出大兵之象又出太平之道字一嵗之內前後頓殊豈非星象麗天異不虛出凡於戒懼常合修省而草木萬類變化無常不可信憑便生懈怠臣又思若使木文不偽實是天生則亦有深意蓋其文止曰太平之道者其意可推也夫自古帝王致太平皆自有道得其道則太平失其道則危亂臣視方今但見其失未見其得也願陛下憂勤萬務舉賢納善常如近日不生逸豫則三二嵗間漸期修理若以前賊張海等小衰便謂後賊不足憂以近京得雪便謂天下大豐熟見北敵未來便謂必無事見西賊通使便謂可罷兵指望太平漸生安逸則此瑞木乃誤事之妖木耳臣見今年曽進芝草者今又進瑞木竊慮四方相效爭造妖妄其所進瑞木伏乞更不宣示臣寮仍乞速詔天下州軍告以興兵纍年四海困弊方當責巳憂勞之際凡有竒禽異獸草木之類並不得進獻所以彰示聖德感勵臣民取進止元史臣謂真宗英悟之主而天書一事吁可駭怪及修遼史乃知遼俗尚禨而明鬼故神道設教假以動敵人之聽消覬覦而偃兵革耳然而計亦末矣仁宗以天書殉葬賢哉歐陽修作蜀王建世家論謂自古王者殊祥異瑞並見於五代而又皆萃於蜀惑者可以思焉蓋深以為非也及是澧州獻瑞木成文遂慷慨論列不顧忌諱修於真宗之非自欺而仁宗之必不裕蠱雖若不相知者顧其論正而言忠則可為後世法也請駕不幸溫成廟劄子臣伏見今月八日聖旨疏決禁囚特行減降及軍士各有特支陛下聖慈本以興國寺奉安真宗皇帝御容有此恩旨而中外之議紛然不一皆云正月八日是溫成皇后周年故有此特支疏決又見聖駕朝謁萬壽宫又云溫成畫像在彼所以聖駕親臨蓋為自去年追册溫成皇后之後朝廷每於典禮過極優崇遂致議者動皆疑惑今又聞來日聖駕幸奉先寺酌獻宣祖皇帝外議喧然又云溫成皇后祠廟在彼伏以陛下聖德仁孝本為祖宗神御以時酌獻不可使中外議者言陛下意在追念後宫寵愛託名以謁祖宗虧損聖德其事不細臣欲乞明日幸奉先寺酌獻畢更不臨幸溫成祠廟以解中外之疑以止議者之説臣職忝侍從無所禆補聞外人議論不敢不言不惟臣有愛君之心合具陳述陛下舉動為萬世法亦不可不愼取進止唐太宗文德皇后既葬帝即苑中作層觀以望昭陵引魏徴同升徴熟視曰臣眊昏不能見帝指示之徴曰此昭陵邪帝曰然徴曰臣以為陛下望獻陵若昭陵臣固見之矣帝泣為毁觀歐陽修請駕不幸溫成廟與徴後先輝映矣夫咸恆為後天卦首古先哲王亦與人同其情況存亡之際乎然惟情之無過不及處乃為禮禮失則情乖情乖則民志惑厚於所當薄即已薄於所當厚本亂而末不可得而治故雖一舉足一出言而子孫黎民之能保不能保係焉以禮制心然後能垂裕於後昆此忠臣志士之所以惓惓於其君也然則太宗之不若魏徴仁宗之不若歐陽修固若是乎曰奚其然也君者表也臣者影也觀影之直則知表之正影與表可曰二哉況善言者出於口而無窮善行者備厥萬而猶闕言易行難何往不然獨是臣能言之於君則匪為言也乃其行也然君能聽而改之則言者臣之虛言聽者君之實行矣千虛不如一實曷可貶實而崇虛哉成湯之聖也曰改過不吝聖不聖於無過而聖於改過然過之作也己覺之而巳改之猶未足以云聖人之大心也惟人覺之而巳改之則天下之人之心莫非其心而博厚配地髙明配天矣是非太宗仁宗之所可當也必也舜乎舜好問而好察邇言必也孔子乎孔子曰丘也幸茍有過人必知之舜與孔子固全之若此二事者乃太宗仁宗之能得乎舜與孔子百之一而榮莫大焉者也俗士以徴有言即謂太宗不如徴修有言即謂仁宗不如修是人我之見不亡而元首股肱之義由以日喪也論臺諫官唐介等宜早牽復劄子臣材識庸暗碌碌於衆人中蒙陛下不次拔擢置在樞府其於報效自宜如何而自居職以來己逾半嵗凡事關大體必須衆議之協同其餘日逐進呈皆是有司之常務至於謀猷啓沃蔑爾無聞上辜聖恩下愧清議人雖未責臣豈自安所以日夜思惟願竭愚慮茍有可採冀禆萬一臣近見諫官唐介臺官范師道等因言陳旭事得罪或與小郡或竄逺方陛下自臨御已來擢用諍臣開廣言路雖言者時有中否而聖慈每賜優容一旦臺諫聨翩被逐四出命下之日中外懼疑臣雖不知臺諫所言是非但見唐介范師道皆久在言職其人立朝各有本末前後補益甚多豈於此時頓然改節故為欺罔上昧聖聰在於人情不宜有此臣竊以為自古人臣之進諫於其君者有難有易各因其時而巳若剛暴猜忌之君不欲自聞其過而樂聞臣下之過人主好察多疑於上大臣側足畏罪於下於此之時諫人主者難而言大臣者易若寬仁恭儉之主動遵禮法自聞其失則從諫如流聞臣下之過則務為優容以保全之而為大臣者外秉國權內有左右之助言事者未及見聽而怨仇巳結於其身故於此時諫人主者易言大臣者難此不可不察也自古人主之聽言也亦有難有易在知其術而巳夫忠邪並進於前而公論與私言交入於耳此所以聽之難也若知其人之忠邪辨其言之公私則聽之易也凡言拙而直逆耳違意初聞若可惡者此忠臣之言也言婉而順希旨合意初聞若可喜者邪臣之言也至於言事之官各舉其職或當朝正色顯言於廷或連章列署共論其事言一出則萬口爭傳衆目共視雖欲為私其勢不可故凡明言於外不畏人知者皆公言也若非其言職又不敢顯言或密奏乞留中或靣言乞出自聖斷不欲人知言有主名者蓋其言涉傾邪懼遭彈劾故凡隂有奏陳而畏人知者皆挾私之説也自古人主能以此術知臣下之情則聽言易也伏惟陛下仁聖寬慈躬履勤儉樂聞諫諍容納直言其於大臣尤所優禮常欲保全終始思與臣下愛惜名節尤愼重於進退故臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳目所記景祐中范仲淹言宰相吕夷簡貶知饒州皇祐中唐介言宰相文彥博貶春州别駕至和初吳中復吕景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼貶知蔡州今又唐介等五人言陳旭得罪自范中淹貶饒州後至今凡二十年間居臺諫者多矣未聞有規諫人主而得罪者臣故謂方今諫人主則易言大臣則難陛下若推此以察介等所言則可知其用心矣昨所罷黜臺諫五人惟吕誨入臺未久其他四人出處本末迹狀甚明可以歷數也唐介前因言文彥博逺竄廣西煙瘴之地賴陛下仁恕哀憐移置湖南得存性命范師道趙抃並因言忤劉沆罷臺職守外郡連延數年然後復今三人者又以言樞臣罷黜然則介不以前蹈必死之地為懼師道與抃不以中滯進用數年為戒遇事必言得罪不悔蓋所謂進退一節終始不變之士也至如王陶者本出孤寒只因韓絳薦舉始得臺官及絳為中丞陶不敢內顧私恩與之爭議絳終得罪夫牽顧私恩人之常情爾斷恩以義非知義之士不能也以此言之陶可謂徇公滅私之臣矣此四人者出處本末之迹如此可以知其為人也就使言雖不中亦其情必無他議者或謂言事之臣好相朋黨動搖大臣以作威勢臣竊以為不然介與師道不與絳為黨乃與諸臺諫共論絳為非然則非相朋黨非欲動搖大臣可明矣固謂未可以此疑言事之臣也況介等比者雖在謫官幸蒙陛下寬恩各得為郡未至失所其可惜者斥逐諫臣非朝廷美事阻塞言路不為國家之利而介等盡忠守節未蒙憐察也欲望聖慈特賜召還介等置之朝廷以勸守節敢言之士則天下幸甚今取進止陳子龍曰當時公在樞府而拳拳以諫官為言大臣為國之心可謂深矣論逐路取人劄子臣伏見近有臣僚上言乞將南省考試舉人各以路分糊名於逐路每十人解一人等事雖巳奉聖旨送兩制詳定臣亦有愚見合具敷陳竊以國家取士之制比於前世最號至公蓋纍聖留心講求曲盡以為王者無外天下一家故不問東西南北之人盡聚諸路貢士混合為一而惟材是擇又糊名謄録而考之使主司莫知為何方之人誰氏之子不得有所憎愛薄厚於其間故議者謂國家科場之制雖未復古法而便於今世其無情如造化至公如權衡祖宗以來不可易之制也傳曰無作聰明亂舊章又曰利不百者不變法今言事之臣偶見一端即議更改此臣所區區欲為陛下守祖宗之法也臣所謂偶見一端者蓋言事之人但見每次科場東南進士得多而西北進士得少故欲改法使多取西北進士爾殊不知天下至廣四方風俗異宜而人性各有利鈍東南之俗好文故進士多而經學少西北之人尚質故進士少而經學多所以科場取士東南多取進士西北多取經學者各因其材性所長而各隨其多少取之今以進士經學合而較之則其數均若必論進士則多少不等此臣所謂偏見之一端其不可者一也國家方以官濫為患取士數必難增若欲多取西北之人則却須多減東南之數今東南州軍進士取解者二三千人處只解二三十人是百人取一人蓋己痛裁抑之矣西北州軍取解至多處不過百人而所解至十餘人是十人取一人比之東南十倍假借之矣若至南省又減東南而增西北是巳裁抑者又裁抑之己假借者又假借之此其不可者二也東南之士於千人中解十人其初選己精矣故至南省所試合格者多西北之士學業不及東南當發解時又十倍優假之蓋其初選己濫矣故至南省所試不合格者多今若一例以十人取一人則東南之人合格而落者多矣西北之人不合格而得者多矣至於他路理不可齊偶有一路合格人多亦限以十一落之偶有一路合格人少亦須充足十一之數使合落者得合得者落取舍顛倒能否混淆其不可者三也且朝廷專以較藝取人而使有藝者屈落無藝者濫得不問繆濫只要諸路數停此其不可者四也且言事者本欲多取諸路土著之人若此法一行則寄應者爭趨而往今開封府寄應之弊可驗矣此所謂法出而姦生其不可者五也今廣南東西路進士例各絶無舉業諸州但據數解發其人亦自知無藝只來一就省試而歸冀作攝官爾朝廷以嶺外煙瘴北人不便須藉攝官亦許其如此今若一例與諸路十人取一人此為繆濫又非西北之比此其不可者六也凡此六者乃大概爾若舊法一壞新議必行弊濫隨生何可勝數故臣以為且遵舊制但務擇人推朝廷至公待四方如一惟能是選人自無言此乃當今可行之法爾若謂士習浮華當先考行就如新議亦須只考程試安能必取行實之人議者又謂西北近敵士要牢籠此甚不然之論也使不逞之人不能為患則巳茍可為患則何方無之前世賊亂之臣起於東南者甚衆其大者如項羽蕭銑之徒是巳至如黃巢王仙芝之輩又皆起亂中州者爾不逞之人豈專西北矧貢舉所設本待材賢牢籠不逞當别有術不在科場也惟事久不能無弊有當留意者然不須更改法制止在振舉綱條爾近年以來舉人盛行懷挾排門大譟免冠突入虧損士風傷敗善類此由舉人既多而君子小人雜聚所司力不能制雖朝廷素有禁約條制甚嚴而上下因循不復申舉惟此一事為科場大患而言事者獨不及之願下有司議革其弊此當今科場之患也臣忝二宰司預聞國論茍不能為陛下守祖宗之法而言又不足取信於人主則厚顔尸祿豈敢偷安而久處乎故猶此強言乞賜裁擇觀修此疏知東南文字之盛自宋仁宗時已然而解額之不能均亦復與今一轍顧嘗論之虞廷之取士也曰敷奏以言明試以功周室之取士也曰或以德進或以事舉或以言揚然則取人以言固屬一端即使文風日正經學日明而所為科目出身者亦止是三代以上言揚之一未可謂此外必無賢才況所較者僅在聲調格律時尚之細以此而欲重東南而輕西北誠非帝王馭世之大公矣特是時移勢易古今不同故虞廷之所為明試以功周室之所為德進事舉者後世用之益以滋亂不若科目之法猶可驅天下使誦法孔子澤躬於六經忽不自知其入於義理之域且其法易以防間統百年而計之公者猶得什九是以不得不專用其法豈曰經世之士盡出於能文者也故就文章而論則選額之不可以地均誠如修之所云以用人而論其不得不以地均之者亦天下之大勢有不能因噎以廢食者修有試進士䇿問取士之法而極論其難較之此疏更為千古確論論刪去九經正義中讖緯劄子臣伏見國家近年以來更定貢舉之科以為取士之法建立學校而勤養士之方然士子文章未純節行未篤不稱朝廷勵賢興善之意所以化民成俗之風臣愚以為士之所本在乎六經而自暴秦焚書聖道中絶漢興收拾亡逸所存無幾或殘編斷簡出於屋壁而餘齡昏眊得其口傳去聖既逺莫可考證偏學異説因自名家然而授受相傳尚有師法暨晉宋而下師道漸亡章句之篇家藏私畜其後各為箋傳附著經文其説存亡以時好惡學者芒昧莫知所歸至唐太宗時始詔名儒撰定九經之疏號為正義凡數百篇自爾以來著為定論凡不本正義者謂之異端則學者之宗師百世之取信也然其所載既博所擇不精多引讖緯之書以相雜亂怪竒詭僻所謂非聖之書異乎正義之名也臣欲乞特詔名儒學官悉取九經之疏刪去讖緯之文使學者不為怪異之言惑亂然後經義純一無所駁雜其用功至少其為益則多臣愚以為欲使士子學古勵行而不本六經欲學六經而不去其詭異駁雜欲望功化之成不可得也伏望聖慈下臣之言付外詳議今取進止暴秦焚書六經亡軼漢儒掇拾遺言各立門户其幸而傳至今日者固其守先待後之功而詐偽繁興亦莫甚於彼時而於其中敢於誣天蔑聖者則以讖緯為甚讖緯之書莫知所自起王莽篤好之其下遂相與詐造欺蒙以售其私而莽又明知其欺而樂用之以愚黔首而借以篡漢天下蓋亂臣賊子之言也而託諸孔子然既託諸孔子則雖以光武之賢猶不能無惑焉唐作九經正義猶引用其説歐陽修疏請削除見亦偉矣惜猶未曾抉其底裏痛掃溉之以解後世惑也夫讖緯之託諸聖言者為其前知也為其知天也中庸曰至誠之道可以前知又曰思知人不可以不知天疑若似矣顧差若毫釐即謬以千里夫天者理也敘則為典秩則為禮立之為三綱行之為五常三綱立五常行則人無道夭物極則長而所為生生之謂易者行乎其間乾坤於以不毁三綱頽五常廢則人物凋喪漸消漸燬以至於無而乾坤息故孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也孔子之所為知天而可以前知者如是而己若夫繼周而為漢漢帝姓劉孔子安得知之而又何用知之哉孔子葬母既封矣雨甚而墓崩孔子不能前知也而謂孔子知沙丘崩為漢元王皇后之祥乎國語有之曰吾非瞽史安知天道蓋盲者業專其藝必精故能以數測氣推現至隱如禆竈梓慎京房焦贛之流猶古瞽史之遺見於史氏代不乏人然其為術所為文史星厯近於卜祝之間者又奚得與六經語孟治天下之大經大法錯處雜陳而謂聖之所以為聖在此也哉况夫王莽時劉歆輩所造姦言直是執左道以亂政又安可令其託於孔子惑世誣民而莫之正耶漢承七國之後聖逺道微言厖事雜故如所傳斬蛇交龍等事猶與篝火狐鳴一轍蕭曹輩皆未嘗學問不知正其前失轉艷稱於後世後世惑之王莽遂乘之以移其社稷當途典午更用之以滅其子孫而輾轉相滅由是訛以傳訛暴以易暴八代十六國之交視弒君篡國為天之所命聖之所記史臣津津稱道之嗚呼人心若此幾何其不入於禽獸也又如晉王嘉拾遺記等書所稱黃帝金支玉葉武王白魚流烏之類謂自古帝王受命之符罔不如是夫刪書斷自唐虞既有其事周孔必述之周孔不述其誣可知王嘉輩何能從千載以後而得千載以前之事其博洽過於周孔如是也其為拾漢魏之遺漦誣帝王以神怪不待明者而決矣書曰天視自我民視天聽自我民聽民心之所歸是乃天之符命耳人者萬物之靈也天地之心也五行之秀氣也不觀之人而觀之雲物鳥獸何其榮末而虐本歟亦異乎聖人之言矣陋儒不察遂使讖緯之文述之學校被之閭閻雖婦人小子亦同然一辭其所以為人心之害者豈細故哉論議濮安懿王典禮劄子臣伏見朝廷議濮安懿王典禮兩制禮官請稱皇伯中書之議以為事體至大理宜慎重必合典故方可施行而皇伯之稱考於經史皆無所據方欲下三省百官博訪羣議以求其當陛下屈意手詔中罷而衆論紛然至今不己臣以為衆論雖多其説不過有三其一曰宜稱皇伯者是無稽之臆説也其二曰簡宗廟致水災者是厚誣天人之言也其三曰不當用漢宣哀為法以干亂統紀者是不原本末之論也臣請為陛下條列而辨之謹按儀禮喪服記曰為人後者為其父母報報者齊衰期也謂之降服以明服可降父母之名不可改也又按開元開寶禮國朝五服年月喪服令皆云為人後者為其所生父齊衰不杖期蓋以恩莫重於所生故父母之名不可改義莫重於所繼故寧抑而降其服此聖人所制之禮著之六經以為萬世法者是中書之議所據依也若所謂稱皇伯者考於六經無之方今國朝見行典禮及律令皆無之自三代之後秦漢以來諸帝由藩邸入繼大統者亦皆無之可謂無稽之臆説矣夫儀禮者聖人六經之文開元禮者有唐三百年所用之禮開寶通禮者聖宋百年所用之禮五服年月及喪服令亦皆祖宗纍朝所定方今天下共行之制今議者皆棄而不用直欲自用無稽之臆説此所以不可施行也其二曰簡宗廟致水災者臣伏以上天降災皆主人事故自古聖王逢災恐懼多求闕政而修之或自知過失而改悔之庶幾以塞天譴然皆須人事巳著於下則天譴為形於上今者濮王之議本因兩制禮官違經棄禮用其無稽之臆説欲定皇伯之稱中書疑其未可施行乃考古今典禮雖有明據亦未敢自信而自專方更求下外廷博議而陛下遽詔中罷欲使有司徐求典禮是則臣下慎重如此人君謙畏如此君臣不敢輕議妄舉而天遽譴怒殺人害物此臣所謂厚誣天也議猶未決仍罷不議而便謂兩統二父以致天災者厚誣人也其三引漢宣哀之事者臣謹按漢書宣帝父曰悼皇考初稱親諡曰悼置奉邑寢園而已其後改親稱皇考而立廟京師皇考者親之異名爾皆子稱其父之名也漢儒初不以為非也自元帝以後貢禹韋玄成等始建毁廟之議數十年間毁立不一至哀帝時大司徒平晏等百四十七人奏議云親諡曰悼裁置奉邑皆應經義是不非宣帝稱史皇孫為親也所謂應經義者即儀禮云為人後者為其父母報是也惟其立廟京師亂漢祖宗昭穆故晏等以為兩統二父非禮宜毁也定陶恭王初但號共皇立廟本國師丹亦無所議至其後立廟京師欲去定陶不繫以國有進干漢統之過丹遂大非之故丹議云定陶恭皇諡號巳前定議不得復改而但論立廟京師為不可爾然則稱親置園皆漢儒所許以為應經義者惟去其國號立廟京師則不可爾今言事者不究朝廷本議何事不尋漢臣所非者何事此臣故謂不原本末也中書之議本謂稱皇伯無稽而禮經有不改父名之義方議名號猶未定故尊崇之禮皆未及議而言事者便引漢去定陶國號立廟京師之事厚誣朝廷以為干亂大統何其過論也夫去國號而立廟京師以亂祖宗昭穆此誠可非之事若果為此議宜乎指臣等為姦邪之臣而人主有過舉之失矣其如陛下之意未嘗及此而中書亦初無此議而言事者不原本末過引漢世可非之事以為説而外廷之臣又不審知朝廷本議如何但見言事者云云遂以為欲加非禮干亂統紀信為然矣是以衆口一辭紛然不止而言事者欲必遂其皇伯無稽之説牽引天災恐迫人主而中書守經執禮之議反指以為姦邪之言朝廷以言事之臣禮當優容不欲與之爭辨而外廷羣論又不可家至而户曉是非之理不辨上下之情不通此所以呶呶而不止也夫為人後者既以所後為父矣而聖人又存其所生父名者非曲為之意也蓋自有天地以來未有無父而生之子也既有父而生則不可諱其所生矣夫無子者得以宗子為後是禮之所許也然安得無父而生之子以為後乎此聖人所以不諱無子者立人之子以為後亦不諱為人後者有父而生蓋不欺天不誣人也故為人後者承其宗之重任其子之事而不得復歸於本宗其所生父母亦不得往與其事至於喪服降而抑之一切可以義斷惟其父母之名不易者理不可易也易之則欺天而誣人矣子為父母服謂之正服出為人後者為本生父母齊衰期謂之降服又為所後父斬衰三年謂之義服今若以本生父為皇伯則濮安懿王為從祖父反為小功而濮王夫人是本生嫡母也反為義服自宗懿以下本生兄弟於禮雖降猶為大功是禮之齊衰期今反為小功禮之正服今反為義服上於濮王父也反服小功於宗懿等兄弟也反服大功此自古所以不稱所生父為伯父叔父者稱之則禮制乖違人倫錯亂如此也伏惟陛下聰明睿聖理無不燭今衆人之議如彼中書之議如此必將從衆乎則衆議不見其可欲違衆乎則自古為國未有違衆而能舉事者願陛下霈然下詔明告中外以皇伯無稽決不可稱而今所欲定者正名號爾至於立廟京師干亂統紀之事皆非朝廷本議庶幾羣疑可釋若知如此而猶以為必稱皇伯則雖孔孟復生不能復為之辨矣按史仁宗以同祖兄濮王元讓子宗實為皇子是為英宗治平元年宰相韓琦等奏請下有司議合行典禮詔須大祥後議之二年乃詔禮官與待制以上議翰林學士王圭等謂宜凖先朝封贈期親尊屬故事尊以髙官大國於是中書奏王圭等所議未見詳定濮王當何稱名與不名圭等議宜稱皇伯而不名中書又奏禮與令出繼之子於所繼所生皆稱父母又漢宣光武皆稱皇考今圭等議稱皇伯於典禮未有明據請下尚書省集三省御史臺議奏方議而皇太后手詔詰責執政於是詔權罷議令有司博求典故以聞禮官范鎮等又奏請如王圭等議御史吕誨彈歐陽修首建邪議韓琦曽公亮趙槩附會不正之罪固請如王圭等議既而內出皇太后手詔可令皇帝稱親濮王稱皇夫人並稱后英宗即日手詔曰稱親之禮謹遵慈訓追崇之典豈易克當其以塋為園即園立廟俾王子孫奉祠翌日誨等繳敇家居待罪英宗命閣門以告還之誨等力辭臺職誨等既出而濮議亦寢修此疏當在皇太后詰責執政而英宗手詔罷議之時也觀宋諸臣所見雖不同要非若明臣張璁桂萼等諂上希旨為進用階梯也顧核諸先王緣人情以制禮本天性以立則之旨歐陽之議自是至當而當日英宗處置盡善亦可謂無遺憾矣乃後世猶齗齗焉謂稱皇伯之是者蓋以當日司馬溫公諸賢並與王圭同議也夫君子亦不能無過有過不害為君子然君子之過亦不可從一以理為斷而巳世傳朱子亦以歐陽為非謂其疑於兩父其説曰辟若仁宗與濮王俱在世則為英宗者可皆稱為父乎顧未知朱子實有是説邪抑門弟子附會之詞也不可考矣夫所為伯仲叔季者行第之稱古人伯則曰伯父叔則曰叔父無去父而止稱伯叔者曲禮云王官之長天子同姓謂之伯父九州之牧天子同姓謂之叔父者是也又如魯頌曰王曰叔父小雅曰既有肥牡以速諸父經籍所載不可備舉何得謂為二父乎伯父叔父諸父本生父同義也獨於所繼止謂之父則亦足以昭重宗之義合降期之意矣乃必諱其父之稱而稱皇伯何其無稽也人之生父生之此天也非人也其名可以意為改者哉或曰若然則不得為人後矣為人後者人為之豈天為之邪曰固天為之也自身而上有父天也自父而上有祖亦天也由父視之則有己子與兄弟之子之分由祖視之則均之為孫矣均之為孫則天也非人矣宋時諸臣固亦於此有未能脫然者又哀仁宗大賢而無子必欲泯濮王之迹以消其餘憾而朝堂之上紛呶不己英宗不欲明其是非而兩置之遂成千秋疑案有宋君臣是者固無非矣其非者猶是君子之過也然而延及明嘉靖帝諸臣遂執宋臣之議以死爭哭於闕下帝剛愎少恩盡收付廷尉而賢材為之一空於是佞人虱其間熒惑譸張盡變明代祖宗成憲與賢士大夫風尚而明亦寖衰而寖亡矣於戲士君子持論揆諸天理民彛之衷少有偏倚則其毒流於後世如此可不愼哉御選唐宋文醇卷二十九
