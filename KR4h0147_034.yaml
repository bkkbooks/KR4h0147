body:
  text: 眉山蘇洵文一雜著權書心術篇權書法制篇權書孫武篇權書六國篇衡論重逺篇衡論廣士篇欽定四庫全書御選唐宋文醇卷三十四眉山蘇洵文一權書心術篇為將之道當先治心泰山崩于前而色不變麋鹿興于左而目不瞬然後可以制利害可以待敵凡兵上義不義雖利勿動非一動之為害而他日將有所不可措手足也夫惟義可以怒士士以義怒可以百戰凡戰之道未戰養其財將戰養其力既戰飬其氣既勝養其心謹烽燧嚴斥堠使耕者無所顧忌所以養其財豐犒而優遊之所以養其力小勝益急小挫益厲所以養其氣用人不盡其所欲為所以養其心故士常蓄其怒懷其欲而不盡怒不盡則有餘勇欲不盡則有餘貪故雖并天下而士不厭兵此黃帝之所以七十戰而兵不殆也不養其心一戰而勝不可用矣凡將欲智而嚴凡士欲愚智則不可測嚴則不可犯故士皆委已而聽命夫安得不愚夫惟士愚而後可與之皆死凡兵之動知敵之主知敵之將而後可以動于險鄧艾縋兵於穴中非劉禪之庸則百萬之師可以坐縛彼固有所侮而動也故古之賢將能以兵嘗敵而又以敵自嘗故去就可以决凡主將之道知理而後可以舉兵知勢而後可以加兵知莭而後可以用兵知理則不屈知勢則不沮知莭則不窮見小利不動見小患不避小利小患不足以辱吾技也夫然後可以支大利大患夫惟養技而自愛者無敵於天下故一忍可以支百勇一靜可以制百動兵有長短敵我一也敢問吾之所長吾出而用之彼將不與吾校吾之所短吾蔽而置之彼將強與吾角奈何曰吾之所短吾抗而暴之使之疑而却吾之所長吾隂而養之使之狎而墮其中此用長短之術也善用兵者使之無所顧有所恃無所顧則知死之不足惜有所恃則知不至于必敗尺箠當猛虎奮呼而操擊徒手遇蜥蜴變色而却步人之情也知此者可以將矣袒裼而按劍則烏獲不敢逼冠胄衣甲據兵而寢則童子彎弓殺之矣故善用兵者以形固夫能以形固則力有餘矣易師上六曰大君有命開國承家小人勿用朱子作本義謂小人雖有功亦不可使之得有爵土但優以金帛可也異日又曰小人既一例有功爵土何能不及只是勿更用與謀議經畫耳林希元謂小人立功不得不一例賞以爵邑若一例賞以爵邑又恐播惡于衆不若于行師之初不用之為愈也我聖祖仁皇帝謂林氏之說深合卦意焉嘗謂君子雖簞食豆羮之細猶必勵舍生取義之莭况乎軍旅之事國之大事也而顧唯利所在不以義為衡尚詭道詐力曰兵事然也若然則行師者當専用小人矣周公何以曰小人勿用孔子何以曰必亂邦哉今觀蘇洵云凡兵上義不義雖利勿動非一動之為害而他日將有所不可措手足固于師卦之㫖有合也夫義者利之和也易曰利有攸往利涉大川惟其義之至乃真利之大失義即失利此非特虛言其理也逮至于不可措手足之日而後知其果然失利而悔已晚也為此者必自小人矣未有師中之丈人而肯為國家動不義之兵者也且兵者刑也國語所謂大刑用甲兵是也必也矢石所加其人皆罪應死而後可以用兵是故王者之師有赦弗誅之人無濫誅之人弗誅者脅從罔治也其誅者皆不可並生者也兵交鋒接曷由區分之使銖兩不差乎要其為我所殺者無無罪之人則可斷也我之士卒豈能無一傷且死然傷且死即已納之于忠義之域而死已榮于生傷已榮于全矣非殺之也夫然兵乃可以動且夫王者之于死獄也猶將求其生而不得然後死者與我皆無憾夫獄之死者一二人耳而乃如是若夫行師則所殺者必非止一二人也轉使千百無罪之人履腸塗腦而不顧豈聖人好生之德亦有時而息而民之無辜聖人亦有時而殺哉惟其天戈所指必不至殺一不辜故謂之曰王者之師若見利忘義雖以此得天下正伯夷伊尹與孔子之所必不為也况其茍一時之勝自以為利而未見他日之害者哉蘇洵曰凡兵上義未已也凡兵上仁權書法制篇將戰必審知其將之賢愚與賢將戰則持之與愚將戰則乘之持之則容有所伺而為之謀乘之則一舉而奪其氣雖然非愚將勿乘乘之不動其禍在我分兵而迭進所以持之也并力而一戰所以乘之也古之善軍者以刑使人以賞使人以怒使人而其中必有以義附者焉不以戰不以掠而以備急難故越有君子六千人韓之戰秦之鬬士倍於晉而出穆公于淖者赦食馬者也兵或寡而易危或衆而易叛莫難于用衆莫危於用寡治衆者法欲繁繁則士難以動治寡者法欲簡簡則士易以察不然則士不任戰矣惟衆而繁雖勞不害為強以衆入險阻必分軍而踈行夫險阻必有伏伏必有約軍分則伏不知所擊而其約擕矣險阻懼蹙踈行以紓士氣兵莫危于攻莫難於守客主之勢然也故地有二不可守兵少不足以實城城小不足以容兵夫惟賢將能以寡為衆以小為大當敵之衝人莫不守我以疑兵彼愕不進雖告之曰此無人彼不信也度彼所襲潜兵以備彼不我測謂我有餘夫何患兵少偃旗仆鼓寂若無氣嚴戢兵士敢譁者斬時令老弱登陴示怯乘懈突擊其衆可走夫何患城小背城而戰陳欲方欲踞欲密欲緩夫方而踞密而緩則士心固固則不懾背城而戰欲其不懾面城而戰陳欲直欲鋭欲疏欲速夫直而鋭踈而速則士心危危則致死面城而戰欲其致死夫能靜而自觀者可以用人矣吾何為則怒吾何為則喜吾何為則勇吾何為則怯夫人豈異于我天下之人孰不能自觀其一身是以知此理者塗之人皆可以將平居與人言一語不循故猶且􅌓而忌敵以形形我恬而不怪亦已固矣是故智者視敵有無故之形必謹察之勿動疑形二可疑於心則疑而為之謀心固得其實也可疑於目勿疑彼敵疑我也是故心疑以謀應目疑以靜應彼誠欲有所為邪不使吾得之目矣觀九五曰觀我生君子無咎象曰觀我生觀民也說者謂觀我生而皆君子也則無咎觀我生觀民也者言觀我生即所以觀民也洵謂能靜而自觀者可以用人知此理者塗之人可以將其有見于是乎夫無事時所以治吏民者即有事時所以治軍旅靜而自觀吾何喜何怒何勇何怯而知人之無異於我于是所欲與聚所惡勿施則所以厚生者在是矣所欲所惡惟其理不惟其欲而以行其與聚勿施之政則所以正德者亦在是矣此無事時所以治吏民者也及其有事而以治軍旅觀吾之何以喜知人之不異吾所喜而不喜者不以加諸人則必與士卒同甘苦矣觀吾之何以怒知人之不異吾所怒而有以善用其怒則一乃心而百其勇矣觀吾之何以勇知人之不異吾所勇而以道義配血氣則人皆樂其死而恥獨生矣觀吾之何以怯知人之不異吾所怯而先為其不可敗則戰必勝而攻必取矣孔子曰爼豆之事則嘗聞之矣軍旅之事未嘗學也聖人豈以軍旅為不當學哉未有學養子而后嫁者也殺人之事於何可學孔子不又曰我戰則克祭則受福乎軍旅之學誠不出乎爼豆之間也如曰吾善為陳吾善為戰無論殺人盈野正王者之大罪人且必如戰國如五代然後人人習于軍旅而有善為陳善為戰之人必若人而後可為將則承平數百年不見兵革必無良將也而豈其然哉權書孫武篇求之而不窮者天下竒才也天下之士與之言兵而曰我不能者幾人求之於言而不窮者幾人言不窮矣求之於用而不窮者幾人嗚呼至于用而不窮者吾未之見也孫武十三篇兵家舉以為師然以吾評之其言兵之雄乎今其書論竒權密機出入神鬼自古以兵著書者罕所及以是而揣其為人必謂有應敵無窮之才不知武用兵乃不能必克與書所言逺甚吳王闔廬之入郢也武為將軍及秦椘交敗其兵越王入踐其國外禍內患一旦迭發吳王奔走自救不暇武殊無一謀以弭斯亂若按武之書以責武之失凡有三焉九地曰威加于敵則交不得合而武使秦得聽包胥之言出兵救椘無忌吳之心斯不威之甚其失一也作戰曰久暴師則鈍兵挫鋭屈力殫貨則諸侯乘其弊而起且武以九年冬伐椘至十年秋始還可謂久暴矣越人能無乘間入國乎其失二也又曰殺敵者怒也今武縱子胥伯嚭鞭平王尸復一夫之私忿以激怒敵此司馬戍子西子期所以必死讐吳也勾踐不頽舊塜而吳服田單譎燕掘墓而齊奮知謀與武逺矣武不逹此其失三也然始吳能以入郢乃因胥嚭唐蔡之怒及乘椘瓦之不仁武之功蓋亦鮮耳夫以武自為書尚不能自用以取敗北况區區祖其故智餘論者而能將乎且吳起與武一體之人也皆著書言兵世稱之曰孫吳然而吳起之言兵也輕法制草略無所統紀不若武之書詞約而意盡天下之兵說皆歸其中然吳起始用于魯破齊及入魏又能制秦兵入椘楚復霸而武之所為反如是書之不足信也固矣今夫外御一𨽻內治一妾是賤丈夫亦能夫豈必有一人而教之及夫御三軍之衆闔營而自固或且有亂然則是三軍之衆惑之也故善將者視三軍之衆與視一𨽻一妾無加焉故其心常若有餘夫以一人之心當三軍之衆而其中恢恢然猶有餘地此韓信之所以多多而益辦也故夫用兵豈有異術哉能勿視其衆而已矣言兵者祖太公六韜使太公果有書未有不見稱于仲尼之徒者然則六韜固後人所託而太公本無書也隂符握竒不知誰氏所作或亦曰太公蓋亦出孫吳之流歟古稱曺操用兵仿佛孫吳孫吳自古所重唐宋以來試武舉必以孫吳世俗遂謂用兵之道在聖人六經之外又疑孫吳之書人所共見必若子房所受于圯上老人者乃發天地之祕作僞之徒又造為黃石素書以行于世皆大謬妄可笑左傳曰天生五材民並用之廢一不可誰能去兵論語曰足食足兵兵大事也聖人寧有不著之於經者六經之言兵者多已莫備于易易于同人於夬於萃於既未濟之屬皆言兵而専言之者師也至其微言之者莫若謙與豫謙之六五曰利用侵伐無不利上六曰利用行師征邑國豫曰利建侯行師蓋必其在已也如山之處于地中無絲毫侈大之念然後可以為天地裒多益寡舉兵以征不服其在天下也如雷之奮出於地雖震驚百里而百果草木仰受時雨之甘螟螣蟊賦倐焉掃迹而後其行師也不特殺人之中有禮焉且殺人之中有樂焉是以文王於豫曰利行師孔子於豫曰先王以作樂也若夫坤之六二坤之師也周公繫其爻曰直方大不習無不利夫直方而大則為將之道備矣師直為壯曲為老不使一毫之曲在已而後可以用三軍之命內志既直矣外體又必方不使一毫之邪僻在身而後有以服三軍之心夫然三軍之心為一心三軍之身為一身所至如時雨又若水之行地然入江併江入河併河可使天下無二水夫是之謂大誠其修之身者如此則雖倉卒之間有敵國外患俾之將百萬兵而曰閫以外將軍制之固不至于改其常度而喪其匕鬯也而又何習焉故曰不習無不利也洵謂善將者視三軍之衆與視一𨽻一妾無加故其心常若有餘洵誠善狀古良將之心者耶雖然不能直方大固不得強視百萬兵為一𨽻一妾也程子曰韓信多多益辦只為分數明夫所謂分數明亦不出乎直方大之義蓋理必該數圓者理也方者數也竒而圎將帥所握以應無窮耦而方士卒所倚以明部位體必八而後方而其用則以六方之所由成由直而矩之者也是故古者陳必以八而唐太宗改為六非八非六則分數不能以明分數既明則衆不殊乎寡而小可極其大矣或曰管子之論兵也曰兵幸於權老子之論兵也曰以正治國以竒用兵孫子之論兵也曰兵者詭道司馬遷作齊世家謂周西伯與吕尚隂謀修德以傾商政其事多兵權與竒計故後世之言兵及周之隂權皆宗太公為本謀今之所論無乃與古刺謬歟曰羣言淆亂衷諸聖諸說之不可與文王周公孔子較明矣况夫權者由經出者也竒者由正出者也無經何權無正何竒且凡所為權與竒者唯其萬變而不可推測卒至而不可預知故能權能竒者貴焉若可筆之于書歷千百年而無改則非所謂權且竒者也將無趙括之父書乎此正蘇洵所以斥孫武之書為不可用者也若夫詭道隂權則戰國時非聖無法之語讀書多更事深則自知其無謂不足纍筆費墨而與為辨矣權書六國篇六國破滅非兵不利戰不善弊在賂秦賂秦而力虧破滅之道也或曰六國互喪率賂秦耶曰不賂者以賂者喪蓋失強援不能獨完故曰弊在賂秦也秦以攻取之外小則獲邑大則得城較秦之所得與戰勝而得者其實百倍諸侯之所亡與戰敗而亡者其實亦百倍則秦之所大欲諸侯之所大患固不在戰矣思厥先祖父暴霜露斬荆棘以有尺寸之地子孫視之不甚惜舉以豫人如棄草芥今日割五城明日割十城然後得一夕安寢起視四境而秦兵又至矣然則諸侯之地有限暴秦之欲無厭奉之彌繁侵之愈急故不戰而強弱勝負已判矣至于顛覆理固宜然古人云以地事秦猶抱薪救火薪不盡火不滅此言得之齊人未嘗賂秦終繼五國遷滅何哉與嬴而不助五國也五國既喪齊亦不免矣燕趙之君始有逺略能守其土義不賂秦是故燕雖小國而後亡斯用兵之效也至丹以荆卿為計始速禍焉趙嘗五戰于秦二敗而三勝後秦擊趙者再李牧連却之洎牧以讒誅邯鄲為郡惜其用武而不終也且燕趙處秦革滅殆盡之際可謂智力孤危戰敗而亡誠不得已向使三國各愛其地齊人勿附于秦刺客不行良將猶在則勝負之數存亡之理當與秦相較或未易量嗚呼以賂秦之地封天下之謀臣以事秦之心禮天下之竒才并力西嚮則吾怨秦人食之不得下咽也悲夫有如此之勢而為秦人積威之所劫日削月割以趨於亡為國者無使為積威之所劫哉夫六國與秦皆諸侯其勢弱于秦而猶有可以不賂而勝之之勢茍以天下之大下而從六國破亡之故事是又在六國下矣宋仁宗增嵗幣於契丹當時皆謂契丹無厭之求奚其可從竭中國膏血不足以為賂矣于是志士扼腕恥之洵作幾策審敵篇極言當絶其使勿與嵗幣而權書內又作六國論以先發其端焉夫仁宗之所以為仁而非小賢之所能測者正在和契丹一事伯宗曰川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也仁宗之不忍鬬其民有太王之遺風矣彼安知南渡偏安百數十年中原之民無一日之忘宋者乃仁宗深仁厚澤之所留遺哉審敵篇不足録此論六國事則確切不移故存之衡論重逺篇武王不泄邇不忘逺仁矣乎非仁也勢也天下之勢猶一身一身之中手足病于外則腹心為之深思靜慮于內而求其所以療之之術腹心病於內則手足為之奔捍于外而求其所以療之之物腹心手足之相救非待仁而後然吾故曰武王之不泄邇不忘逺非仁也勢也勢如此其急而古之君獨武王然者何也人皆知一身之勢而武王知天下之勢也夫不知一身之勢者一身危而不知天下之勢者天下不危乎哉秦之保關中自以為子孫萬世帝王之業而陳勝吳廣乃椘人也由此觀之天下之勢逺近如一然以吾言之近之可憂未若逺之可憂之深也近之官吏賢邪民譽之歌之不賢邪譏之謗之譽歌譏謗者衆則必傳傳則必逹于朝廷是官吏之賢否易知也一夫不獲其所訴之刺史刺史不問裹糧走京師緩不過旬月撾鼓叫號而有司不得不省矣是民有寃易訴也吏之賢否易知而民之寃易訴亂何從始邪逺方之民雖使盜跖為之郡守檮杌叨餮為之縣令郡縣之民羣嘲而聚罵者雖千百為輩朝廷不知也白日執人于市誣以殺人雖其兄弟妻子聞之亦不過訴之刺史不幸而刺史又抑之則死且無告矣彼見郡守縣令據案執筆吏卒旁列箠械滿前駭然而喪膽矣則其謂京師天子所居者當復如何而又行數千里費且百萬富者尚或難之而貧者又何能乎故其民常多怨而易動吾故曰近之可憂未若逺之可憂之深也國家分十七路河朔陕右南廣川峽實為要區河朔陕右二敵之防而中國之所恃以安南廣川峽貨財之源而河朔陕右之所恃以全其勢之輕重如何哉曩者北敵驕恣西寇悖叛河朔陕右尤所加恤一郡守一縣令未嘗不擇至于南廣川峽則例以為逺官審官差除取具臨時竄謫量移往往而至凡朝廷稍所優異者不復官之南廣川峽而其人亦以南廣川峽之官為失職庸人無所歸故常聚于此嗚呼知河朔陕右之可重而不知河朔陕右之所恃以全之地之不可輕是欲富其倉而蕪其田倉不可得而富也矧其地控制南夷氐蠻最為要害土之所産又極富夥明珠大貝紈錦布帛皆極精好陸負水載出境而其利百倍然而關譏門征僦雇之費非百姓私力所能辦故貪官專其利而齊民受其病不招權不鬻獄者世俗遂指以為亷吏矣而招權鬻獄者又豈盡無嗚呼吏不能皆亷而廉者又止如此是斯民不得一日安也方今賦取日重科斂日煩罷弊之民不任官吏復有所規求于其間矣淳化中李順竊發于蜀州郡數十望風奔潰近者智髙亂廣南乘勝取九城如反掌國家設城池養士卒蓄器械儲米粟以為戰守備而凶豎一起若涉無人之地者吏不肖也今夫以一身任一方之責者莫若漕刑南廣川峽既為天下要區而其中之郡縣又有為南廣川峽之要區者其牧宰之賢否實一方所以安危幸而賢則已其戕民黷貨的然有罪可誅者漕刑固亦得以舉劾若夫庸陋選耎不才而無過者漕刑雖賢明其勢不得易置此猶弊車躄馬而求僕夫之善御也郡縣有敗事不以責漕刑則不可責之則彼必曰敗事者某所治某所者某人也吾將何所歸罪故莫若使漕刑自舉其人而任之他日有敗事則謂之曰爾謂此人堪此職也今不堪此職是爾欺我也責有所任罪無所逃然而擇之不得其人者蓋寡矣其餘郡縣雖非一方之所以安危者亦當詔審官俾勿輕授贓吏冗流勿措其間則民雖在千里外無異於處畿甸中矣宋承唐弊以邉徼為遷謫之所朝士有罪者乃之官焉溥天之下莫非王土率土之濵莫非王臣而以其逺而莫之省憂逺方之百姓何辜同是赤子而獨無父母之愛也洵所論誠切中其弊矣然謂近之可憂不若逺之可憂之深則固不然歷代有興有亡秦則未嘗興也其亡即兆于其兼并天下之日而非不祀忽諸者也是故秦事不可以例後世椘雖三戶亡秦必椘天道也豈椘人剽悍之故哉况此之所謂楚者乃江淮間非蠻粵之逺也自三代以來亡國者亂必自近始奚嘗自山陬海澨蠶叢鬼區始哉未有政明于上民戴于下而蠻夷能入而圗中原者也洵之語無乃欲明重逺之義而不顧其論之偏轉開後世務逺忽近之弊歟至謂武王視天下之勢如一身真善言聖人者然曰此勢也非仁也則固未識仁矣視天下之勢如一身正乃所以為仁而曰是非仁其將以煦煦為仁耶衡論廣士篇古之取士取于盜賊取於夷狄古之人非以盜賊夷狄之事可為也以賢之所在而已矣夫賢之所在貴而貴取焉賤而賤取焉是以盜賊下人夷狄異類雖奴𨽻之所恥而往往登之朝廷坐之郡國而不以為怍而繩趨尺步華言華服者往往反擯棄不用何則天下之能繩趨而尺步華言而華服者衆也朝廷之政郡國之事非特如此而可治也彼雖不能繩趨而尺步華言而華服然而其才果可用于此則居此位可也古者天下之國大而多士大夫者不過曰齊與秦也而管夷吾相齊賢也而舉二盜焉穆公霸秦賢也而舉由余焉是其能果於是非而不牽于衆人之議也未聞有以用盜賊夷狄而鄙之者也今有人非盜賊非夷狄而猶不獲用吾不知其何故也夫古之用人無擇于勢布衣寒士而賢則用之公卿之子弟而賢則用之武夫健卒而賢則用之巫醫方技而賢則用之胥史賤吏而賢則用之今也布衣寒士持方尺之紙書聲病剽竊之文而至享萬鍾之祿卿大夫之子弟飽食于家一出而驅髙車駕大馬以為民上武夫健卒有灑掃之力奔走之舊久乃領藩郡執兵柄巫醫方技一言之中大臣且舉以為吏若此者皆非賢也皆非功也是今之所以進之之塗多于古也而胥史賤吏忽之而不録使老死於敲榜趨走而賢與功者不獲一施吾甚惑也不知胥吏之賢優而養之則儒生武士或所不若昔者漢有天下平津侯樂安侯輩皆號為儒宗而卒不能為漢立不世大功而其卓絶雋偉震耀四海者乃其賢人之出于吏胥中者耳夫趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞太守之卒史也王尊涿郡之書佐也是皆雄雋明博出之可以為將而內之可以為相者也而皆出于吏胥中者有以也夫吏胥之人少而習法律長而習獄訟老奸大豪畏憚懾伏吏之情狀變化出入無不諳究因而官之則豪民猾吏之弊表裏毫末畢見于外無所逃遁而又上之人擇之以才遇之以禮而其志復自知得自奮于公卿故終不肯自棄于惡以賈罪戾而敗其終身之利故當此時士君子皆優為之而其間自縱於大惡者大約亦不過幾人而其尤賢者乃至成功如是今之吏胥則不然始而入之不擇也終而遇之以犬彘也長吏一怒不問罪否袒而笞之喜而接之乃反與交手為市其人常曰長吏待我以犬彘我何望而不為犬彘哉是以平民不能自棄為犬彘之行不肯為吏矣况士君子而肯俯首為之乎然欲使之謹飭可用如兩漢亦不過擇之以才待之以禮恕其小過而棄絶其大惡之不可貰忍者而後察其賢有功而爵之祿之貴之勿棄之于冗流之間則彼有冀于功名自尊其身不敢丐奪而竒才絶智出矣夫人固有才智竒絶而不能為章句名數聲律之學者又有不幸而不為者茍一之以進士制䇿是使竒才純智有時而窮也使吏胥之人得出為長吏是使一介之才無所逃也進士制策網之於上此又網之于下而曰天下有遺才者吾不信也漢去周未逺其士之秀良州牧辟命以為掾史他時三公六卿九牧胥于是乎選吏既習于民事故循績易奏吏與士同途故人不恥為吏唐宋以來以制舉取士求士于文采聲華而士乃不習民事吏習民事而不得美仕吏日下士日尊判然兩途而士之子恆為士降而為吏即為隳其家聲于是吏益以無賴雖無賴然而在一邑則一邑之政由其手在一郡則一郡之政由其手在一部則一部之政由其手以無賴之人而政出其手則無所往而不為弊矣朝廷欲興一利吏即隨所興者以滋百弊欲革此弊吏即隨所革者以滋他弊自知罪大則縱火以去其籍使茫然莫知其顚末且也官有除降而吏則長子養孫官避本籍而吏則土著世守即年滿有制重役有禁而子弟親戚迭出不窮更名而不更人更人而不更其所守夫以他州外郡之人為來往無常之官官一而吏百又皆文采聲華不習民事之官以之駕馭百十為羣熟悉風土諳練事故作奸犯科無賴之吏于此而能奏循績焉固較漢世難什伯也沿習既久如久病之人轉以病為命一旦悉去此輩則百司茫然一步不可行勢不能以終日嗟乎欲天下之治不改弦更張使吏有士君子之行而欲民生䝉福教化淳美者猶欲其入而閉之門也洵為廣士論欲使吏與士同升于朝固是切要之言雖然未易易也必先去其大惡之不可貰忍者而為之功名之途使得與士齒優柔漸漬潛移默奪之漸使士之秀良者不恥為吏而士之習於吏者得自奮于公卿然後可與道古蓋非百年不能矣若舉洵之言一旦驟施之令無賴吏得居士夫間正所為吏道雜而多端害政之尤甚者也洵為權書十篇衡論十篇幾策二篇歐陽修上之仁宗皇帝乃召試洵洵不就權書言兵也衡論者言有權必有衡所以用此權者也幾策則欲上之審幾而更化幾審而後可用此權與衡也其意大概如此權書十篇類兵家常言或逆料古人橫斷其是非而非其實衡論十篇大要欲人主用機智明刑法其言流于申商兵制田制尤紛擾幾䇿二篇一曰審勢勸人主以用威一曰審敵欲絶契丹而修戰備今擇其大醇者餘並不録嘗考宋仁宗之為君恭儉慈惠出于天性其仁民容物之心實漢唐宋諸帝中之首出者既與遼為與國唯欲睦鄰以息兵嘗服通天犀帶左右譝之謂此帶無雙即解不服左右請其故曰留以遺北主蓋其心茍可以弭兵者無不為未嘗頃刻不在念也當時百姓受其休養生息之恩如天廣大而不識不知一時才俊之士不逹其深心莫測其分量轉以漢景之綜核名實漢武之耀兵黷武期其奮發慕效茍欲以張國威而不知君天下之道固在此不在彼也言者亦不止蘇洵而仁宗並勿聽亦終不以自明逮後神宗相王安石君臣一心薄仁宗之所為為不足為行新法開邉釁于是百姓流離干戈不息而當日之議仁宗者至此未有不追思仁宗者矣事勢既已潰敗國步因之日促而元祐諸賢首被其禍延至崇宣之間淪胥以鋪無一免矣嗟夫策國是良非易易毋為坐井以觀天而曰天小也御選唐宋文醇卷三十四
