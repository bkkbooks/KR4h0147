body:
  text: 眉山蘇軾文十二祭文碑祭歐陽文忠公文表忠觀碑宸奎閣碑潮州韓文公廟碑司馬溫公神道碑欽定四庫全書御選唐宋文醇卷四十九眉山蘇軾文十二祭歐陽文忠公文嗚呼哀哉公之生於世六十有六年民有父母國有蓍龜斯文有傳學者有師君子有所恃而不恐小人有所畏而不為譬如大川喬嶽不見其運動而功利之及於物者蓋不可以數計而周知今公之殁也赤子無所仰芘朝廷無所稽疑斯文化為異端而學者至於用夷君子以為無為為善而小人沛然自以為得時譬如深淵大澤龍亡而虎逝則變怪雜出舞鰌鱓而號狐狸昔其未用也天下以為病而其既用也則又以為遲及其釋位而去也莫不冀其復用至其請老而歸也莫不惆悵失望而猶庶幾於萬一者幸公之未衰孰謂公無復有意於斯世也奄一去而莫豫追豈厭世溷濁潔身而逝乎將民之無祿而天莫之遺昔我先君懷寶遁世非公則莫能致而不肖無狀因緣出入受教於門下者十有六年於兹聞公之喪義當匍匐往救而懷祿不去愧古人以忸怩緘詞千里以寓一哀而已矣蓋上以為天下慟而下以哭其私嗚呼哀哉茅坤曰歐陽文忠公知子瞻而子瞻為此文以祭之涕入九原表忠觀碑熙寧十年十月戊子資政殿大學士右諌議大夫知杭州軍州事臣抃言故吳越國王錢氏墳廟及其父祖妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪廢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黃巢名聞江淮復以八都兵討劉漢宏并越州以奉董昌而自居於杭及昌以越叛則誅昌而并越盡有浙東西之地傳其子文穆王元瓘至其孫忠顯王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又出大兵攻景以迎周世宗之師其後卒以國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盜名字者不可勝數既覆其族延及於無辜之民罔有孑遺而吳越地方千里帶甲十萬鑄山煮海象犀珠玉之富甲於天下然終不失臣節貢獻相望於道是以其民至於老死不識兵革四時嬉遊歌鼓之聲相聞至於今不廢其有德於斯民甚厚皇宋受命四方僭亂以次削平而蜀江南負其險逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城釃血為池竭天下之力僅乃克之獨吳越不待告命封府庫籍郡縣請吏於朝視去其國如去傳舍其有功於朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父子墳塋祠以太牢今錢氏功德殆過於融而未及百年墳廟不治行道傷嗟甚非所以勸奬忠臣慰答民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其縣之淨土寺僧曰道微嵗各度其徒一人使世掌之籍其地之所入以時修其祠宇封殖其草木有不治者縣令丞察之甚者易其人庶幾永終不墜以稱朝廷待錢氏之意臣抃昧死以聞制曰可其妙因院改賜名曰表忠觀銘曰天目之山苕水出焉龍飛鳳舞萃於臨安篤生異人絶類離羣奮挺大呼從者如雲仰天誓江月星晦蒙強弩射潮江海為東殺宏誅昌奄有吳越金券玉册虎符龍節大城其居包落山川左江右湖控引島蠻歲時歸休以燕父老曄如神人玉帶毬馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪託國三王相承以待有德既獲所歸弗謀弗咨先王之志我維行之天祚忠孝世有爵邑允文允武子孫千億帝謂守臣治其祠墳母俾樵牧愧其後昆龍山之陽巋焉新宫匪私於錢惟以勸忠非忠無君非孝無親凡百有位視此刻文與柳宗元孝門銘同一體格徐度曰東坡初為趙清獻公作表忠觀碑或持以示王荆公公讀之沈吟曰此何語耶時客有在傍者遽指摘而詆訿之公不答讀之再三又攜之而起行且讀忽嘆曰此三王世家也可謂竒矣客大慙王世貞曰表忠碑文忠公撰并書結法不似臨池老筆然自婉潤可愛銘詞是蘇詩之佳者余嘗怪錢氏起羣盜非有大功德於民而能制一方傳數世而王爵崇奉造於大明爝火自若納叛之後圭組映帶又百餘年久而人思之何也武肅初有國將築宫望氣者言故府大之不過百年填西湖之半可得千年武肅笑曰世有千年之中不出真主者乎奈何困吾民為遂弗改此其知有足多者五代史固歐陽氏懟筆未盡徵也宸奎閣碑皇祐中有詔廬山僧懷璉住京師十方淨因禪院召對化城殿問佛法大意奏對稱旨賜號大覺禪師是時北方之為佛者皆留於名相囿於因果以故士之聰明超軼者皆鄙其言詆為蠻夷下俚之説璉獨指其妙與孔老合者其言文而真其行峻而通故一時士大夫喜從之遊遇休沐日璉未盥漱而户外之屨滿矣仁宗皇帝以天縱之能不由師傅自然得道與璉問答親書頌詩以賜之凡十有七篇至和中上書乞歸老山中上曰山即如如體也將安歸乎不許治平中再乞堅甚英宗皇帝留之不可賜詔許自便璉既渡江少留於金山西湖遂歸老於四明之阿育王山廣利寺四明之人相與出力建大閣藏所賜頌詩榜之曰宸奎時京師始建寶文閣詔取其副本藏焉且命歲度僧一人璉歸山二十有三年年八十有三臣留守杭州其徒使來告曰宸奎閣未有銘君逮事昭陵而與吾師遊最舊其可以辭臣謹按古之人君號知佛者必曰漢明梁武其徒蓋常以藉口而繪其像於壁者漢明以察為明而梁武以弱為仁皆緣名失實去佛逺甚恭惟仁宗皇帝在位四十二年未嘗廣度僧尼崇侈寺廟干戈斧質未嘗有所私貸而升遐之日天下歸仁焉此所謂得佛心法者古今一人而已璉雖以出世法度人而持律嚴甚上嘗賜以龍腦鉢盂璉對使者焚之曰吾法以壞色衣以瓦鐵食此鉢非法使者歸奏上嘉歎久之銘曰巍巍仁皇體合自然神耀得道非有師傳維道人璉逍遙自在禪律並行不相留礙於穆頌詩我既其文惟佛與佛乃識其真咨爾東南山君海王時節來朝以謹其藏璉工詩冷齋夜話載其住東京淨因院乞還山林詩特清俊王安石嘗以其詩示歐陽修修戲曰此道人作肝臟饅頭也安石曰何謂曰此中無一點菜氣潮州韓文公廟碑匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為矣故申呂自嶽降而傅説為列星古今所傳不可誣也孟子曰吾善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不侍生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歷唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正蓋三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥豈非參天地關盛衰浩然而獨存者乎蓋嘗論天人之辨以為人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鎛李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上蓋公之所能者天也所不能者人也始潮人未知學公命進士趙德為之師自是潮之士皆篤於文行延及齊民至於今號稱易治信乎孔子之言君子學道則愛人小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既悅服則出令曰願新公廟者聽民歡趨之卜地於州城之南七里期年而廟成或曰公去國萬里而謫於潮不能一歲而歸沒而有知其不春戀於潮審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事於石因作詩以遺之使歌以祀公其詞曰公昔騎龍白雲鄉手抉雲漢分天章天孫為織雲錦裳飄然乘風來帝旁下與濁世掃粃粳西遊咸池略扶桑草木衣被昭回光追逐李杜參翺翔汗流籍湜走且僵滅沒倒景不可望作詩詆佛譏君王要觀南海窺衡湘歷舜九疑弔英皇祝融先驅海若藏約束蛟鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與焦黃公不少留我涕滂翩然被髮下大荒朱子曰東坡作韓文廟碑不能得一起頭起行百十遭忽得匹夫兩句下面只如此掃去王世貞曰此碑自始至末無一字懈怠佳言格論層見疊出太牢悅口夜明奪目蘇文古今所推此尤其最得意者其關係世道亦大矣司馬溫公神道碑上即位之三年朝廷清明百揆時敘民安其生風俗一變異時薄夫鄙人皆洗心易德務為忠厚人人自重恥言人過中國無事四夷稽首請命惟西羌夏人叛服不常懷毒自疑數入為寇上命諸將按兵不戰示以形勢不數月生致大首領果莊青伊結闕下夏人十數萬寇涇原至鎮原城下五日無所得一夕遁去而西羌烏爾戬星音以其族萬人來降黃河始決曹村既築靈平復決小吳橫流五年朔方騷然而今歲之秋積雨彌月河不大溢及冬水入地益深有北流赴海復禹舊迹之勢凡上所欲不求而獲而其所惡不麾而去天下曉然知天意與上合庶幾復見至治之成家給人足刑措不用如咸平景德間也或以問臣軾上與太皇太后安所施設而及此臣軾對曰在易大有上九自天祐之吉無不利孔子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利今二聖躬信順以先天下而用司馬公以致天下士應是三德矣且以臣觀之公仁人也天相之矣何以知其然也曰公以文章名於世而以忠義自結人主朝廷知之可也四方之人何自知之士大夫知之可也農商走卒何自知之中國知之可也九夷八蠻何自知之方其退居於洛眇然如顔子之在陋巷纍然如屈原之在陂澤其與民相忘也久矣而名震天下如雷霆如河漢如家至而日見之聞其名者雖愚無知如婦人孺子勇悍難化如軍伍邊塞以至於姦邪小人雖惡其害已仇而疾之者莫不斂袵變色咨嗟太息或至於流涕也元豐之末臣自登州入朝過八州以至京師民知其與公善也所在數千人聚而號呼於馬首曰寄謝司馬丞相慎毋去朝廷厚自愛以活百姓如是者蓋千餘里不絶至京師聞士大夫言公初入朝民擁其馬至不得行衛士見公擎跽流涕者不可勝數公懼而歸洛遼人夏人遣使入朝與吾使至敵中者敵必問公起居而遼人敕其邊吏曰中國相司馬矣慎毋生事開邊隙其後公薨京師之民罷市而往弔鬻衣以致奠巷哭以過車者蓋以千萬數上命户部侍郎趙瞻內侍省押班馮宗道護其喪歸葬瞻等既葬皆言民哭公哀甚如哭其私親四方來會葬者蓋數萬人而嶺南封州父老相率致祭且作佛事以薦公者其詞尤哀炷薌於手頂以送公葬者凡百餘人而畫像以祠公者天下皆是也此豈人力也哉天相之也匹夫而能動天亦必有道矣非至誠一德其孰能使之記曰惟天下之至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育矣書曰惟尹躬暨湯咸有一德克享天心又曰德惟一動罔不吉德二三動罔不凶或以千金與人而人不喜或以一言使人而人死之者誠與不誠故也稽天之潦不能終朝而一線之溜可以達石者一與不一故也誠而一古之聖人不能加毫末於此矣而况公乎故臣論公之德至於感人心動天地巍巍如此而蔽之以一言曰誠曰一公諱光字君實其先河內人晉安平獻王孚之後王之裔孫征東大將軍陽始葬今陜州夏縣涑水鄉子孫因家焉曽祖諱政以五代衰亂不仕贈太子太保祖諱炫舉進士試祕書省校書郎終於耀州富平縣令贈太子太傅考諱池寶元慶厯間名臣終於兵部郎中天章閣待制贈太師溫國公曽祖妣薛氏祖妣皇甫氏妣聶氏皆封溫國太夫人公始以進士甲科事仁宗皇帝至天章閣待制知諫院始發大議乞立宗子為後以安宗廟宰相韓琦等因其言遂定大計事英宗皇帝為諫議大夫龍圖閣直學士論陜西刺義勇為民患及內侍任守忠姦蠧乞斬以謝天下守忠竟以譴死又論濮安懿王當準先朝封贈期親尊屬故事天下韙之事神宗皇帝為翰林學士御史中丞西戎部將威明山欲以橫山之衆降公極論其不可納後必為邊患已而果然勸帝不受尊號遂為萬世法及王安石為相始行青苗助役農田水利謂之新法公首言其害以身爭之當時士大夫不附安石言新法不便者皆倚公為重帝以公為樞密副使公以言不行不受命乃以為端明殿學士出知永興軍遂以留司御史臺及提舉崇福宫退居於洛十有五年及上即位太皇太后攝政起公為門下侍郎遷正議大夫遂拜左僕射公首更詔書以開言路分别邪正進退其甚者十餘人旋罷保甲保馬市易及諸道新行鹽鐵茶法最後遂罷助役青苗方議取士擇守令監司以養民期於富而教之凛凛乎嚮至治矣而公卧病以元祐元年九月丙辰朔薨於位享年六十八太皇太后聞之慟上亦感涕不已時方祀明堂禮成不賀二聖皆臨其喪哭之哀甚輟視朝贈太師溫國公禭以一品禮服諡曰文正官其親屬十人公娶張氏禮部尚書存之女封清河郡君先公卒追封溫國夫人子三人童唐皆早亡康今為祕書省校書郎孫二人植柏皆承奉郎以元祐二年正月辛酉葬於陜之夏縣涑水南原之鼂村上以御篆表其墓道曰忠清粹德之碑而其文以命臣軾臣蓋嘗為公行狀而端明殿學士范鎮取以志其墓矣故其詳不復再見而獨論其大概議者徒見上與太皇太后進公之速用公之盡而不知神宗皇帝知公之深也自士庶人至於卿大夫相與為賔師朋友道足以相信而權不足以相休戚然猶同己則親之異已則踈之未有聞過而喜受誨而不怒者也而况於君臣之間乎方熙寧中朝廷政事與公所言無一不相違者書數十上皆盡言不諱蓋自敵以下所不能堪而先帝安受之非特不怒而己乃欲以為左右輔弼之臣至為敘其所著書讀之於邇英閣不深知公而能如是乎二聖之知公也知之於既同而先帝之知公也知之於方異故臣以先帝為難昔齊神武皇帝寢疾告其子世宗曰侯景專制河南十四年矣諸將皆莫能敵惟慕容紹宗可以制之我故不貴留以遺汝而唐太宗亦謂髙宗汝於李績無恩我今責出之汝當授以僕射乃出績為疊州都督夫齊神武唐太宗雖未足以比隆先帝而紹宗與績亦非公之流然古之人君所以為其子孫長計逺慮者類皆如此寧其身亡受知人之名而使其子孫專享得賢之利先帝知公如此而卒不盡用安知其意不出於此乎臣既書其事乃拜稽首而作詩曰於皇上帝子惠我民孰堪顧天惟聖與仁聖子受命如堯之初神母詔之匪亟匪徐聖神無心孰左右之民自擇相我興授之其相維何太師溫公公來自西一馬二童萬人環之如渴赴泉孰不見公莫如我先二聖忘己惟公是式公亦無我惟民是度民曰樂哉既相司馬爾賈於途我耕於野士曰時哉既用君實我後子先時不可失公如麟鳳不鷙不搏羽毛畢朝雄狡率服為政一年疾病半之功則多矣百年之思知公於異識公於微匪公之思神考是懷天子萬年四夷來同薦于清廟神考之功軾嘗曰軾於天下未嘗銘墓獨銘五人皆盛德故五人者富弼司馬光趙抃范鎮張方平也朱子曰坡公作溫公神道碑敘事略然其平生大致不踰於是矣這見得眼目髙處御選唐宋文醇卷四十九
