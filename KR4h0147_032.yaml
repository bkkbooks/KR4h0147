body:
  text: 廬陵歐陽修文十一墓志銘尚書兵部員外郎知制誥謝公墓志銘資政殿學士尚書户部侍郎簡肅薛公墓志銘翰林侍讀學士右諫議大夫楊公墓志銘太子太師致仕杜祁公墓志銘故霸州文安縣主簿蘇君墓志銘欽定四庫全書御選唐宋文醇卷三十二廬陵歐陽修文十一尚書兵部員外郎知制誥謝公墓志銘朝散大夫行尚書兵部員外郎知制誥知鄧州軍州事兼管內勸農使上輕車都尉陽夏縣開國男食邑三百户賜紫金魚袋謝公諱絳字希深其先出於黃帝之後任姓之别為十族謝其一也其國在南陽宛三代之際以微不見至詩嵩髙始言周宣王使召公營謝邑以賜申伯蓋謝先以失國其子孫散亡以國為姓歷秦漢魏益不顯至晉宋間謝氏出陳郡者始為盛族公之皇考曰太子賔客諱濤其爵陳留伯至公開國又為陽夏男皆在陳郡故用其封復因為陳郡人然其官邑卒葬隨世而遷其譜自八世而下可見曰八代祖汾為河南緱氏人至五代祖希圖始遷而南或葬嘉興或葬麗水自皇考以上三代皆葬杭州之富陽公以寶元二年四月丁卯來治鄧其年十一月已酉以疾卒於官以逺不克歸於南即以明年八月得州之西南某山之陽遂以葬公享年四十有五初娶夏侯氏先卒今舉以祔後娶髙氏文安縣君三男六女男某皆將作監主簿女一早亡五尚幼公之卒其客歐陽修弔而哭於位退則歎曰初賔客之薨修獲銘其德納諸富陽之原今又哭公之喪哭者在位莫如修舊蓋嘗銘其世矣乃論次其終始曰公年十五起家試祕書省校書郎復舉進士中甲科以奉禮郎知潁州汝隂縣遷光祿寺丞上書論四民失業楊文公薦其才召試充祕閣校理再遷太常丞通判常州丁母晉陵郡君許氏憂服除遷太常博士用鄭氏經唐故事議昭武皇帝非受命祖不宜配享上帝天聖中天下水旱而蝗河決壞滑州又上書用洪範五行京房傳推災異所以為天譴告之意極陳時所闕失無所諱與修真宗國史遷祠部員外郎直集賢院通判河南府移書丞相言歲凶嵩山宫宜罷勿治又上書論妖人方術士不宜出入禁中請追所賜先生處士號歲滿權開封府判官再遷兵部員外郎為三司度支判官上書論法禁密花透背詔書云自內始今內人賜衣復下有司取之是為法而自戾無以信天下又言後苑作官市龜筒亦禁物民間非所有有之為犯法因請罷內作諸器皆以其職言又言有司多求上旨從中出而數更且謂號令數變則虧國體利害偏聽則惑聰明請者務欲各行而守者患於不一請凡詔令皆由中書樞密然後行郭皇后廢上書用詩白華引申后褒姒以為戒景祐元年丁父憂服除召試知制誥判流內銓諫者言李照新定樂不可用下其議議者久不決公為兩議曰宋樂用三世矣照之法不合古吾從舊乃署其一議曰從新樂者異署議者皆從公署公為人肅然自修平居溫溫不妄喜怒及其臨事敢言何其壯也雖或聽或否或論髙而不能行或後果如其言皆傅經據古切中時病三代已來文章盛者稱西漢公於制誥尤得其體世所謂常楊元白不足多也公既以文知名至於為政無所不達自汝隂已有能名佐常州至今常人思之錢思公守河南悉以事屬之是時莊獻明肅太后莊懿太后起二陵於永安至於鐵石畚鍤不取一物於民而足修國子學教諸生自逺所至者百餘人舉而中第者十八九河南人聞公喪皆出涕諸生畫像於學而祀之初吏部擬官以圭田有無為均公取州縣田覆其實者凖其方之物價差為多少揭之省中他有名而無實者皆不用人以為便天下之吏有定職而無定員故選者常患其多而久積吏緣以姦至公為之選而集者有不逾旬而去天下皆稱其平其遇事尤劇尤若簡而有餘及求知鄧州其治益以寬靜為本州遂無事先是有妖僧者以偽言誘民男女數百人往往晝夜為會凡六七年不廢公則取其首惡二人置之法餘一不問民始知公法可畏而安於不苛南陽堰引湍水溉公田水之來逺而少能及民而堰撤墩破公議復召信臣故渠以罷鄧人歲役而以水與民大興學舍皆未就而卒始公來鄧食其廩者四十餘人或疑其多及其喪為之制服其治衣櫛才二婢至三從孤弟妹皆聚而食之卒之日廪無餘粟家無餘資入哭其堂椸無新衣然平生喜賔客談宴怡怡如也自少而仕凡三十年間自守不回而外亦不為甚異此其終始大節也銘曰壽吾不知命繫其偶不俾其隆安歸其咎惟德之明惟仁之茂惟力之為而公之有首敘世次本末次敘立身終始於中首敘立言次敘立政次敘立德鬱乎其相章煥乎其相輝也資政殿學士尚書户部侍郎簡肅薛公墓志銘明道二年尚書禮部侍郎參知政事河東公以疾告歸其政天子曰吾不可以數煩公乃詔優公不朝而使視事如故居歲中數以告乃得還第又數以告然後拜公為資政殿學士户部侍郎判尚書都省罷其政事景祐元年八月庚申公薨於家年六十有八贈兵部尚書公諱奎字宿藝姓薛氏薛氏之先出於黃帝之後任姓任姓之别為十族薛者奚仲之始封也其後奚仲去遷邳而仲虺留居薛春秋之際以國見經而其子孫後以為氏此其譜也隋唐之間薛姓居河東者為最盛公絳州正平人也曾王父贈太保諱某大王父贈太傅諱某王父殿中丞贈太師諱某三世皆不顯而以公貴初太宗皇帝伐并州太師以䇿干行在不見用罷公生十餘歲已能屬文辭太師顧曰是必大吾門吾復何為乃不復事生業務施貸以賙鄉閭曰吾有子矣後何患後五十年公始佐今天子參政事為世名臣如其言公為人敦篤忠烈果敢明達初舉進士為州第一讓其里人王嚴而居其次於是鄉里皆稱之淳化三年再舉乃中授祕書省校書郎隰州軍事推官始至取州獄已成書活寃者四人徙儀州推官士爭薦其能丁太夫人憂服除用薦者拜大理寺丞知興化軍莆田縣悉除故時王氏無名租莆田人至今以為德遷殿中丞知河南長水縣徙知興州州舊鑄鐵錢用工多人以為苦公乃募民有力者弛其山使自為利而收其鐵租以鑄悉罷役者人用不勞遷太常博士御史中丞向敏中薦公材中御史就拜監察御史召為殿中侍御史判三司都磨勘司賜緋衣銀魚出為陜西轉運副使坐舉人免官居數月通判陜府歲餘召還臺安撫河北稱旨改尚書户部員外郎淮南轉運使江淮制置發運使開揚州河廢其三堰以便漕船歲以八百萬石食京師其後罕及其多轉吏部員外郎丁太師憂去職不許居二歲入為三司户部副使與三司使李士衡爭事省中士衡扳時權貴人為助公拜户部郎中直昭文館出知延州遷吏部郎中入為龍圖閣待制知開封府遷右諫議大夫御史中丞契丹使蕭從順來朝是時莊獻明肅太后垂簾聽政從順舉止多不遜以為南使至契丹者皆見太后遂請見之朝議患之未有以決公獨以理折之從順乃止而嫉公者讒其漏禁中語由是拜集賢院學士出知并州改知秦州秦州宿重兵兵嘗歉食公為勤儉積蓄教民水種歲中遷樞密直學士知益州而秦之餘粟積者三百萬征算之衍者三十萬核民舊隱田數百頃所得芻粟又十餘萬秦州之民與其蕃落數千人詣轉運使請留不果公在開封以嚴為治肅清京師京師之民至私以俚語目公且相戒曰是不可犯也囹圄為之數空而至今之人猶或目之及居蜀尤有善政民有得偽蜀時中書印者夜以錦囊挂之西門閽者以白蜀人隨之者萬計皆恟恟出異語且觀公所為公顧主吏藏之略不取視民乃止老媪告其子不孝者子訴貧不能養公取俸錢與之曰用此為生以養母子遂相慈孝里富人三女皆孤民或妄爭其産公析其資為三為嫁其女於是人皆以公為仁恩蜀人喜亂而易搖公既鎮以無事又能順其風俗從容宴樂及其臨事破姦發伏逆見隨決如逢蒙之射而方朔之占無一不中蜀人愛且畏之以比張尚書詠而不苛開封天子之畿益州蜀一都會皆世號尤難理者而公尤有名其猛寬之政前後異施可謂知其方矣入拜龍圖閣直學士權三司使遂拜參知政事公入謝上曰先帝嘗言卿可用吾今用卿矣公益感激自勵而素剛毅守節不茍合既與政尤挺立無所牽隨然遂欲繩天下無小大一入於規矩往往不可其意則歸卧於家歎息憂愧輒不食家人笑其何必若此公曰吾慙不及古人而懼後世譏我也公嘗使契丹與其君臣語而以論議服其坐中其後契丹使來必問公所在及聞已用乃皆喜曰是得人矣邊吏得諜者言契丹欲棄約舉兵上亟召大臣議或欲選將增兵公曰契丹畏誓而貪利且無隙以開其端其必不動不宜失持重之勢而使其可窺已而卒無事他日上顧公曰果如公言於是益重之明道二年莊獻明肅太后欲以天子衮冕見太廟臣下依違不決公獨爭之曰太后必若王服見祖宗若何而拜乎太后不能奪為改他服太后崩上見羣臣泣曰太后疾不能言而猶數引其衣若有所屬何也公遽曰其在衮冕也然服之豈可見先帝乎上大悟卒以后服葬於是益以公為果可用也公先娶潘氏早卒後娶趙氏今封金城郡夫人子男一人直孺大理寺丞女五人長適故職方員外郎張竒其次適故開封府士曹參軍喬易從早亡次適太原王拱辰早亡次適廬陵歐陽修次又適王氏公既貴贈其曾祖而下三宰曰太保太傅太師追封曾祖妣某氏某夫人祖妣某氏某夫人妣某氏某夫人公性孝慈雖在大位家人勤儉不知為驕奢諸子幼孤撫養不異平生所為文章四十卷直而有氣如其為人五年某月某甲子其孤直孺奉其柩自京師葬於絳州以某年某月某甲子即事先期狀公之功行上之太常太常議曰諡法一德不懈曰簡執心決斷曰肅今其狀應法乃諡曰簡肅銘曰薛夏之封以國為姓其後河東隋唐最盛公世載德實河東人必大其門太師之云公之從事以難為易參於大政不撓不牽屢決大議有言炳然公不為相告病還家賵賻之榮尚書是加公有敏德焯其行事公有令名有司之諡事告之史諡傳子孫又刻銘章納於墓門王聞修曰宋史本傳與志不同傳云在陜西趙德明言延州蕃落侵其地黑林平下詔按驗奎閲郡籍德明嘗假道黑林平移文録示之德明遂服知延州趙元昊每遣吏至京師請俸賜吏因市禁物隱關算為姦利奎廉得狀請留蜀道縑帛於關中轉致給之奎能知人范仲淹龎籍明鎬自為選人皆以公輔許之契丹使請見太后奎折之曰皇太后垂簾聽政本朝羣臣亦未嘗見也歐公敘事以簡為貴如此敘子女處直曰次適廬陵歐陽修餘不著一句何等嚴重祭薛尚書文又甚詳明志言天下之公祭盡一身之私也後人作尊者狀多插入自己事是何足與言文乎翰林侍讀學士右諫議大夫楊公墓志銘慶厯八年春翰林侍讀學士右諫議大夫楊公年六十有九告老即以工部侍郎致仕歸於常州其行也天子召見宴勞賜以不拜公卿大夫咸出餞於東門瞻望咨嗟相與言曰楊公歸哉於公計為可榮於國家計為可惜其明年九月十三日公疾革出其兵論一篇示其子忱慥而授以言曰臣聞臣子雖死不敢忘其君父者天下之至恩大義也今臣偕不幸猶以垂閉之口言天下莫大之憂為陛下無窮之慮者其事有五以畢臣志死無所恨惟陛下用臣言不必哀臣死也言訖而卒不及其私忱慥以其語并其兵論以聞天子震悼顧有司問可以寵公者有司舉故事以對天子曰此何足以慰吾思乃詔特贈公兵部侍郎公少師事种放學問為文章長於議論好讀兵書知古兵法以為士不兼文武不足任大事當四方無事時數上書言邊事後二十餘年元昊叛河西契丹舉衆違約三邊皆警天下弊於兵公於此時耗精疲神日夜思慮創作兵車陳圖刀楯之屬皆有法天子以步卒五百如公之法試於庭以為可用而世多非其刀楯修嘗奉使河東得邊將王吉言元昊出毛川為吉所敗者用楊公楯也蓋世未嘗用其術爾然公素剛少合而議者不一故不得盡用其言夏竦經略陜西請益置土兵公言竦據內地無破賊之謀而坐請益兵蓋虞敗事則欲以兵少為解竦復論公不忠沮計公不能忍以語詆之其後三路農民壯者咸墨為兵公又言兵在精不在衆衆而不練則不整而易敗困國而難供時自將相大臣議者皆務多兵獨公之論能如此劉平兵敗元昊圍延州甚急而救兵不至公在河中乃偽為書馳告延州救兵十萬至矣因命旁近縣具芻糧什器如其數以俟已而元昊亦解去後公守并州即詔公為并代麟府路經略安撫招討等使兼兵馬都部署公執敕告其羣吏曰天子用我矣然任其事必圖其效欲責其效必盡其方乃列六事以請曰能用臣言則受命不然則已朝廷難之公論不已坐是徙知邢州公志之不就皆此類也公嘗為御史章獻太后兄子劉崇德為團練使以卒其門人親戚厮養用崇德拜官爵者數十人馬季良以劉氏壻為龍圖閣直學士公上書言漢吕太后王祿産欲強其族而反以覆宗唐武三思楊國忠之禍不獨其身幾亡其國太后大怒貶監舒州酒稅居二歲復召為御史言事愈切公祥符元年進士及第以上書言事真宗竒之召試不赴拜著作佐郎纍官至工部侍郎為天章閣待制龍圖閣樞密直學士遂侍講於翰林嘗為審刑院詳議官知淮陽江隂軍三司度支判官知御史雜事判吏部流內銓三司度支副使河北河東都轉運使知河中府陜并邢滄杭五州所至皆有能績為人廉潔剛直少屈而難犯其仁心愛物至其有所能容人多所不及也公字次公曾祖諱偉祖諱某父諱守慶初娶張氏又娶李氏又娶王氏太原郡君六孫景略景亮景謨景道景直景彥公卒之明年秋其子忱以其喪歸於河南又明年二月十七日葬於洛陽縣宣武管平洛鄉之先塋公有文集十卷兵書十五卷讀其書可以見公之志考其始終之節可以知公之心嗚呼可謂忠矣修為諫官時嘗與公爭議於朝者而且未嘗識公也及其葬也其子不以銘屬於他人而以屬修者豈以修言為可信也歟然則銘之其可不信銘曰逺矣楊氏有來其始赤泉侯功與漢俱起震官太尉四世以公於陵正直僕射于唐師復理卿振左拾遺文蔚獲嘉其後益衰避亂中州曾祖始南祖屈偽邦令于烏江又適南粵皇考是生晦顯有時發于皇明在考司馬始仕坊州遂家中部道德之優司馬四子唯公克大非徒大之將又長之世有官族孰無繫譜或絶於微或亡其序不絶不亡由屢有人誰如楊世愈久而蕃次第弗迷昭穆綿聯公其歸此安千萬年王聞修曰偕本傳為三司度支判官有諫廢后諫富民陳氏女將為后二事知并州時有繩監軍中人及議麟州五利三害事為安撫使時上六事其一罷中人預軍事又張士遜傳有納女口宫中為御史楊偕所劾事此志皆不書六事亦存其名而已歐公敘事簡要如此傳云元昊乞和而不稱臣偕以連年出師國力日蹙宜許之王素歐陽修蔡襄劾偕罪當誅即志所謂爭議於朝者也又云知杭州時襄謁告過杭輕遊里市或謂偕當言於朝偕曰襄嘗以公事抵我我豈可以私報邪志所謂有所能容人多不及或指此太子太師致仕杜祁公墓志銘故太子太師致仕祁國公贈司徒兼侍中杜公諱衍字世昌越州山隂人也其先本出於堯之後歷三代嘗為諸侯後徙其封於杜而子孫散適他國者以杜為氏自杜赫為秦將軍後三世御史大夫周及其子建平侯延年仍顯於漢又九世當陽侯預顯於晉又十有四世岐國公佑顯於唐又九世而至於祁公其為家有法其吉凶祭祀齋戒日時幣祝從事一用其家書自唐滅士喪其舊禮而一切茍簡獨杜氏守其家法不遷於世俗蓋自春秋諸侯之子孫歷秦漢千有餘歲得不絶其世譜而唐之盛時公卿家法存於今者惟杜氏公自曾髙以來以恭儉孝謹稱鄉里至公為人尤潔廉自刻其為大臣事其上以不欺為忠推於人以行已取信故其動靜纎悉謹而有法至考其大節偉如也公享年八十官至尚書左丞方其六十有九嵗且盡即上書告老明年以太子少師致仕纍遷太子太保太傅太師封祁國公於其家天子祀明堂遣使者召公陪祠將有所問以疾不至而歲時存問勞賜不絶公少舉進士髙第為揚州觀察推官知平遙縣通判晉州知乾州遷河東京西路提點刑獄知揚州河東陜西路轉運使入為三司户部副使拜天章閣待制知荆南府未行以為河北路都轉運使遂知天雄軍召為御史中丞判流內銓知審官院拜樞密直學士知永興軍徙知并州遷龍圖閣學士兼知永興軍權知開封府康定元年以刑部侍郎同知樞密院事即拜副使慶厯三年遷吏部侍郎樞密使明年以本官同中書門下平章事公治吏事如其為人其聽獄訟雖明敏而審核愈精故屢決疑獄人以為神其簿書出納推析毫髮終日無倦色至於條目必使吏不得為姦而已及其施於民者則簡而易行始居平遙嘗以吏事適他州而縣民爭訟者皆不肯決以待公歸知乾州未滿歲安撫使察其治行以公權知鳳翔府二邦之民爭於界上一曰此我公也汝奪之一曰今我公也汝何有焉夏人初叛命天下苦於兵而自陜以西尤甚吏緣侵漁調發督迫至民破産不能足往往自經投水以死於是時公在永興語其人曰吾不能免汝然可使汝不勞爾乃為之區處計較量物有無貴賤道里逺近寬其期會使以次輸送由是物不踴貴車牛芻秣宿食來往如平時而吏束手無所施民比他州費省十六七至於繕治城郭器械民皆不知開封治京師常撓於權要有干其法而能不為之屈者世皆以為難至公能使權要不敢有所干凡其為治以聽斷盜訟為能否爾獨公始有餘力省其民事如治他州而畿赤諸縣之民皆被其惠開封比比出能吏而兼於民政者惟公一人吏部審官主天下吏員而居職者類以不久遷去故吏得為姦公始視銓事一日選者三人爭某闕公以問吏吏受丙賕對曰當與甲乙不能爭遂授他闕居數日吏教丙訟甲負某事不當得公悟召乙問之乙謝曰業已得他闕不願爭公不得已與丙而笑曰此非吏罪乃我未知銓法爾因命諸曹各具格式科條以白問曰盡乎曰盡矣明日敕諸吏無得升堂使坐曹聽行文書而已由是吏不得與銓事與奪一出於公居月餘翕然聲動京師其在審官有以賄求官者吏謝不受曰我公有賢名不久見用去矣姑少待之慶厯之初上厭西兵之久出而民弊亟用今丞相富公樞密韓公及范文正公而三人者遂欲盡革衆事以修紀綱而小人權幸皆不悅獨公為相佐佑而公尤抑絶僥幸凡內降與恩澤者一切不與每積至十數則連封而面還之或詰責其人至慙恨涕泣而去上嘗謂諫官歐陽修曰外人知杜某封還內降邪吾居禁中有求恩澤者每以杜某不可告之而止者多於所封還也其助我多矣此外人及杜某皆不知也然公與三人卒皆以此罷去公多知本朝故實善決大事初邊將議欲大舉以擊夏人雖韓公亦以為可舉公爭以為不可大臣至有欲以沮軍罪公者然兵後果不得出契丹與夏人爭伊特旺大戰黃河外而鴈門麟府皆警范文正公安撫河東欲以兵從公以為契丹必不來兵不可妄出范公怒至以語侵公公不為恨後契丹卒不來二公皆世俗指公與為朋黨者其議論之際蓋如此及三人者將罷去公獨以為不可遂亦罷以尚書左丞知兖州歲餘乃致仕公自布衣至為相衣服飲食無所加雖妻子亦有常節家故饒財諸父分産公以所得悉與昆弟之貧者俸祿所入分給宗族賙人急難至其歸老無屋以居寓於南京驛舍者久之自少好學工書畫喜為詩讀書雖老不倦推奬後進今世知名士多出其門居家見賔客必問時事聞有善喜若已出至有所不可憂見於色或夜不能寐如任其責者凡公所以行之終身者有能履其一君子以為人之所難而公自謂不足以名後世遺戒子孫無得紀述嗚呼豈所謂任重道逺而為善惟日不足者歟曾祖太子少保諱某贈太師祖鴻臚卿諱叔詹追封吳國公父尚書度支員外郎諱遂良追封韓國公皆贈太師中書令兼尚書令娶相里氏晉國夫人子男曰詵大理評事欣太常博士訥將作監主簿詒祕書省正字三子早卒女長適集賢校理蘇舜欽次適祕閣校理李綎次適單州團練推官張遵道公以嘉祐二年二月五日卒於家其子欣以其年十月十八日葬公於應天府宋城縣之仁孝原銘曰翼翼祁公率履自躬一其初終惟德之恭公在于位士知貪廉退老于家四方之瞻豈惟士夫天子曰咨爾曲爾直繩之墨之正爾方圓有矩有規人莫之踰公無爾欺豫左豫右惟公是毗公雖告休受寵不已宫臣國公即命于第奕奕明堂萬邦從祀豈無臣工為豫執法何以召之惟公舊德公不能來豫其往錫君子愷悌民之父母公雖百齡人以為少不俾黃耉喪豫元老寵祿之隆則有止期惟其不已既去而思銘昭于逺萬世之詒修與杜衍子欣書自謂文字簡略止記大節期於久逺恐難滿孝子意又言范公家神刻為其子擅自增損不免更作文字發明欲後世以家集為信又言尹氏子卒請韓太尉别作墓表以此見朋友門生故吏與孝子用心嘗異修豈負知已者范尹二家亦可為鑒别一書云所記事皆録實有稽據皆大節與人之所難者其他常人所能者在他人更無巨美不可不書於公為可略者皆不暇書觀修言作志亦大難矣凡墓志神道皆國史所據以示後世者也文如韓歐其人者不世出而史則不可以或闕不可或闕而又無可信之碑志以為據依則信史不更大難乎觀修為杜衍作志其斤斤自明如此蓋以時俗不能曉信今傳後之義徒欲躋其父祖與聖哲比肩必銘功悉太公頌德皆仲尼而後快不知空言無實之名非所榮也徒使平昔一言一行之善猶可勵俗而興行者轉因繁言浮詞致晦昧湮亡而莫可問逮史氏稽集於數十百年之後濟濟皆太公仲尼而考其實茫然無所得既總無可信則必以意為軒輊黨其所親而毁其所怒甚至苞苴請謁行焉而古今是非之公不獨泯於當時而且泯於萬世矣修之慎重不茍然者豈為一已之私哉王聞修曰宋史本傳云契丹壻劉三嘏避罪來歸輔臣議厚館之以詰契丹隂事歐陽修亦請留三嘏衍曰中國主忠信若自違誓約納叛亡則直不在我且三嘏為契丹近親而逃逋來歸其謀身如此尚足與謀國乎此事歐公獨不入志葉夢得曰杜祁公居官清介每請俸必過初五家人前期誤請公怒付有司劾治尹師魯公所知也余嘗見師魯得罪後謝公書親引此事云以某自視雖若無愧以公觀之則安得無罪師魯蓋坐擅貸官錢為部吏償債當時惡者論以為贓云故霸州文安縣主簿蘇君墓志銘有蜀君子曰蘇君諱洵字明允眉州眉山人也君之行義修於家信於鄉里聞於蜀之人久矣當至和嘉祐之間與其二子軾轍偕至京師翰林學士歐陽修得其所著書二十二篇獻諸朝書既出而公卿士大夫爭傳之其二子舉進士皆在髙等亦以文學稱於時眉山在西南數千里外一日父子隱然名動京師而蘇氏文章遂擅天下君之文博辨宏偉讀者悚然想見其人既見而溫溫似不能言及即之與居愈久而愈可愛間而出其所有愈叩而愈無窮嗚呼可謂純明篤實之君子也曾祖諱祐祖諱杲父諱序贈尚書職方員外郎三世皆不顯職方君三子曰淡曰渙皆以文學舉進士而君少獨不喜學年已壯猶不知書職方君縱而不問鄉閭親族皆怪之或問其故職方君笑而不答君亦自如也年二十七始大發憤謝其素所往來少年閉户讀書為文辭歲餘舉進士再不中又舉茂材異等不中退而歎曰此不足為吾學也悉取所為文數百篇焚之益閉户讀書絶筆不為文辭者五六年乃大究六經百家之説以考質古今治亂成敗聖賢窮達出處之際得其粹精涵畜充溢抑而不發久之慨然曰可矣由是下筆頃刻數千言其縱橫上下出入馳驟必造於深微而後止蓋其稟也厚故發之遲志也慤故得之精自來京師一時後生學者皆尊其賢學其文以為師法以其父子俱知名故號老蘇以别之初修為上其書召試紫微閣辭不至遂除試祕書省校書郎會太常修纂建隆以來禮書乃以為霸州文安縣主簿使食其祿與陳州項城縣令姚闢同修禮書為太常因革禮一百卷書成方奏未報而君以疾卒實治平三年四月戊申也享年五十有八天子聞而哀之特贈光祿寺丞敕有司具舟載其喪歸於蜀君娶程氏大理寺丞文應之女生三子曰景先早卒軾今為殿中丞直史館轍權大名府推官三女皆早卒孫曰邁曰遲有文集二十卷諡法三卷君善與人交急人患難死則恤養其孤鄉人多德之蓋晚而好易曰易之道深矣汨而不明者諸儒以附會之説亂之也去之則聖人之旨見矣作易傳未成而卒治平四年十月壬申葬於彭山之安鎮鄉可龍里君生於逺方而學文晚成常歎曰知我者惟吾父與歐陽公也然則非余誰宜銘銘曰蘇顯唐世實欒城人以宦留眉蕃蕃子孫自其髙曾鄉里稱仁偉歟明允大發於文亦既有文而又有子其存不朽其嗣彌昌嗚呼明允可謂不亡儲欣曰讀老泉上歐陽內翰書知歐公之文非先生不能品讀此志又歎先生之學非歐公不能發御選唐宋文醇卷三十二
