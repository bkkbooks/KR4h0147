body:
  text: 睂山蘇轍文一書序䇿論記上洪州孔大夫論徐常侍墳書元祐會計録序古今家誡序臣事䇿第一道三宗六國論漢文帝漢景帝東軒記武昌九曲亭記黃州快哉亭記欽定四庫全書御選唐宋文醇卷五十一睂山蘇轍文一上洪州孔大夫論徐常侍墳書轍竊見故散騎常侍徐公鉉墳在公所治郡新建縣西山鸞岡原徐公沒於淳化辛卯逮今九十四年公無子故人奉新胡克順葬之胡氏昔為大家克順慕公髙義春秋時祠頃未嘗廢克順死胡氏衰公之墳域荒蕪不治蓋有年矣聞自近嵗民間利其林木至訟而爭之公所葬地本其先塋公家既無子孫契劵亡失官遂籍沒其地伐其松柏以治屋宇行道知之往往為之掩泣竊惟南唐舊臣如公之比蓋無一二方陳覺馮延魯愚弄其主擅興甲兵喪師蹙國時無一人敢非之者公獨與韓熙載力陳其姦卒致其罪及王師南討李氏危在朝夕公受命兵間不為身計義動中國至今稱之蓋公之大節落落如此雖使千載之後猶當推其遺迹以勸後來今沒未百年棄而不録仁人君子豈其然哉伏唯明公家本先聖先中丞忠義慷慨氣節凛然公之行已大方直繼前烈如徐公輩人譬之草木臭味不逺儻蒙矜念使孤墳遺魄不至侵暴祭祀稍存樵采不犯不惟南方士人拭目傾心將天下義士知有所勸轍言非所職干冒髙明不勝戰越按鉉自左常侍為尼道安誣陷貶靜難行軍司馬卒於邠門人鄭文寶護其喪至汴而胡克順歸其葬於南昌之西山鉉本廣陵人無家無子而胡克順慕其平生迎殯歸葬於克順之里嵗時祠之古人風義可尚如此克順史稱仲容仲容殆其字歟鉉仕南唐宗師圍金陵後主李煜使求緩兵而煜將朱全贇兵十餘萬自上江來援煜以鉉故止之鉉曰此行未必能濟難援兵何可止煜曰恐不利於汝鉉曰計社稷豈顧一介使置之度外可也及隨煜入朝太祖面責之鉉曰臣為江南大臣國亡罪當死不當問其他太祖歎曰忠臣也事我當如李氏篇中所云不為身計義動中國者蓋指此也元祐會計録序臣聞漢祖入關蕭何收秦圖籍周知四方盈虛強弱之實漢祖賴之以并天下丙吉為相胸奴嘗入雲中代郡吉使東曹考案邉瑣條其兵食之有無與將吏之才否逡巡進對指揮遂定由此觀之古之人所以運籌帷幄之中制勝千里之外者圖籍之功也蓋事之在官必見於書其始無不具者獨患多而易忘久而易滅數十嵗之後人亡而書散其不可考者多矣唐李吉甫始簿録元和國計并包巨細無所不具國朝三司使丁謂等因之為景德皇祐治平熙寧四書網羅一時出內之計首尾八十餘年本末相授有司得以居今而知昔參酌同異因時施宜此前人作書之本意也臣以不佞待罪地官上承元豐之餘業親覩二聖之新政時事之變易財賦之登耗可得而言也謹按藝祖皇帝創業之始海內分裂租賦之入不能半今世然而宗室尚鮮諸王不過數人仕者寡少自朝廷郡縣皆不能備官士卒精練常以少克衆用此三者故能奮於不足之中而綽然常若有餘及其列國欵附琛貢相屬於道府庫充塞創景福內庫入畜金幣為統一之䇿太宗因之克平太原真宗繼之懷服契丹二患既弭天下安樂日登富庶故咸平景德之間號稱太平羣臣稱頌功德不知所以裁之者於是請封泰山祀汾隂禮亳社屬車所至費以巨萬而上清昭應崇禧景靈之宫相繼而起纍世之積糜耗多矣其後昭應之災臣下復以營繕為言大臣力爭章獻感悟沛然遂與天下休息仁宗仁聖清心省事以幸天下然而民物蕃庶未復其舊而夏賊竊發邉久無備遂命益兵以應敵急征以養兵雖間出內藏之積以求紓民而四方騷然民不安其居矣其後西戎既平而已益之兵不復遂汰加以宗子蕃衍充牣宫邸官吏冗積員溢於位財之不贍為日久矣英宗嗣位慨然有救弊之意羣臣竦觀幾見日新之政而大業未遂神考嗣世忿流弊之委積閔財力之傷耗覽政之初為富國強兵之計有司奉承違失本旨始為青苗助役以病農民繼為市易鹽鐡以困商賈利孔百出不専於三司於是經入竭於上民力屈於下繼以南征交趾西討拓跋用兵之費一日千金雖內帑别藏時有以助之而國亦憊矣今二聖臨御方恭默無為求民之疾苦而療之令之不便無不釋去民亦少休矣而西夏不賔水旱繼作凡國之用度大率多於前世當此之時而不思所以濟之豈不殆哉臣歷觀前世持盈守成艱於創業之君蓋盈之必溢而成之必毁物理之至有不可逃者盈成之間非有德者不安非有法者不久昔秦隋之盛非無法也內建百官外列郡縣至於漢唐因而行之卒不能改然皆二世而亡何者無德以為安也漢文帝恭儉寡欲専務以德化民民富而國治後世莫及然身沒之後七國作難幾於亂亡晉武帝削平吳蜀任賢使能容受直言有明主之風然而亡不旋踵子弟內叛羌胡外亂遂以失國此二帝者皆無法以為久也今二聖之治安而靜仁而恕德積於世秦隋之憂臣無所措心矣然而空匱之極法度不立雖無漢晉強臣敵國之患而數年之後國用曠竭臣恐未可安枕而卧也故臣願得終言之凡會計之實取元豐之八年而其為别有五一曰收支二曰民賦三曰課入四曰儲運五曰經費五者既具然後著之以見在列之以通表而天下之大計可以畫地而談也若夫內藏右曹之積與天下分樁之實非昔三司所領則不入會計將著之他書以備觀覽焉臣謹序史家必志食貨不特一代國用之盈絀户口之多寡可考而知欲觀君德之恭儉忲侈臣心之義利邪正亦思過半矣讀會計録序宋德盛衰不具可鑑哉古今家誡序老子曰慈故能勇儉故能廣或曰慈則安能勇曰父母之於子也愛之深故其為之慮事也精以深愛而行精慮故其為之避害也速而就利也果此慈之所以能勇也非父母之賢於人勢有所必至矣轍少而讀書見父母之戒其子者諄諄乎惟恐其不盡也惻惻乎惟恐其不入也曰嗚呼此父母之心也哉師之於弟子也為之規矩以授之賢者引之不賢者不強也君之於臣也為之號令以戒之能者豫之不能者不取也臣之於君也可則諫否則去子之於父也以幾諫不敢顯皆有禮存焉父母則不然子雖不肖豈有棄子者哉是以盡其有以告之無憾而後止詩曰泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母夫雖行潦之陋而無所棄猶父母之無棄子也故父母之於子人倫之極也雖其不賢及其為子言也必忠且盡而况其賢者乎太常少卿長沙孫公景修少孤而教於母母賢能就其業既老而念母之心不忘為賢母録以致其意既又集古今家誡得四十九人以示轍曰古有為是書者而其文不完吾病焉是以為合衆父母之心以遺天下之人庶幾有益乎轍讀之而歎曰雖有悍子忿鬭於市莫之能止也聞父之聲則斂手而退市人之過之者亦莫不泣也慈孝之心人皆有之特患無以發之耳今是書也要將以發之歟雖廣之天下可也自周公以來至於今父戒四十五母戒四公又將益廣之未止也其文纒綿悱惻説泂酌義甚得詩意臣事䇿第一道天下有權臣有重臣二者其迹相近而難明天下之人知惡夫權臣之専而世之重臣亦遂不容於其間夫權臣者天下不可一日而有而重臣者天下不可一日而無也天下徒見其外而不察其中見其皆侵天子之權而不察其所為之不類是以舉皆嫉之而無所喜此亦已太過也今夫權臣之所為者重臣之所切齒而重臣之所取者權臣之所不顧也將為權臣耶必將內恱其君之心委曲聽順而無所違戾外竊其生殺豫奪之柄黜陟天下以見已之權而沒其君之威惠內能使其君歡愛悅懌無所不順而安為之上外能使其公卿大夫百官庶吏無所歸命而爭為之腹心上愛下順合而為一然後權臣之勢遂成而不可拔至於重臣則不然君有所為不可以必爭爭之不能而其事有所必不可聽則専行而不顧待其成敗之迹著則上之心將釋然而自解其在朝廷之中天子為之踧然而有所畏士大夫不敢安肆怠惰於其側爵祿慶賞已得以議其可否而不求以為已之私惠刀鋸斧鉞已得以參其輕重而不求以為已之私勢要以使天子有所不可必為而羣下有所震懼而已不與其利何者為重臣者不待天下之歸已而為權臣者亦無所事天子之畏已也故各因其行事而觀其意之所在則天下誰可欺者臣故曰為天下安可一日無重臣也且今使天下而無重臣則朝廷之事惟天子之所為而無所可否雖天子有納諫之明而百官畏懼戰栗無平昔尊重之勢誰肯觸忌諱冒罪戾而為天下言者惟其小小得失之際乃敢上章歡譁而無所憚至於國之大事安危存亡之所繫則將卷舌而去誰敢發而受其禍此人主之所大患也悲夫後世之君徒見天下之權臣出入唯唯以為有禮而不知此乃所以潛潰其國徒見天下之重臣剛毅果敢喜逆其意則以為不遜而不知其有社稷之慮二者淆亂於心而不能辨其邪正是以喪亂相仍而不悟何足傷也昔者衛太子聚兵以誅江充武帝震怒發兵而攻之京師至使丞相太子相與交戰不勝而走又使天下極其所往而翦滅其迹當此之時茍有重臣出身而當之擁護太子以待上意之少解徐發其所蔽而開其所怒則其父子之際尚可得而全也惟無重臣故天下皆知之而不敢言臣愚以為凡為天下宜有以養其重臣之威使天下百官有所畏忌而緩急之間能有所堅忍持重而不可奪者竊觀方今四海無變非常之事宜其息而不作然及今日而慮之則可以無異日之患不然者誰能知其果無有也而不為之計哉抑臣聞之今世之弊在於法禁太密一舉足不如律令法吏且以為言而不問其意之所屬是以雖天子之大臣亦安敢有所為於法律之外以安天下之大事故為天子之計莫若少寬其法使大臣得有所守而不為法之所奪昔申屠嘉為丞相至召天子之幸臣鄧通立之堂下而詰責其過是時通幾至於死而不救天子知之亦不以為怪而申屠嘉亦卒非漢之權臣由此觀之重臣何損於天下哉軾轍皆有應制舉擬䇿乃場屋之文耳雖爛然可觀而非所謂古之立言者也自宋孝宗推崇之後學者用以取金紫翕然從風當時鄙諺謂蘇文熟喫羊肉蘇文生喫菜羮良足嗤也兩蘇文字皆自宦成後更事深而學益進顧學者多讀其場屋之文發為議論每華而不實宋儒因謂兩蘇學本縱橫家徒觀此等文字其言亦甚似而幾矣選中並不録唯此篇論權臣重臣分剖確切有補治道故存之儲欣曰當時如韓富數公可謂重臣矣子由生其時目覩其事而見其效故言之親切三宗黃帝堯舜夀皆百年享國皆數十年周公作無逸言商中宗享國七十五年髙宗五十九年祖甲三十三年文王受命中身享國五十年自漢以來賢君在位之久皆不及此西漢文帝二十三年景帝十六年昭帝十二年東漢明帝十八年章帝十三年和帝十二年唐太宗二十三年此皆近世之明主然與無逸所謂不知稼穡之艱難不聞小人之勞惟耽樂之從或十年或七八年或五六年或四三年者無以大相過也至其享國長久如秦始皇帝漢武帝梁武帝隋文帝唐玄宗皆以臨御久逺循致大亂或以失國或僅能免其身其故何也人君之富其倍於人者千萬也膳服之厚聲色之靡所以賊其躬者多矣朝夕於其間而無以御之至於夭死者勢也幸而夀考用物多而害民久矜已自聖輕蔑臣下至於失國宜矣古之賢君必志於學達性命之本而知道德之貴其視子女玉帛與糞土無異其所以自養乃與山林學道者比是以久於其位而無害也傅説之詔髙宗曰王人求多聞時惟建事學於古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懷於兹道積於厥躬惟斆學半念終始典於學厥德修罔覺監於先王成憲其永無愆嗚呼傅説其知此矣李光地曰殷有天下六百年而聖賢之君六七作無逸之獨舉三宗何也曰為其享國之長久也秦漢之主蓋有祠神仙求方士以庶幾其長久者矣其志皆以天下為樂而欲永享其逸也而周公言夀乃歸之無逸則知聖人之夀將以勞天下非以逸其身也抑因以知聖人之夀蓋以勞天下而得之非以逸一身而得之也何則其功德之在世故有以格於皇天也而以逸而夀者非天意其嚴敬之在躬則有以凝夫正命也而以逸而夀者非天道以天道合人之意則夫強志氣屏嗜欲不以外物賊乎其內武王所謂恭則夀也立命之本也損己以厚人德盛而福至則冥默之中有以申錫之而不容已夫子所謂仁者夀也得天之符也蓋自學士大夫寡欲清心積善皆有行之而輒效者况乎帝王之生其受氣也尤厚而其功之所及德之所施又非可以尋常福報論者哉無逸之言三宗與文王也曰嚴恭寅畏曰恭默不言曰徽柔懿恭其凝命之説與曰治民祗懼曰嘉靖殷邦又曰保惠庶民惠鮮鰥寡其格天之説與蓋必其敬天勤民而後為無逸之實也不然若梁武帝之清淨齋戒不可言從於耽樂者矣而其受禍乃如蘇子所譏又獨何哉六國論嘗讀六國世家竊怪天下之諸侯以五倍之地十倍之衆發憤西向以攻山西千里之秦而不免於滅亡常為之深思逺慮以為必有可以自安之計蓋未嘗不咎其當時之士慮患之疏而見利之淺且不知天下之勢也夫秦之所與諸侯爭天下者不在齊楚燕趙也而在韓魏秦之有韓魏譬如人之有腹心之疾也韓魏塞秦之衝而蔽山東之諸侯故夫天下之所重者莫如韓魏也昔者范雎用於秦而收韓商鞅用於秦而收魏昭王未得韓魏之心而出兵以攻齊之剛夀而范雎以為憂然則秦之所忌者可以見矣秦之用兵於燕趙秦之危事也越韓過魏而攻人之國都燕趙拒之於前而韓魏乘之於後此危道也而秦之攻燕趙未嘗有韓魏之憂則韓魏之附秦故也夫韓魏諸侯之障而使秦人得出入於其間此豈知天下之勢邪委區區之韓魏以當強虎狼之秦彼安得不折而入於秦哉韓魏折而入於秦然後秦人得通其兵於東諸侯而使天下遍受其禍夫韓魏不能獨當秦而天下之諸侯藉之以蔽其西故莫如厚韓親魏以擯秦秦人不敢逾韓魏以窺齊楚燕趙之國而齊楚燕趙之國因得以自完於其間矣以四無事之國佐當寇之韓魏使韓魏無東顧之憂而為天下出身以當秦兵以二國委秦而四國休息於內以隂助其急若此可以應夫無窮彼秦者將何為哉不知出此而乃貪疆埸尺寸之利背盟敗約以自相屠滅秦兵未出而天下諸侯巳自困矣至使秦人得伺其隙以取其國可不悲哉王志堅曰當時蘇秦非不為此論所以卒不成者六國無明君朝聚暮散為秦人所欺而不悟也漢文帝老子曰柔勝剛弱勝強漢文帝以柔御天下剛強者皆乘風而靡尉他稱號南越帝復其墳墓召貴其兄弟他去帝號俯伏稱臣胸奴桀敖陵駕中國帝屈體遣書厚以繒絮雖未能調伏然兵革之禍比武帝世十一二耳吳王濞包藏禍心稱病不朝帝賜之几杖濞無所發怒亂以不作使文帝尚在不出十年濞亦已老死則東南之亂無由起矣至景帝不能忍用鼂錯之計削諸侯地濞因之號召七國西向入關漢遣三十六將軍竭天下之力僅乃破之錯言諸侯強大削之亦反不削亦反削之則反疾而禍小不削則反遲而禍大世皆以其言為信吾以為不然誠如文帝忍而不削濞必未反遷延數嵗之後變故不一徐因其變而為之備所以制之者固多術矣猛虎在山日食牛羊人不能堪荷戈而往刺之幸則虎斃不幸則人死其為害亟矣鼂錯之計何以異此若能髙其垣牆深其陷穽時伺而謹防之虎安能必為害此則文帝之所以備吳也嗚呼為天下慮患而使好名貪利小丈夫制之其不為鼂錯者鮮矣鼂錯䇿吳必反遂削以激之反而滅之當時雖天下騷然而嗣後藩服衰弱無敢跋扈其惡亦不能及於民錯之功罪固未易定也獨是聖賢處此必别有措置必不輕於一割而使黔黎肝腦塗地轍刺虎之喻誠當也雖然虎逼人矣而不髙其垣墉深其陷穽時伺而謹防之乃曰事未至也安知其必至或曰此未然之勢也安知後之不變及其既至而嗟無及焉則春秋所以罪莒之失國而左氏所以賦絲麻菅蒯之章也此篇豈為王韶開邉而作歟然時代不可考矣漢景帝漢之賢君皆曰文景文帝寬仁大度有髙帝之風景帝忌刻少恩無人君之量其實非文帝比也帝之為太子也吳王濞世子來朝與帝博而爭道帝怒以博局提殺之濞之叛逆勢激於此張釋之文帝之名臣也以劾奏之恨斥死淮南鄧通文帝之幸臣也以吮癰之怨困迫至死鼂錯始與帝謀削諸侯帝違衆而用之及七國反袁盎一説譎而斬之東市曽不之恤周亞夫為大將折吳楚之鋭鋒不數月而平大難及其為相守正不阿惡其悻悻不屈遂以無罪殺之梁王武母弟也驕而縱之幾致其死臨江王榮太子也以母失愛至使酷吏殺之其於君臣父子兄弟之際背理而傷道者一至於此原其所以能全身保國與文帝俱稱賢君者惟不改其恭儉故耳春秋之法弒君稱君君無道也稱臣臣之罪也然陳侯平國蔡侯般皆以無道弒而弒皆稱臣以為罪不及民故也如景帝之失道非一也而猶稱賢君豈非躬行恭儉罪不及民故耶此可以為不恭儉者戒也恭者仁之表也禹曰豫視天下愚夫愚婦一能勝豫仁之至也故其恭乃如是使以為天下之美盡在已而萬物莫已若也則不恭之所流必為刻核少恩矣轍以漢景刻核少恩而又美為恭儉母乃矛盾歟又以鄧通窮困而死為漢景刻核少恩之一事是大不然通以姿貌得幸文帝富甲天下文帝盛德之纇也唯不任以政耳若任以政與董賢何殊景帝即位不顯戮之於朝市以彰先君之過景帝之有恩也轍乃以使通窮困而死為譏然則為景帝者仍當使通富甲天下乃可耶鄧通富甲天下則慎夫人衣不曳地者亦徒爾為矣恭儉二字在文帝猶有議焉况景帝乎特謂景帝未得罪於民可稱賢主者其論可取也東軒記余既以罪謫監筠州鹽酒稅未至大雨筠水泛溢蔑南市登北岸敗刺史府門鹽酒稅治舍俯江之漘水患尤甚既至敝不可處乃告於郡假郡使者府以居郡憐其無歸也許之嵗十二月乃克支其欹斜補其圮缺闢聽事堂之東為軒種杉二本竹百個以為宴休之所然鹽酒稅舊以三吏共事余至其二人者適皆罷去事委於一晝則坐市區鬻鹽沽酒稅豚魚與市人爭尋尺以自效莫歸筋力疲廢輒昏然就睡不知夜之既旦旦則復出營職終不能安於所謂東軒者每旦暮出入其旁顧之未嘗不啞然自笑也余昔少年讀書竊嘗怪以顔子簞食瓢飲居於陋巷人不堪其憂顔子不改其樂私以為雖不欲仕然抱關擊柝尚可自養而不害於學何至困辱貧窶自苦如此及來筠州勤勞鹽米之間無一日之休雖欲棄塵垢解羈縶自放於道德之場而事每劫而留之然後知顔子之所以甘心貧賤不肯求斗升之祿以自給者良以其害於學故也嗟夫士方其未聞大道沉酣勢利以玉帛子女自厚自以為樂矣及其循理以求道落其華而收其實從容自得不知夫天地之為大與死生之為變而况其下者乎故其樂也足以易窮餓而不怨雖南面之王不能加之蓋非有德不能任也余方區區欲磨洗濁汙睎聖賢之萬一自視缺然而欲庶幾顔氏之福宜其不可得哉若夫孔子周行天下髙為魯司寇下為乘田委吏惟其所遇無所不可蓋彼達者之事而非學者之所望也余既以譴來此雖知桎梏之害而勢不得去獨幸嵗月之久世或哀而憐之使得歸復田里治先人之敝廬為環堵之室而居之然後追求顔氏之樂懷思東軒優遊以忘其老然而非所敢望也轍既上書乞納在身官為兄軾贖罪軾責授黃州團練副使轍亦降筠州監酒稅既不得志知時之無可為而思歸骨田里終老於學此記之所為作也夫君子之處於世也若水然流則行而坎則止遇石則瀠洄遇風則淪漪盈溪壑則放而之乎江湖若或使之而莫或使之乃其能行能止能瀠洄能淪漪能放而之乎江湖者水不居此而慕彼了無容心焉隨在各有以自效甚矣水之似君子也軾其庶幾乎其於遇能無所擇若使軾監酒稅必不與市人爭尋尺當必有所濟於物者矣故曰上善若水夫學也者文字云爾哉造次顛沛何在非學况監酒稅者其何害於學之有此軾轍之優劣也特其為文既沈鬱頓挫而又無充詘之心是則可誦也武昌九曲亭記子瞻遷於齊安廬於江上齊安無名山而江之南武昌諸山陂陀蔓延澗谷深密中有浮圖精舍西曰西山東曰寒溪依山臨壑隱蔽松櫪蕭然絶俗車馬之迹不至每風止日出江水伏息子瞻杖策載酒乘漁舟亂流而南山中有二三子好客而喜遊聞子瞻至幅巾迎笑相携徜徉而上窮山之深力極而息掃葉席草酌酒相勞意適忘反往往留宿於山上以此居齊安三年不知其久也然將適西山行於松柏之間羊腸九曲而獲少平遊者至此必息倚怪石蔭茂木俯視大江仰瞻陵阜旁矚溪谷風雲變化林麓向背皆效於左右有廢亭焉其遺址甚狹不足以席衆客其旁古木數十其大皆百圍千尺不可加以斤斧子瞻每至其下輒睥睨終日一旦大風雷雨拔去其一斥其所據亭得以廣子瞻與客入山視之笑曰兹欲以成吾亭耶遂相與營之亭成而西山之勝始具子瞻於是最樂昔余少年從子瞻遊有山可登有水可浮子瞻未始不蹇裳先之有不得至為之悵然移日至其翩然獨往逍遙泉石之上擷林卉拾澗實酌水而飲之見者以為仙也蓋天下之樂無窮而以適意為恱方其得意萬物無以易之及其既厭未有不灑然自笑者也譬之飲食雜陳於前要之一飽而同委於臭腐夫孰知得失之所在惟其無愧於中無責於外而姑寓焉此子瞻之所以有樂於是也孟子語君子三樂而曰仰不愧於天俯不怍於人二樂也三樂之中惟此為可得而自主者餘則關乎遇不遇焉雖然樂之也蓋難夫人操行不軌堅愎狠傲未嘗不仰焉無所愧俯焉無所怍而躁擾彌甚要必不能自得其樂若擇地而蹈之非法行不敢行非法言不敢道則又仰焉而知天命之在我者甚重而我負荷之未勝俯焉而覺斯人待濟之甚殷而我泛應之未當方且愧怍之不釋而又奚其樂也必也天之所責於我者小其職易以盡人之所望於我者輕其事易以為然後俯焉仰焉得不愧而不怍然則其間亦有遇耶軾之遷謫人謂其不遇抑知無愧於中無責於外而得寓懷山水之間者轉為天之幸民也哉黃州快哉亭記江出西陵始得平地其流奔放肆大南合湘沅北合漢沔其勢益張至於赤壁之下波流浸灌與海相若清河張君夢得謫居齊安即其廬之西南為亭以覽觀江流之勝而余兄子瞻名之曰快哉蓋亭之所見南北百里東西一舍濤瀾洶涌風雲開闔晝則舟楫出沒於其前夜則魚龍悲嘯於其下變化倐忽動心駭目不可久視今乃得玩之几席之上舉目而足西望武昌諸山岡陵起伏草木行列煙消日出漁夫樵父之舍皆可指數此其所以為快哉者也至於長洲之濵故城之墟曹孟德孫仲謀之所睥睨周瑜陸遜之所馳騖其流風遺迹亦足以稱快世俗昔楚襄王從宋玉景差於蘭臺之宫有風颯然至者王披襟當之曰快哉此風寡人所與庶人共者耶宋玉曰此獨大王之雄風耳庶人安得共之玉之言蓋有諷焉夫風無雄雌之異而人有遇不遇之變楚王之所以為樂與庶人之所以為憂此則人之變也而風何與焉士生於世使其中不自得將何往而非病使其中坦然不以物傷性將何適而非快今張君不以謫為患收會計之餘功而自放山水之間此其中宜有以過人者將蓬户甕牖無所不快而况乎濯長江之清流挹西山之白雲窮耳目之勝以自適也哉不然連山絶壑長林古木振之以清風照之以明月此皆騷人志士之所以悲傷憔悴而不能勝者烏覩其為快哉也哉昔王右軍蘭亭修禊當崇山峻嶺茂林修竹之間觴詠流連而感歎於今迹明陳作詩嗟悼復序以明之然則所云信可樂者固仍未嘗樂也其轍所為清風明月皆騷人志士之所悲傷憔悴而不能勝者歟夫元會運世與一彈指無殊未能於此灑然真樂何由可味若假外物以為樂滋不樂也顔淵在陋巷不改其樂豈樂陋巷耶此樂無間於富貴貧賤而能自得之者往往在山林間人則曰茂松清泉臣所須也清風明月不用一錢買然要其所以樂者與此何與富貴者務其名輒於山林求之無異刻舟求劍甚至輦致山石以為林巒鑿穴平地以為江湖如唐相平泉宋帝艮嶽者彼其平生何曾知所為真樂者果何等耶人被其毒望厥巖壑皆成愁峯觀其陂池謂同苦海矣空使後世人聞名頸猶縮耳御選唐宋文醇卷五十一
