body:
  text: 昌黎韓愈文五序送區冊序送王秀才序送浮屠文暢師序送髙閑上人序送殷貟外序送楊少尹序送石處士序送温處士赴河陽軍序送鄭尚書序送水陸運使韓侍御歸所治序石鼎聨句詩序欽定四庫全書御選唐宋文醇巻五昌黎韓愈文五送區册序陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急横波之石㢘利侔劍㦸舟上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夹江荒茅篁竹之間小吏十餘家皆鳥言夷靣始至言語不通畫地為字然後可告以出租賦奉期約是以賔客遊從之士無所為而至愈待罪於斯且半嵗矣有區生者誓言相好自南海挐舟而来升自賔階儀觀甚偉坐與之語文義卓然莊周云逃空虚者聞人足音跫然而喜矣況如斯人者豈易得哉入吾室聞詩書仁義之說欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也嵗之初吉歸拜其親酒壺既傾序以識别朱子曰洪謂區册即區𢎞考其始末非也貞元十九年冬公自御史出為陽山令此序在陽山作其曰嵗之初吉當在明年正月也按洪謂洪興祖慶善送王秀才序吾常以為孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以所能授弟子原逺而末益分葢子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不𫝊惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學葢出曽子自孔子没羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉太原王塤示予所為文好舉孟子之所道者與之言信恱孟子而屢贊其文辭夫沿河而下茍不止雖有遲疾必至於海如不得其道也雖疾不止終莫幸而至焉故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道猶航斷港絶潢以望至於海也故求觀聖人之道必自孟子始今塤之所田既幾於知道如又得其船與檝知沿而不止嗚呼其可量也哉李光地曰此韓子之文醇乎其醇者也前無所承而斷置分明如此亦頗采揚雄之意然揚不能如此條暢也故原道譏雄語焉不詳柳子厚亦謂退之決作之加恢竒惜乎其自許以五六十著書而未逮也送浮屠文暢師序人固有儒名而墨行者問其名則是校其行則非可以與之游乎如有墨名而儒行者問之名則非校其行而是可以與之游乎揚子雲稱在門牆則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於縉紳先生以求咏歌其所志貞元十九年春將行東南栁君宗元為之請解其裝得所得序詩累百餘篇非至篤好其何能致多如是邪惜其無以聖人之道告之者而徒舉浮屠之說贈焉夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而来請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其說而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之說而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之邪夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之為己害也猶且不脫焉弱之肉彊之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自邪夫不知者非其人之罪也知而不為者惑也恱乎故不能即乎新者弱也知而不以告人者不仁也告而不以實者不信也余既重栁請又嘉浮屠能喜文辭於是乎言送髙閑上人序茍可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸秋之於奕伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾者也往時張旭善草書不治他伎喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬭天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世今閑之於草書有旭之心哉不得其心而逐其跡未見其能旭也為旭有道利害必明無遺錙銖情炎於中利欲鬭進有得有喪勃然不釋然後一決於書而後旭可幾也今閑師浮屠氏一死生解外膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頽墮委靡潰敗不可収拾則其於書得無象之然乎然吾聞浮屠人善幻多技能閑如通其術則吾不能知矣昌黎以浮屠氏一死生解外膠於心泊然無所起於世淡然無所嗜必不能書是葢以沉竺窈㝠為一生死解外膠也夫沉空窈㝠非浮屠氏之所許而一生死解外膠又非沉空窈㝠之謂也其曰於心泊然無所起非謂其屏聞而去見邪屏聞而去見其聞見之根不増減於毫末也其曰於世淡然無所嗜非謂其屏聲而去色邪屏聲而去色其聲色之隂仍縱横於區宇也明之與暗猶晝之與夜晝之與夜猶生之與死今將取暗而舎明則是取夜而舎晝取死而舎生但見其惑之滋甚何嘗一生死哉是即外膠也又何嘗解哉故曰無内無外然後膠解無死無生然後一如夫此無内無外無死無生者大之為天地小之為萬物明之為日月幽之為鬼神見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神日用而不知者庶民行著而習察者聖賢夫豈浮屠氏所得而專之者哉學者牛毛識者麟角識者牛毛至者麟角彼髙閑者固不足以語此也雖然無邊之不中無小之不大一技之末亦未有不一死生解外膠而能造其極者堯舜禹湯之治天下不具論若基之射僚之丸秋之奕曠之音鵲之醫藝之所以致精者何以能然哉當其志不分而凝於神則已有射無基有丸無僚有奕無秋有音無曠有醫無鵲矣及其官知止而神欲行則又基無射僚無丸秋無奕曠無音鵲無醫也惟其在此無自在彼無物然後技之奏也通於神明使奏技之時不滯於自即滯於物則必支離眩轉奚有奪天巧而號國能者哉昌黎謂外物至不膠於心猶未達夫心亦無心非外物者亦不至也天心亦無心非外物亦不至到此地位豈非一死生解外膠哉若夫旭之於書心有所動物有所感具於書焉發之何以能然哉喜怒等情既發之於書則其情無情也書之為書却狀情之喜怒則其書無書也兩皆無者妙為一有於是情見而書入於神其於物也亦然否則㸃畫波磔豈繪事哉而能狀山水崖谷鳥獸蟲魚草木種種造物之變也即昌黎此文可謂與旭之書同一化工矣其何以能然哉當其下筆時豈非在此不見有自在彼不見有文不期然而然言之短長與聲之髙下皆宜乎於斯時也豈不一死生解外膠哉孟子言之矣其至爾力也其中非爾力也藝固然矣道何獨不然邪送殷員外序唐受天命為天子凡四方萬國不問海内外無小大咸臣順於朝時節貢水土百物大者特来小者附集元和睿聖文武皇帝既嗣位悉治方内就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之為貳由是殷侯侑自太常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾㣲出於顔面豈不真知輕重大丈夫哉丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云唐書殷侑傳侑陳州人通經術以講道為娛貞元末五經第其學長於禮元和八年回鶻請和親朝廷以費廣欲紓其期詔侑副宗正少卿李孝誠使回鶻可汗驕甚盛陳甲兵欲臣使者侑不為屈已傳命虜責其倨宣言欲留不遣衆色怖侑徐曰可汗唐壻欲坐屈使者拜乃可汗無禮非使臣倨也虜憚其言不敢逼送楊少尹序昔疏廣受二子以年老一朝辭位而去於時公卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢漢史既傳其事而後世工畫者又圗其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉世常說古今人不相及今楊與二疏其意豈異也予忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾匹道邊觀者亦有歎息知其為賢以否而太史氏又能張大其事為傳繼二疏蹤跡否不落莫否見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以為其都少尹不絶其禄又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也中世士大夫以官為家罷則無所於歸楊侯始冠舉於其鄉歌鹿鳴而来也今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法古之所謂鄉先生没而可祭於社者其在斯人歟其在斯人歟姚令威集注楊巨源新舊史無傳藝文志云字景山貞元五年第進士以能詩名嘗有三刀夢益州一箭取遼城之句白樂天贈詩云早聞一箭取遼城以此詩遂知名既引年去命為其都少尹葢公河中人即其鄉也張籍有詩送之官為本府當身榮因得還鄉任野情意葢指此此序長慶中公為吏部侍郎時作故序謂余忝在公卿後云送石處士序河陽軍節度御史大夫烏公為節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍穀之間冬一裘夏一葛食朝夕飯一盂蔬一盤人與之錢則辭請與出遊未嘗以事辭勸之仕不應坐一室左右圗書與之語道理辨古今事當否論人髙下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也大夫曰先生有以自老無求於人其肯為某来邪從事曰大夫文武忠孝求士為國不私於家方今寇聚於恒師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出先生仁且勇若以義請而彊委重焉其何說之辭於是撰書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友冠帶出見客拜受書禮於門内宵則沐浴戒行李載書冊問道所由告行於常所来往晨則畢至張上東門外酒三行且起有執爵而言者曰大夫真能以義取人先生真能以道自任決去就為先生别又酌而祝曰凡去就出處何常惟義之歸遂以為先生夀又酌而祝曰使大夫恒無變其初無務富其家而飢其師無甘受佞人而外敬正士無味於諂言惟先生是聽以能有成功保天子之寵命又祝曰使先生無圗利於大夫而私便其身先生起拜祝辭曰敢不敬蚤夜以求從祝規於是東都之人士咸知大夫與先生果能相與以有成也遂各為歌詩六韻退愈為之序云本傳洪字濬川其先始烏石蘭後獨以石為氏有至行舉明經為黄州録事參軍罷歸東都十餘年隠居不出公卿間數薦皆不答烏重𦙍鎮河陽求賢者以自重乃具書幣邀辟洪亦謂重𦙍知己欣然戒行後詔書召為昭應尉集賢校理歐陽修曰洪始終無可稱而名重一時以嘗為退之稱道耳今按新唐書乃歐陽修奉敕撰稱洪有至行而平日議論又云洪始終無可稱甚矣古今信史之難也送温處士赴河陽軍序伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能空其羣邪解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輙取之羣無留良焉茍無良雖謂無馬不為虚語矣東都固士大夫之冀北也恃才能深藏而不市者洛之北涯曰石生其南涯曰温生大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以温生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉㧞其尤暮取一人焉拔其尤自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所諮而處焉士大天之去位而巷處者誰與嬉遊小子後生於何考徳而問業焉搢紳之東西行過是都者無所禮於其廬若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也夫南面而聽天下其所託重而恃力者惟相與將耳相為天子得人於朝廷將為天子得文武士於幕下求内外無治不可得也愈縻於兹不能自引去資二生以待老今皆為有力者奪之其何能無介然於懐邪生既至拜公於軍門其為吾以前所稱為天下賀以後所稱為吾致私怨於盡取也留守相公首為四韻詩歌其事愈因推其意而序之温造字簡輿大雅五世孫嗜書盛氣少所降屈李希烈反造為張建封參謀承宻詔說劉濟効命稱㫖將用為諫官不果復去隠東都烏重𦙍奏置幕府長慶初以京兆司録為太原幽鎮宣諭使為劉總開示禍福總籍所部九州入朝還授侍御史知彈奏劾大金吾李祐違詔進馬祐曰吾夜入蔡州擒吳元濟未嘗心動今日胆落於温御史興元軍亂殺李綘授造山南西道節度使許以便宜從事至則大宴將士酒間伏兵起叛者八百餘人皆伏誅加檢校禮部尚書觀唐書所載造葢英幹之士昌黎兩處士序辭若重石而簡温細玩之石序猶反覆進規温序則唯自嘆矢良友而已則其重温者尤至也昌黎時為河南令故曰資二生以待老今皆為有力者奪之葢實為平日政有不通事有可疑之所諮而處者非虚言也送鄭尚書序嶺之南其州七十其二十二隸嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至四府必使其佐啓問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為讓至一再乃敢改服以賔主見適位執爵皆興拜不許乃止䖍若小侯之事大國有大事諮而後行隸府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島颿風一日踔數千里漫瀾不見蹤迹控御失所依險阻結黨仇機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入簡節而疎目時有所遺漏不究切之長養以兒子至紛不可治乃草薙而禽獮之盡根株痛斷乃止其海外雜國若躭浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邊盡治不相冦盗賊殺無風魚之菑水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公嘗以節鎮襄陽又帥滄景徳棣歴河南尹華州刺史皆有功徳可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畆之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不恱將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以来字者所以祝公成政而来歸疾也昌黎寫蠻夷情状可謂如繪然云至紛不可治乃草薙而禽獮之盡根株痛斷乃止則讀者當以意逆志是為得之葢唐徳既衰朝廷削弱立言之體不得不張國威耳如元和聖徳詩婉婉弱子赤立傴僂牽頭曵足先斷腰膂葢欲使藩鎮聞之畏罪懼禍不敢叛耳然而蘇子由以為李斯頌秦所不忍言而朱子亦有徳不足則夸之議此亦其類也嘗考蠻夷之俗自周以上皆然非古淳而今漓也其用兵之見於經者虞舜殷武而已舜以三旬殷武以三年詩頌殷武而易稱其憊不無㣲辭然亦止是楚地耳非此序所稱嶺南五管之逺也自漢以降多用兵於蠻夷然終莫或得志孰曽盡根株痛斷之哉就使能草雉而禽獮之無俾遺種於帝王御世之道又烏乎可孟子曰不嗜殺人者能一之海可塵嶽可礪斯言不可易也如使殺人如草如禽而可以為平天下之具孔孟不足為萬世師矣況此蛇虎毒腥馬搏頰人懸度之區實非用武之地甲士饟夫勞苦疾疫之所傷死四封之外徴發期㑹之所繹騷兵刃未接於莠民而良民已入於湯火矣所司恃其逺而莫之證也以敗為功以無為有千端萬倪莫可究詰非漢唐之已事乎且唐時邕管黄峒之役昌黎謂據所殺傷賊必已盡今仍如故足明欺罔見於奏狀是昌黎原未嘗以為真可草薙禽獮也說者曰聖王之治天下道徳一而風俗同安得於蠻夷而有異治治之而不治奚能去兵曰夏后殷周之盛可謂至矣王化之隆可謂道徳一而風俗同矣然所為驪戎者所為陸渾之戎者其地即漢唐中原之地也其東南荒服之蠻所為吳者所為於越者其地即漢唐文物之區也在周則以其為蠻夷戎狄之國並未嘗以杞宋魯衛之政被之修其教不易其俗然而無礙其為三代之治道徳一而風俗同也況其尤逺者哉說者曰如此則聖王之威亦有所止其何以云仁者無敵乎曰仁者無敵豈殺敵淨盡之謂邪虎與人異類而媚養已者順也天下莫不歸者仁也歸則無敵矣易曰神武不殺唯仁故神武唯不殺故無敵也且夫所謂蠻夷者為其好則人怒則獸也好則人民吾同胞同胞可悉剸以刃哉怒則獸於禽獸又何難焉興六軍之衆盡殺山中之蛇虎可不謂之無威乎讀者毋悞㑹昌黎之意謂控制蠻夷之術真有盡根株痛斷之一說也送水陸運使韓侍御歸所治序六年冬振武軍吏走驛馬詣闕告飢公卿廷議以轉運使不得其人宜選才幹之士往換之吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所負釋其粟之在吏者四十萬斛不徴吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法故連二嵗大熟吏得盡償其所亡失四十萬斛者而私其贏餘得以蘇息軍不復飢君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲州界極於中受降城出入河山之際六百餘里屯堡相望冦来不能為暴人得肆耕其中少可以罷漕輓之費朝廷從其議秋果倍收嵗省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀其冬来朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制虜庶幾可謂兵農兼事務一而兩得者也大臣方持其議吾以為邊軍皆不知耕作開口望哺有司常僦人以車船自他郡往輸乗沙逆河逺者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏恒苦食不繼今君所請田皆故秦漢時郡縣地其課績又已騐白若從其言其利未可遽以一二數也今天子方舉羣䇿以收太平之功寧使士有不盡用之歎懐竒見而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱二州奏課常為天下第一行其計於邊其功烈又赫赫如此使盡用其䇿西北邊故所没地可指期而有也聞其歸皆相勉為詩以推大之而屬余為序按唐食貨志元和中振武軍饑宰相李絳請開營田可省度支漕運及絶和糴欺隠憲宗稱善乃以韓重華為振武京西營田和糴水陸運使嵗收粟二十萬及重華入朝奏請益開田五千頃可以盡給五城㑹李絳已罷後宰相持其議而止此文不言發議自李綘昌黎或亦有深意葢惜其言之不用不得究其施而猶冀其相之一改或終得奏其績也又按六年冬重華之宫始屯田連二嵗大熟又請置十五屯因髙為堡自振武極於中受降城屯堡相望朝廷從其議秋果倍收則是已更三嵗矣而云八年冬来朝則非篇首六年六字誤即此八年八字誤也食貨志只言元和中而不言幾年歐陽永叔殆亦莫能考歟石鼎聨句詩序元和七年十二月四日衡山道士軒轅彌明自衡下来舊與劉師服進士衡湘中相識將過太白知師服在京夜抵其居宿有校書郎侯喜新有能詩聲夜與劉說詩彌明在其側貌極醜白鬚黒靣長頸而髙結喉中又作楚語喜視之若無人彌明忽軒衣張眉指鑪中石鼎謂喜曰子云能詩能與我賦此乎劉往見衡湘間人說云年九十餘矣解捕逐鬼物拘囚蛟螭虎豹不知其實能否也見其老頗貌敬之不知其有文也聞此說大喜即援筆題其首兩句次傳於喜喜踊躍即綴其下云云道士啞然笑曰子詩如是而已乎即袖手竦肩倚北牆坐謂劉曰吾不解世俗書子為我書因髙吟曰龍頭縮菌蠢豕腹漲彭亨初不似經意詩㫖有似譏喜二子相顧慙駭欲以多窮之即又為而傳之喜喜思益苦務欲壓道士每營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也畢即傳道士道士髙踞大唱曰劉把筆吾詩云云其不用意而功益竒不可附說語益侵劉侯喜益忌之劉與侯皆巳賦十餘韻彌明應之如響皆頴脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人也某伏矣願為弟子不敢更論詩道士奮曰不然章不可以不成也又謂劉曰把筆来吾與汝就之即又唱出四十字為八句書訖使讀讀畢謂二子曰章不己就乎二子齊應曰就矣道士曰此皆不足與語此寧為文邪吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞也吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願聞一言而己先生稱吾不解人間書敢問解何書請聞此而己道士寂然若無聞也累問不應二子不自得即退就座道士倚牆睡鼻息如雷鳴二子怛然失色不敢喘斯須曙鼓動鼕鼕二子亦困遂坐睡及覺日巳上驚顧覔道士不見即問童奴奴曰天且明道士起出門若將便旋然奴怪久不返即出到門覔無有也二子驚惋自責若有失者間遂詣余言余不能識其何道士也嘗聞有隠君子彌明豈其人耶韓愈序史記老子列傳著其鄉里姓氏子孫至備至悉葢漢室重黄老言至武帝時復修亡秦之遺說謂神仙可致不死之藥可得太史公是以著其平生行蹟子孫仕籍以見蓬莱方丈瀛洲間無老子老子特世之隠君子爾以庶幾俗之一悟而荒唐謬悠之說可息也昌黎作軒轅彌明聨句詩序葢亦此意其時必有謂侯劉遇神仙者故其序首即言彌明與劉師服素来往復歴著其狀貌語言而終篇即用太史公之文亦以隠君子稱之葢深曉世人以彌明非神仙而神仙之說誠荒唐也自宋以来謂軒轅為韓彌明為愈乃退之自託以嘲弄侯喜亦失之逺矣御選唐宋文醇巻五
