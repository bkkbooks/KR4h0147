body:
  text: 廬陵歐陽修文六狀疏議學狀論杜衍范仲淹等罷政事狀論史館日厯狀論茶法奏狀論選皇子疏欽定四庫全書御選唐宋文醇巻二十七廬陵歐陽修文六議學狀右臣等伏見近日言事之臣為陛下言建學取士之法者衆矣或欲立三舍以養生徒或欲復五經而置博士或欲但舉舊制而修廢墜或欲特創新學而立科條其言雖殊其意則一陛下愼重其事下其議於羣臣而議者遂欲創新學立三舎因以辨士之能否而命之以官其始也則教以經藝文辭其終也則取以材識徳行聽其言則甚備考於事則難行夫建學校以養賢論材徳而取士此皆有國之本務而帝王之極致也而臣等謂之難行者何哉蓋以古今之體不同而施設之方皆異也古之建學取士之制非如今之法也蓋古之所謂為政與設教者遲速異宜也夫立時日以趨事考其功過而督以賞罰者為政之法也故政可速成若夫設教則以勸善興化尚賢勵俗為事其被於人者漸則入於人也深收其效者遲則推其功也逺故常緩而不廹古者家有塾黨有庠遂有序國有學自天子諸侯之子下至國之俊選莫不入學自成童而學至年四十而仕其習乎禮樂之容講乎仁義之訓敦乎孝悌之行以養父兄事長上信朋友而臨財廉處衆讓其修於身行於家逹於鄰里聞於鄉黨然後詢於衆庶又定於長老之可信者而薦之始謂之秀士久之又取其甚秀者為選士久之又取其甚秀者為俊士久之又取其甚秀者為進士然後辨其論隨其材而官之夫生七八十嵗而死者人之常壽也古乃以四十而仕蓋用其半生為學考行又廣察以鄰里鄉黨而後其人可知然則積徳累善如此勤而久求賢審官如此愼而有次第然後矯偽干利之士不容於其間而風俗不陷於媮薄也古之建學取士其施設之方如此也方今之制以貢舉取人往者四嵗一詔貢舉而議者患於太遲更趣之為間嵗而應舉之士來學於京師者類皆去其鄉里逺其父母妻子而為旦暮干禄之計非如古人自成童至於四十就學於其庠序而鄰里鄉黨得以衆察徐考其行實也蓋古之養士本於舒遲而今之取人患於急廹此施設不同之大概也臣請詳言方今之弊既以文學取士又欲以徳行官人且速取之歟則眞偽之情未辨是朝廷本欲以學勸人修徳行反以利誘人為矯偽此其不可一也若遲取之歟待其衆察徐考而漸進則文辭之士先巳中於甲科而徳行之人尚未登於内舎此其不可二也且今入學之人皆四方之㳺士齎其一身而來烏合羣處非如古人在家在學自少至長親戚朋友鄰里鄉黨衆察徐考其行實也不過取於同舎一時之毁譽而決於學官數人之品藻爾然則同學之人蹈利爭進愛憎之論必分朋黨昔東漢之俗尚名節而黨人之禍及天下其始起於處士之横議而相訾也此其不可三也夫人之材行若不因臨事而見則守常循理無異衆人茍欲異衆則必為迂僻可怪以取徳行之名而髙談虛論以求材識之譽前日慶厯之學其弊是也此其不可四也今若外方專以文學貢士而京師獨以徳行取人則實行素履著於鄉曲而守道丘園之士皆反見遺此其不可五也近者朝廷患四方之士寓京師者多而不知其士行遂嚴其法使各歸於鄉里今又反使來聚於京師云欲考其徳行若不用四方之士止取京師之士則又示人以不廣此其不可六也夫儒者所謂能通古今者在知其意逹其理而酌時之宜爾大抵古者教學之意緩而不廹所以勸善興化養賢勵俗在於遲久而不求近效急功也臣謂宜於今而可行者立為三舎可也復五經博士可也特創新學雖不若即舊而修廢然未有甚害創之亦可也教學之意在乎敦本而修其實事給以餱糧多陳經籍選士之良者以通經有道之士為之師而舉察其有過無行者黜去之則在學之人皆善士也然後取以貢舉之法待其居官為吏巳接於人事可以考其賢善優劣而時取其尤出類者旌異之則士知修身力行非為一時之利而可伸於終身則矯偽之行不作而媮薄之風歸厚矣此所謂實事之可行於今者也臣等伏見論學者四人其説各異而朝廷又下臣等俾之詳定是以盡衆人之見而採其長者爾故臣等敢陳其所有以助衆議之一非敢好為異論也伏望聖慈特賜裁擇讀此文并修所作取士䇿問而知後世用人之難也國家事事須人而事事難得其人雖欲躋斯世於唐虞其誰與為理三代學校之盛根於積徳累仁不特非一王所能致并非一代之所能致是以極於成周而美隆於千古自東周以來陵夷衰微敗壊湮滅古今事體絶不相同而欲舉成周之法以求後世天下之人材猶資章甫以適於越也易曰不耕穫不菑畬則利有攸徃楊萬里别為義曰初九動之始六二動之繼初耕之二穫之初菑之二畬之天下無不耕而穫不菑而畬者其曰不耕不菑則耕且菑皆前人之所己為也是説也於易雖未為正義而於此可以取喻焉若成周者所為前人巳耕已菑者也其在詩所為棫樸之薪槱旱麓之榛楛當文武已上其所以譽髦斯士者至矣至於周公益明選士造士之制習射擇士之文而巻阿之詩謂藹藹王多吉士如鳯凰之鳴於髙岡也斯時也穫耳畬耳非耕且菑以待食者也若夫踧踧周道鞠為茂草而謂利乃錢鏄便可取盈於倉箱所穫安得而非荑稗邪雖然學校之制盛莫過於成周而亦未必無憸壬衰莫甚於元世而亦未嘗無碩士經綸天下者百司庻務無一時而可以乏人而能待汙萊之田忽嘉榖之穭生乎其必别有所以處之者矣此篇末幅所論具足為世法也論杜衍范仲淹等罷政事狀臣聞士不忘身不為忠言不逆耳不為諫故臣不避羣邪切齒之禍敢干一人難犯之顔惟頼聖明幸加省察臣伏見杜衍韓琦范仲淹富弼等皆是陛下素所委任之臣一旦相繼罷黜天下之士皆素知其可用之賢而不聞其可罷之罪臣雖供職在外事不盡知然臣竊見自古小人讒害忠賢其說不逺欲廣陷良善則不過指為朋黨欲動揺大臣則必須誣以專權其故何也夫去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一二求瑕惟有指以為朋則可一時盡逐至如大臣己被知遇而䝉信任則難以他事動揺惟有專權是上之所惡故須此說方可傾之臣料衍等四人各無大過而一時盡逐弼與仲淹委任尤深而忽遭離間必有以朋黨專權之說上惑聖聰者臣請試辨之昔年仲淹初以忠信讜論聞於中外天下賢士爭相稱慕當時姦臣誣作朋黨猶難辨明自近日陛下擢此數人並在兩府察其臨事可見其不為朋黨也蓋衍為人清愼而謹守規矩仲淹則恢廓自信而不疑琦則純信而質直弼則明敏而果銳四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹則力爭而寛之仲淹謂契丹必攻河東請急修邊備富弼料以九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤彰著陛下素巳知者此四人者可謂天下至公之賢也平日閒居則相稱美之不暇為國議事則公言廷諍而不私以此而言臣見衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨可謂誣矣臣聞有國之權誠非臣下之得專也然臣竊思仲淹等自入兩府以來不見其專權之迹而但見其善避權也權者得名位則可行故好權之臣必貪位自陛下召琦與仲淹於陜西琦等讓至五六陛下亦五六召之富弼三命學士兩命樞宻副使每一命皆再三懇讓讓者愈切陛下用之愈堅臣但見其避讓太繁不見其好權貪位也及陛下堅不許辭方敢受命然猶未敢别有所為陛下見其皆未行事乃特開天章召而賜坐授以紙筆使其條事然衆人避讓不敢下筆弼等亦不敢獨有所述因此又煩聖慈特出手詔指定姓名專責弼等條列大事而行之弼等遲回又近一月方敢畧條數事仲淹深練世事必知凡百難猛更張故其所陳志在逺大而多若迂緩但欲漸而行之以久冀皆有效弼性雖銳然亦不敢自出意見但多舉祖宗故事請陛下擇而行之自古君臣相得一言道合遇事便行臣方怪弼等䝉陛下如此堅意委任督責丁寧而猶遲緩自疑作事不果然小人巧譖巳曰專權者豈不誣哉至如兩路宣撫聖朝常遣大臣況自中國之威近年不振故元昊叛逆一方而勞困及於天下北敵乗釁違盟而動其書辭侮慢至有貴國祖宗之言陛下憤恥雖深但以邊防無備未可與爭屈意買和莫大之辱弼等見中國累年侵凌之患感陛下不次進用之恩故各自請行力思雪恥沿山傍海不憚勤勞欲使武備再修國威復振臣見弼等用心本欲尊陛下威權以禦四夷未見其侵權而作過也伏惟陛下睿哲聰明有知人之聖臣下能否洞見不遺故於千官百辟之中特選得此數人驟加擢用夫正士在朝羣邪所忌謀臣不用敵國之福也今此數人一旦罷去而使羣邪相賀於内四夷相賀於外此臣所為陛下惜之也伏惟陛下聖徳仁慈保全忠善退去之際恩禮各優今仲淹四路之任亦不輕矣惟願陛下拒絶羣謗委任不疑使盡其所為猶有禆補方今西北二敵交爭未巳正是天與陛下經營之時如弼與琦豈可置之閒處伏望陛下早辨讒巧特加圖任則不勝幸甚臣自前嵗召入諫院十月之内七受聖恩而致身兩制方思君寵至深未知報效之所今羣邪爭進讒巧正士繼去朝廷乃臣忘身報國之秋豈可緘言而避罪敢竭愚瞽惟陛下擇之方岳貢曰力破朋黨專權四字舉其實事而明之更為洞快論史館日厯狀右臣伏以史者國家之典法也自君臣善惡功過與其百事之廢置可以垂勸戒示後世者皆得直書而不隱故自前世有國者莫不以史職為重伏見國朝之史以宰相監修學士修撰又以兩府之臣撰時政記選三館之士當升擢者乃命修起居注如此不為不重矣然近年以來員具而職廢其所撰述簡畧遺漏百不存一至於事闗大體者皆没而不書此實史官之罪而臣之責也然其弊在於修撰之官惟據諸司供報而不敢書所見聞故也今時政記雖是兩府臣寮修纂然聖君言動有所宣諭臣下奏議事闗得失者皆不記錄惟書除目辭見之類至於起居注亦然與諸司供報公文無異修撰官只據此銓次繫以月日謂之日厯而巳是以朝廷之事史官雖欲書而不得書也自古人君皆不自閱史今撰述既成必錄本進呈則事有諱避史官雖欲書而又不可得也加以日厯時政記起居注例皆承前積滯相因故纂錄者常務追修累年前事而嵗月既逺遺失莫存至於事在目今可以詳於見聞者又以追修積滯不暇及之若不革其弊則前後相因史官永無舉職之時使聖朝典法遂成廢墜矣臣竊聞趙元昊自初僭叛至復稱臣始終一宗事節皆不曾書亦聞修撰官甚欲紀述以修纂後時追求莫得故也其於他事又可知焉臣今欲乞特詔修時政記起居注之臣並以徳音宣諭臣下奏對之語書之其修撰官不得依前只據諸司供報編次除目辭見並須考驗事實其除某官者以某功如狄青等破儂智髙文彦博等破王則之類其貶某職者坐某罪如昨來麟州守將及并州龎籍縁白草平事近日孫沔所坐之類事有文據及迹狀明白者皆備書之所以使聖朝賞罰之典可以勸善懲惡昭示後世若大臣用情朝廷賞罰不當者亦得以書為警戒此國家置史之本意也至於其他大事並許史院據所聞見書之如聞見未詳者直牒諸處㑹問及臣寮公議異同朝廷裁置處分並書之巳上事節並令修撰官逐時旋據所得錄為草巻標題月分於史院躬親入櫃封鎖候諸司供報齊足修為日厯仍乞每至嵗終命監修宰相親至史院㸃檢修撰官紀錄事迹内有不勤其事隳官失職者奏行責罰其時政記起居注日厯等除今日以前積滯者不住追修外截自今後並令次月供報如稍遲滯許修撰官自至中書樞宻院催請其諸司供報拖延及史院有所㑹問諸處不畫時報應致妨修纂者其當行手分並許史院牒開封府勾追嚴斷其日厯時政記起居注並乞更不進本所貴少修史職上存聖朝典法此乃臣之職事不敢不言謹具狀奏聞伏候敕㫖儲欣曰宋史有三曰時政記曰起居注曰日厯其兩府大臣撰時政記其三館應升之士修起居注日厯即據前二書學士修撰而命宰相監修之是則時政記起居注最先而日厯其成書也記注不詳學士何所依據以為修撰乎如公此疏所請庻復有信史耳論茶法奏狀右臣伏見朝廷近改茶法本欲救其弊失而為國誤計者不能深思逺慮究其本末惟知圖利而不圖其害方一二大臣銳於改作之時樂其合意倉卒輕信遂決而行之令下之日猶恐天下有以為非者遂直詆好言之士指為立異之人峻設刑名禁其論議事既施行而人知其不便者十蓋八九然君子知時方厭言而意殆不肯言小人畏法懼罪而不敢言今行之踰年公私不便為害既多而一二大臣以前者行之太果令之太峻勢既難回不能遽改而士大夫能知其事者但騰口於道路而未敢顯言於朝廷幽逺之民日被其患者徒嗟怨於閭里而無由得聞於天聽陛下聰明仁聖開廣言路從前容納補益尤多今一旦下令改事先為峻法禁絶人言中外聞之莫不嗟駭語曰防民之口甚於防川川壅而潰傷人必多今壅民之口巳踰年矣民之被害者亦巳衆矣古不虛語於今見焉臣亦聞方改法之時商議巳定猶選差官數人分出諸路訪求利害然則一二大臣不惟初無害民之意實亦未有自信之心但所遣之人既見朝廷必欲更改不敢沮議又志在希合以求功賞傳聞所至州縣不容吏民有所陳述直云朝廷意在必行但來要一審狀爾果如所傳則誤事者在此數人而巳蓋初以輕信於人施行太果今若明見其害救失何遲患莫大於遂非過莫深乎不改臣於茶法本不詳知但外論既喧聞聽漸熟古之為國者庶人得謗於道商旅得議於市而士得傳言於朝正為此也臣竊聞議者謂茶之新法既行而民無私販之罪嵗省刑人甚多此一利也然而為害者五焉江南荆湖兩浙數路之民舊納茶稅今變租錢使民破産亡家怨嗟愁苦不可堪忍或舉族而逃或自經而死此其為害一也自新法既用小商所販至少大商絶不通行前世為法以抑豪商不使過侵國利與為僭侈而巳至於通流貨財雖三代至治猶分四民以相利養今乃斷絶商旅此其為害二也自新法之行稅茶路分猶有舊茶之稅而新茶之稅絶少年嵗之間舊茶稅盡新稅不登則頓虧國用此其為害三也往時官茶容民入雜故茶多而賤徧行天下今民自買賣須要眞茶眞茶不多其價遂貴小商不能多販又不暇逺行故近茶之處頓食貴茶逺茶之方向去更無茶食此其為害四也近年河北軍糧用見錢之法民入米於州縣以鈔筭茶於京師三司為於諸場務中擇近上場分特留八處專應副河北入米之人翻鈔筭請今場務盡廢然猶有舊茶可筭所以河北和糴目下未妨竊聞自明年以後舊茶當盡無可筭請則河北和糴實要見錢不惟客旅得錢變轉不動兼亦自京師嵗嵗輦錢於河北和糴理必不能此其為害五也一利不足以補五害今雖欲減放租錢以救其弊此特寛民之一端爾然未盡公私之利害也伏望聖慈特詔主議之臣不䕶前失深思今害黜其遂非之心無襲弭謗之迹除去前令許人獻說亟加詳定精求其當庶㡬不失祖宗之舊制臣冐禁有言伏待罪責謹具狀奏聞伏候敕㫖狀大臣不達民情妄建謬議始終回䕶而庶僚希風順意不顧百姓疾苦情事如繪論選皇子疏臣聞言天下之難言者不敢冀必然之聽知未必聽而不可不言者所以盡為忠之心況臣遭遇聖明容納諫諍言之未必不聽其可黙而不言臣伏見自去嵗以來羣臣多言皇嗣之事臣亦嘗因災異竊有奏陳雖聖度包容不加誅戮而愚誠懇至天聽未回臣實不勝愛君之心日夜區區未嘗忘此思欲再陳狂瞽而未知所以為言今者伏見兖國公主近己出降臣因竊思人之常道莫親於父子之親人之常情亦莫樂於父子之樂雖在聖哲異於凡倫其為天性於理則一陛下嚮雖未有皇嗣而尚有公主之愛上慰聖顔今既出降漸踈左右則陛下萬㡬之暇處深宫之中誰可與語言誰可承顔色臣愚以為宜因此時出自聖意於宗室之中選材賢可喜者録以為皇子使其出入左右問安侍膳亦足以慰悅聖情臣考於書史竊見自古帝王雖曰至尊未嘗獨處也其出而居外也不止百司公見奏事而己必有儒臣學士講論於閒晏又有左右侍從顧問語言其入而居内也不止宦官宫妾在於左右而己其平居燕寢也則有太子問安侍膳於朝夕其優㳺宴樂也多與宗室子弟懽然相接如家人計其一日之中未嘗一時獨處也今陛下日御前後殿百司奏事者往往仰瞻天顔而退其甚幸者得承一二言之徳音君臣之情不通上下之意不接其餘在廷之臣儒學侍從之列未聞一人從容親近於左右入而居内則至於問安侍膳亦闕於朝夕是則陛下富有四海之廣躬享萬乗之尊居外則無一人可親居内則無一人得親此臣所以區區而欲言也伏惟陛下荷祖宗之業承宗廟社稷之重皇子未降儲位久虛羣臣屢言大議未沃臣前所奏陳以為未必立為儲貳而且養為子既可以徐察其賢否亦可以待皇子之降生於今為之亦其時也臣言狂計愚伏俟斧鉞天下大器帝王大綂付託得人則三才蒙庥萬類咸若華夏蠻貊㒺不蕃祉老壽否則反是宋仁宗之不輕擇嗣豈為一己之私哉然當日宰執臺諫侍從之臣交章敦勸而歐陽修此文益復情致纒綿忠愛悱惻抑何社稷臣之多也仁宗崩年止五十耳修疏上正仁宗富於春秋之年而修言之無忌仁宗聽之無恨君臣之間美千古矣豈非兩人皆止知有宗廟社稷蒼生而不知有己者乎世以仁宗為漢文帝唐太宗後一人而無子以為天地之大之憾然亦何憾擇嗣得英宗無愧宗廟社稷蒼生仁宗有子矣況帝王父天母地而子萬民有宋三百年人民孰非仁宗之子哉御選唐宋文醇巻二十七
