body:
  text: 廬陵歐陽修文十碑銘墓表鎮安軍節度使同中書門下平章事贈太師中書令程公神道碑銘觀文殿學士行兵部尚書西京留守贈司空兼侍中晏公神道碑銘石曼卿墓表連處士墓表胡先生墓表瀧岡阡表欽定四庫全書御選唐宋文醇巻三十一廬陵歐陽修文十鎮安軍節度使同中書門下平章事贈太師中書令程公神道碑銘惟文簡公既葬之二年其子嗣隆泣而言於朝曰先臣幸得備位將相官階品皆第一爵勲皆第二請得立碑如令於是天子曰噫惟爾父琳有勞於我國家余其可忘乃大書曰旌勞之碑遣中貴人即賜其家曰以此名爾碑又詔史臣修曰汝為之銘臣修與文簡公故往来知其人又嘗誌其墓又嘗述其世德于冀公太師之碑得其世次官封功行最詳乃不敢辭惟公字天球姓程氏曾祖諱新贈太師曾祖妣吳國夫人齊氏祖諱贊明贈太師中書令祖妣秦國夫人吳氏考諱元白袁州宜春令贈太師中書令兼尚書令冀國公妣晉國夫人楚氏公舉大中祥符四年服勤詞學髙第試秘書省挍書郎泰寧軍節度推官改著作佐郎知并州壽陽縣秘書丞監左藏庫天禧中詔選文學履行召試直集賢院今天子即位遷太常博士三司户部判官會修真宗實録而起居注闕命公追修大中祥符八年已後書成遂修起居注遷祠部員外郎提舉諸司庫務以本官知制誥同判吏部流内銓契丹嘗遣使賀上即位命公迓之使者妄有所言公折以理遂屈服其後又遣使賀天聖五年乾元節天子思公前嘗折其使乃以公為館伴使使者果言契丹見中國使者坐殿上位次髙而中國見契丹使者位下當遷議者以為小故可許雖天子亦將許之公爭以為契丹所以與中國好者守先帝約也一切宜用故事若許其小將啟其大天子是之乃止歳中遷右諫議大夫權御史中丞丞相張文節公少所稱許而最知公方除中丞文節當執筆喜曰不辱吾筆矣明年拜樞宻直學士知益州公性方重寡言笑凡所處畫常先慮謹備所以條目巨細甚悉至臨事簡嚴僚友莫能窺其際嘗夜張燈會五門大集州民而城中火起吏如公教不以白而隨即救止終宴民去始稍知火監軍得告者言軍謀變懼而入白公笑曰豈有是哉監軍惶惑不敢去公曰軍中動靜吾自知之茍有謀者不能隱也已而卒無事其他多類此蜀妖人自名李冰神子署官屬吏卒以恐蜀人公捕斬之而謗者言公妄殺人蜀且亂天子遣人馳視之使者還言蜀人便公政方安樂而誅妖人所以止亂由是天子亦知公賢召為給事中知開封府前為府者苦其治劇或不滿歳罷不然被謗譏或以事去獨公居數歳久而治益精明盗訟稀少獄屢空詔書數下褒美遷工部侍郎龍圖閣學士守御史中丞久之天子思其治召為翰林學士復知開封府明年為三司使不悅茍利不貪近功時議者患民稅多目吏得為姦欲除其名而合為一公以為合而沒其名一時之便後有興利之臣必復増之是重困民也議者莫能奪其於出入尤謹禁中時有所取未嘗肯予宦官怒言陛下雖有欲物在程某何可得公曰臣所以為陛下惜爾天子以為然累遷吏部侍郎景祐四年以本官參知政事公益自信不疑宰相有所欲私輙衆折之其語至今士大夫能道也初范仲淹以言事忤大臣貶饒州已而上悔悟欲復用之稍徙知潤州而惡仲淹者遂誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連出語及仲淹者皆指為黨人公獨為上開說上意解而後已是時元昊叛河西朝廷多故公在政事補益尤多而小人僥倖皆不便遂以事中之坐貶為光禄卿知潁州已而徙知青州又徙大名府居一歳中遷户部吏部二侍郎尚書左丞資政殿學士北京建遂以為留守宦者皇甫繼明方用事主治行宫務廣制度以市恩公為裁抑之與繼明章交上天子遣一御史往視之還直公天子為罷繼明獨委公以建都事公自知政事以論議不私見嫉被貶斥已稍復見用遂與繼明爭曲直由是益不妄合於世雖不復大用而契丹方遣使數有所求兵誅元昊未克西北宿重兵公於是時天子常委以河北陜西之重留守北京凡四年遷工部尚書資政殿大學士河北安撫使慶厯六年拜武昌軍節度使陜西安撫使知永興軍府事明年加宣徽北院使鄜延路經畧使馬步軍都部署判延州仍兼陜西安撫使皇祐元年加同中書門下平章事留守北京其於二方威惠信著尤知夷狄情偽山川險易行師制敵之要其在延州夏人數百驅畜産至界上請降言契丹兵至衙頭矣國且亂願自歸公曰契丹兵至元昊帳下當舉國取之豈容有来降者吾聞夏人方捕叛族此其是乎不然誘我也拒而不受已而夏人果以兵數萬臨界上公戒諸堡塞無得輙出兵夏人以為有備引去自此不復窺邊公於河北最久民愛之為立生祠明年改武勝軍節度使猶在北京又改鎮安軍節度使在鎮四年猶上書鎮安一郡爾不足以自效願復守邊書未報得疾以至和三年閏三月七日己丑薨於陳州之正寢享年六十有九天子輟視朝二日贈中書令諡曰文簡明年祫享太廟推恩加贈公太師尚書令公累階至開府儀同三司勲上柱國爵廣平郡公封户七千四百而實封二千一百賜號推誠保德守正翊戴功臣娶陳氏封衛國夫人子男四人曰嗣隆太常博士嗣弼殿中丞嗣恭太常博士嗣先大理寺丞女五人皆適良族謹按程氏之先出自重黎至休文為周司馬國於程其後子孫遂以為氏自秦漢以来世有其人程氏必顯而各以其所居著姓後世因之至唐尤盛號稱中山程氏者皆祖魏安鄉侯昱公中山博野人也世有積德至公始大顯聞臣修以為古者功德之臣進受國寵退而銘於器物非獨私其後世所以不忘君命示國有人而詩人又播其事聲於咏歌以揚無窮今去古逺為制不同而猶有幽堂之石隧道之碑得以紀德昭烈而又幸䝉天子書而名之其所以照臨程氏恩厚寵榮出古逺甚而臣又得刻銘其下銘臣職也懼不能稱銘曰程以國氏世逺支分因居著姓各以其人公世中山在昔有聞克大自公厥聲以振乃秉國鈞乃授將鉞出入其勤險夷一節帝曰噫歟余有勞臣何以旌之有爛其文惟此勞臣實余同德憂國在心匪勞以力二方有事諸將無功俾我舊老不遑居中間息近藩庶休厥躬有請未報奄云其終沒而後已兹可謂忠惟帝之褒其言甚簡銘以述之萬世丕顯王聞修曰宋史琳傳叙館伴事云契丹使者謂琳曰先皇帝嘗通使承天太后獨無使何也琳曰南北兄弟也先皇帝視承天猶從母故無嫌今皇太后乃嫂也禮不通問歐公誌中亦云使者言太后當遣使通書公以禮折之至碑文全不露蓋與外夷叙兄弟非佳事略見於誌中乃可碑為大書深刻之文不當載也知開封府外戚王齊雄殺人章獻救之琳卒正法又外戚吳氏背夫挈其女納宫中琳請於上曰臣恐天下議陛下占人妻女上急出之此二事史載甚詳而碑誌皆無歐公蓋不欲彰之也此皆古人有體處觀文殿大學士行兵部尚書西京留守贈司空兼侍中晏公神道碑銘至和元年六月觀文殿大學士行兵部尚書西京留守臨淄公以疾歸於京師八月疾少間入見天子曰噫予舊學之臣也乃留侍講邇英閣詔五日一朝前殿明年正月疾作不能朝敕太醫朝夕往視有司除道將幸其家公歎曰吾無狀乃以疾病憂吾君即馳奏曰臣疾少間行愈矣乃止其月丁亥以公薨聞天子震悼亟臨其喪以不即見公為恨贈公司空兼侍中諡曰元獻有司請輟視朝一日詔特輟二日以其年三月癸酉葬公於許州陽翟縣麥秀鄉之北原既葬賜其墓隧之碑首曰舊學之碑既又敕史臣修考次公事具書於碑下臣修伏讀國史見真宗皇帝時天下無事天子方推讓功德祠祀天地山川講禮樂以文頌聲而儒學文章儁賢偉異之人出公世家江西之臨川年始十四一日起田里進見天子時方親閲天下貢士會廷中者千餘人與夫宫臣衛官擁列圜視公不動聲氣操筆為文辭立成以獻天子嘉賞賜同進士出身遂登館閣掌書命以文章為天下所宗逮陛下養德東宫先帝選用臣屬即以公遺陛下由王官宫臣卒登宰相凡所以輔道聖德憂勤國家有舊有勞自始至卒五十餘年公既薨而先帝之名臣與陛下東宫之舊人皆無在者宜其褒寵優異比公甘盤臣修幸得執筆史官奉明詔謹昧死上臨淄公事曰公諱殊字同叔姓晏氏其世次晦顯徙遷不常自其髙祖諱墉唐咸通中舉進士卒官江西始著籍于髙安其後三世不顯曽祖諱延昌又徙其籍于臨川祖諱郜追封英國公考諱固追封秦國公自曽祖以下皆用公貴累贈開府儀同三司太師中書令兼尚書令曽祖妣張氏陳國太夫人祖妣傅氏許國太夫人妣吳氏唐國太夫人公生七歳知學問為文章鄉里號為神童故丞相張文節公安撫江西得公以聞真宗召見既賜出身後二日又召試詩賦論公徐啟曰臣嘗私習此賦不敢隱真宗益嗟異之因試以他題以為秘書省正字置之秘閣使得悉讀秘書命故僕射陳文僖公視其學明年獻其所為文召試中書遷太常寺奉禮郎封祀泰山推恩遷光禄寺丞數月充集賢校理明年遷著作佐郎丁父憂去官已而真宗思之即其家起復命淮南發運使具舟送至京師從祀太清宫賜緋衣銀魚同判太常禮院又丁母憂求去官服喪不許今天子始封昇王公以選為府記室參軍再遷左正言直史館今天子為皇太子以户部員外郎充太子舍人賜金紫知制誥判集賢院遷翰林學士充景靈宫判官太子左庶子兼判太常寺知禮儀院公既以道德文章佐佑東宫真宗有所諮訪多以方寸小紙細書問之由是參與機宻有所對必以其稾進示不洩其後悉閲真宗閣中遺書得公所進稾類為八十巻藏之禁中人莫之見也初真宗遺詔章獻明肅太后權聽軍國事宰相丁謂樞宻使曹利用各欲獨見奏事無敢決其議者公建言羣臣奏事太后者垂簾聽之皆毋得見議遂定乾興元年拜右諫議大夫兼侍讀學士遷給事中景靈宫副使判吏部流内銓以易侍講崇政殿遷禮部侍郎知審官院為樞宻副使遷刑部侍郎上疏論張耆不可為樞宻使由是忤太后㫖坐以笏擊其僕誤折其齒罷留守南京大興學校以教諸生自五代以來天下學廢興自公始召拜御史中丞改兵部侍郎兼秘書監資政殿學士翰林侍讀學士知天聖八年禮部貢舉明年為三司使復為樞宻副使未拜改參知政事遷尚書左丞太后謁太廟有請服衮冕者太后以問公公以周官后服對太后崩大臣執政者皆罷以公為禮部尚書知亳州徙知陳州遷刑部尚書復召為御史中丞又為三司使知樞宻院事拜樞宻使再加檢校太尉同中書門下平章事慶厯三年三月遂以刑部尚書居相位充集賢殿大學士兼樞宻使自公復召用而趙元昊反師出陜西天下弊於兵公數建利害請罷監軍兼以陣圖授諸將使得應敵為攻守及制財用出入之要皆有法天子悉為施行自宫禁先以率天下而財賦之職悉歸有司卒能以謀臣元昊使聽約束乃還其王號公為人剛簡遇人必以誠雖處富貴如寒士罇酒相對歡如也得一善稱之如已出當世知名之士如范仲淹孔道輔等皆出其門及為相益務進賢材當公居相府時范仲淹韓琦富弼皆進用至於臺閣多一時之賢天子既厭西兵憫天下困弊奮然有意遂欲因羣材以更治數詔大臣條天下事方施行而小人權倖皆不便明年秋會公以事罷而仲淹等相次亦皆去事遂已公既罷以工部尚書知潁州徙知陳州又徙許州三遷户部尚書拜觀文殿大學士知永興軍充一路都部署安撫使徙知河南府兼西京留守累進階至開府儀同三司勲上柱國爵臨淄公食邑萬二千户實封三千七百戸公享年六十有五自少篤學至其病亟猶手不釋巻有文集二百四十巻嘗奉敕修上訓及真宗實録又集類古今文章為集選二百巻公為政敏而務以簡便其民其於家嚴子弟之見有時事寡姊孝謹未嘗為子弟求恩澤其在陳州上問宰相曰晏某居外未嘗有所請其亦有所欲邪宰相以告公公自為表問起居而已故其薨也天子尤哀悼之賜予加等以其子承裕為崇文院檢討孫及甥之未官者九人皆命以官公初娶李氏工部侍郎虚已之女次孟氏屯田員外郎虚舟之女封鉅鹿郡夫人次王氏太師尚書令超之女封榮國夫人子八人長曰居厚大理評事早卒次承裕尚書屯田貟外郎宣禮贊善大夫崇讓著作佐郎明逺祗德皆大理評事幾道傳正皆太常寺太祝女六人長適户部侍郎同中書門下平章事富弼次適禮部侍郎三司使楊察其四尚幼孫十有三人公既樂善而稱為知人士之顯於朝者多公所薦逹至擇其女之所從又得二人者如此可謂賢也已銘曰有姜之裔齊為晏氏齊在春秋晏顯諸侯傳載桓子嬰稱於丘其後無聞不亡僅存有煒自公厥聲以振公之顯聲實相天工天子曰噫予考真宗唯多名臣以臻盛隆汝初事我王官東宫以暨相予始卒一躬輔我以德有勞于邦公疾在外来歸自洛天子曰留汝予舊學凡今在庭莫如汝舊孰以畀予惟予聖考今既亡矣孰為予老何以贈之司空侍中禮則有加予思何窮有篆其文在其碑首天子之褒史臣有詔銘以述之永昭厥後茅坤曰節財自宫禁先非晏元獻不能畫非宋仁廟不能從元獻公為相久而子孫十人不以一乞恩澤身後之日朝廷一時並命皆盛世事王聞修曰宋史本傳悉用歐公此文獨於出知潁州處補云孫甫蔡襄上言宸妃生聖躬殊嘗被詔誌墓没而不言又奏論殊役官兵治僦舍以規利然殊以章獻方臨朝故誌不敢斥言而所役兵乃輔臣例宜借者時以為非殊罪按孫蔡所論甚不當歐公此文削之非為晏公諱乃為孫蔡諱也孫蔡墓誌亦出歐公孫誌云言宰相以某事當去者上亟為罷之蔡誌竟不載蓋歐公亦不直之矣安撫江西薦公為神童李防傳亦有之時與張知白同使耳孫蔡既論晏公已而與公同去晏一日遊渦水見蛙登木捕蟬口不能容相與墜地遂作蜩蛙賦略云匿蕞質以潛進跳輕軀而猛噬雖多口而連獲終扼吭而弗制石曼卿墓表曼卿諱延年姓石氏其上世為幽州人幽州入於契丹其祖自成始以其族間走南歸天子嘉其来將禄之不可乃家於宋州之宋城父諱補之官至太常博士幽燕俗勁武而曼卿少亦以氣自豪讀書不治章句獨慕古人竒節偉行非常之功視世俗屑屑無足動其意者自顧不合於時乃一混於酒然好劇飲大醉頽然自放由是益與時不合而人之從其游者皆知愛曼卿落落可竒而不知其才之有以用也年四十八康定二年二月四日以太子中允秘閣校理卒扵京師曼卿少舉進士不第真宗推恩三舉進士皆補奉職曼卿初不肯就張文節公素竒之謂曰母老乃擇禄邪曼卿矍然起就之遷殿直久之改太常寺太祝知濟州金鄉縣歎曰此亦可以為政也縣有治聲通判乾寧軍丁母永安縣君李氏憂服除通判永靜軍皆有能名充館閣校勘累遷大理寺丞通判海州還為校理莊獻明肅太后臨朝曼卿上書請還政天子其後太后崩范諷以言見幸引嘗言太后事者遽得顯官欲引曼卿曼卿固止之乃已自契丹通中國德明盡有河南而臣屬遂務休兵養息天下晏然内外弛武三十餘年曼卿上書言十事不報已而元昊反西方用兵始思其言召見稍用其説籍河北河東陜西之民得鄉兵數十萬曼卿奉使籍兵河東還稱㫖賜緋衣銀魚天子方思盡其才而且病矣既而聞邊將有欲以鄉兵捍賊者笑曰此得吾麤也夫不教之兵勇怯相雜若怯者見敵而動則勇者亦率而潰矣今或不暇教不若募其敢行者則人人皆勝兵也其視世事蔑若不足為及聽其施設之方雖精思深慮不能過也狀貌偉然喜酒自豪若不可繩以法度退而質其平生趣舍大節無一悖於理者遇人無賢愚皆盡忻懽及間而可否天下是非善惡當其意者無幾人其為文章勁健稱其意氣有子濟滋天子聞其喪官其一子使禄其家既卒之三十七日葬於太清之先塋其友歐陽修表於其墓曰嗚呼曼卿寧自混以為髙不少屈以合世可謂自重之士矣士之所負者愈大則其自顧也愈重自顧愈重則其合愈難然欲其共大事立竒功非有難合自重之士不可為也古之魁雄之人未始不負髙世之志故寧或毁身汚迹卒困於無聞或老且死而幸一遇猶克少施於世若曼卿者非徒與世難合而不克所施亦其不幸不得至乎中壽其命也夫其可哀也夫周必大曰歐陽文忠公好賢樂善蓋其天性得交友間寸藁尺書必軸而藏之曼卿子美俊才直節公深知之雄詞健筆公素推之而位皆不過館職年皆不登知命公所尤悲於其遺墨尤獨致意熈寧壬子公夢奠之嵗也猶親跋於巻尾惟公道德文章師表百世而干旄緇衣之好至死靡倦彼爭名者相傾屬文者相軋聞公之風其少愧哉連處士墓表連處士應山人也以一布衣終於家而應山之人至今思之其長老教其子弟所以孝友恭謹禮讓而温仁必以處士為法曰為人如連公足矣其矜寡孤獨凶荒饑饉之人皆曰自連公亡使吾無所告依而生以為恨嗚呼處士居應山非有政令恩威以親其人而能使人如此其所謂行之以躬不言而信者歟處士諱舜賔字輔之其先閩人自其祖光裕嘗為應山令後為磁郢二州推官卒而反葬應山遂家焉處士少舉毛詩一不中而其父正以疾廢於家處士供養左右十餘年因不復仕進父卒家故多貲悉散以賙鄉里而教其二子以學曰此吾貲也歳饑出榖萬斛以糶而市榖之價卒不能增及旁近縣之民皆頼之盗有竊其牛者官為捕之甚急盗窮以牛自歸處士為之愧謝曰煩爾送牛厚遺以遣之嘗以事之信陽遇盗於西關左右告以處士盗曰此長者不可犯也捨之而去處士有弟居雲夢往省之得疾而卒以其柩歸應山應山之人去縣數十里迎哭爭負其柩以還過縣市市人皆哭為之罷市三日曰當為連公行喪處士生四子曰庶庠庸膺其二子教以學者後皆舉進士及第今庶為壽春令庠為宜城令處士以天聖八年十二月某日卒慶厯二年某月日葬於安陸蔽山之陽自卒至今二十年應山之長老識處士者與其縣人嘗頼以為生者往往尚皆在其子弟後生聞處士之風者尚未逺使更三四世至於孫曾其所傳聞有時而失則懼應山之人不復能知處士之詳也乃表其墓以告於後人八年閏正月一日廬陵歐陽修述周必大曰應山連處士一布衣耳既殁而鄭人法其孝友禮遜凡矜寡饑饉之人皆追思之歐陽文忠公表其墓謂行之以躬不言而信蓋實録也有子四人而寳文公則第三子之孫以文章贊書命才略典方面克孝而忠大其家聲今機宜君䝉上拔擢進用未巳施於有政不苐如處士居鄉矣王聞修曰連庶字君錫連庠字元禮皆受學於二宋庶居官清人號為連底清庠加以肅人號為連底凍庶為令以母老乞監陳州稅嘗送客出北門見日西風塵而冠蓋憧憧不已慨然有感即日求分司歸久之以歐公薦知崑山縣辭不行累遷職方員外郎庠終都官郎按二子之賢如此而此表無一語及蓋文體自應如此胡先生墓表先生諱瑗字翼之姓胡氏其上世為陵州人後為泰州如臯人先生為人師言行而身化之使誠明者達昏愚者勵而頑傲者革故其為法嚴而信為道久而遵師道廢久矣自景祐明道以来學者有師惟先生暨泰山孫明復石守道三人而先生之徒最盛其在湖州之學弟子去来常數百人各以其經轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂為學慶厯四年天子開天章閣與大臣講天下事始慨然詔州縣皆立學於是建太學於京師而有司請下湖州取先生之法以為太學法至今為著令後十餘年先生始来居太學學者自逺而至太學不能容取旁官署以為學舍禮部貢舉歳所得士先生弟子十常居四五其髙第者知名當時或取科甲居顯仕其餘散在四方隨其人賢愚皆循循雅飭其言談舉止不問可知為先生弟子其學者相語稱先生不問可知為胡公也先生初以白衣見天子論樂拜秘書省校書郎辟丹州軍事推官改宻州觀察推官丁父憂去職服除為保寧軍節度推官遂居湖學召為諸王宫教授以疾免已而以太子中舎致仕遷殿内丞於家皇祐中驛召至京師議樂復以為大理評事兼太常寺主簿又以疾辭歳餘為光禄寺丞國子監直講廼居太學遷大理寺丞賜緋衣銀魚嘉祐元年遷太子中允充天章閣侍講仍居太學已而病不能朝天子數遣使者存問又以太常博士致仕東歸之日太學之諸生與朝廷賢士大夫送之東門執弟子禮路人嗟歎以為榮以四年六月六日卒於杭州享年六十有七以明年十月五日葬於烏程何山之原其世次官邑與其行事莆陽蔡君謨具誌於幽堂嗚呼先生之德在乎人不待表而見於後世然非此無以慰學者之思乃揭於其墓之原六年八月三日廬陵歐陽修述吕元明曰仁宗時國子先生必求天下賢士就中又擇其尤賢者專委掌教導規矩之事胡翼之為直講有㫖專掌學政胡亦甄别人物擇其過人逺甚人畏服者奨之激之又各因其所好類聚而别居之故好尚經術者好談兵者好文藝者好尚節義者皆以所類羣居相與講習胡亦時召之使論其所學為定其理或自出一義故人皆樂從而有成今朝廷近臣往往胡之徒也瀧岡阡表嗚呼惟我皇考崇公卜吉於瀧岡之六十年其子修始克表於其阡非敢緩也蓋有待也修不幸生四歳而孤太夫人守節自誓居貧自力於衣食以長以教俾至於成人太夫人告之曰汝父為吏廉而好施與喜賔客其俸禄雖薄常不使有餘曰毋以是為我累故其亡也無一瓦之覆一壠之植以庇而為生吾何恃而能自守邪吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而幼吾不能知汝之必有立然知汝父之必將有後也吾之始歸也汝父免於母喪方逾年歳時祭祀則必涕泣曰祭而豐不如養之薄也間御酒食則又涕泣曰昔常不足而今有餘其何及也吾始一二見之以為新免於喪適然耳既而其後常然至其終身未嘗不然吾雖不及事姑而以此知汝父之能養也汝父為吏嘗夜燭治官書屢廢而歎吾問之則曰此死獄也我求其生不得爾吾曰生可求乎曰求其生而不得則死者與我皆無恨也矧求而有得邪以其有得則知不求而死者有恨也夫常求其生猶失之死而世常求其死也囘顧乳者抱汝而立於旁因指而歎曰術者謂我歳行在戌將死使其言然吾不及見兒之立也後當以我語告之其平居教他子弟常用此語吾耳熟焉故能詳也其施於外事吾不能知其居於家無所矜飾而所為如此是真發於中者邪嗚呼其心厚於仁者邪此吾知汝父之必將有後也汝其勉之夫養不必豐要於孝利雖不得博於物要其心之厚於仁吾不能教汝此汝父之志也修泣而志之不敢忘先公少孤力學咸平三年進士及第為道州判官泗綿二州推官又為泰州判官享年五十有九葬沙溪之瀧岡太夫人姓鄭氏考諱德儀世為江南名族太夫人恭儉仁愛而有禮初封福昌縣太君進封樂安安康彭城三郡太君自其家少微時治其家以儉約其後常不使過之曰吾兒不能茍合於世儉薄所以居患難也其後修貶夷陵太夫人言笑自若曰汝家故貧賤也吾處之有素矣汝能安之吾亦安矣自先公之亡二十年修始得禄而養又十有二年列官於朝始得贈封其親又十年修為龍圖閣直學士尚書吏部郎中留守南京太夫人以疾終於官舍享年七十有二又八年修以非才入副樞宻遂參政事又七年而罷自登二府天子推恩褒其三世蓋自嘉祐以来逢國大慶必加寵錫皇曾祖府君累贈金紫光禄大夫太師中書令曾祖妣累封楚國太夫人皇祖府君累贈金紫光禄大夫太師中書令兼尚書令祖妣累封吳國大夫人皇考崇公累贈金紫光禄大夫太師中書令兼尚書令皇妣累封越國太夫人令上初郊皇考賜爵為崇國公太夫人進號魏國於是小子修泣而言曰嗚呼為善無不報而遲速有時此理之常也惟我祖考積善成德宜享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇頼其子孫矣乃列其世譜具刻於碑既又載我皇考崇公之遺訓太夫人之所以教而有待於修者並掲於阡俾知夫小子修之德薄能鮮遭時竊位而幸全大節不辱其先者其来有自熈寧三年歳次庚戌四月辛酉朔十有五日乙亥男推誠保德崇仁翊戴功臣觀文殿學士特進行兵部尚書知青州軍州事兼管内勸農使充京東東路安撫使上柱國樂安郡開國公食邑四千三百户食實封一千二百户修表朱子謂韓愈祭十二郎文後數百年而本朝復有歐陽文忠公瀧岡阡表其為朱子所心折如此然以兩文較之其情致悱惻能達所不能達之隱所謂喜往復善自道者則果相伯仲若夫垂諸萬世使酷吏讀之亦不覺泫然流涕者歐作固專其美而韓遜不如矣子曰茍有車必見其軾茍有衣必見其敝蓋言有其實斯有其文也愈固不得無之而空言之歐之勝者實也如此文者所當自朝廷至於里巷莫不謳吟諷誦者歟夫是之謂羽翼六經羽翼六經云者固不在句訓字詁之徒也儲欣曰千百年墓表中有數文字豈惟居士集之冠予師觀我先生令永豐貽予瀧岡阡表石刻本旁有龍爪迹二焉指數歴然土人云公始磨刻此碑於家舟載以行無何大風雨舟覆稍定使人汨水求碑不可得越一日碑已在瀧岡阡矣完善無毫髪損增二爪迹而已父老相傳龍王欲讀公文遣其屬攫致之其説頗誕然文章能事至於如此於以動神明而感怪物亦理之或然者歟御選唐宋文醇巻三十一
