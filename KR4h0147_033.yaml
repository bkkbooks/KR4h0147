body:
  text: 廬陵歐陽修文十二墓志銘端明殿學士蔡公墓志銘孫明復先生墓志銘黃夢升墓志銘尹師魯墓志銘徂徠石先生墓志銘欽定四庫全書御選唐宋文醇卷三十三廬陵歐陽修文十二端明殿學士蔡公墓志銘公諱襄字君謨興化軍仙逰人也天聖八年舉進士甲科為漳州軍事判官西京留守推官改著作佐郎館閣校勘慶厯三年以祕書丞集賢校理知諌院兼修起居注是時天下無事士大夫弛于久安一日元昊叛師久無功天子慨然厭兵思正百度以修太平既已排羣議進退二三大臣又詔增置諌官四貟使拾遺補闕所以遇之甚寵公以材名在選中遇事感激無所回避權幸畏斂不敢撓法干政而上得益與大臣圗議明年屢下詔書勸農桑興學校革弊修廢而天下悚然知上之求治矣于此之時言事之臣無日不進見而公之補益為尤多四年以右正言直史館出知福州以便親遂為福建路轉運使復古五塘以溉田民以為利為公立生祠于塘側又奏減閩人五代時丁口稅之半丁父憂服除判三司鹽鐵勾院復修起居注今參知政事唐公介時為御史以直言忤旨貶春州别駕廷臣無敢言者公獨論其忠人皆危之而上悟意解唐公得改英州遂復召用皇祐四年遷起居舍人知制詰兼判流內銓御史吕景初吳中復馬遵坐論梁丞相適罷臺職除他官公封還辭頭不草制其後屢有除授非當者必皆封還之而上遇公益厚曰有子如此其母之賢可知命特賜冠帔以寵之至和元年遷龍圗閣直學士知開封府三年以樞密直學士知泉州徙知福州未幾復知泉州公為政精明而於閩尤知其風俗至則禮其士之賢者以勸學興善而變民之故除其甚害往時閩人多好學而專用賦以應科舉公得先生周希孟以經術傳授學者常至數百人公為親至學舍執經講問為諸生率延見處士陳烈尊以師禮而陳襄鄭穆方以德行著稱鄉里公皆折節下之閩俗重凶事其奉浮屠會賔客以盡力豐侈為孝否則深自愧恨為鄉里羞而姦民遊手無賴子幸而貪飲食利錢財來者無限極往往至數百千人至有親亡祕不舉哭必破産辦具而後敢發喪者有力者乘其急時賤買其田宅而貧者立劵舉債終身困不能償公曰弊有大於此邪即下令禁止至於巫覡主病蠱毒殺人之類皆痛斷絶之然後擇民之聰明者教以醫藥使治疾病其子弟有不率教令者條其事作五戒以教諭之久之閩人大便公既去閩人相率詣州請為公立德政碑吏以法不許謝即退而以公善政私刻于石曰俾我民不忘公之德嘉祐五年召拜翰林學士權三司使三司開封世稱省府為難治而易以毁譽居者不由以遷則由以敗而敗者十常四五公居之皆有能名其治京師談笑無留事尤喜破姦發隱吏不能欺至商財利則較天下盈虛出入量力以制用必使下完而上給下暨百司因習蠧弊切磨剗剔久之簿書纎悉紀綱條目皆可法七年季秋大享明堂後數月仁宗崩英宗即位數大賞賚及作永昭陵皆猝辦于縣官經費外公應煩愈間暇若有餘而人不知勞遂拜三司使居二嵗以母老求知杭州即拜端明殿學士以往三年徙南京留守未行丁母夫人憂明年八月某日以疾卒於家享年五十有六蔡氏之譜自晉從事中郎克以來世有顯聞其後中衰隱德不仕公年十八以農家子舉進士為開封第一名動京師後官於閩典方州領使一路二親尚皆無恙閩人瞻望咨嗟不榮公之貴而榮其父母母夫人尤有夀年九十餘飲食起居康強如少者嵗時為夀母子鬢髮皆皤然而命服金紫煌煌如也至今閩人之為子者必以夫人祝其親為父母者必以公教其子也公於朋友重信義聞其喪則不御酒肉為位以哭盡哀乃止嘗會飲會靈東園坐客有射矢誤傷人者客遽指為公矢京師喧然事既聞上以問公公即再拜愧謝終不自辨退亦未嘗以語人公為文章清遒粹美有文集若干卷工於書畫頗自惜不妄為人書故其殘章斷稿人悉珍藏而仁宗尤愛稱之御製元舅隴西王碑文詔公書之其後命學士撰溫成皇后碑文又敕公書則辭不肯書曰此待詔職也公纍官至禮部侍郎既卒翰林學士王圭等十餘人列言公賢其亡可惜天子新即位未及識公而聞其名久矣為之惻然特贈吏部侍郎官其子旻為祕書省正字孫傳及弟之子均皆守將作監主簿而優以賻恤以旻尚幼命守吏助給其喪事曾祖諱顯皇不仕祖諱恭贈工部貟外郎父諱琇贈刑部侍郎母夫人盧氏長安郡太君夫人葛氏永嘉郡君子男三人曰勻將作監主薄曰旬大理評事皆先公卒幼子旻也女三人一適著作佐郎謝仲規二尚幼以某年某月某日葬公於莆田縣某鄉將軍山銘曰誰謂閩逺而多竒産産非竒寶惟士之賢嶷嶷蔡公其人傑然奮躬當朝讜言正色出入左右彌縫補益間歸於閩有政在人食不畏蠱喪不憂貧疾者有醫學者有師問誰使然孰不公思有髙其墳有拱其木凡閩之人過者必肅洪邁曰歐陽公作蔡君謨墓志公工于書畫云云國史傳所載蓋用其語比見蔡與歐陽一帖云嚮者得侍陛下清光時有天旨令寫御撰碑文宫寺題榜至有勳戚之家干請朝廷出敕令書襄謂近世書寫碑志則有資利若朝廷之命則有司存焉待詔其職也今與待詔爭利其可乎然後知蔡公之旨意如此不止一溫成碑而已其清介有守後世或未知之孫明復先生墓志銘先生諱復字明復姓孫氏晉州平陽人也少舉進士不中退居泰山之陽學春秋著尊王發微魯多學者其尤賢而有道者石介自介而下皆以弟子事之先生年逾四十家貧不娶李丞相迪將以其弟之女妻之先生疑焉介與羣弟子進曰公卿不下士久矣今丞相不以先生貧賤而欲託以子是髙先生之行義也先生宜因以成丞相之賢名于是乃許孔給事道輔為人剛直嚴重不妄與人聞先生之風就見之介執杖屨侍左右先生坐則立升降拜則扶之及其往謝也亦然魯人既素髙此兩人由是始識師弟子之禮莫不歎嗟之而李丞相孔給事亦以此見稱於士大夫其後介為學官語于朝曰先生非隱者也欲仕而未得其方也慶厯二年樞密副使范仲淹資政殿學士富弼言其道德經術宜在朝廷召拜校書郎國子監直講嘗召見邇英閣説詩將以為侍講而嫉之者言其講説多異先儒遂止七年徐州人孔直溫以狂謀捕治索其家得詩有先生姓名坐貶監處州商稅徙泗州又徙知河南府長水縣僉署應天府判官公事通判陵州翰林學士趙概等十餘人上言孫某行為世法經為人師不宜棄之逺方乃復為國子監直講居三嵗以嘉祐二年七月二十四日以疾卒于家享年六十有六官至殿中丞先生在太學時為大理評事天子臨幸賜以緋衣銀魚及聞其喪惻然豫其家錢十萬而公卿大夫朋友太學之諸生相與弔哭賻治其喪于是以其年十月二十七日葬先生於鄆州須城縣盧泉鄉之北扈原先生治春秋不惑傳注不為曲説以亂經其言簡易明于諸侯大夫功罪以考時之盛衰而推見王道之治亂得於經之本義為多方其病時樞密使韓琦言之天子選書吏給紙筆命其門人祖無擇就其家得其書十有五篇録之藏于祕閣先生一子大年尚幼銘曰聖既殁經更戰焚逃藏脫亂僅傳存衆説乘之汨其原怪迂百出雜偽真後生牽卑習前聞有欲患之寡攻羣往往止燎以膏薪有勇夫子闢浮雲刮磨蔽蝕相吐吞日月卒復光破昏博哉功利無窮垠有考其不在斯文王明清曰范文正在睢陽有孫秀才者索逰上謁言有老母文正識之補為學職授之春秋孫篤學行復修謹文正甚愛之既去後十年聞泰山下有孫先生以春秋授徒朝廷髙之召至太學乃昔日孫秀才也文正歎曰貧之為纍大矣倘因循至老以彼其才安所自見哉夫文正識孫生竒矣乃孫生必就索于文正豈所謂飢從謝仁祖求食邪王定國曰張堯封少從孫明復學其子去華與貴妃常執事左右及妃貴數遣使致問明復閉門拒之終身貴妃即溫成皇后也黃夢升墓志銘豫友黃君夢升其先婺州金華人後徙洪州之分寧其曽祖諱元吉祖諱某父諱中雅皆不仕黃氏世為江南大族自其祖父以來樂以家資賑鄉里多聚書以招延四方之士夢升兄弟皆好學尤以文章意氣自豪豫少家隨州夢升從其兄茂宗官于隨豫為童子立諸兄側見夢升年十七八眉目明秀善飲酒談笑豫雖幼心已獨竒夢升後七年豫與夢升皆舉進士于京師夢升得丙科初任興國軍永興主簿怏怏不得志以疾去久之復調江陵府公安主簿時豫謫夷陵令遇之于江陵夢升顔色憔悴初不可識久而握手噓嚱相飲以酒夜醉起舞歌呼大噱豫益悲夢升志雖衰而少時意氣尚在也後二年豫徙乾德令夢升復調南陽主簿又遇之于鄧間嘗問其平生所為文章幾何夢升慨然歎曰吾已諱之矣窮逹有命非世之人不知我我羞道于世人也求之不肯出遂飲之酒復大醉起舞歌呼因笑曰子知我者乃肯出其文讀之博辨雄偉意氣奔放若不可禦豫又益悲夢升志雖困而文章未衰也是時謝希深出守鄧州尤喜稱道天下士豫因手書夢升文一通欲以示希深未及而希深卒豫亦去鄧後之守鄧者皆俗吏不復知夢升夢升素剛不茍合負其所有常怏怏無所施卒以不得志死于南陽夢升諱注以寶元二年四月二十五日卒享年四十有二其平生所為文曰破碎集公安集南陽集凡三十卷娶潘氏生四男二女將以慶厯四年某月某日葬于董坊之先塋其弟渭泣而來告曰吾兄患世之莫吾知孰可為其銘子素悲夢升者因為之銘曰豫嘗讀夢升之文至于哭其兄子庠之詞曰子之文章電激雷震雨雹忽止闃然滅泯未嘗不諷誦歎息而不已嗟夫夢升曾不及庠不震不驚鬱塞埋藏孰豫其有不使其施吾不知所歸咎徒為夢升而悲黃庭堅書後云叔祖夢升學問文章五兵縱橫制作之意似徐陵庾信使同時遇合未知孰先孰後也然不幸得人間四十年爾使之白髮角逐于英俊之場又未知與歐陽公孰先孰後也夢升既乖捂不逢嘗以文哭世父長善云髙明之家尚為鬼瞰子之文章豈無物憾蓋自道也安世十三弟秀而不實使人氣塞于今孫曽特多英妙之質力學不休安知來者之不如今也陳善曰文章雖不要蹈襲古人一言一句然古人自有奪胎換骨等法所謂靈丹一粒點鐵成金也歐陽公祭蘇子美文云子之心胸蟠屈龍蛇風雷變化雨雹交加忽然揮斧霹靂轟車人有遭之心驚膽破震仆如麻須臾霽止而回顧百里山川草木開發萌芽子于文章雄豪放肆有如此者吁可怪邪但知誦公此文而不知實有本處公作黃夢升墓銘稱夢升哭其兄子庠之詞曰子之文章電激雷震雨雹忽止闃然滅泯公嘗喜誦之祭文蓋用此耳夢升所作雖不多見觀其詞句多竒可喜正得所謂千兵萬馬之意及公增以數語而變態如此此固非蹈襲者其後東坡跋薑君弼課册亦云雲興天際歘若車蓋凝矑未瞬瀰漫霮䨴驚雷出火震木糜碎殷地爇空萬夫皆廢霤綆四墜日中見沫移晷而收野無完塊此三者語各不同然只是一意前輩作者皆用此法吾謂此實不傳之妙學者即此便可反三隅矣尹師魯墓志銘師魯河南人姓尹氏諱洙然天下之士識與不識皆稱之曰師魯蓋其名重當世而世之知師魯者或推其文學或髙其議論或多其材能至其忠義之節處窮逹臨禍福無愧於古君子則天下之稱師魯者未必盡知之師魯為文章簡而有法博學強記通知古今長於春秋其與人言是是非非務窮盡道理乃已不為茍止而妄隨而人亦罕能過也遇事無難易而勇于敢為其所以見稱於世者亦所以取嫉于人故其卒窮以死師魯少舉進士及第為絳州正平縣主簿河南府戶曺參軍邵武軍判官舉書判拔萃遷山南東道掌書記知伊陽縣王文康公薦其才召試充館閣校勘遷太子中允天章閣待制范公貶饒州諌官御史不肯言師魯上書言仲淹臣之師友願得俱貶貶監郢州酒稅又徙唐州遭父喪服除復得太子中允知河南縣趙元昊反陕西用兵大將葛懷敏奏起為經略判官師魯雖用懷敏辟而尤為經略使韓公所深知其後諸將敗於好水韓公降知秦州師魯亦徙通判濠州久之韓公奏得通判秦州遷知涇州又知渭州兼涇原路經略部署坐城水洛與邉將異議徙知晉州又知潞州為政有惠愛潞州人至今思之纍遷官至起居舍人直龍圗閣師魯當天下無事時獨喜論兵為敘燕息戍二篇行於世自西兵起凡五六嵗未嘗不在其間故其論議益精密而於西事尤習其詳其為兵制之説述戰守勝敗之要盡當今之利害又欲訓土兵代戍卒以減邉用為禦戎長久之䇿皆未及施為而元昊臣西兵解嚴師魯亦去而得罪矣然則天下之稱師魯者於其材能亦末必盡知之也初師魯在渭州將吏有違其莭度者欲按軍法斬之而不果其後吏至京師上書訟師魯以公使錢貸部將貶崇信軍莭度副使徙監均州酒稅得疾無醫藥舁至南陽求醫疾革憑几而坐顧稚子在前無甚憐之色與賔客言終不及其私享年四十有六以卒師魯娶張氏某縣君有兄源字子漸亦以文學知名前一嵗卒師魯凡十年間三貶官喪其父又喪其兄有子四人連喪其二女一適人亦卒而其身終以貶死一子三嵗四女未嫁家無餘資客其喪于南陽不能歸平生故人無逺邇皆往賻之然後妻子得以其柩歸河南以某年某月某日葬于先塋之次余與師魯兄弟交嘗銘其父之墓矣故不復次其世家焉銘曰藏之深固之密石可朽銘不滅歐陽修自記志言天下之人識與不識皆知師魯文學議論材能則文學之長議論之髙材能之美不言可知又恐太略故條析其事再述于後述其文則曰簡而有法此一句在孔子六經惟春秋可當之其他經非孔子自作文章故雖有法而不簡也修于師魯之文不薄矣而世之無識者不考文之輕重但責言之多少云師魯文章不合祗著一句道了既述其文則又述其學曰通知古今此語若必求其可當者惟孔孟也既述其學則又述其論議云是是非非矜盡其道理不茍止而妄隨亦非孟子不可當此語既述其論議則又述其材能備言師魯歷貶自兵興便在陕西尤深知西事未及施為而元昊臣師魯得罪使天下之人盡知師魯材能此三者皆君子之極美然在師魯猶為末事其大莭乃篤于仁義窮逹禍福不愧古人其事不可遍舉故舉其要者一兩事以取信如上書論范公而自請同貶臨死而語不及私則平生忠義可知也其臨窮逹禍福不愧古人又可知也既已具言其文其學其議論其材能其忠義遂又言其為讐人挾情論告以貶死又言其死後妻子困窮之狀欲使後世知有如此人以如此事廢死至于妻子如此困窮所以深痛死者而切責當世君子致斯人之及此也春秋之義痛之益至則其辭益深子般卒是也詩人之意責之愈切則其言愈緩君子偕老是也不必號天叫屈然後為師魯稱寃也故于其銘文但云藏之深固之密石可朽銘不滅意謂舉世無可告語但深藏牢埋此銘使其不朽則後世必有知師魯者其語愈緩其意愈切詩人之義也而世之無識者乃云銘文不合不講德不辨師魯以非罪蓋為前言其窮逹禍福無愧古人則必不犯法况是讐人所告故不必區區曲辨也今止直言所坐自然知非罪矣添之無害故勉徇議者添之若作古文自師魯始則前有穆修鄭條輩及有大宋先逹甚多不敢斷自師魯始也偶儷之文茍合于理未必為非故不是此而非彼也若謂近年古文自師魯始則范公祭文已言之矣可以互見不必重出也皇甫湜韓文公墓志李翺行狀不必同亦互見之也志云師魯喜論兵論兵儒者末事言喜無害喜非嬉戲之戲喜者好也君子固有所好矣孔子言回也好學豈是薄顔回乎後生小子未經師友茍恣所見豈足聽哉修見韓退之與孟郊聮句便似孟郊詩與樊宗師作志便似樊文慕其如此故師魯之志用意特深而語簡蓋謂師魯文簡而意深又思平生作文惟師魯一見展卷疾讀五行俱下便曉人深處因謂死者有知必受此文所以慰吾亡友爾豈恤小子輩哉徂徠石先生墓志銘徂徠先生姓石氏名介字守道兖州奉符人也徂徠魯東山而先生非隱者也其仕嘗位於朝矣魯之人不稱其官而稱其德以為徂徠魯之望先生魯人之所尊故因其所居山以配其有德之稱曰徂徠先生者魯人之志也先生貌厚而氣完學篤而志大雖在畎畝不忘天下之憂以為時無不可為為之無不至不在其位則行其言吾言用功利施于天下不必出乎已吾言不用雖獲禍咎至死而不悔其遇事發憤作為文章極陳古今治亂成敗以指切當世賢愚善惡是是非非無所諱忌世俗頗駭其言由是謗議喧然而小人允嫉惡之相與出力必擠之死先生安然不惑不變曰吾道固如是吾勇過孟軻矣不幸遇疾以卒既卒而姦人有欲以竒禍中傷大臣者猶指先生以起事謂其詐死而北走契丹矣請發棺以驗賴天子仁聖察其誣得不發棺而保全其妻子先生世為農家父諱丙始以仕進官至太常博士先生年二十六舉進士甲科為鄆州觀察推官南京留守推官御史臺辟主簿未至以上書論赦罷不召秩滿遷某軍莭度掌書記代其父官於蜀為嘉州軍事判官丁內外艱去官垢面跣足躬耕徂徠之下葬其五世未葬者七十喪服除召入國子監直講是時兵討元昊久無功海內重困天子奮然思欲振起威德而進退二三大臣增置諌官御史所以求治之意甚鋭先生躍然喜曰此盛事也雅頌吾職其可己乎乃作慶厯聖德詩以褒貶大臣分别邪正纍數百言詩出泰山孫明復曰子禍始于此矣明復先生之師友也其後所謂姦人作竒禍者乃詩之所斥也先生自間居徂徠後官于南京嘗以經術教授及在太學益以師道自居門人弟子從之者甚衆太學之興自先生始其所為文章曰某集者若干卷曰某集者若干卷其斥佛老時文則有怪説中國論曰去此三者然後可以有為其戒姦臣宦女則有唐鑑曰吾非為一世監也其餘喜怒哀樂必見于文其辭博辨雄偉而憂思深逺其為言曰學者學為仁義也惟忠能忘其身惟篤於自信者乃可以力行也以是行于已亦以是教于人所謂堯舜禹湯文武周公孔子孟軻揚雄韓愈氏者未嘗一日不誦於口思與天下之士皆為周孔之徒以致其君為堯舜之君民為堯舜之民亦未嘗一日少忘於心至其違世驚衆人或笑之則曰吾非狂癡者也是以君子察其行而信其言推其用心而哀其志先生直講嵗餘杜祁公薦之天子拜太子中允今丞相韓公又薦之乃直集賢院又嵗餘始去太學通判濮州方待次于徂徠以慶厯五年七月某日卒于家享年四十有一友人廬陵歐陽修哭之以詩以為待彼謗焰熄然後先生之道明矣先生既沒妻子凍餒不自勝今丞相韓公與河陽富公分俸買田以活之後二十一年其家始克葬先生於某所將葬其子師訥與其門人薑潛杜默徐遁等來告曰謗焰熄矣可以發先生之光矣敢請銘某曰吾詩不云乎子道自能久也何必吾銘遁等曰雖然魯人之欲也乃為之銘曰徂徠之巖巖與子之德兮魯人之所瞻汶水之湯湯與子之道兮逾逺而彌長道之難行兮孔孟亦云遑遑一世之屯兮萬世之光曰吾不有命兮安在夫桓魋與臧倉自古聖賢皆然兮噫子雖毁其何傷石介慶厯聖德詩於惟慶厯三年三月皇帝龍興徐出闈闥晨坐太極晝開閶闔躬覽英賢手鉏姦枿大聲渢渢震搖六合如乾之動如雷之發昆蟲蹢躅怪妖藏滅同明道初天地嘉吉初聞皇帝蹙然言曰豫祖豫父付豫大業豫恐失墜實賴輔弼汝得象殊重愼微密君相豫久豫嘉君伐君仍相豫笙鏞斯協昌朝儒者學問該洽與豫論政傅以經術汝二二相庶績咸秩惟汝仲淹汝誠豫察太后乘勢湯沸火熱汝時小臣危言嶪嶪為豫司諌正豫門闑為豫京兆堲子讒説賊叛豫夏往豫式遏六月酷日大冬積雪汝寒汝暑同豫士卒豫聞辛酸汝不告乏豫晚得弼豫心弼恱弼每見豫無有私謁以道輔豫弼言深切豫不堯舜弼自笞罰諌官一年疏奏滿篋侍從周嵗忠力厪竭契丹忘義檮杌叨餮敢侮大國其辭慢悖弼將豫命不畏不怯卒復舊好民得食褐沙磧萬里死生一莭視弼之膚霜剝風裂觀弼之心煉金煆鐡寵名大官以酬勞渴弼辭不受其志莫奪惟仲淹弼一夔一契天實賚豫豫其敢忽並來弼豫民無瘥札曰衍汝來汝豫黃髮事豫二紀毛秃齒豁心如一兮率履弗越遂長樞府兵政無蹶豫早識琦琦有竒骨其器磊落豈視扂楔其人渾朴不施剖劂可屬大事敦厚如勃琦汝副衍知人豫哲惟修惟靖立朝䡾䡾言論磊砢忠誠特逹祿微身賤其志不怯嘗詆大官亟遭貶黜萬里歸來剛氣不折屢進直言以補豫闕素相之後含忠履潔昔為御史幾叩豫榻襄雖小官名聞豫徹亦嘗獻言針豫之失剛守粹慤與修儔匹並為諌官正色在列豫過汝言毋鉗汝舌皇帝聖明忠邪辨别舉擢畯良掃除妖魃衆賢之進如茅斯拔大姦之去如距斯脫上倚輔弼司豫調燮下賴諌諍維豫紀法左右正人無有邪孽豫望太平日不逾浹皇帝嗣位二十二年神武不殺其默如淵聖人不測其動如天賞罰在豫不失其權恭已南面退姦進賢知賢不易非明弗得去邪維艱惟斷乃克明則不二斷則不惑既明且斷惟皇帝之德羣臣踧踖重足屏息交相教語曰惟正直毋作側僻皇帝汝殛諸侯危栗墮玉失舄交相告語皇帝神明四時朝覲謹修臣職四夷走馬墜鐙遺䇿交相告語皇帝英武解兵修貢永為屬國皇帝一舉羣臣懾焉諸侯畏焉四夷服焉臣碩皇帝夀萬千年歐陽修讀徂徠集詩徂徠魯東山石子居山阿魯人之所瞻子與山嵳峩今子其死矣東山復誰過精魄已埋沒文章豈能磨夀命雖不長所得固已多舊稿偶自録滄溟之一蠡其餘誰付與散失存幾何存之警後世古鑑照妖魔子生誠多難憂患靡不罹宦學三十年六經老研摩問胡所專心仁義丘與軻揚雄韓愈氏此外豈知他尤勇攻佛老奮筆如揮戈不量敵衆寡膽大身么麼往年遭母喪泣血走岷峨垢靣跣雙足鋤犁事田坡至今鄉里化孝弟勤蠶禾昨者來太學青衫踏朝鞾陳詩頌聖德厥聲續漪那羔鴈聘黃豨豨驚走鄰家施為可怪駭世俗安委蛇謗口由此起中之若飛梭上賴天子聖不挂網者羅憶在太學年大雪如翻波生徒日盈門飢坐列鴈鵝弦誦聒鄰里唐虞賡詠歌常續最髙第騫遊各名科豈止學者師謂宜國之皤夭夀反仁鄙誰尸此偏頗不知呶呶者又忍加詆訶聖賢欲久逺毁譽暫喧譁生為舉世疾死也魯人嗟作詩遺魯狂祠子以為歌我欲哭石子夜開徂徠編開編末及讀涕泗已漣漣勉盡三四章收淚輒欣歡切切善惡戒丁寧仁義言如聞子談論疑子立我前乃知長在世誰謂已沉泉昔也人事乖相從常苦艱今而每思子開卷子在顔我欲貴子文刻以金石聮金可爍而鎖玉可碎非堅不若書以紙六經皆紙傳但當書百本傳百以為千或落於四夷或藏在深山待彼謗熖熄放此光芒懸人生一世中長短無百年無窮在其後萬世在其先得長多幾何得短未足憐惟彼不可朽名聲文行然讒誣不須辨亦止百年間百年後來者憎愛不相緣公議然後出自然見媸妍孔孟困一生毁逐遭百端後世茍不公至今無聖賢所以忠義士恃此死不難當子病方革謗辭正騰喧衆人皆欲殺聖主獨保全已埋猶不信僅免斫其棺此事古來有每思輒長歎我欲犯衆怒為子訟此寃下紓冥冥忿仰叫昭昭天書於蒼翠石立彼崔巍巔詢求子家世恨子兒女頑經嵗不見報有辭未能詮忽開子遺文使我心已㝟子道自能久吾言豈須鐫劉夢得曰石守道與歐文忠同年進士名相連皆第一甲國初諸儒但守傳注自孫明復為春秋發微稍出已意守道師之及為慶厯聖德詩遂臧否卿相孫明復聞之曰為天下不當如是禍必自此始御選唐宋文醇卷三十三
