body:
  text: 廬陵歐陽修文五論記為君難論上為君難論下吉州學記峴山亭記豐樂亭記醉翁亭記偃虹隄記王彥章畫像記仁宗御飛白記伐樹記欽定四庫全書御選唐宋文醇卷二十六廬陵歐陽修文五為君難論上語曰為君難者孰難哉蓋莫難於用人夫用人之術任之必專信之必篤然後能盡其材而可共成事及其失也任之欲專則不復謀於人而拒絶羣議是欲盡一人之用而先失衆人之心也信之欲篤則一切不疑而果於必行是不審事之可否不計功之成敗也夫違衆舉事又不審計而輕發其百舉百失而及於禍敗此理之宜然也然亦有幸而成功者人情成是而敗非則又從而贊之以其違衆為獨見之明以其拒諫為不惑羣論以其偏信而輕發為決於能斷使後世人君慕此三者以自期至其信用一失而及於禍敗則雖悔而不可及此甚可歎也前世為人君者力拒羣議專信一人而不能早悟以及於禍敗者多矣不可以遍舉請試舉其一二昔秦苻堅地大兵强有衆九十六萬號稱百萬蔑視東晉指為一隅謂可直以氣吞之耳然而舉國之人皆言晉不可伐更進互說者不可勝數其所陳天時人事堅隨以强辨折之忠言讜論皆沮屈而去如王猛荷融老成之言也不聽太子宏少子詵至親之言也不聽沙門道安堅平生所信重者也數為之言不聽惟聽信一將軍慕容垂者垂之言曰陛下內斷神謀足矣不煩廣訪朝臣以亂聖慮堅大喜曰與吾共定天下者惟卿爾於是決意不疑遂大舉南伐兵至夀春晉以數千人擊之大敗而歸比至洛陽九十六萬兵亡其八十六萬堅自此兵威沮喪不復能振遂至於亂亡近五代時後唐清泰帝患晉祖之鎮太原也地近契丹恃兵跋扈議欲徙之於鄆州舉朝之士皆諫以為未可帝意必欲徙之夜召常所與謀樞密直學士薛文遇問之以決可否文遇對曰臣聞作舍道邉三年不成此事斷在陛下何必更問羣臣帝大喜曰術者言我今年當得一賢佐助我中興卿其是乎即時命學士草制徙晉祖於鄆州明旦宣麻在廷之臣皆失色後六日而晉祖反書至清泰帝憂懼不知所為謂李嵩曰我適見薛文遇為之肉顫欲自抽刀刺之嵩對曰事已至此悔無及矣但君臣相顧涕泣而已由是言之能力拒羣議專信一人莫如二君之果也由之以致禍敗亂亡亦莫如二君之酷也方苻堅欲與慕容垂共定天下清泰帝以薛文遇為賢佐助我中興可謂臨亂之君各賢其臣者也或有詰豫曰然則用人者不可專信乎應之曰齊桓公之用管仲蜀先主之用諸葛亮可謂専而信矣不聞舉齊蜀之臣民非之也蓋其令出而舉國之臣民從事行而舉國之臣民便故桓公先主得以專任而不二也使令出而兩國之人不從事行而兩國之人不便則彼二君者其肯專任而信之以失衆心而斂國怨乎為君難論下嗚呼用人之難難矣未若聽言之難也夫人之言非一端也巧辨縱橫而可喜忠言質朴而多訥此非聽言之難在聽者之明暗也諛言順意而易悅直言逆耳而觸怒此非聽言之難在聽者之賢愚也是皆未足為難也若聽其言則可用然用之有輒敗人之事者聽其言若不可用然非如其言不能以成功者此然後為聽言之難也請試舉其一二戰國時趙將有趙括者善言兵自謂天下莫能當其父奢趙之名將老於用兵者也每與括言亦不能屈然奢終不以括為能也歎曰趙若以括為將必敗趙事其後奢死趙遂以括為將其母自見趙王亦言括不可用趙王不聽使括將而攻秦括為秦軍射死趙兵大敗降秦者四十萬人坑於長平蓋當時未有如括善言兵亦未有如括大敗者也此聽其言可用用之輒敗人事者趙括是也秦始皇欲伐荆問其將李信用兵幾何信方年少而勇對曰不過二十萬足矣始皇大喜又以問老將王翦翦曰非六十萬不可始皇不悅曰將軍老矣何其怯也因以信為可用即與兵二十萬使伐荆王翦遂謝病退老於頻陽已而信大為荆人所敗亡七都尉而還始皇大慙自駕如頻陽謝翦因强起之翦曰必欲用臣非六十萬不可於是卒與六十萬而往遂以滅荆夫初聽其言若不可用然非如其言不能以成功者王翦是也且聽計於人者宜如何聽其言若可用用之宜矣輒敗事聽其言若不可用捨之宜矣然必如其說則成功此所以為難也豫又以為秦趙二主非徒失於聽言亦由樂用新進忽棄老成此其所以敗也大扺新進之士喜勇鋭老成之人多持重此所以人主之好立功名者聽勇鋭之語則易合聞持重之言則難入也若趙括者則又有說焉豫略考史記所書是時趙方遣廉頗攻秦頗趙名將也秦人畏頗而知括虛言易與也因行反間於趙曰秦人所畏者趙括也若趙以為將則秦懼矣趙王不悟反間也遂用括為將以代頗藺相如力諫以為不可趙王不聽遂至於敗由是言之括虛談無實而不可用其父知之其母亦知之趙之諸臣藺相如等亦知之外至敵國亦知之獨其主不悟爾夫用人之失天下之人皆知其不可而獨其主不知者莫大之患也前世之禍亂敗亡由此者不可勝數也為君難論分著用人聽言之難故作上下二篇實一首也吉州學記慶厯三年秋天子開天章閣召政事之臣八人問治天下其要有幾施於今者宜何先使坐而書以對八人者皆震恐失位俯伏頓首言此非愚臣所能及惟陛下所欲為則天下幸甚於是詔書屢下勸農桑責吏課舉賢才其明年三月遂詔天下皆立學置學官之員然後海隅徼塞四方萬里之外莫不皆有學嗚呼盛矣學校王政之本也古者致治之盛衰視其學之興廢記曰國有學遂有序黨有庠家有孰此三代極盛之時大備之制也宋興蓋八十有四年而天下之學始克大立豈非盛美之事須其久而後至於大備歟是以詔下之日臣民喜幸而奔走就事者以後為羞其年十月吉州之學成州舊有夫子廟在城之西北今知州事李侯寬之至也謀與州人遷而大之以為學舍事方上請而詔已下學遂以成李侯治言敏而有方其作學也吉之士率其私錢一百五十萬以助用人之力積二萬二千工而人不以為勞其良材堅甓之用凡二十二萬三千五百而人不以為多學有堂筵齊講有藏書之閣有賔客之位有遊息之亭嚴嚴翼翼壯偉閎耀而人不以為侈既成而來學者常三百餘人豫世家於吉而濫官於朝進不能贊揚天子之盛美退不得與諸生揖讓乎其中然豫聞教學之法本於人性磨揉遷革使趨於善其勉於人者勤其入於人者漸善教者以不倦之意須遲久之功至於體讓興行而風俗純美然後為學之成今州縣之吏不得久其職而躬親於教化也故李侯之績及於學之立而不及待其成惟後之人毋廢慢天子之詔而怠以中止幸豫他日因得歸榮故鄉而謁於學門將見吉之士皆道德明秀而可為公卿問於其俗而婚喪飲食皆中禮節入於其里而長幼相孝慈於其家行於其郊而少者扶其羸老壯者代其負荷於道路然後樂學之道成而得時從先生耆老席於衆賔之後聽鄉樂之歌飲獻酬之酒以詩頌天子太平之功而周覽學舍思詠李侯之遺愛不亦美哉故於其始成也刻辭於石而立諸其廡以俟蔡世逺曰歐曽學記雖於道之大原未能洞徹學者下手工夫未能親切指示然從經史中幾經研究議論正大文筆茂美卓然儒者之文峴山亭記峴山臨漢上望之隱然蓋諸山之小者而其名特著於荆州者豈非以其人哉其人謂誰羊祐叔子杜預元凱是已方晉與吳以兵爭常倚荆州以為重而二子相繼於此遂以平吳而成晉業其功烈已蓋於當世矣至於風流餘韻藹然被於江漢之間者至今人猶思之而於思叔子也尤深蓋元凱以其功而叔子以其仁二子所為雖不同然皆足以垂於不朽而頗疑其反自汲汲於後世之名者何哉傳言叔子嘗登茲山慨然語其屬以為此山常在而前世之士皆已湮滅於無聞因自顧而悲傷然獨不知兹山待已而名著也元凱銘功於二石一置兹山之上一投漢水之淵是知陵谷有變而不知石有時而磨滅也豈皆自喜其名之甚而過為無窮之慮歟將自待者厚而所思者逺歟山故有亭世傳以為叔子之所遊止也故其屢廢而復興者由後世慕其名而思其人者多也熙寧元年余友人史君中輝以光祿卿來守襄陽明年因亭之舊廣而新之既周以回廊之壯又大其後軒使與亭相稱君知名當世所至有聲襄人安其政而樂從其遊也因以君之官名其後軒為光祿堂又欲紀其事於石以與叔子元凱之名並傳於久逺君皆不能止也乃來以記屬於豫余謂君知慕叔子之風而襲其遺迹則其為人與其志之所存者可知矣襄人愛君而安樂之如此則君之為政於襄者又可知矣此襄人之所欲書也若其左右山川之勝勢與夫草木雲煙之杳靄出沒於空曠有無之間而可以備詩人之登髙寫離騷之極目者宜其覽者自得之至於亭屢廢興或自有記或不必究其詳者皆不復道也修言羊叔子杜武庫自待者厚而所思者逺蓋謂二人之意非沾沾詡詡自喜直自以為功烈猶卑不足傳後而恐其磨滅云爾此修厚待古人處而所以朂史中輝者已在言外雖然亦未可謂羊杜之意不如修所云也凡人急功近名蘄勝於人而取於人豈必不勝於人而取於人哉而實之美惡其發也不掩往往及身而敗又安能死而益明久而愈光唯實有立於天地而被於萬民則其存也常自欿然不足蒿目焉而莫副所願及其亡也其所立與所被乃耿耿不磨出於其人平時意料之外古語云鼠忘壁壁不忘鼠謂其實有穴在也善固如此惡胡不然子曰君子疾沒世而名不稱焉疾沒世而名不稱則必期未沒時之盡其實也明矣名者實之賔也豈曰吾將為賔乎豈曰蘄勝於人而取於人圖目前之烜赫如彼槿榮晝炕而宵聶乎豐樂亭記修既治滁之明年夏始飲滁水而甘問諸滁人得於州南百步之近其上豐山聳然而特立下則幽谷窈然而深藏中有清泉滃然而仰出俯仰左右顧而樂之於是疏泉鑿石闢地以為亭而與滁人往遊其間滁於五代干戈之際用武之地也昔太祖皇帝嘗以周師破李景兵十五萬於清流山下生擒其將皇甫暉姚鳯於滁東門之外遂以平滁修嘗考其山川按其圖記升髙以望清流之關欲求暉鳯就擒之所而故老皆無在者蓋天下之平久矣自唐失其政海內分裂豪傑並起而爭所在為敵國者何可勝數及宋受天命聖人出而四海一嚮之慿恃險阻剗削消磨百年之間漠然徒見山髙而水清欲問其事而遺老盡矣今滁介於江淮之間舟車商賈四方賔客之所不至民生不見外事而安於畎畝衣食以樂生送死而孰知上之功德休養生息涵煦百年之深也修之來此樂其地僻而事簡又愛其俗之安閒既得斯泉於山谷之間乃日與滁人仰而望山俯而聽泉掇幽芳而䕃喬木風霜冰雪刻露清秀四時之景無不可愛又幸其民樂其嵗物之豐成而喜與豫遊也因為本其山川道其風俗之美使民知所以安此豐年之樂者幸生無事之時也夫宣上恩德以與民共樂刺史之事也遂書以名其亭焉按林希元曰此篇專歸功於上之功德第一節先叙滁之景以為亭第一節論滁為干戈用武之地第三節論聖宋平定之事第四節論民生豐樂皆上之功德第五節論滁人立亭共享豐年之樂第六節論宣上意以與民同樂所以名亭希元於此文脉絡善為分疏矣若修言外之意顧未之及也嘗考唐末五代干戈紛爭生民荼苦備矣宋興削平天下斬其蓬蒿藜藋而養以雨風至於仁宗猶天下之母焉一以柔道滋培和氣一時四海宴清人民歡樂然而名實亦少混焉武備亦少弛焉文恬武嬉積日閲考以取卿相者多席祖宗太平餘業幾及百年百姓長子養孫不見兵革於斯時也在易之豐所為日中者也君子見微而知彰修所以一則曰幸其民樂嵗之豐成再則曰幸生無事之時豈非深危夫斯世斯民之不能長久其幸者哉至於神宗日中則昃於是言利之臣進而天下十室九空邉疆之釁開而西北肝腦塗地逮至金人長驅直入王業偏安而滁乃復為用武之地矣然則斯文也有蟋蟀風詩之意焉所以詔天下萬世以居安思危者㫖深哉又按宋史杜衍韓琦范仲淹富弼相繼以黨議罷去修疏救指斥羣邪於是其黨益恨因其孤甥張氏獄傅致其罪左遷知制誥知滁州此文修治滁日所作也其言溫厚和平足徴城府中了無他物君子哉首言修既治滁之明年夏始飲滁水而甘蓋其時難始平也醉翁亭記環滁皆山也其西南諸峰林壑尤美望之蔚然而深秀者琅琊也山行六七里漸聞水聲潺潺而瀉出於兩峰之間者釀泉也峰回路轉有亭翼然臨於泉上者醉翁亭也作亭者誰山之僧曰智仙也名之者誰太守自謂也太守與客來飲於此飲少輒醉而年又最髙故自號曰醉翁也醉翁之意不在酒在乎山水之間也山水之樂得之心而寓之酒也若夫日出而林霏開雲歸而巖穴暝晦明變化者山間之朝暮也野芳發而幽香佳木秀而繁隂風霜髙潔水落而石出者山間之四時也朝而往暮而歸四時之景不同而樂亦無窮也至於負者歌於塗行者休於樹前者呼後者應傴僂提攜往來而不絶者滁人遊也臨溪而漁溪深而魚肥釀泉為酒泉香而酒冽山肴野蔌雜然而前陳者太守宴也宴酣之樂非絲非竹射者中奕者勝觥籌交錯起坐而喧譁者衆賔歡也蒼顔白髮頽然乎其問者太守醉也已而夕陽在山人影散亂太守歸而賔客從也樹林隂翳鳴聲上下遊人去而禽鳥樂也然而禽鳥知山林之樂而不知人之樂人知從太守游而樂而不知太守之樂其樂也醉能同其樂醒能述以文者太守也太守謂誰廬陵歐陽修也蘇軾作醉翁操其序曰琅琊幽谷山水奇麗泉鳴空澗若中音㑹醉翁喜之把酒臨聽輒欣然忘歸既去十餘年而好奇之士沈遵聞之往遊以琴寫其聲曰醉翁操節奏疏宕而音指華暢知琴者以為絶倫然有其聲而無其辭翁雖為作歌而與琴聲不合又依楚詞作醉翁引好事者亦倚其詞以製曲雖粗合均度而琴聲為詞所繩約非天成也後三十餘年翁既捐館舍而遵亦沒久矣有廬山玉澗道人崔間特妙於琴恨此曲之無詞乃譜其聲而請於東坡居士以補之云其詞曰琅然清圜誰彈響空山無言惟翁醉中知其天月明風霜娟娟人未眠荷蕢過山前曰有心也哉此賢醉翁嘯咏聲和流泉醉翁去後空有朝吟夜怨山有時而童巔水有時而回囦思翁無嵗年翁今為飛仙此意在人間試聽徽外三兩絃相傳崔間按琴而鼓東坡援筆而書曲止詞盡而宫商諧暢長短恰宜為一時勝事前人每歎此記為歐陽絶作間嘗熟玩其辭要亦無關理道而通篇以也字斷句更何足奇乃前人推重如此者蓋天機暢則律吕自調文中亦具有琴焉故非他作之所可並也况修之在滁乃䝉被垢汙而遭謫貶常人之所不能堪而君子亦不能無動心者乃其於文蕭然自逺如此是其深造自得之功發於心聲而不可强者也偃虹隄記有自嶽陽至者以滕侯之書洞庭之圖來告曰願有所記豫發書按圖自嶽陽門西距金雞之右其外隱然隆髙以長者曰偃虹隄問其作而名者曰吾滕侯之所為也問其所以作之利害曰洞庭天下之至險而嶽陽荆潭黔蜀四㑹之衝也昔舟之往來湖中者至無所寓則皆泊南津其有事於州者逺且勞而又常有風波之恐覆溺之虞今舟之至者皆泊隄下有事於州者近而且無患問其大小之制用人之力曰長一千尺髙三十尺厚加二尺而殺其上得厚三分之二用民力萬有五千五百工而不踰時以成問其始作之謀曰州以事上轉運使轉運使擇其吏之能者行視可否凡三反復而又上於朝廷决之三司然後曰可而皆不能易吾侯之議也曰此君子之作也可以書矣蓋慮於民也深則其謀始也精故能用力少而為功多夫以百步之隄禦天下至險不測之虞惠其民而及於荆潭黔蜀凡往來湖中無逺邇之人皆䝉其利焉且嶽陽四㑹之衝舟之來而止者日凡有幾使隄土石幸久不朽則滕侯之惠利於人物可以數計哉夫事不患於不成而患於易壞蓋作者未始不欲其久存而繼者嘗至於怠廢自古賢志之士為其民捍患興利其遺迹往往而在使其繼者皆知始作之心則民到於今受其賜天下豈有遺利乎此滕侯之所以慮而欲有紀於後也滕侯志大材髙名聞當世方朝廷用兵急人之時嘗顯用之而功未及就退守一州無所用心略施其餘以利及物夫慮熟謀審力不勞而功倍作事可以為後法一宜書不茍一時之譽思為利於無窮而告來者以不廢二宜書嶽之民人與湖中之往來者皆欲為滕侯紀三宜書以三宜書不可以不書乃為之書慶厯六年某月某日記朝廷欲為大作以利民生往往因之有二蠧一者利蠧不顧民之利病而惟上意之視藉以固寵加秩而不問其他又或賴其金錢出納以為家肥上所作無已則其利亦無已一者名蠧不考古今之宜而棄天地之性釣奇立異以為已名自謂能為振古未有之事而不知古人之所不為者之必不可以為有是二蠧則朝廷有利民之心每轉為病民之事逮其事之已成則外黃徐子所為啜汁者衆緣藤附蔦實繁有徒有一以為不然則羣起挫之指為撓國是民不見利而唯被其纍雖愁苦呻吟而終莫徹於上聽久之而病民者深遂以病國甚矣夫三代以下人才不振匪特害民之事不可為而利民之事亦難為也孰能謀之審慮之熟不茍一時之譽思為利於無窮如滕子春之為者乎范仲淹嶽陽樓記曰子春為巴陵郡其明年政通人和百廢具興然則此所為偃虹隄者殆亦其一事歟士大夫為百姓立命為國家立業本非為已身家而然使有一絲毫名利之念淆其間則源之不清流千里而猶濁汲者飲者並受其禍易曰井泄不食為我心惻可用汲王明並受其福食之不泄安足福哉夫所為泄者豈止不貪財賄之謂夫耗帑肥家似為最下矣然計短迹汚人之所惡易於發露其害淺希上㫖以釣爵位稍深矣而無赫赫名事不成則主易悟猶淺也若夫假經術以文其奸取令名以熇其勢若似乎所欲利者國與民而非有他雖撥本害枝而千載而下論其人猶將疑信參半者是最大蠧也王安石是已安石未相歐陽修亦嘗薦其可以為相矣臯陶曰在知人而禹曰惟帝其難之聖人之言所以為萬世法鑑哉王彥章畫像記太師王公諱彥章字子明鄆州夀張人也事梁為宣義軍節度使以身死國葬於鄭州之管城晉天福二年始贈太師公在梁以智勇聞梁晉之爭數百戰其為勇將多矣而晉人獨畏彥章自乾化後常與晉戰屢困莊宗於河上及梁末年小人趙巖等用事梁之大臣老將多以讒不見信皆怒而有怠心而梁亦盡失河北事勢已去諸將多懷顧望獨公奮然自必不少屈懈志雖不就卒死以忠公既死而梁亦亡矣悲夫五代終始才五十年而更十有三君五易國而八姓士之不幸而出乎其時能不汙其身得全其節者鮮矣公本武人不知書其語質平生嘗謂人曰豹死留皮人死留名蓋其義勇忠信出於天性而然豫於五代書竊有善善惡惡之志至於公傳未嘗不感憤歎息惜乎舊史殘略不能備公之事康定元年豫以節度判官來此求於滑人得公之孫睿所録家傳頗多於舊史其記德勝之戰尤詳又言敬翔怒末帝不肯用公欲自經於帝前公因用笏畫山川為御史彈而見廢又言公五子其二同公死節此皆舊史無之又云公在滑以讒自歸於京師而史云召之是時梁兵盡屬段凝京師羸兵不滿數千公得保鑾五百人之鄆州以力寡敗於中都而史云將五千以往者亦皆非也公之攻德勝也初受命於帝前期以三日破敵梁之將相聞者皆竊笑及破南城果三日是時莊宗在魏聞公復用料公必速攻自魏馳馬來救已不及矣莊宗之善料公之善出奇何其神哉今國家罷兵四十年一旦元昊反敗軍殺將連四五年而攻守之計至今未決豫嘗獨持用奇取勝之議而歎邉將屢失其機時人聞豫說者或笑以為狂或忽若不聞雖豫亦惑不能自信及讀公家傳至於德勝之捷乃知古之名將必出於奇然後能勝然非審於為計者不能出奇奇在速速在果此天下偉男子之所為非拘牽常算之士可到也每讀其傳未嘗不想見其人後二年豫復來通判州事嵗之正月過俗所謂鐵槍寺者又得公畫像而拜焉嵗久磨滅隱隱可見亟命工完理之而不敢有加焉懼失其真也公尤善用槍當時號王鐵槍公死已百年至今俗猶以名其寺童兒牧豎皆知王鐵槍之為良將也一槍之勇同時豈無而公獨不朽者豈其忠義之節使然歟畫已百餘年矣完之復可百年然公之不泯者不繫乎畫之存不存也而豫尤區區如此者蓋其希慕之至焉耳讀其書尚想乎其人況得拜其像識其面目不忍見其壞也畫既完因書豫所得者於後而歸其人使藏之易曰碩果不食說者謂剝窮上反下如木雖本槁枝凋而末有碩果則落地復生本枝復肖其舊也五代之世君臣之義可謂剝之盡矣而彥章為梁純臣其碩果歟或曰朱溫者唐之賊也彥章事梁復何義之明曰此正所謂本槁枝凋之碩果也木無生理而果則有生心且舜禹既曰孝矣彥章豈非忠夫元載之妻奚害其為烈婦歟歐陽修既為五代史傳又於畫像記反覆低徊不置誠慕乎其忠也若其慨元昊契丹之事而歎今無其人所以激勸西帥者切矣唐順之曰此文凡五段一段是總叙其略二段是言其能全節三段是辨其事四段是言其善出奇䇿五段是寺中畫像之事而通篇以忠節善戰分兩項然不見痕迹仁宗御飛白記治平四年夏五月余將赴亳假道於汝隂因得閲書於子履之室而雲章爛然輝映日月為之正冠肅容再拜而後敢仰視蓋仁宗皇帝之御飛白也曰此寶文閣之所藏也胡為於子之室乎子履曰曩者天子宴從臣於羣玉而賜以飛白余幸得與賜焉豫窮於世久矣少不悅於時人流離竄斥十有餘年而得不老死江湖之上者蓋以遭時清明天子嚮學樂育天下之材而不遺一介之賤使得與羣賢並逰於儒學之館而天下無事嵗時豐登民物安樂天子優遊清閒不邇聲色方與羣臣從容於翰墨之娛而余於斯時竊獲此賜非惟一介之臣之榮遇亦朝廷一時之盛事也子其為我志之余曰仁宗之德澤涵濡於萬物者四十餘年雖田夫野老之無知猶能悲歌思慕於隴畝之間而況儒臣學士得望清光䝉恩寵登金門而上玉堂者乎於是相與泫然流涕而書之夫玉韞石而珠藏淵其光氣常見於外也故山輝而白虹水變而五色者至寶之所在也今賜書之藏於子室也吾知將有望氣者言榮光起而燭天者必賜書之所在也宋史仁宗贊仁宗恭儉仁恕出於天性一遇水旱或密禱禁庭或跪立殿下有司請以玉清舊地為御苑帝曰吾奉先帝苑囿猶以為廣何以是為燕私常服浣濯帷帟衾裯多用繒絁宫中夜飢思膳燒羊戒勿宣索恐膳夫自此戕賊物命以備不時之需大辟疑者皆令上讞嵗常活千餘吏部選人一坐失入死罪皆終身不遷每諭輔臣曰朕未嘗詈人以死況敢濫用辟乎至於夏人犯邉禦之出境契丹渝盟增以嵗幣在位四十二年之間吏治若偷惰而任事蔑殘刻之人刑法似縱弛而決獄多平允之士國未嘗無嬖幸而不足以纍治世之體朝未嘗無小人而不足以勝善類之氣君臣上下惻怛之心忠厚之政有以培壅宋三百餘年之基子孫一矯其所為馴致於亂傳曰為人君止於仁帝誠無愧焉伐樹記署之東園久茀不治修至始闢之糞瘠溉枯為蔬圃十數畦又植花果桐竹凡百本春陽既浮萌者將動園之守啓曰園有樗焉其根壯而葉大根壯則梗地脉耗陽氣而新植者不得滋葉大則隂翳䝉礙而新植者不得暢以茂又其材拳曲臃腫踈輕而不堅不足養是宜伐因盡薪之明日圃之守又曰圃之南有杏焉凡其根庇之廣可六七尺其下之地最壤腴以杏故特不得蔬是亦宜薪修曰噫今杏方春且華將待其實若獨不能損數畦之廣為杏地耶因勿伐既而悟且歎曰吁莊周之說曰樗櫟以不材終其天年桂漆以有用而見傷夭今樗誠不材矣然一旦悉翦棄杏之體最堅密美澤可用反見存豈才不才各遭其時之可否耶他日客有過修者僕夫曳薪過堂下因指而語客以所疑客曰是何怪耶夫以無用處無用莊周之貴也以無用而賊有用烏能免哉彼杏之有華實也以有生之具而庇其根幸矣若桂漆之不能逃乎斤斧者蓋有利之者在死勢不得以生也與乎杏實異矣今樗之臃腫不材而以壯大害物其見伐誠宜爾與夫才者死不才者生之說又異矣凡物幸之與不幸視其處之而巳客既去修然其言而記之漆以膏自割鴈以不能鳴而見烹其將焉處莊子曰吾將處夫材與不材之間夫材不材之間其果可處邪割漆者曰是尚材也烹鴈者曰是亦不材也其猶有側足之所乎君子所欲全者性之云爾豈曰身之云哉性全則身亦全忠烈之士隕身溝壑然而全受全歸也身全而滅其性者入於禽獸之路矣身又奚論抑又聞之中庸曰惟天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性人之性敬敷五典俾彛倫攸叙斯盡矣物之性若之何其盡曰人則不材者必皆使之材而後其性盡物則以材付材以不材付不材而後胥盡也物之生也所以為民用耳杏之實可食樗之枝可薪食其實而薪其枝不至於棄擲而朽蠧則樗與杏之性各盡也若夫杏之實儲之以供宗廟賔客之禮樗之薪析之而為吉蠲餴饎之需質之賤而用之貴不以供縱欲而暴殄則樗與杏之性益盡也若夫鬱結輪囷於山巔澗澨之間猿狖之所號狸狌之所居以此為不夭斧斤抑知此正所以為夭哉御選唐宋文醇卷二十六
