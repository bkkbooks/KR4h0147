body:
  text: 眉山蘇軾文五論荀卿論韓非論留侯論賈誼論鼂錯論續歐陽子朋黨論屈到嗜芰論欽定四庫全書御選唐宋文醇卷四十二眉山蘇軾文五荀卿論嘗讀孔子世家觀其言語文章循循莫不有規矩不敢放言髙論言必稱先王然後知聖人憂天下之深也茫乎不知其畔岸而非逺也浩乎不知其津涯而非深也其所言者匹夫匹婦之所共知而所行者聖人有所不能盡也嗚呼是亦足矣使後世有能盡吾說者雖為聖人無難而不能者不失為寡過而己矣子路之勇子貢之辨冉有之智此三者皆天下之所謂難能而可貴者也然三子者每不為夫子之所恱顔淵默然不見其所能若無以異於衆人者而夫子亟稱之且夫學聖人者豈必其言之云爾哉亦觀其意之所嚮而己夫子以為後世必有不能行其說者矣必有竊其說而為不義者矣是故其言平易正直而不敢為非常可喜之論要在於不可易也昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若寇讐及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異說而不讓敢為髙論而不顧者也其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜僞也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壞周公之井田此亦必有所恃者矣彼見其師歷詆天下之賢人自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而荀卿亦不知其禍之至於此也其父殺人報仇其子必且行劫荀卿明王道述禮樂而李斯以其學亂天下其髙談異論有以激之也孔孟之論未嘗異也而天下卒無有及者茍天下果無有及者則尚安以求異為哉軾謂李斯破壞周公之井田然井田之廢不自斯始且井田昉於虞夏亦不得屬之周公此語蓋軾少作未檢㸃處不可為法王志堅曰鍾伯敬謂長公此論為荆公作案公此論刻應詔集乃應制科時作未有荆公事伯敬誤也韓非論聖人之所為惡夫異端盡力而排之者非異端之能亂天下而天下之亂所由出也昔周之衰有老聃莊周列禦寇之徒更為虛無淡泊之言而治其猖狂浮游之說紛紜顛倒而卒歸於無有由其道者蕩然莫得其當是以忘乎富貴之樂而齊乎死生之分此不得志於天下髙世逺舉之人所以放心而無憂雖非聖人之道而其用意固亦無惡於天下自老聃之死百餘年有商鞅韓非著書言治天下無若刑名之嚴及秦用之終於勝廣之亂教化不足而法有餘秦以不祀而天下被其毒後世之學者知申韓之罪而不知老聃莊周之使然何者仁義之道起於夫婦父子兄弟相愛之間而禮法刑政之原出於君臣上下相忌之際相愛則有所不忍相忌則有所不敢夫不敢與不忍之心合而後聖人之道得存乎其中今老聃莊周論君臣父子之間泛泛乎若萍浮於江湖而適相值也夫是以父不足愛而君不足忌不忌其君不愛其父則仁不足以懷義不足以勸禮樂不足以化此四者皆不足用而欲置天下於無有夫無有豈誠足以治天下哉商鞅韓非求為其說而不得得其所以輕天下而齊萬物之術是以敢為殘忍而無疑今夫不忍殺人而不足以為仁而仁亦不足以治民則是殺人不足以為不仁而不仁亦不足以亂天下如此則舉天下唯吾之所為刀鋸斧鉞何施而不可昔者夫子未嘗一日敢易其言雖天下之小物亦莫不有所畏今其視天下眇然若不足為者此其所以輕殺人歟太史遷曰申子卑卑施於名實韓子引繩墨切事情明是非其極慘核少恩皆原於道德之意嘗讀而思之事固有不相謀而相感者莊老之後其禍為申韓由三代之衰至於今凡所以亂聖人之道者其弊固己多矣而未知其所終奈何其不為之所也老子無為清靜莊列一死生解外膠皆所謂遊乎方之外者其與釋氏不以中西而異人誠能識心達本源則酬酢萬變正其無為清靜也竭力致身正其一死生解外膠也豈曰卒歸於無有哉且三界惟心不落有無若其分别諸相則言無我者有之矣奚嘗曰無人而謂殺人不足以為不仁哉無我故堯舜事業如浮雲之過太虗也所為廓然無聖也有人故堯舜其猶病諸也所為有一衆生未度不敢成佛也申韓反是其於我也拔一毛而利天下不為其於人也盡世界之人摩頂放踵以利我而亦為之此正逆天地之性拂萬物之情豈特周孔之所不容正與釋老莊列氷炭不同者雖然孔子言之矣中人以上可以語上中人以下不可以語上猶夫趾有蹼者飛不髙趾無蹼者走必躍也盜賊殺人固不得歸咎於古聖之作刀劍然而殺人之器必由刀劍矣二氏之書日在宇宙不能免中人以下者之誤讀則軾此論亦有所禆補歟昔我世宗憲皇帝有言果能了脫生死則忠必真忠孝必真孝如其不然而徒有見於生無足愛死無足畏則中庸所謂小人而無忌憚者必其人矣大哉聖言可息千古之聚訟也胡居仁曰言非之慘刻由老莊以虛無輕天下來亦本太史公原道德之意而發與論李斯禍由荀卿同一公案留侯論古之所謂豪傑之士者必有過人之節人情有所不能忍者匹夫見辱拔劍而起挺身而鬭此不足為勇也天下有大勇者卒然臨之而不驚無故加之而不怒此其所挾持者甚大而其志甚逺也夫子房受書於圯上之老人也其事甚怪然亦安知其非秦之世有隱君子者出而試之觀其所以微見其意者皆聖賢相與警戒之義而世不察以為鬼物亦己過矣且其意不在書當韓之亡秦之方盛也以刀鋸鼎鑊待天下之士其平居無罪夷滅者不可勝數雖有賁育無所復施夫持法太急者其鋒不可犯而其勢未可乘子房不忍忿忿之心以匹夫之力而逞於一擊之間當此之時子房之不死者其間不能容髮蓋亦已危矣千金之子不死於盜賊何者其身之可愛而盜賊之不足以死也子房以蓋世之才不為伊尹太公之謀而特出於荆軻聶政之計以僥幸於不死此圯上之老人所為深惜者也是故倨傲鮮腆而深折之彼其能有所忍也然後可以就大事故曰孺子可教也楚莊王伐鄭鄭伯肉袒牽羊以迎莊王曰其君能下人必能信用其民矣遂捨之勾踐之困於會稽而歸臣妾於吳者三年而不倦且夫有報人之志而不能下人者是匹夫之剛也夫老人者以為子房才有餘而憂其度量之不足故深折其少年剛鋭之氣使之忍小忿而就大謀何則非有生平之素卒然相遇於草野之間而命以僕妾之役油然而不怪者此固秦皇之所不能驚而項籍之所不能怒也觀夫髙祖之所以勝而項籍之所以敗者在能忍與不能忍之間而己矣項籍唯不能忍是以百戰百勝而輕用其鋒髙祖忍之養其全鋒而待其斃此子房教之也當淮隂破齊而欲自王髙祖發怒見於詞色由此觀之猶有剛強不忍之氣非子房其誰全之太史公疑子房以為魁梧竒偉而其狀貌乃如婦人女子不稱其志氣嗚呼此其所以為子房歟子房自以五世相韓盡散家財求壯士為韓報讐狙擊始皇於博浪沙中儻使其時真中始皇子房必與始皇俱死而其時斯髙之謀未萌扶蘇尚在恬毅諸將無恙秦國未可亡也雖其忠肝義膽震動天地而自達者視之其行事不猶孺子之為乎子房本豪族公子其時尚少未嘗學問而秦法挾書者棄市意其時如東序所陳之大訓列國紀載之嘉言民間蕩然無存圯上老人當必有所藏者如魯壁之類度子房可授故出以授子房子房得聞所以定天下為帝王師之道佐髙帝滅無道秦而韓之讐果以報矣惠文之世學校未興而書遂無傳於後世耳後世疑為神怪謂所授之書必用兵之術則又與兒童之見無異漢髙之取天下也定三秦之後子房始歸漢五年之內賴韓信東取齊北取趙諸侯並叛羽羽食盡乃一舉而滅之自羽食盡以前漢髙自將以與羽遇但屢敗耳此時子房不在帷幄間乎然則子房所為定籌決勝者非搏戰之事亦明矣弔詭之士復僞造黃石公素書三篇以實之皆可怪也賈誼論非才之難所以自用者實難惜乎賈生王者之佐而不能自用其才也夫君子之所取者逺則必有所待所就者大則必有所忍古之賢人皆有可致之才而卒不能行其萬一者未必皆其時君之罪或者其自取也愚觀賈生之論如其所言雖三代何以逺過得君如漢文猶且以不用死然則是天下無堯舜終不可以有所為耶仲尼聖人歷試於天下茍非大無道之國皆欲勉強扶持庶幾一日得行其道將之荆先之以冉有申之以子夏君子之欲得其君如此其勤也孟子去齊三宿而後出晝猶曰王其庶幾召我君子之不忍棄其君如此其厚也公孫丑問曰夫子何為不豫孟子曰方今天下舍我其誰哉而吾何為不豫君子之愛其身如此其至也夫如此而不用然後知天下之果不足與有為而可以無憾矣若賈生者非漢文之不用生生之不能用漢文也夫絳侯親握天子璽而授之文帝灌嬰連兵數十萬以决劉呂之雄雌又皆髙帝之舊將此其君臣相得之分豈特父子骨肉手足哉賈生洛陽之少年欲使其一朝之間盡棄其舊而謀其新亦己難矣為賈生者上得其君下得其大臣如絳灌之屬優游浸漬而深交之使天子不疑大臣不忌然後舉天下而惟吾之所欲為不過十年可以得志安有立談之間而遽為人痛哭哉觀其過湘為賦以弔屈原紆鬱憤悶躍然有逺舉之志其後卒以自傷哭泣至於天絶是亦不善處窮者也夫謀之一不見用安知終不復用也不知默默以待其變而自殘至此嗚呼賈生志大而量小才有餘而識不足也古之人有髙世之才必有遺俗之纍是故非聰明睿哲不惑之主則不能全其用古今稱苻堅得王猛於草茅之中一朝盡斥去其舊臣而與之謀彼其匹夫略有天下之半以此哉愚深悲賈生之志故備論之亦使人君得如賈生之臣則知其有狷介之操一不見用則憂傷病沮不能復振而為賈生者亦愼其所發哉史稱神宗欲驟用軾韓琦不欲壞成例沮之軾以此終身德琦嗚呼若軾者真可謂自愛其身者歟作賈誼論宋人謂在其晚年觀軾流離顛沛至挑菜度日夕宿樹下而若將終身怡然自得與賈誼之賦鵩鳥投文弔屈原者異矣當日仁宗得軾對策退朝色喜皇后請其故曰為子孫得賢宰相以故神宗雖惑於讒未嘗不終身眷眷於軾比賈誼之見賞於文帝而終不得柄用者殆髣佛焉軾雖知命不憂乎然篇末數語俯仰古今自傷而傷他人者至矣若夫賈誼弔屈原賦鵩鳥誠紆鬱憤悶不能見道之明驗至其哭泣歲餘而死則以梁王墜馬死而自傷為傅之無狀也賈生食人之祿忠人之事一有過誤引為己責其心且謂傅梁王而王至墜馬天其天年則平日所自許一旦柄用可以手致太平者皆謬妄也哭泣歲餘亦死此淚當與萇叔碧血同寶矣其忠厚惻怛廉節志氣之耿光可貫日月乃軾不察史氏所稱亦死者承梁王死而言而轉以此誚誼非篤論矣梁王未墜馬死以前誼何嘗自傷不用而哭泣哉鼂錯論天下之患最不可為者名為治平無事而其實有不測之憂坐觀其變而不為之所則恐至於不可救起而強為之則天下狃於治平之安而不吾信惟仁人君子豪傑之士為能出身為天下犯大難以求成大功此固非勉強期月之間而茍以求名者之所能也天下治平無故而發大難之端吾發之吾能收之然後能免難於天下事至而循循焉欲去之使他人任其責則天下之禍必集於我昔者鼂錯盡忠為漢謀弱山東之諸侯諸侯並起以誅錯為名而天子不察以錯為說天下悲錯之以忠而受禍而不知錯之有以取之也古之立大事者不惟有超世之才亦必有堅忍不拔之志昔禹之治水鑿龍門決大河而放之海方其功之未成也蓋亦有潰冒衝突可畏之患惟能前知其當然事至不懼而徐為之所是以得至於成功夫以七國之強而驟削之其為變豈足怪哉錯不於此時捐其身為天下當大難之衝而制吳楚之命乃為自全之計欲使天子自將而己居守且夫發七國之難者誰乎己欲求其名安所逃其患以自將之至危與居守之至安巳為難首擇其至安而遺天子以其至危此忠臣義士所以憤惋而不平者也當此之時雖無袁盎錯亦不免於禍何者已欲居守而使人主自將以情而言天子固己難之矣而重違其議是以袁盎之說得行於其間使吳楚反錯以身任其危日夜淬礪東向而待之使不至於纍其君則天子將恃之以為無恐雖有百袁盎可得而間哉嗟夫世之君子欲求非常之功則無務為自全之計使錯自將而擊吳楚未必無功惟其欲自固其身而天子不悅姦臣得以乘其隙錯之所以自全者乃其所以自禍歟七國削亦反不削亦反削則變速而禍小不削則變遲而禍大此世所以傷錯之忠也雖然明知削之則反矣而不為備反計乎四顧羣臣既無可屬百萬兵者而可輕削之以激其反乎况有周亞夫之可屬百萬兵而不知就云智囊也且夫宗社者猶人之神魂也百姓者猶人之肢體也天下有殘肢體以安神魂之理乎則亦豈有殘百姓以安宗社之理也聖賢處此豈果舍激之反而滅之之外無他道乎錯亦可謂未能操刀而輕一割矣錯父曰劉氏安鼂氏危矣天下騷然京師幾喋血劉氏果足為安哉茅坤曰錯之誤在夙有怨於盎而欲借吳之反以誅之此殺機也鬼瞰其室矣何也以錯之學本刑名故也續歐陽子朋黨論歐陽子曰小人欲空人之國必進朋黨之說嗚呼國之將亡此其徵歟禍莫大於權之移人而君莫危於國之有黨有黨則必爭爭則小人者必勝而權之所歸也君安得不危哉何以言之君子以道事君人主必敬之而疏小人惟豫言而莫子違人主必狎之而親疏者易間而親者難暌也而君子不得志則奉身而退樂道不仕小人者不得志則徼幸復用惟怨之報此其所以必勝也蓋嘗論之君子如嘉禾也封殖之甚難而去之甚易小人如惡草也不種而生去之復蕃世未有小人不除而治者也然去之為最難斥其一則援之者衆盡其類則衆之致怨也深小者復用而肆威大者得志而竊國善人為之掃地世主為之屏息譬斷蛇不死刺虎不斃其傷人則愈多矣齊田氏魯季孫是己齊魯之執事莫非田季之黨也歷數君不忘其誅而卒之簡公弒昭哀失國小人之黨其不可除也如此而漢黨錮之獄唐白馬之禍忠義之士斥死無餘君子之黨其易盡也如此使世主知易盡者之可戒而不可除者之可懼則有瘳矣且夫君子者世無若是之多也小人者亦無若是之衆也凡才智之士鋭於功名而嗜於進取者隨所用耳孔子曰仁者安仁智者利仁未必皆君子也冉有從夫子則為門人之選從季氏則為聚斂之臣唐栁宗元劉禹錫使不陷叔文之黨其髙才絶學亦足以為唐名臣矣昔欒懷子得罪於晉其黨皆出奔樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃子之勇也嗚呼宣子蚤從王鮒之言豈獨獲二子之勇且安有曲沃之變哉愚以為治道去泰甚耳茍黜其首惡而貸其餘使才者不失富貴不才者無所致憾將為吾用之不暇又何怨之報乎人之所以為盜者衣食不足耳農夫市人焉保其不為盜而衣食既足盜豈有不能返農夫市人也哉故善除盜者開其衣食之門使復其業善除小人者誘以富貴之道使墮其黨以力取威勝者蓋未嘗不反為所噬也曹參之治齊曰慎無擾獄市獄市姦人之所容也知此亦庶幾於善治矣姦固不可長而亦不可不容也若姦無所容君子豈久安之道哉牛李之黨遍天下而李德裕以一夫之力欲窮其類而致之必死此其所以不旋踵罹仇人之禍也姦臣復熾忠義益衰以力取威勝者果不可耶愚是以續歐陽子之說而為君子小人之戒韓范富司馬諸賢忘身為國經理天下事宵小懼不見容則屢以朋黨目之冀罔上以行其私歐陽修作朋黨論謂小人無朋惟君子有之蓋謂小人之交必以爭利而壞而君子之交必以義合而成徒欲矯當時之謬論動人主之傾聽而不自知其言之有弊也君子不黨君子亦黨乎吾世宗憲皇帝作朋黨論深斥其非夫豈不知修之意非欲為朋黨哉特以其激烈過當之言足使讀者悮會而小人無朋之朋方將藉口於修以亂黑白蓋凡所以斥修者正修言外之意所欲表襮於後世而未能者也軾殆亦有疑於其師之言義未圎足而不可為訓故為此續論歟蓋嘗讀大易而知文王周孔之心於朋黨實三致意也其在坤曰利西南得朋東北喪朋謂西南者坤代乾致役之地非合衆力不足以濟故利得朋東方者受命之先北方者告成之候禀令歸功己無私焉而何有於朋類故利喪朋也其在比六三曰比之匪人謂六三應上六上在五上志不在君故為比之無首六三應之故為比之匪人也其在泰之九二曰包荒用馮河不遐遺朋亡得尚于中行包荒者㝟裕溫柔也用馮河者發强剛毅也不遐遺者文理密察也然必終之以朋亡然後齊莊中正而大公無我之道備上下可以交而泰否則所為包荒之㝟仁馮河之勇斷不遐遺之縝密皆不出於中正不出於中正則胥無足言矣若夫六四翩翩不富以其鄰不戒以孚云者戒六四以當下從三陽之正而不當上合二隂之鄰也其在同人曰同人于野亨于野云者猶路人也其六二曰同人於宗吝于宗云者猶宗黨也理之在天下華夏蠻貊本為一身豈必于其宗黨乃可以同乎同人于宗吝之道矣于野同人非廓然大公之謂乎其在豫之九四曰由豫大有得勿疑朋盍簪九四一陽為豫之主天下由之以豫者也任大責重非獨力所能必得同德者以自輔非開誠布公奚以來諸賢之益故戒以勿疑則朋盍簪也然則茍非由豫大有得者固無所謂朋盍簪也不待言明矣其在蹇之六二曰王臣蹇蹇匪躬之故九五曰大蹇朋來六二之蹇蹇者即九五之朋也其朋於九五者匪躬之故也大蹇匪朋其奚濟然惟濟天下之大蹇者朋來而非有所私否則但以喪朋為利也其在解之九四曰解而拇朋至斯孚九四為震主解天下之難者必解去在下之小人而後君子之朋斯至解以緩難非朋奚濟解而拇者戒有所昵比也其在渙之六三曰渙其躬無悔克己復禮仁也其躬尚渙則於人無論也六四曰渙其羣元吉渙有丘匪夷所思君子無一人與為羣者而惟理之是視所為渙其羣也而理者人之所同得則天下之大四海之廣無一人而非其羣也故曰渙有丘匪夷所思也所以為大羣者即其所為渙羣也六十四卦中戒朋黨者顯言之則十居二三焉若其微言之者又未可以悉數文王周孔之心於此諄諄若是然則天下之治否寧不以此為樞機乎為人君為人臣者其曷可以弗思屈到嗜芰論屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰違而道唐栁宗元非之曰屈子以禮之末忍絶其父將死之言且禮有齊之日思其所樂思其所嗜子木去芰安得為道甚矣栁子之陋也子木楚卿之賢者也夫豈不知為人子之道事死如事生况於將死丁寧之言棄而不用人情之所忍乎是必有大不忍於此者而奪其情也夫死生之際聖人嚴之薨於路寢不死於婦人之手至於結冠纓啓手足之末不敢不勉其於死生之變亦重矣父子平日之言可以恩掩義至於死生至嚴之際豈容以私害公乎曾子有疾稱君子之所貴乎道者三孟僖子卒使其子學禮於仲尼管仲病勸桓公去三豎夫數君子之言或主社稷或勤於道德或訓其子孫雖所趣不同然皆篤於大義不私其躬也如是今赫赫楚國若敖氏之賢聞於諸侯身為正卿死不在民而口腹是憂其為陋亦甚矣使子木行之國人誦之太史書之天下後世不知夫子之賢而惟陋是聞子木其忍為此乎故曰是必有大不忍者而奪其情也然禮之所謂思其所樂思其所嗜此言人子追思之道也曾晳嗜羊棗而曾子不忍食父沒而不能讀父之書母沒而不能執母之器皆人子之情自然也豈待父母之命耶今薦芰之事若出於子則可自其父母則為陋耳豈可以飲食之故而成父莫大之陋乎曾子寢疾曾元難於易簀曾子曰君子之愛人也以德細人之愛人也以姑息若以柳子之言為然是曾元為孝子而曾子顧禮之末易簀於病革之中為不仁之甚也中行偃死視不可含范宣子盟而撫之曰事吳敢不如事主猶視欒懷子曰主茍終所不嗣事於齊者有如河乃瞑嗚呼范宣子知事吳為忠於主而不知報齊以成夫子憂國之美其為忠則大矣古人以愛惡比之美疢藥石曰石猶生我疢之美者其毒滋多由是觀之柳子之愛屈到是疢之美子木之違父命藥石也哉人倫以理治不以欲治唯其理也則與生俱生生生不息乾坤不毁斯道不壞若其欲也則雖屬毛離裏生同胞乳同懷而若秦越然各有所嗜不可以相通各狥其欲則各化於物道不可見而乾坤或幾於息矣毫釐之差千里之謬非細故也孟懿子問孝子曰生事之以禮死葬之以禮祭之以禮天下之為人父而不欲以禮自居者豈鮮哉事之以禮則曰是不善事我也葬祭之以禮則人又議曰是違若親之遺命也然則孔子之言亦有不可行者乎屈到嗜芰而子木不以祭亦祭之以禮而己何可議哉柳宗元非之蘇軾辨之當矣而胡友信又以軾為非彼亦一是非此亦一是非盍折衷於孔子乎御選唐宋文醇卷四十二
