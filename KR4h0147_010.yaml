body:
  text: 昌黎韓愈文十墓誌銘雜文試大理評事王君墓誌銘故幽州節度判官贈給事中清河張君墓誌銘貞曜先生墓誌銘栁子厚墓誌銘南陽樊紹述墓誌銘鱷魚文送窮文毛頴傳欽定四庫全書御選唐宋文醇卷十昌黎韓愈文十試大理評事王君墓誌銘君諱適姓王氏好讀書懷竒負氣不肯隨人後舉選見功業有道路可指取有名節可以戾契致困於無資地不能自出乃以干諸公貴人借助聲勢諸公貴人既志得皆樂熟軟媚耳目者不喜聞生語一見輒戒門以絶上初即位以四科募天下士君笑曰此非吾時邪即提所作書緣道歌吟趨直言試既至對語驚人不中第益困久之聞金吾李將軍年少喜事可撼乃蹐門告曰天下竒男子王適願見將軍白事一見語合意往來門下盧從史既節度昭義軍張甚奴視法度士欲聞無顧忌大語有以君生平告者即遣客鉤致君曰狂子不足以共事立謝客李將軍由是待益厚奏為其衛胄曹參軍充引駕仗判官盡用其言將軍遷帥鳳翔君隨往改試大理評事攝監察御史觀察判官櫛垢爬痒民獲蘇醒居嵗餘如有所不樂一日載妻子入閿鄉南山不顧中書舍人王涯獨孤郁吏部郎中張惟素比部郎中韓愈日發書問訊顧不可强起不即薦明年九月疾病輿醫京師某月某日卒年四十四十一月某日即葬京師西南長安縣界中曾祖爽洪州武寧令祖微右衛騎曹參軍父嵩蘇州崑山丞妻上谷侯氏處士髙女髙固竒士自方阿衡太師世莫能用吾言再試吏再怒去發狂投江水初處士將嫁其女懲曰吾以齟齬窮一女憐之必嫁官人不以與凡子君曰吾求婦氏久矣唯此翁可人意且聞其女賢不可以失即漫謂媒嫗吾明經及第且選即官人侯翁女幸嫁若能令翁許我請進百金為嫗謝諾許白翁翁曰誠官人邪取文書來君計窮吐實嫗曰無苦翁大人不疑人欺我得一卷書粗若告身者我袖以往翁見未必取眎幸而聽我行其謀翁望見文書銜袖果信不疑曰足矣以女與王氏生三子一男二女男三嵗夭死長女嫁亳州永城尉姚挺其季始十嵗銘曰鼎也不可以柱車馬也不可使守閭佩玉長裾不利走趨祗繫其逢不繫巧愚不諧其須有銜不祛鑽石理辭以列幽墟王安石曰退之善為銘如王適張徹銘尤竒故幽州節度判官贈給事中清河張君墓誌銘張君名徹字某以進士累官至范陽府監察御史長慶元年今牛宰相為御史中丞奏君名迹中御史選詔即以為御史其府惜不敢留遣之而密奏幽州將父子繼續不廷選且久今新收臣又始至孤怯須强佐乃濟發半道有詔以君還之仍遷殿中侍御史加賜朱衣銀魚至數日軍亂怨其府從事盡殺之而囚其帥且相約張御史長者毋侮辱轢蹙我事無庸殺置之帥所居月餘聞有中貴人自京師至君謂其帥公無負此土人上使至可因請見自辯幸得脱免歸即推門求出守者以告其魁魁與其徒皆駭曰必張御史張御史忠義必為其帥告此餘人不知遷之别館即與衆出君君出門罵衆曰汝何敢反前日吳元濟斬東市昨日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗鼠鴟鵶汝何敢反汝何敢反行且罵衆畏惡其言不忍聞且虞生變即擊君以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟事聞天子壯之贈給事中其友侯雲長佐鄆使請於其帥馬僕射為之選於軍中得故與君相知張恭李元實者使以幣請之范陽范陽人義而歸之以聞詔所在給船轝傳歸其家賜錢物以葬長慶四年四月某日其妻子以君之喪葬於某州某所君弟復亦進士佐汴宋得疾變易喪心驚惑不常君得間即自視衣褥薄厚節時其飲食而匕箸進養之禁其家無敢髙語出聲醫餌之藥其物多空青雄黄諸竒怪物劑錢至十數萬營治勤劇皆自君手不假之人家貧妻子常有饑色祖某某官父某某官妻韓氏禮部郎中某之孫汴州開封尉某之女於余為叔父孫女君常從余學選於諸生而嫁與之孝順祗修羣女效其所為男若干人曰某女子曰某銘曰嗚呼徹也世慕顧以行子掲掲也噎喑以為生子獨割也為彼不清作玉雪也仁義以為兵用不缺折也知死不失名得猛厲也自申於闇明莫之奪也我銘以貞之不肖者之呾也朱子曰張徹為范陽府監察御史其帥張𢎞靖也誌不出𢎞靖姓名若有所諱焉耳徹死於亂具載之史其言多出公誌貞曜先生墓誌銘唐元和九年嵗在甲午八月已亥貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍㑹哭明日使以錢如東都供葬事諸嘗與往來者咸來哭弔韓氏遂以書告興元尹故相餘慶閏月樊宗師使來弔告葬期徵銘愈哭曰嗚呼吾尚忍銘吾友也夫興元人以幣如孟氏賻且來商家事樊子使來速銘曰不則無以掩諸幽乃序而銘之先生諱郊字東野父庭玢娶裴氏女而選為崑山尉生先生及二季酆郢而卒先生生六七年端序則見長而愈騫涵而揉之内外完好色夷氣清可畏而親及其為詩劌目鉥心刃迎縷解鉤章棘句掐擢胃腎神施鬼設間見層出唯其大翫於詞而與世抹摋人皆劫劫我獨有餘有以後時開先生者曰吾既擠而與之矣其猶足存邪年幾五十始以尊夫人之命來集京師從進士試既得即去間四年又命來選為溧陽尉迎侍溧上去尉二年而故相鄭公尹河南奏為水陸運從事試協律郎親拜其母於門内母卒五年而鄭公以節領興元軍奏為其軍參謀試大理評事挈其妻行之興元次於閿鄉暴疾卒年六十四買棺以斂以二人輿歸酆郢皆在江南十月庚申樊子合凡贈賻而葬之洛陽東其先人墓左以餘財附其家而供祀將葬張籍曰先生掲徳振華於古有光賢著故事有易名況士哉如曰貞曜先生則姓名字行有載不待講説而明皆曰然遂用之初先生所與俱學同姓簡於世次為叔父繇給事中觀察浙東曰生吾不能舉死吾知恤其家銘曰於戱貞曜維執不猗維出不訾維卒不施以昌其詩愈薦孟郊於鄭餘慶作薦士詩貽之中云有窮者孟郊受材實雄驁㝠觀洞古今象外逐幽討横空盤硬語妥貼力排奡敷柔肆紆餘奮猛卷海潦榮華肖天秀捷疾逾響報蘇軾讀孟郊詩云夜讀孟郊詩細字如牛毛寒燈照昏花佳處時一遭孤芳擢荒穢苦語餘詩騷水清石鑿鑿湍激不受篙初如食小魚所得不償勞又如煑蟛􅒹竟日嚼空螯要當鬭僧清未足當韓豪人生如朝霧日夜火銷膏何苦將兩耳聽此寒蟲號不如且置之飲我玉色醪讀此誌參觀二詩孟郊詩之得失具見之矣栁子厚墓誌銘子厚諱宗元七世祖慶為拓跋魏侍中封濟隂公曾伯祖奭為唐宰相與褚遂良韓瑗俱得罪武后死髙宗朝皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與游皆當世名人子厚少精敏無不通達逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂栁氏有子矣其後以博學宏辭授集賢殿正字儁傑廉悍議論證據今古出入經史百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪例出為刺史未至又例貶永州司馬居閒益自刻苦務記覽為詞章汎濫停蓄為深博無涯涘一自肆於山水間元和中嘗例召至京師又偕出為刺史而子厚得栁州既至歎曰是豈不足為政邪因其土俗為設敎禁州人順賴其俗以男女質錢約不時贖子本相侔則沒為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一嵗免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以栁易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕悦酒食游戱相徵逐詡詡强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸異類所不忍為而其人自視以為得計聞子厚之風亦可以少媿矣子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死於窮裔材不為世用道不行於時也使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不久窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸葬萬年先人墓側子厚有子男二人長曰周六始四嵗季曰周七子厚卒乃生女子二人皆幼其得歸葬也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿人性謹慎學問不厭自子厚之斥遵從而家焉逮其死不去既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人朱子曰此誌作於袁州公之誌子厚詳矣其祭文推許尤厚劉夢得序子厚集曰子厚之喪昌黎韓退之誌其基且以書來弔曰哀哉若人之不淑吾嘗評其文雄深雅健似司馬子長崔蔡不足多也安定皇甫湜於文章少推許亦以退之之言為然又按咸通四年右常侍蕭倣知舉試謙光賦澄心如水詩中第者二十五人栁告第三人韓綰第八人告即子厚之子字用益綰即退之之孫南陽樊紹述墓誌銘樊紹述既卒且葬愈將銘之從其家求書得書號魁紀公者三十卷曰樊子者又三十巻春秋集傳十五卷表牋狀䇿書序傳記紀誌説論今文讚銘凡二百九十一篇道路所遇及器物門里雜銘二百二十賦十詩七百一十九曰多矣哉古未嘗有也然而必出於已不襲蹈前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海含地負放恣横從無所統紀然而不煩於繩削而自合也嗚呼紹述於斯術其可謂至於斯極者矣生而其家貴富長而不有其藏一錢妻子告不足顧且笑曰我道蓋是也皆應曰然無不意滿嘗以金部郎中告哀南方還言某帥不治罷之以此出為綿州刺史一年徵拜左司郎中又出刺絳州綿絳之人至今皆曰於我有德以為諫議大夫命且下遂病以卒年若干紹述諱宗師父諱澤嘗帥襄陽江陵官至右僕射贈某官祖某官諱泳自祖及紹述三世皆以軍謀堪將帥䇿上第以進紹述無所不學於辭於聲天得也在衆若無能者嘗與觀樂問曰何如曰後當然已而果然銘曰惟古於詞必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律寥寥久哉莫覺屬神徂聖伏道絶塞既極乃通發紹述文從字順各識職有欲求之此其躅唐李肇國史補云元和已後為文筆學竒詭於韓愈學苦澁於樊宗師俱名為元和體然則樊韓並重一時而今樊文不少概見矣昌黎曰文無難易惟其是耳又曰惟陳言之務去夫充務去陳言之意未有不偏於難者樊紹述之文之難可為極其致矣今所傳絳守居園池記王晟劉忱各為之注解句讀要皆未必果得紹述當日所以斷句者也句尚不能得意無問矣然則於孔子所為辭達而已矣者不已逺乎逺乎聖人之言未聞有是者也歐陽修詩曰異哉樊子怪可吁心欲獨出無古初窮荒探幽入無有一語詰曲百盤紆孰云已出不剽襲句斷欲學盤庚書嘗謂商盤周誥詰屈聱牙蓋龥衆之言必從其質古今言異即宋時至今未千年而諸儒語錄即有不可明者可以覆騐也故仲尼曰言之無文行而不逺是書中之難解者轉係當日之質言人人易曉者耳若文言之則如典謨及論語之文不如是詰屈聱牙矣然則句讀欲學盤庚書正乃不得其是處如王莽之為詔令載在漢書徒供後人笑具奚益哉六一又云退之作樊誌便似樊文今以綘守居園池記與此文較絶不相似然銘云文從字順各識職有欲求之此其躅退之不應反言之以誤世豈樊文别有不似絳守居園池記者而今不可見耶鱷魚文維年月日潮州刺史韓愈使軍事衙推秦濟以羊一豬一投惡溪之潭水以與鱷魚食而告之曰昔先王既有天下列山澤罔繩擉刃以除蟲蛇惡物為民害者驅而出之四海之外及後王德薄不能逺有則江漢之間尚皆棄之以與蠻夷楚越況潮嶺海之間去京師萬里哉鱷魚之涵淹卵育於此亦固其所今天子嗣唐位神聖慈武四海之外六合之内皆撫而有之況禹跡所揜揚州之近地刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉鱷魚其不可與刺史雜處此土也刺史受天子命守此土治此民而鱷魚睅然不安谿潭據處食民畜熊豕鹿麞以肥其身以種其子孫與刺史抗拒爭為長雄刺史雖駑弱亦安肯為鱷魚低首下心伈伈睍睍為民吏羞以偷活於此邪且承天子命以來為吏固其勢不得不與鱷魚辨鱷魚有知其聽刺史言潮之州大海在其南鯨鵬之大蝦蠏之細無不容歸以生以食鱷魚朝發而夕至也今與鱷魚約盡三日其率醜類南徙於海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也是不有刺史聽從其言也不然則是鱷魚冥頑不靈刺史雖有言不聞不知也夫傲天子之命吏不聽其言不徙以避之與冥頑不靈而為民物害者皆可殺刺史則選材技吏民操强弓毒矢以與鱷魚從事必盡殺乃止其無悔秀水閒居錄曰鱷魚之狀龍吻虎爪蟹目鼉鱗尾長數尺末大如箕芒刺成鈎仍有膠粘多於水濱潛伏人畜近以尾擊取盖猶象之任鼻也朱子考異曰新舊傳皆載公此文初公至潮問民疾苦皆曰惡谿有鱷魚食民産且盡數日公令其屬秦濟以一羊一豚投谿水而祝之其夕有暴風震雷起湫水中數日水盡涸西徙六十里自是潮州無鱷魚患潮州廟記所謂能馴鱷魚之暴者此也歐陽文忠作陳文惠公神道碑書公通判潮州惡谿鱷魚不可近公命捕得鳴鼓於市告以文而戮之其患并息潮人嘆曰昔韓公諭鱷而聽今公戮鱷而懼所為雖異其使異物醜類革化而利人一也吾潮間三百年而得二公幸矣送窮文元和六年正月乙丑晦主人使奴星結栁作車縛草為船載糗輿粻牛繫軛下引㠶上檣三揖窮鬼而告之曰聞子行有日矣鄙人不敢問所塗竊具船與車備載糗粻日吉時良利行四方子飯一盂子啜一觴攜朋挈儔去故就新駕塵彍風與電爭先子無底滯之尤我有資送之恩子等有意於行乎屏息潛聽如聞音聲若嘯若啼砉欻嚘嚶毛髮盡竪竦肩縮頸疑有而無久乃可明若有言者曰吾與子居四十年餘子在孩提吾不子愚子學子耕求官與名惟子是從不變於初門神户靈我叱我呵包羞詭隨志不在他子遷南荒熱爍濕蒸我非其鄉百鬼欺陵太學四年朝韲暮鹽惟我保汝人皆汝嫌自初及終未始背汝心無異謀口絶行語於何聽聞云我當去是必夫子信讒有間於予也我鬼非人安用車船鼻齅臭香糗粻可捐單獨一身誰為朋儔子茍備知可數已不子能盡言可謂聖智情狀既露敢不迴避主人應之曰子以吾為真不知也邪子之朋儔非六非四在十去五滿七除二各有主張私立名字捩手覆羮轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也其名曰智窮矯矯亢亢惡圓喜方羞為姦欺不忍害傷其次名曰學窮傲數與名摘抉杳㣲髙挹羣言執神之機又其次曰文窮不專一能怪怪竒竒不可時施祗以自嬉又其次曰命窮影與形殊面醜心妍利居衆後責在人先又其次曰交窮磨肌戛骨吐出心肝企足以待寘我讐寃凡此五鬼為吾五患饑我寒我興訛造訕能使我迷人莫能間朝悔其行暮已復然蠅營狗茍驅去復還言未畢五鬼相與張眼吐舌跳踉偃仆抵掌頓脚失笑相顧徐謂主人曰子知我名凡我所為驅我令去小黠大癡人生一世其久幾何吾立子名百世不磨小人君子其心不同惟乖於時乃與天通攜持琬琰易一羊皮飫於肥甘慕彼糠糜天下知子誰過於予雖遭斥逐不忍子疏謂予不信請質詩書主人於是垂頭喪氣上手稱謝燒車與船延之上座朱子曰唐四時寳鑑云髙陽氏子好衣弊食糜正月晦巷死世作糜棄破衣是日祝於巷曰除貧也小宋云退之送窮文進學解毛穎傳等諸篇皆古人意思未到可以名家矣然送窮文與揚子雲逐貧賦大率相類張文潛曰公送窮文蓋出子雲逐貧賦然文采過逐貧矣晁無咎取公此文於續楚詞系之曰愈以屢窮不遭時若有物焉為之故託於鬼謼彼窮我者車船飲食謝而逺之而窮不可去也則燒車與船延之上座亦卒歸於正之義焉毛穎傳毛穎者中山人也其先明眎佐禹治東方土養萬物有功因封於卯地死為十二神嘗曰吾子孫神明之後不可與物同當吐而生已而果然明眎八世孫䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕云居東郭者曰㕙狡而善走與韓盧爭能盧不及盧怒與宋鵲謀而殺之醢其家秦始皇時䝉將軍恬南伐楚次中山將大獵以懼楚召左右庶長與軍尉以連山筮之得天與人文之兆筮者賀曰今日之獲不角不牙衣褐之徒缺口而長鬚八竅而趺居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族拔其豪載穎而歸獻俘於章臺宫聚其族而加束縛焉泰皇帝使恬賜之湯沐而封諸管城號曰管城子日見親寵任事穎為人强記而便敏自結繩之代以及秦事無不纂錄隂陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮圖老子外國之説皆所詳悉又通於當代之務官府簿書市井貨錢注記惟上所使自秦皇帝及太子扶蘇胡亥丞相斯中車府令髙下及國人無不愛重又善隨人意正直邪曲巧拙一隨其人雖見廢棄終黙不洩惟不喜武士然見請亦時往累拜中書令與上益狎上嘗呼為中書君上親決事以衡石自程雖宫人不得立左右獨穎與執燭者常侍上休方罷穎與絳人陳𤣥𢎞農陶泓及㑹稽褚先生友善相推致其出處必偕上召穎三人者不待詔輙俱往上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髪秃又所摹畫不能稱上意上嬉笑曰中書君老而秃不任吾用吾嘗謂君中書君今不中書邪對曰臣所謂盡心者因不復召歸封邑終於管城其子孫甚多散處中國夷狄皆冒管城惟居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衛毛𥅆者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最為蕃昌春秋之成見絶於孔子而非其罪及䝉將軍拔中山之豪始皇封諸管城世遂有名而姬姓之毛無聞穎始以俘見卒見任使秦之滅諸侯穎與有功賞不酬勞以老見疎秦真少恩哉栁宗元曰自吾居夷不與中州人通書有來南者特言韓愈為毛穎傳不能舉其辭而獨大笑以為怪而吾久不克見楊子誨之來始持其書索而讀之若捕龍蛇搏虎豹急與之角而力不敢暇信韓子之怪於文也世之摹擬竄竊取青嫓白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎而俳又非聖人之所棄者詩曰善戱謔兮不為虐兮太史公書有滑稽列傳皆取乎有益於世者也故學者終日討説答問呻吟習復應對進退掬溜播灑則罷憊而廢亂故有息焉游焉之説不學操縵不能安絃有所拘者有所縱也太羮𤣥酒體節之薦味之至者而又設以竒異小蟲水草樝梨橘柚苦醎酸辛雖蜇吻裂鼻縮舌澁齒而咸有篤好之者文王之菖蒲葅屈到之芰曾晳之羊棗然後盡天下之竒味以足於口獨文異乎韓子之為也亦將弛焉而不為虐歟息焉游焉而有所縱歟盡六藝之竒味以足其口歟而不若是則韓子之辭若壅大川焉其必決而放諸陸不可以不陳也且凡古今是非六藝百家大細穿穴用而不遺者毛穎之功也韓子窮古書好斯文嘉穎之能盡其意故奮而為之傳以發其鬱積而學者得之勵其有益於世歟是其言也固與異世者語而貪常嗜𤨏者猶呫呫然動其喙亦勞甚矣乎御選唐宋文醇巻十
