body:
  text: 眉山蘇軾文三書尺牘序答李薦書上執政乞度牒賑濟因修廨宇書上吕僕射論浙西災傷書答虔倅俞括奉議書與滕達道第二十二首與李公擇第十一首與王庠第五首鳬繹先生詩集序范文正公文集序江子靜字序欽定四庫全書御選唐宋文醇卷四十眉山蘇軾文三答李豸書軾頓首再拜聞足下名久矣又於相識處往往見所作詩文雖不多亦足以髣佛其為人矣尋常不通書問怠慢之罪猶可闊略及足下斬然在疚亦不能以一字奉慰舍弟子由至先蒙惠書又復懶不即答頑鈍廢禮一至於此而足下終不棄絶遞中再辱手書待遇益隆覽之面熱汗下也足下才髙識明不應輕許與人得非用黃魯直秦太虛輩語真以為然耶不肖為人所憎而二子獨喜見譽如人嗜昌歜羊棗未易詰其所以然者以二子為妄則不可遂欲以移之衆口又大不可也軾少年時讀書作文專為應舉而己既及進士第貪得不己又舉制策其實何所有而其科號為直言極諫故每紛然誦説古今考論是非以應其名耳人苦不自知既以此得因以為實能之故譊譊至今坐此得罪幾死所謂齊虜以口舌得官真可笑也然世人遂以軾為欲立異同則過矣妄論利害攙説得失此正制科人習氣譬之候蟲時鳥自鳴自己何足為損益軾每怪時人待軾過重而足下又復稱説如此愈非其實得罪以來深自閉塞扁舟草履放浪山水間與樵漁雜處往往為醉人所推罵輒自喜漸不為人識平生親友無一字見及有書與之亦不答自幸庶幾免矣足下又復創相推與甚非所望木有癭石有暈犀有通以取妍於人皆物之病也謫居無事默自觀省回視三十年以來所為多其病者足下所見皆故我非今我也無乃聞其聲不考其情取其華而遺其實乎抑將又有取於此也此事非相見不能盡自得罪後不敢作文字此書雖非文然信筆書意不覺纍幅亦不須示人必喻此意嵗行盡寒苦惟萬萬節哀強食不次李光地曰人以為牢騷玩世之語實則自寫平生實録也文尤離竒可誦上執政乞度牒賑濟因修廨宇書軾頓首上書門下僕射相公閣下去年浙中冬雷發洪太湖水溢春又積雨蘇湖常秀皆水民就髙田秧稻以待水退及五六月稍稍分種十不及四五而又繼之以旱以故早晚皆傷髙下並損自元豐以來民之艱食未有如今嵗者也軾己三奏其事至今未報蓋人微言輕理自當爾然亦恐監司諸郡不盡以實奏而廟堂所訪問往來之人或揣所樂聞不盡以實告故朝廷以軾言為過耳不然豈有仁聖在上羣賢並用而肯恬不為意乎入冬以來緣諸郡閉糴而稅務用例違條收五榖力勝錢於米價斗至八九十衢睦等州至百餘錢皆足錢炎炎可畏軾用印板出榜千餘道止絶此兩事自半月來米榖通流價亦稍平然浙中無麥青黃之交當在來秋而熟不熟又未可知民懲熙寧流殍之禍上户有米者皆靳惜不肯出其勢非大出官米不能救此患自正月至七月本州裏外九縣日糶官米千五百石乃可以平價救飢計當用米三十一萬五千石今本州常平除兊充軍糧外止有十七萬石漕司許於鄰郡致三萬石尚少十一萬五千石計窮理迫須至控告軾近以本州廨宇弊壞奏乞度牒二百道修完未蒙開允意欲以此度牒募人於諸縣納米度可得二萬五千石然後減價出賣每斗六十度可得錢萬五千貫且以此錢修完廨宇雖不及元計錢數且修完緊要處亦粗可足用則是此度牒一出而兩利也伏望相公深念本州廨宇敝壞已甚不可不修及今完葺所費尚少後日大壞其費必倍又因以募人納米出糶救飢設使不因修完廨宇朝廷以飢民之故特出聖恩乞與二百道度牒猶不為過而况救飢修屋兩用而並濟乎軾愚蠢少慮仰恃廟堂諸公仁賢恤民必不忍拒此請意此度牒可以必得以此不候回降指揮輒己一面告喻商旅令儲峙米斛具水陸腳乘以須度牒之至深望果斷不疑於一兩日內降付急遞日與吏民延頸企踵雖大旱望雲執熱思濯未喻其急也若不蒙哀察則是使軾失信商旅坐視浮殍其為慚惶狼狽未易遽言至時朝廷雖加誅殛何補於事兼軾近者奏為本路轉運使今年合起年額米斛百六十萬乞特許且起一半或三分之二其餘候豐熟日隨年額起發未蒙恩許今年漕司窘迫實倍常嵗異時預買紬絹錢常於嵗前散絶今尚闕大半剗刷之急蓋不遺餘力矣若非朝廷少加矜察則督迫之極害必及民近蒙朝廷許輟上供二十萬石出糶此大惠也然望更輟留三十萬石若無米可糶祗乞以此錢收買銀絹上供雖無補於飢民而散幣在民少解錢荒之患亦良策也此外祗有勸誘富民出榖助官賑貸及用常平錢米募民工役二事然皆難行勸誘之利未及貧民而誅求之禍先及上户浙中富民欠官錢者十人而九決無可勸誘之理至於募民工役亦非實惠若散募飢貧不堪工役鳥獸聚散得錢便走熙寧中常行此事名為召募其實不免於等第上差科官支錢米盡入役夫而本戶又須貼錢雇人凶年人戶重有此擾皆虛名無實利少害多惟有多糶官米一事簡而易行米價既低民無貧富均享其利惟望相公留意則一路幸甚軾拙於言語不能盡寫憂危之狀以曉左右惟有發書之日西向再拜叩頭默禱庶幾區區丹誠可以感動萬一也不宣截漕開捐平糶勸輸以工代賑數事救荒之策盡矣法須因時制宜隨地行便軾雖謂勸輸及以工代賑無實濟或彼時浙中情勢如此未可概論之古今天下也惟百姓艱食困苦無告而凡為官吏皆揣上意以為不樂聞而不肯以實告為下吏者揣大吏之意以為必然為大吏者揣君上之意以為必然雖萬萬不然而其意仍以為必然是則更千古而一轍也上吕僕射論浙西災傷書軾頓首上書門下僕射相公閣下軾近上章論浙西淫雨颶風之災伏蒙恩旨使與監司諸人議所以為來嵗之備者謹己條上二事軾才術淺短禦災無䇿但知叫號朝廷乞寬減額米截賜上供言狂計拙死罪死罪然三吳風俗自古浮薄而錢塘為甚雖室宇華好被服粲然而家無宿舂之儲者蓋十室而九自經熙寧飢疫之災與新法聚斂之害平時富民殘破略盡家家有市易之欠人人有鹽酒之債田宅在官房廊傾倒商賈不行市井蕭然譬如衰羸久病之人平時僅自支持更遭風寒暑濕之變便自委頓仁人君子當意外將護未可以壯夫常理期也今年錢塘賣常平米十八萬石得米者皆叩頭誦佛云官家將十八萬石米於烏鳶狐狸口中奪出數十萬人此恩不可忘也夫以區區戰國公子尚知焚券市義今以十八萬石米易錢九萬九千緡而能活數百萬人此豈下策也哉竊惟仁聖在上輔以賢哲一聞此言理無不可但恐世俗諂薄成風揣所樂聞與所忌諱不以仁人君子期左右爭言無災或言有災而不甚積衆口之驗以惑聰明此軾之所私憂過慮也八月之末秀州數千人訴風災吏以為法有訴水旱而無訴風災拒閉不納老幼相騰踐死者十一人方按其事由此言之吏不喜言災者蓋十人而九不可不察也軾既條上二事且以關白漕憲兩司官吏皆來見軾曰此果當今之至計也然恐朝廷疑公為漕司地奈何軾曰吾為數十萬人性命言也豈恤此小小悔吝哉去年秋冬諸郡閉糶商賈不行軾既劾奏通之又舉行災傷法約束本路不得收五榖力勝錢三郡米大至施及浙東而漕司官吏緣此愠怒幾不見容文符往來僚吏恐悚以軾之私意其不為漕司地也審矣力勝之免去嵗已有成法然今嵗未敢舉行者實恐再忤漕司怨咎愈深此則軾之疲懦畏人不免小有回屈之罪也伏望相公一言檢舉成法自朝廷行下使五榖通流公私皆濟上以明君相之恩下以安孤危之迹不勝幸甚去嵗朝旨免力勝錢止於四月浙中無麥須七月初間見新穀故自五月以來米價復增軾亦曾奏乞展限至六月終不報今者若蒙施行則乞以六月為限去嵗恩旨寬減上供額米三分之一而户部必欲得見錢浙中遂有錢荒之憂軾奏乞以錢和買銀絹上供三請而後可今者若蒙施行即乞一時行下軾竊度事勢若不且用愚計來嵗恐有流殍盜賊之憂或以其狂淺過計事難施行即乞别除一小郡仍選才術有餘可以坐消災沴者使任一路之責幸甚幸甚干冒台重伏紙悚戰不宣俗吏之視國與民猶秦人視越人之肥瘠也而於災荒則殆有甚焉越人之肥瘠無與秦事耳若災荒之聞於上則必逆料為上所不喜且免租減賦則無可藉以剝民於已富貴兩有所損是不特秦越肥瘠直為敵國盛衰矣是以壅蔽災荒未有不力者軾此書宛若圖畫矣欲知吏民之情狀不可不讀答虔倅俞括奉議書軾頓首資深使君閣下前日辱訪寵示長箋及詩文一編伏讀數日廢卷拊掌有起豫之歎孔子曰辭達而已矣物固有是理患不知知之患不能達之於口與手所謂文者能達是而已文人之盛莫如近世然私所敬慕者獨陸宣公一人家有公奏議善本頃侍講讀嘗繕寫進御區區之忠自謂庶幾於孟軻之敬王且欲推此學於天下使家藏此方人挾此藥以待世之病者豈非仁人君子之至情也哉今觀所示議論自東漢以下十篇皆欲酌古以馭今有意於濟世之用而不志於耳目之觀美此正平生所望於朋友與凡學道之君子也然去嵗在都下見一醫工頗藝而窮慨然謂僕曰人所以服藥端為病耳若欲以適口則莫如芻豢何以藥為今孫氏劉氏皆以藥顯孫氏期於治病不擇甘苦而劉氏専務適口病者宜安所去取而劉氏富倍孫氏此何理也使君斯文未必售於世然售不售豈吾儕所當挂口哉聊以發一笑耳進宣公奏議有一表輒録呈不須示人也餘俟面謝不宣士君子讀書學古發為文章下以此應上之求上以此取下之材何為者哉為其能達聖賢之微言大義也為其能識古今之事變形勢也為其能知所以厚民生正民德之方也若夫雕繪藻采以娛恱耳目則誠不如歌舞博奕之可樂也乃不取其有濟世之用而取其可為耳目之觀美豈非處方用藥専期適口之比歟不寧惟是朝廷設公卿大夫師長百執事者凡以總方略興教化宣德敷政繩愆糾繆以立民之命篤國之慶也若夫諧柔容恱以順適心意則誠不如宦官宫妾之可親也乃不取其有濟世之用而取其可使心意之順適者又非處方用藥専期適口之比乎尺牘與滕達道第二十二首某啓専使至逺辱手誨纍幅伏讀感慰所喜比來起居康勝不足云也某凡百如常杜門謝客已旬日矣承見教益務閉藏而已近得筠州舍弟書教以省事若能省之又省使終日無一語一事則其中自有至樂殆不可名此法竒祕惟不肖與公共之不可廣也畫本亦可摹為省事故亦納去耳今却付來使不罪吳畫漫附去冬至後齋居四十九日亦無所行運聊自返照而已願公深自愛養區區難盡言想識此意也與李公擇第十一首某啓示及新詩皆有逺别惘然之意雖兄之愛我厚然僕本以鐵心石腸待公何乃爾耶吾儕雖老且窮而道理貫心肝忠義填骨髓直須談笑於死生之際若見僕困窮便相於邑則與不學道者大不相逺矣兄造道深中心不爾出於相好之篤而已然朋友之義専務規諫輒以狂言廣兄之意爾僕雖懷坎壈於時遇事有可尊主澤民者便忘軀為之禍福得喪付與造物非兄僕豈發此看訖便火之不知者以為詬病也與王庠第五首别紙纍幅過當老病廢忘豈堪英俊如此責望也少年應科目時記録名數沿革及題目等大略與近嵗應舉者同爾亦有少節目文字才塵忝後便被舉主取去今日皆無有然亦無用也實無捷徑必得之術但如君髙材強力積學數年自有可得之道而其實皆命也但卑意欲少年為學者每讀書皆作數過盡之書富如入海百貨皆有之人之精力不能兼收盡取但得其所欲求者耳故願學者每次作一意求之如欲求古人興亡治亂聖賢作用但作此意求之勿生餘念又别作一次求事迹故實典章文物之類亦如之他皆倣此此雖迂鈍而他日學成八面受敵與涉獵者不可同日而語也甚非速化之術可笑可笑尺牘三首上二首可見軾處困心胸可為履道坦坦幽人貞吉者矣下一首讀書法也俱學人所宜盡心者鳬繹先生詩集序孔子曰吾猶及史闕文也有馬者借人乘之今亡矣夫史之不闕文與馬之不借人也豈有損益於世也哉然且識之以為世之君子長者日以逺矣後生不復見其流風遺俗是以日趨於智巧便佞而莫之止是二者雖不足以損益而君子長者之澤在焉則孔子識之而况其足以損益於世者乎昔吾先君適京師與卿士大夫遊歸以語軾曰自今以往文章其日工而道將散矣士慕逺而忽近貴華而賤實吾己見其兆矣以魯人鳬繹先生之詩文十餘篇示軾曰小子識之後數十年天下無復為斯文者也先生之詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五榖必可以療飢斷斷乎如藥石必可以伐病其遊談以為髙枝詞以為觀美者先生無一言焉其後二十餘年先君既沒而其言存士之為文者莫不超然出於形器之表微言髙論既已鄙陋漢唐而其反覆論難正言不諱如先生之文者世莫之貴矣軾是以悲於孔子之言而懷先君之遺訓益求先生之文而得之於其子復乃録而藏之先生諱太初字醇之姓顔氏先師兖公之四十七世孫云軾嘗誦孔子有德者必有言之訓而謂有德者非有言也德之發於口者也誠為探本之論及作鳬繹詩集敘慨當世崇虛索渺髙談無實而古人布帛菽粟之流風餘韻漸以無存一篇之中三致意焉嘗考列代興國之初其為文字大抵悃愊無華自道其所心得逮及叔季則剽賊餖飣以為麗荒唐眇緬以為竒有若出一轍者是以昔之人每謂文運與國運相維繫宋世之政當軾之身漸以衰矣軾之所以興悲豈細故歟夫世之治也其士大夫興於行恥於空言無實之名恱於和平樂易光明正大之氣象故其為文寫其心聲亦必類之及其衰也其士大夫不恥無行而樂於空言無實之名不自知其入於險詖側媚猖狂恣睢之氣象故其為文雖若超然出於形器之表而實蕩然無復規矩之存是蓋生於人心而後發於文字實國政之得失能損益乎文字而非文字之得失能損益乎國政也易曰言有物蓋必先有物而後有言無物之言所為咸其輔頰舌滕口説也君子恥之范文正公文集序慶厯三年軾始總角入鄉校士有自京師來者以魯人石守道所作慶厯聖德詩示鄉先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何為其不可先生竒軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則已私識之矣嘉祐二年始舉進士至京師則范公沒既葬而墓碑出讀之至流涕曰吾得其為人蓋十有五年而不一見其面豈非命也歟是嵗登第始見知於歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相堯夫又六年始見其叔彛叟京師又十一年遂與其季德孺同僚于徐皆一見如舊且以公遺稿見屬為序又十三年乃克為之嗚呼公之功德蓋不待文而顯其文亦不待序而傳然不敢辭者自以八嵗知敬愛公今四十七年矣彼三傑者皆得從之遊而公獨不識以為平生之恨若獲挂名其文字中以自託於門下士之末豈非疇昔之願也哉古之君子如伊尹太公管仲樂毅之流其王霸之略皆素定於畎畝中非仕而後學者也淮隂侯見髙帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主策曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳受嘗試為之而僥幸其或成者哉公在天聖中居太夫人憂則已有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將擢為執政考其平生所為無出此書者今其集二十卷為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝悌蓋如飢渴之於飲食欲須臾忘而不可得如火之熱如水之濕蓋其天性有不得不然者雖弄翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非有言也德之發於口者也又曰我戰則克祭則受福非能戰也德之見於怒者也元祐四年四月十一日吕祖謙曰作文字不難於敷文而難於敘事蓋敘事在嚴整難也看東坡自敘述處大類司馬公而整齊嚴肅又不比司馬之汗漫薑寶曰淮隂論劉項孔明論孫曹不下數百言今約以數語真妙絶古今之文也江子靜字序友人江君以其名存之求字於豫豫字之曰子靜夫人之動以靜為主神以靜舍心以靜充志以靜寧慮以靜明其靜有道得己則靜逐物則動以一人之身晝夜之氣呼吸出入未嘗異也然而或存或亡者是其動靜殊也後之學者始學也既纍於仕其仕也又纍於進得之則樂失之則憂是憂樂係於進矣平旦而起日與事交合則我喜忤則我怒是喜怒係於事矣耳恱五聲目恱五色口恱五味鼻恱芬臭是愛欲係於物矣以眇然之身而所係如此行流轉徙日遷月化則平日之所養尚能存耶喪其所存尚安明其己之是非與夫在物之真偽哉故君子學以辨道道以求性正則靜靜則定定則虛虛則明物之來也吾無所增物之去也吾無所虧豈復為之欣喜愛惡而纍其真歟君齒少才鋭學以待仕方且出而應物所謂靜以存性不可不念也能得吾性不失其在己則何往而不適哉王弼注易復其見天地之心謂復者反本之謂天地以本為心寂然至無是其本也故動息地中乃天地之心見矣伊川程子曰先儒皆以靜為見天地之心蓋不知動之端乃天地之心也朱子作本義謂程子言之詳矣又引邵子冬至子之半天心無改移一陽初動處萬物未生時為證蓋深韙之也然濂溪有主靜立極之説而朱子他日告門弟子謂濂溪伊川道理只一般又謂王弼之説與濓溪同似與本義自相矛盾間嘗考之程子言天地之心見於動然而大學云知止而後有定定而後能靜矣樂記又曰人生而靜天之性矣王弼言天地之心見於靜然而復以雷在地中一陽初動而成卦陽動而隂靜安得主隂而不主陽哉然則奈何曰得其旨者動靜皆得之失其旨者動靜皆失之且人之心晝夜十二時何有一息之不動者不特日出而作酬酢萬變無往不動即日入而息其靜者形骸耳若神明何嘗與旦晝異即欲絶聲屏色離人而立於獨而此欲絶欲屏欲離欲立之心己紛然動而未嘗一息靜能使之如死灰乎即使心如死灰孰覺之哉有覺之者則又己紛然動而未嘗一息靜矣况心果可使如死灰乎如死灰矣又何以謀衆理而應萬事操則存舍則亡出入無時莫知其鄉其心之謂歟孔子既言之矣而人猶欲離動以求靜正如夸父之逐日也然則若何而靜曰靜固不離於動之中夫人聲色至而耳目應動作云為至而身口應其至焉者萬則其應焉者亦萬逮夫愛惡屈伸情偽相感交錯紛糅而至以萬者應且巨萬而未己是亦天下之至動矣然苟能克己復禮一於理而不二以欲則至者萬而應者惟一以是一而貫乎萬之中則萬者自動而一者自靜也聖人主靜豈不然哉然則何以見天地之心也曰天者積氣也地者積形也人者形皆地而氣皆天也然而有流形御氣不涉有無不居中外者曰唯心焉故曰人者天地之心又曰為天地立心然則欲見天地之心者亦自見其心而己一陽初動處萬物未生時萬物雖未生而一陽既動則其生生不己可必也生生者天地之心也故曰動之端見天地之心從其體言之也雖然理也者生之途也欲也者死之途也從理則致一而靜而日之乎生之途從欲則萬感以動而日之乎死之途生生者天地之心也故曰靜則見天地之心從其用言之也體用合一而不可分則動靜無端而不可離矣所以朱子謂王周之語與伊川本非有二也軾謂得己則靜逐物則動又曰靜以存性不可不念實深有味乎其言之也恐讀者議其涉於二氏故備論之如右御選唐宋文醇卷四十
