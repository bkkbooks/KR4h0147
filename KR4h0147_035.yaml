body:
  text: 眉山蘇洵文二雜著書序論名二子説送石昌言使北引上富丞相書上歐陽內翰第一書上歐陽內翰第四書上韓舍人書蘇氏族譜春秋論欽定四庫全書御選唐宋文醇卷三十五眉山蘇洵文二名二子説輪輻蓋軫皆有職乎車而軾獨若無所為者雖然去軾則吾未見其為完車也軾乎吾懼汝之不外飾也天下之車莫不由轍而言車之功者轍不與焉雖然車仆馬斃而患亦不及轍是轍者善處乎禍福之間也轍乎吾知免矣唐順之曰此老泉所以逆探兩公之終身也卒也長公再以斥廢僅而能免而少公終得以遺老自解脫攸攸卒嵗是亦竒矣送石昌言使北引昌言舉進士時吾始數嵗未學也憶與羣兒戲先府君側昌言從旁取棗栗啖我家居相近又以親戚故甚狎昌言舉進士日有名吾後漸長亦稍知讀書學句讀屬對聲律未成而廢昌言聞吾廢學雖不言察其意甚恨後十餘年昌言及第第四人守官四方不相聞吾以壯大乃能感悔摧折復學又數年遊京師見昌言長安相與勞苦如平生歡出文十數首昌言甚喜稱善吾晚學無師雖日為文中甚自慚及聞昌言説乃頗自喜今十餘年又來京師而昌言官兩制乃為天子出使萬里外強悍不屈之契丹建大斾從騎數百送車千乘出都門意氣慨然自思為兒時見昌言先府君旁安知其至此富貴不足怪吾于昌言獨有感也丈夫生不為將得為使折衝口舌之間足矣往年彭任從富公使還為我言既出境宿驛亭聞介馬數萬騎馳過劍槊相摩終夜有聲從者怛然失色及明視道上馬迹尚心掉不自禁凡遼所以夸耀中國者多此類中國之人不測也故或至于震懼而失辭以為契丹笑嗚呼何其不思之甚也昔者奉春君使冒頓壯士健馬皆匿不見是以有平城之役今之丐奴吾知其無能為也孟子曰説大人則藐之况于敵人請以為贈觀洵上皇帝書第八段言使契丹者當日情事可見末幅數語所以惎昌言者至矣蘇軾跋云右嘉祐元年九月十九日先君送石昌言北使文一首其字則軾年二十一時所書與昌言本也今蓄於陳履常氏昌言名揚休善為詩有名當時終于知制詰彭任字有道亦蜀人從富彥國使虜還得靈河縣主簿以死石守道嘗稱之曰有道長七尺而膽過其身一日坐酒肆與其徒飲且酣聞彥國當使不測之虜憤憤推酒床拳皮裂遂自請行蓋欲以死扞彥國者也其為人大略如此然亦任俠好殺云上富丞相書相公閣下往年天子震怒出逐宰相選用舊臣堪付屬以天下者使在相府與天下更始而閣下之位實在第三方是之時天下咸喜相慶以為閣下惟不為宰相也故默默在此方今困而後起起而復為宰相而又值乎此時也不為而何為且吾君之意待之如此其厚也不為而何以副吾望故咸曰後有下令而異于他日者必吾富公也朝夕而待之跂首而望之望望然而不獲見也戚戚然而疑嗚呼其弗獲聞也必其逺也進而及于京師亦無聞焉不敢以疑猶曰天下之人如此其衆也數十年之間如此其變也皆曰賢人焉或曰彼其中則有説也而天下之人則未始見也然而不能無憂蓋古之君子愛其人也則憂其無成且嘗聞之古之君子相是君也與是人也皆立于朝則使吾皆知其為人皆善者也而後無憂且一人之身而欲擅天下之事雖見信于當世而同列之人一言而疑之則事不可以成今夫政出於他人而不懼事不出於已而不忌是二者惟善人為能然猶欲得其心焉若夫衆人政出于他人而懼其害已事不出于已而忌其成功是以有不平之心生夫或居於吾前或立于吾後而皆有不平之心焉則身危故君子之出處於其間也不使之不平于我也周公立于明堂以聽天下而召公惑何者天下固惑乎大者也召公猶未能信乎吾之此心也周公定天下誅管蔡告召公以其志以安其身以及于成王故凡安其身者以安乎周也召公之于周公管蔡之於周公是二者亦皆有不平之心焉以為周之天下公將遂取之也周公誅其不平而不可告語者告其可以告語者而和其不平之心然則非其必不可以告語者則君子未始不欲和其心天下之人從士而至于卿大夫宰相集處其上欲有所為何慮而不成不能忍其區區之小忿以成其不平之釁則害其大事是以君子忍其小忿以容其小過而杜其不平之心然後當大事而聽命焉且吾之小忿不足以易吾之大事也故寧小容焉使無芥蒂于其間古之君子與賢者並居而同樂故其責之也詳不幸而與不肖者偶不圗其大而治其細則闊逺于事情而無益于當世故天下無事而後可與爭此不然則否昔者諸吕用事陳平憂懼計無所出陸賈入見説之使交歡周勃陳平用其䇿卒得絳侯北軍之助以滅諸吕夫絳侯木強之人也非陳平致之而誰也故賢人者致其不賢者非夫不賢者之能致賢者也曩者陛下即位之初寇萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正公在相府又欲以嵗月盡治天下事失于急與不忍小忿故羣小人亦急逐之一去遂不復用以歿其身伏惟閣下以不世出之才立于天子之下百官之上此其深謀逺慮必有所處而天下之人猶未獲見洵西蜀之人也竊有志于今世碩一見于堂上伏惟閣下深思之無忽韓范富諸賢在朝宵小羣目為黨實則各持所見而不相下觀歐陽修論杜衍范仲淹等罷政事狀可見也君子謀國雖當渙其羣以絶類上之私亦當得朋以收羣䇿之力元祐諸賢率多不肯下人他日洛蜀各樹旗幟以塤箎之雅而有參商之形不待憸壬搆扇早已自相攻訐也蓋當日風尚如此自韓范富諸公已兆其端矣洵之言往往如蓍蔡不止辨姦一論也上歐陽內翰第一書內翰執事洵布衣窮居嘗竊有歎以為天下之人不能皆賢不能皆不肖故賢人君子之處於世合必離離必合往者天子方有意于治而范公在相府富公為樞密副使執事與余公蔡公為諌官尹公馳騁上下用力于兵革之地方是之時天下之人毛髮絲粟之才紛紛然而起合而為一而洵也自度其愚魯無用之身不足以自奮于其間退而養其心幸其道之將成而可以復見于當世之賢人君子不幸道未成而范公西富公北執事與余公蔡公分散四出而尹公亦失勢奔走于小官洵時在京師親見其事忽忽仰天歎息以為斯人之去而道雖成不復足以為榮也既復自思念往者衆君子之進于朝其始也必有善人焉推之今也亦必有小人焉間之今之世無復有善人也則已矣如其不然也吾何憂焉姑飬其心使其道大有成而待之何傷退而處十年雖未敢自謂其道有成矣然浩浩乎其胸中若與曩者異而余公適亦有成功於南方執事與蔡公復相繼登于朝富公復自外入為宰相其勢將復合為一喜且自賀以為道既已粗成而果將有以發之也既又反而思其嚮之所慕望愛恱之而不得見之者蓋有六人今將往見之矣而六人者已有范公尹公二人亡焉則又為之澘然出涕以悲嗚呼二人者不可復見矣而所恃以慰此心者猶有四人也則又以自解思其止于四人也則又汲汲欲一識其靣以發其心之所欲言而富公又為天子之宰相逺方寒士未可遽以言通于其前余公蔡公逺者又在萬里外獨執事在朝廷間而其位差不甚貴可以叫呼扳援而聞之以言而飢寒衰老之病又痼而留之使不克自至于執事之庭夫以慕望愛恱其人之心十年而不得見而其人已死如范公尹公二人者則四人之中非其勢不可遽以言通者何可以不能自往而遽已也執事之文章天下之人莫不知之然竊自以為洵之知之特深愈于天下之人何者孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏蔽掩不使自露而人自見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆餘委備往復百折而條逹踈暢無所間斷氣盡語極急言竭論而容與間易無艱難勞苦之態此三者皆斷然自為一家之文也惟李翺之文其味黯然而長其光油然而幽俯仰揖讓有執事之態陸贄之文遣言措意切近的當有執事之實而執事之才又自有過人者蓋執事之文非孟子韓子之文而歐陽子之文也夫樂道人之善而不為諂者以其人誠足以當之也彼不知者則以為譽人以求其恱已也夫譽人以求其恱已洵亦不為也而其所以道執事光明盛大之德而不自知止者亦欲執事之知其知我也雖然執事之名滿于天下雖不見其文而固已知有歐陽子矣而洵也不幸墮在草野泥塗之中而其知道之心又近而粗成而欲徒手奉咫尺之書自託於執事將使執事何從而知之何從而信之哉洵少年不學生二十五嵗始知讀書從士君子逰年既已晚而又不遂刻意厲行以古人自期而視與已同列者皆不勝已則遂以為可矣其後困益甚然後取古人之文而讀之始覺其出言用意與已大别時復內顧自思其才則又似夫不遂止於是而已者由是盡燒曩時所為文數百篇取論語孟子韓子及其他聖人賢人之文而兀然端坐終日以讀之者七八年方其始也入其中而惶然博觀于其外而駭然以驚及其久也讀之益精而其胸中豁然以明若人之言固當然者然猶未敢自出其言也時既久胸中之言日益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣然猶未敢以為是也近所為洪範論史論凡七篇執事觀其如何嘻區區而自言不知者又將以為自譽以求人之知已也惟執事思其十年之心如是之不偶然也而察之其論韓歐李陸文字不爽銖兩交必如洵之與修乃可面譽而不為諂自述所得而不為誇茅坤曰此書凡三段一段歷敘諸君子之離合見已慕望之切二段稱歐陽公之文見已知公之深三段自敘平生經歷欲歐陽公之知之也而情事婉曲周折何等意氣何等風神上歐陽內翰第四書洵啓夏熱伏惟提舉內翰尊候萬福嚮為京兆尹天下謂公當由此得政其後聞有此授或以為拂世戾俗過在于不肯鹵莽然此豈足為公損益哉洵久不奉書非敢有懈以為用公之奏而得召恐有私謝之嫌今者洵既不行而朝廷又欲必致之恐聽者不察以為匹夫而要君命茍以為髙而求名亦且得罪于門下是故略陳其一二以曉左右聞之孟軻曰仕不為貧而有時乎為貧洵之所為欲仕者為貧乎實未至於飢寒而不擇以為行道乎道固不在我且朝廷將何以待之今人之所謂富貴髙顯而近于君可以行道者莫若兩制然猶以為不得為宰相有所牽制于其上而不得行其志為宰相者又以為時不可為而我將有所待若洵又可以行道責之耶始公進其文自丙申之秋至戊戌之冬凡七百餘日而得召朝廷之事其莭目期限如此之繁且久也使洵今日治行數月而至京師旅食于都市以待命而數月間得試于所謂舍人院者然後使諸公専考其文亦一二年幸而以為不謬可以及等而奏之從中下相府相與擬議又須年載間而后可以庶幾有望於一官如此洵固以老而不能為矣人皆曰求仕將以行道若此者果足以行道乎既不足以行道而又不互于為貧是二者皆無名焉是故其來遲遲而未甚樂也王命且再下洵若固辭必將以為沽名而有所希望今嵗之秋軾轍已服闋亦不可不與之俱東恐內翰怪其久而不來是以略陳其意拜見尚逺惟千萬為國自重宋政迂緩廢弛觀此可見君相之責惟在用人今召試一布衣而可五六年猶不得決亦異乎為天下得人之義矣上韓舍人書舍人執事方今天下雖號無事而政化未清獄訟未衰息賦斂日重府庫空竭而大者又有二國之不臣天子震怒大臣憂恐自兩制以上宜皆苦心焦思日夜思念求所以解吾君之憂者洵自惟間人於國家無絲毫之責得以優遊終嵗詠歌先王之道以自樂時或作為文章亦不求人知以為天下方事事而王公大人豈暇見我哉是以踰年在京師而其平生所願見如君侯者未嘗一至其門有來告洵以所欲見之之意洵不敢不見然不知君侯見之而何也天子求治如此之急君侯為兩制大臣豈欲見一間布衣與之論間事邪此洵所以不敢遽見也自間居十年人事荒廢漸不喜承迎將逢拜伏拳跽王公大人茍能無以此求之使得從容坐隅時出其所學或亦有足觀者今君侯辱先求之此其必有所異乎世俗者矣孟子曰段干木踰垣而避之泄栁閉門而不納是皆已甚迫斯可以見矣嗚呼吾豈斯人之徒歟欲見我而見之不欲見而徐去之何傷况如君侯平生所願見者又何辭焉不宣洵再拜洵雖有戰國説士習氣然較之韓愈應科目時與人書代張籍與李浙東書等篇顧有别矣此文固亦士習卑靡之藥石也蘇氏族譜蘇氏之譜譜蘇氏之族也蘇氏出自髙陽而蔓延于天下唐神龍初長史味道刺眉州卒于官一子留於眉眉之有蘇氏自是始而譜不及焉者親盡也親盡則曷為不及譜為親作也凡子得書而孫不得書何也以著代也自吾之父以及吾之髙祖仕不仕娶某氏享年幾某日卒皆書而他不書何也詳吾之所自出也自吾之父以至吾之髙祖皆曰諱某而他則遂名之何也尊吾之所自出也譜為蘇氏作而獨吾之所自出得詳與尊何也譜吾作也嗚呼觀吾之譜者孝悌之心可以油然而生矣情見乎親親見於服服始于衰而至於緦麻而至于無服無服則親盡親盡則情盡情盡則喜不慶憂不弔喜不慶憂不弔則塗人也吾之所以相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至于塗人此吾譜之所以作也其意曰分而至于塗人者勢也勢吾無如之何也已幸其未至于塗人也使之無至于忽忘焉可也嗚呼觀吾之譜者孝弟之心可以油然而生矣系之以詩曰吾父之子今為吾兄吾疾在身兄呻不寧數世之後不知何人彼死而生不為戚欣兄弟之親如足於手其能幾何彼不相能彼獨何心萬物本乎天人本乎祖直上是天地旁推之則民也物也直上是祖妣旁推之則宗也族也直上是父母旁推之則兄也弟也由父母等而上之以至天地由天地順而下之以至父母皆一氣之分而一理之合也豎窮三際不得謂此身非父母非祖宗非天地之身則少明于理之人與之言無不諾者及其橫亘十方謂此身即兄弟即宗族即民物之身則不特私意為之障並理見亦將為之障矣由此一障則始於兄弟之不相能而終之及于民物又始于民物之不相關而極之至于兄弟故兄弟相猶而父母之心傷矣宗族相背而祖宗之心傷矣民物相害而天地之心傷矣父母祖宗天地之心俱於我不相似則我之身雖塊然血氣乎生理絶矣由有血氣而有此身此血氣者父母祖宗天地之心之所滙而成者也而既有血氣即有血氣之我出焉據是血氣而私之是故有弟而兄啼與愛親敬長之良知良能同發于孩提而不可解以賊夫性命茍不廓徹無餘合民物為一大身而謂能孝于親者未之有也茍不能孝于親而謂能仁民能愛物者亦未之有也讀洵族譜文而有得焉可與讀張子西銘讀張子西銘而有得焉可與言性與天道春秋論賞罰者天下之公也是非者一人之私也位之所在則聖人以其權為天下之公而天下以懲以勸道之所在則聖人以其權為一人之私而天下以榮以辱周之衰也位不在夫子而道在焉夫子以其權是非天下可也而春秋賞人之功赦人之罪去人之族絶人之國貶人之爵諸侯而或書其名大夫而或書其字不惟其法惟其意不徒曰此是此非而賞罰加焉則夫子固曰我可以賞罰人矣賞罰人者天子諸侯事也夫子病天下之諸侯大夫僣天子諸侯之事而作春秋而已則為之其何以責天下位公也道私也私不勝公則道不勝位位之權得以賞罰而道之權不過于是非道在我矣而不得為有位者之事則天下皆曰位之不可僣也如此不然天下其誰不曰道在我則是道者位之賊也曰夫子豈誠賞罰之邪徒曰賞罰之耳庸何傷曰我非君也非吏也執塗之人而告之曰某為善某為惡可也繼之曰某為善吾賞之某為惡吾罰之則人有不笑我者乎夫子之賞罰何以異此然則何足以為夫子何足以為春秋曰夫子之作春秋也非曰孔氏之書也又非曰我作之也賞罰之權不以自與也曰此魯之書也魯作之也有善而賞之曰魯賞之也有惡而罰之曰魯罰之也何以知之曰夫子繫易謂之繫辭言孝謂之孝經皆自名之則夫子私之也而春秋者魯之所以名史而夫子託焉則夫子公之也公之以魯史之名則賞罰之權固在魯矣春秋之賞罰自魯而及于天下天子之權也魯之賞罰不出境而以天子之權與之何也曰天子之權在周夫子不得已而以與魯也武王之崩也天子之位當在成王而成王幼周公以為天下不可以無賞罰故不得已而攝天子之位以賞罰天下以存周室周之東遷也天子之權當在平王而平王昏故夫子亦曰天下不可以無賞罰而魯周公之國也居魯之地者宜如周公不得已而假天子之權以賞罰天下以尊周室故以天子之權與之也然則假天子之權宜如何曰如齊桓晉文可也夫子欲魯如齊桓晉文而不遂以天子之權與齊晉者何也齊桓晉文陽為尊周而實欲富強其國故夫子與其事而不與其心周公心存王室雖其子孫不能繼而夫子思周公而許其假天子之權以賞罰天下其意曰有周公之心而後可以行桓文之事此其所以不與齊晉而與魯也夫子亦知魯君之才不足以行周公之事矣顧其心以為今之天下無周公故至此是故以天子之權與其子孫所以見思周公之意也吾觀春秋之法皆周公之法而又詳內而略外此其意欲魯法周公之所為且先自治而後治人也明矣夫子歎禮樂征伐自諸侯出而田常弒其君則沐浴而請討然則天子之權夫子固明以與魯也子貢之徒不逹夫子之意續經而書孔丘卒夫子既告老矣大夫告老而卒不書而夫子獨書夫子作春秋以公天下而豈私一孔丘哉嗚呼夫子以為魯國之書而子貢之徒以為孔氏之書也歟遷固之史有是非而無賞罰彼亦史臣之體宜爾也後之效夫子作春秋者吾惑焉春秋有天子之權天下有君則春秋不當作天下無君則天下之權吾不知其誰與天下之人烏有如周公之後之可與者與之而不得其人則亂不與人而自與則僣不與人不自與而無所與則散嗚呼後之春秋亂邪僣邪散邪洵為六經論謂聖人制禮所以強人棄逸而即勞以尊其君父兄皆聖人之微權也恐告語之有所不及乃為樂以隂驅而潛率之又恐其久而易廢也乃為易以尊其道使天下探之茫茫索之𡨕冥視聖人如鬼神之幽而不可測又恐人之嗜欲好之有甚于生而憤憾怨怒有不顧其死者而禮之權窮乃為詩以通人情謂好色而不淫怨其君父而不怒則亦聖人之所許所以全天下之中人也其于詩易禮樂所見如此噫亦淺矣彼其視聖人之經無往不用其權者然則非六經乃六權也邪其論書也謂聖人因風俗之變而用其權聖人之權用於當世而風俗之變益甚武王周公遂變而不復反益為謬論惟此論春秋篇特不詭于道故録之吕祖謙曰此篇須看首尾相應枝葉相生如引繩貫珠大抵一莭未盡又生一莭别人意多則雜惟此篇意多而不雜謝枋得曰此文有法度有氣力有精神有光焰謹嚴而華藻者也精熟孟子方有此文章御選唐宋文醇卷三十五
