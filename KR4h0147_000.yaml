body:
  text: 欽定四庫全書御選唐宋文醇序不朽有三立言其一言之無文行而不逺若是乎言之文者乃能立於後世也文之體不一矣語文者說亦多矣羣言淆亂衷諸聖當必以周孔之語為歸周公曰言有序孔子曰辭逹而已矣無序固不可以逹欲逹其辭而失其序則其為言奚能雲粼波折而與天地之文相似也然使義則戔戔而言有枝葉妃青嫓白雕琢曼辭則所謂八代之衰已其咎同歸於無序而不逹抑又有進焉文所以足言而言固以足志其志已荒文將奚附是以孔子又曰言有物夫序而逹逹而有物斯固天下之至文也已昌黎韓愈生周漢之後幾五百年逺紹古人立言之軌則其文可謂有序而能逹者然必其言之又能有物如布帛之可以暖人菽粟之可以飽人則李瀚所編七百篇中猶且十未三四况昌黎而下乎甚矣文之至者不易得也明茅坤舉唐宋兩朝中昌黎栁州廬陵三蘇曽王八大家薈萃其文各若干首行世迄今操觚者膾炙之本朝儲欣謂茅坤之選便於舉業而弊即在是乃復增損之附以李習之孫可之為十大家欲俾讀者興起於古毋祗為發䇿決科之用意良美矣顧其識之未衷而見之未當則所去取與茅坤亦未始徑庭朕讀其書嘉其意而亦未嘗不懲其失也夫十家者謂其非八代駢體云爾駢句固屬文體之病然若唐之魏鄭公陸宣公其文亦多駢句而辭逹理詣足為世用則駢又奚病日月麗乎天天之文也百穀草木麗乎土地之文也化工之所為有定形乎哉化工形形而不形於形而謂文可有定形乎哉顧其言之所立者何如耳敕幾之暇偶取儲欣所選十家之文録其言之尤雅者若干首合而編之以便觀覽夫唐宋以來名儒碩士有序有物之嘉言固不苐十人已矣雖然嘗鼎一臠亦足以知道腴之可味况已斟其雉膏哉乾隆戊午秋九月御筆凡例一各家之文有經聖祖仁皇帝御評者用黃書恭載篇首以昭異代儒臣千古之至榮一朱子韓文考異採取古人之語居多然未著其姓氏既難根尋且已多經朱子繩削者故並録為朱子評語一文之短長抑揚髙下及起伏照應本無定法所謂天機至則律吕自調耳古今人評此者並不録恐印定後人眼目也一是編所采古今人評跋及詩文論說在唐為栁宗元李商隱孫樵在宋為穆修歐陽修司馬光吕公著蘇軾蘇轍石介黃庭堅王安石王定國邵伯溫伊川程子朱子吕祖謙真德秀洪邁周必大葉夢得葉適黃震陳善朱辨王應麟王明清劉克莊徐度謝枋得在元為虞集在明為邱濬胡居仁楊慎唐順之林希元茅坤姜寶王慎中王世貞李廷機王志堅黃道周陳子龍徐孚逺凌安國凌安世在本朝為張英勵杜訥李光地儲欣蔡世逺皆取其於文有所發明者但積卷浩瀚奚能遍覽就目之所及録之云耳其文中所載姓名字蹟有須考者間採録本史以備參詳一各家文凡書序論記等各以類編惟蘇軾上書奏狀對䇿諸篇以年月先後編次緣軾進諫自有次第故不與諸家一例也一是編始雖取材於儲欣選本復有欣本所遺而不可不採者亦並録入通計十之二乾隆三年九月初九日奉㫖開列校刻諸臣職名監造議政大臣辦理藩院尚書事務兼理總管內務府和碩莊親王臣允祿校對經筵講官內閣學士兼禮部侍郎臣張照校刋翰林院編修臣朱良裘臣董邦達翰林院檢討臣吳泰臣唐進賢臣萬松齡翰林院庶吉士臣帥家相臣馮祁臣吳紱監造內務府南苑郎中兼佐領加六級紀録八次臣雅爾岱內務府武備院郎中兼佐領加六級紀録四次臣永保內務府織染局員外郎加三級臣李之綱內務府廣儲司司庫加二級臣三格武英殿監造臣西寧臣恩克武英殿委署主事臣永忠欽定四庫全書集部八御選唐宋文醇目録總集類昌黎韓愈卷之一雜著原毁對禹問雜說一雜說二雜說三雜說四讀荀讀鶡冠子讀儀禮讀墨子獲麟解進學解師說守戒卷之二雜著五針五首并序釋言伯夷頌後漢三賢贊三首鄆州溪堂詩爭臣論張中丞傳後叙愛直贈李君房别圬者王承福傳太學生何蕃傳卷之三書答竇秀才書答尉遲生書上宰相書答崔立之書答李翊書答李翺書上張僕射書與崔羣書與衛中行書卷之四書啓序與馮宿論文書答劉正夫書答陳生書答呂醫山人書與鄂州桞中丞書第二首上留守鄭相公啓送竇從事序送孟東野序上巳日燕太學聽彈琴詩序送陳密序送李願歸盤谷序送董邵南序贈崔復州序贈張童子序卷之五序送區册序送王秀才序送浮屠文暢師序送髙間上人序送殷員外序送楊少尹序送石處士序送溫處士赴河陽軍序送鄭尚書序送水陸運使韓侍御歸所治序石鼎聨句詩序卷之六記議狀表汴州東西水門記燕喜亭記藍田縣丞㕔壁記新修滕王閣記禘祫議論淮西事宜狀論今年權停舉選狀論佛骨表為裴相公讓官表卷之七順宗實録祭文哀辭順宗實録紀張萬福陸贄陽城祭田橫墓文祭郴州李使君文祭河南張員外文祭栁子厚文祭侯主簿文祭馬僕射文祭鄭夫人文祭十二郎文獨孤申叔哀辭卷之八碑平淮西碑南海神廟碑栁州羅池廟碑衢州徐偃王廟碑袁氏先廟碑曹成王碑卷之九碑銘墓志銘魏博節度觀察使沂國公先廟碑銘江南西道觀察使贈左散騎常侍太原王公神道碑銘唐故相權公墓碑殿中少監馬君墓志考功員外盧君墓銘李元賓墓銘施先生墓銘唐故江西觀察使韋公墓志銘卷之十墓志銘雜文試大理評事王君墓志銘故幽州節度判官贈給事中清河張君墓志銘貞曜先生墓志銘栁子厚墓志銘南陽樊紹述墓志銘鱷魚文送窮文毛穎傳河東栁宗元卷之十一賦雜著解祟賦平淮夷雅二篇晉文公問守原議桐葉封弟辨捕蛇者說說車贈楊誨之宋清傳種樹郭槖駝傳梓人傳童區寄傳卷之十二雜著誡懼針憂針師友針答問敵戒謗譽咸宜鞭賈序棊伊尹五就桀贊梁丘據贊武岡銘劍門銘夀州安豐縣孝門銘卷之十三書與劉禹錫論周易九六說書答元饒州論春秋書答元饒州論政理書與友人論文書與呂恭書答韋中立論師道書答嚴厚輿論師道書報袁君陳秀才避師名書卷之十四書啓答韋珩示韓愈相推以文墨事書報崔黯秀才書與韓愈論史官書與史官韓愈致段秀實太尉逸事書與太學諸生喜詣闕留陽城司業書答周君巢書與楊京兆憑書賀趙江陵宗儒辟符載啓卷之十五序論愚溪詩序同吳武陵贈李睦州詩序送南涪州量移澧州序送徐從事北游序送婁圖南秀才遊淮南將入道序送崔子符罷舉詩序送從弟謀歸江陵序送澥序封建論卷之十六論記守道論四維論辨侵伐論永州新堂記嶺南節度使饗軍堂記諸使兼御史中丞壁記四門助教㕔壁記永州萬石亭記始得西山宴游記鈷鉧潭記鈷鉧潭西小丘記至小丘西小石潭記袁家渴記石渠記石澗記小石城山記卷之十七記議碑遊黃溪記興州江運記零陵三亭記零陵郡復乳穴記雍州馬退山茅亭記栁州山水近治可遊者記永州龍興寺東丘記駮復讐議箕子碑栁州文宣王新修廟碑卷之十八祭文雜文墓表墓志銘狀碣弔萇叔文弔屈原文祭井文又祭崔簡神柩歸上都文唐故給事中皇太子侍讀陸文通先生墓表故祕書郎姜君墓志故襄陽丞趙君墓志覃季子墓銘段太尉秀實逸事狀國子司業陽城遺愛碣唐故御史周君碣乞巧文隴西李翺卷之十九賦雜著幽懷賦復性書上復性書中復性書下陸歙州述髙愍女碑楊烈婦傳卷之二十書奏狀行狀答獨孤舍人書答王載言書薦所知於徐州張僕射書百官行狀奏故正議大夫行尚書吏部侍郎上柱國賜紫金魚袋贈禮部尚書韓公行狀關東孫樵卷之二十一賦雜著書祭文雜文大明宫賦讀開元雜報孫氏西齊録書何易于書田將軍邊事書褒城驛壁與髙錫望書與王霖秀才書祭梓童帝君文乞巧對廬陵歐陽修卷之二十二賦雜著書紅鸚鵡賦藏珠於淵賦明用書梅聖俞稿後桑懌傳上范司諫書上杜中丞書答吳充秀才書卷之二十三書與髙司諫書與尹師魯第一書答陜西安撫使范龍圖辭辟命書與石推官第一書與石推官第二書答宋咸書答刁景純學士書與樂秀才第一書與張秀才第二書卷之二十四序帝王世次圖序後序外制集序詩譜補亡後序集古録目序韻總序蘇氏文集序梅聖俞詩集序送徐無黨南歸序卷之二十五序䇿問論送王聖紀赴扶風主簿序送田畫秀才寧親萬州序送楊置序送王陶序問進士策一問進士䇿四首之四泰誓論本論卷之二十六論記為君難論上為君難論下吉州學記峴山亭記豐樂亭記醉翁亭記偃虹亭記王彥章畫像記仁宗御飛白記伐樹記卷之二十七狀疏議學狀論杜衍范仲淹等罷政事狀論史館日厯狀論茶法奏狀論選皇子疏卷之二十八上書通進司上皇帝書凖詔言事上書論包拯除三司使上書卷之二十九劄子論乞令百官議事劄子論美人張氏恩寵宜加裁損劄子論澧州瑞木乞不宣示外廷劄子請駕不幸溫成廟劄子論臺諫官唐介等宜早牽復劄子論逐路取人劄子論删去九經正義中䜟緯劄子論議濮安懿王典禮劄子卷之三十祭文碑銘祭尹師魯文祭蘇子美文祭石曼卿文資政殿學士户部侍郎文正范公神道碑銘太尉文正王公神道碑銘卷之三十一碑銘墓表鎮安軍節度使同中書門下平章事贈太師中書令程公神道碑銘觀政殿學士行兵部尚書西京留守贈司空兼侍中晏公神道碑銘石曼卿墓表連處士墓表胡先生墓表瀧岡阡表卷之三十二墓志銘尚書兵部員外郎知制誥謝公墓志銘資政殿學士尚書户部侍郎簡肅薛公墓志銘翰林院侍讀學士右諫議大夫楊公墓志銘太子太師致仕杜祁公墓志銘故霸州文安縣主簿蘇君墓志銘卷之三十三墓志銘端明殿學士蔡公墓志銘孫明復先生墓志銘黃夢升墓志銘尹師魯墓志銘徂徠石先生墓志銘睂山蘇洵卷之三十四雜著權書心術篇權書法制篇權書孫武篇權書六國篇衡論重逺篇衡論廣士篇卷之三十五雜著書序論名二子說送石昌言使北引上富丞相書上歐陽內翰第一書上歐陽內翰第四書上韓舍人書蘇氏族譜春秋論卷之三十六論記洪範論序洪範上洪範中洪範下洪範後序嚳妃論明論辨姦蘇氏族譜亭記張益州畫像記木假山記卷之三十七狀上書議修禮書狀上皇帝書睂山蘇軾卷之三十八賦雜著赤壁賦後赤壁賦屈原廟賦灔澦堆賦黠鼠賦日喻問養生叔孫通不能致二生狄山論丐奴和親張九齡不肯用張守圭牛仙客和歸去來兮辭書韓魏公黃州詩後三槐堂銘卷之三十九書上文侍中論𣙜鹽書上韓樞密書與謝民師推官書與李方叔書與王庠書謝張太僕撰先人墓碣書答張文潛縣丞書卷之四十書尺牘序答李豸書上執政乞度牒賑濟因修廨宇書上呂僕射論浙西災傷書答䖍倅俞括奉議書與滕逹道第二十二首與李公擇第十一首與王庠第五首鳧繹先生詩集序范文正公文集序江子靜字序卷之四十一論禮以養人為本論既醉備五福論詩論禮論論閏月不告朔猶朝於廟宋襄公論伊尹論周公論卷之四十二論荀卿論韓非論留侯論賈誼論鼂錯論續歐陽子朋黨論屈到嗜芰論卷之四十三論論養士論魯隱公論隱公里克李斯鄭小同王允之論管仲論周東遷論商鞅論始皇漢宣李斯論項羽范增卷之四十四記超然臺記寶繪堂記睂山逺景樓記石鐘山記衆妙堂記喜雨亭記中和勝相院記李氏山房藏書記卷之四十五上書狀上皇帝書議學校貢舉狀諫買浙燈狀上神宗皇帝書卷之四十六上書再上皇帝書擬進士對御試䇿代張方平諫用兵書代滕甫論西夏書卷之四十七狀論河北京東盜賊狀論浙西災傷