  - {type: page-break, offset: 0, content: '', id: KR4h0147_WYG_014-1a, image: WYG1447/WYG1447-0321a.png}
body:
  text: 河東栁宗元文四書啓答韋珩示韓愈相推以文墨事書報崔黯秀才書與韓愈論史官書與史官韓愈致段秀實太尉逸事書與太學諸生喜詣闕留陽城司業事答周君巢書與楊京兆憑書賀趙江陵宗儒辟符載啓欽定四庫全書御選唐宋文醇卷十四河東栁宗元文四答韋珩示韓愈相推以文墨事書足下所封示退之書云欲推避僕以文墨事且以勵足下若退之之才過僕數人尚不宜推避於僕非其實可知固相假借為之詞耳退之所敬者司馬遷揚雄遷於退之固相上下若雄者如太玄法言及四愁賦退之獨未作耳決作之加恢竒至他文過揚雄逺甚雄文遣言措意頗短局滯澀不若退之猖狂恣睢肆意有所作若然者使雄來尚不宜推避而况僕耶彼好奬人善以為不屈已善不可奬故慊慊云爾也足下幸勿信之且足下志氣髙好讀南北史書通國朝事穿穴古今後來無能和而僕稚騃卒無所為但趦趄文墨筆硯淺事今退之不以吾子勵僕而反以僕勵吾子愈非所宜然卒篇欲足下自挫抑合當世事固當雖僕亦知無出此吾子年甚少知己者如麻不患不顯患道不立耳此僕以自勵亦以佐退之勵足下不宣宗元頓首再拜吏部文章之宗然其造詣深淺須以栁州所論為定故録之且可以見栁之不敢望韓具所自道中蓋實録非謙辭也報崔黯秀才書崔生足下辱書及文章辭意良髙所嚮慕不凡近誠有意乎聖人之言然聖人之言期以明道學者務求諸道而遺其辭辭之傳於世者必由於書道假辭而明辭假書而傳要之之道而已耳道之及及乎物而已耳斯取道之內者也今世因貴辭而矜書粉澤以為工遒密以為能不亦外乎吾子之所言道匪辭而書其所望於僕亦匪辭而書是不亦去及物之道愈以逺乎僕嘗學聖人之道身雖窮志求之不已庶幾可以語於古恨與吾子不同州部閉口無所發明觀吾子文章自秀士可通聖人之説今吾子求於道也外而望於豫也愈外是其可惜歟吾且不言是負吾子數千里不棄朽廢者之意故復云爾也凡人好辭工書者皆病癖也吾不幸蚤得二病學道以來日思砭針攻尉卒不能去纒結心腑牢甚願斯須忘之而不克竊嘗自毒今吾子乃始欽欽思易吾病不亦惑乎斯固有潛塊積瘕中子之內藏恬而不悟可憐哉其卒與我何異均之二病書字益下而子之意又益下則子之病又益篤甚矣子癖於伎也吾嘗見病心腹人有思啖土炭嗜酸鹹者不得則大戚其親愛之者不忍其戚因探而與之觀吾子之意亦已戚矣吾雖未得親愛吾子然亦重來意之勤有不忍矣誠欲分吾土炭酸鹹吾不敢愛但逺言其證不可也俟面乃悉陳吾狀未相見且誠求良醫為方已之茍能已大善則及物之道專而易通若積結既定醫無所能已幸期相見時吾決分子其啖嗜者不具宗元白禮樂射御書數皆藝也德成而上藝成而下其下焉者君子之所遊遊之云者所執愈卑所達彌上莫非所以養其德也若溺焉而進乎技則是以其養德者害德矣唐世重文章尤重書法其試士以身言書判拔萃乃得為近職故黯以文章書法為問而宗元欲悉屏之使及物之道專而易通又以及物為取道之內卓然名儒語也宗元可謂既沒其言立矣宗元善書今龍城栁石刻猶存與韓愈論史官書正月二十一日某頓首十八丈退之侍者前獲書言史事云具與劉秀才書及今乃見書藁私心甚不喜與退之往年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以為茍以史榮一韓退之耶若果爾退之豈宜虛受宰相榮已而冒居館下近密地食奉養役使掌故利紙筆為私書取以供子弟費古之志於道者不若是且退之以為紀録者有刑禍避不肯就尤非也史以名為褒貶猶且恐懼不敢為設使退之為御史中丞大夫其褒貶成敗人愈益顯其宜恐懼尤大也則又將揚揚入臺府美食安坐行呼唱於朝廷而已耶在御史猶爾設使退之為宰相生殺出入升黜天下士其敵益衆則又揚揚入政事堂美食安坐行呼唱於內廷外衢而已耶何以異不為史而榮其號利其祿者也又言不有人禍則有天刑若以罪夫前古之為史者然亦甚惑凡居其位思直其道道茍直雖死不可回也如回之莫若亟去其位孔子之困於魯衛陳宋蔡齊楚者其時暗諸侯不能以也其不遇而死不以作春秋故也當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也又不得以春秋為孔子纍范曄悖亂雖不為史其族亦赤司馬遷觸天子喜怒班固不檢下崔浩沽其直以鬭暴虜皆非中道左丘明以疾盲出於不幸子夏不為史亦盲不可以是為戒其餘皆不出此是退之宜守中道不忘其直無以他事自恐退之之恐唯在不直不得中道邢禍非所恐也凡言二百年文武事多有誡如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之耶如退之但以所聞知孜孜不敢怠同職者後來繼今者亦各以所聞知孜孜不敢怠則庶幾不墜使卒有明也不然徒信人口語每每異辭日以滋久則所云磊磊軒天地者決必不沉沒且亂雜無可考非有志者所忍恣也果有志豈當待人督責迫蹙然後為官守耶又凡鬼神事眇茫荒惑無可凖明者所不道退之之智而猶懼於此今學如退之辭如退之好言論如退之慷慨自為正直行行焉如退之猶所云若是則唐之史述其卒無可託乎明天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可為速為果卒以為恐懼不敢則一日可引去又何以云行且謀也今當為而不為又誘館中他人及後生者此大惑已不勉已而欲勉人難矣哉葉適曰令狐德棻在武德初便已建明修史故貞觀中晉及南北諸書皆獲完具而李延夀又自為集史雖皆文字不足以望古人而成敗有考統紀不失其補益於世多矣自北齊至隋詞學彚興太宗又置文學館收拾時彥名章俊筆相繼而起後世乃謂東漢以來道喪文敝房杜姚宋不能救而古文由韓愈始復振此論固不可易本朝繼之以歐王曽蘇然雖文詞為盛往往不過記敘銘論浮説間語而著實處反不如唐人逺甚與史官韓愈致段秀實太尉逸事書退之館下前者書進退之力史事奉答誠中吾病若疑不得實未即籍者諸皆是也退之平生不以不信見遇竊自冠好遊邊上問故老卒吏得段太尉事最詳今所趨走州刺史崔公時賜言事又具得太尉實迹參校備具太尉大節古固無有然人以為偶一奮遂名無窮今大不然太尉自有難在軍中其處心未嘗虧側其涖事無一不可紀會在下名未達以故不聞非直以一時取笏為諒也史遷死退之復以史道在職宜不茍過日時昔與退之期為史志甚壯今孤囚廢錮連遭瘴厲羸頓朝夕就死無能為也第不能竟其業若太尉者宜使勿墜太史遷言荆軻徴夏無且言大將軍徴蘇建言留侯徴畫容貌今孤囚賤辱雖不及無且建等然比畫工傳容貌尚差勝春秋傳所謂傳信傳著雖孔子亦猶是也竊自以為信且著其逸事有狀著段太尉宿昔心行非一時激烈笏擊朱泚而成名者其義甚美與上史館狀並讀可見宗元揚善表微勤懇無已之懷其書當在與韓愈論史官而韓愈復書之後惜韓書不存然疑不得實未即籍七字亦可槩見其復書之意矣而後世猶真以韓愈為不肯作史何耶與太學諸生喜詣闕留陽城司業書二十六日集賢殿正字栁宗元敬致尺牘太學諸生足下始朝廷用諫議大夫陽公為司業諸生陶煦醇懿熙然大洽於兹四祀而已詔書出為道州僕時通籍光範門就職書府聞之悒然不喜非特為諸生戚戚也乃僕亦失其師表而莫有所矜式焉既而署吏有傳致詔草者僕得觀之蓋主上知陽公甚熟嘉美顯寵勤至備厚乃知欲煩陽公宣風裔土覃布美化於黎獻也遂寬然少喜如獲慰薦於天子休命然而退自感悼幸生聖明不諱之代不能布露所蓄論列大體聞於下執事冀少見採取而還陽公之南也翌日退自書府就車於司馬門外聞之於抱關掌管者道諸生愛慕陽公之德教不忍其去頓首西闕下懇悃至願乞留如故者百數十人輒用撫手喜甚震抃不寧不意古道復形於今僕嘗讀李元禮嵇叔夜傳觀其言太學生徒仰闕赴訴者僕謂訖千百年不可覩聞乃今日聞而覩之誠諸生見賜甚盛於戲始僕少時嘗有意遊太學受師説以植志持身焉當時説者咸曰太學生聚為朋曹侮老慢賢有墮窳敗業而利口食者有崇飾惡言而肆鬭訟者有凌傲長上而誶罵有司者其退然自克特殊於衆人者無幾耳僕聞之惚駭怛悸良痛其遊聖人之門而衆為是􅊱􅊱也遂退託鄉閭家孰考厲志業過太學之門而不敢局顧尚何能仰視其學徒者哉今乃奮志厲義出乎千百年之表何聞見之乖刺歟豈説者過也將亦時異人異無嚮時之桀害者耶其無乃陽公之漸漬導訓明效所致乎夫如是服聖人遺教居天子太學可無愧矣於戲陽公有博厚恢𢎞之德能容善偽來者不拒曩聞有狂惑小生依託門下或乃飛文陳愚醜行無賴而論者以為言謂陽公過於納汙無人師之道是大不然仲尼吾黨狂狷南郭獻譏曾參徒七十二人致禍負芻孟軻館齊從者竊屨彼一聖兩賢人繼為大儒然猶不免如之何其拒人也俞扁之門不拒病夫繩墨之側不拒枉材師儒之席不拒曲士理固然也且陽公之在於朝四方聞風仰而尊之貪冒茍進邪薄之夫庶得少沮其志不遂其惡雖微師尹之位而人實具瞻焉與其宣風一方覃化一州其功之逺近又可量哉諸生之言非獨為已也於國體實甚宜願諸生勿得私之想復再上故少佐筆端耳朂此良志俾為史者有以紀述也努力多賀栁宗元白聞人善樂道之如已出誘掖奬勸以成其美忠孝之性鬱乎中而發作於外答周君巢書奉二月九日書所以撫教甚具無以加焉丈人用文雅從知已日以惇大府之政甚適東西來者皆曰海上多君子周為倡焉敢再拜稱賀宗元以罪大擯廢居小州與囚徒為朋行則若帶纒索處則若關桎桔彳亍而無所趨拳拘而不能肆稿焉若枿隤焉若璞其形固若是則其中者可得矣然猶未嘗肯道鬼神等事今丈人乃盛譽山澤之臞者以為夀且神其道若與堯舜孔子似不相類焉何哉又曰餌藥可以久夀將分以見與固小人之所不欲得也嘗以君子之道處焉則外愚而內益智外訥而內益辨外柔而內益剛出焉則外內若一而時動以取其宜當而生人之性得以安聖人之道得以光獲是而終雖不至耉老其道夀矣今夫山澤之臞於我無有焉視世之亂若理視人之害若利視道之悖若義我夀而生彼夭而死固無能動其肺肝焉昧昧而趨屯屯而居浩然若有餘掘草烹石以私其筋骨而日以益愚他人莫利已獨以愈若是者愈千百年滋所謂夭也又何以為髙明之圖哉宗元始者講道不篤以蒙世顯利動獲大僇用是奔竄禁錮為世之所詬病凡所設施皆以為戾從而吠者成羣已不能明而况人乎然茍守先聖之道由大中以出雖萬受擯棄不更乎其內大都類往時京城西與丈人言者愚不能改亦欲丈人固往時所執推而大之不為方士所惑仕雖未達無忘生人之患則聖人之道幸甚其必有陳矣不宣宗元再拜神仙之説誠杳茫矣而嵇叔夜作養生論謂一溉之益不可誣以蘇軾之明達猶不能無惑焉朱子闢異端息邪説而仿陳子昂感遇詩亦曰刀圭一入口白日生羽翰何耶谷永所稱人言世有仙人服食不終之藥遙興輕舉登遐倒景覽觀縣圃周遊蓬萊耕耘五德朝種暮穫與山石無極黃治變化堅冰淖溺化色五倉之術者皆姦人惑衆挾左道懷詐偽以欺罔世主云云者猶非其實耶夫天地曰兩大其夀萬古然天地未嘗無生死也深谷為陵則一谷之天死矣髙岸為谷則一岸之地死矣而謂人有不死之理乎哉如曰茫茫堪輿俯仰無垠者終古不滅而謂天地不死則人之為人亦本自不死而又何足言林林者總總者振古如兹也人之有身正如谷中之天以谷為身髙岸之地以岸為身耳乃欲執此一身之百骸九竅期其長存不壞是何異深谷必不使為陵而髙岸必不使為谷也夫一藝之微必有師承今為長生之説者非以莊老為師耶莊子之言曰天下莫夀於殤子而彭祖為夭又曰毅養其內而虎食其外豹養其外而病攻其內則夫善闢長生之説者莫過於其師矣而人猶不能無惑者何耶夫人目則欲色耳則欲聲鼻則欲香口則欲味四肢則欲安佚而尤欲夫長久得遂其欲永永不絶其欲於是慨然而欲長生然為長生之説者曰必先斷絶種種諸欲而後能則即使果得長生亦為買櫝而還其珠非其本欲矣况乎其必不能耶若其所為元精元氣元神之論歸於天地同根萬物同體者則先無所為生曷論長短且其身也是為大身與此茫茫堪輿同一無垠而終古不滅又何所安排措置於其間哉至於服食之説益為謬妄人之生也陰陽均平則百體無疾偏則生災今其論曰一毫陰氣未盡猶未得仙而烹煉天地間純陽之物以為服食則非求長生直求速死耳溫帶之下無血氣之倫以其逼近太陽如洪爐邊無生物也則豈有陰絶而猶生者哉其亦未明於陰陽之理矣又有守中服氣還精補腦等術謂不死之藥不離自身者不知人之一身何者為自涕唾皆水也膚革皆地也暖熱皆火也動搖皆風也神明皆天也凡夫地水火風之屬入於我之耳目鼻口者皆所以養我之生要皆與我身內所有者無異也然而皆非不死之藥也何獨舉自身所有地水火風為足以致長生耶讀宗元此文謂道夀則夀道夭則夭識見甚偉因推類以盡其餘以解世惑焉與楊京兆憑書月日宗元再拜獻書丈人役人胡要返命奉教誨壯厲感發鋪陳廣大上言推延賢雋之道難於今之世次及文章末以愚蒙剝喪頓悴無以守宗族復田畝為念憂憫備極不惟其親密故舊是與復有公言顯賞許其素尚而激其忠誠者用是踊躍敬懼類嚮時所被簡牘萬萬有加焉故敢悉其愚以獻左右大凡薦舉之道古人之所謂難者其難非茍一而已矣知之難言之難聽信之難夫人有有之而耻言之者有有之而樂言之者有無之而工言之者有無之而不言似有之者有之而耻言之者上也雖舜猶難知之孔子亦曰失之子羽下斯而言知而不失者妄矣有之而言之者次也德如漢光武馮衍不用才如王景略以尹緯為令史是皆終日號鳴大吒而卒莫之省無之而工言者賊也趙括得以代廉頗馬謖得以惑孔明今之若此類者不乏於世將相大臣聞其言而必能辨之者亦妄矣無之而不言者土木類也周仁以重臣為二千石許靖以人譽而致位三公近世尤好此類以為長者最得薦寵夫言朴愚無害者其於田野鄉閭為匹夫雖稱為長者可也自抱關擊柝以往則必敬其事愈上則及物者愈大何事無用之朴哉今之言曰某子長者可以為大官類非古之所謂長者也則必土木而已矣夫捧土揭木而致之巖廊之上蒙以紱冕翼以徒𨽻趨走其左右豈有補於萬民之勞苦哉聖人之道不益於世用凡以此也故曰知之難孔子曰仁者其言也訒孟子病未同而言然則彼未吾信而吾告之以士必有三間是將曰彼誠知士歟知文歟疑之而未重一間也又曰彼無乃私好歟交以利歟二間也又曰彼不足我而惎我哉兹咈吾事三間也畏是而不言故曰言之難言而有是患故曰聽信之難唯明者為能得其所以薦得其所以聽一不至則不可冀矣然而君子不以言聽之難而不務取士士理之本也茍有司之不吾信吾知之不捨其必有信吾者矣茍知之雖無有司而士可以顯則吾一旦操用人之柄其必有施矣故公卿之大任莫若索士士不預備而熟講之卒然君有問焉宰相有咨焉有司有求焉其無所以應之則大臣之道或闕故不可憚煩今之世言士者先文章文章士之末也然立言存乎其中即末而操其本可十七八未易忽也自古文士之多莫如今今之後生為文希屈馬者可得數人希王褒劉向之徒者又可得十人至陸機潘嶽之比纍纍相望若皆為之不己則文章之大盛古未有也後代乃可知之今之俗耳庸目無所取信傑然特異者乃見此耳丈人以文律通流當世叔仲鼎列天下號為文章家今又生敬之敬之希屈馬者之一也天下方理平今之文士咸能先理理不一斷於古書老生直趨堯舜大道孔氏之志明而出之又古之所難有也然則文章未必為士之末獨采取何如耳宗元自小學為文章中間幸聨得甲乙科第至尚書郎專百官章奏然未能究知為文之道自貶官來無事讀百家書上下馳騁乃少得知文章利病去年吳武陵來美其齒少才氣壯健可以興西漢之文章日與之語因為之出數十篇書庶幾鏗鏘陶冶時時得見古人情狀然彼古人亦人耳夫何逺哉凡人可以言古不可以言今桓談亦云親見揚子雲容貌不能動人安肯傳其書誠使博如莊周哀如屈原奧如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之髙者至少矣由此觀之古之人未必不薄於當世而榮於後世也若吳子之文非丈人無以知之獨恐世人之才髙者不肯久學無以盡訓詁風雅之道以為一世甚盛若宗元者才力缺敗不能逺騁髙厲與諸生摩九霄撫四海夸耀於後之人矣何也凡為文以神志為主自遭責逐繼以大故荒亂耗竭又常積憂恐神志少矣所讀書隨又遺忘一二年來痞氣尤甚加以衆疾動作不常眊眊然騷擾內生霾霧填擁慘沮雖有意窮文章而病奪其志矣每聞人大言則蹶氣震怖撫心按膽不能自止又永州多火災五年之間四為大火所迫徒跣走出壞牆穴牖僅免燔灼書籍散亂毁裂不知所往一遇火恐纍日茫洋不能出言又安能盡意於筆硯矻矻自苦以傷危敗之魂哉中心之悃愊鬱結具載所獻許京兆丈人書不能重煩於陳列凡人之黜棄皆望望思得效用而宗元獨以無有是念自以罪大不可解才質無所入茍焉以敘憂栗為幸敢有他志伏以先君稟孝德秉直道髙於天下仕再登朝至六品官宗元無似亦嘗再登朝至六品矣何以堪此且栁氏號為大族五六從以來無為朝士者豈愚蒙獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受祿位亦所未能今復得好官猶不辭讓何也以人望人尚足自進如其不至則故無憾進取之志息矣身世孑然無可以為家雖甚崇寵之孰與為榮獨恨不幸獲託姻好而早凋落寡居十餘年嘗有一男子然無一日之命至今無以託嗣續恨痛常在心目孟子稱不孝有三無後為大今之汲汲於世者惟懼此而已矣天若不棄先君之德使有世嗣或者猶望延夀命以及大宥得歸鄉閭立家室則子道畢矣過是而猶競於寵利者天厭之天厭之丈人旦夕歸朝廷復為大僚伏惟以此為念流涕頓顙布之座右不勝感激之至宗元再拜此文後半首亦是哀怨之音與蕭俯書之類耳前半首所述知之難言之難聽言之難則曲盡末世人物情理允為至言確論賀趙江陵宗儒辟符載啓某啓伏聞以武都符載為記室天下立志之士雜然相顧繼以歎息知為善者得其歸嚮流言者有所間執直道之所行義風之所揚堂堂焉實在荆山之南矣幸甚幸甚夫以符君之藝術志氣為時聞人才位未會盤桓固久中間因緣陷在危邦與時偃仰不廢其道而為見忌嫉者橫致唇吻房給事以髙節特立明之於朝王吏部以清議自任辨之於外然猶小人浮議困在交戟凡諸侯之欲得符君者城聨壤接而惑於騰沸環視相讓莫敢先舉及受署之日則皆開口垂臂悵望悼悔譬之求珠於海而徑寸先得則衆皆怏然罷去知竒寶之有所歸也嗚呼巧言難明下流多訕自非大君子出世之氣則何望焉瞻望清風若在天外無任感激欣躍之至輕瀆陳賀不勝戰越不宣符載非必重係天下望可以其出處卜士進退然傷胎殺卵則鳯凰不儀毋謂一夫可寃也况才俊之士哉鳴犢戮晉仲尼回郭隗重燕樂毅至無知在漢曲逆進咸博結綬蕭男顯杜季蒙難袁閎狂同聲相應同氣相求一堂兩琴宫商必應草木臭味奚敢差池夫以人事君人臣之大義也宗元之賀趙宗儒誠心不忘君也哉御選唐宋文醇卷十四
