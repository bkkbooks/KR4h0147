body:
  text: 河東栁宗元文二雜著誡懼針憂針師友針答問敵戒謗譽咸宜鞭賈序棊伊尹五就桀贊梁丘據贊武岡銘劍門銘夀州安豐縣孝門銘欽定四庫全書御選唐宋文醇卷十二河東柳宗元文二誡懼針人不知懼惡可有為知之為美莫若去之非曰童昏昧昧勿思禍至而懼是誠不知君子之懼懼乎未始幾動乎微事遷乎理將言以思將行以止中決道符乃順而起起而獲禍君子不恥非道之愆非中之詭懼而為懼雖懼焉如君子不懼為懼之初憂針憂可無乎無誰以寧子如不憂憂日以生憂不可常常則誰懌子常其憂乃小人戚敢問憂方吾將告子有聞不行有過不徙宜言不言不宜而煩宜退而勇不宜而恐中之誠懇過又不及憂之大方唯是焉急內不自得甚泰為憂省而不疚雖死優遊所憂在道不在乎禍吉之先見乃可無過告子如斯守之勿墮易曰懼以終始其要元咎語曰勇者不懼記曰君子有終身之憂易曰樂天知命故不憂語又曰內省不疚夫何憂何懼同一孔子之言而相反乃如是既一心以憂懼又一心以不憂不懼兩心奚能齊發而並存處萬事應萬幾皆此天君之出令而岐焉若此哉不知下學立心之始直上達天德之終皆以此為樞機也丹書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶怠也欲也則日涉於可憂可懼之途而不知憂不知懼否則有長戚戚之憂與患得患失之懼一以為熱火一以為寒氷雖輪轉循環而要之非憂懼即不憂懼斷無齊發而並存者若敬也義也二者夾持以毋不敬之心各從乎義之所宜則耳目口體血氣心知之欲所為甘以壞者必若蹈虎尾涉於春氷無時無處而少弛其念而以之歷乎造次顛沛之域遺大投艱盤根錯節之區又必無幾微動於心曲見於顔面者若是乎憂不憂懼不懼實齊發並存於一心而絲毫不相悖孔子之言非自相反也宗元懼憂二針其言若有見於道者蓋其歷於憂患也深而研窮於謨訓者久矣師友針今之世為人師者衆笑之舉世不師故道益離為人友者不以道而以利舉世無友故道益棄嗚呼生於是病矣歌以為針既以警已又以誡人不師如之何吾何以成不友如之何吾何以增吾欲從師可從者誰借有可從舉世笑之吾欲取友誰可取者借有可取中道或捨仲尼不生牙也久死二人可作懼吾不似中焉可師恥焉可友謹是二物用惕爾後道茍在焉傭丐為偶道之反是公侯以走內考諸古外考諸物師乎友乎敬爾無忽韓愈作師説宗元不肯為人師其答韋中立書即引退之以為戒論者以為韓栁不同今其言曰不師如之何吾何以成是即愈所云古之學者必有師之意也其曰今之世為人師者衆笑之舉世不師故道益離即愈所云士大夫之族曰師曰弟子者則羣聚而笑之之意也然則宗元不為師懼世患耳非謂師道之可以不立也答問有問栁先生者曰先生貌類學古者然遭有道不能奮厥志獨被罪辜廢斥伏匿交逰解散羞與為戚生平嚮慕毁書滅迹他人有惡指誘增益身居下流為謗藪澤罵先生者不忌陵先生者無謫遇揖目動聞言心惕時行草野不知何適獨何劣耶觀今之賢智莫不舒翹揚英推類援朋疊足天庭魁壘恢張羣驅連行竒謀髙論左右抗聲出入翕忽擁門填扃一言出口流光垂榮豈非偉耶先生雖讀古人書自謂知理道識事機而其施為若是其悖也狼狽擯僇何以自表於今之世乎先生答曰敬聞命然客言僕知理道識事機過矣僕懵夫屈伸去就觸罪受辱幸得聨支體完肌膚猶食人之食衣人之衣用人之貨無耕織居販然而活給羞愧恐栗之不暇今客又推當世賢智以深致誚責吾縲囚也逃山林入江海無路其何以容吾軀乎願客少假聲氣使得詳其心次其論客曰何取先生曰僕少嘗學問不根師説心信古書以為凡事皆易不折之以當世急務徒知開口而言閉目而息挺而行躓而伏不窮喜怒不究曲直衝羅陷穽不知顛踣愚憃狂悖若是甚矣又何以恭客之教而承厚德哉今之世工拙不欺賢不肖明白其顯進者語其德則皆茫洋深閎端貞鯁亮苞并涵養與道俱往而僕乃蹇淺窄僻跳浮嚄唶扺瑕陷厄固不足以趦趄批捩而追其迹舉其理則皆謨明淵沉剖微窮深劈析是非校度古今而僕乃緘鉗塞默耗眊窒惑抉異探怪起幽作匿攸攸恤恤卒自禍賊固不足以睢盱激昂而效其則言其學則皆總攬羅絡橫竪雜博天旋地縮鬼神交錯而僕乃單庸撇莩離疏空虛竊聽道塗顓嚚愚蒙不知所如固不足以抗顔搖舌而與之俱稱其文則皆汗漫輝煌呼噓隂陽轇轕三光陶鎔帝皇而僕乃朴鄙艱澀培塿潗湁毫聨縷緝塵出坱入固不足以攄摛踴躍而涉其級兹四者懸判雖庸童小女皆知其不及而又裹以罪惡纒以羈縶客從而擠之不亦忍乎且夫白羲緑耳之得康莊也逐奔星先飄風而跛驢不出泥滓黃鍾元間之登清廟也鏗天地動神祇而鳴嗚咬哇不入里耳西子毛嬙之蹈後宫也皎朝日煥浮雲而無鹽逐於鄉里蛟龍之騰於天淵也彌六合澤萬物而蝦與蛭不離尺水卓詭倜儻之士之遇明世也用智能顯功烈而麼眇連蹇顛頓披靡固其所也客又何怪哉且夫一涉險厄懲而不再者烈士之志也知其不可而速已者君子之事也吾將竊取之以沒吾世不亦可乎乃歌曰堯舜之修兮禹益之憂兮能者任而愚者休蹮蹮蓬藋樂吾囚兮文墨之彬彬足以舒吾愁兮已乎己乎曷之求乎客乃笑而去宗元既竄自放山澤間其堙厄感鬱一寓諸文讀者悲惻又嘗遺所善翰林蕭俯京兆尹許孟容輩道其愁苦無聊衆畏其才髙懲其復進無復用力者久汨不振乃為答問以明已之無意於世殆以止媢嫉者之索垢吹瘢云敵戒皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國兢兢以強六國既除􅑲􅑲乃亡晉敗楚鄢范文為患厲之不圖舉國造怨孟孫惡臧孟死臧恤藥石去矣吾亡無日智能知之猶卒以危矧今之人曾不是思敵存而懼敵去而舞廢備自盈秪益為愈敵存滅禍敵去召過有能知此道大名播懲病克夀矜壯死暴縱欲不戒匪愚伊耄我作戒詩思者無咎宗元放逐後益肆力於古而覺平生冒沒輕進之非使一往不返負纍滋大且將終其身不自知矣然則宗元學問文章光於千古者擠之者之恩歟述孟子生於憂患死於安樂之義作敵戒明切警悚語云茍非其人求一言之幾於道而不可得斯言可謂幾於道巳夫謗譽凡人之獲謗譽於人者亦各有道君子在下位則多謗在上位則多譽小人在下位則多譽在上位則多謗何也君子宜於上不宜於下小人宜於下不宜於上得其宜則譽至不得其宜則謗亦至此其凡也然而君子遭亂世不得已而在於上位則道必咈於君而利必及於人由是謗行於上而不及於下故可殺可辱而人猶譽之小人遭亂世而後得居於上位則道必合於君而害必及於人由是譽行於上而不及於下故可寵可富而人猶謗之君子之譽非所謂譽也其善顯焉爾小人之謗非所謂謗也其不善彰焉爾然則在下而多謗者豈盡愚而狡也哉在上而多譽者豈盡仁而智也哉其謗且譽者豈盡明而善褒貶也哉然而世之人聞而大惑出一庸人之口則羣而郵之且置於逺邇莫不以為信也豈惟不能褒貶而已則又蔽於好惡奪於利害吾又何從而得之耶孔子曰不如鄉人之善者好之其不善者惡之善人者之難見也則其謗君子者為不少矣其謗孔子者亦為不少矣傳之記者叔孫武叔時之顯貴者也其不可記者又不少矣是以在下而必困也及乎遭時得君而處乎人上功利及於天下天下之人皆歡而戴之向之謗之者今從而譽之矣是以在上而必彰也或曰然則聞謗譽於上者反而求之可乎曰是惡可毋亦徴其所自而已矣其所自善人也則信之不善人也則勿信之矣茍吾不能分於善不善也則已耳如有謗譽乎人者吾必徴其所自未敢以其言之多而譽且信之也其有及乎我者未敢以其言之多而榮且懼也茍不知我而謂我盜跖吾又安取懼焉茍不知我而謂我仲尼吾又安取榮焉知我者之善不善非吾果能明之也要必自善而已矣繪世俗任耳騰口之情狀勵學者以返躬自求可與昌黎原毁並讀咸宜興王之臣多起汙賤人曰幸也亡王之臣多死寇盜人曰禍也余咸宜之當兩漢氏之始屠販徒𨽻出以為公侯卿相無他焉彼固公侯卿相器也遭時之非是以詘獨其始之不幸非遭髙光而以為幸也漢晉之末公侯卿相劫戮困餓伏墻壁間以死無他焉彼固劫戮困餓器也遭時之非是以出獨其始之幸非遭卓曜而後為禍也彼困於昏亂伏志氣屈身體以下奴虜平難澤物之德不施於人一得適其傃其進晚耳而人猶幸之彼伸於昏亂抗志氣肆身體以傲豪傑殘民興亂之伎行於天下一得適其傃其死後耳而人猶禍之悲夫余是以咸宜之肅代順德之間奄寺執國命藩鎮攘土地皇綱陵遲四海有瓦解之漸而廟堂之上文恬武嬉一如太平無事者宗元所為悼痛而舉漢晉之末公卿將相以為戒文雖與髙光佐命兩兩平敘而意固獨有在也夫天生民而樹之后王君公承以大夫師長豈欲其偃然肆於民上以縱其淫而棄天地之性雖一邑之令固萬人之所托命焉乃梔其貌而蠟其言食焉而不事其事有不寖消寖敗以至如漢晉末造者乎易曰其所由來漸矣由辨之不蚤辨也搢紳之士盍三復斯文鞭賈市之鬻鞭者人問之其賈宜五十必曰五萬復之以五十則伏而笑以五百則小怒五千則大怒必五萬而後可有富者子適市買鞭出五萬持以夸余視其首則拳蹙而不遂視其握則蹇仄而不植其行水者一去一來不相承其節朽黑而無文材掐之滅爪而不得其所窮舉之翲然若揮虛焉余曰子何取於是而不愛五萬曰吾愛其黃而澤且賈者云余乃召僮爚湯以濯之則遫然枯蒼然白嚮之黃者梔也澤者蠟也富者不悅然猶持之三年後出東郊爭道長樂坂下馬相踶因大擊鞭折而為五六馬踶不已墜於地傷焉視其內則空空然其理若糞壤無所賴者今之梔其貌蠟其言以求賈技於朝者當其分則善一誤而過其分則喜當其分則反怒曰余曷不至於公卿然而至焉者亦良多矣居無事雖過三年不害當其有事驅之於陳力之列以御乎物以夫空空之內糞壤之理而以責其大擊之效惡有不折其用而獲墜傷之患者乎負且乘致寇至子曰盜之招也外梔蠟而中糞壤以馭奔馬馭者固墜傷矣然豈猶有全鞭乎宗元托喻非特戒取士者母皮相亦戒幸進者以爭道相踶之會折為五六良可懼以思也序棊房生直溫與豫二弟遊皆好學豫病其確也思所以休息之者得木局隆其中而規焉其下方以直置棊二十有四貴者半賤者半貴曰上賤曰下咸自第一至十二下者二乃敵一用朱墨以别焉房於是取二毫如其第書之既而抵戲者二人則視其賤者而賤之貴者而貴之其使之擊觸也必先賤者不得已而使貴者則皆栗焉惛焉亦鮮克以中其獲也得朱焉則若有餘得墨焉則若不足余諦睨之以思其始則皆類也房子一書之而輕重若是適近其手而先焉非能擇其善而朱否而墨之也然而上焉而上下焉而下貴焉而貴賤焉而賤其易彼而敬此遂以逺焉然則若世之所以貴賤人者有異房之貴賤兹棊者歟無亦近而先之耳有果能擇其善否者歟其敬而易者亦從而動心矣有敢議其善否者歟其得於貴者有不氣揚而志蕩者歟其得於賤者有不貌慢而心肆者歟其所謂貴者有敢輕而使之者歟所謂賤者有敢避其使之擊觸者歟彼朱而墨者相去千萬不啻有敢以二敵其一者歟余墨者徒也觀其始與末有似棊者故敘大小貴賤菀枯皆人之所名人名之而人實之於焉喜怒哀樂慮歎變慹姚佚啓態日夜相代於前而莫知其所萌如木出火以自焚誠觀其始與末必知其空且假也此宗元序棊説也雖然猶有進觀夫五行之氣實為星辰五行之質實生萬物昭顯著明盛大廣博莫之與京宜已若夫甲乙丙丁等云者乃文字耳大撓之所強名耳未名之前甲乙豈其木而丙丁豈其火耶既已名之實即隨之孤虛旺相剛日柔日之類聖人用之卜筮用之兵陳定天下之吉凶成天下之亹亹者亦復昭顯著明盛大廣博如是然則天下何名之不實哉知無實之不名可與入於機知無名之不實可與出於機入於機者堯舜事業如浮雲之過太虛也出於機者一出言而不可咈乎人心一舉足而不可違乎天則也伊尹五就桀贊有序伊尹五就桀或疑曰湯之仁聞且見矣桀之不仁聞且見矣夫胡去就之亟也柳子曰惡是吾所以見伊尹之大者也彼伊尹聖人也聖人出於天下不夏商其心心乎生民而已曰孰能由吾言由吾言者為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀桀果不可得反而從湯既而又思曰尚可十一乎使斯人蚤被其澤也又往就桀桀不可而又從湯以至於百一千一萬一卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人是吾所以見伊尹之大者也仁至於湯矣四去之不仁至於桀矣五就之大人之欲速其功如此不然湯桀之辨一恆人盡之矣又奚以憧憧聖人之足觀乎吾觀聖人之急生人莫若伊尹伊尹之大莫若於五就桀作伊尹五就桀贊聖有伊尹思德於民往歸湯之仁曰仁則仁矣非久不親退思其速之道宜夏是因就焉不可復反亳殷猶不忍其遲亟往以觀庶狂作聖一日勝殘至千萬冀一卒無其端五往不疲其心乃安遂升自陑黜桀尊湯遺民以完大人無形與道為偶道之為大為人父母大矣伊尹惟聖之首既得其仁猶病其久恆人所疑我之所大嗚呼逺哉志以為誨宗元與劉禹錫輩佐王叔文欲以收天下奄寺之兵柄而還之朝廷勇於立事不自顧藉貴重不知非所據而據焉身必危逮叔文輩敗天下以黨人目之而要其本志為帝室非為身家此昌黎輩所以始終與為友也此贊伊尹五就桀其意蓋謂茍可以膏澤下於民則桀尚可就况其未至於桀者於人何擇焉所以自解也雖然其亦不明於聖賢去就之正矣伊尹之就桀也湯之薦人於天子也四棄而四薦之湯之所為無慙德也尹之所為無枉尺也桀者天下之共主尹之就之又何疑焉豈若叔文輩當順宗之寢疾無所稟承鼠竊國命自相部署即使其能一旦盡復唐故所沒地舉藩鎮而空之猶為不得其正君子無取焉況乃謇淹留而無成哉梁丘據贊齊景有嬖曰梁丘子同君不爭古號媚士君悲亦悲君喜亦喜曷賢不贊卒贊於此媚豫所仇激贊有以梁丘之媚順心狎耳終不撓厥政不嫉反已晏子躬相梁丘不毁恣其為政政實允理時睹晏子食寡肉缺味愛其不飽告君使賜中心樂焉國用不墜後之嬖君罕或師是導君以諛聞正則忌讒賢叶惡民蠧國圮嗚呼豈惟賢不逮古嬖亦莫類梁丘可思又况晏氏激贊梁丘心焉孔瘁此亦激昂風世之論然如晏子相景公而景公煩於刑至於國之諸市屨賤踊貴則晏子之不得行其志而梁丘據輩之長君逢君多所閼塞而牽掣之者可知也嬖幸之與賢良豈真能並立於朝哉武岡銘元和七年四月黔巫東鄙蠻獠雜擾盜弄庫兵賊脅守帥南鉤牂牁外誘西原置魁立帥殺牲盟誓洞窟林麓嘯呼成羣皇帝下銅獸符發庸蜀荆漢南越東甌之師四面討問畏罪憑阻逃遁不即誅時惟潭部戎帥御史中丞柳公綽練立將校提卒五百屯於武岡不震不騫如山如林告天子威命明白信順亂人大恐視公之師如百萬視公之令如風雷怨號呻吟喜有攸訴投刃頓伏願完父子卒為忠信奉職輸賦進比華人無敢不龔母弟生壻繼來於潭咸致天廷皇帝休嘉式新厥命凶渠同惡革面向化如醉之醒如狂之寧公為藥石俾復其性詔書顯異進臨江漢益兵三倍為時碩臣殿於大邦文儒申申有此武功於是夷人始復聞公之去相與髙蹈涕呼若寒去裘昔公不夸首級為已能力専務教誨俾邦斯平我老洎幼由公之仁小不為虺蜮大不為鯨鯢恩重事特不邇而逺莫可追已願銘武岡首以慰我思以昭我類以示我子孫彌億萬年俾我奉國如今之誠鄰之我懷如公之勤其辭曰黔山之巑巫水之磻魚駭而離獸犯而殘户恐谷竄披攘仍亂王師來誅期死以緩公明不疑公信不欺援師定命俾邦克正皇仁天施我反其性我塗四闔公示之門我愚抵死公示之恩既骨而完既亡而存奉公之訓貽我子孫我始蝥賊由公而仁我始寇讎由公而親山畋澤獻輸賦於都陶穴刋木室我姻族烹牲是祀公受介福揲蓍以占公宜百祿皇懋公功陟於大邦逺哉去我誰嗣其良有穴之丹有犀之顛匪曰余固公不可賂祝鄰之德恆遵公則勗余之世永謹邦制南夷作詩刻示來裔不夸首級為已能力専務教誨俾邦斯平數語能簡括治蠻夷大要劍門銘惟蜀都重險多貨混同戎蠻人尨俗剽嗜為寇亂皇帝元年八月帥喪衆暴羣疑不制妖孽煽行怙恃富強滔天阻兵攻陷他部北包劍門憑負丘陵以張驁猛堅利鋒鏑以拒大順謂雷霆之誅莫已加也惟梁守臣禮部尚書嚴公以國害為私讐以天討為己任推仁仗信不待司死而人致其命立義抗憤不待喋血而士一其心悉師出次祗俟明詔凡諸侯之師必出於是儲峙饗賚取其豐穰乃遣前軍嚴秦奉揚王誅誕告南土十一月右師逾利州蹈寇地乘山斬虜以遏奔衝左師出於劍門大攘頑嚚諭引劫脅蟻潰鼠駭險無以固收奪利地以須王師刲刳腎腸振拔根柢俾無以肆毒用集我勳力鼖鼓一振元戎啓行取其渠魁以為大戮由公忠勇憤悱授任堅明謀猷宏長用能啓闢險厄夷為大塗衰沮害氣對乎天意帝用休嘉議功居首增秩師長進為大藩宅是南服將校羣吏願刋山石昭著公之功垂號無窮銘曰井絡坤垠時惟外區界山為門環於蜀都叢險積貨混并羌髳狂猾窺隙狺狺嘯呼憑據勢勝厚其凶徒皇帝之仁宥而不誅暴非德馴害及巴渝乃出王旅乃司列嶽牧臣司梁當其要束器備攸積糗糧是蓄人無增賦師以饒足喋血誓士玄機在握分命貔貅陳為掎角右逾岷山左直劍門攻出九地上披重雲攀天蹈空夷視阻艱破裂層壘殄殱羣頑內獲固圉外臨平原天兵徐驅卒乘嘽嘽大憝囚戮戎夏咸歡帝圖厥功惟梁是先開國進位南服於藩邦之清夷人以完安銘功鑒亂永代是觀張英曰詞既炳煥筆亦遒古夀州安豐縣孝門銘夀州刺史臣承思言九月丁亥安豐縣令臣某上所部編户氓李興父被惡疾歲月就亟興自刃股肉假託饋獻其父老病已不能噉啜宿而死興號呼撫臆口鼻垂血捧土就墳沾漬涕洟墳左作小廬蒙以苫次伏匿其中扶服頓踊晝夜哭訴孝誠幽逹神為見異廬上産紫芝白芝二本各長一寸廬中醴泉湧出竒形異狀應驗圖記此皆陛下孝理神化隂中其心而克致斯事謹案興氓庶賤陋循習淺下性非文字所導生與耨耒為業而能鍾彼醇孝超出古列天意神道猶錫瑞物以表殊異伏惟陛下有唐堯如天如神之德宜加旌褒合於上下請表其里閭刻石明白宣延風美觀示後祀永永無極臣昧死上請制曰可其銘云懿厥孝思兹惟淑靈稟承粹和篤守天經泣侍羸疾默禱隱冥引刃自嚮殘肌敗形羞膳奉進憂勞孝誠惟時髙髙曾不是聽創巨痛仍號於穹旻捧土濡涕頓首成墳陷膺腐背寒暑在廬草木悴死鳥獸踟蹰殊類異族亦相其哀肇有二位孝道爰興克修厥猷載籍是登在帝有虞以孝蒸蒸仲尼述經以教於曾惟昔魯侯見命夷宫亦有考叔寤莊稱純顯顯李氏實與之倫哀嗟道路涕慕里鄰邦伯章奏稽首殷勤上動帝心旁逹神明神錫祕祉三秀靈泉帝命薦加亦表其門統合上下交贊天人建此碑號億齡揚芬君子於喪毁不滅性故刳股刲肝國家不以旌雖然至性所發動於不自知人子當此茍有可以救其親者何所復恤實不暇更作較量雖於道未盡合不猶愈於好貨財私妻子者乎陋儒於室女之未嫁守節及人子之刳股救親者齗齗如也豈善善從長之意哉陳善曰栁子厚夀州安豐縣孝門銘自夀州刺史臣承思而下蓋序也以表為序亦文之一體也而徐鉉所編文粹乃録銘於前而於題下注云并夀州刺史表於銘後以附見焉此鉉之陋也髙唐神女賦自玉曰唯唯以前皆賦也而蕭統謂之序東坡嘗笑其陋若鉉者又何足笑之御選唐宋文醇卷十二
