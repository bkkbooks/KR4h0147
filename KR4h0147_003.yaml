body:
  text: 昌黎韓愈文三書答竇秀才書答尉遲生書上宰相書答崔立之書答李翊書與李翺書上張僕射書與崔羣書與衛中行書欽定四庫全書御選唐宋文醇卷三昌黎韓愈文三答竇秀才書愈白愈少駑怯於他藝能自度無可努力又不通時事而與世多齟齬念終無以樹立遂發憤篤專於文學學不得其術凡所辛苦而僅有之者皆符於空言而不適於實用又重以自廢是故學成而道益窮年老而智愈困今又以罪黜於朝廷逺宰蠻縣愁憂無聊瘴癘侵加喘喘焉無以冀朝夕足下年少才俊辭雅而氣鋭當朝廷求賢如不及之時當道者又皆良有司操數寸之管書盈尺之紙髙可以釣爵位循次而進亦不失萬一於甲科今乃乘不測之舟入無人之地以相從問文章為事身勤而事左辭重而請約非計之得也雖使古之君子積道藏德遁其光而不曜膠其口而不傳者遇足下之請懇懇猶將倒廩傾囷羅列而進也若愈之愚不肖又安敢有愛於左右哉顧足下之能足以自奮愈之所有如前所陳是以臨事愧恥而不敢答也錢財不足以賄左右之匱急文章不足以發足下之事業稛載而往垂橐而歸足下亮之而已朱子曰公以言事黜為陽山令故云逺宰蠻縣貞元二十年作也答尉遲生書愈白尉遲生足下夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不掩本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晰者無疑優遊者有餘體不備不可以為成人辭不足不可以為成文愈之所聞者如是有問於愈者亦以是對今吾子所為皆善矣謙謙然若不足而以徴於愈愈又敢有愛於言乎抑所能言者皆古之道古之道不足以取於今吾子何其愛之異也賢公卿大夫在上比肩始進之賢士在下比肩彼其得之必有以收之也子欲仕乎其往問焉皆可學也若獨有愛於是而非仕之謂則愈也嘗學之矣請繼今以言文之為文也以其體言之在易為離日月麗乎天百穀草木麗乎土天地之文也重明以麗乎正乃化成天下人之文也正也者善也善也者含於人心之明而麗於萬物之文者也以其用言之在易為賁宣人心之明而著萬物之文非文無以為也縱之橫之不知其幾千萬里也上之下之不知其幾千萬年也言語不通嗜欲不同同其文則五方可一家焉萬年可一念焉賁之功也雖然賁無飾也賁之六爻賁趾賁須皆言自然而不可強也皤如濡如戔戔白賁皆言貴乎其質而非貴乎其賁也致飾然後亨則盡矣孔子所戒也昌黎未嘗言易而深得乎易之義其云實之美惡其發也不掩可為探本窮源矣誠慎乎其實及其至也即仲尼所得統於文武周公而文在兹之文也其未至者雖曰有冽氿泉不可語海然與斷港絶潢固不同也上宰相書正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰百朋多之之辭也言君子既長育人材又當爵命之賜之厚祿以寵貴之云爾其卒章曰泛泛楊舟載沈載浮既見君子我心則休説者曰載載也沈浮者物也言君子之於人才無所不取若舟之於物浮沈皆載之云爾既見君子我心則休云者言若此則天下之心美之也君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材將非吾君與吾相乎孰能教育天下之英才將非吾君與吾相乎幸今天下無事小大之官各守其職錢穀甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之旨而成文抑邪與正辨時俗之所惑居窮守約亦時有感激怨懟竒怪之辭以求知於天下亦不悖於教化妖淫諛佞譸張之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畝之宫其可懷遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濵於死而益固得其所者爭笑之忽將棄其舊而新是圗求老農老圃而為師悼本志之變化中夜涕泗交頤雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣抑又聞古之君子相其君也一夫不獲其所若已推而內之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毁之是亦不獲其所矣伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰豫攸好德汝則錫之福之謂也抑又聞上之設官制祿必求其人而授之者非茍慕其才而富貴其身也蓋將用其能理不能用其明理不明者耳下之修已立誠必求其位而居之者非茍沒於利而榮於名也蓋將推已之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳茍以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也可進而進焉不必廉於自進也抑又聞上之化下得其道則勸賞不必遍加乎天下而天下從焉因人之所欲為而遂推之之謂也今天下不由吏部而仕進者幾希矣主上感傷山林之士有逸遺者屢詔內外之臣旁求於四海而其至者蓋闕焉豈其無人乎哉亦見國家不以非常之道禮之而不來耳彼之處隱就間者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉而方聞國家之仕進者必舉於州縣然後升於禮部吏部試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邊之畫不由是而稍進萬不有一得焉彼惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方枯稿沈溺魁閎寬通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣此所謂勸賞不必遍加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制祿之故以誘致山林逸遺之士庶天下之行道者知所歸焉小子不敢自幸其嘗所著文輒採其可者若干首録在異卷冀辱賜觀焉干黷尊嚴伏地待罪愈再拜唐時士子不恥自薦斯文固是昌黎少作然説詩義極湛深其道光王興賢育才之意甚明切宰相而能如是可謂舉職矣傳所為其自為謀也則過矣其為人謀則忠故不與他書並刪焉答崔立之書斯立足下僕見險不能止動不得時顛頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道德乃至手筆以問之攀援古昔辭義髙逺且進且勸足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也不能默默聊復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎己也及年二十時若家貧衣食不足謀於所親然後知仕之不唯為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩䇿等以相示僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕聞吏部有以博學宏辭選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月既已為之則欲有所成就書所謂恥過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進於是選必知其懷慙乃不自進而已耳設使與夫今之善進取者競於蒙昧之中僕必知其辱焉然彼五子者且使生於今之世其道雖不顯於天下其自負何如哉肯與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必俟工人之剖然後見知於天下雖兩刖足不為病且無使勍者再尅誠足下相勉之意厚也然仕進者豈捨此而無門哉足下謂我必待是而後進者尤非相悉之辭也僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也方今天下風俗尚有未及於古者邊境尚有被甲執兵者主上不得怡而宰相以為憂僕雖不賢亦且潛究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乘之若都不可得猶將耕於寬間之野釣於寂寞之濱求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅姦諛於既死發潛德之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再尅之刑信如何也士固信於知已微足下無以發吾之狂言愈再拜樊汝霖曰立之字斯立貞元四年進士唐進士禮部既登第後吏部試之中其程度然後命之官公貞元八年第進士至是三試吏部不售斯立以書勉之而公以書答之也答李翊書六月二十六日愈白李生足下生之書辭甚髙而其問何下而恭也能如是誰不欲告生以其道道德之歸也有日矣況其外之文乎抑愈所謂望孔子之門墻而不入於其宫者焉足以知是且非邪雖然不可不為生言之生所謂立言者是也生所為者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人邪將蘄至於古之立言者邪蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戛戛乎其難哉其觀於人不知其非笑之為非笑也如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黑分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其觀於人也笑之則以為喜譽之則以為憂以其猶有人之説者存也如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉雖然不可以不養也行之乎仁義之途遊之乎詩書之源無迷其途無絶其源終吾身而已矣氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器邪用與舍屬諸人君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後世法如是者其亦足樂乎其無足樂也有志乎古者希矣志乎古必遺乎今吾誠樂而悲之亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之愈白樊汝霖曰自三代以還陵夷至於江左斯文掃地唐興貞觀開元之盛終莫能起至貞元末而公出於是以六經之文為諸儒倡其觀於人也笑之則心以為喜者大聲不入於里耳而不笑不足以為道此公所以喜若人人皆見而説之而譽之斯亦淺矣此所以為憂李漢所謂時人始而驚中而笑且排先生益堅終而翕然隨以定者其此之謂歟王荆公乃云力去陳言夸末俗可憐無補費精神好詆之過也汨汨然來矣浩乎其沛然者皇甫持正諭業所云韓吏部之文如長江秋注千里一道老蘇上歐陽書亦云韓子之文如長江大河渾浩流轉者是也與李翺書使至辱足下書歡愧來並不容於心嗟乎子之言意皆是也僕雖巧説何能逃其責邪然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻劫衣服無所得養生之具無所有家纍僅三十口攜此將安所歸託乎捨之入京不可也挈之而行不可也足下將安以為我謀哉此一事耳足下謂我入京誠有所益乎僕之有子猶有不知者時人能知我哉持僕所守驅而使奔走伺候公卿間開口論議其安能有以合乎僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之如痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣所貴乎京師者不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎以僕遑遑於其中能上聞而下達乎其知我者固少知而相愛不相忌者又加少內無所資外無所從終安所為乎嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎自堯舜已來士有不遇者乎無也子獨安能使我潔清不汙而處其所可樂哉非不願為子之所云者力不足勢不便故也僕於此豈以為大相知乎纍纍隨行役役逐隊飢而食飽而嬉者也其所以止而不去者以其心誠有愛於僕也然所愛於我者少不知我者猶多吾豈樂於此乎哉將亦有所病而求息於此也嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳孔子稱顔回一簞食一瓢飲人不堪其憂回也不改其樂彼人者有聖者為之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦慎其所之哉離違久乍還侍左右當日歡喜故專使馳此候足下意并以自解愈再拜時昌黎在張僕射建封幕中翺以書勸其棄之走京師昌黎復書云云道其愁苦無聊不得已而就之之故也録此與後上張僕射書並讀知昌黎雖困乏其身行拂亂其所為至於如此而曽不以纎毫非義屈益以見其平日所云實之美惡其發不掩者誠篤論也至謂顔子有簞食瓢飲得以不死其樂也易今無簞食瓢飲將餓而死其樂也難則出於一時困苦之懷其言不可為典要不特顔子之樂固在生死之外且顔子屢空并簞食瓢飲而無之日又安見其未經也且昌黎雖自謂舍此而去則無簞食瓢飲而餓死而張建封令其晨入夜歸有楚王不設醴之意即直以書抵其視去此而餓死何嘗有一毫顧藉心哉讀者當師其意勿師其辭匪特不得以昌黎言疑顔子亦不得以昌黎言疑昌黎也上張僕射書九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事來示愈其中不可者有自九月至明年二月之終皆晨入夜歸非有疾病事故輒不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也抑而行之必發狂疾上無以承事於公忘其將所以報德者下無以自立喪失其所以為心夫如是則安得而不言凡執事之擇於愈者非為其能晨入夜歸也必將有以取之茍有以取之雖不晨入而夜歸其所取者猶在也下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不強使為是故為下者不獲罪於上為上者不得怨於下矣孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者聞命而奔走者好利者也直已而行道者好義者也未有好利而愛其君者未有好義而忘其君者今之王公大人惟執事可以聞此言惟愈於執事也可以此言進愈蒙幸於執事其所從舊矣若寬假之使不失其性加待之使足以為名寅而入盡辰而退申而入終酉而退率以為常亦不廢事天下之人聞執事之於愈如此也必皆曰執事之好士也如此執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚於故舊如此又將曰韓愈之識其所依歸也如此韓愈之不諂屈於富貴之人如此韓愈之賢能使其主待之以禮如此則死於執事之門無悔也若使隨行而入逐隊而趨言不敢盡其誠道有所屈於已天下之人聞執事之於愈如此皆曰執事之用韓愈哀其窮收之而己耳韓愈之事執事不以道利之而已耳茍如是雖日受千金之賜一嵗九遷其官感恩則有之矣將以稱於天下曰知已知已則未也伏惟哀其所不足矜其愚不録其罪察其辭而垂仁採納焉愈恐懼再拜姚令威集注曰建封字本立兖州人貞元四年為徐州刺史徐泗濠節度使十二年加檢校右僕射公以十五年二月脫汴州之亂依建封於徐秋建封辟為節度推官至是供職書意以晨入夜歸為不可其不諂屈於富貴之人可知矣與崔羣書自足下離東都凡兩度枉問尋承已達宣州主人仁賢同列皆君子雖抱羈旅之念亦且可以度日無入而不自得樂天知命者固前修之所以禦外物者也況足下度越此等百千輩豈以出處近逺纍其靈臺耶宣州雖稱清涼髙爽然皆大江之南風土不並以北將息之道當先理其心心間無事然後外患不入風氣所宜可以審備小小者亦當自不至矣足下之賢雖在窮約猶能不改其樂況地至近官榮祿厚親愛盡在左右者耶所以如此云云者以為足下賢者宜在上位託於幕府則不為得其所是以及之乃相親重之道耳非所以待足下者也僕自少至今從事於往還朋友間一十七年矣日月不為不久所與交往相識者千百人非不多其相與如骨肉兄弟者亦且不少或以事同或以藝取或慕其一善或以其久故或初不甚知而與之已密其後無大惡因不復決捨或其人雖不皆入於善而於已已厚雖欲悔之不可凡諸淺者固不足道深者止如此至於心所仰服考之言行而無瑕尤窺之閫奧而不見畛域明白淳粹輝光日新者惟吾崔君一人僕愚陋無所知曉然聖人之書無所不讀其精粗巨細出入明晦雖不盡識抑不可謂不涉其流者也以此而推之以此而度之誠知足下出羣拔萃無謂僕何從而得之也與足下情義寧須言而后自明邪所以言者懼足下以為吾所與深者多不置白黑於胸中耳既謂能粗知足下而復懼足下之不我知亦過也比亦有人説足下誠盡善盡美抑猶有可疑者僕謂之曰何疑疑者曰君子當有所好惡好惡不可不明如清河者人無賢愚無不説其善伏其為人以是而疑之耳僕應之曰鳳皇芝草賢愚皆以為美瑞青天白日奴𨽻亦知其清明譬之食物至於遐方異味則有嗜者有不嗜者至於稻也粱也膾也炙也豈聞有不嗜者哉疑者乃解解不解於吾崔君無所損益也自古賢者少不肖者多自省事已來又見賢者恆不遇不賢者比肩青紫賢者恆無以自存不賢者志滿氣得賢者雖得卑位則旋而死不賢者或至眉夀不知造物者意竟何如無乃所好惡與人異心哉又不知無乃都不省記任其死生夀夭邪未可知也人固有薄卿相之官千乘之位而甘陋巷菜羮者同是人也猶有好惡如此之異者況天之與人當必異其所好惡無疑也合於天而乖於人何害況又時有兼得者邪崔君崔君無怠無怠僕無以自全活者從一官於此轉困窮甚思自放於伊潁之上當亦終得之近者尤衰憊左車第二牙無故動搖脫去目視昏花尋常間便不分人顔色兩鬢半白頭髮五分亦白其一鬚亦有一莖兩莖白者僕家不幸諸父諸兄皆康強早世如僕者又可以圗於久長哉以此忽忽思與足下相見一道其懷小兒女滿前能不顧念足下何由得歸北來僕不樂江南官滿便終老嵩下足下可相就僕不可去矣珍重自愛慎飲食少思慮惟此之望愈再拜此篇與與衛中行書皆昌黎見道之言讀者所宜深玩其謂造物者好惡與人異心又謂都不省記極似栁州天説而相去千里蓋彼正言以為天固然此則抑揚其詞以申其合天之義非正言也易曰先天而天弗違後天而奉天時凡現今之窮通得喪夀夭皆後天也其所以窮通得喪夀夭如此者有先之者焉非今之所得而預也若其介福於方來垂光於後世則皆現今之出言制行為之先既有以為之先則天勿能違也天時者天理也言理則未必其皆時言時未有不造極乎理者猶之言正則未必其皆中言中則未有不造極乎正者也奉天時則合天矣合乎天而窮也喪也天也是其有先焉者之不可知非今合天之所招也合乎天而通也得也夀也亦其先焉者之不可知而無礙乎今合天之所兼得也由後而視今則今固為先焉者矣社稷之子或在畎畝畎畝之人或在社稷然而在畎畝者又或以基德在社稷者又或以基亂後者見其然而不知曩之然則曰天之好惡與人異心又曰無乃都不省記不知天無心亦無省記唯弗違乎其先焉者而已必以心語天則理乃天之心奉天時則合天之心誠奉天時則窮通得喪夀夭皆非其好惡之所存矣人心尚非所存而謂天之心存乎哉無妄曰不耕穫不災畬耕者必穫然當其耕時無可穫也災者必畬然當其災時無所為畬也責穫與畬於耕且災之時而謂地之好惡與人異心抑或都不省記豈非惑歟良農耕耳災耳寧有疑地之無穫與不成畬而釋耒者哉昌黎之言截斷先後專責現今之合天與否誠達於天道篤行君子也與衛中行書大受足下辱書為賜甚大然所稱道過盛豈所謂誘之而欲其至於是歟不敢當不敢當其中擇其一二近似者而竊取之則於交友忠而不反於背靣者少似近焉亦其心之所好耳行之不倦則未敢自謂能爾也不敢當不敢當至於汲汲於富貴以救世為事者皆聖賢之事業知其智能謀力能任者也如愈者又焉能之始相識時方甚貧衣食於人其後相見於汴徐二州僕皆為之從事日月有所入比之前時豐約百倍足下視吾飲食衣服亦有異乎然則僕之心或不為此汲汲也其所不忘於仕進者亦將小行乎其志耳此未易遽言也凡禍福吉凶之來似不在我惟君子得禍為不幸而小人得禍為恆君子得福為恆而小人得福為幸以其所為似有以取之也必曰君子則吉小人則凶者不可也賢不肖存乎已貴與賤禍與福存乎天名聲之善惡存乎人存乎已者吾將勉之存乎天存乎人者吾將任彼而不用吾力焉其所守者豈不約而易行哉足下曰命之窮通自我為之吾恐未合於道足下徴前世而言之則知矣若曰以道德為己任窮通之來不接吾心則可也窮居荒涼草樹茂密出無驢馬因與人絶一室之內有以自娛足下喜吾復脫禍亂不當安安而居遲遲而來也石大任曰韓愈謂貴與賤禍與福存乎天以豫觀之貴與賤存乎天可也禍與福存乎天則不可也蓋禍與福在已而己孟子曰禍福無不自己求之者斯言也不特未達昌黎之旨蓋亦未達孟子之旨也孔子曰夫言豈一端而已夫各有所當也善不積不足以成名惡不積不足以滅身積善之家必有餘慶積不善之家必有餘殃是故靡言不酬靡德不報基德十五世而周以興基禍十五世而周以廢要其歸極而言之非天也非人也已也孟子之言信善矣雖然唯髙世逺覽之士乃有以知其信善耳否則齟齬不合者又豈鮮哉德莫盛於孔子畏於匡厄於陳蔡伐檀於宋不謂之禍可乎孰求之乎惡莫過於盜跖日殺不辜甘人之肉竟以夀終於東陵之上不謂之福可乎孰求之乎至若依古以來國之蠧民之蟊賊席寵怙侈取精多而用物宏而死於牖下或蹈白刃犯危難以明君臣之義父子之倫而毒苦備嬰見聞流涕史册所載不可勝屈指也倘所謂禍福自已求之者是耶非耶昌黎曰賢不肖存乎已貴與賤禍與福存乎天未已也不特禍與福與已無與也又曰名聲之善惡存乎人而亦與已無與也其所以責賢不肖之存乎已者不亦潔淨而精微哉若是者其與孟子同乎否乎是中庸尚絅之心也論語為已之義也倘必與孟子同也賢者自賢不以禍而損其賢不肖者自不肖不以福而損其不肖又况福莫大於天下後世皆曰賢禍莫大於天下後世皆曰不肖世俗之所謂禍福又何足論哉雖然善積而餘慶惡積而餘殃世俗所為禍福者必兼舉之特或代異時移茫昧而不可考又或迹秦心粵潛隱而不可辨耳禍福無不自己求之果信也而謂目前之禍福存乎己則非也由斯以談昌黎謂窮通之來不接吾心豈不約而易行哉安在其為與孟子刺謬也抑又論之孟子之言言有國家者宜修政刑於平日也昌黎之言言人之行已止當自問其為賢為不肖而不必問禍福也政刑修則國家福政刑隳則國家禍皆自己求也賢者不皆福不肖者不皆禍不存乎己也文各自明不煩牽合誠以昌黎之心行孟子之言左盾而右矛各得其用也乃必以孟子之矛刺昌黎之盾夫矛之設豈為刺已之盾而然哉以文害辭以辭害志孟子之所惡也御選唐宋文醇卷三
