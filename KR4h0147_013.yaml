body:
  text: 河東栁宗元文三書與劉禹錫論周易九六說書答元饒州論春秋書答元饒州論政理書與友人論文書與吕恭書答韋中立論師道書答嚴厚輿論師道書報袁君陳秀才避師名書欽定四庫全書御選唐宋文醇巻十三河東柳宗元文三與劉禹錫論周易九六説書見與董生論周易九六義取老而變以為畢中和承一行僧得此説異孔穎達䟽而以為新竒彼畢子董子何膚末於學而遽云云也都不知一行僧承韓氏孔氏説而果以為新竒不亦可笑矣哉韓氏注乾之策二百一十有六曰乾一爻三十有六策則是取其過揲四分而九也坤之策一百四十有四曰坤一爻二十四策則是取其過揲四分而六也孔穎達等作正義論云九六有二義其一者曰陽得兼隂隂不得兼陽其二者曰老陽數九老隂數六二者皆變周易以變者占鄭𤣥注易亦稱以變者占故云九六也所以老陽九老隂六者九過揲得老陽六過揲得老隂此具在正義乾篇中周簡子之説亦若此而又詳備何畢子董子之不眎其書而妄以口承之也君子之學將有以異也必先究窮其書究窮而不得焉乃可以立而正也今二子尚未能讀韓氏注孔氏正義是見其道聽途説者又何能知所謂易者哉足下取二家言觀之則見畢子董子膚末於學而遽云云也足下所為書非元凱兼三易者則諾若曰孰與穎達著則此説乃穎達説也非一行僧畢子董子能有異者也無乃即其謬而承之者歟觀足下出入筮數考校左氏今之世罕有如足下求易之悉者也然務先窮昔人書有不可者而後革之則大善謹之勿遽宗元白或問孔頴達等所述九六二義何說為是曰當以第二說為正第一說曰乾體有三畫坤體有六畫陽得兼隂故其數九隂不得兼陽故其數六若然者是以陽三畫兼隂六畫而為九也是說也所以著陽大隂小崇陽抑隂之義猶曰臣者君之臣婦者夫之婦義得兼之故畫三而六在其中云爾然返以觀夫隂爻則其義有未盡善者隂不得兼陽故其數六則是止以本體之六畫為六也夫隂必從乎陽從乎陽則隂亦陽矣如謂此六者在陽之外則是與陽為敵矣從乎陽者隂之吉徳也敵乎陽者隂之凶徳也聖人作易不應偏舉凶徳以垂訓且使果然則凡爻之逢六者並應凶咎安得復多吉爻也夫坤一畫乃是夾畫一乾畫不得謂中虗之處無義也其虗處正所以眀夫陽之行乎其中今夫地皆天之所貫徹而旁敷無一毫釐許之非天者也使有一毫釐許為天所不到之處則蕩為㣲塵鄰虛入於莽蒼杳㝠而亡其地之體矣地之體亡則轉成太虚而亦天矣然則安得有一毫釐許無天之地哉人之身地也隂也人之心天也陽也人惟不能卑法地以治身而耳目口鼻四肢百骸各逞其欲以奪天君之性故其心之神明不能崇效夫天夫心固宰乎耳目口鼻四肢百骸者也然耳目口鼻四肢百骸又何一之非心哉謂耳目口鼻四肢百骸不得兼心固不可也推而論之臣之體國皆君之國婦之承家皆夫之家陽固以兼隂而成其陽之大隂則正以無適而非陽且不得名為兼陽而益見其隂之小唯其小之入於無故足以配大之靡不有此隂陽之大義也然則坤六畫其虚處即乾三畫乾則有處為三無處為六坤則有處為六無處為三夫數自一至九乾坤固皆備之不得如孔氏第一說以當九六之義也第二說曰老陽數九老隂數六老陽老隂皆變周易以變者為占又曰所以老陽數九老隂數六者以揲蓍之數九過揲則得老陽六過揲則得老隂其少陽稱七少隂稱八義亦凖此鄭康成亦同此說後世不復見康成之注而孔頴達所作正義未為詳備故歐陽修申之曰乾爻七九坤爻八六九六變而七八無為易道占其變故以其所占者名爻不謂六爻皆九六也及其至也七八常多而九六常少有无九六者焉此不可不釋也朱子曰用九須從歐公說然則朱子亦未曉然於歐陽之即鄭孔也顧未知宗元所云周簡子之說亦若此而又詳備者果若何惜不可考也但歐陽只云乾爻七九坤爻八六而未申明其故則仍似用九用六止為乾坤二卦發者於是惟以羣龍无首為乾卦之坤利永貞為坤卦之乾而朱子所稱通例者亦不著焉夫飛潛動植有知無知萬有不齊之倫其虚處皆天其實處皆地語其性情其虚而為天者皆乾其實而為地者皆坤舉其至大而足以綱領乎萬有不齊之倫者則為雷風水火山澤六子六子非他也乾坤也震坎艮則一乾而二坤巽離兊則二乾而一坤云爾故曰乾坤其易之門耶乾陽物也坤隂物也是故三百八十四爻非乾爻即坤爻而不得謂之震爻巽爻坎離艮兊爻者也曰乾爻則非七爻即九爻曰坤爻則非八爻即六爻七八不變變則占故曰用九用六而獨著其義於乾坤之卦也何以不變則不占也曰天地之心在動處以人身喻之動於色則心在目動於聲則心在耳當其在目也則全體皆色焉當其在耳也則全體皆聲焉其不動之處皆受動者之所改移故以變者占若六爻皆不變則本卦全體皆現也其用奈何曰乾之徳以不為首為義坤之徳以大終為義乾不為首即陽而之乎隂也坤以大終即是隂而之乎陽也陽不能之乎隂則亢隂不能之乎陽則凝亢也凝也則不能易不能易則不能生生不能生生則非天地之心矣故凡陽也而九則之乎隂矣其徳若何曰見羣龍无首隂也而六則之乎陽矣其徳若何曰利永貞凡六十四卦之陽爻隂爻皆然而特附之乾坤二卦以見三百八十四爻之皆乾爻坤爻也此九六之義也答元饒州論春秋書辱復書教以報張生書及答衢州書言春秋此誠世所希聞兄之學為不負孔氏矣往年曾記裴封叔宅聞兄與裴太常言晉人及姜戎敗秦師於殽一義甞諷習之又聞韓宣英及亡友吕和叔輩言他義知春秋之道乆隠而近乃出焉京中於韓安平處始得㣲指和叔處始見集註恒願掃於陸先生之門及先生為給事中與宗元入尚書同日居又與先生同巷始得執弟子禮未畢講討㑹先生病時聞要論嘗以易教誨見寵不幸先生疾彌甚宗元又出邵州乃大乖謬不克卒業復於亡友凌生處盡得宗指辨疑集註等一通伏而讀之於紀侯大去其國見聖人之道與堯舜合不唯文王周公之志獨取其法耳於夫人姜氏㑹齊侯於禚見聖人立孝經之大端所以明其分也於楚人殺陳夏徴舒丁亥楚子入陳納公孫寧儀行父於陳見聖人褒貶與奪唯當之所在所謂瑕瑜不掩也反覆甚喜若吾生前距此數十年則不得是學矣今適後之不為不遇也兄書中所陳皆孔氏大趣無得踰焉其言書荀息貶立卓之意也頃嘗怪荀息奉君之邪心以立嬖子不務正義弃重耳於外而専其寵孔子同於仇牧孔父為之辭今兄言貶息大善息固當貶也然則春秋與仇孔辭不異仇孔亦有貶歟宗元嘗著非國語六十餘篇其一篇為息發也今録以往可如愚之所謂者乎微指中眀鄭人來渝平量力而退告而後絶固先同後異者也今檢此前無與鄭同之文後無與鄭異之據獨疑此一義理甚精而事有不合兄亦當指而教焉往年又聞和叔言兄論楚商臣一義雖啖趙陸氏皆所未及請具錄當䟽微指下以傳末學蕭張前書亦請見及至之日勒為一巻以垂將來宗元始至是州作陸先生墓表今以奉獻與宣英讀之春秋之道如日月不可贊也若贊焉必同於孔跖優劣之說故直舉其一二不宣宗元再拜宗元與楊憑書曰自貶官來無事讀百家上下馳騁乃少得知文章利病葢實録也今觀此文其勤學好問惓惓之意溢於毫楮可尚也夫答元饒州論政理書奉書辱示以政理之說及劉夢得書往復甚善類非今之長人者之志不惟充賦稅養禄秩足已而已獨以庶富且教為大任甚盛甚盛孔子曰吾與回言終日不違如愚然則蒙者固難曉必勞申諭乃得悅服用是尚有一疑焉兄所言免貧病者而不益富者税此誠當也乗理政之後固非若此不可不幸乗弊政之後其可爾耶夫弊政之大莫若賄賂行而征賦亂茍然則貧者無貲以求於吏所謂有貧之實而不得貧之名富者操其贏以市於吏則無富之名而有富之實貧者愈困餓死亡而莫之省富者愈恣横侈泰而無所忌兄若所遇如是則將信其故乎是不可懼撓人而終不問也固必問其實問其實則貧者固免而富者固增賦矣安得持一定之論哉若曰止免貧者而富者不問則僥倖者衆皆挾重利以邀貧者猶若不免焉若曰檢富者懼不得實而不可増焉則貧者亦不得實不可免矣若皆得實而故縱以為不均何哉孔子曰不患寡而患不均不患貧而患不安今富者稅益少貧者不免於捃拾以輸縣官其為不均大矣非唯此而已必將服役而奴使之多與之田而取其半或乃出其一而收其二三主上思人之勞苦或減除其税則富者以户獨免而貧者以受役卒輸其二三與半焉是澤不下流而人無所告訴其為不安亦大矣夫如是不一定經界覈名實而姑重改作其可理矣乎富室貧之母也誠不可破壞然使其大倖而役於下則又不可兄云懼富人流為工商浮窳蓋甚急而不均則有此耳若富者雖益賦而其實輸當其十一猶足安其堵雖驅之不肯易也檢之逾精則下逾巧誠如兄之言管子亦不欲以民産為征故有殺畜伐木之説今若非市井之征則捨其産而唯丁田之問推以誠質示以恩惠嚴責吏以法如所陳一社一村之制遞以信相考安有不得其實不得其實則一社一村之制亦不可行矣是故乗弊政必須一定制而後兄之説乃得行焉䝉之所見及此而已永州以僻隅少知人事兄之所代者誰耶理歟弊歟理則其説行矣若其弊也蒙之説其在可用之數乎因南人來重曉之其他皆善愚不足以議願同夢得之云者兄通春秋取聖人大中之法以為理饒之理小也不足費其慮無所論刺故獨舉均賦之事以求往復而除其惑焉不習吏職而强言之宜為長者所笑弄然不如是則無以來至當之言蓋明而教之君子所以開後學也又聞兄之莅政三日舉韓宣英以代已宣英達識多聞而習於事宜當賢者類舉今負罪屛棄凡人不敢稱道其善又况聞於大君以二千石薦之哉是乃希世㧞俗果於直道斯古人之所難而兄行之宗元與宣英同罪皆世所背馳者也兄一舉而徳皆及焉祁大夫不見叔向今而預知斯舉下走之大過矣書雖多言不足導意故止於此不宣宗元再拜舊唐書謂南人妄以栁宗元為羅池神而韓愈撰碑以實之宋元祐七年六月詔賜唐栁州刺史羅池神廟為靈文之廟以郡人言其雨暘應時故也田表聖書其碑隂極言宗元宜為神而舊唐書辨之之非今觀此文所論其於人情物理洞達周圓一絲不隔然則宗元實能臣其有徳於栁民實厚心既豈弟而才又足以達之死而為靈以食其土不虚也與友人論文書古今號文章為難足下知其所以難乎非謂比興之不足恢拓之不逺鑽礪之不工頗纇之不除也得之為難知之愈難耳茍或得其髙朗探其深賾雖有蕪敗則為日月之蝕也大圭之瑕也曷足傷其明黜其寳哉且自孔氏以來兹道大闡家修人勵刓精竭慮者㡬千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲爭裂綺繡互攀日月髙視於萬物之中雄峙於百代之下乎率皆縱臾而不克躑躅而不進力蹙勢窮吞志而没故曰得之為難嗟乎道之顯晦幸不幸繫焉談之辨訥升降繫焉鑒之頗正好惡繫焉交之廣狹屈伸繫焉則彼卓然自得以奮其間者合乎否乎是未可知也而又榮古虐今者比肩疊跡大抵生則不遇死而垂聲者衆焉揚雄没而法言大興馬遷生而史記未振彼之二才且猶若是况乎未甚聞著者哉固有文不傳於後祀聲遂絶於天下者矣故曰知之愈難而為文之士亦多漁獵前作戕賊文史抉其意抽其華置齒牙間遇事蠭起金聲玉耀誰聾瞽之人徼一時之聲雖終淪棄而其奪朱亂雅為害已甚是其所以難也間聞足下欲觀僕文章退發囊笥編其蕪穢心悸氣動交於胸中未知孰勝故乆滯而不往也今往僕所著賦頌碑碣文記議論書序之文凡四十八篇合為一通想令治書蒼頭吟諷之也擊轅拊缶必有所擇顧鑒視何如耳還以一字示褒貶焉孔子曰不知言無以知人也臯陶曰知人則哲惟帝其難之夫以人之難知如此而有時止可求諸語言文字之間則知人為益難也知人必藉於知言而當去聖既逺羣言淆亂無所折衷則知言為尤難也加以羣儒相承講貫論說文成數萬任人漁獵不難金聲玉耀則知言益尤難也雖然學操縵而安弦則宫商有舛不能逃其聴誠學以聚之問以辨之寛以居之仁以行之有所自得於中則夫言之至吾前者其誠偽與邪正必將自告焉而言又必可以知也能知言庶幾知人矣顧其所為自得者則不可以襲取而偽為也與吕恭書宗元白元生至得弟書甚善諸所稱道具之元生又持部中廬父墓者所得石書模其文示余云若將聞於上余故恐而疑焉僕早好觀古書家所蓄晉魏時尺牘甚具又二十年來徧觀長安貴人好事者所蓄殆無遺焉以是善知書雖未嘗見名氏亦望而識其時也又文章之形狀古今特異弟之精敏通逹夫豈不究於此今視石文署其年曰永嘉其書則今田野人所作也雖支離其字尤不能近古為其永字等頗效王氏變法皆永嘉所未有辭尤鄙近若今所謂律詩者晉時蓋未嘗為此聲大謬妄矣又言植松烏擢之怪而掘其土得石尤不經難信或者得無姦為之乎且古之言葬者藏也壤樹之而君子以為議况廬而居者其足尚之哉聖人有制度有法令過則為辟故立大中者不尚異教人者欲其誠是故惡夫飾且偽也過制而不除喪宜廬於庭而矯於墓者大中之罪人也况又出怪物詭神道以奸大法而因以為利乎夫偽孝以奸利誠仁者不忍擿過恐傷於教也然使偽可為而利可冒則教益壞若然者勿與知焉可也伏而不出之可也以大夫之政良而吾子贊焉固無闕遺矣作東郛改市鄽去比竹茨草之室而垍土大木陶甄梓匠之工備孽火不得作化惰窳之俗絶偷浮之源而條桑浴種深耕易耨之力用寛徭嗇貨均賦之政起其道美矣於斯也慮善善之過而莫之省誠慤之道少損故敢私言之夫以淮濟之清有玷焉若秋毫固不為病然而萬一離婁子眇然睨之不若無者之快也想默已其事毋出所置書幸甚廟以妥神墓以安魄古人祀先於廟而不於墓檀弓曰孔子既得合葬於防封之崇四尺孔子先反門人後然則孔子固未嘗廬墓矣唯子貢廬於孔子墓側三年而漢世遂以廬墓為孝夫孔子之聖孝之至也孔子不廬墓而後之人之孝乃過於孔子夫過於孔子之孝必非孝也葢天者理也地者質也理處於虚而至實質滯於實而本虚人當魂升魄降之日雖已分天分地然猶謂其未久而或恐魂氣之猶戀其體魄也故自踰月以至七月以為塟期之等殺焉迨其既塟則體魄全歸於地而神魂全歸於天矣於是奉祀之於廟而終其身以迨於子孫如在其上如在其左右是則所為死而不亡者也若夫膚體之塟於土與裳衣之藏於廟寢雖有親疎之不同然而類也主神魂而不主體魄猶之一家之中主父而不主母主夫而不主妻也是人道之大綱豈細故哉若其舍廟而之墓則將奉主以往乎抑將别立一主乎奉主以往則使死者不得從其祖先於廟而下徇子孫非禮之請不得居宫室之安而徘徊於草露之間也别立一主則於彼於此必有一之不屬一之不屬則其所為一實者虚而誠者妄非孝敬之至也然則子貢之廬墓奈何曰子貢孔子弟子也其不得祀孔子於孔子之廟明矣其亦不得祀孔子於端木氏之廟明矣使當日之宗孔子如今日天下之宗孔子則子貢必廬於學而必不廬於墓亦可斷也子貢不能忘孔子之教澤而有築室於場獨居三年之事無於禮者之禮也唯子貢於孔子則可固千百世所不得舉以為例者也其時固不聞子思亦來居於孔子之墓也且所謂三年然後歸者亦舉其成數耳此三年中子貢之必歸祀端木氏之先於廟不待言也而後世遂因之有廬墓之禮則漢儒之不達也宗元謂宜廬於庭而矯於墓者大中之罪人識亦卓矣答韋中立論師道書二十一日宗元白辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京師來蠻夷間乃幸見取僕自卜固無取假令有取亦不敢為人師為衆人師且不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉氏以下人益不事師今之世不聞有師有輙譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顔而為師世果羣怪聚罵指目牽引而増與為言詞愈以是得狂名居長安炊不暇熟又挈挈而東如是者數矣屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南恒雨少日日出則犬吠余以為過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州數州之犬皆蒼黄吠噬狂走者累日至無雪乃已然後始信前所聞者今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢衒怪於羣目以召閙取怒乎僕自謫過以來益少志慮居南中九年増脚氣病漸不喜閙豈可使呶呶者早暮咈吾耳騷吾心則固僵仆煩憒愈不可過矣平居望外遭齒舌不少獨欠為人師耳抑又聞之古者重冠禮將以責成人之道是聖人所尤用心者也數百年來人不復行近有孫昌𦙍者獨發憤行之既成禮明日造朝至外廷薦笏言於卿士曰某子冠畢應之者咸憮然京兆尹鄭叔則怫然曳笏却立曰何預我耶廷中皆大笑天下不以非鄭尹而快孫子何哉獨為所不為也今之命師者大類此吾子行厚而辭深凡所作皆恢恢然有古人形貌雖僕敢為師亦何所増加也假而以僕年先吾子聞道著書之日不後誠欲往來言所聞則僕固願悉陳中所得者吾子茍自擇之取某事去某事則可矣若定是非以教吾子僕材不足而又畏前所陳者其為不敢也决矣吾子前所欲見吾文既悉以陳之非以耀明於子聊欲以觀子氣色誠好惡何如也今書來言者皆大過吾子誠非佞譽誣諛之徒直見愛甚故然耳始吾幼且少為文章以辭為工及長乃知文者以明道是固不茍為炳炳烺烺務采色夸聲音而以為能也凡吾所陳皆自謂近道而不知道之果近乎逺乎吾子好道而可吾文或者其於道不逺矣故吾毎為文章未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昏氣出之懼其昧没而雜也未嘗敢以矜氣作之懼其偃蹇而驕也抑之欲其奥揚之欲其明疏之欲其通廉之欲其節激而發之欲其清固而存之欲其重此吾所以羽翼夫道也本之書以求其質本之詩以求其恒本之禮以求其宜本之春秋以求其斷本之易以求其動此吾所以取道之原也參之穀梁氏以厲其氣參之孟荀以暢其支參之荘老以肆其端參之國語以博其趣參之離騷以致其幽參之太史以著其潔此吾所以旁推交通而以為之文也凡若此者果是耶非耶有取乎抑其無取乎吾子幸觀焉擇焉有餘以告焉茍亟來以廣是道子不有得焉則我得矣又何以師云爾哉取其實而去其名無招越蜀吠怪而為外廷所笑則幸矣宗元復白茅坤曰子厚書中所論文章之法猶未敢必其盡能如所云要之亦本於鑱心研神者而後之為文者特路剽富者之金而以誇於天下曰吾且猗頓矣何其不自量之甚也答嚴厚輿論師道書二十五日某白馮翊嚴生足下得生書言為師之說怪僕所作師友箴與答韋中立書欲變僕不為師之志而屈已為弟子凡僕所為二文其卒果不異僕之所避者名也所憂者其實也實不可一日忘僕聊歌以為箴行且求中以益已慄慄不敢暇又不敢自謂有可師乎人者耳若乃名者方為薄世笑罵僕脆怯尤不足當也内不足為外不足當衆口雖懇懇見迫其若吾子何實之要二文中皆是也吾子其詳讀之僕見解不出此吾子所云仲尼之説豈易耶仲尼可學不可為也學之至斯則仲尼矣未至而欲行仲尼之事若宋襄公好霸而敗國卒中矢而死仲尼豈易言耶馬融鄭𤣥者二子獨章句師耳今世固不少章句師僕幸非其人吾子欲之其有樂而望吾子者矣言道講古窮文辭以為師則固吾屬事僕才能勇敢不如韓退之故又不為人師人之所見有同異吾子無以韓責我若曰僕拒千百人又非也僕之所拒拒為師弟子名而不取當其禮者也若言道講古窮文辭有來問我者吾豈嘗瞋目閉口耶敬叔吾所信愛今不得見其人又不敢廢其言吾子文甚暢逺恢恢乎其闢大路將疾馳也攻其車肥其馬長其筴調其六轡中道之行大都捨是又奚師歟亟謀於知道者而考諸古師不乏矣幸而亟來終日與吾子言不敢倦不敢愛不敢肆茍去其名全其實以其餘易其不足亦可交以為師矣如此無世俗累而有益乎已古今未有好道而避是者宗元白答韋中立書人所膾炙遂謂宗元與韓愈意見不侔且有謂學者歸退之不歸子厚而子厚云爾者讀此文可以解其惑矣報袁君陳秀才避師名書秀才足下僕避師名乆矣往在京師後學之士到僕門日或數十人僕不敢虛其來意有長必岀之有不至必惎之其教也雖若是當時無師弟子之說其所不樂為者非以師為非弟子為罪也有兩事故不能自視以為不足為一也世乆無師弟子决為之且見非且見罪懼而不為二也其大説具答韋中立書今以往可觀之秀才貌甚堅辭甚强僕自始覿固竒秀才及見兩文愈益竒雖在京都日數十人到門者誰出秀才右耶前已必秀才可為成人僕之心固虚矣又何鯤鵬互鄉於尺牘哉秋風益髙暑氣益衰可偶居卒談秀才時見咨僕有諸内者不敢愛惜大都文以行為本在先誠其中其外者當先讀六經次論語孟軻書皆經言左氏國語莊周屈原之辭稍采取之穀梁子太史公甚峻潔可以出入餘書俟文成異日討也其歸在不出孔子此其古人賢士所懔懔者求孔子之道不於異書秀才志於道慎勿怪勿雜勿務速顯道茍成則勃然爾久則蔚然爾源而流者歲旱不涸蓄穀者不病凶年蓄珠玉者不虞殍死矣然則成而久者其術可見雖孔子在為秀才計未必過此不具宗元白宗元論文諸篇中唯答韋中立書最為人所膾炙謂可與韓愈答李翺書並馳不知此篇所言文以行為本在先誠其中二語及報崔黯書云道之及及乎物而已耳斯取道之内者二語乃宗元自得之言而為論文之極詣也若韋中立書中本之書以求其質本之詩以求其恒等句却猶有罅漏質也恒也寧盡詩書之緼耶御選唐宋文醇巻十三
