body:
  text: 隴西李翺文一賦雜著幽懐賦復性書上復性書中復性書下陸歙州述髙愍女碑楊烈婦傳欽定四庫全書御選唐宋文醇巻十九隴西李翺文一幽懐賦朋友有相歎者賦幽懐以答之其辭曰衆囂囂而雜處兮咸嗟老而羞卑視予心之不然兮慮行道之猶非儻中懐之自得兮終老死其何悲昔孔門之多賢兮惟回也為庶幾超羣情以獨去兮指聖域而髙追固簞食與瓢飲兮寜服輕而駕肥望若人其何如兮慙吾徳之纖微躬不田而飽食兮妻不織而豐衣援聖賢而比度兮何僥倖之能希念所懐之未展兮非悼已而陳私自祿山之始兵兮嵗周甲而未夷何神堯之郡縣兮乃家傳而自持税生人而育卒兮列髙城以相維何兹世之可久兮宜永念而遐思有三苗之逆命兮舞干羽以來之惟刑徳之既修兮無逺邇而咸歸當髙祖之初起兮提一旅之羸師能順天而用衆兮竟掃冦而戡隋況天子之神明兮有烈祖之前規剗弊政而還本兮如反掌之易為茍廟堂之治得兮何下邑之能違哀予生之賤逺兮包深懐而告誰嗟此誠之不達兮惜此道而無遺獨中夜以潛歎兮匪吾憂之所宜歐陽修曰予始讀翺復性書三篇曰此中庸之義疏爾智者識其性當復中庸愚者雖讀此不曉也不作可焉又讀與韓侍郎薦賢書以為翺特窮時憤世無薦已者故丁寜如此使其得志亦未必然以翺為秦漢間好俠行義之一豪雋亦善論人者也最後讀幽懐賦然後置書而歎歎已復讀不自休恨翺不生於今而得與之交又恨予不得生翺時與翺上下其論也況迺翺一時人有道而能文者莫若韓愈愈嘗有賦矣不過羨二鳥之光榮歎一飽之無時爾推是心使光榮而飽則不復云矣若翺獨不然其賦曰衆囂囂而雜處兮咸歎老而嗟卑視予心之不然兮慮行道之猶非又怪神堯以一旅取天下後世子孫不能以天下取河北以為憂嗚呼使當時君子皆易其歎老嗟卑之心為翺所憂之心則唐之天下豈有亂與亡哉然翺幸不生今時見今之事則其憂叉甚矣奈何今之人不憂也余行天下見人多矣脱有一人能如翺憂者又皆疏逺與翺無異其餘光榮而飽者一聞憂世之言不以為狂人則以為病癡子不怒則笑之矣嗚呼在位而不肯自憂又禁他人使皆不得憂可歎也夫復性書上人之所以為聖人者性也人之所以惑其性者情也喜怒哀懼愛惡欲七者皆情之所為也情既昏性斯匿矣非性之過也七者循環而交來故性不能充也水之渾也其流不清火之煙也其光不明非水火清明之過沙不渾流斯清矣煙不鬱光斯明矣情不作性斯充矣性與情不相先也雖然無性則情無所生矣是情由性而生情不自情因性而情性不自性由情以明性者天之命也聖人得之而不惑者也情者性之動也百姓溺之而不能知其本者也聖人者豈其無情邪聖人者寂然不動不往而到不言而神不耀而光制作參乎天地變化合乎隂陽雖有情也未嘗有情也然則百姓者豈其無性者邪百姓之性與聖人之性弗差也雖然情之所昏交相攻伐未始有窮故雖終身而不自覩其性焉火之潛於山石林木之中非不火也江河淮濟之未流而潛於山非不泉也石不敲木不磨則不能燒其山林而燥萬物泉之源弗疏則不能為江為河為淮為濟東滙大壑浩浩蕩蕩為弗測之深情之動弗息則不能復其性而燭天地為不極之明故聖人者人之先覺者也覺則明否則惑惑則昏明與昏謂之不同明與昏性本無有則同與不同二者離矣夫明者所以對昏昏既滅則明亦不立矣是故誠者聖人性之也寂然不動廣大清明照乎天地感而遂通天下之故行止語黙無不處於極也復其性者賢人循之而不已者也不已則能歸其源矣易曰夫聖人者與天地合其徳日月合其明四時合其序鬼神合其吉凶先天而天不違後天而奉天時天且弗違而況於人乎況於鬼神乎此非自外得者也能盡其性而已矣子思曰唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能匕聖人知人之性皆善可以循之不息而至於聖也故制禮以節之作樂以和之安於和樂樂之本也動而中禮禮之本也故在車則聞鸞和之聲行步則聞珮玉之音無故不廢琴瑟視聴言行循禮而動所以教人忘嗜欲而歸性命之道也道者至誠也誠而不息則虚虚而不息則明明而不息則照天地而無遺非他也此盡性命之道也哀哉人皆可以及乎此莫之止而不為也不亦惑邪昔者聖人以之傳於顔子顔子得之拳拳不失不逺而復其心三月不違仁子曰囘也其庶乎屢空其所以未到於聖人者一息耳非力不能也短命而死故也其餘升堂者蓋皆傳也一氣之所養一雨之所膏而得之者各有淺深不必均也子路之死也石乞盂黶以戈擊之斷纓子路曰君子死冠不免結纓而死由也非好勇而無懼也其心寂然不動故也曾子之死也曰吾何求焉吾得正而斃焉斯已矣此正性命之言也子思仲尼之孫得其祖之道述中庸四十七篇以傳於孟軻軻曰我四十不動心軻之門人達者公孫丑萬章之徒蓋傳之矣遭秦滅書中庸之不焚者一篇存焉於是此道廢缺其教授者唯節文章句威儀擊劔之術相師焉性命之源則吾弗能知其所傳矣道之極於剥也必復吾豈復之時邪吾自六嵗讀書但為詞句之學志於道者四年矣與人言之未嘗有是我者也南觀濤江入於越而吳郡陸傪存焉與之言之陸傪曰子之言尼父之心也東方如有聖人焉不出乎此也南方如有聖人焉亦不出乎此也惟子行之不息而已矣嗚呼性命之書雖存學者莫能明是故皆入於莊列老釋不知者謂夫子之徒不足以窮性命之道信之者皆是也有問於我我以吾之所知而傳焉遂書於書以開誠明之源而缺絶廢棄不揚之道幾可以傳於時命曰復性書以理其心以傳乎其人烏戲夫子復生不廢吾言矣復性書中或問曰人之昏也久矣將復其性者必有漸也敢問其方曰弗慮弗思情則不生情既不生乃為正思正思者無慮無思也易曰天下何思何慮又曰閑邪存其誠詩曰思無邪曰已矣乎曰未也此齋戒其心者也猶未離於靜焉有靜必有動有動必有靜動靜不息是乃情也易曰吉凶悔吝生於動者也焉能復其性邪曰如之何曰方靜之時知心無思者是齋戒也知本無有思動靜皆離寂然不動者是至誠也中庸曰誠則明矣易曰天下之動貞夫一者也問曰不慮不思之時物格於外情應於内如之何而可止也以情止情其可乎曰情者性之邪也知其為邪邪本無有心寂不動邪思自息惟性明照邪何所生如以情止情是乃大情也情互相止其有已乎易曰顔氏之子有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉問曰本無有思動靜皆離然則聲之來也其不聞乎物之形也其不見乎曰不覩不聞是非人也視聴昭昭而不起於見聞者斯可矣無不知也無弗為也其心寂然光照天地是誠之明也大學曰致知在格物易曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此曰敢問致知在格物何謂也曰物者萬物也格者來也至也物至之時其心昭昭然明辨焉而不應於物者是致知也是知之至也知至故意誠意誠故心正心正故身修身修而家齊家齊而國理國理而天下平此所以能參天地者也易曰與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體一隂一陽之謂道此之謂也曰生為我説中庸曰不出乎前矣曰我未明也敢問何謂天命之謂性曰人生而靜天之性也性者天之命也率性之謂道何謂也曰率循也循其源而反其性者道也道也者至誠也至誠者天之道也誠者定也不動也修道之謂教何謂也曰誠之者人之道也誠之者擇善而固執之者也修是道而歸其本者明也教也者則可以教天下矣顔子其人也道也者不可須臾離也可離非道也説者曰其心不可須臾動焉故也動則逺矣非道也變化無方未始離於不動故也是故君子戒慎乎其所不覩恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也説者曰不覩之覩見莫大焉不聞之聞聞莫甚焉其心一動是不覩之覩不聞之聞也其復之也逺矣故君子慎其獨慎其獨者守其中也問曰昔之註解中庸者與生之言皆不同何也曰彼以事解者也我以心通者也曰彼亦通於心乎曰吾不知也曰如生之言修之一日則可以至於聖人乎曰十年擾之一日止之而求至焉是孟子所謂以杯水而救一車薪之火也甚哉止而不息必誠誠而不息必明明與誠終嵗不違則能終身矣造次必於是顛沛必於是則可以希於至矣故中庸曰至誠無息不息則久久則徴徴則悠逺悠逺則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠乆所以成物也博厚配地髙明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也問曰凡人之性猶聖人之性故曰桀紂之性猶堯舜之性也其所以不覩其性者嗜欲好惡之所昏也非性之罪也曰為不善者非性邪曰非也乃情所為也情有善有不善而性無不善焉孟子曰人無有不善水無有不下夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其所以導引之者然也人之性皆善其不善亦猶是也問曰堯舜豈不有情邪曰聖人至誠而已矣堯舜之舉十六相非喜也流共工放驩兜殛鯀竄三苗非怒也中於節而已矣其所以皆中節者設教於天下故也易曰知變化之道者其知神之所為乎中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉易曰唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至聖人之謂也問曰人之性猶聖人之性嗜欲愛憎之心何因而生也曰情者妄也邪也邪與妄則無所因矣妄情滅息本性清明周流六虚所以謂之能復其性也易曰乾道變化各正性命論語曰朝聞道夕死可矣能正性命故也問曰情之所昏性即滅矣何以謂之猶聖人之性也曰水之性清澈其渾之者沙泥也方其渾也性豈遂無有邪久而不動沙泥自沈清明之性鑒於天地非自外來也故其渾也性本弗失及其復也性亦不生人之性亦猶水也問曰人之性本皆善而邪情昏焉敢問聖人之性將復為嗜欲所渾乎曰不復渾矣情本邪也妄也邪妄無因人不能復聖人既復其性矣知情之為邪邪既為明所覺矣覺則無邪邪何由生也伊尹曰天之道以先知覺後知先覺覺後覺者也予將以此道覺此民也非予覺之而誰也如將復為嗜欲所渾是尚不自覺者也而況能覺後人乎曰敢問死何所之邪曰聖人之所明書於策者也易曰原始反終故知死生之説精氣為物㳺魂為變是故知鬼神之情狀斯盡之矣子曰未知生焉知死然則原其始而反其終則可以盡其生之道生之道既盡則死之説不學而自通矣此非所急也子修之不息其自知之吾不可以章章然言且書矣復性書下晝而作夕而休者凡人也作乎非作者也與物皆作休乎非休者也與物皆休吾則不類於凡人晝無所作夕無所休作非吾作也作有物休非吾休也休有物作邪休耶二者離而不存予之所存者終不亡且離也人之不力於道者昏不思也天地之間萬物生焉人之於萬物一物也其所以異於禽獸蟲魚者豈非道徳之性全乎哉受一氣而成其形一為物而一為人得之甚難也生乎世又非深長之年也以非深長之年行甚難得之身而不專專於大道肆其心之所為則其所以自異於禽獸蟲魚者亡幾矣昏而不思其昏也終不明矣吾之生二十有九年矣思十九年時如朝日也思九年時亦如朝日也人之受命其長者不過七十八十九十年百年者則稀矣當百年之時而視乎九年時也與吾此日之思於前也逺近其能大相懸耶其又能逺於朝日之時耶然則人之生也雖享百年若雷電之驚相激也若風之飄而旋也可知耳矣況千百人而無一及百年者哉故吾之終日志於道徳猶懼未及也彼肆其心之所為者獨何人耶世病李翺復性書雜於佛氏之言朱子門人所記平生議論黄義剛則曰李翺有本領如復性書有許多思量邵浩則曰李翺只是従佛中來滕璘則曰李翺滅情之論乃釋老之言今去朱子千年所傳聞異辭者不可得而折衷也雖然堯舜與人同耳人在則性在性在則李翺所言之是非如取左手以例右手不必復問之人而後知之已李翺之言謂之語焉而不詳可矣謂之擇焉而不精烏乎可人病其言情邪也妄也謂與孟子戾然而與孟子不戾也孟子因人之疑性善惡而舉情之善者以言李翺則因人之日失其性而趨於惡故專舉其不善者以言耳性陽也無不善也情隂也率性則善離性則不善四方東南西獸皆一唯北方則龜蛇二故曰北方有兩隂有兩此非人所為也天也情之有善有不善亦天也孟子曰乃若其情則可以為善矣乃所謂善也未嘗曰情無不善也且情之有不善奚待質疑問難而後知之哉李翺舉情不善為言之頃未暇舉及於情之善耳雖然李翺亦未嘗終不之舉也上篇曰無性則情無所生矣是情由性生情不自情因性而情性不自性由情以明此與程子所云性其情情其性者非一家言哉程子言之則人尊之李翺言之則人忽之然則亦未嘗知程子之言也知程子則知李翺矣唯中篇所論格物則循舊解而失其義夫理憑於無事履其有其有者非博學審問慎思明辨而唯以無思無慮之心物來而應之縦在此未嘗有私欲之累而舉而措諸天下國家一絲毫之差將致千里之謬況所差者未必果祇一絲毫也以此為不思而得其烏乎可夫格物之説不明則性終不可得而盡盡性云者豈曰我有性而我盡之哉茍非盡人性盡物性以至盡天地之性則已之性終未盡也是故孔子無我今執此無思無慮之心以為極則而不知下學以盡萬物之變則此無思無慮者即成一無思無慮之我耳我尚未除又何以盡人物之性以及於天地是所謂語焉而不詳者也不寜惟是又復自相矛盾其上篇言情専舉情之不善為言乃偏言之耳偏言之者辭各有當無非也其中篇已明言情有善不善而性無不善矣乃又曰情者邪也妄也者此則自相矛盾而無怪乎後世之疑惑者也雖然自孟子之後至於唐唯韓愈其言立而云性有三品則已擇焉不精矣豈若翺之所言上承孟子下開程朱哉學者往往飲水而譏源何耶陸歙州述吳郡陸傪公佐生於世五十有七年明於仁義之道可以化人倫厚風俗者餘三十年連事觀察使觀察使不能知退居於田者六七年由侍御史入為祠部員外郎二年出刺歙州卒於道貞元十八年四月二十八日也凡人之所不能窮者必推之於天天之注膏雨也人之心以為生旱苗然也雨與苗運相違或雨於海或雨於山旱苗不得仰其澤唯人也亦然天之生俊賢也人之心以為拯顦顇之人然也賢者與顦顇之人時不合或死於野或得其位而道不能行顦顇之人不得被其惠膏雨之降也適然賢者之生於時也亦然運相合旱苗仰其澤顦顇之人賴其力傅説甘盤尹吉甫管夷吾之類也時弗合膏雨降雖終日賢哲生雖比肩旱苗之不救百姓之弗賴顔子子思孟軻董仲舒之類也故賢哲之生自有時百姓之賴其力天也不賴其力亦天也嗚呼公佐之官雖升於朝雖刺於州其出入始二年道之不行與居於田時弗差也公佐之賢雖曰聞已其徳行未必昭昭然聞於天子公佐是以不得其職出刺一州又短命道病死天下之未䝉其徳固宜矣然則天之生君也授之以救人之道不授之以救人之位如膏雨之或雨於海或雨於山旱苗之不沐其澤者均也故君子不得其位以行其道者命也其亦有不足於心者邪得其道者窮居於野非所謂屈冠冕而相天下非所謂伸其何有不足於心者邪雨者苗之膏賢者國之寳二者相須為用相得益彰也易云雲行雨施品物流行詩云芃芃黍苗隂雨膏之書云若嵗大旱用汝作霖雨君子在位道濟天下仁施惠洽猶植物之䝉澤而羣慶有秋也若俊民用微雖有盤庚周宣之主而不得賢才以為佐則在屯九五之屯其膏矣若吳人陸歙州者舉而不能蚤用而不能顯懐才莫試寜非人主與宰相之過歟乃李翺一舉而歸諸天實為之之適然立言有體哉且理固如是其髙出於栁州天説者萬萬也翺可為知天矣雖然用舍者時也顯晦者遇也士誠抱道自立得志與民由之不得志獨行其道所謂富貴不能淫貧賤不能移威武不能屈者是也况乎道之所在匹夫為善一鄉化之一國化之孟子云聞伯夷之風者頑夫㢘懦夫有立志聞栁下惠之風者薄夫敦鄙夫寛二人者豈必居髙位而顯當世哉道在故也故道得則山林有卿相之稱道失則維鵜有在梁之誚髙愍女碑愍女姓髙妹妹名也生七嵗當建中二年父彦昭以濮陽歸天子前此逆賊質妹妹與其母兄而使彦昭守濮陽及彦昭以城歸妹妹與其母兄皆死其母李氏也將死憐妹妹之幼無辜請獨免其死而以為婢於官皆許之妹妹不欲曰生而受辱不如死母兄且皆不免何獨生為其母與兄將被刑咸拜於四方妹妹獨曰我家為忠宗黨誅夷四方神祇尚何知問其父所在之方西嚮哭再拜遂就死明年太常諡之曰愍當此之時天下之為父母者聞之莫不欲愍女之為其子也天下之為夫者聞之莫不欲愍女之為其室家也天下之為女與妻者聞之莫不欲愍女之行在其身也昔者曹娥思盱自沈於江獄吏嘑囚章女悲號思唁其兄作詩載馳緹縈上書迺除肉刑彼四女者或孝或智或義或仁噫此愍女厥生七年天生其知四女不倫向遂推而布之於天下其誰不従而化焉雖有逆子必改行雖有悍妻必易心賞一女而天下勸亦王化之大端也異哉愍女之行而不家聞户知也貞元十三年翺在汴州彦昭時為潁州刺史昌黎韓愈始為予言之余既悲而嘉之於是作髙愍女碑楊烈婦傳建中四年李希烈陷汴州既又將盜陳州分其兵數千人扺項城縣蓋將掠其玉帛俘纍其男女以㑹於陳州縣令李侃不知所為其妻楊氏曰君縣令冦至當守力不足死焉職也君如逃則誰守侃曰兵與財皆無将若何楊氏曰如不守縣為賊所得矣倉廩皆其積也府庫皆其財也百姓皆其戰士也國家何有奪賊之財而食其食重賞以令死士其必濟於是召胥吏百姓於庭楊氏言曰縣令誠主也雖然嵗滿則罷去非若吏人百姓然吏人百姓邑人也墳墓存焉宜相與致死以守其邑忍失其身而為賊之人邪衆皆泣許之乃徇曰以瓦石中賊者與之千錢以刀矢兵刄之物中賊者與之萬錢得數百人侃率之以乘城楊氏親為之㸑以食之無長少必周而均使侃與賊言曰項城父老義不為賊矣皆悉力守死得吾城不足以威不如亟去徒失利無益也賊皆笑有蜚箭集於侃之手侃傷而歸楊氏責之曰君不在則人誰肯固矣與其死於城上不猶愈於家乎侃遂忍之復登陴項城小邑也無長㦸勁弩髙城深溝之固賊氣吞焉率其徒将超城而下有以弱弓射賊者中其帥墜馬死其帥希烈之壻也賊失勢遂相與散走項城之人無傷焉刺史上侃之功詔遷絳州太平縣令楊氏至兹猶存婦人女子之徳奉父母舅姑盡恭順和於娣姒於卑幼有慈愛而能不失其貞者則賢矣辨行列明攻守勇烈之道此公卿大臣之所難厥自兵興朝廷寵旌守禦之臣憑堅城深池之險儲蓄山積貨財自若冠胄服甲負弓矢而馳者不知幾人其勇不能戰其智不能守其忠不能死棄其城而走者有矣彼何人哉楊氏者婦人也孔子曰仁者必有勇楊氏當之矣贊曰凡人之情皆謂後來者不及於古之人賢者古亦稀獨後代耶及其有之與古人不殊也若髙愍女楊烈婦者雖古列女其何加焉予懼其行事湮滅而不傳故皆叙之將告於史官李翺與皇甫湜書云僕竊不自度無位於朝幸有餘暇而詞句足以稱贊明盛紀一代功臣賢士灼然可傳於後自以為能不滅者不敢為讓故欲筆削國史成不刋之書用仲尼褒貶之心取天下公是公非為本羣黨之所為是者僕未必以為是羣黨之所為非者僕未必以為非使僕書而傳則富貴而功徳不著者未必聲名於後貧賤而道徳全者未必不烜赫於無窮韓退之所謂誅奸諛於既死發潛徳之幽光是翺心也僕文采雖不足以希左丘明司馬子長足下視僕叙髙愍女楊烈婦豈盡出班孟堅蔡伯喈之下耶翺之自言如此今讀之真能使頑㢘懦立薄敦鄙寛令人不知涕之無従者翺誠非無實而夸者也翺云天下為父母者聞之莫不欲愍女之為子為夫者莫不欲愍女之為其室家也為君者讀翺斯文寜不欲如翺者之為其史臣哉御選唐宋文醇巻十九
