body:
  text: 眉山蘇軾文十三碑富鄭公神道碑欽定四庫全書御選唐宋文醇卷五十眉山蘇軾文十三富鄭公神道碑宋興百三十年四方無虞人物歲滋蓋自秦漢以來未有若此之盛者雖所以致之非一道而其要在於兵不用用不久常使智者謀之而仁者守之雖至於無窮可也契丹自晉天福以來踐有幽薊北鄙之警略無寧歲凡六十有九年至景德元年舉國來寇攻定武圍髙陽不克遂陷德清以犯天雄真宗皇帝用宰相寇準計決策親征既次澶淵諸道兵大會行在敵既震動兵始接射殺其驍將順國王達蘭敵懼遂請和時諸將皆請以兵會界河上邀其歸徐以精甲躡其後殱之敵懼求哀於上上曰契丹幽薊皆吾民也何多以殺為遂詔諸將按兵勿伐縱契丹歸國敵自是通好守約不復盜邊者三十有九年及趙元昊叛西方轉戰連年兵久不決契丹之臣有貪而喜功者以我為怯且厭兵遂教其主設詞以動我欲得晉髙祖所與關南十縣慶厯二年聚重兵境上遣其臣蕭英劉六符來聘兵既壓境而使來非時中外忿之仁宗皇帝曰契丹吾兄弟之國未可棄也其有以大鎮撫之命宰相擇報聘者時敵情不可測羣臣皆莫敢行宰相舉右正言知制誥富公公即入對便殿叩頭曰主憂臣辱臣不敢愛其死上為動色乃以公為接伴英等入境上遣中使勞之英託足疾不拜公曰吾嘗使北病卧車中聞命輒起拜今中使至而公不起此何禮也英矍然起拜公開懷與語不以疏逺待之英等見公傾盡亦不復隱其情遂去左右密以其主所欲得者告公且曰可從從之不可從更以一事塞之公具以聞上命御史中丞賈昌朝館伴不許割地而許增歲幣且命公報聘既至六符館之往反十數皆論割地必不可狀及見敵主問故敵主曰南朝違約塞鴈門增塘水治城隍籍民兵此何意也羣臣請舉兵而南寡人以為不若遣使求地求而不獲舉兵未晚也公曰北朝忘章聖皇帝之大德乎澶淵之役若從諸將言北兵無得脫者凡北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝諸臣爭勸用兵者此皆其身謀非國計也敵主驚曰何謂也公曰晉髙祖欺天叛君而求助於北末帝昏亂神人棄之是時中國狹小上下離叛故契丹全師獨克雖敵獲金幣充牣諸臣之家而壯士健馬物故大半此誰任其禍者今中國提封萬里所在精兵以百萬計法令修明上下一心北朝欲用兵能保其必勝乎曰不能公曰勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶歲弊盡歸人主臣下所得止奉使者歲一二人耳羣臣何利焉敵主大悟首肯者久之公又曰塞鴈門者以備元昊也塘水始於何承矩事在通好前地卑水勢聚不得不增城隍皆修舊民兵亦舊籍特補其闕耳非違約也晉髙祖以盧龍一道賂契丹周世宗復伐取關南皆異代事宋興已九十年若各欲求異代故地豈北朝之利也哉本朝皇帝之命使臣則有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租賦耳朕不欲以地故多殺兩朝赤子故屈已增幣以代賦入若北朝必欲得地是志在敗盟假此為詞耳朕亦安得獨避用兵乎澶淵之盟天地鬼神實臨之今北朝首發兵端過不在朕天地鬼神豈可欺也哉敵大感悟遂欲求婚公曰婚姻易以生隙人命修短不可知不若歲幣之堅久也本朝長公主出降齎送不過十萬緡豈若歲幣無窮之獲哉敵主曰卿且歸矣再來當擇一授之卿其遂以誓書來公歸復命再聘受書及口傳之詞於政府既行次樂壽謂其副曰吾為使者而不見國書萬一書詞與口傳者異則吾事敗矣發書視之果不同乃馳還都以晡入見宿學士院一夕易書而行既至敵不復求婚專欲增幣曰南朝遺我書當曰獻否則曰納公爭不可敵主曰南朝既懼我矣何惜此二字若我擁兵而南得無悔乎公曰本朝皇帝兼愛南北之民不忍使蹈鋒鏑故屈已增幣何名為懼哉若不得已而至於用兵則南北敵國當以曲直為勝負非使臣之所憂也虜主曰卿勿固執自古亦有之公曰惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納則不可知其後頡利為太宗所擒豈復有此禮哉公聲色俱厲虜知不可奪曰吾當自遣人議之於是留所許增幣誓書復使耶律仁先及六符以其國誓書來且求為獻納公奏曰臣既以死拒之敵氣折矣可勿復許敵無能為也上從之增幣二十萬而契丹平北方無事蓋又四十八年矣契丹君臣至今誦其語守其約不忍敗者以其心曉然知通好用兵利害之所在也故臣嘗竊論之百餘年間兵不大用者真宗仁宗之德而寇準與公之功也公諱弼字彥國河南人曽大父內黃令諱處謙大父商州馬步使諱令荀考尚書都官員外郎諱言皆以公貴贈太師中書令尚書令封鄧韓秦三國公曽祖母劉氏祖母趙氏母韓氏封魯韓秦三國太夫人公幼篤學有大度范仲淹見而識之曰此王佐才也懷其文以示王曽晏殊殊即以女妻之仁宗復制科仲淹謂公子當以是進天聖八年公以茂才異等中第授將作監丞知河南府長水縣用李迪辟簽書河陽節度判官事丁秦國公憂服除會郭后廢范仲淹爭之貶知睦州公上言朝廷一舉而獲二過縱不能復后宜還仲淹以來忠言通判絳州景祐四年召試館職遷太子中允直集賢院從王曽辟通判鄆州寶元初趙元昊反公上疏陳八事具言元昊遣使求割地邀金帛使者部從儀物如契丹而詞甚倨此必元昊腹心謀臣自請行者宜出其不意斬之都市又言夏守贇庸人也平時猶不當用而况艱難之際可為樞密乎議者以為有宰相器召還為開封府推官擢知諫院康定元年日食正旦公言請罷燕徹樂雖敵使在館亦宜就賜飲食而已執政以為不可公曰萬一北敵行之為朝廷羞後使敵還者云敵中罷燕如公言仁宗深悔之初宰相惡聞忠言下令禁越職言事公因論日食以為應天變莫若通下情遂除其禁元昊寇鄜延殺二萬人破金明擒李士斌延帥范雍鈐轄盧守勤閉門不救中貴人黃德和引兵先走劉平石元孫戰死而雍守勤歸罪於通判計章用都監李康伯皆竄嶺南德和誣奏平降賊詔以兵圍守其家公言平自環慶引兵來援以姦臣不救故敗竟罵賊不食而死宜恤其家守勤德和皆中官怙勢誣人冀以自免宜竟其獄樞密院奏方用兵獄不可遂公言大臣附下罔上獄不可不競時守勤男昭序為御藥公奏乞罷之德和竟坐腰斬延州民二十人詣闕告急上召問具得諸將敗亡狀執政惡之命邊郡禁民擅赴闕者公言此非陛下意宰相惡上知四方有敗耳民有急不得訴之朝則西走元昊北走契丹矣夏守贇為陜西都總管又以入內都知王守忠為都鈐轄公言用守贇既為天下笑而守忠鈐轄乃與唐中官監軍無異將吏必怨懼盧守勤黃德和覆車之轍可復蹈乎詔罷守忠時又用觀察使魏昭昞為同州鄭守忠為殿前都指揮使髙化為步軍都指揮使公言昭昞乳臭兒必敗事守忠與化故親事官皆奴才小人不可用詔遣侍御史陳洎往陜西督修城且城潼關公言天子守在四夷今城潼關自關以西為棄之耶語皆侵執政自用兵以來吏民上書者甚衆初不省用公言知制誥本中書屬官可選二人置局中書考其所言可用用之宰相以付學士公言此宰相偷安欲以天下是非盡付他人乞與廷辨又言邊事係國安危不當專委樞密院用宰相魏仁浦兼樞密使國初范質王溥亦以宰相參知樞密院事今兵興宜使宰相以故事兼領仁宗曰軍國之務當盡歸中書樞密非古官然未欲遽廢內降令中書同議樞密院事且書其檢宰相以內降納上前曰恐樞密院謂臣奪權公曰此宰相避事耳非畏奪權也時西夏首領吹丹且實吹丹且桑各稱偽將相來降補借奉職羈置荆湖公言二人之降其家已族矣當厚賞以勸來者上命以所言送中書公見宰相論之宰相初不知也公嘆曰此豈小事而宰相不知耶更極論之上從公言以宰相兼樞密使除鹽鐵判官遷太常丞史館修撰奉使契丹二年改右正言知制誥糾察在京刑獄時有用偽牒為僧者事覺乃堂吏為之開封按餘人而不及吏公白執政請以吏付獄執政指其坐曰公即居此無為近名公正色不受其言曰必得吏乃止執政滋不悅故薦公使契丹欲因事罪之歐陽修上書引顔真卿使李希烈事留公不報使還除吏部郎中樞密直學士懇辭不受始受命聞一女卒再受命聞一男生皆不顧而行得家書不發而焚之曰徒亂人意尋遷翰林學士公見上力辭曰增歲幣非臣本志也特以朝廷方討元昊未暇與敵角故不敢以死爭其敢受乎慶厯三年三月遂命公為樞密副使辭之愈力改授資政殿學士兼翰林侍讀學士七月復除樞密副使公言敵既通好議者便謂無事邊備漸弛敵萬一敗盟臣死且有罪非獨臣不敢受亦願陛下思外裔輕侮中原之恥坐薪嘗膽不忘修政因以告納上前而罷逾月復除前命時元昊使辭羣臣班紫宸殿門上俟公綴樞密院班乃坐且使宰相章得象諭公曰此朝廷特用非以使敵故也公不得己乃受時晏殊為相范仲淹為參知政事杜衍為樞密使韓琦與公副之歐陽修余靖王素蔡襄為諫官皆天下之望魯人石介作慶厯聖德詩歷頌羣臣皆得其實曰維仲淹弼一夔一契天下不以為過公既以社稷自任而仁宗責成於公與仲淹望太平於期月之間數以手詔督公等條具其事又開天章閣召公等坐且給筆札使書其所欲為者遣中使二人更往督之且命仲淹主西事公主北事公遂與仲淹各上當世之務十餘條又自上河北安邊十三䇿大略以進賢退不肖止僥幸去宿弊為本欲漸易諸路監司之不才者使澄汰所部吏於是小人始不悅矣元昊遣使以書來稱男而不臣公言契丹臣元昊而我不臣則契丹為無敵於天下不可許乃却其使卒臣之四年七月契丹來告舉兵討元昊十二月詔册元昊為夏國主使將行而止之以俟敵使公曰若敵使未至而行則事自我出既至則恩歸契丹矣從之是歲契丹受禮雲中且發兵會元昊伐愛勒族於河東為近上問公曰敵得無與元昊襲我乎公曰虜自得幽薊不復由河東入寇者以河北平易富饒而河東嶮瘠且虞我出鎮定搗燕薊之虛也今兵出無名契丹大國決不為此就使妄動當出我不意不應先言受禮雲中也元昊本與契丹約相左右以困中國今契丹背約結好於我獨獲重幣元昊有怨言故敵築威塞州以備之愛勒屢殺威塞人虜疑元昊使之故為是役安能合而寇我哉或請調發為備公曰敵雖不來猶欲以虛聲困我若調發正墮其計臣請任之敵若入寇臣為罔上且誤國上乃止敵卒不動公謂契丹異日作難必於河朔既上十三策又請守一郡行其事小人怨公不已而大臣亦有以飛語讒公者上雖不信公懼因保州賊平求為河北宣撫使以避之使將還除資政殿學士知鄆州兼京東西路安撫使讒者不已罷安撫使歲餘讒不驗加給事中移知青州兼京東東路安撫使河朔大水民流京東公擇所部豐稔者五州勸民出粟得十五萬斛益以官廩隨所在貯之得公私廬舍十餘萬區散處其人以便薪水官吏自前資待闕寄居者皆給其祿使即民所聚選老弱病瘠者廩之山林河泊之利有可取以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輒遣人以酒肉糗飯勞之出於至誠人人為盡力流民死者為大冢葬之謂之叢冢自為文祭之明年麥大熟流民各以逺近受糧而歸凡活五十餘萬人募而為兵者又萬餘人上聞之遣使勞公即拜禮部侍郎公曰救災守臣職也辭不受前此救災者皆聚民城郭中煮粥食之飢民聚為疾疫及相蹈藉死或待次數日不食得粥皆僵仆名為救之而實殺之自公立法簡便周至天下傳以為法至於今不知所活者幾千萬人矣王則據貝州叛齊州禁兵馬達張青與姦民張握等得劔印於妖師欲以其衆叛將屠城以應則握之壻楊俊詣公告之齊非公所部恐事泄變生時中貴人張從訓銜命至青公度從訓可使即以事付從訓使馳至郡發吏卒取之無得脫者且自劾擅遣中使罪仁宗嘉之再除禮部侍郎公又懇辭不受遷資政殿大學士以明堂恩除禮部侍郎徙知鄭州又徙蔡州加觀文殿學士知河陽遷户部侍郎除宣徽南院使判并州兼河東經略安撫使至和二年召拜同中書門下平章事集賢殿大學士與文彥博並命宣制之日士大夫相慶於朝仁宗密覘知之歐陽修奏事殿上上具以語修且曰古之求相者或得於夢卜今朕用二相人情如此豈不賢於夢卜也哉修頓首稱賀仁宗弗豫大臣不得見中外憂恐文彥博與公等直入問疾內侍止之不可因以監視禳禱為名乞留宿內殿事皆關白而後行禁中肅然嘉祐三年加禮部尚書昭文館大學士監修國史公之為相守格法行故事而附以公議無心於其間故百官任職天下無事以所在民力困弊賦役不均遣使分道相視裁減謂之寬恤民力又弛茶禁以通商賈省刑獄天下便之六年丁秦國太夫人憂詔為罷春燕故事執政遇喪皆起復公以為金革變禮不可用於平世仁宗待公而為政五遣使起之卒不從命天下稱焉英宗即位拜樞密使同中書門下平章事遷户部尚書逾年以足疾求解機務章二十上拜鎮海軍節度使同中書門下平章事判河陽封祁國公公五上章辭使相且言真宗以前不輕以此授人仁宗即位之初執政欲自為地故開此例終仁宗之世宰相樞密使罷者皆除使相有不稱職有罪者亦然天下非之今陛下初即位願立法自臣始不從神宗即位改鎮武寧軍進封鄭國公公又乞罷使相乃以為尚書左僕射觀文殿大學士集禧觀使召赴闕公以足疾固辭復判河陽熙寧元年移汝州且詔入覲以公足疾許肩輿至殿門上特為御內東門小殿見之令男紹隆入扶且命無拜坐語從容至日昃賜紹隆五品服再對上欲留公為集禧觀使力辭赴郡明年二月除司空兼侍中昭文館大學士賜甲第一區皆辭不受復拜左僕射門下侍郎同中書門下平章事公既至未見有於上前言災異皆天數非人事得失所致者公聞之歎曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪説故先導上以無所畏使輔弼諌諍之臣無所復施其力此治亂之機也吾不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其決不然者羣臣請上尊號及作樂上以久旱不許羣臣固請作樂公又言故事有災變皆撤樂恐上以同天節虜使當上壽故未斷其請臣以為此盛德事正當以示逺人乞并罷上壽從之即日而雨公又上疏願益畏天戒逺姦佞近忠良上親書答詔曰義忠言親理正文直茍非意在愛君志存王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也公既上疏謝復申戒不已願陛下待羣臣不以同異為喜怒不以喜怒為用舍公始見上上問邊事公曰陛下即位之始當布德行惠願二十年口不言兵因以九事為戒八月以疾辭位拜武寧軍節度使同中書門下平章事判河南復以老請改亳州時方行青苗息錢法公以為此法行則財聚於上人散於下且富民不願請願請者皆貧民後不可復得故持之不行而提舉常平倉趙濟劾公以大臣格新法行當自貴近者始若置而不問無以令天下乃除左僕射判汝州公言新法臣所不曉不可以復治郡願歸洛養疾許之尋請老拜司空復武寧節度及平章事進封韓國公致仕公雖居家而朝廷有大利害知無不言交趾叛詔郭逵等討之公言海嶠嶮逺不可以責其必進願詔逵等擇利進退以全王師契丹來爭河東地界上手詔問公公言熙河諸郡皆不足守而河東地界決不可許元豐三年官制行改授開府儀同三司是歲故參知政事王堯臣之子同老上言至和三年仁宗弗豫其父堯臣嘗與文彥博劉沆及公同決大䇿乞立諸嗣仁宗許之會翊日有瘳故緩其事人無復知者以其父堯臣所撰詔草上之上以問彥博彥博言與同老合上嘉公等勳績如此而終不自言下詔以公為司徒且以其子紹京為閣門祗候六年閏六月丙申薨於洛陽私第之正寢享年八十手封遺表使其子上之世莫知其所言者上聞訃震悼為輟視朝內出祭文遣使致奠所以賻恤其家者甚厚贈太尉諡曰文忠十一月庚申葬於河南府河南縣金谷鄉南張里公之配曰周國夫人晏氏後公四年卒子男三人曰紹廷朝奉郎曰紹京供備庫副使後公十月卒曰紹隆光祿寺丞早卒女四人長適保寧軍節度使北京留守馮京卒又以其次繼室封安化郡夫人次適承議郎范大琮次適宣德郎范大圭孫男三人定方承事郎直清承奉郎直亮假承務郎公性至孝恭儉好禮與人言雖幼賤必盡敬氣色穆然終身不見喜愠然以單車入不測之虜廷詰其君臣折其口而服其心無一語少屈所謂大勇者乎其好善疾惡蓋出於天資常言君子小人如氷炭決不可以同器若兼收並用則小人必勝薰蕕雜處終必為臭其為宰相及判河陽最後請老家居凡三上章皆言天子無職事惟辨君子小人而進退之此天子之職也君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則交結構扇千岐萬轍必勝而後己小人得勝必遂肆毒於善良無所不為求天下不亂不可得也其為文章辨而不華質而不俚有文集八十卷天聖應詔集十一卷諫垣集三卷制草五卷奏議十三卷表章三十卷河北安邊策一卷奉使録四卷青州賑濟策三卷平生所薦甚衆尤知名者十餘人如王質與其弟素余靖張瓌石介孫復吳奎韓維陳襄王鼎張昷之杜杞陳希亮之流皆有聞於世世以為知人元祐元年六月有詔以公配享神宗皇帝廟廷明年以明堂恩加贈太師紹廷請於朝曰先臣墓碑未立願有以寵綏之上為親篆其首曰顯忠尚德之碑且命臣軾撰次其事謹拜手稽首而獻言曰世未嘗無賢也自堯舜三代以至於今有是君則有是臣故仁宗英宗至於神考咸有一德克享天心則天畀以人光明偉傑有如公者觀公之行事而味其生平則三宗之盛德可不問而知也古之人臣功髙則身危名重則謗生故命世之士罕能以功名終始者臣觀三宗所以待公全其功名而保其終始蓋可謂至矣方契丹求割地上命宰相歷問近臣孰能為朕使虜者皆以事辭免公獨慨然請行使事既畢上欲用公公逡巡退避不敢居而向之辭免者自恥其不行則惟公之怨比而讒公無所不至及石介為慶厯聖德詩天下傳誦則大臣疾公如仇構以飛語必欲致之死地仁宗徐而察之盡辨其誣卒以公為相及英宗神宗之世公已老矣勳在史官德在生民天子虛已聽公西戎北狄視公進退以為中國輕重然一趙濟敢搖之惟神宗日月之明知公愈深公雖請老有大政事必手詔訪問又追論定策之勳以告天下寵及其子孫然後小人不敢復議雍容進退卒為宗臣古人有言曰為君難為臣不易豈不然哉公既配食清廟宜有頌詩以昭示來世其詞曰五代八姓十有二君四十四年如絲之棼以人為嬉以殺為儇兵交兩河腥聞於天上帝憎之命我祖宗畀爾爐錘往銷其鋒孰謂民逺我聞其呻寧爾小忍無殘我民六聖受命惟一其心敕其後人帝命是承勿劓刵人矧彼好兵百三十年諱兵與刑惟彼北戎謂帝我驕帝聞其言折其萌芽篤生萊公尺箠笞之既服既馴則擾綏之堂堂韓公與萊相望再聘於燕北方以寧景德元祀始盟契丹公生是歲天命則然公之在母秦國寤驚旌旗鶴鴈降充其庭云有天赦已而生公天欲赦民公啓其衷北至燕然南至於河億萬維生公手撫摩水潦洊飢散流而東五十萬人仰哺於公公之在內自泉流瀕其在四方自葉流根百官維人百度維貞相我三宗重華協明帝謂公來隕星其堂有墳其丘公豈是藏維嶽降神今歸不留臣軾作頌以配嵩髙徐度曰東坡初欲為富韓公神道碑久之未有意思一日晝寢夢偉丈夫稱是寇萊公來訪已共語久之既即下筆首敘景德澶淵之功以及慶厯和議頃刻而就以示張文潛文潛曰有一字未甚安請試言之蓋碑之末初曰公之勳在史官德在生民天子虛已聽公西戎北狄視公進退以為輕重然一趙濟能搖之竊謂能不若敢也東坡大以為然即更定焉御選唐宋文醇卷五十
