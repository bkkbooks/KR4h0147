body:
  text: 河東栁宗元文一賦雜著解祟賦平淮夷雅二篇晉文公問守原議桐葉封弟辯捕蛇者説説車贈楊誨之宋清傳種樹郭橐駞傳梓人傳童區寄傳欽定四庫全書御選唐宋文醇巻十一河東栁宗元文一解祟賦栁子既謫猶懼不勝其口筮以𤣥遇干之八其贊曰赤舌燒城吐水於瓶其測曰君子解祟也喜而為之賦胡赫炎薫熇之烈火兮而生夫人之齒牙上殫飛而莫遁旁窮走而逾加九泉焦枯而四海滲涸兮紛揮霍而要遮風雷虩虩以為槖籥兮囘禄煽怒而喊呀炖堪輿為獻𨫼兮爇雲漢而成霞鄧林大椿不足以充於燎兮倒扶桑落棠膠轕而相义膏揺脣而増熾兮焰掉舌而彌葩沃無瓶兮撲無篲金流玉鑠兮曽不自比於塵沙獨凄已而燠物愈騰沸而骹䶗吾懼夫灼爛灰滅之為禍往搜乎太𤣥之奥訟衆正訴羣邪曰去爾中躁與外撓姑務清為室而靜為家茍能是則始也汝邇今也汝遐涼汝者進烈汝者賖譬之猶豁天淵而履原燎夫何長喙之紛拏今汝不知清己之慮而惡人之譁不知靜之為勝而動焉是嘉徒遑遑乎狂奔而西傃盛氣而長嗟不亦遼乎於是釋然自得以泠風濯熱以清源滌瑕履仁之實去盗之夸冠太清之𤣥冕佩至道之瑶華鋪冲虚以為席駕恬泊以為車瀏乎以遊於萬物者始彼狙雌倐施而以祟為利者夫何為耶宗元以清靜為禦讒之要譬以身為甌臾待流丸之自止又若藏於九地之下任烈火之燎原可謂明晰物情善自為謀者矣雖然其與無入不自得之君子猶有間蓋無入而不自得者入焉而自得非規以出乎其外而始自得之謂也是非者理也得失者命也毁譽者人也以得失聽命以毁譽聽人而唯理之至是者是從其從之也唯曰理在則然不以有我之見往參其間沾沾曰我能從理我無非而有是夫如是則雖萬感雜乗而此一理各隨其萬者以自來自可徧入於鉅萬之中各得其一而萬自畢夫如是猶問毁乎猶問譽乎雖有金玉難飾太虚堯舜事業如浮雲也雖有汙泥難塗日月齒牙為猾其何傷己今畏夫赤舌之燒城而逃之清靜之家遊乎萬物之始將堅壁清野索之不可得豈非所為規以出乎其外者乎猶有所謂我者存是尚不得老子之清靜其於無入不自得之君子逺矣平淮夷雅二篇皇武命丞相度董師集大功也皇耆其武於溵於淮既巾乃車環蔡其來狡衆昏嚚甚毒於酲狂奔叫呶以干大刑皇咨於度惟汝一徳曠誅四紀其徯汝克錫汝斧鉞其往視師師是蔡人以宥以釐度拜稽首廟於元龜既禡既類於社是宜金節煌煌錫盾雕戈犀甲熊旂威命是荷度拜稽首出次於東天子餞之罍斝是崇鼎臑爼胾五獻百籩凡百卿士班以周旋既涉於滻乃翼乃前孰圖厥猶其佐多賢宛宛周道於山於川逺揚邇昭陟降連連我斾我旂於道於陌訓於羣帥拳勇來格公曰徐之無恃頟頟式和爾容惟義之宅進次於郾彼昏卒狂裒兇鞠頑鋒蝟斧螗赤子匍匐厥父是亢怒其萌芽以悖太陽王旅渾渾是佚是怙既獲敵師若饑得餔蔡兇伊窘悉起來聚左𢷬其虚靡愆厥慮載闢載祓丞相是臨弛其武刑諭我徳心其危既安有長如林曽是讙譊化為謳吟皇曰來歸汝復相予爵之成國胙以夏墟度拜稽首天子聖神度拜稽首皇祐下人淮夷既平震是朔南宜廟宜郊以告徳音歸牛休馬豐稼於野我武惟皇永保無疆方城命愬守也卒入蔡得其大醜以平淮右方城臨臨王卒峙之匪徼匪競皇有正命皇命於愬往舒余仁踣彼艱頑柔恵是馴愬拜即命於皇之訓既礪既攻以後厥刃王師嶷嶷熊羆是式銜勇韜力日思予殛寇昏以狂敢蹈愬疆士獲厥心大袒高驤長㦸酋矛粲其綏章右剪左屠聿禽其良其良既宥告以父母恩柔於肌卒貢爾有維彼攸恃乃偵乃誘維彼攸宅乃發乃守其恃爰獲我功我多陰諜厥圖以究爾訛雨雪洋洋大風來加於燠其寒於邇其遐汝陰之茫懸瓠之峩是震是㧞大殱厥家狡虜既縻輸於國都示之市人即社行誅乃諭乃止蔡有厚喜完其室家仰父俯子汝水沄沄既清而瀰蔡人行歌我步逶遲蔡人歌矣蔡風和矣孰纇蔡初胡臲爾居式慕以康為愿有餘是究是咨皇徳既舒皇曰咨愬裕乃父功昔我文祖惟西平是庸内誨於家外刑於邦孰是蔡人而不率從蔡人率止惟西平有子西平有子惟我有臣疇允大邦俾惠我人於廟告功以顧萬方穆修曰平淮夷雅非只詞似古人要其理亦不詘於古如公曰徐之往舒余仁等語其於古者勝殷遏劉止戈為武之義豈爽毫髪吾知聖人復起採而錄之以續正雅决矣晉文公問守原議晉文公既受原於王難其守問寺人勃鞮以畀趙衰余謂守原政之大者也所以承天子樹霸功致命諸侯不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宫不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣况當其時不乏言議之臣乎狐偃為謀臣先軫將中軍晉君䟽而不咨外而不求乃卒定於内豎其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也然而齊桓任管仲以興進䜿刁以敗則獲原啟疆適其始政所以觀視諸侯也而乃背其所以興跡其所以敗然而能霸諸侯者以土則大以力則彊以義則天子之册也誠畏之矣烏能得其心服哉其後景監得以相衛鞅𢎞石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則問非失舉也葢失問也然猶羞當時陷後代若此况於問與舉又兩失者其何以救之哉余故著晉君之罪以附春秋許世子止趙盾之義宦寺之禍列代覆轍相尋唐自天寶以後寖昌寖熾積成甘露之變而天子僅守府矣宗元為王叔文之友叔文敗宗元亦貶唐史懲叔文之黨於宗元無恕辭即昌黎韓愈亦譏宗元不自顧藉貴重雖然考其時宦官既掌禁旅復監天下軍叔文輦欲一旦盡解其兵柄還之朝廷其意非不善也事敗身死當時震於宦寺之威不敢論曲直耳乃至於今尚尤之不止豈非惑哉易不云乎過涉滅頂凶无咎孔子繫之辭曰過涉之凶不可咎也若叔文輩當大過棟撓之時不度徳不量力涉大川而不顧滅頂而死當為君子之所哀雖身敗名裂可不謂之乃心王室乎善失明陳子龍之論曰伾文之黨欲盡奪北衙之勢張南衙之權其於國謀不可謂非正也子厚假晉文以立論謂守原一問得不償失所以申履霜堅冰之戒者深矣其言可為後世法戒雖然子厚固未經深考不達左氏紀載之意也夫趙衰者文公出亡五年所為患難與共者也作三軍謀元師趙衰曰郤縠可則從之衰豈更藉人汲引者且衰已為卿其不以守原輕重明矣而寺人勃鞮者即寺人披文公斬袪之仇也夫豈其嬖倖哉左傳紀此葢以見晉文此舉於一飯之徳必償而殺身之仇歸斯受之無纎芥之憾於中即可為勲戚如趙衰者商其逸事此其心胸誠有度越千古者耳宗元乃曰狐偃為謀臣先軫將中軍文公疏而不咨外而不求而卒定於内䜿若文公之暱愛寺人披者然豈不濶逺於情事哉然則宗元之垂戒後世雖是也而其尚論晉文則非也桐葉封弟辯古之傳者有言成王以桐葉與小弱弟戲曰以封汝周公入賀王曰戲也周公曰天子不可戲乃封小弱弟於唐吾意不然王之弟當封耶周公宜以時言於王不待其戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與小弱者為之主其得為聖乎且周公以王之言不可茍焉而已必從而成之耶設有不幸王以桐葉戲婦寺亦將舉而從之乎凡王者之徳在行之何若設未得其當雖十易之不為病要於其當不可使易也而况以其戲乎若戲而必行之是周公敎王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而為之辭又不當束縛之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者耶是直小丈夫缺缺者之事非周公所宜用故不可信或曰封唐叔史佚成之桐葉封弟事雖載史記及劉向説苑然年逺傳訛如此不可信者衆矣宗元辯此具有確見至云王者之徳在行之何若設未得其當雖十易之不為病要於其當不可使易也語尤切至雖然要於其當豈不難哉非具太公無我之量實有正心誠意之學考之詩書博之史籍而識古人之所已經極之民風土俗之不齊物情事勢之屢變而識今時之所宜稱析之入於錙銖而不爽挈之舉乎六合而不遺知周乎萬物而懐匹夫匹婦一能勝予之心道濟乎天下而視堯舜事業若浮雲太虚之過者其孰能事事要乎其當哉不得其當而不知易自必又有得其當而妄易之者也具曰予聖誰知烏之雌雄君子所以有終身之憂而未嘗一日以位為樂歟成王之詩曰惟予小子不聰敬止日就月將學有緝熈於光明於戲其庶幾乎捕蛇者說永州之野産異蛇黑質而白章觸草木盡死以齧人無禦之者然得而腊之以為餌可以己大風攣踠瘻癘去死肌殺三蟲其始太醫以王命聚之歲賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚慼者余悲之且曰苦毒之乎余將告於蒞事者更若役復若賦則何如蔣氏大慼汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是郷積於今六十歲矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙饑渇而頓踣觸風雨犯寒暑呼嘘毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死而徙爾而吾以捕蛇獨存悍吏之來吾鄉叫囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一歲之犯死者二焉其餘則熈熈而樂豈若吾鄉鄰之旦旦有是哉今雖死乎此比吾鄉鄰之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之猶信嗚呼孰知賦斂之毒有甚是蛇者乎故為之説以俟夫觀人風者得焉文本檀弓苛政猛於虎意當時賦役之煩重可以想見至悍吏之來吾鄉一段摹冩尤精蓋百姓征求之苦困於守令者什之三困於胥吏者什之七朝廷雖寛租减税視民如子而守令不才徳意不下逮四境之内保無有吏虎而冠者叫囂乎東西隳突乎南北耶為大吏者急當三復斯文說車贈楊誨之楊誨之將行栁子起而送之門有車過焉指焉而告之曰若知是之所以任重而行於世乎材良而器攻圓其外而方其中然也材而不良則速壊工之為功也不攻則速敗中不方則不能以載外不圓則窒拒而滯方之所謂者箱也圓之所謂者輪也匪箱不居匪輪不塗吾子其務法焉者乎曰然曰是一車之說也非衆車之說也吾將告子乎衆車之說澤而杼山而侔上而輊下而軒且曵祥而曠左革而長轂以㦸巢焉而以望安以愛老輜以蔽内垂綏而以畋載十二旒而以廟以郊以陳於庭其類衆也然而其要存乎材良而器攻圓其外而方其中也是故任而安之者箱達而行之者輪恒中者軸挶而固者蚤長而撓進不罪乎馬退不罪乎人者轅却暑與雨者葢敬而可伏者軾服而制者馬若牛然後衆車之用具今楊氏仁義之材也其産材良誨之學古道為古辭冲然而有光其為工也攻果能恢其量若箱周而通之若輪守大中以動乎外而不變乎内若軸攝之以剛健若蚤引焉而且御乎物若轅髙以逺乎汚若葢下以成乎禮若軾險而安易而利動而法則庶乎車之全也詩之言曰駟牡騑騑六轡如琴孔氏語曰左為六官右為執法此其以達於大政也凡人之質不良莫能方且恒質良矣用不周莫能以圓遂孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其内後之學孔子者不志於是則吾無望焉耳矣誨之吾戚也長而益良方其中矣吾固欲其任重而行於世懼圓其外者未至故說車以贈君子所貴乎道者三出辭氣逺鄙倍其一也纂組六經之語左仁右義聲周咳孔無異於聖人而片言單辭不覺流露以是知誠之不可揜而文之不可以為偽也宗元説車以喻君子以成徳為行者信善矣乃謂孔子在夾谷視叱齊侯類蓄狗則其平日之多曠於禮大類陽處父行并植於晉國不沒其身其氣象畢見矣按史記夾谷之㑹孔子两度趨進歴階而升不盡一等舉袂而言請命有司左傳則曰齊使萊人以兵刦魯侯孔子以公退曰士兵之兩君合好而夷裔之俘以兵亂之非齊君所以命諸侯也合而觀之烏暏所謂叱齊侯類蓄狗者耶此文洵美如玉矣而斯語者非大珪之纇哉宋清傳宋清長安西部藥市人也居善藥有自山澤來者必歸宋清氏清優主之長安醫工得清藥輔其方輒易售咸譽清疾病疕瘍者亦皆樂就清求藥冀速已清皆樂然響應雖不持錢者皆與善藥積券如山未嘗詣取直或不識遙與券清不為辭歲終度不能報輒焚券終不復言市人以其異皆笑之曰清蚩妄人也或曰清其有道者歟清聞之曰清逐利以活妻子耳非有道也然謂我蚩妄者亦謬清居藥四十年所焚券者百數十人或至大官或連數州受俸博其餽遺清者相屬於户雖不能立報而以賒死者千百不害清之為富也清之取利逺逺故大豈若小市人哉一不得直則怫然怒再則罵而仇耳彼之為利不亦剪剪乎吾見蚩之有在也清誠以是得大利又不為妄執其道不廢卒以富求者益衆其應益廣或斥棄沉廢親與交視之落然者清不以怠遇其人必與善藥如故一旦復柄用益厚報清其逺取利皆類此吾觀今之交乎人者炎而附寒而棄鮮有能類清之為者世之言徒曰市道交嗚呼清市人也今之交有能望報如清之逺者乎幸而庶幾則天下之窮困廢辱得不死亡者衆矣市道交豈可少耶或曰清非市道人也栁先生曰清居市不為市之道然而居朝廷居官府居庠塾鄉黨以士大夫自居者反爭為之不已悲夫然則清非獨異於市人也韓愈所為私傳皆其人於史法不得立傳而事有關於人心世道不可無傳者也宗元則以發抒已議類莊生之寓言如梓人如郭槖駞等皆與此同非所為信以傳信者矣然其議論有可取者則亦具錄於編此篇盖慨交道之如市且謂善賈者必有逺慮有行義若今之交并市道之不若也炎而附寒而棄者之晨鐘矣雖然猶未聞君子之所謂朋友之道也顧嘗論之君臣父子夫婦兄弟之倫皆由天定朋友者人事之適然耳而聖人列諸五倫與四者並重何哉於戲人必明於朋友之倫而後四者之道可幾而明且行也由家言之父子之有慈孝兄弟之有友恭夫婦之有義正固已而情事萬端道心微而人心危何以撤其情慾氣質之偏而趨乎慈孝友恭義正之域誰為講明切究扶掖而閑衛之者非朋友歟由國言之君者出令者也臣者行君之令而致之民者也君令而不違者豈曰唯其言而莫予違哉亦曰唯其言而莫違乎天下之人之心也則相與心誠求夫天下之人之心以明夫令之若否者必有師臣焉必有賔臣焉必有友臣焉非欲盡九州之才俊以供一身之使令也故曰臣哉鄰哉鄰哉臣哉貴為天子其朋友之倫未嘗絶也若臣與臣之夙夜交儆以事一人者更為朋友之分之大端矣為長為两為貳為伍為考為殷為輔内而臺省外而牧守近而聨曹逺而隔域爵有髙卑分有小大而其所謀與所事者莫非所以行天子之令以致之於民以生養安全教訓化成斯民者也然則其相親也如股肱耳目之同處一體雖父子兄弟夫婦有不可得而踰者以其所係者大非一身一家之事所可比擬此自然而然非彊欲云然而然者也如是而朋友之道可識矣於國無益於君民於家無益於孝弟而猶曰朋友是其朋何朋而其友何友也常棣之詩曰兄弟䦧于墻外禦其侮每有良朋烝也無戎是詩也非言朋友不如兄弟之肯禦侮也朋友之義不在禦侮無戎義也不得以身許人如聶政荆軻之為也其次章曰䘮亂既平既安且寧雖有兄弟不如友生是詩也非言待兄弟不如朋友而譏其共患難不共安樂之謂也䘮亂既平既安且寧斯時也何以安不忘危存不忘亡未雨綢繆而及時修徳乎必將就有道而正焉則非一家兄弟之智謀才力所可任也雖有兄弟不如友生言當求友之亟也伐木之詩曰相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平言出谷遷喬撤昏祛蔽而日進於髙明未有不求友生而能自得之者也其次章曰既有肥羜以速諸父既有肥牡以速諸舅其三章曰籩豆有踐兄弟無逺則初未嘗一言及於友生此以見親親之恩唯當施於諸父諸舅兄弟而所謂友生者不得狎與其間也親親之殺尊賢之等各有當矣施親親之恩於朋友正所謂朋友道衰也易曰西南得朋東北䘮朋西南者坤方萬物皆致養焉人臣所當勞勤心力耳目之地也故利得朋天下大矣萬事變矣一手一足之烈其奚能為羣䇿羣力多多益善人若於此而有不欲得朋之心則必所謂人之有技媢嫉以惡之人之彦聖而違之俾不通實不能容者也東北者寅方始萬物終萬物者也事之始也當禀其令於君事之終也當歸其成於主義非人臣之所得私夫且不得有其身而安得有朋人若於此而有不能䘮朋之心則所為臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗辟民用僭慝者也是故推得朋之義則曰朋盍簪曰朋來朋至曰以其彚以其鄰莫非朂其一乃心力勤勞王事之辭也推䘮朋之義則曰渙其羣曰朋亡曰絶類上莫非戒其履霜堅冰尾大不掉之辭也於戲讀易與詩朋友所繫不綦重哉交道既䘮庠序之間所謂以文㑹友以友輔仁以成風俗之美者無聞朝廷之上所謂㧞茅連茹彚征並進以成得人之慶者無聞平居嬉遊徴逐握手出肺肝相示而非相朂以忠孝也其在位則結納汲引黨同伐異專以熒惑君上博取人間富若貴則無論炎而附寒而棄即使久要不忘其為交也猶糞土耳豈曰金石哉栁宗元慨士大夫交輕相負無歲寒之雅為傳宋清市藥得利之逺以忻動而愧勵之不知茍不達於伐木友生之義大易得朋䘮朋之言則雖白頭如新傾盖如故其於聖賢所為朋友之道猶是適秦而越其轅者也種樹郭槖駞傳郭槖駞不知始何名病僂隆然伏行有類槖駞者故鄉人號之駞駞聞之曰甚善名我固當因捨其名亦自謂槖駞云其鄉曰豐樂鄉在長安西駞業種樹凡長安豪富人為觀遊及賣果者皆爭迎取養視駞所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺傚慕莫能如也有問之對曰槖駞非能使木夀且孳也能順木之天以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩茂之也不抑耗其實而已非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以騐其生枯揺其本以觀其疎密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讐之故不我若也吾又何能為哉問者曰以子之道移之官理可乎駞曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督而穫蚤繰而緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之吾小人輟饔飧以勞吏者且不得暇又何以蕃吾生而安吾性耶故病且怠若是則與吾業者其亦有類乎問者嘻曰不亦善夫吾問養樹得養人術傳其事以為官戒也康誥曰如保赤子大學申之曰心誠求之雖不中不逺矣夫父母之於子無名之可立也惟不以名求而以心誠求故神聽無響而飲食寒暖之宜必適得乎不能言之赤子之心而終未嘗厭其煩長民者民之父母也民赤子也乃有父母之責而未嘗稍存父母之心不以為獲利之區即以為立名之地赤子奚乳焉宗元所言長人者好煩其令民輟饔飱以勞吏者且不得暇又何以蕃吾生而安吾性誠足以為官戒矣雖然其所以至是者豈以赤子視斯民而致然哉為其以民事為立名之地而致然也果甚憐其民而促耕督穫之勤且劬如是又安得使民輟饔飱以勞吏唯其為此者名也名既至而赤子與我即秦越是以若甚憐焉而卒以禍如心誠求之則或煩或簡於民各有所利也其簡也固種樹者之置若棄也其煩也非即種樹者之蒔若子乎梓人傳裴封叔之第在光徳里有梓人款其門願傭隟宇而處焉所職尋引䂓矩繩墨家不居礱斵之器問其能曰吾善度材視棟宇之制髙深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食於官府吾受祿三倍作於私家吾收其直大半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪祿嗜貨者其後京兆尹將飭官署余往過焉委羣材㑹衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宫於堵盈尺而曲盡其制計其毫釐而構大厦無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而歎曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒𨽻為鄉師里胥其上為下士又其上為中士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有䂓矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圖而究焉猶梓人畫宫於堵而績於成也能者進而由之使無所徳不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循迹而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事听听於府庭而遺其大者逺者焉所謂不通是道者也猶梓人而不知繩墨之曲直䂓矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者倘或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫繩墨誠陳䂓矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圯彼將樂去固而就圯也則巻其術黙其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也䘮其制量屈而不能守也棟橈屋壞則曰非我罪也可乎哉可乎哉余謂梓人之道類於相故書而藏之梓人葢古之審曲面勢者今謂之都料匠云余所遇者楊氏潛其名儲欣曰分明一篇大臣論借梓人以發其端由賔入主非觸而長之之謂也王弇洲乃云形容梓人處己妙只一語結束可也喋喋不已複而易厭如弇洲言是認煞公為梓人立傳而觸類相臣失厥指矣童區寄傳栁先生曰越人少恩生男女必貨視之自毁齒以上父兄鬻賣以覬其利不足則盗取他室束縛鉗梏之至有鬚鬛者力不勝皆屈為僮當道相賊殺以為俗幸得壯大則縛取么弱者漢官因為己利茍得僮恣所為不問以是越中户口滋耗少得自脫惟童區寄以十一歲勝斯亦竒矣桂部從事杜周士為余言之童寄者郴州蕘牧兒也行牧且蕘二豪賊刧持反接布囊其口去逾四十里之虚所賣之寄偽兒啼恐慄為兒恒狀賊易之對飲酒醉一人去為市一人卧植刃道上童㣲伺其睡以縛背刃力下上得絶因取刃殺之逃未及逺市者還得僮大駭將殺童遽曰為兩郎僮孰若為一郎僮耶彼不我恩也郎誠見完與恩無所不可市者良久計曰與其殺是僮孰若賣之與其賣而分孰若吾得專焉幸而殺彼甚善即藏其尸持僮抵主人所愈束縛牢甚夜半童自轉以縛即爐火燒絶之雖瘡手勿憚復取刃殺市者因大號一虚皆驚童曰我區氏兒也不當為僮賊二人得我我幸皆殺之矣願以聞於官虚吏白州州白大府大府召視兒㓜愿耳刺史顔証竒之留為小吏不肻與衣裳吏䕶還之鄉鄉之行刧縛者側目莫敢過其門皆曰是兒少秦武陽二歲而討殺二豪豈可近耶子厚未嘗為史此文絶似後漢書固子厚之史也御選唐宋文醇巻十一
