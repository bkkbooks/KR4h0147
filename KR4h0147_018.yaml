body:
  text: 河東栁宗元文八祭文墓表墓志銘狀碣雜文弔萇叔文弔屈原文祭井文又祭崔簡神柩歸上都文唐故給事中皇太子侍讀陸文通先生墓表故祕書郎薑君墓志故襄陽丞趙君墓志覃季子墓銘段太尉秀實逸事狀國子司業陽城遺愛碣唐故御史周君碣乞巧文欽定四庫全書御選唐宋文醇卷十八河東栁宗元文八弔萇叔文有周之羸兮邦國異謀臣乘君側兮王易為侯威強逆制兮鬱命轉幽疹蠱膠密兮肝膽為尤姦權蒙貸兮忠勇以劉伊時云幸兮大夫之羞嗚呼危哉河渭潰溢兮橫軀以抑嵩髙坼陊兮舉手排直壓溺之不慮兮堅剛以為式知死不可撓兮明章人極夫何大夫之炳烈兮王不寤夫讒賊卒施快於剽狡兮怛就制乎強國松柏之斬刈兮蓊茸欣植盜驪折足兮罷駑抗臆鷙鳥之髙翔兮孽狐惴而不食竊畏忌以羣朋兮夫孰病百而伸一挺寡以校衆兮古聖人之所難矧援羸以威慠兮兹固蹈危而違安殺身之匪豫戚兮閔宗周之不完豈成城以夸功兮哀清廟之將殘嫉彪子之肆誕兮彌皇覽以為謾姑舍道以從世兮焉用夫考古而登賢指白日以致憤兮卒頽幽而不列版上帝以飛精兮黮寥廓而殄絶朅馮雲以羾訴兮終𡨕冥以鬱結欲登山以號辭兮愈洋洋以超忽心沍涸其不化兮形凝冰而自栗圖始而慮末兮非大夫之操陷瑕委厄兮固衰世之道知不可而愈進兮誓不偷以自好陳誠以定命兮侔貞臣以與為友比干之以仁義類兮緬遼絶以不羣伯夷殉潔以莫怨兮孰克軌其遺塵茍端誠之內虧兮雖耆老其誰珍古固有一死兮賢者樂得其所大夫死忠兮君子所與嗚呼哀哉敬弔忠甫三綱湮九法斁則乾坤或幾於息矣其所由來者微在論利害而不論是非耳夫敬王周天子也遭王子朝之亂出居成周諸侯戍之月役煩勞萇叔乃請城之此如子弟之衛父兄手足之捍頭目且無所為是而又安得有非乃衛彪徯適周見單穆公謂萇叔必不得其死天之所支不可壞也其壞亦不可支也周既為天所壞而萇叔猶欲支之當必為戮適晉范吉射中行寅叛責周為之援周乃殺萇叔千載而下惑於彪徯之誕論羣謂萇叔支天之所壞而受天罰焉豈非所為論利害而不論是非者乎孔子萬世師也其言必可信也千古是非宜所折衷也公山弗擾以費叛召子欲往而曰如有用我者我其為東周乎可知孔子未嘗一日忘周雖叛其大夫之陪臣至賤至鄙而如欲用之即思因之以興周室矣孔子既然可無疑於萇叔之事矣萇叔身為周之大夫合諸侯城成周以衛蒙塵之天子此豈天之所惡耶蒼蒼者豈猶有我見存焉而惡人支其所欲壞也乃當時議之後世疑之亦可謂三綱淪而九法斁已宗元之謫因欲收宦官兵柄以崇唐室而為一時之所詬訾故興慨於萇叔之死而為文弔之殆自弔也弔屈原文後先生蓋千祀兮余再逐而浮湘求先生之汨羅兮掔蘅若以薦芳願荒忽之顧懷兮冀陳辭而有光先生之不從世兮惟道是就支離搶攘兮遭世孔疚華蟲薦壤兮進御羔褎牝雞咿嚘兮孤雄束咮哇咬環觀兮蒙耳大吕堇喙以為羞兮焚棄稷黍犴獄之不知避兮宫庭之不處陷塗藉穢兮榮若繡黼榱折火烈兮俁俁笑舞讒巧之嘵嘵兮惑以為咸池便媚鞠恧兮美愈西施謂謨言之怪誣兮反置瑱而逺違匿重痼以諱避兮進俞緩之不可為何先生之凛凛兮厲針石而從之但仲尼之去魯兮曰吾行之遲遲栁下惠之直道兮又焉往而可施今夫世之議夫子兮曰胡隱忍而懷斯惟達人之卓軌兮固僻陋之所疑委故都以從利兮吾知先生之不忍立而視其覆墜兮又非先生之所志窮與達固不渝兮夫惟服道以守義矧先生之悃愊兮滔大故而不二沉璜瘞佩兮孰幽而不光荃蕙蔽匿兮胡久而不芳先生之貌不可得兮猶倣佛其文章託遺編而歎喟兮渙余涕之盈眶呵星辰而驅詭怪兮夫孰救於崩亡何揮霍夫雷電兮茍為是之荒茫耀姱辭之矘朗兮世果以是之為狂哀余衷之坎坎兮獨藴憤而增傷諒先生之不言兮後之人又何望忠誠之既內激兮抑銜忍而不長芉為屈之幾何兮胡獨焚其中腸吾哀今之為仕兮庸有慮時之否臧食君之祿畏不厚兮悼得位之不昌退自服以默默兮曰吾言之不行既偷風之不可去兮懷先生之可忘賈誼曰般紛紛其離此郵兮亦夫子之故也歷九州而相其君兮何必懷此都也鳯皇翔於千仞兮覽德輝而下之見細德之險微兮遙增擊而去之彼尋常之汚瀆兮豈容吞舟之魚橫江湖之鱣鯨固將制乎螻蟻蓋深歎屈原之不去楚卒以自戕如云龔生竟夭天年非吾徒之謂也至栁宗元乃曰委故都以從利兮知先生之不忍立而視其覆墜兮又非先生之所志然後貴戚之卿國存與存國亡與亡之義乃著及朱子益闡其幽光而謂九歌等皆托神以為君言為人間隔不可企及如已不得親近於君之意未嘗怨懟而屈子之微言大義熛炳天壤死而不亡其道大光矣祭井文致祭於水土之神惟神蓄是元德演為人用不窮之養功齊乳潼惟古有制八家所共是邦闕焉官守斯恐藴利兹久閟靈則深爰告有神惟惻我心卜兹利兆於彼城隂神斯有仁是鑒是臨惟昔善崩今則堅好惟昔遞石今則順道終古所無聿從心禱非神是與人力焉保發自玄𡨕成於富媪克長厥靈不愛其寶敬修報禮式薦蘋藻按朱子云栁子厚文有所倣者極精如自解諸書並是倣子長報任安書今觀此文亦絶似兩漢人語也又祭崔簡神柩歸上都文嘻乎崔公之柩嘻乎崔公楚之南其土不可以室或坌而頽或確而崒隂流泄漏瀸沒渝溢碩鼠大蟻傍穿側出虧疏脆薄久乃自窒不如君之鄉式堅且密嘻乎崔公楚之南其鬼不可與友躁戾佻險睒眒欺茍脞賤暗曶輕嚚妄走不思已類好是羣醜不如君之鄉式和且偶日月甚良子姓甚勤具是舟輿寧君之神去爾夷方返爾故鄰奕奕其歸宜樂且欣君死而還我生而留逺矣殊世曷從之逰酹觴於座與涕俱流此亦倣楚辭招魂末云死還生留樂死而哀生宛如巴東三峽巫峽長猿啼三聲泪沾裳也唐故給事中皇太子侍讀陸文通先生墓表孔子作春秋千五百年以名為傳者五家今用其三焉秉觚牘焦思慮以為論注疏説者百千人矣攻訐狠怒以辭氣相擊排冒沒者其為書處則充棟宇出則汗牛馬或合而隱或乖而顯後之學者窮老盡氣左視右顧莫得其本則專其所學以訾其所異黨枯竹護朽骨以至於父子傷夷君臣詆悖者前世多有之甚矣聖人之難知也有吳郡人陸先生質與其師友天水啖助洎趙匡能知聖人之旨故春秋之言及是而光明使庸人小童皆可積學以入聖人之道傳聖人之教是其德豈不侈大矣哉先生字某既讀書得制作之本而獲其師友於是合古今散同異聨之以言纍之以文蓋講道者二十年書而志之者又十餘年其事大備為春秋集注十篇辨疑七篇微指二篇明章大中發露公器其道以生人為主以堯舜為的苞羅旁魄膠轕下上而不出於正其法以文武為首以周公為翼揖讓升降好惡喜怒而不過乎物既成以授世之聰明之士使陳而明之故其書出焉而先生為巨儒用是為天子爭臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守人知仁永貞年侍東宫言其所學為古君臣圖以獻而道達乎上是嵗嗣天子踐阼而理尊優師儒先生以疾聞臨問加禮某月日終於京師某月日葬於某郡某里嗚呼先生道之存也以書不及施於政道之行也以言不及覩其理門人世儒是以增慟將葬以先生為能文聖人之書通於後世遂相與諡曰文通先生後若干祀有學其書者過其墓哀其道之所由乃作石以表碣漢唐經師之所蔽情狀備於此文質之著作名在經籍志而今能述之者鮮矣司馬遷不云乎後之人欲砥行立名者非附青雲之士曷能施於後世蓋謂青雲所在其下有賢聖也今質為韋執誼王叔文所臂使亦異乎附青雲者矣其説曷能久而不廢哉唐書本傳陸質字伯沖世居吳明春秋師事趙匡匡師啖助質盡傳二家學歷信台二州刺史素善韋執誼方執誼附叔文竊威柄用其力召為給事中憲宗為太子詔侍讀時執誼懼太子怒已専故以質侍東宫隂伺意解釋左右之質伺間有所言太子輒怒曰陛下命先生為寡人講學何可及他質惶懼出故祕書郎薑君墓志祕書郎薑崿字某開元皇帝外孫也始楚國公皎與上遊益貴幸子慶初得尚某公主生崿崿生三日上曰他物無以餉吾孫即敕有司以第六品告與緋衣銀魚得通籍出入凡名是官七十某年終不徙然其間在蜀漢荆楚以大諸侯命守州邑輒以勞稱時缺則復命好遊嗜音以生貴富畜妓能傳宫中聲賢豪大夫多與連歡後加老風病手足竒右可用不能就官士有載酒來則出妓摶髀笑戲觀者尚識承平王孫故態元和十四年月日終桂州都督御史中丞裴公曰噫帝戚也葬不可以亷為具物祭以豚酒月日葬州東南一里子某年若干母曰雷姬銘曰始賤終貴於世為遂幼榮老窮在物為凶均之得喪誰缺誰豐若君者銀朱於始生鐘鼎以及壯不矍矍於進取不施施於驕伉左絃右壺樂以自放雖老而客死未嘗戚乎已與夫拳拳恐悸蒙諂負義得之拘拘榮不蓋愧以終其身而不能止者不猶優乎銘勒金石質之乾坤夫安可以不直若如白居易所云銘功皆太公頌德悉仲尼則繆戾曷極例其浮詞將並掩其實善非所以為其人榮也沿而習之千百人皆浮詞則一二人實善亦復並掩則文之為用或幾於息也韓愈以碑板擅當時而劉義尚攫其金曰此諛墓所得不如與劉生為夀他可知矣如宗元此文庶幾古之遺直故襄陽丞趙君墓志貞元十八年月日天水趙公矜年四十二客死於栁州官為斂葬於城北之野元和十三年孤來章始壯自襄州徒行求其葬不得徴書而名其人皆死無能知者來章日哭於野凡十九日唯人事之窮則庶於卜筮五月甲辰卜秦誗兆之曰金食其墨而火以貴其墓直丑在道之右南有貴神冡土是守乙巳於野宜遇西人深目而髯其得實因七日發之乃覯其神明日求諸野有叟荷杖而東者問之曰是故趙丞兒耶吾為曹信是邇吾墓噫今則夷矣直社之北二百舉武吾為子蕝焉辛亥啓土有木焉發之緋衣緅衾凡自家之物皆在州之人皆為出涕誠來章之孝神付是叟以與龜偶不然其協焉如此哉六月某日就道月日葬於汝州龍城縣期城之原夫人河南源氏先沒而祔之矜之父曰漸南鄭尉祖曰倩之鄆州司馬曾祖曰𢎞安金紫光祿大夫國子祭酒始矜由明經為舞陽主簿蔡帥反犯難來歸擢授襄城主簿賜緋魚袋後為襄陽丞其墓自曾祖以下皆族以位時宗元刺栁用相其事哀而旌之以銘銘曰誗也挈之信也蕝之有朱其紱神具列之懇懇來章神實恫汝錫之老叟告以兆語靈其鼓舞從而父祖孝斯有終宜福是與百越蓁蓁羈鬼相望有子而孝獨歸故鄉涕盈其銘旌爾勿忘宇宙古今忠孝大節乃天地之正氣人心之正理貫乎太虛參萬嵗而成一純若夫行事之顛末則俯仰之間迹已陳矣漸陳漸湮漸湮漸滅良可悲夫其能使萬里千嵗几席之內濯濯如生永永不渝謦咳宛然丹赤如告人人見之而天性感動至情奮發欣快起舞悲憤流涕忽不自知其嗜欲之漸湛而慨然以聖賢為立可學而至者非天下之至文其孰能與於此文不綦重矣哉此左史之敘事所以獨重於千古也栁州斯文規撫丘明甚似而幾矣覃季子墓銘覃季子其人生愛書貧甚尤介特不茍受施讀經傳言其説數家推太史公班固書下到今橫竪鉤貫又且數十家通為書號覃子史纂又取鬻老管莊子思晏孟下到今其術自儒墨名法至於狗彘草木凡有益於世者為子纂又百有若干家篤於聞不以仕為事黜陟使取其書以氏名聞除太子校書某年月日死永州祁陽縣某鄉將死歎曰寧有聞而窮乎將無聞而豐乎寧介而躓乎將溷而遂乎葬其鄉後若干年栁先生來永州戚其文不大於世求其墓以石銘銘曰困其獨豐其辱貌狷介多聞之士神氣如生段太尉逸事狀太尉始為涇州刺史時汾陽王以副元帥居蒲王子晞為尚書領行營節度使寓軍邠州縱士卒無賴邠人偷嗜暴惡者卒以貨竄名軍伍中則肆志吏不得問日羣行丐取於市不嗛輒奮擊折人手足椎釡鬲甕盎盈道上把臂徐去至撞殺孕婦人邠寧節度使白孝德以王故戚不敢言太尉自州以狀白府願計事至則曰天子以生人分公理公見人被暴害因恬然且大亂若何孝德曰願奉教太尉曰某為涇州甚適少事今不忍人無冦暴死以亂天子邊事公誠以都虞候命某者能為公已亂使公之人不得害孝德曰幸甚如太尉請既署一月晞軍士十七人入市取酒又以刃刺酒翁壞釀器酒流溝中太尉列卒取十七人皆斷頭注槊上植市門外晞一營大譟盡甲孝德震恐召太尉曰將奈何太尉曰無傷也請辭於軍孝德使數十人從太尉太尉盡辭去解佩刀選老躄者一人持馬至晞門下甲者出太尉笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰尚書固負若屬耶副元帥固負若屬耶奈何欲以亂敗郭氏為白尚書出聽我言晞出見太尉太尉曰副元帥勳塞天地當務始終今尚書恣卒為暴暴且亂亂天子邊欲誰歸罪罪且及副元帥今邠人惡子弟以貨竄名軍籍中殺害人如是不止幾日不大亂大亂由尚書出人皆曰尚書倚副元帥不戢士然則郭氏功名其與存者幾何言未畢晞再拜曰公幸教晞以道恩甚大願奉軍以從顧叱左右曰皆解甲散還火伍中敢譁者死太尉曰吾未晡食請假設草具既食曰吾疾作願留宿門下命持馬者去旦日來還卧軍中晞不解衣戒候卒擊柝衛太尉旦俱至孝德所謝不能請改過邠州由是無禍先是太尉在涇州為營田官涇大將焦令諶取人田自占數十頃給與農曰且熟歸我半是嵗大旱野無草農以告諶諶曰我知入數而已不知旱也督責益急且飢死無以償即告太尉太尉判狀辭甚巽使人求諭諶諶盛怒召農者曰我畏段某耶何敢言我取判鋪背上以大杖擊二十垂死輿來庭中太尉大泣曰乃我困汝即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後食取騎馬賣市榖代償使勿知淮西寓軍帥尹少榮剛直士也入見諶大罵曰汝誠人耶涇州野如赭人且飢死而必得榖又用大杖擊無罪者段公仁信大人也而汝不知敬今段公唯一馬賤賣市榖入汝汝又取不恥凡為人傲天災犯大人擊無罪者又取仁者榖使主人出無馬汝將何以視天地尚不愧奴𨽻耶諶雖暴抗然聞言則大愧流汗不能食曰吾終不可以見段公一夕自恨死及太尉自涇州以司農徴戒其族過岐朱泚幸致貨幣慎勿納及過泚固致大綾三百匹太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也太尉曰然終不以在吾第以如司農治事堂棲之梁木上泚反太尉終吏以告泚泚取視其故封識具存元和九年月日永州司馬員外置同正員栁宗元謹上史館今之稱太尉大節者出入以為武人一時奮不慮死以取名天下不知太尉之所立如是宗元嘗出入岐周邠斄間過真定北上馬嶺歷亭鄣堡戍竊好問老校退卒能言其事太尉為人姁姁常低首拱手行步言氣卑弱未嘗以色待物人視之儒者也遇不可必達其志決非偶然者會州刺史崔公來言信行直備得太尉遺事覆校無疑或恐尚逸墜未集太史氏敢以狀私於執事謹狀張英曰敘太尉三事皆剛正慈仁詩所謂不畏強禦不侮鰥寡者歟筆勢復陡健雄邁曲盡情事國子司業陽城遺愛碣四年五月皇帝以銀印赤紱即隱所起陽公為諫議大夫後七年廷諍懇至纍日不解帝尤嘉異遷為國子司業旌直優賢道光師儒又四年九月己巳出拜道州刺史太學生魯郡李償廬江何蕃等百六十人投業奔走稽首闕下叫閽籲天願乞復舊朝廷重更其事如己巳詔翌日會徒北嚮如初行至延喜門公使追奪其章遮道願罷遂不果獻生徒嗷嗷顧盼徘徊昔公之來仁風扇揚暴慠革面柔軟有立聽聞嘉言樂甚鐘鼓瞻仰德宇髙踰嵩岱及公當職施政示人凖程良士勇善偽夫去飾惰者益勤誕者益恭沉酗􅀈酒斥逐郊遂違親三嵗罷退鄉黨令未及下乞歸就養者二十餘人禮順克彰孝悌以興則又講貫經籍俾達奧義簡習孝秀俾極儒業冠屨裳衣由公而嚴進退揖讓由公而儀公征甚遐吾黨誰師遂相與咨度署吏布告諸儒願立貞珉侔髙狀明乃訪於學古之士紀公名字垂憲於後公名城字亢宗家於北平隱於條山惟公端粹沖和髙嶷懿醇道德仁明孝愛友悌薰襲里閈布聞天下守節貞固患難不能遷其心怡性坦厚榮位不足動其神為司諫議震於周行為司業愛加於生徒宜乎立石俾後是憲其辭曰惟兹陽公履道葆醇爰初隱聲覆簣基仁德充而形乃作諫臣抗志勵義直道是陳帝求師儒二我成均開朗蒙滯宣明德教太和潛布玄機密照羣生聞禮後學知孝進退作則動言是效匪公之軌人用奚蹈粗厲貪凌待公順之欺偽譎詐待公信之少年申申咸適其宜檟楚廢弛尊嚴而威公褒其良俾升於堂癯者既肥榮如衮衣公棄不用懲咎內訟既訟於內猶公之誨匪仁孰親匪德孰尊今公于征孰表儒門生徒上言稽首帝閽謂天蓋髙曾莫我聞青襟涕濡填街盈衢逺送於南望慕踟蹰立石書德用揚懿則嗚呼斯文遺愛罔極陽城獨行君子絶似東漢人宗元作遺愛碣亦力倣東漢金石文字唐故御史周君碣有唐貞臣汝南周氏諱某字某以諫死葬於某貞元十二年栁宗元立碣於其墓左在天寶年有以諂諛至相位賢臣放退公為御史抗言以白其事得死於墀下史臣書之公之死而佞者始畏公議於呼古之不得其死者衆矣若公之死志匡王國氣震姦佞動獲其所斯蓋得其死者歟公之德之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以為世軌第令生於定哀之間則孔子不曰未見剛者出於秦楚之後則漢祖不曰安得猛士而存不及興王之用沒不遭聖人之數誠立志者之所悼也故為之銘銘曰忠為美道是履諫而死佞者止史之志石以紀為臣軌兮玄宗罷裴耀卿張九齡而相李林甫牛仙客安危之機定於此矣子諒志存忠愛奮不顧身慷慨陳詞受杖而死可謂能得死所者也論者或謂徒死無益不若從容以觀其變不知子諒之為此亦何忍逆料其君之必不聽而姑為是一死以成名哉蓋明皇初政非甚昏暗茍幸邀宗社之福因諍臣一言大悔於厥心則轉敗為功固忠臣義士所禱祀而求者矣不謂姦邪之錮蔽已深彼蒼之降禍已亟事之不成命也然子諒之死實不為無益大凡權姦之亂政其初未嘗不畏公議故必於臺諫之地廣布私人而後可以得志即觀林甫立仗馬之言固欲以威力脅服廷臣而其中亦有不自安之意焉然則子諒此舉雖無救於敗亦足以伸志士之氣而禠佞臣之魄矣勒石青史題曰貞臣百世而下猶可想其風節洵豪杰之士哉乞巧文栁子夜歸自外庭有設祠者􅊡餌馨香蔬果交羅插竹垂綏剖瓜犬牙且拜且祈怪而問焉女𨽻進曰今兹秋孟七夕天女之孫將嬪於河鼓邀而祠者幸而與之巧驅去蹇拙手目開利組絍縫製將無滯於心焉為是禱也栁子曰茍然歟吾亦有所大拙倘可因是以求去之乃纓辨束袵促武縮氣旁趨曲折傴僂將事再拜稽首稱臣而進曰下土之臣竊聞天孫專巧於天轇轕璇璣經緯星辰能成文章黼黻帝躬以臨下民欽聖靈仰光耀之日久矣今聞天孫不樂其獨得貞卜於元龜將蹈石梁欵天津儷於神夫於漢之濵兩旗開張中星耀芒靈氣翕歘兹辰之良幸而弭節薄遊民間臨臣之庭曲聽臣言臣有大拙智所不化醫所不攻威不能遷寬不能容乾坤之量包含海嶽臣身甚微無所投足蟻適於垤蝸休於殼龜黿螺蚌皆有所伏臣物之靈進退惟辱仿佯為狂局束為諂吁吁為詐坦坦為忝他人有身動必得宜周旋獲笑顛倒逢嘻已所尊昵人或怒之變情徇勢射利抵巇中心甚憎為彼所竒忍仇佯喜悅譽遷隨胡執臣心常使不移反人是已曾不懼疑貶名絶命不負所知抃嘲似傲貴者啓齒臣旁震驚彼且不恥叩稽匍匐言語譎詭令臣縮恧彼則大喜臣若效之瞋怒叢已彼誠大巧臣拙無比王侯之門狂吠狴犴臣到百步喉喘顛汗睢盱逆走魄遁神叛欣欣巧夫徐入縱誕毛羣掉尾百怒一散世途昏險擬步如漆左低右昂鬭冒衝突鬼神恐悸聖智危栗泯焉直透所至如一是獨何工縱橫不恤非天所假彼智焉出獨嗇於臣恆使玷黜沓沓騫騫恣口所言迎知喜惡默測憎憐搖脣一發徑中心原膠加鉗夾誓死無遷探心扼膽踊躍拘牽彼雖佯退胡可得旃獨結臣舌喑抑銜寃擘眥流血一辭莫宣胡為賦授有此竒偏眩耀為文瑣碎排偶抽黃對白啽哢飛走駢四儷六錦心繡口宫沉羽振笙簧觸手觀者舞悅誇談雷吼獨溺臣心使甘老醜嚚昏莽鹵朴鈍枯朽不期一時以俟悠久旁羅萬金不鬻弊帚跪呈豪傑投棄不有睂矉額蹙喙唾胸毆大赧而歸填恨低首天孫司巧而窮臣若是卒不余畀獨何酷歟敢願聖靈悔禍矜臣獨艱付與姿媚易臣頑顔鑿臣方心規以大圓拔去呐舌納以工言文詞婉軟步武輕便齒牙饒美眉睫增妍突梯卷臠為世所賢公侯卿士五步十連彼獨何人長享終天言訖又再拜稽首俯伏以俟至夜半不得命疲極而睡見有青褎朱裳手持絳節而來告曰天孫告汝汝詞良苦凡汝之言吾所極知汝擇而行嫉彼不為汝之所欲汝自可期胡不為之而誑我為汝唯知恥諂貌淫辭寧辱不貴自適其宜中心已定胡妄而祈堅汝之心密汝所持得之為大失不汚卑凡吾所有不敢汝施致命而升汝慎勿疑嗚呼天之所命不可中革泣拜欣受初悲後懌抱拙終身以死誰惕人病宗元以巧進被謫而作乞巧文自謂抱拙終身考諸史傳其為人蓋喜立事急功名以至於敗非為機變之巧者也如為陽城作遺愛碣及與太學諸生書此豈巧人所肯為耶乞巧送窮同是子雲解嘲之流文亦光怪陸離如七襄錦矣御選唐宋文醇卷十八
